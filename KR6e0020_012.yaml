body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經八歎佛往修十度行滿今得果圓十一頌分二初一總明爾時法界普音菩薩摩訶薩至即說頌言佛威神力遍十方至昔所滿足皆令見佛威神力略有三類一者俱生力謂風不動衣等二者聖威力謂通明等種種功德三者法威力謂波羅蜜圓滿法力令五根中無諸非淨四支百節有無量力故名堅固不可壞身法身常身無邊之身言遍十方者即無邊身廣大示現謂變化身無分別者平等智身大菩提行者波羅蜜身昔所滿足者衆行先成皆令見者大果今出二有十頌別顯一頌一度皆上半往修因下半今得果十度之義十行十地一經始末亦多辨之須粗識其相略啓十門一釋名二出體三辨相四建立五次第六相攝七修證八約教九觀心十釋文今初又二先通名後別稱通名波羅蜜多者唯識云要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性二依止最勝謂要依止大菩提心三意樂最勝謂要慈愍一切有情四事業最勝謂要具行一切事業五巧便最勝謂要無相智之所攝受六回向最勝謂要回向無上菩提七清淨最勝謂要不為二障間雜即三時無悔若七隨闕非到彼岸故此十度各四句分別其別稱及出體三辨相至文當釋四建立者為十地中對治十障證十真如故但有十為對六蔽漸修佛法漸熟有情故但說六六中前三增上生道感大財體及眷屬故後三決定勝道能伏煩惱成熟有情及佛法故又前三饒益有情施財不惱忍彼惱故後三對治煩惱勤修加行永伏永滅故又由前三故不住涅槃由後三故不住生死能為無住涅槃資糧後唯四者助六令滿方便助前三願助精進力助靜慮智助般若如深密說五次第者謂由前前引發後後及由後後持淨前前又前前粗後後細易難修習次第如是六相攝者此十一一皆攝一切波羅蜜多互相順故般若論云檀義攝於六資生畏法等智論云有未莊嚴波羅蜜即不攝者有已莊嚴波羅蜜即相攝者今此經文必具攝十若但說六六攝後四若聞為十第六唯攝無分別智後四皆後得智攝七修證者五位通修佛方究竟十約因位總有三名謂初無數劫施等勢力尚微被煩惱伏但名波羅蜜多第二劫去勢力漸增能伏煩惱名近波羅蜜多第三僧祇勢力轉增能畢竟伏一切煩惱名大波羅蜜多故上下文中屢言廣大波羅蜜也八約教者諸教可思此教要復一一融攝徹果該因九觀心者可以意得十釋文分十初施度昔於衆生起大悲至能令見者生歡喜輟己人惠名之為施即以無貪及所起三業而為其性此有三種謂財法無畏上半因中大悲行施已該此三此悲亦是七最勝中前三最勝下半果中財能資身無畏益心法資法身故得果身身最殊妙三皆悅物故見者必喜亦由具七最勝故身殊妙也二戒度昔在無邊大劫海至普滅世間諸重苦防非止惡名之為戒即受學菩薩戒時三業為性戒有三種律儀攝善得淨身果攝衆生戒能除物苦遍十方者無作戒身等衆生故三忍度往昔修行忍清淨至普放光明照十方堪受諸法未能忘懷名之為忍此約生忍又忍即忍可忍即是慧雙忍事理即以無瞋精進審慧及彼所起三業為性忍亦有三謂耐冤害忍安受苦忍諦察法忍偈云信解真實即諦察法也色相圓滿前二忍果放淨光明第三忍果四精進往昔勤修多劫海至悉現菩提樹王下練心於法名之為精精心務達目之為進以勤及所起三業為性亦有三種一被甲二攝善三利樂初句通前二以被甲精進瑜伽釋云設千大劫為一日夜處於地獄為脫一衆生故次句即第三下半通三果也因既離身心相故果能身遍十方五禪那佛久修行無量劫至煩惱障垢悉除滅梵云禪那此云靜慮即以等持為性亦有三種謂安住引發辦事既引起神通辦利生事故見者深喜現法樂住諸惑不行又資慧斷惑故見者惑滅六般若如來往修諸行海至克殄一切愚癡暗般若梵言此翻為慧推求諦理名之慧也此及後四皆擇法為體亦有三種一生空無分別二法空無分別三俱空無分別攝論以加行正體後得為三約六度說瓔珞以照有照無及照中道而為三者唯約法空三觀之義至下當明慧導萬行故云修諸行海言具足者具上三也因如有目故果獲身智二光能滅諸暗七方便種種方便化衆生至無邊際劫不休息方便即善巧也方謂方法便謂便宜上四但各二種今初謂回向方便拔濟方便文云種種化生即拔濟善巧所修成就兼於回向菩提所化無邊果得十方橫遍為物取果豎窮來際不休八願度佛昔修行大劫海至盡未來際救衆生願者即希求要誓有義即以欲勝解及信為性亦有二種謂菩提願利樂他願由初願故出現世間由後願故設生不息九力度佛無量劫廣修治至普現十方諸國土力者不可屈伏故隨思隨修任運成就亦有二種謂思擇修習今言法力即思擇諸法而修習故攝論云由此二力令前六度無間現前經云成自然力即無師而成不習而無不利何能壞哉十智度佛昔修治普門智至舒光普照十方剎決斷名智謂如實覺了亦有二種謂受用法樂智成熟有情智無性論云由施等六成立此智復由此智成立六種名受法樂由此妙智能正了知此施戒等饒益有情經云普門智總含二智別配初句即成熟有情次句即受用法樂此二無二故成無礙力舒光普照九述菩提樹摩尼果中歎佛往修十地行果十一頌分二初一總舉爾時雲音淨月菩薩至即說頌言神通境界等虗空至摩尼果中咸具說謂佛果大用由昔地行及結說處餘十次第各述一地地義當品廣明今皆略述而已清淨勤修無量劫至普見十方無量佛略述四義一加行多劫諸論皆說地前為一僧祇已為無量更有異說恐厭繁文二標入地名三出生廣智謂生如來家見法實性得妙觀察平等性智故四普見佛海同下願智果中一切法中離垢地至供養無邊諸佛海一舉法標名二別地行相三修行時分四供佛多少積集福德發光地至摩尼果中如是說一舉法標名世間中極云積福德二修諸禪定三忍度偏多四聞持廣博𦦨海慧明無等地至如佛所治皆演暢一歎慧標名世無等故二了道品境異凡夫故三起慈悲異小乘故四成淨身土離身見故普藏等門難勝地至如佛所淨皆能說一標入地謂積集福智故云普藏十平等心故曰等門二標地名三真俗極違會令相順四諦法俗境無平等觀廣大修行慧海地至樹中演暢此法音一歎行二標名三正顯行相即了緣起法四地用得十空三昧周遍法界虗空身至昔所遠行今具演一先標果用二照達羣機三雙行巧攝四寄行標名一切願行所莊嚴至此無等地咸宣說一別地行相二明淨土果三略釋地名四歎地結說無量境界神通力至劫海所行皆備闡一標地作用二善達教法三標示地名四廣行多劫法雲廣大第十地至此聲是佛威神力一標起地名二含藏法雨三能蔽如空粗重四深廣難測故云佛境諸偈多有結說文並可知十歎佛體用應機自在二初說偈儀爾時善勇猛光幢菩薩至觀察十方即說頌言前文多觀衆會此觀十方者觀衆表無偏心觀方表說周遍二文影略二正說十頌一一頌中各有四義文三初一總顯無量衆生處會中至了達一切莊嚴境初總歎佛令物悟入福智有四義者一多衆二心異三悟智四了福莊嚴即福也亦通二嚴皆佛令爾故顯衆德即為歎佛二八別明各起淨願修諸行至及以一切諸神變見佛體用亦四義一起願二具行三見體四見用或有能見佛法身至悉入其身無不盡見法身一勝故無等二淨故無礙三大故周遍四深廣故包含或有見佛妙色身至種種變現十方中見色身一色妙謂如金等二相具十華藏相等三光盛謂常放等四隨機變謂三尺無邊等或見無礙智慧身至種種差別皆令見見智身一無礙真俗無礙故二等空稱法性故三知四巧現或有能了佛音聲至為出言音無障礙了佛音聲一音普遍二說應器三言同類四應無礙或見如來種種光至復見諸佛現神通見佛光明一多種二遍照三見佛四現變或有見佛海雲光至令生深信入佛智見佛毛光一顯光名二明出處三示往因四令信悟或見佛相福莊嚴至皆佛相中明了見見佛福相一見福相二了福因三示因體四明見處三一結歎如來功德不可量至以佛力故能宣說結歎德廣一數多二深廣三用普四結說謂推功歸佛謙己無能第九明天地徵祥謂地動興供顯證上來佛成正覺衆海雲集各申慶讚顯佛高深而下稱機情上叶佛願故世主為之興供天地為之呈祥分二先動地三初動處爾時華藏莊嚴世界海自狹之寬且云華藏約下結通實周法界諸天重重並華藏之內故云其地何所不該又染淨融故雖標摩竭而地震華藏二動因以佛神力就主顯勝但明佛力感應道交亦由物機然泛明動因總有其十今當轉法輪亦兼成道餘如別章三動相其地一切六種十八相震動震即是聲動即是形聲兼吼擊形兼起踊故有六種此六各三成十八相所謂動遍動普遍動至擊遍擊普遍擊搖揚不安為動自下漸高為起忽然騰舉為踊隱隱出聲為震雄聲郁遏為吼砰磕發響為擊十八相者唯一方動直爾名動四方若次第若一時動者名為遍動若八方次第或一時動名普遍動又四方八方十方如次名三相動又一方獨動十方次第動十方同時動又為三相餘五例之然動何所為依勝思惟梵天經所為有七一令諸魔怖故二為說法時大衆心不散亂故三令放逸者生覺知故四令衆生知法相故五令衆生觀說法處故六令成熟者得解脫故七令隨順問正義故此上七緣正是今經所為地論有四非當此文上約外器若心地聖賢地法性地亦有震動等義可以虗求二興供三初標數此諸世主一一皆現至雨於如來道場衆海同生之衆亦得稱主為物依故二略列所謂一切香華莊嚴雲至其數無量不可思議三結遍此諸世主一一皆現至道場衆海靡不周遍第十結通無盡二初結華藏內二初舉此界如此世界中一一世主心生歡喜如是供養二類華藏中一切世界三初衆海興供其華藏莊嚴世界海中至悉亦如是而為供養一切世界者謂華藏中有十不可說佛剎微塵數世界種一一種中各有不可說不可說佛剎微塵數世界彼等一切諸世界中悉有世主而為供養二類佛坐道場其一切世界中悉有如來坐於道場然有二義一彼諸世主各供當處之佛二彼諸世主亦供此佛此佛亦坐彼界道場三類結大衆得法有十一句一一世主各各信解至各各入如來解脫門謂聞法得益得益有三一聞益各各信解故謂信其言而解其義二思益謂於所對審緣慮故三修益修益有七一修門謂三昧方便故二修法謂資糧助道故三修果契理成就故四修益隨有所得成法喜故五修轉各各趣入無量乘門及衆生界故六修同悟解脫法門合先聖故七修極修極有三一大悲極入佛神通境但為益生故此成思德二大智極入佛力境如來力境悲智超絶無能及故成佛智德三自在極入如來解脫門盡一切障心境自在成佛斷德亦即是前諸解脫門二結華藏外如於此華藏世界界海至一切世界海中悉亦如是謂以華藏例於法界各有此會同為一大法界會方是華嚴無盡說耳此下入第六經如來現相品第二將釋此品四門分別一來意二釋名三宗趣四釋文然下諸品多用此四若有增減至文當辨今初來意二先分來後品來今初三分之中自下正宗由致既彰正宗宜顯故次來也四分之中已明教起因緣次辨說法儀式故次來也二品來者曲有二義一前辨衆集今顯疑現相二前明舊衆今辨新集故次來也二釋名者一分名正宗者正陳宗旨揀序流通若四分中名舉果勸樂生信者舉依正果勸物信樂是故亦名所信因果亦名說佛依果會以從多說故二品名者如來是能現之人相是所現之法現通能所能所合說體用雙陳以立其稱然如來現相各有五義以成其十如來五者一就理顯謂法性名如出障名來二唯就行瑜伽云言無虗妄故名如來涅槃三十二亦同此說三理智合說轉法輪論云第一義諦名如正覺名來正覺第一義諦故名如來此與成實大同四離相說般若云如來者無所從來亦無所去故名如來五融攝說謂一如無二如若理若智若開若合無不皆如故名為如如外無法來亦即如如是來者是真如來現相五者一現面門光相召十方衆二現眉間光相示說法主三振動剎網以警羣機四佛前現華表說依果五白毫出衆表教從佛流如是等相是如來現相品中辨此故以為名三宗趣亦二一分宗三分正宗已如上說四分之宗即以佛果無邊剎海具三世間無盡自在故以為宗令諸菩薩發生淨信修行涉求以之為趣二品宗以光相表示為宗令上智玄悟為趣四釋文此下二品說法儀式是當分方便即分為二初現相品為遠方便後三昧品為近方便今初一品大分為六一衆海同情二光召有緣三所召雲奔四現瑞表說五稱揚佛德六結通無窮今初先以五門料揀諸會請問之殊一問之有無二所問法異三能問人別四儀式不同五疑之權實初中前二後二此四有問中五皆無謂初會標果起因故問第二會尋因至果故問但因有升降寄六會以答之果無差別第七當會答也然諸會更有問者並當會別義以總收之或重明於前非大位問第八會明因果純熟故須有問諸行修無礙六位頓成故當會答第九會明稱性因果故別有問謂俱入法界無差別故亦當會答四處都有三百一十句問謂初及第二各四十問第八二百第九三十中本廣本問則難思二所問異者初兩會問果廣因略為成信解故第八會問因廣果略為成行故第九會問全同初會而因舉主佛之因明因是果因顯唯證故三能問人異者初及第九皆同生異生二衆齊問以所問法衆同依故第二會中唯同生問以所入位同生勝故八唯同生一人自問以造修之行各自成故四請問儀式復有二義一約言念二約通別初中請有二種一言二念答亦有二一言答二示相交絡相望應成九句在文唯四初會之中具二問答謂現相品長行念請供聲言請初光示法主現華表義現衆表教即示相答三昧品中以言重請下之三品亦以言答第二會唯念請如來示相答菩薩言說答佛心自在不待興言佛力殊勝現相能答第八會言請言答此顯菩薩不同佛故第九會念請示相答顯以心傳心唯證相應離言說故二通別者初後二會別問通答二八兩會別問別答又初會亦是別問別答次文當明第五疑之權實者問諸王菩薩位皆圓極何得有疑有云為衆生疑故有云希佛果故又顯因果懸隔故然上二解初權後實並皆有理可通餘教然此經中若實若權無非法界之疑以疑為有力與所說證為緣起故此事舊爾海印頓現疑之與答念念常疑念念常斷其猶像模因模之高成像之下因模之下成像之高緣起法界理應爾故次正釋文二初長行念請二初舉人標念爾時諸菩薩及一切世間主作是思惟謂盡於衆海皆希佛境並欲利生成緣起門故標同念二云何下正顯問端有四十句且分二別前二十句直爾疑念請後二十句引例舉法請準義二文皆應具舉互有影略不欲繁辭故下偈中更不引例合二處文直爾請說第二會中亦有此二而引例中問同此直請正欲顯於諸佛道同影略之義又四十句中初二十句問果後十問因中間十句明化用普周通問依正染淨因果前是所求後是所行中是所知故分是舉果故先問果據斯義類亦可分三今以兩段皆有結請故但分二前中亦二先明疑念後明結請今初前十句問德用圓滿後十句問體相顯著今初十句文唯有八偈有神通及自在二問世界成就品初答中亦同此有今文闕者是或脫漏或是義含無能攝取之中攝此二故故下法界品中闕無能攝取及與神通唯有自在故此三事合則可一開則為三故出沒不同二正釋文云何是諸佛地言佛地者即智德分位然此經宗通收萬德故廣則無量略有十種如上所引同性經說然體不出五謂清淨法界及與四智以斯五法攝大覺性具如佛地經及彼論說然要唯有二無所不攝謂真理妙智融而無二是諸佛地並有生成住持功能故名為地此句為總該攝諸德下明佛果皆答斯問云何是諸佛境界此下諸句皆別明佛地之德言境界者悲智所緣故亦分齊故廣亦無量略有十種如出現及問明不思議品廣說然出現多明體遍不思議品以辨超勝故云十種無比境界問明該其因果體用小有不同至文當知若準瑜伽如來境界謂五界差別一有情界二世界三法界四所調伏界五調伏加行界或說要唯有四一所緣真俗二所住剎海三所起業用四所應攝化並如下說此與瑜伽大同總唯有二謂佛即境約分齊說或佛之境約所觀化等今文多顯佛之境也云何是諸佛加持謂佛勝力任持令有所作廣亦無量略有十種如不思議法品及法雲地說離世間中十種佛所攝持亦其例也然不出三類一如加持化身及舍利等二如加耆域入火不燒等三如加非情作佛事等此與神通寬狹不同謂六通中唯神境一有加持故今此加持即是神力云何是諸佛所行是佛所作或說十種如不思品云諸佛世尊有十種化不失時等亦是所行之行如出現品謂無礙行是如來行等或大悲攝生或大智造緣無思成事方便善巧所作究竟皆名為行然約人望行標云所行既是所作實通能所故不同彼境界之中彼智所觀所應攝化但就所故況所望不同故不相濫若準瑜伽七十八中引深密經佛答文殊此二別相云所行謂一切種如來共有不思議無量功德莊嚴淨土如來境界謂一切種五界差別五界如前云何是諸佛力即佛大自在廣有無量略說有十即處非處等又有十種謂廣大力等如不思議品云何是諸佛無所畏無諸畏懼故離世間品說有十種無畏或說四種如常所明昔云前四是異二乘功德佛力是破魔功德無畏是伏外道功德未必全爾十力無畏亦不共二乘故然上來多明大智功德云何是諸佛三昧謂佛果等持數過塵算如師子嚬申等略說十種如不思議品說佛有無量不思議三昧等八準答及頌名佛神通者謂依定發起無礙神用或說有十如十通品不思議品云一切諸佛有無邊際無礙解脫示現無盡大神通力十通唯局菩薩或說有六如常所辨然名通大小九準答及頌名佛自在謂所作任意無礙成就故廣有無量或說百種謂於衆生自在等各有十故略有十種謂命自在等並如離世間品說不思議品亦說有十謂諸佛世尊於一切法皆悉自在等云何是諸佛無能攝取頌名無能制伏答中名無能毀壞謂佛所作無有天上人中沙門魔梵及諸二乘大菩薩等神力能制是故舊經翻為佛勝法也略有十種如不思議品諸佛有十種最勝法等若取無能毀壞即十種大那羅延幢勇健法是上之十問多在不思議品至下當知二體相顯著云何是諸佛眼至云何是諸佛聲謂六根三業於身業中開常光為身光放光為光明故有十句不思議法品說諸佛有十種法普遍無量無邊法界謂無邊際眼等離世間品一一各以十門辨釋又出現品說佛三業各具十義然諸經論說佛常光一尋準不思議品常妙光明不可說不可說種種色相以為嚴好為光明藏出生無量圓滿光明普照下方無有障礙然放光則有時不放如諸會面門毫相所放之類然相海品其一一相常放光明斯即放光亦通常光而分別者常則湛遍放則見有去來故云何是諸佛智廣則無量略說有十體不出五謂清淨智及大圓鏡等四智要唯有二謂根本後得總攝唯一諸法實相無障礙智此之十句多如相海及隨好品二明結請唯願世尊哀愍我等開示演說將欲引例故且結請二引例舉法請二初引例二初十句問化用普周文唯有九闕安立海又十方世界海一切諸佛皆為諸菩薩說世界海一世界海者是所化用處如華藏品衆生海二是所化機即剎中所持三準答及頌名法界安立海如世界成就品通明法界所安立海起具因緣等故若因緣者賢首云所化生法也亦是前二於法界中施設安立故諸經論皆說世諦為安立諦然安立言梵云奈耶而義多含或云理趣或云方便或云法式或云法門或云安立故知即安立法式也佛海四能化主也如華藏品廣舉其名亦如不思議等品佛波羅蜜海五化所成行如離世間品佛解脫海六化所得果如法界品佛變化海七臨機神變化難化衆生即身業化也如諸會不起而遍光明覺品長行身業阿僧祇等皆是其文佛演說海八稱根說法語業化也如四諦品佛名號海九隨機立稱如名號品佛壽量海十隨器所感住世修短如壽量品二十句問因德深廣及一切菩薩誓願海一創於生死立大誓願一切菩薩發趣海二勝進大心趣求佛果一切菩薩助道海三積集菩提福智資糧一切菩薩乘海四運諸菩薩從因至果一切菩薩行海五慈悲喜捨等四菩薩行一切菩薩出離海六謂永背惑業證契真理一切菩薩神通海至一切菩薩智海上四可知然此十句有通有別別則初二寄十信次二十住次一十行次一十向以向出離故次三登地已上後一等覺此約橫論一切菩薩若約通說各通始終即豎論一切菩薩也故此十句文通行位然皆普攝法界深廣無邊故云海也並如下諸會說二結請願佛世尊亦為我等如是而說既是引例故致亦言此四十句答文在何問有通局答亦如之通即諸會與此相應皆是答此上所引者居然當之謂前衆海既是九會常隨豈得此問局於初會豈復衆海問不盡耶故知初會為總九會同答此問而為分意別故諸分初皆重舉諸問則顯分分之中皆通因果等故則從此盡光明覺答十海問問明已下答十因問不思議下答二十句身至下當知又就四十問十海為總九會同答十海一世界成就品答世界安立海二華藏品答世界海遮那但引因釋成現相三昧但是說法由致並非別答海問三名號品答如來名號海四四諦品答演說海五光明覺至十忍品別答十句因問通答衆生海修因之人即所化生故六阿僧祇品答變化海長行舉數欲顯化用難量故偈中廣明變化重重微細難說七壽量住處皆答壽量海八不思議等五品別答二十句果問總明佛海就德深廣以顯佛故九第八會答波羅蜜海總攝諸位皆成行故十第九會答解脫海證入法界起大用故問中為次與答異者問約本有修成自行化他而為次第謂先有世界衆生則有佛出修因得果故波羅蜜海是因解脫是果餘四皆大用謂臨機變化隨宜說法稱物立名隨物修短答中先人後己故大用四海居先自利果因二海居後又衆生一海亦可通在九海皆為生故種種隨宜顯生多故若約局言當會答盡此復有二一現相答下文當示二言說答此亦有二一經來未盡二答二兼餘成就品當引二供聲偈請二初明因緣爾時諸菩薩威神力故至自然出音而說頌言前請在念佛雖已知今請彰言使大衆同曉前既為法興供今乃以供宣心不因撫擊故曰自然非無因緣即菩薩威力同異生衆皆菩薩也又表身口為供具故供具皆即法界體故二正說偈中十頌分二初三歎德請二初二歎佛明具說因無量劫中修行滿至諸佛安樂咸令證前偈即悲之智已滿為物現身後偈即智之悲已圓能斷疑除苦有悲必普有智必能故應說也後一歎衆明具說緣菩薩無數等剎塵至演說妙法除疑惑前半歎衆顯無異念後半結請明說則斷疑二七舉法請三初四述前初十句問云何了知諸佛地至為利益故當開演問小有不次但取文便及餘一切廣大法者結例所餘謂二十句外佛無邊德亦願說之不思議品廣說餘門諸說果處皆答此也次一頌述前體相顯著十句佛眼云何無有量至願示能知此方便略示可知後二頌述化用普周十句之問如諸剎海衆生海至此道場中願說宣現文唯七以佛海中含於神變壽量名號以此三海不離佛故不問因者長行明通諸會故列因疑今彰初分請當會答又顯此會因略果廣第二會果略因廣故二明光召有緣十初放光意爾時世尊知諸菩薩心之所念以領念故供聲易了故略不明念但疑法何以放光現相答故答相云何謂佛三昧力加持放光令菩薩來遠遠能為此即佛地境界是佛所行無攝無畏故此為總意若別別明者如文思之又召來菩薩亦是言答上之十問至文當知二光依處即於面門衆齒之間面門即口言衆齒者表四十問教道遐舒口生真子咀法滋味益法身故總處放者此會總故三顯光體放佛剎微塵數光明隨機多演故四列光名所謂衆寶華遍照光明至稱揚一切佛名號光明略列十名皆從體用立稱五結光數如是等佛剎微塵數六彰眷屬一一復有佛剎微塵數光明以為眷屬七辨色相其光悉具衆妙寶色衆寶隱映表教道含容八明光應遠普照十方各一億佛剎微塵數世界海九彼衆感通彼世界海諸菩薩衆至各得見此華藏莊嚴世界海十偈聲召命即通舉十號示為所歸十偈在文且分為五初六偈自彰因果已圓勸同觀禮以佛神力其光於彼一切菩薩衆會之前而說頌言無量劫中修行海至今成妙覺遍照尊總明二利因滿成正遍知毛孔之中出化雲至令趣菩提淨無礙毛光開覺是明行足佛昔往來諸趣中至一念皆令得解脫往來諸趣是世間解一念解脫可謂善逝摩尼妙寶菩提樹至放大光明普威耀云成正覺即佛義焉大音震吼遍十方至種種方便令開曉大音演寂即無上士隨心開覺是調御丈夫往修諸度皆圓滿至汝等應往同瞻禮諸力皆圓即天人師也二有一頌明衆海已集引例勸歸十方佛子等剎塵至今在佛前專覲仰既云已雨諸雲為供是應供也為對引例故不當次三一頌圓音隨機見必蒙益如來一音無有量至彼兩足尊宜往見結云兩足尊即世尊也四一頌義海頓演宜速及時三世諸佛所有願至汝可速諸如來所如三世佛大願而來故結云如來五一頌特命有緣是光本意毗盧遮那大智海至汝可往觀聞所說三所召雲奔三初同會道場三初總明爾時十方世界海一切衆會至親近供養二別顯中十方即為十段一一方皆有十事初東方十者一定方所所謂此華藏莊嚴世界海東二明土海次有世界海名清淨光蓮華莊嚴三辨世界彼世界種中有國土名摩尼瓔珞金剛藏此中應有世界種名略不說耳四彰佛名佛號法水覺虗空無邊王五主菩薩於彼如來大衆海中至名觀察勝法蓮華幢六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種菩薩身相雲至悉遍虗空而不散滅供雲應有十種而但九者塗香燒香二文合故言各現者主伴一一皆現也重重無礙各遍虗空一一可觀名不散滅九申禮獻供現是雲已向佛作禮以為供養十化座本方即於東方各化作種種至於其座上結加趺坐二南方十初定方所此華藏世界海南二明土海次有世界海名一切寶月光明莊嚴藏三辨世界彼世界種中有國土名無邊光圓滿莊嚴四彰佛名佛號普智光明德須彌王五主菩薩於彼如來大衆海中有菩薩摩訶薩名普照法海慧六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種一切莊嚴光明藏至悉遍虗空而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於南方各化作帝青寶至於其座上結加趺坐三西方十初定方所此華藏世界海西二明土海次有世界海名可愛樂寶光明三辨世界彼世界種中有國土名出生上妙資身具四彰佛名佛號香𦦨功德寶莊嚴五主菩薩於彼如來大衆海中至名月光香𦦨普莊嚴六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種一切寶香至悉遍虗空而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於西方各化作真金葉至於其座上結加趺坐四北方十初定方所此華藏世界海北二明土海次有世界海名毗琉璃蓮華光圓滿藏三辨世界彼世界種中有國土名優鉢羅華莊嚴四彰佛名佛號普智幢音王五主菩薩於彼如來大衆海中有菩薩至名師子奮迅光明六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種一切香摩尼衆妙樹雲至而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於北方各化作摩尼燈至於其座上結加趺坐五東北方十事初定方所此華藏世界海東北方二明土海次有世界海名閻浮檀金頗梨色幢三辨世界彼世界種中有國土名衆寶莊嚴四彰佛名佛號一切法無畏燈五主菩薩於彼如來大衆海中至名最勝光明燈無盡功德六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種無邊色相至悉遍虗空而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座本方即於東北方各化作寶蓮華至於其座上結加趺坐六東南方十事初定方所此華藏世界海東南方二明土海次有世界海名金莊嚴琉璃光普照三辨世界彼世界種中有國土名清淨香光明四彰佛名佛號普喜深信王五主菩薩於彼如來大衆海中有菩薩摩訶薩名慧燈普明六眷屬數與世界海微塵數諸菩薩俱七至佛所來諸佛所八興供雲各現十種一切如意王摩尼帳雲至而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於東南方各化作寶蓮華藏至結加趺坐
