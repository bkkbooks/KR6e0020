body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經三地面香海者上之大海既是藏識今明心華之內攝諸種子一一種子不離藏海故有多香海然一一具於性德故皆有莊嚴長行分二初總舉數爾時普賢菩薩復告大衆言至佛剎微塵數香水海準下剎種及梵本中皆有十不可說今闕十字或是譯人之漏或是傳寫之失下標種處亦然二別顯莊嚴準後總結應云一一香海各有若干莊嚴今文略無若桉文取義一切之言即一切海總以妙寶而為其底等文有二十句前十明海體狀一底二岸三網四水五華六垽七聲八光九人衛現通十結廣無盡一切妙寶莊嚴其底至所有莊嚴悉於中現階陛莊嚴具衆寶至悉是如來自在力初一頌階陛及欄楯次一頌樹林三頌華敷四頌幢相五頌城殊六頌牆閣繚者纏也七頌結嚴屬佛一昔因二現力四海間香河即隨一一心同時相應功德流注也長行亦三初舉數爾時普賢菩薩復告大衆言至香水河右旋圍繞二辨嚴具一切皆以金剛為岸岸體諸河並無差別故云一切皆以淨光摩尼以為嚴飾以珠嚴岸常現諸佛寶色光雲現佛光色及諸衆生所有言音出異類音其河所有漩澓之處至種種形相皆從中出漩澓出影摩尼為網衆寶鈴鐸網鐸垂覆諸世界海所有莊嚴悉於中現總顯多嚴摩尼寶雲以覆其上至及一切佛神通之事寶雲覆上現聖依正復出妙音稱揚三世佛菩薩名澓出妙音其香水中常出一切寶焰光雲相續不絶水湧光雲長劫無盡三結廣數若廣說者一一河各有世界海微塵數莊嚴既繞小海及與小河尚有剎海塵數之嚴彌顯標結非唯約事皆是一多無礙耳二偈頌爾時普賢菩薩欲重宣其義至觀察十方而說頌言清淨香流滿大河至炳然顯現諸佛影初半偈頌岸體金剛次一偈半頌摩尼嚴岸三一頌光雲言音次三皆頌漩澓出影七頌網鐔垂覆及總現諸嚴前現事嚴此說道行八頌現佛依正九頌澓出妙音十頌水出光雲五河間華林長行有三初總標爾時普賢菩薩復告大衆言至悉以妙寶種種莊嚴二別顯一一各有四天下微塵數至衆寶樹林次第行列別顯二事謂華及樹水陸各一實有多事然此一段文勢少異不列十事以顯無盡而但舉二展轉明多初一白蓮後一寶樹一一樹中恆出一切至摩尼寶王充遍其地寶樹出五蘂用一出莊嚴雲二寶王照耀三華香盈滿四出音演法五雨寶遍地五中有總有別上總下別別有八事通三世間所謂蓮口輪摩尼寶王至普垂布光網雲摩尼寶王上六現器現一切諸佛神變摩尼寶王此一現正覺現一切衆生業報海摩尼寶王此一現衆生世間如劒葉林等現惡業報天意樹等即善業報男女林中朝生暮落皆業報海如是等有世界海微塵數且結樹之雨寶已有剎海塵數例上出雲等四一一皆然一樹之中已有多種剎海之嚴次例芬陀利華亦同於樹其華與樹各有四天下塵一一皆爾如華樹等類復應有剎海塵數之物故為無盡之嚴也三總結其香水河兩間之地一一悉具如是莊嚴二應頌不次文分為三初寶樹爾時普賢菩薩欲重宣其義至觀察十方而說頌言其地平坦極清淨至悉以十力廣開演二白蓮華摩尼妙寶芬陀利至悉現光明無盡歇三有三偈頌結嚴所因三世所有諸莊嚴至隨其意樂悉清淨謂由佛力體用無礙現而常如然此三偈有多意趣初一偈器世間次一智正覺後一衆生欲明一一事中皆現三世間嚴影略其文耳又初明一果能現次例一切莊嚴後明塵塵皆爾從略至廣從粗至細又初明佛力次彰願力後隨樂力又初果後因願通因果又初自後他願通自他又初明即性無性體本不生次明即相無相現無來去後明不壞於相各見不同方顯華藏之嚴皆言亡慮絶非可情求也六辨總結莊嚴上來諸段雖說莊嚴猶未能盡今總顯一一之境若說不說皆具剎海塵數功德莊嚴是以文云一切境界長行文二初標莊嚴難測爾時普賢菩薩至世界海莊嚴不可思議二徵釋所由何以故諸佛子至清淨功德之所莊嚴清淨功德文含二義一謂衆多果嚴即是清淨功德二謂一一果嚴從多清淨功德因生以因望果應成四句謂多因一果一因多果等故隨一事即曰難思是以頌云但由如來昔所行神通願力而出生斯即因也若語果嚴略有五相一者令多周給一切二者令常永無乏絶三者令妙悅可衆心四者稱性無生無相五者自在鎔融無礙偈文具之總斯五義故曰難思況因果相即二偈文有十大分為二初果嚴用勝三初別明嚴用爾時普賢菩薩欲重宣其義至觀察十方而說頌言此剎海中一切處至一切剎海咸周遍二結現緣所有化佛皆如幻至一切剎中如是現三結多類如來自在神通事至一切皆於寶中見二對因果十方所有諸變化至神通願力而出生由行願神通為因故獲變化如鏡像果若有能修普賢行至普現其身淨衆剎以普賢勝智為因故得一塵淨衆剎果不可思議億大劫至一剎那中悉能現由長時近友為因故得剎那頓現之果諸佛國土如虗空至本願力故住其中彰淨因之意使倣而行之前半智境嚴即無嚴謂自受用土周遍無等法性之土體性無生二皆無相後半悲應無嚴之嚴嚴遍法界無住之住常住剎中三所持剎網釋品目世界之言又前明本剎今辨末界故兼染淨文三初告衆許說爾時普賢菩薩復告至有何等世界住我今當說二雙標二章諸佛子此不可說至不可說佛剎微塵數世界標二章者謂種及剎然剎種依剎海諸剎依剎種則寬狹可知名從何得欲明世界無邊方便顯多故立此名謂積多世界共在一處攝諸流類故名為種如是種類復有衆多深廣無邊故名為海如積多魚以成一種魚龍龜鱉山泉島嶼乃有多種並悉攝在一大海中而言世界無邊者海外有海海海無窮也若爾種無別體攬界以成何以下文說有形體雖依種類以立種名何妨此種別有其體如多蜂孔共成一窠豈妨此窠別有其體上舉魚龍蓋分喻耳即依後義亦得名為種性依於此種能生世界如依一禾有多穀粒舊經云性多取此義恐濫體性故改為種言有不可說者若準下文香海及種皆有十不可說梵本亦有今脫十字多是傳寫之漏耳三廣釋二章二初通明剎種不同釋剎種章二初長行二初列十門諸佛子彼諸世界種於世界海中然此十門剎種之異並悉不離所依華藏故云於世界海中所列十事與成就品都望全異彼通諸海此明一海之中所有剎種若別別相望互有互無起具因緣清淨佛出劫住轉變彼有此無方所分齊行列趣入力持等五彼無此有依住形體莊嚴無別彼此名同前後互出都有十五皆顯十者俱表無盡而或異者彰義多端復有同者恐濫全別何以起具前有此無前段總明成立因果此中正辨何等世界所依住故餘可思準然與前同已如前釋不同吾事今當說之各各依住各各形狀各各體性上三同前各各方所若圓滿方所周遍法界無處不有不即三界不離三界若隨宜方所隨十方中向背名別各各趣入依門趣入約法門者謂三解脫又互相現入而無來去等各各莊嚴同前各各分齊約事隨宜廣狹異故約佛分齊則十方無際各各行列即是道路約事可知約法謂大念慧行以為游路各各無差別同前各各力加持即食能令住約法廣大法味喜樂所持又此互出顯佛淨土十八圓滿十五攝故言十八者顯色形色分量方所因果及主輔翼眷屬任持事業攝益無畏住處游路乘門依持云何攝耶此具因緣即因圓滿依住即是依持形狀即當形色體攝二種一攝顯色七寶光明為體性故二攝果滿隨類之果可知約佛大圓鏡智相應淨識之所變故故上偈云或一念心普示現為體莊嚴攝三謂一攝住處如來莊嚴為住處二攝輔翼菩薩嚴故三攝眷屬有餘衆故清淨攝三一攝事業謂作有情之義利故二攝攝益謂現證解脫滅彼煩惱及災橫故三攝無畏謂內無災橫外無怖畏故此中依住攝二圓滿一攝主二攝乘或說一乘等故方所分齊二名全同行列即路趣入即門力持謂任持劫住轉變十八中無義同於果及事業攝亦可成二十圓滿於理無違謂劫住窮未來故轉變即如來神通變化世界海普清淨轉變即圓滿義其無差別彼文雖無即由此故方顯圓滿餘皆隨宜故云各各無差既同云何各各所無差事有多種故若將此十對成就品十亦得相攝恐厭繁文又上諸文一一段中具多圓滿一一融攝故異餘宗二隨門廣釋但釋其三謂依住形狀體性餘七雖略義已上說今初分二初列諸佛子此世由種至依一切佛音聲摩尼王海住二結如是等若廣說者有世界海微塵數二形狀二初列二十種諸佛子彼一切世界種至或作諸莊嚴具形回轉形者褶褻往來之形也壇墠形者築土為壇除地為墠佉勒迦者梵音此云竹篅後結塵數不同如是等若廣說者有世界海微塵數三體性二初列諸佛子彼一切世界種至清淨音聲為體亦二十種前十色相後十是聲會釋如前二結如是等若廣說者有世界海微塵數二應頌有十分為六段初一頌一住爾時普賢菩薩欲重宣其義至觀察十方而說頌言剎種堅固妙莊嚴至或有住於香海等二有一頌頌形狀及布列安住須彌城樹壇墠形至各各布列而安住三頌體性或有體是淨光明至佛功德音亦如是四頌三事剎種一一差別門至無等無量悉周遍謂初二句頌所入門次句方所等四句莊嚴餘二偈中廣大剎之本相即是分齊廣狹此彼相入亦頌趣入初偈以多入一後偈一多互入皆入而無入入則壞緣起不入壞性用又要由不入方能入耳又約體本空故無來無入約相不壞故如本無差以性融相故得互入五頌無差一切國土微塵中至一切衆生悉調伏謂塵容佛海等無差故六頌力加持佛身周遍一切剎至普化一切諸含識主伴皆是神力任持普化之言兼於法味二別明種剎香海雙釋二章者謂香海依剎海剎種依香海諸剎依剎種長行分三初總舉諸海所依爾時普賢菩薩復告大衆至如天帝網分布而住上來雖復但標剎種及剎二章而依住中皆云依海故列海數此多香海並在剎海地面故云所依言如帝網者大都分布則似車輪其有別者謂帝釋殿網貫天珠成以一大珠當心次以次大珠貫穿匝繞如是展轉更遞圍繞經百千匝若上下四面四角望之皆行伍相當今此香海雖在地面分布相似又有涉入重重之義故云如也二次第別顯諸海種剎文分為三初辨中間一海次辨右旋十海後明十海所管之海然十海各管不可說佛剎塵數之海總顯則有十不可說佛剎塵數次第說者但有一百一十一海餘皆略指今初中央一海分二光明香海出華以持剎種三初香海名諸佛子此最中央香水海至摩尼王幢為底以多華發光故亦由菩薩行華而為因故二舉華名出大蓮華名一切香摩尼王莊嚴謂以香摩尼嚴此華故又從摩尼底而出生故約法即萬行圓明之所成故海能有華故受華名華依於海取海底稱三剎種名有世界種而住其上至以一切莊嚴具為體約事寶光遠照故約法其世界種正是所含種子一一皆有大智光明遍照法界義故性德互嚴故二所持世界三初總舉大數有不可說佛剎微塵數世界於中布列二別辨當中有二十層廣大主剎準標及結皆有不可說剎塵之數今文但列十九佛剎塵數為二十層其能繞剎但有二百一十佛剎塵數下當會釋二十層即分二十段第一層有七事其最下方有世界至金剛莊嚴光耀輪為際辨際謂世界所據之際如金剛際依衆寶摩尼華而住依住若準此名大同剎種所依蓮華而舊釋云於前無邊香海所出華上更有此華持此一界者以例上諸層別有依住故為此釋何妨最下依於總華思之其狀猶如摩尼寶形狀形謂摩尼狀有於八楞似方不方似圓不圓故異下八隅一切寶華莊嚴雲彌覆其上上覆佛剎微塵數世界周匝圍燒種種安住種種莊嚴眷屬佛號淨眼離垢燈本界佛名離二障垢智眼清淨照世如燈然佛德無邊各隨一義二層已去或有八事謂加去此遠近故或有九事加純淨言故準此若無此言即通染淨此上眷屬漸加剎數中間諸事可以準知第二層此上過佛剎微塵數世界至佛號師子光勝照第三層此上過佛剎微塵數世界至佛號淨光智勝幢第四層此上過佛剎微塵數世界至無量精進力善出現第五層此上過佛剎微塵數至其形普方而多有隅角言普方者都望則方而一面之中亦有多角隅即是角梵音摩尼王雲以覆其上至佛號香光喜力海第六層此上過佛剎微塵數世界至佛號普光自在幢第七層此上過佛剎微塵數至歡喜海功德名稱自在光第八層此上過佛剎微塵數至佛號廣大名稱智海幢第九層此上過佛剎微塵數至清淨月光明相無能摧伏第十層此上過佛剎微塵數至佛號一切法海最勝王第十一層此上過佛剎微塵數世界至佛號無量功德法第十二層此上過佛剎微塵數世界至佛號超釋梵第十三層此上過佛剎微塵數世界至此世界名娑婆主剎即此娑婆以金剛莊嚴為際至莊嚴虗空雲而覆其上言形如虗空者靜法云大小乘經並說虗空體無形質不可見相今云有形者回文者誤梵本云三曼多周圓第嚩皤博曩天宮伽伽那虛空阿楞迦羅莊嚴蓋覆僧塞怛那形狀回文應以形狀置周圓之前虗空安天宮之上然後合綴飾云其形周圓似空居天宮莊嚴之具而覆其上靜法此正深有理致今依經通之亦有理在謂空雖無形隨俗說故以俗典指空為天謂天為圓穹其形如𨫼是故書說天勢圍平野亦如法華云梵王為衆生之父亦隨俗說耳十三佛剎微塵數世界至毗盧遮那如來世尊第十四層此上過佛剎微塵數世界至佛號遍法界勝音第十五層此上過佛剎微塵數世界至其狀猶如卍字之形形如卍字者靜法云室利瑳本非是字乃是德者之相正翻吉祥海雲衆德深廣如海益物如雲古來三藏誤譯洛剎曩為惡剎攞遂以相為字故為謬耳然此相以為吉祥萬德之所集成因目為萬意在語略義含合云萬相耳摩尼樹香水海雲至佛號不可摧伏力普照幢第十六層此上過佛剎微塵數世界至佛號清淨日功德眼第十七層此上過佛剎微塵數世界至無礙智光明遍照十方第十八層此上過佛剎微塵數世界至佛號無量方便最勝幢第十九層此上過佛剎微塵數世界至佛號普照法界虗空光第二十層此上過佛剎微塵數世界至佛號福德相光明三類結所餘此中非唯結數兼總顯上文所依住等文分為四初總結都數諸佛子此遍照十方至佛剎微塵數廣大世界即舉本剎種結有若干此所結剎定是主剎以下文指此不可說佛剎更有兩重繞故其直上中間有十九佛剎而結有不可說者以旁論故不爾豈一剎種最下唯一主剎故知如向所說主剎橫豎共論有不可說故下結其所在云及在香水河中思之二結形類三初總列十門各各所依住各各形狀至各各力加持周匝圍繞既言周匝圍繞明知傍去二廣說十門所謂十佛剎微塵數回轉形至微塵數門闥形世界世界形狀有十八句望前剎種形中闕須彌山形及嚴具形餘皆全同但此約剎為異耳三結歸都數如是等有不可說佛剎微塵數三結眷屬此一一世界各有十佛剎至廣大世界周匝圍繞然有兩重主伴此一一者指上不可說塵數也若望前文主剎直上繞數漸增今總相說故云一一各有十剎塵也又是欲顯無盡義故此諸世界一一復有至微塵數世界而為眷屬如上之言文含二義一即總指前能繞所繞之數繞一世界不欲繁文故云如上二者如上亦用十佛剎為能繞也依此則似譯人文繁理隱何不言一一復有十佛剎塵數耶若依前義則譯者之妙四彰所在如是所說一切世界至及圍繞此海香水河中即最香海言及在香河明知傍去入第九經二明右旋十海即繞處妙華光海有其十也各有剎種十海即為十段初離垢焰藏海二初牒中海以定方爾時普賢菩薩復告大衆言至妙華光香水海東即是所繞從東為首二明能繞之海二初海華剎種次有香水海名離垢𦦨藏至以菩薩行吼音為體二明種所持剎有二十重下九海例然今第一海二十重中各有七事一相去遠近二剎名三形狀四所依五上覆六眷屬七佛號或有說體或說清淨即或八或九其第一重無去遠近但有最下方言然文並可知有難即釋第一重此中最下方有世界至佛號眉間光遍照第二重此上過佛剎微塵數世界有世界名德華藏剎名其形周圓依一切寶華蘂至佛號一切無邊法海慧第三重此上過佛剎微塵數世界至佛號功德相光明普照第四重此上過佛剎微塵數世界至佛號善眷屬出興遍照第五重此上過佛剎微塵數世界至佛號法喜無盡慧第六重此上過佛剎微塵數世界至佛號清淨普光明第七重此上過佛剎微塵數世界至佛號功德華清淨眼第八重此上過佛剎微塵數世界至佛號慧力無能勝第九重此上過佛剎微塵數世界至廣大目如空中淨月第十重此上過佛剎微塵數世界至佛號金色須彌燈第十一重此上過佛剎微塵數世界至佛號逈照法界光明智第十二重此上過佛剎微塵數世界至佛號寶燈普照幢第十三重此上過佛剎微塵數世界至佛號蓮華𦦨遍照第十四重此上過佛剎微塵數世界至名寶藏莊嚴狀如四洲水中可居曰洲準俱舍東洲如半月南洲如車西如滿月北則畟方四洲形異而云如者似此界也依寶瓔珞須彌住至佛號無盡福開敷華第十五重此上過佛剎微塵數世界至佛號甘露音第十六重此上過佛剎微塵數世界至佛號最勝法無等智第十七重此上過佛剎微塵數世界至佛號遍照虗空光明音第十八重此上過佛剎微塵數世界至佛號普現勝光明第十九重此上過佛剎微塵數世界至無邊功德稱普光明第二十重此上過佛剎微塵數世界至佛號普照虗空燈此中文無標結大數準例合有
