body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經八有八門答自在問即分為八初一總明自在兼攝加持文二初總佛子諸佛世尊有十種自在法二別全同八地之中十種自在但此深廣文不次耳初法自在何等為十所謂一切諸佛至是為諸佛第一自在法論經云無中邊法門示現故二心自在一切諸佛教化衆生至是為諸佛第二自在法無量阿僧祗劫三昧入智故由在三昧觀機故化不失時三勝解自在一切諸佛能令盡虗空界至是為諸佛第三自在法大小淨穢隨解轉變故四財自在一切諸佛以神通力至是為諸佛第四自在法一切世界無量莊嚴嚴飾住持故五命自在一切諸佛見一衆生至是為諸佛第五自在法不可說劫命住持故六如意自在一切諸佛悉能遍往至是為諸佛第六自在法一切國土中如意變化故七智自在一切諸佛為欲調伏至成阿耨多羅三藐三菩提如來力無畏不共法相好莊嚴三菩提示現故而於一切佛法非已現覺至亦不住於有學之地生界無邊機熟相應故念念應成而真成在昔故佛於三世非是新覺亦非不覺住在學地又顯雖念念覺離覺相故非三世覺亦離不覺故不住學地而悉知見通達無礙無量智慧無量自在即十力等教化調伏一切衆生是為諸佛第七自在法八業自在一切諸佛能以眼處作耳處佛事至第八自在法六根互用廣大佛事是佛業故然非改轉一根不變本來具故九生自在一切諸佛其身毛孔至是為諸佛第九自在法一切世界生示現故十願自在一切諸佛隨心所欲佛國土時示成三善提故文有四節於一念頃現一切世界至示現諸佛自在神力一一念現多佛於一類界成佛如於衆妙蓮華廣大莊嚴至種種劫數清淨世界二類顯餘界如於一念如是於無量無邊阿僧祇劫一切念中三類顯餘念一念一切現四總結深廣一切現者一念便現法界諸形諸神力故一念無量住常無現故而未曾用少方便力是為諸佛第十自在法而不動如來少許方便故云自在上來十段唯三與八取意而釋餘八並論經之文二圓滿自在佛子諸佛世尊有十種無量不思議圓滿佛法謂前十自在八地容有故顯如來十種圓滿又無一法不自在故方云圓滿何等為十所謂一切諸佛至皆悉成就一切佛法一切佛法即證成菩提十力等一切諸佛皆悉成就一切善根善根通福智一切諸佛皆悉成就一切功德功德唯福一切諸佛皆能教化至見者獲益功不唐捐可知一切諸佛皆具諸佛平等正法即具有法輪教法一切諸佛作佛事已莫不示現入於涅槃是為十三善巧方便三初總佛子諸佛世尊有十種善巧方便即於法自在皆權實等無礙故二別十初言說自在何等為十一切諸佛至是為第一善巧方便知實離言絶動搖之戲論而起權開示善根故為自在二知見自在一切諸佛知一切法至是為第二善巧方便證實無能所見而不礙於法真實知見無縛無解而至大自在三示現自在一切諸佛永離諸相至是為第三善巧方便無相知相無性入性亦能示現依正調生四三世自在一切諸佛住於法界至是為第四善巧方便證冥三際之理而演三際益生五性相自在一切諸佛身語意業至是為第五善巧方便三業湛然而包含示現六調生自在一切諸佛知一切法至是為第六善巧方便知非一異而見一切法七時分自在一切諸佛於一時中至是為第七善巧方便知時融入故不住不捨而不壞年劫演法無休八辨才自在一切諸佛恆住法界成就諸佛無量無畏恆住法界則寂無所住而成就無量無畏十辨演法及不可數辨數多故不可量辨非心測故無盡辨隨說一事窮劫不盡無斷辨任放辨才無有間故無邊辨觸類成辨故不共辨下位中之所無故無窮辨無能難屈故真實辨皆契事理故方便開示一切句辨無一句義不能顯故一切法辨無有一法不能演故隨其根性及以欲解至初中後善皆悉究竟明說之德具七善故或開為十瑜伽八十五云一初善聽聞時生歡喜故二中善修行時無有難苦遠離二邊依中道行故三後善謂究竟離垢等故今文云皆悉究竟諸經論中更有多說恐厭繁文餘七經文略無是為第八善巧方便九勝義自在一切諸佛住淨法界至遠離一切虗妄想著離說而說故無想著如是究竟到於彼岸是為第九善巧方便十了寂用於中先知本寂二初正顯一切諸佛知一切法至無所得故非界二釋成然亦不壞一切諸法至非因緣非無因緣謂色等性無非遣之使無故不壞諸法即空無業等二不廢起用而能了知正定邪定至是為第十善巧方便三結佛子是為諸佛成就十種善巧方便自下入第四十七卷經四廣大佛事明神通自在即答前二會神通問文三初總佛子諸佛世尊有十種廣大佛事謂八相等中皆有大用微細相容故以此攝物故名佛事上標名下顯勝無量無邊不可思議至唯除如來威神之力二別二初徵何等為十二釋十初明上生佛事四初別明能攝所謂一切諸佛於盡虗空至無量智慧所行境界二所攝廣多攝取一切人天魔梵沙門婆羅門阿修羅等三能攝殊勝大慈無礙大究竟平等饒益一切衆生四所攝成益或令生天或令生人至是為第一廣大佛事二降神處胎佛事二初智德內圓佛子一切諸佛從兜率天至成就廣大妙莊嚴藏二神通外用二初一處一時作佛事受最後身住大寶莊嚴樓閣至諸三昧起而作佛事二總攝時處作佛事佛子如來爾時在母胎中至如是皆以種種方便此中多處準下瞿波乃至十重此略舉五皆後後廣前前於一切方即娑婆與能繞十三剎塵數剎十方無間住故一切網彼上諸剎復有眷屬剎等圍繞交絡成網故一切旋繞中間海十右旋海故一切種盡華藏剎海諸剎種故一切世界中盡法界故而作佛事是為第二廣大佛事三現生處宮佛事二初無生現生是誕生相佛子一切諸佛一切善業至為衆生故示誕王宮二無染處染是處王宮相於中四初三學自圓一切諸佛於諸色欲宮殿妓樂皆已捨離無所貪染無染是定常觀諸有空無體性一切樂具悉不真實此一是慧持佛淨戒究竟圓滿此一是戒二明四心愍物觀諸內宮妻妾侍從至心得自在而起大捨三具德攝益具佛功德現生法界至令其間悟心得清淨四攝益深廣雖處內宮衆所咸覩至是為第三廣大佛事四出家佛事二初明出家之意佛子一切諸佛亦處種種至修清淨行利益衆生二出家相當出家時捨俗威儀至長為世間智慧高幢三業二利故是為第四廣大佛事五成道佛事三初真覺舊圓佛子一切諸佛具一切智於無量法悉已知見二應身今滿菩提樹下成最正覺至修諸功德悉已圓滿三演法益生其菩提座具足莊嚴至是為第五廣大佛事此頓演華嚴六轉法輪佛事義通權實文二初列佛子一切諸佛轉不退法輪令諸菩薩不退轉故唯菩薩乘通四不退轉無量法輪令一切世間咸了知故通五乘世咸了故轉開悟一切法輪能大無畏師子吼故開權顯實令悟知見決定有故轉一切法智藏法輪開法藏門除暗障故通三藏三藏除癡及三障故轉無礙法輪等虗空故唯頓法事理雙絶故轉無著法輪觀一切法非有無故中道法不著二邊故轉照世法輪令一切衆生淨法眼故世諦法淨所知故轉開示一切智法輪悉遍一切三世法故唯佛法智遍知故轉一切佛同一法輪一切佛法不相違故唯圓法無異味故二結一切諸佛以如是等至心行差別而作佛事即無量乘為第十輪隨機演故不可思議十皆圓融為不思議是為第六廣大佛事七威儀佛事四初別舉入城益物佛子一切諸佛入於一切至衆生聞者無不欣樂二通顯威儀益物一切諸佛色身清淨至皆為衆生而作佛事三言談示現益物一切諸佛昔於一切至問訊起居而作佛事其昔字晉本所無即是現益若言昔者乃是舉因顯果必是普字四總結深廣一切諸佛以如是等至是為第七廣大佛事八起行佛事四初身心安住行佛子一切諸佛或住阿蘭若處而作佛事蘭若唯語山林或住寂靜處而作佛事寂靜通城邑或住空間處而作佛事空間在無物處或住佛處而作佛事至無有休息而作佛事二起應上求行或以天身求一切智至求一切智而作佛事三說默下化行或時說法或時寂默至即非境界而作佛事四時分進修行或住一日或住一夜至是為第八廣大佛事九起用佛事二初起用所依佛子一切諸佛是生清淨善根之藏以是能生功德藏故令諸衆生於佛法中至具智慧明不由他悟二正明起用或現涅槃而作佛事至是為第九廣大佛事十涅槃佛事別顯用中之一於中有三初明涅槃悲戀益佛子一切諸佛入涅槃時至悲號戀慕而作佛事二舍利流布益復為化度一切天人至永與世間作所歸依三總結益物佛子諸佛世尊雖般涅槃至是為第十廣大佛事若將此十配答十問一答本願二即種性及國土三是無礙四十皆解脫五出現六音聲七佛身八智慧九自在三結佛子此諸佛事無量廣大至唯除如來威神所加五無二自在法佛子諸佛世尊有十種無二行自在法明無畏自在兼答普光無畏之問故於事明審決定無疑故無二不畏他難名為自在何等為十所謂一切諸佛至諸佛智慧決定無二上四可知一切諸佛悉知三世至即一佛語決定無二此三通二義一以理融相二事事即入一切諸佛悉知三世至性無差別決定無二此二唯理一切諸佛悉知三世一切諸佛至是為十有三義一同性修故二互回向故三互主伴故六明住一切法佛子諸佛世尊有十種住住一切法明三昧自在兼答普光三昧問故如來所住無非三昧故遍住一切何等為十所謂一切諸佛住覺悟至是為十七知一切法盡無有餘佛子諸佛世尊有十種知一切法盡無有餘明十力自在兼答普光十力之問故十力智慧照境無遺何等為十所謂知過去一切法盡無有餘至是為十八廣大力明神力自在亦答普光十力之問文三初標佛子諸佛世尊有十種十力是別名大那羅延等是總稱故下列中但依總名是則標中十力一一遍下別中別中十門一一具前標中十力則成百門古德將標中十力次第配下十勇健法謂初為廣大力等則令別中一門不攝前十不成百門亦令餘門無廣大義初門無最上等設欲從勝配者應逆次配之廣大力周法界故最上力無加過故無量力無分量故大威德力可敬畏故難獲力唯佛得故不退力作無屈故堅固力當體堅故不可壞力緣不壞故一切世間不思議力超召言念故一切衆生無能動力不可搖故大那羅延幢勇健法二徵釋二初徵何者為十二釋分十初身命不可壞力今逆次配此即不可動力乃至一毛不搖動故文二初正明不可動壞所謂一切諸佛身不可壞至而從雨之終不為損謂情非情境俱不能壞二舉況顯勝若有衆生為佛所持至第一大那羅延幢勇健法如令耆婆入火取子入獄問罪等二毛孔容持力佛子一切諸佛至第二大那羅延幢勇健法即是不可思而諸衆生不覺知故三毛持大山力佛子一切諸佛至第三大那羅延幢勇健法即當不可壞以雖持多大山身心無勞損故文中速行廣步多劫行剎為一山之量此山已無邊矣況有多山在於一毛況復多毛窮劫持住實謂難思之境矣四定用自在力佛子一切諸佛至第四大那羅延幢勇健法即是堅固定力安住故
