body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經二正明法界行體四初標佛子菩薩摩訶薩有十種不共法以稱法界起行故不共凡小又悟不由他亦非他共二徵何等為十三釋初自利行佛子菩薩摩訶薩不由他教至修六度不共法二化他行佛子菩薩摩訶薩普能攝受至勤攝衆生不共法三上求行佛子菩薩摩訶薩善巧回向至求佛智慧不共法四善巧行於中五初巧離二乘佛子菩薩摩訶薩到善巧至不著己樂唯勤化度二巧修三昧善能入出禪定解脫於諸三昧悉得自在三巧順世間往來生死如游園觀至一切衆生恆來瞻仰四巧住諸乘雖現聲聞辟支佛威儀而不失大乘心五巧窮因果雖念念中示成正覺至方便善巧究竟彼岸不共法五雙行不共行佛子菩薩摩訶薩善知權實至智慧自在到於究竟上標下釋所謂住於涅槃而示現生死至何況一切童蒙衆生後結是為第五不由他教權實雙行不共法六三業隨智慧行佛子菩薩摩訶薩身口意業至隨智慧行不共法七大悲代他苦行佛子菩薩摩訶薩具足大悲至常起大悲不共法八大慈攝物行佛子菩薩摩訶薩常為衆生至皆悉樂見不共法九堅淨自他行佛子菩薩摩訶薩於薩婆若至一切智心明淨妙寶上法下喻佛子如有寶珠名淨莊嚴至能令濁水悉皆澄淨後合菩薩摩訶薩亦復如是至不失一切智心寶不共法涅槃春池可於中說十位滿常修行佛子菩薩摩訶薩成就自覺至不捨尊重佛不共法四結勸佛子是為菩薩摩訶薩至如來無上廣大不共法三有二門明所成之德初明業用四初標佛子菩薩摩訶薩有十種業二徵何等為十三釋所謂一切世界業悉能嚴淨至令一切願悉成滿故四結勸是為十若諸菩薩安住此法則得如來無上廣大業二顯得其體四初標佛子菩薩摩訶薩有十種身然若身若業皆同法界無量略舉十耳二徵何等為十三釋所謂不來身於一切世間至於一切世間求不得故此中十身與第九行十身大同小異謂此不來不去即彼不生不滅不實身一切世間如實得故至以如實理示世間故不實不虗即彼不實不妄不盡身盡未來際無斷絶故至一切衆魔不能壞故不盡堅固即彼不遷不壞不遷則橫無遷變不盡則豎說無窮不動身衆魔外道不能動故不動即彼一相故文殊般若云不動法界法界即一相由得一相魔不能動具相身示現清淨百福相故至法相究竟悉無相故此具相無相即彼無相身開之成二普至身與三世佛同一身故即彼初二謂入一切世界非趣身及入一切世界諸趣身此合彼開所以開合不同者約位別故此位既勝合初體用同於佛故能於無相以示相故或更有深致非此所知餘如十行辨四結勸是為十若諸菩薩安住此法至如來無上無盡之身五有五十門答五十問明十地位中行相古德分四初十二門明十地中三業殊勝行寄在初地次九門明造修離障行寄二三地次九門明造修純熟行寄在四地已上位後二十門報相圓滿行寄八地九地已上位此釋猶稍近文亦未盡現今亦依次分配十地初地十門次八漸略文勢爾故謂二地六門三四各五門五二六一七八各三九地二門十地十三門至文當知今初十門明歡喜地中行若粗相分總為三段初二約身次四辨語後四明意總顯彼地三業殊勝若順彼文且分為二初九明初住地中行後一明安住地中行前中分四初六門明依何身次心一門辨以何因三發心門明為何義四周遍門顯有何相今初分二前二約身後四就語辨身語屬身故皆是深種善根之所攝故今初分二初約身業用四初標佛子菩薩摩訶薩有十種身業約色身業用明身二徵何等為十三釋所謂一身充滿一切世界至衆生於中成道身業四結勸是為十若諸菩薩安住此法至悉能覺悟一切衆生二約法自體四初標佛子菩薩摩訶薩復有十種身此門約法門自體明身故但云身二徵何等為十三釋所謂諸波羅蜜身至隨樂隨時成正覺故十中度攝福智等即前深種善根集助道等互有影略四結勸是為十若諸菩薩安住此法至如來無上大智慧身二就語辨身業四門皆是所種善根是知彼文雖無義已含有若全異彼豈為彼行若全同彼何須重說故彼經文節節皆云若廣說有不可窮盡小異何疑即分為四初語體用四初標佛子菩薩摩訶薩有十種語二徵何等為十三釋所謂柔軟語使一切衆生至隨其欲樂令解了故若約遮釋十中初一離惡口二離兩舌次二離妄語一粗二細餘六離綺語若約表釋十種各顯一德四結是為十若諸菩薩安住此法則得如來無上微妙語二顯語淨因四初標佛子菩薩摩訶薩有十種淨修語業二徵何等為十三釋所謂樂聽聞如來音聲至菩薩功德淨修語業此二攝法不說一切衆生不樂聞語至語四過失淨修語業此二離過歡喜踊躍讚歎如來至如實功德淨修語業此二攝善以深淨心施衆生法至讚歎如來淨修語業此二法施於諸佛所聽聞正法至而受妙法淨修語業後二求法行由此十事能令語淨四結是為十三淨語之果四初標若菩薩摩訶薩以此十事淨修語業則得十種守護發其言善幽冥應之況其人乎然地經中善知識善護意通由諸善不獨由語故度世經亦不躡前此中標章兩向用之若在前段便當顯益下二準悉二徵何等為十三釋所謂天王為首一切天衆至一切法師皆悉守護四結是為十四能成所作四初標佛子菩薩摩訶薩得此守護已則能成辦十種大事按經即內善外護故能成所作然則地經善集白法善淨深心等餘句中義亦不獨躡於語然皆躡者以語例餘於理無爽二徵何等為十三釋所謂一切衆生皆令歡喜至一切涅槃普令明見十句文意並通二利四結是為十二明以何因四初標佛子菩薩摩訶薩有十種心以大悲為首荷負一切等故二徵何等為十三釋所謂如大地心能持能長一切衆生諸善根故荷負心由如大地荷負四重任故如大海心一切諸佛無量無邊大智法水悉流入故深廣心包含無外故如須彌山王心至於出世間最上善根處故勝心如摩尼寶王心樂欲清淨無雜染故淨心如金剛心決定深入一切法故利心如金剛圍山心諸魔外道不能動故堅心如蓮華心一切世法不能染故無染心如優曇鉢華心一切劫中難值遇故希有心如淨日心破暗障故智慧心如虗空心不可量故無邊心此十並語心體也四結勸是為十若諸菩薩安住其中至無上大清淨心三明為何義四初標佛子菩薩摩訶薩有十種發心為上求下化故發起勝用二徵何等為十三釋所謂發我當度脫一切衆生心至悉得悟解心四結勸是為十若諸菩薩安住其中至無上大發起能事心四顯有何相四初標佛子菩薩摩訶薩有十種周遍心以過凡夫地入真如法中故二徵何等為十三釋所謂周遍一切虗空心發意廣大故總明悲廣智大曠若虗空周遍一切法界心深入無邊故智契深極周遍一切三世心一念悉知故至一念普現成佛故餘八可知四結勸是為十若諸菩薩安住其中至無上佛法周遍莊嚴二即安住地中行四初標佛子菩薩摩訶薩有十種根由前初住之行令此勝用增上皆光顯故名之為根二徵何等為十三釋所謂歡喜根見一切佛信不壞故上一信成就次六修行成就希望根所聞佛法皆悟解故樂欲根即近友樂法多聞能正觀故不退根一切作事皆究竟故不退者即不著名利於三昧中亦無愛著及貪求故安住根不斷一切菩薩行故安住者萬行念念現在前故微細根入般若波羅蜜至究竟一切衆生事故此二悲智不斷上皆教道如金剛根證知一切諸法性故即證道之修後三即回向成就金剛光𦦨根普照一切佛境界故總求一切地智故即金剛智照徹法性故無差別根一切如來同一身故別求法身無礙際根深入如來十種力故求功德身謂十力等四結勸是為十若諸菩薩安住其中至無上大智圓滿根二有六門明第二地中行初二明發起淨初門自分直明深心四初標佛子菩薩摩訶薩有十種深心晉經及論皆名直心者然深心有二義一於法殷重名深即樂修善行二契理名深深入理故若語直心但有後之一義正念真如法故今文具二二徵何等為十三釋所謂不染一切世間法深心由契理不雜一切二乘道深心由修行了達一切佛菩提深心至具足一切微細智深心此七廣上契理修一切諸佛法深心此一顯前修行四結勸是為十若諸菩薩安住其中至無上清淨深心二勝進加以增上四初標佛子菩薩摩訶薩有十種增上深心即勝進上求增殷重故二徵何等為十三釋所謂不退轉增上深心積集一切善根故樂修善行離疑惑增上深心解一切如來密語故標契理次三成上離疑正持增上深心大願大行所流故出所因最勝增上深心深入一切佛法故彰所入為主增上深心一切佛法自在故成德自在後五成上積集善根廣大增上深心普入種種法門至成熟一切衆生故四結勸是為十若諸菩薩安住此法至無上清淨增上深心二有四門自體淨中行彼約別地之行但明於戒而有三聚今文分二初攝善律儀四初標佛子菩薩摩訶薩有十種勤修通修十度即攝善法戒律儀亦在其中以地相望是修位之首故特名勤修晉經名方便方便修起故二徵何等為十三釋所謂布施勤修悉捨一切至轉至一切衆生心故四結勸是為十若諸菩薩安住此法至無上大智慧勤修二有三門饒益有情戒中行初解諸善四初標佛子菩薩摩訶薩有十種決定解此門總顯智於諸善決起勝解地經約戒但解十善晉經名樂修由有決解故樂修習二徵何等為十三釋所謂最上決定解至隨意隨時成佛故四結勸是為十若諸菩薩安住此法則得如來無上決定解二解世界四初標佛子菩薩摩訶薩有十種決定解知諸世界二徵何等為十三釋所謂知一切世界入一世界至各別了知心生歡喜四結勸是為十若諸菩薩安住此法至佛剎廣大決定解三解衆生四標初佛子菩薩摩訶薩有十種決定解知衆生界二徵何等為十三釋所謂知一切衆生界至寂靜威儀開悟衆生四結勸是為十若諸菩薩安住此法至無上大威力決定解此下入五十七經三有五門明三地中行分二前二門明能起厭行二初熏習成氣四初標佛子菩薩摩訶薩有十種習氣由此地中厭伏煩惱故於諸行積習熏成氣分方能究竟斷伏煩惱故名習氣二徵何等為十三釋所謂菩提心習氣行本善根習氣成行教化衆生習氣下化見佛習氣上見於清淨世界受生習氣受生行習氣大行願習氣十願波羅蜜習氣十度思惟平等法習氣理智種種境界差別習氣量智四結勸是為十若諸菩薩安住此法至大智習氣非習氣智二增盛攝取四初標佛子菩薩摩訶薩有十種取以此不斷諸菩薩行晉經中名熾然由前積習愛樂得增長故二徵何等為十三釋所謂取一切衆生界至悉以明智而現了故四結勸是為十若諸菩薩安住此取至如來無上無所取法三有三門明所起厭行初正顯修行四初標佛子菩薩摩訶薩有十種修二徵何等為十三釋所謂修諸波羅蜜修學修慧至修示現修勤行匪懈前八修因後二修果修成等正覺修轉正法輪四結勸是為十若諸菩薩安住其中則得無上修修一切法二修成勝緣四初標佛子菩薩摩訶薩有十種成就佛法依託此十能成就故二徵何等為十三釋所謂不離善知識成就佛法至十力境界成就佛法四結勸是為十若諸菩薩安住此法至如來無上大智慧三明修行離過四初標佛子菩薩摩訶薩有十種退失佛法應當遠離別舉十過總令遠離二徵何等為十三釋所謂輕慢善知識退失佛法至恨諸菩薩退失佛法四結勸是為十若諸菩薩遠離此法則入菩薩離生道四有五門明四地中行分三初門明清淨對治修行增長因四初標佛子菩薩摩訶薩有十種離生道前三地寄同世間有見等惑猶如生食在腹四地寄同出世對治清淨能離彼生謂離有行得無生故顯行純熟離生澀故廣如婆沙今是彼清淨對治之因故名為道地經有十法明門初是觀察衆生今但廣斯一句餘略不具結云不雜二乘者以於下句雙行而修故不同二乘見道離生矣二徵何等為十三釋所謂出生般若至而不捨菩薩一切願行是為十四結勸佛子是為菩薩摩訶薩十種至則得菩薩決定法二明其清淨四初標佛子菩薩摩訶薩有十種決定法上明能離今顯所得出世決定法故故彼文云得彼內法生如來家二徵何等為十三釋所謂決定於如來種族中至決定得預如來衆會前五自分後五勝進決定能顯如來種性至與一切如來所住無有二四結是為十三有三門明對治修行增長分二先二門明修行增長初門正明增長四初標佛子菩薩摩訶薩有十種出生佛法道從緣出生即增長義亦猶出息增長其多二徵何等為十三釋所謂隨順善友是出生佛法道至知佛自在故上二順人信法發大誓願是出生佛法道至知業不失故此二願智不虗一切劫修行無厭足是出生佛法道至成熟衆生故此二時處廣長不斷菩薩行是出生佛法道至遍一切虗空界故此二無間普遍殊勝行是出生佛法道至以一切善法資持故後二勝行攝生四結勸是為十若諸菩薩安住此法則得大丈夫名號二顯立殊勝之名四初標佛子菩薩摩訶薩有十種大丈夫名號由德行內增故嘉名外立二徵何等為十三釋所謂名為菩提薩埵至名為勝薩埵覺悟勝法故上四從境立名名為最勝薩埵至名為上薩埵起上精進故此二約當體受名上皆自利名為無上薩埵至名為力薩埵廣知十力故此二利他名為無等薩埵世間無比故通顯勝具二利故上皆自分因名名為不思議薩埵一念成佛故後一勝進果稱上皆隨德立假名故瑜伽四十六明菩薩隨德假名有十六種初名菩提薩埵十六名為法師顯揚第八莊嚴論十二皆同此說又商主天子經五義立名恐繁不會四結勸是為十若諸菩薩得此名號則成就菩薩道二修行對治四初標佛子菩薩摩訶薩有十種道地經寄位廣明三十七品今約實位故增數顯十皆為對治並是正道二徵何等為十三釋所謂一道是菩薩道至出生智慧及方便故上二并後一名義皆不共三道是菩薩道行空無相無願不著三界故三道則名義俱共次六名共小乘義唯實教四行是菩薩道至善能分別智慧境界故定根知三昧入出六通是菩薩道至知諸衆生死此生彼故天眼通見死此生彼天耳悉聞諸佛說法至普及一切無間斷故於六念上加念衆生為大悲故亦是廣七覺中一念覺故餘例此知隨順菩提八聖道是菩薩道八正思惟順一切智所謂行正見道至入九次第定是菩薩道九次第定皆寂用雙行所謂離欲恚害而以一切語業說法無礙初禪離欲恚害而逆化衆生亦用欲等言說故云一切語業滅除覺觀而以一切知覺觀教化衆生二禪雖無覺觀不壞淨覺以為說因捨離喜愛而見一切佛心大歡喜三禪離喜而生法喜離世間樂而隨順出世菩薩道樂四禪離樂而受解脫道樂從此不動入無色定而亦不捨欲色受生明四無色定但總相顯勝雖住滅一切想受定而亦不息菩薩行故即滅盡定此定雖盡滅諸不恆行心心所法及滅恆行染汙一分而以厭患想受為先故名滅想受定由非粗想猶有細想是捨受故今實教明即受等性滅故不息菩薩行是以七地云能念念入亦念念起等餘如三地及七地中辨學佛十力是菩薩道至而不捨離諸菩薩行六遍一切下是一切至處道智八是天眼九是宿命今三世悉知況乎宿命餘如初會中辨四結勸是為十若諸菩薩安住此法至如來無上巧方便道
