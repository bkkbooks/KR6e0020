body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經四正顯發心本事文類初發心身德時此會中有長者女名寶光明有中殊勝行空中方便慧皆寶光義矣與六十童女俱端正殊妙至常見諸佛求一切智二正發大心時寶光明女去王不遠至隨所生處皆隨往生同王心故三王發攝言爾時大王知此童女至令諸衆生普得滿足四女讚王德初標心淨時寶光明女信心清淨生大歡喜二發口言五十二偈分之為二初總顯王德四初明王未興時損即以偈頌而讚王言往昔此城邑大王未出時至望之如曠野二有二偈明王興世之益大王升寶位廣濟諸羣生至惸獨悉安隱三有十偈翻損成德即翻十惡往昔諸衆生各各相殘害至悉從因緣起四有七偈明依正難思大王演妙音聞者皆欣樂至回向佛菩提二顯王本生四初明先王世末王父淨光明王母蓮華光至草樹皆枯槁二八偈明王興先相王生七日前先現靈瑞相至如渴飲美水三有七偈正顯誕生時彼光明王眷屬無量衆至汝子應欣慶四有八偈生後之益寶藏皆涌出寶樹生妙衣至一切悉安樂三展身敬爾時寶光明童女至曲躬恭敬却住一面五大王述讚時彼大王告童女言至亦當成就如是功德六施行攝持王讚女已以無價寶衣至如淨夜天星宿莊嚴二結會古今善男子爾時一切法音至處於種種妙法宮殿一偈頌但是總相顯己能知文二初九明能知爾時開敷一切樹華主夜神至而說頌言我有廣大眼普見於十方至衆生度多少後有一偈結勸我於無量劫修習此法門我今為汝說佛子汝應學四謙己推勝善男子我唯知此菩薩至能知能說彼功德行五指示後友善男子此道場中至大願精進力救護一切衆生無功用道住大願風普救護故汝詣彼問菩薩云何至云何修行一切佛法六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去已下入第七十三經八大願精進力夜神寄不動地六初依教趣求爾時善財童子至救護一切衆生夜神所略無念法亦表無功離念故二見敬咨問然亦含二意若約顯說則自此盡偈皆第二段至夜神答言下方屬第三授己法界若約密授則此現勝用已為授己法界善財發同善友心便已得益義雖通二為欲順文且依前判就文分三初見勝用二初總見所依見彼夜神在大衆中至摩尼寶網彌覆其上二別顯身相有二十四身現日月星宿影像身至現常游虗空利益身上十即應機攝化身現一切佛所頂禮身至現法燈普滅世暗身此六是應法成行身現了法如幻淨智身至現本清淨法性身並是離障契理身多隨內德顯身差別見身了心二設敬證入四初設敬陳禮時善財童子見如是等至良久乃起合掌瞻仰二發增勝心於善知識生十種心至得一切佛法故是為十三深證懸同有三謂標釋結今初標發是心已得彼夜神與諸菩薩佛剎微塵數同行由前起同己等十心故得同善友等行通論同有四義一人法無二與一切法界同二因果無二與一切諸佛同三自他無二與一切菩薩同四染淨無二與一切衆生同今云得彼夜神與諸菩薩同菩薩行則正是第三義兼餘三由見初故則不殊餘二方為究竟之同良以八地證無生理自他相作皆無礙故偏此明同故下列中有無生忍二列釋所謂同念心常憶念至成就如來十力智故八十四同各有標名釋義文相自顯三總結時善財童子觀察大願至佛剎微塵數同菩薩行四以偈慶讚三初有八偈頌前發增勝心既獲此已心轉清淨至一心合掌以偈讚曰我發堅固意志求無上覺至圓滿白淨法次第頌前十句初之六偈各頌一句第七偈中上之三句頌第七句下句頌第八第八偈中上半頌第九下半頌第十二有一偈頌前深證懸同我以此等故功德悉具足普為諸衆生說一切智道三有一偈荷恩深重聖者為我師與我無上法無量無數劫不能報其恩三咨問法要爾時善財說此偈已至得阿耨多羅三藐三菩提前來已覩解脫之用是故不問云何修行但直徵名文有三問三授己法界前即默授今方言授於中有二初答名問後答發心久近所以不答成菩提者有二意故一顯悲增如休捨說二顯久成示居因位故下所救千佛尚已久成況能救耶前中二初標名夜神告言善男子此解脫門名教化衆生令生善根謂現身廣化令生諸善究竟得佛故名為根二顯其業用謂契理之用故用而無涯動寂無二於中有三初明內契理事我以成就此解脫故至性皆不實無有差別二大用無涯而恆示現無量色身所謂種種色身約其類別非一色身非一約一類而多下可思準無邊色身清淨色身至現普賢菩薩像色身略顯九十八種色身并初後標結即成百身起信等論明八地當色自在地故此廣辨色身三總結深廣四初結所作之業念念中現如是等色相身至捨不善業住於善行二結能現因善男子當知此由大願力故至大慈力故作如是事三雙結寂用無礙善男子我入此解脫至而能示現無量色身四結成深廣一一身現無量色相海至三藐三菩提得不退轉二答發心久近二初歎深許說三初牒問許說善男子如汝所問至承佛神力當為汝說二歎法甚深二初法說善男子菩薩智輪至如是諸劫分別顯示上標下釋先正釋何以故菩薩智論本性清淨本性約理離一切分別網離分別約智超一切障礙山超障約所斷後釋妨隨所應化而普照故既無長短今說長短者為利生故欲長則長顯法根深欲短則短顯法超勝二喻顯有五初皎日隨時喻善男子譬如日輪無有晝夜但出時名晝沒時名夜謂日體恆明映山出沒喻智無三世心障見殊菩薩智輪亦復如是至言其止住前劫後劫二日輪現影喻善男子譬如日輪至而彼淨日不來至此謂白日無來隨處隱顯喻智輪常寂機見短長菩薩智輪亦復如是至現衆生前教化調伏三虗舟運物喻佛子譬如船師常以大船至而度衆生無有休息喻於菩薩無住攝生菩薩摩訶薩亦復如是至未曾分別劫數長短四太虗無礙喻佛子如太虗空一切世界至盡未來劫持一切剎喻於菩薩無功益物菩薩摩訶薩亦復如是至而無憂喜疲厭之心五幻化無真喻善男子如幻化人至憂喜生死十種之事喻即用而寂菩薩摩訶薩亦復如是至無取無捨無安無怖然上諸夜神歎深皆倣斯法喻三結承力為說佛子菩薩智慧雖復如是至滿足大願成就諸力二正答所問先長行文三初善光劫中行因得法二初明最初佛所修證三初古佛出興佛子乃往古世過世界海至已成熟者演說正法二先王治化是時國王名曰勝光至調伏彼故造立囹圄囹圄者周之獄名枷鎖禁閉無量衆生於中受苦三夜神修因三初在家本事十初悲救罪人正答發心之始王有太子名為善伏至或以煙熏或被榜笞榜笞捶擊也或遭臏割臏謂刖足之流倮形亂髮飢渴羸瘦至願垂寬宥施以無畏二臣議非理時王即集五百大臣至有哀救者罪亦至死三請代囚命時彼太子悲心轉切至應捨身命而濟之四臣執令誅時諸大臣共詣王所至不責治者王之寶祚祚即位也易云聖人之大寶曰位亦不久立王聞此言赫然大怒令誅太子及諸罪人五王后哀祈王后聞之愁憂號哭至唯願大王赦太子命六王奪子志王即回顧語太子言莫救罪人若救罪人必當殺汝七太子確救爾時太子為欲專求至身當受戮王言隨意八母請修因爾時王后白言大王至然後治罪王即聽許九正設施場時都城北有一大園至隨有所求靡不周給十如來親救六初就戮時臨經半月已於最後日至及諸外道悉來集會二如來降德時法輪音虗空燈王至一心瞻仰來入彼會三敬神禮請爾時太子及諸大衆至攝受於我處于此座四就座談經以佛神力淨居諸天至令諸衆生隨類各解普照因輪者謂令知善惡各自有因罪人惡因所招太子善因當滿故五廣益當機時彼會中有八十那由他至免離惡趣生於天上六太子得法善伏太子即於此時至令生善根解脫門
