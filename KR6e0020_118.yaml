body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經五有四喻攝五地德善男子如海島中至非業惑等能變其心入塵利人不染俗故善男子譬如小火至而其心燈無減無盡六有六喻攝六地德善男子譬如一燈至種種暗障悉能除盡般若現前頓被暗故善男子譬如燈炷至終不住於二乘解脫七有五句攝七地德善男子譬如迦陵頻伽鳥至凡夫二乘悉不能及善入方便得自在故八有十四喻攝八地德善男子如人學射至一切見欲無明鉤鎖無功發心能滅相惑等故善男子如有礠石至摧伏一切諸魔外道九有十喻攝九地德善男子譬如有人至心無疲厭亦無染著延壽益生等故善男子譬如有人至無智不信謂為不淨十有六喻攝十地德善男子譬如有藥至諸煩惱病悉得除滅謂除惑習成一切佛法故善男子譬如有人至扶踈蔭映普覆世間五有十七喻攝等覺位功德善男子譬如金剛至一切餘心所不能持四結釋所屬善男子菩提心者至已得如是大功德故謂上來多德釋獲善利之言故二正授法界四初授法體四初攝入方便二初牒問勸證善男子如汝所問至學已成就無量功德此下入第七十九經二求證方便爾時善財童子恭敬右繞至開樓閣門令我得入二加令證入時彌勒菩薩前詣樓閣至其門即開命善財入先約緣加令其就法亡言會旨則佛法門開故云前詣等即開理智之門示令悟入也善財心喜入已還閉後約因自證悟佛知見則入法界從迷之悟加行趣入有門理之殊證已契合能所兩亡即妄而真更無入處故云還閉三見所證境二初別明所見二總顯見相前中有六一見依報二見正報三見伴菩薩四見諸佛五見閣中主閣六總見嚴具作用此之六段皆悲智之中所有前中分二初見後益前中有三初直見一重莊嚴見其樓閣廣博無量同於虗空同虗空者稱法性故上標下列阿僧祇寶以為其地至阿僧祇摩尼寶放大光明後結如是等無量阿僧祇諸莊嚴具以為莊嚴二依中有依又見其中有無量百千至不相障礙亦無雜亂一中見多即微細門亦主伴門三一多自在善財童子於一處中見一切處一切諸處悉如是見一處見多即自在門二明得益爾時善財童子見毗盧遮那至普見一切普申敬禮二見正報二初總標才始稽首以彌勒菩薩至不可思議自在境界二別顯五初見發心時所謂或見彌勒菩薩至親近供養悉皆明見二見其修行得法時或見彌勒最初證得至受於無上菩提之記三隨類攝生時或見彌勒為轉輪王至種種方便調伏衆生四見處會説法二初所處會殊或復見為護世天王至諸菩薩衆而演説法二顯所説之法或見讚説初地乃至至讚説一切佛灌頂門五總見行用或見彌勒於百千年至以方便力現諸神變三見伴菩薩身雲演説或見諸菩薩入變化三昧至如是等一切諸功德門即前與無量眷屬四見諸佛攝化之德或復於中見諸如來至種種不同悉皆明見五見閣中主閣別明慈氏一生當作於中有二初見又復於彼莊嚴藏內至住持教法皆悉不同二得益爾時善財自見其身至憶持不忘通達無礙六見聞嚴具作用神變於中十段初聞網等演法三初近聞復聞一切諸樓閣內至悉聞其音敷暢辨了二遠用又聞某處有某菩薩至教化如是無量衆生三得益善財童子聞如是等至及諸解脫諸三昧門二見寶鏡作用又見一切諸寶鏡中至三時懺悔回向發願三見寶柱放光又見一切諸寶柱中至或作一切諸光明色四見寶像威儀又見彼閻浮檀金童女至曲躬瞻仰目不暫捨五瓔珞等出生又見彼真珠瓔珞至一切皆以衆寶莊嚴六蓮華重現又復見彼優鉢羅華至三十二相莊嚴其身七寶地現像又復見彼淨琉璃地至及諸樓閣莊嚴色像八樹現半身又於寶樹枝葉華果至兜沙羅色光明兜沙羅此云霜氷帝青色光明至瞻波迦華色光明瞻波迦此云黃色九半月現又見諸樓閣半月像中至種種光明普照十方十譬現本事文二初見慈氏修行隨類攝生又見諸樓閣周回四壁至修行諸度一切色像二覩所事友觀喻善財又見彌勒曾所承事至不思議事莫生疲厭二總顯見相二初法爾時善財童子先謂何力能見得不忘失憶念力故次以何眼見得見十方清淨眼故次將何智見得善觀察無礙智故得諸菩薩自在智故次依何位見得諸菩薩已入智地廣大解故次於何處見於一切樓閣一一物中至自在境界諸莊嚴事後結前來所不説境二喻譬如有人於睡夢中至能見如是自在境喻顯見相所以有十喻者所喻別故然有二意一喻能見因緣別故二喻所見境相別故且初意者上一總喻能見所見皆如夢事大小無礙等下九皆別二喻自因力隨自業故亦表善財凡命將終故三四二句並喻緣力龍鬼所持故然鬼持自他不同龍持自他同體五喻友依報力六是定力七喻性空力八喻法界自在力九喻智定無二之力大智海印之三昧故十幻智自在力次約所喻境相別者亦初總餘別譬如有人將欲命終至得見一切莊嚴境界臨命現業喻喻所見冥應譬如有人為鬼所持至若有問者靡不能答非人所持喻喻所見能説譬如有人為龍所持至於少時間謂無量劫龍宮淹久喻喻念劫圓融譬如梵宮名莊嚴藏至種種差別不相雜亂梵宮廣現喻喻一多無礙譬如比丘入遍處定至一切境界悉皆明了遍處定境喻喻所見明了譬如有人於虗空中至悉分別知無有障礙乾城依空喻喻事理無礙譬如夜叉宮殿與人宮殿至各隨其業所見不同同處異見喻喻隱顯自在譬如大海於中悉見三千世界一切色像海現三千喻喻頓見近遠譬如幻師以幻力故至一切莊嚴自在境界幻現衆多喻喻所見純雜無礙
