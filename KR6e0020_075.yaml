body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經諸菩薩住處品第三十二初來意者上約化益盡一切時今明菩薩遍一切處故次來也故僧祇中明法界毛端之處皆有多多普賢此則據實而談今約機緣所宜指有方所使物欣厭翹心有歸若知能住菩薩毛含剎海所住之處塵納無邊則未有一方非菩薩住亦遠答前壽量海問菩薩隨機住壽異故昔將此品遠答第二會初問意十句非唯義意不同抑亦文不相次二釋名者菩薩大悲隨機住處能住非一故名曰諸諸菩薩之住處故以為名三宗趣者隨機應感方所為宗使物歸憑及悟無方以為其趣次正釋文分二初集經者敘爾時心王菩薩摩訶薩於衆會中告諸菩薩言亦心王説者隨所統王皆自在故亦表心隨智住無障礙故二正説住處有二十二處前十依八方山海以上下二方非凡能至故不明之山海包藏仁智棲止表大智高深故能止能照故後十二處城邑雜居曲盡物機表大悲無遺故則知菩薩無不在矣今初第六是海中之山第十海中之窟餘皆是山文十初仙人山佛子東方有處名仙人山至常在其中而演説法仙人山者相傳是東海蓬萊山若爾則亦兼海二勝峯山南方有處名勝峯山至常在其中而演説法勝峯即德雲所住晉本名樓閣山即婆施羅所住三金剛𦦨山西方有處名金剛𦦨山至常在其中而演説法金剛𦦨在西海之濵四香積山北方有處名香積山至常在其中而演説法香積山昔云應是雪北香山五清涼山東北方有處名清涼山至常在其中而演説法清涼山即代州鴈門郡五臺山也於中現有清涼寺以歲積堅冰夏仍飛雪曾無炎暑故曰清涼五峯聳出頂無林木有如壘土之臺故曰五臺表我大聖五智已圓五眼已淨總五部之真祕洞五陰之真源故首戴五佛之冠頂分五方之髻運五乘之要清五濁之災矣然但云東北方者其言猶漫按寶藏陀羅尼經云我滅度後於贍部洲東北方有國名大振那其國有山號為五頂文殊師利童子遊行居住為諸菩薩衆於中説法及與無量無數藥叉羅剎緊那羅摩睺羅伽人非人等供養恭敬斯言審矣其山靈迹備諸傳記余幼尋茲典每至斯文皆掩卷長歎遂不遠萬里委命棲託聖境相誘十載于茲其感應昭著盈于耳目及夫夏景勝事尤多歷歷龍宮夜開千月纖纖細草朝間百華或萬聖羅空或五雲凝岫圓光映乎山翠瑞鳥翥于煙霄唯聞大聖之名無復人間之慮入聖境者接武革凡心者架肩相視互謂非凡觸目皆為佛事其山勢寺宇難以盡言自大師晦迹於西天妙德揚輝於東夏雖法身長在而雞山空掩於荒榛應現有方鷲嶺得名於茲土神僧顯彰於靈境宣公上稟於諸天漢明肇啓於崇基魏帝中孚於至化北齊數州以傾俸有唐九帝之回光五天殉命以奔風八表亡軀而競託其有居神州而一生不到亦奚異舍衛三億之徒哉願皆修敬六金剛山海中有處名金剛山至常在其中而演説法金剛山謂東海近東有山名之為金剛雖非全體是金而上下四周乃至山間流水砂中皆悉有金遠望即謂全體是金又海東人自古相傳此山往往有聖人出現然晉本此處當其第九以與第十莊嚴窟俱在海中故而今居此者意是八方之內東北方攝故若不然者何以正説八方忽然語海又晉本海中有二住處一名枳怛那現有菩薩名曇無竭有萬二千菩薩眷屬言枳怛者具云昵枳多此云踊出金剛語體踊出語狀曇無竭者此云法生亦云法勇亦云法尚今言法起與生勇義同即常啼之友也菩薩眷屬十倍今經或前譯之誤七支提山東南方有處名支提山至常在其中而演説法支提山者此云生淨信之所有舍利者為塔無舍利曰支提或山形似塔或彼有支提故以為名昔云既指清涼為東北則東南影響吳越然吳越靈山雖衆取其形似者天台之南赤城山也直聳雲際赩若霞起巖樹相映分成數重其間有白道猷之遺蹤或即當之矣然劒川有三學山中有歡喜王菩薩屢持燈而出名雖不同而天竺望之即是東南亦有見其持寶冠者則密示其名也希後賢以審之八光明山西南方有處名光明山至常在其中而演説法光明山昔云應是與補怛洛迦山相連以晉譯觀音住山為光明今文非觀音住處而云光明故言連也九香風山西北方有處名香風山至常在其中而演説法香風山疑是香山西畔十莊嚴窟大海之中復有住處至諸菩薩衆於中止住對上第六海中故云復有晉本云二名功德莊嚴窟後十二處城邑雜居初毗舍離毗舍離南有一住處至諸菩薩衆於中止住毗舍離者即毗耶離此云廣嚴城亦曰廣博即是中印度淨名所居之城言南者按西域記第七云此城南十四五里有塔是七百賢聖重結集處更南八九十里有僧伽藍其側有過去四佛座及經行遺迹之處應是其所晉本第二更有一處名巴連弗邑有處名金燈僧伽藍昔云具言波吒補怛囉此云黃華子即黃華女之子創居此處亦中天摩伽陀國具如西域記第八今經闕此一處二摩度羅城摩度羅城有一住處至諸菩薩衆於中止住云摩度羅者亦曰摩偷羅此云孔亦云密蓋並是古世因事為名亦中印度言滿足窟者彼國有舍利弗等塔及文殊師利塔於王城西五六里有山寺是烏波毱多所造寺北有巖中間有石窟是毱多度人安籌之所具如西域記第四説安籌雖是後事多是安聖窟中三俱珍那俱珍那城有一住處至諸菩薩衆於中止住俱珍那者具云俱陳那耶俱珍姓也此云大盆那耶法律也謂池形如大盆往昔有仙於側修法律後人以此為姓因為城名四清淨彼岸清淨彼岸城有一住處至諸菩薩衆於中止住清淨彼岸城是南印度目真此云解脫即龍之名鄰陀云處即龍所居處五摩蘭陀國摩蘭陀國有一住處至諸菩薩衆於中止住摩蘭陀國未詳所在晉經無國但云風地謂有風孔處即龍所居六甘菩遮國甘菩遮國有一住處至諸菩薩衆於中止住甘菩遮國正云紺蒲即是果名其果赤白圓滿乍似此方林檎而復三約橫文此國多端正女人頸似紺蒲三約文成以女名國出生慈者大集經中但名慈窟七震旦國震旦國有一住處至諸菩薩衆於中止住震旦國即此大唐亦云真丹或云支那皆梵音楚夏此云多思惟以情慮多端故前為成八方故清涼直云東北今在諸國之類故舉國名那羅延者此云堅固昔云即青州界有東牢山現有古佛聖迹此應是也然牢山乃是登州亦青州分野其山靈迹亦多然今之到此山者在蔚州界靈迹顯著不減清涼時人稱謂普賢所居往往有覩彼亦有五臺南臺有窟難究其底時稱那羅延窟或即是此八疏勒國疏勒國有一住處至諸菩薩衆於中止住疏勒國具云佉路數怛勒是彼國山名因山立號或翻為惡性因國人以立名然牛頭山在今于闐國此云地乳佛滅百年方立此國具如西域記以集經之時未開尚屬疏勒故耳晉本但云邊國故或指江表牛頭今譯既明定非此也九迦葉彌羅迦葉彌羅國有一住處至諸菩薩衆於中止住迦葉彌羅晉譯為罽賓此翻為阿誰入即末田地乞地之所略如音義廣出西域記第三十增長歡喜城增長歡喜城有一住處至諸菩薩衆於中止住增長歡喜城古釋云即南印度尊者窟者即上座部所居之所十一菴浮梨摩菴浮梨摩國有一住處至諸菩薩衆於中止住菴浮梨摩此云無垢即是果名此國豐而且勝故以為名在中印度境十二乾陀羅國乾陀羅國有一住處至諸菩薩衆於中止住乾陀羅國此云持地多得道果者護持不為他國侵害故或云香遍遍國香草先發生故苫婆羅者是香華樹名與初品苫末羅梵言輕重耳遍窟側近多生此故相傳云是佛留影之所具如西域記及大集月藏分第十此品之終都無結束或是經來不盡閻浮既爾餘界異類界等可以倣之法界身雲則無在無不在矣自下入第四十六卷經佛不思議法品第三十三初明來意先通後別通則此下五品為答第二會初如來地等十句問故古德但有三品答前謂前明修生之因今辨修生之果因圓果滿故次來也若答前問何以重請由因果隔絶念法希聞因德尚深果必玄妙故念請耳別明此品則前品因終此品果始故次來也二釋名者如來果法回超言慮故以為名斯即佛之不思議法也三宗趣先總後別總明説佛果德體用心言罔及而為其宗令諸物情亡言絶想速滿為趣別就宗中三門分別一通辨佛德若説百四十不共佛法通於權小若五法攝大覺性猶通於權若言唯一味實德者約理頓説若言具足無盡德者是此所明故後文中初標十問答具多門類通十方一一無盡二別顯義相諸佛功德不出二種一者修生二者本有初謂信等本無今有後謂真如具性功德此二無礙應成四句一唯修生二唯本有以性相區分故三本有修生謂如來藏待彼了因本隱今顯故四修生本有無分別智冥符理故若權教所明二德不雜法報四句亦有差殊依此經宗雖有四義而無四事本有如真金修生如嚴具然由嚴具方顯金德嚴具無體全攬金成故唯金不礙嚴具唯法身而不礙報化唯嚴具亦然既互全收故十身無礙八相該於法界丈六遍於十方諸根毛孔各無限量亦不礙量量與無量無有障礙三顯不思議之義泛明有四一理妙難測二事廣難知三行深越世四果用超情今文通四正辨後一就後一中復開為四一何者不思議略辨十種一智超世表二悲越常情三無思成事四同染恆淨五所作祕密六業用廣大七多少即入八分圓自在九依正無礙十理事一味文並具之恐繁不引二於何不思議此有四位一過世間二越權小三超因位四顯法體三云何不思議亦有四種謂非聞思修及報智境四何用不思議亦有四種謂令信向故起行求故隨分證故圓滿得故前三是宗唯取第四何用為越即此宗趣可以釋名次正釋文五品分二初之一品總明佛德後之四品別顯佛德古德將後二品為平等因果此但三品今依賢首初品總顯佛德體用次品別顯勝德之相後品別明勝德益用又初品明德次品明相後品明好今初分四初請分二初明請人爾時大會中有諸菩薩作是念二正顯所念諸佛國土云何不思議至諸佛解脫云何不思議十法皆云不思議者即前果用超情離於説相故此十句義並多含皆通真應不得一向就應而辨然此十問攝前普光後二十句所成果問謂身攝六根智攝佛境佛地及最勝三問自在攝五一神力曰神通三十力四無畏五三昧此並前開此合前境界中開出國土所化所依之境故前所行中開出出現本願種性種性即是悲智之行本願唯就因辨行故出現是佛普賢行故出現與行互有寬狹下出現品行是其一故前之無礙此開解脫作用無礙名解脫故所以開合者顯義無方故名多同者顯不異故音聲即辨才雖無開合名有寬狹義旨大同此十義相第二會中已曾解釋至下説分文中重明二加分三初加因爾時世尊知諸菩薩心之所念神知機故二顯加相則以神力加持三業加故上句為總下三句別智慧攝受光明照耀威勢充滿謂意語身以光照者即教光故三加所為令青蓮華藏菩薩為具説德故文有八句住佛無畏外制無畏入佛法界內證深寂此意業勝獲佛威德威德內充神通自在神用外徹此身業勝得佛無礙具四無礙是語業勝廣大觀察遍觀機教為廣大知一切佛種性次第知性無差是為次第住不可説佛法方便授記善巧是為方便皆説德也所以加青蓮華藏者果德離言藉因顯故因果同時故性德無染最超勝故一德具含一切德故三證分十句爾時青蓮華藏菩薩至則能知見一切佛法上四自利下三利他以大悲心觀察衆生至受行一切諸菩薩法上皆自分後三勝進於一念中出生佛智至總持辨才皆悉具足四説分二初承力總告承佛神力告蓮華藏菩薩言告蓮華藏者非同佛心無以受佛之德故亦名蓮華不言青者不礙能説為最超勝故二正顯佛德略有二義一總下五品共答十問此之一品答佛種性佛以功德為種性故次有二品答於佛身次一品答本願後一品答出現其國土問初會已廣餘或經來未盡或前後攝之二者此品具答十問謂佛德無量略顯三十二門門皆具十則有三百二十種德以顯無盡昔以初十標宗略答具答十問所餘唯有別答而超次答前十問今謂三十二門如次答前十句問故而門門中皆含答十欲顯佛德一具一切亦顯所問包含廣故而標門名多不同前者為顯佛德無邊際故文分為十初之二門答國土問次二門答本願問三二門答種性問四二門答出現問五五門答佛身問六二門答音聲問七三門答智慧問八八門答自在問九三門答無礙問十有三門答解脫問以身及自在含前普光諸問多故用門亦多而文多有三謂標釋結其中義相至文當顯今初二門答國土問者國土即是所依所住即分為二初門明其常住法門後門明其遍住法界不唯國土不在方所為真土也今初文二初標佛子諸佛世尊有無量住二釋相所謂文有九句顯於如來應機説法含答十問則知十問皆成住處下皆倣之常住大悲起應之心答種性問悲為種性故住種種身作諸佛事演法之身答佛身問住平等意轉淨法輪轉法之意答本願問本願平等利一切故住四辨才説無量法能轉之辨答音聲問音出辨故住不思議一切佛法所轉之法答自在問自在不思議故住清淨音遍無量土轉音周遍答國土國土是音所至故住不可説甚深法界所顯之理答智慧智慧能住法界故住現一切最勝神通能化之通答神通問住能開示無有障礙究竟之法演法之益答無礙問文唯九句脫於出現或通諸句出現皆能作前九故答此品中十問既爾答初二會類例可知二普遍法界明其遍住謂六根三業遍法界土文分為三初標佛子諸佛世尊有十種法普遍無量無邊法界無量是事法界無邊是理此二無礙及事事無礙法界並為所遍二列釋何等為十所謂一切諸佛至普入諸趣而無染著含答三問一正答身其普遍諸趣是有悲性及出現義一切諸佛有無邊際至住於無礙平等法身次之六句是身別相亦是於身兼答普光眼等六問出妙音聲答音聲問一切諸佛有無邊際無礙解脫示現無盡大神通力答三問謂無礙答第九解脫答第十神通力答自在一切諸佛有無邊際至而於其中不生染著別答國土一切諸佛有無邊際至悉能通達一切佛法答本願及智慧問三結佛子是為如來應正等覺至法界無邊際十種佛法二有二門答本願問二初明乘願現其八相佛子諸佛世尊有十種念念出生智然願以後得智為體從其願智生八相等非生智也上標次徵列結下文倣此何等為十所謂一切諸佛至無量世界從天來下乘願下生一切諸佛於一念中悉能示現無量世界菩薩受生受生種族一切諸佛於一念中悉能示現無量世界出家學道學解脫道一切諸佛於一念中至菩提樹下成等正覺明其出現一切諸佛於一念中至無量世界轉妙法輪音聲一切諸佛於一念中至教化衆生供養諸佛化生嚴國一切諸佛於一念中至不可言説種種佛身現佛身一切諸佛於一念中至如來自在一切智藏自在相嚴福嚴嚴如來藏故一切諸佛於一念中至無量無數清淨衆生是無礙故一切諸佛於一念中至於三世中成等正覺即智慧正遍知故是為十二明願不失時佛子諸佛世尊有十種不失時行止在緣根熟化現本熟便捨非願不周若機熟失時便違本願何等為十所謂一切諸佛成等正覺不失時出現一切諸佛成熟有緣不失時成本願有緣一切諸佛授菩薩記不失時知種性與記一切諸佛隨衆生心示現神力不失時自在一切諸佛隨衆生解示現佛身不失時現身一切諸佛住於大捨不失時智住於捨一切諸佛入諸聚落不失時六根無礙一切諸佛攝諸淨信不失時淨國攝信一切諸佛調惡衆生不失時強音調惡一切諸佛現不思議諸佛神通不失時即不思議解脫是為十三有二門答種性問二初門雙明報化種性皆真正故佛子諸佛世尊有十種無比不思議境界體相超言念故云不思議下位不及故云無比何等為十所謂一切諸佛至遍滿十方無量世界現身一切諸佛説一義句悉能開示一切佛法音聲一切諸佛放一光明悉能遍照一切世界乘願放光如其本願所得光故一切諸佛於一身中悉能示現一切諸身出現一切諸佛於一處中悉能示現一切世界國土一切諸佛於一智中悉能決了一切諸法無所礙智慧一切諸佛於一念中悉能遍往十方世界自在一切諸佛於一念中悉現如來無量威德威德種族一切諸佛於一念中普緣三世佛及衆生心無雜亂無雜之礙一切諸佛於一念中與去來今一切諸佛體同無二解脫體同是為十上之五段皆略指陳兼答十問已下恐繁説者隨宜二唯明法身為種性佛子諸佛世尊能出生十種智從無性中出其智慧非答智慧故何者為十所謂一切諸佛至了生滅智是為十十句句各分二皆上句知性即無性之性為其能生下句即是出生智用四有二門答出現問二初門明遍現常現佛子諸佛世尊有十種普入法非有出沒方為真現何等為十所謂一切諸佛至三種自在普化衆生三種自在即三業化也一切諸佛皆悉具足至一念普現三世諸佛普現三世諸佛況自身耶又一現即一切現以三世佛無二體故如文殊般若中辨一切諸佛皆悉具足至普立三世劫數是為十二明出現之相佛子諸佛世尊有十種難信受廣大法謂大用無涯故云廣大凡小莫測故難信受何等為十所謂一切諸佛至住十力中是為十五有五門答佛身問即分為五初總顯無過佛子諸佛世尊有十種大功德離過清淨如來三業隨智慧行故三業等事不出於身何等為十所謂一切諸佛至離過清淨是為十別中多同出現品身之十相二明過不生佛子諸佛世尊有十種究竟清淨揀異因淨故云究竟惑障諸垢永不起故何等為十所謂一切諸佛至所有眷屬究竟清淨上之五句功德身淨一切諸佛所有種族究竟至色身相好究竟清淨此二色身一切諸佛法身無染究竟清淨法身一切諸佛一切智智無有障礙究竟清淨智身一切諸佛解脫自在所作已辦到於彼岸究竟清淨後一意生等身淨也是為十三身之業用佛子諸佛世尊於一切世界至能遍觀察是為十亦多同出現品身相四智慧相應佛子諸佛世尊有十種無盡智海法至是為十即如來六根三業皆智慧深廣相應故亦是別廣智身問故五業用無斷佛子諸佛世尊有十種常法至無邊際故是為十助佛身中意業恆常用無斷故六有二門答音聲問二初明以音聲辨説兼答普光辨才問佛子諸佛世尊有十種演説無量至是為十二明種種説法佛子諸佛世尊有十種為衆生作佛事謂六塵四大舉動施為皆能顯法成其利益無非佛事非獨音聲如淨名説何等為十所謂一切諸佛至為衆生作佛事上二一身二音一切諸佛有所受為衆生作佛事至為衆生作佛事此二皆智受為成檀故不受令彼倣佛行少欲故又以無所受受諸受故一切諸佛以地水火風為衆生作佛事至是為十七有三門答智慧問初明智慧最勝佛子諸佛世尊有十種最勝法此之一門總明權實因果之智兼答普光最勝之問智慧最勝故結云住十力地兼答佛地之問何等為十所謂一切諸佛大願堅固至是為十四即三念處行餘可思之二明智慧離障佛子諸佛世尊有十種無障礙住以其智慧無礙故一切無礙何等為十所謂一切諸佛皆能往至是為十三智慧成益由內具智嚴故外具諸嚴文三初標佛子諸佛世尊有十種最勝無上莊嚴超下位故所以最勝上無加過故云無上二別中十義結名自顯初相好身何等為十一切諸佛至第一最勝無上身莊嚴二圓滿音一切諸佛皆悉具足至第二最勝無上語莊嚴三以功德嚴意一切諸佛皆具十力至第三最勝無上意莊嚴四放光一切諸佛皆悉能放至第四最勝無上光明莊嚴五微笑一切諸佛現微笑時至最勝無上現微笑莊嚴授菩提記其緣甚衆離世間品亦復重明六法身一切諸佛皆有法身清淨無礙真如出纏故云清淨無礙即法性法身本智反照故於一切法究竟通達住於法界無有邊際即是智慧法身智契法界俱無邊際雖在世間不與世雜應化法身了世實性行出世法功德法身嚴理智故了世實性成上不雜生下出世行出世法則功德備矣言語道斷即虗空法身亦是實相法身體絶百非言亡四句唯證相應故超蘊界處顯是無為翻有漏蘊成五分法身若翻界處則外六塵亦國土身則十身圓融成真法身矣是為諸佛第六最勝無上法身莊嚴七常光一切諸佛皆有無量至最勝無上常妙光明莊嚴八金等妙色一切諸佛皆有無邊妙色上句為總餘五是別可愛妙色清淨妙色至第八最勝無上妙色莊嚴九具真應種一切諸佛皆於三世佛種中生三世佛種即真如無性故應種可知積衆善寶究竟清淨至第九最勝無上種族莊嚴十慈悲一切諸佛以大慈力至無諸渴愛身行永息起必智俱故無渴愛動與道合故身行永息心善解脫成上無愛見者無厭成上行息此皆功德亦無愛見成下大悲大悲救護一切世間第一福田無上受者既為第一福田故受施中更無過上哀愍利益一切衆生至大慈大悲功德莊嚴三結是為十
