body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經初標能管之海以定方即前右繞第六海諸佛子彼蓮華因陀羅網香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名銀蓮華至世界種名現前垂布二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至如來道場衆會音為體二所持之剎亦二十重四初舉下層於此最下方有世界至號金剛月遍照十方二超至第十此上過十佛剎微塵數世界至佛號大精進善覺慧三超至第十三此上與娑婆世界齊等有世界至佛號娑羅王幢四超至第二十此上過七佛剎微塵數世界至威德絶倫無能制伏初標能管之海以定方即前右繞第七海諸佛子彼積集寶香藏香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名一切寶至世界種名諸佛願所流二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至以入一切智門音聲為體二所持之剎亦二十重四初舉下層此中最下方有世界名華蘂𦦨佛號精進施二超至第十此上過十佛剎微塵數世界至一切功德最勝心王三超至第十三此上過三佛剎微塵數世界至善出現無量功德王四超至第二十於此世界種最上方有世界至號廣大善眼淨除疑初標能管之海以定方即前右繞第八海諸佛子彼寶莊嚴香水海外二列所管之海水第三初從能管海邊鄰次列九次有香水海名持須彌至遍照世界種名普吼聲二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至以一切菩薩震吼聲為體二所持之剎亦二十重四初舉下層此中最下方有世界名妙勝藏佛號最勝功德慧二超至第十此上過十佛剎微塵數世界至佛號起勝大光明三超至第十三此上與娑婆世界齊等有世界至佛號須彌燈四超至第二十於此世界種最上方有世界至號無盡變化妙慧雲初標能管之海以定方即前右繞第九海諸佛子彼金剛寶聚香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名崇飾寶埤堄至名普示現國土藏二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至以一切佛力所出音為體二所持之剎亦二十重四初舉下層此中最下方有世界至佛號變化無量塵數光二超至第十此上過十佛剎微塵數世界至佛號無量智三超至第十三此上與娑婆世界齊等至佛號師子眼光𦦨雲四超至第二十於此最上方有世界名海音聲佛號水天光𦦨門初標能管之海以定方即前右繞管十海諸佛子彼天城寶堞香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名𦦨輪赫奕光至名隨佛本願種種形二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至以三世一切佛音聲為體二所持之剎亦二十重四初舉下層此中最下方有香水海名因陀羅華藏從香字至藏字並長由前已説香水海故前諸海中無此例故縱依海無過在文不便前第一海所管中九海闕一今此長者多是梵本脫漏後人注之誤書相似貝葉耳世界名發生歡喜佛剎至佛號堅悟智二超至第十此上過十佛剎微塵數世界至佛號無量歡喜光三超至第十三此上過三佛剎微塵數世界至佛號最清淨不空聞四超至第二十此上過七佛剎微塵數世界至佛號遍法界普照明十海次第但觀次前疏文不俟重舉餘並可知三總略結釋五初總結都數諸佛子如是十不可説佛剎至佛剎微塵數世界種謂一海各管一不可説十海即有十不可説一海一種是以數同二結海種所依皆依現一切菩薩形摩尼王幢莊嚴蓮華住即是前能持剎海本大蓮華彼名種種光明蘂香幢今此乃云現菩薩形等者是此一華隨義異名有此用故與前最中海底名同以中間海底即此大華之體中受總稱故取大華體名或是譯者之誤三結種異門各各莊嚴際無有間斷至一切佛神力所加持此與前釋剎種章及世界成就中十相參大同四結種中之剎此一一世界種中一切世界至遞相接連成世界網一一世界猶如網孔遞相接連如以網持橫豎交絡皆悉相當如天珠網五結歸華藏於華藏莊嚴世界海種種差別周遍建立即建立之處二重頌總有一百一偈分二初華藏自體爾時普賢菩薩欲重宣其義承佛威力而説頌言華藏世界海法界等無別莊嚴極清淨安住於虗空初句標名次句不壞分量即同真性次句具德莊嚴末句無礙安住餘有一百偈頌所持剎網二初九頌能持剎種此世界海中剎種難思議至皆由大仙力初一頌參而不雜次一安布行列次一剎種體嚴次二辨形次一依住次二方所趣入後一佛力加持二頌種所持剎九十一偈多頌結文但一二不同謂體及形餘皆同也文十初有二十八頌明其剎異由乎因緣即是結中各各衆生遍充滿下云種種衆生居故及各各佛力所加持至文當見今初二初半偈標章一切剎種中世界不思議種種多端故曰難思二廣釋難思之相二初喻顯分三初三頌半由染因剎有成壞或成或有壞或有已壞滅至衆生剎不同初一偈半明種則長時剎有成壞次一偈剎種雖一居剎有殊後偈結歸業種二明由淨因譬如心王寶隨心見衆色至國土不思議一淨心因二佛願通因緣後一淨業因三通結染淨因譬如衆繢像畫師之所作至見諸剎亦然一隨心染淨因二分別起業因以正喻依亦是以因喻緣心即是因招異熟果果之粗果妙蓋由業緣三有一偈雙明心業行即業故亦喻衆生同處異見二法説分三初明染淨二初二淨相不同一切諸剎際周布蓮華網至種種衆生居二四對因以辨或有剎土中險惡不平坦至諸佛令清淨初一唯染由煩惱故次二通染淨心業通善惡故屬於菩薩及衆生故後一唯淨以屬佛故二四明成壞一一剎種中劫燒不思議至悉見淨無垢初一粗壞細存壞由業惡存由二因一約佛力二善業者故法華云我淨土不毀天人常充滿然滅雖不俱而起必同處雖曰同處而恆相無故難思也次偈業存處立次偈世相不同性無生滅後偈結歸因緣內由心變則染淨萬差外假佛緣于何不淨三明苦樂文分為三初三總相約剎論苦樂有剎泥土成其體甚堅硬至罪惡者充滿二三約一剎中有三惡趣剎中有地獄衆生苦無救至受諸極重苦三有二偈頌人天樂或有諸剎土七寶所合成至隨時受快樂二有二頌顯剎微細一一毛孔中億剎不思議至受苦樂不同即結中各各普趣入初偈舉果後偈對因以辨三明世界體性有剎衆寶成常放無邊光至而成期妙剎結文即無義見前經亦兼餘義隨釋可知四世界各各莊嚴或見清淨剎以一光莊嚴至普見衆剎海義如結名五各各莊嚴際無間斷諸修普賢願所得清淨土至如影無真實亦如結名攝三世嚴故無間斷結歸佛故一塵普見六明剎形差別或有衆多剎其形如大海至護念得安住義見上文七明剎住時分有剎住一劫或住於十劫至乃至不思議義如結名八有八頌明佛出現或有剎有佛或有剎無佛至調伏衆生海亦如結名九光明有無即各各放寶光明及各各光明雲覆二初一頌無有剎無光明黑暗多恐懼苦觸如刀劒見者自酸毒二九頌有或有諸天光或有宮殿光至法界悉周遍十明剎中音聲善惡即各各演法海文三初有二頌惡道唯惡有剎甚可畏嘷叫大苦聲至恆出憂苦聲二有三偈頌人天通善惡或有國土中常出可樂音至及樂音遍滿三有六偈明佛菩薩善而非惡諸佛圓光內化聲無有盡至一切無不聞正顯各各演説法海辨此下入第十一經毗盧遮那品第六初來意者前明此因之果今辨前果之因答前因問故次來也因是果因故標果稱又不以人取法知是誰因前品初云毗盧遮那曠劫修因之所嚴淨今方顯其事二釋名者略云光明遍照廣如前釋三宗趣者明因廣大為宗證成前果為趣四釋文者一品分三初總明本事之時爾時普賢菩薩復告大衆言至微塵數劫復倍是數即二佛剎塵數劫也二別顯本事之處三初總明剎海有世界海名普門淨光明二別明一剎此世界海中有世界至其劫名曰種種莊嚴略無剎種剎名勝音者多佛出世説法音故次彰剎相後説劫名可知三的指一方如今娑婆中別説一四天下也於中亦三初總明感應之處三初正明香海諸佛子彼勝音世界中有香水海名清淨光明非持種之海即如今四洲之海耳二海出華山其海中有大華須彌山至十寶欄楯周匝圍繞三山頂之林於其山上有一大林名摩尼華枝輪説此林者佛於中現也上標舉下顯嚴無量華樓閣無量寶臺觀至種種衆生於中止住説城居人者總舉所化也二別明能感居人三初標主伴二城諸佛子此林東至百萬億那由他城周匝圍繞雖有天城以佛出故人城為主二釋主城二初顯處嚴清淨妙寶所共成立至衆鳥和鳴聽者歡悅城上守禦曰櫓繞城別築土臺曰却敵優鉢羅等即青黃赤白四色蓮華二彰人勝此大城中所有居人至心有所欲應念皆至三略釋伴城二初顯城名居類其城次南有一天城至百萬億那由他數通前人城共圓八部而無第七緊那羅城及第八摩睺羅伽乃以梵天自為一類下雲集中經文具列已成十數表無窮盡二辨圍繞莊嚴此一一城各有萬億至一一皆有無量莊嚴世界不同安立少異不可例此二別彰道場嚴事二初辨道場嚴諸佛子此寶華枝輪大林至種種妙華周遍十方二辨蓮華香海為佛現故其道場前有一大海至恆出妙音周遍十方三別顯時中本事二初總舉劫中多佛諸佛子彼勝音世界至微塵數如來出興於世將欲説別先舉其總言最初劫者即種種莊嚴劫也既言最初此後更有大劫於理無違二一一別顯正彰本事經來不盡故無總結歷事四佛即為四別初逢一切功德山須彌勝雲佛六初總標佛號其第一佛號一切功德山須彌勝雲一切功德山者福德崇峻不可仰也復言須彌者定慧高妙難傾動也言勝雲者慈覆智潤廣無邊也二先瑞熟機二初現瑞熟機二初標現時諸佛子應知彼佛將出現時一百年二顯瑞相此摩尼華枝輪大林中一切莊嚴周遍清淨上標下列所謂出不思議寶𦦨雲至轉妙法輪種種言辭有其十種於中説前世所行者示其種子將成熟故説佛名號令憶念故説大行願使修發故説轉法輪使常聽習生法眼故三結瑞意現如是等莊嚴之相顯示如來當出於世二覩瑞機熟其世界中一切諸王至悉欲見佛而來道場三正顯佛興二初一處道處成二初總明出現爾時一切功德山須彌勝雲至大蓮華中忽然出現二別顯勝德略有十相其身周普等真法界一示身相法無不在本自普周智與理冥故等彼真界能令色相隨彼融通法界塵毛重重全遍一切佛剎皆示出生二悲相不捨因行無所不生一切道場悉詣其所三成相理行時處為一切道場身智俱遊名為悉詣無邊妙色具足清淨四色相湛然常住稱為妙色色色無邊故云具足並無質果是謂清淨一切世間無能映奪五勝相色容蔽於大衆威德懾於羣魔力無畏圓何能映奪具衆寶相一一分明六貴相無邊寶相圓明可貴超過聖帝故曰分明一切宮殿悉現其像七應相不往普現如鏡中像一切衆生咸得目見八無礙相有感斯見無隔山河無邊化佛從其身出九化相化從真流源無有異種種色光充滿法界十吉祥相身智光照普稱世間此上勝德大同經初二結通廣遍如於此清淨光明香水海至悉亦於彼現身而坐且結同類一界餘皆略也四毫光警召五初放光處爾時彼佛即於眉間放大光明顯中道故二主光名其光名發起一切善根音發動宿種生起新善故善根有三一者生福及不動業以施忍智三而為善根二厭苦求滅以信等為根三求無上慧以四等不放逸五法為根通説善根以依聖教發心為性故云音也三眷屬數十佛剎微塵數光明而為眷屬無盡法故四照分齊充滿一切十方國土充滿十方通方教故五明光勝益文有十句若有衆生應可調伏其光照觸即自開悟無明重者自覺智開息諸惑熱煩惱深者息現行惑裂諸蓋網勤修難出裂五蓋網摧諸障山三障重者摧諸障山淨諸垢濁未解脫者淨心垢種發大信解未信大者發起入住生勝善根闕資糧者生其勝善永離一切諸難恐怖未入地者除五怖畏滅除一切身心苦惱色纍功用滅身心苦起見佛心趣一切智滯無生者見佛趣果此約差別對治以釋若約橫配生善見理可以準思五當機雲集二初通顯諸王雲集致敬時一切世間主并其眷屬至悉詣佛所頭面禮足二別顯諸王雲集儀式二先廣明喜見即正出本事之緣文六初標名辨統諸佛子彼𦦨光明大城中至統領百萬億那由他城二總辨眷屬夫人采女三萬七千人福吉祥為上首王子五百人有德曰夫人有色曰采女別本王子云二萬五千者別梵本也案瓔珞本業經上卷云十住銅輪寶瓔珞百福子為眷屬生一佛土受佛學行教化二天下銀輪寶瓔珞五百子金輪一千子初地四天王萬子二地忉利天王二萬子三地已上乃至淨居天王但云眷屬亦如是故知無過二萬子者若三界王即當等覺又以一切菩薩為眷屬桉喜見所統但以城言又見佛興至第三佛方云去世銀輪五百斯為正也若約教異理亦可通大威光為上首有大威德其道光明故大威光太子有十千夫人妙見為上首三威光得益二初舉因總標爾時大威光太子見佛光明至即時證得十種法門二列益名體皆從勝用標名何謂為十所謂證得一切諸佛功德輪三昧佛德圓滿摧障稱輪定中能知故受期稱證得一切佛法普門陀羅尼此總持能持諸佛普法證得廣大方便藏般若波羅蜜即空涉有名為方便斯則權實雙行為不共般若稱體用之廣大證得調伏一切衆生大莊嚴大慈以二嚴調伏真實慈也證得普雲音大悲法雲震音能苦本證得生無邊功德最勝心大喜稱理法喜故德無邊自他俱慶心為最勝證得如實覺悟一切法大捨知離名法法亦應捨如實捨也證得廣大方便平等藏大神通善巧起用平等無思通從此生故名為藏證得增長信解力大願盡衆生界荷負無疲要令信解為大願也證得普入一切智光明辨才門所有辨才皆入佛智自他俱照是曰光明此上十法初三功德法次四熏修法後三起化法多言大者境界無邊稱性廣大智契貫達並受證名
