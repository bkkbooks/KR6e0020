body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經八正趣菩薩寄真如相回向善友文六初依教趣求爾時善財童子敬承其教遽即往詣彼菩薩所二見敬咨問頂禮其足合掌而立至善能教誨願為我說三授己法界二初標名體正趣菩薩言善男子我得菩薩解脫名普門速疾行十方無際故名普門一念超多故云速疾二顯其業用四初申問善財言聖者於何佛所至去此幾何發來久如雖有三問意在速疾二顯深告言善男子此事難知至能聞能持能解能說三承力請說善財言聖者我承佛神力至能信能受願為我說四正答前問五初答得法處正趣菩薩言善男子至於彼佛所得此法門謂從自本智如來藏界普生萬善本覺而來故行能速遍知一切法不離心性萬行頓成二答時久近從彼發來已經不可說不可說佛剎微塵數劫三答處近遠一一念中舉不可說至不可說世界微塵數佛剎以多時發多步則知遠矣即是速疾四顯其成益一一佛剎我皆遍入至教化調伏無有休息五類顯十方如從東方南西北方四維上下亦復如是四謙己推勝善男子我唯得此菩薩至云何能知能說彼功德行五指示後友善男子於此南方有城名墮羅鉢底此云有門謂有此無縛無著等微妙法門為法師故其中有神名曰大天現大身故無縛無著智淨自在故名為天稱理普應故名為大妙用難測故名為神汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去九大天神寄無縛無著解脫回向六初依教趣求爾時善財童子入菩薩至現廣大身為衆說法二見敬咨問爾時善財至大天所至善能教誨願為我說三授己法界二初授法方便爾時大天長舒四手至持諸金華以散善財約事則發心難遇淨目而觀散華而供故約表謂展四無礙解手取所證勝流相應法門先當自淨以洗身心後因利他故云華散亦表四攝遠展攝取四衆故而告之言善男子至於一切時常現在前現相讚友難遇令欣入故二正授所得二初標名體善男子我已成就菩薩解脫名為雲網謂以六度大悲如雲覆潤如網羅攝故二問答業用四攝攝生故文中亦二初問善財言聖者雲網解脫境界云何二答二初現寶令施教以檀攝爾時大天於善財前至檀波羅蜜能捨難捨二類通教餘及利行攝善男子如我為汝示現此物至障礙險道到無障處如是等言亦兼愛語同事四謙己推勝善男子我唯知此至能知能說彼功德行五指示後友善男子此閻浮提摩竭提國菩提場中所入法界即得菩提之處故菩提是本前南有所表從本之南今攝末歸本之法界故不云南矣又地上證如亦同本故今回向終故攝歸此有主地神其名安住地為萬法所依即所入法界無量安住即入義汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子禮大天足繞無數匝辭退而去十安住地神寄入法界無量回向六初依教趣求爾時善財童子漸次游行至菩提場內安住神所二見敬請法五初友見稱讚百萬地神同在其中至摧伏一切邪論異道既云友見則已含見友二嚴處攝生以顯勝德時安住等百萬地神至百千伏藏自然涌現三許示昔善引其問端時安住地神告善財言至我為汝現汝欲見不四設敬陳請爾時善財禮地神足至白言聖者唯然欲見五正示昔因時安住地神以足按地至汝應隨意自在受用三示己法界四初標名體用善男子我得菩薩解脫名不可壞智慧藏謂一念之智冥乎法界則不可壞此中則無所不生故名為藏由賢位既滿總會三賢為入地之因故顯善財之福常隨地神之智不壞是則昔因不失能入證矣常以此法成就衆生略明其用二別顯業用善男子我憶自從然燈佛來至皆能領受皆能憶持由智不壞故常憶等三顯得法時處善男子乃往古世過須彌山至於彼佛所得此法門四總結純熟善男子我於此法門至所有一切功德善根四謙己推勝善男子我唯知此至能知能說彼功德行五指示後友善男子此閻浮提摩竭提國迦毗羅城此云黃色往昔黃頭仙人依此處故黃是中色表契中道故又此是佛生之城表初地生佛家故有主夜神名婆珊婆演底婆珊此云春也婆演底此云主當以於春時主當苗稼故謂顯初入地能生長萬行護衆生故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子禮地神足至殷勤瞻仰辭退而去第五有十善友寄十地位即分十段第一婆珊婆演底夜神寄歡喜地地上多見夜神者證智玄妙離相破暗故下九天神準梵本皆是女神瞿波亦女者地上證於同體慈悲女之狀故文六初依教趣求二初依前修證爾時善財童子一心思惟至知其無邊測其甚深二趣求後友漸次游行至於彼城從東門入從東門入者開明之初顯入證之始故佇立未久便見日沒見日沒者是夜神故表分別見日皆已亡故上辨至時處下生渴仰心心念隨順諸菩薩教至普能明照十方剎海二見敬咨問二初見友依正作是念時見彼夜神於虗空中於空見者城表教道空表證道宗說兼通如日處空故處寶樓閣香蓮華藏至以為嚴飾身服朱衣服朱衣者證智明顯故首戴梵冠一切星宿炳然在體法門星像不離一身如體於其身上一一毛孔皆現化度無量無數惡道衆生化生作用不離一毛之性令其免離險難之像至如是種種成熟衆生二設敬咨問善財童子見聞此已至我行於中至十力地三稱讚授法二初稱讚時彼夜神告善財言至當得阿耨多羅三藐三菩提二授己法界三初標名體善男子我得菩薩破一切衆生癡暗即所破二愚法光明解脫即是能破二無我智又破衆生暗為悲法光明是智悲智具故二明業用二初長行二初興救物之心善男子我於惡慧衆生至常與如是心共相應二正明對緣救攝十門初一總明為海難有四種善男子我於夜暗人靜至並皆昏蔽不見色時一救時見諸衆生若入於海若行於陸山林曠野諸險難處二救處戒遭盜賊或乏資糧至慞惶憂怖不能自出三所救我時即以種種方便而救濟之四能救二有九門別顯初救海難衆生為海難者示作船師至令免怖畏悉得安隱先救世苦令得世樂復作是念以此善根回施衆生願令捨離一切諸苦後以回向大願令其究竟離苦得樂此下八段離苦得樂準上有二二救陸地衆生為在陸地一切衆生至悉令除滅諸煩惱暗三救求不得及行山險衆生一切衆生有惜壽命至到無畏處畢竟安樂四救樂國土衆生善男子若有衆生樂著國土至住一切佛薩婆若境五救著聚落衆生善男子若有衆生樂著聚落至究竟安住一切智城六救暗夜衆生善男子若有衆生行暗夜中至以智慧光普皆照了七救惑業衆生是諸衆生無有智眼至平等之處令其安住八救八苦衆生善男子一切衆生或病所纏至住於究竟無變易處九救惡見衆生善男子一切衆生入見稠林至常勤教化一切衆生二偈頌二十一頌分四初一頌法門名體爾時婆珊婆演底主夜神至為善財童子而說頌言我此解脫門生淨法光明能破愚癡暗待時而演說二有四頌舉因勸修即四無量我昔無邊劫勤行廣大慈至汝應入此三有十頌顯果令入即六處殊勝我目甚清淨普見十方剎至而亦不分別四有六頌明業用廣大我以大神通震動無量剎至成道演妙法三得法久近二初興二問爾時善財童子白夜神言至乃能如是饒益衆生二還兩答答中有二初答發心時節六初總顯本事因緣其神答言善男子乃往古世至名法慧月夜入眠寐二明佛興世時彼城東有一大林至遍照出生妙寶世界三善友勸發蓮華光城內有主夜神至普賢菩薩所有行願四正發大心令王夫人發阿耨多羅至及諸菩薩聲聞僧衆五結會古今善男子時王夫人法慧月者豈異人乎我身是也六發心成益我於彼佛所發菩提心至而未滿足菩薩諸根二答得法久近二初總顯得法因緣過此劫已復過萬劫至引至佛所廣興供養二正明得法三初得方便三昧我才見佛即得三昧至於彼佛所聽聞妙法謂上見諸佛下化衆生二得此解脫以聞法故即得此破一切衆生暗法光明解脫三廣顯業用得此解脫已即見其身至如是乃至充滿法界四謙己推勝善男子我唯知此菩薩至入其境界示其自在五詣示後友善男子此閻浮提摩竭提國菩提場內得無誤犯由契理故理即菩提場有主夜神名普德淨光普德者最勝法界無德不具故淨光者正智證入離誤犯之垢故即前淨月故次云我本從其發阿耨多羅至學菩薩行修菩薩道六戀德禮辭二先以偈讚表戀德之深十偈分四初四讚身心超勝爾時善財童子向婆珊婆演底神而說頌曰見汝清淨身相好超世間至清淨無分別二有三頌明大用無涯一一毛孔內悉放無數光至種種令清淨三有二頌明益物不虗若有諸衆生聞名及見身至以滅煩惱故後有一偈明結德無盡千剎微塵劫歎汝一毛德劫數猶可窮功德終不盡二作禮辭退時善財童子說此頌已至殷勤瞻仰辭退而去
