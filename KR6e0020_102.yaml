body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第五法寶髻長者寄無癡亂行文六初依教趣求爾時善財童子於明智居士至周遍推求寶髻長者二見敬咨問見此長者在於市中表處閙忘懷亂中常定故遽即往詣頂禮其足至我乘此道趣一切智三授己法界四初執手相引即授法方便爾時長者執善財手將詣所居示其舍宅顯加行智歸正證故二示其所住即正授法界作如是言善男子且觀我家三正證法界二初總爾時善財見其舍宅至其宅廣博十層八門如八角塔形層門二事各有三義層別中解門三義者一通約所修之道以八正為門八正通入諸位中故二約所依之道即以八識為門於眼根中入正定故根若能入境則可知三約教顯理即四句入法教理各四故有八門謂若失意有空俱泯便成四謗得意通入並稱為門尋教得解即教四門於理得解即理四門二別善財入已次第觀察十層具三義者一表十地見最下層施諸飲食一施食顯初地行檀見第二層施諸寶衣二地持戒以慚愧為衣服見第三層布施一切寶莊嚴具三地忍行以為嚴具見第四層施諸采女并及一切上妙珍寶四地道品為內眷屬精進可珍見第五層乃至五地至諸三昧行智慧光明五地文顯六地般若現在前故文中有三先總見第六層有諸菩薩至分別顯示般若波羅蜜門次別顯十五門所謂寂靜藏般若波羅蜜門照體即寂而無不包善分別諸衆生智般若波羅蜜門即寂之照無機不鑒不可動轉般若波羅蜜門外緣不轉離欲光明般若波羅蜜門內照無求不可降伏藏般若波羅蜜門惑境不摧照衆生輪般若波羅蜜門遍摧諸惑海藏般若波羅蜜門包含勝德而甚深普眼捨得般若波羅蜜門普見法界而無礙入無盡藏般若波羅蜜門一即無盡一切方便海般若波羅蜜門巧化無邊入一切世間海般若波羅蜜門內證世間無礙辨才般若波羅蜜門外演勝辨隨順衆生般若波羅蜜門曲隨物欲無礙光明般若波羅蜜門事理交羅常觀宿緣而布法雲般若波羅蜜門觀緣授法後總結上文説如是等百萬阿僧祇至悉能聞持諸佛正法七地有殊勝行知種種教法故云得如響忍見第八層無量菩薩至而為上首演説於法含於二位一八地得無功用神通能於二種世間自在二即九地法師一音能演見第九層一生所繫諸菩薩衆於中集會亦二位一即十地二即等覺此位俱可為一生故見第十層一切如來至如是一切悉使明見即如來地二表十行謂以十行即十度故前七文顯八大願所成神通等故九一生所繫力最上故十唯至如來智方滿故此即當位自攝諸位向攝十地即攝後諸位故以十層雙表二義還如海幢當位攝盡十位才竟説成佛故前寄第六位攝此寄第五位攝前約正報攝此約依報攝者皆顯位勝前故三不表位但此菩薩以行就機現居勝報漸次增勝十顯無盡初四以物施後後漸難次二集法施前淺後深次二得法初狹後廣後二現勝德先因後果總上三義因果行位等法以為長者之宅四問答因緣即後得智二初問爾時善財見是事已至種何善根獲如是報二答長者告言善男子至謂永離一切貧窮困苦回向三處者一離貧窮招前四層之報常見諸佛及善知識恆聞正法故獲斯報二三兩果即後六重一丸之微因願力故報勝又表萬行混融發起向佛則隨一行無不具矣何果不階四謙己推勝善男子我唯知此菩薩無量福德寶藏解脫門世寶三寶皆悉蘊積十重之中故云寶藏常用無盡是故名為無量福德上謙己下推勝如諸菩薩摩訶薩得不思議功德寶藏當法顯勝故功德寶藏皆不思議上總下別入無分別如來身海至住一切劫無有疲厭由無分別而具諸法故不思議而我云何能知能説彼功德行五指示後友善男子於此南方有一國土名曰藤根夫藤者根深入地上發華苗表善現行般若證深能生後得後得隨物而轉故取類於藤其土有城名曰普門實相般若無所不通中有長者名為普眼觀照般若無不見故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去第六普眼長者寄善現行文六初依教趣求爾時善財童子於寶髻長者至深入諸佛無量知見無量有二一多故即權智境二無分量故即實慧境境無量故智亦無量知見亦二一別謂知即是智見即是慧即照二境之智慧二通謂知見二字俱是如來能證如實知彼義故即無障礙智若爾何假重言為揀比知所以言見揀肉眼見所以云知此如世親般若論釋悉知悉見入謂證達安住菩薩無量勝行至遍䇿諸根離衆放逸二見敬咨問先見依正然後乃得見普門城百千聚落周匝圍繞眷屬般若也雉堞崇峻般若防非高而無上也五板為堵五堵為雉堞即女牆衢路寬平般若之道諸佛常行非權徑故蕩然無涯見彼長者往詣其所於前頂禮至云何修菩薩道三稱讚授法二初讚長者告言善哉善哉至阿耨多羅三藐三菩提心二授己法界二初能療病即下化衆生二初除身病二初治無不能善男子我知一切衆生諸病至我悉能以方便救療二來者皆治兼與身樂善男子十方衆生諸有病者至悉令充足無所乏短二治心病二初明除惑義通大小然後各為如應説法至為其顯示殊勝法門二令其成益此唯大乘有十六句為欲令其發菩提心至一切劫住修諸行網上五句通顯大心行願次十別明十度之因感十身之果為欲令其具佛相好稱揚讚歎檀波羅蜜施滿他心故相好悅物為欲令其得佛淨身至稱揚讚歎尸波羅蜜戒遍止惡故淨身遍至為欲令其得佛清淨不思議身稱揚讚歎忍波羅蜜忍兼忍理故不思議為欲令其獲於如來至稱揚讚歎精進波羅蜜進策萬行故無能勝為欲令其得於清淨無與等身稱揚讚歎禪波羅蜜禪唯一心故無與等為欲令其顯現如來至稱揚讚歎般若波羅蜜般若照理故顯法身為欲令其現佛世尊至稱揚讚歎方便波羅蜜方便顯用色身可覩為欲令其為諸衆生住一切劫稱揚讚歎願波羅蜜願窮來際住劫無窮為欲令其現清淨身至稱揚讚歎力波羅蜜力不可搖悉過一切為欲令其現清淨身至稱揚讚歎智波羅蜜智窮事法隨物成身為欲令其獲於究竟至如是施已各令還去後一句明總離諸惡故究竟淨妙二明能合香即上供諸佛三初知香體善男子我又善知和合一切至無等香辛頭波羅香辛頭者即信度河也波羅是岸即彼岸之香無勝香覺悟香阿盧那跋底香阿盧那拔底此云赤色極堅黑栴檀香烏洛迦栴檀香烏洛迦西域蛇名其蛇有毒繞此檀樹故沉水香不動諸根香如是等香悉知調理和合之法和合者戒定慧等融無礙故二興供起願又善男子我持此香以為供養至供養一切如來願三能成大供又善男子然此香時至處處充滿以為莊嚴四謙己推勝善男子我唯知此令一切衆生普見諸佛歡喜法門謂身心病除成二世樂故皆歡喜以香普供得佛十身則何佛不見如諸菩薩摩訶薩如大藥王至能知能説彼功德行五指示後友善男子於此南方有一大城名多羅幢多羅此云明淨幢者建立表無著行依般若淨明立勝行故彼中有王名無厭足如幻方便化無所著故無疲厭心汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子禮普眼足至殷勤瞻仰辭退而去七無厭足王寄無著行二初依教趣求二先念教成益爾時善財童子憶念思惟至不捨十力心一趣求後友漸次遊行經歷國土至宣布法化調御衆生既入其國必聞其政可治者治可攝者攝至依衆人語尋即往詣二見敬咨問二初見四初見勝依正遙見彼王坐那羅延至前後圍繞共理王事二覩其逆化其前復有十萬猛卒至譬如衆合大地獄中三不了生疑善財見已作如是念至發大悲心救護衆生四空天曉喻二初令憶念前教真實使不生疑作是念時空中有天至至無險難安隱之處二辨後行洪玄令其信入善男子菩薩善巧方便智至調伏衆生智不可思議然善財雖常憶教而生疑者逆行難知故貪益此世不疑婆須瞋癡現損是故勝熱及與此王並生疑怪言深玄者通達非道故梁攝論戒學中明菩薩逆行殺衆生等生無量福乃至證得無上菩提要大菩薩方堪此事此有二種一者實行二者變化言實行者了知前人必定造作無間之業無分方便令離此惡唯可斷命使其不作又知前人若捨命已必生善道又菩薩自念我行殺已必墯地獄為彼受苦彼人雖然現受輕苦必得樂果瑜伽菩薩地戒品之中亦同此説言變化者即當此文下王自説二敬問時善財童子聞此語已至善能教誨願為我説三授己法界二初授法方便時阿那羅王理王事已至將入宮中命之同坐執手同坐示無間之儀表攝彼加行令趣真故二正示法界令證相應四初舉果令入告言善男子汝應觀我至先起後臥軟意承旨二以實顯權時阿那羅王告善財言至如是富贍如是自在二示其所得二初名善男子我得菩薩如幻解脫了生如幻故以幻化幻二明法門業用善男子我此國土所有衆生至三藐三菩提意三明法門勝益善男子我以如是巧方便故至究竟住於一切智地四直顯實德善男子我身語意未曾惱害至能生一切諸善法故慈念之深然諸位至七皆方便故休捨觀自在開敷樹華多約慈悲四謙己推勝善男子我唯得此如幻解脫至知諸有趣悉皆如幻由了如幻方證此忍故又後位中當此忍故菩薩諸行悉皆如化至能知能説彼功德行五指示後友善男子於此南方有城名妙光前位悲增今此已得無住妙慧運衆生故王名大光慈定之智無不該故廣大願中皆徹照故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮王足繞無數匝辭退而去第八大光王寄難得行文六初依教趣求二初念前友教爾時善財童子一心正念至如幻變化如是思惟二趣求後友二初推求得知漸次遊行或至人間至是大光王之所住處二自慶當益時善財童子歡喜踊躍至不思議境界廣大清淨二見敬咨問三初見亦三初見依報二初所見殊勝作是念已入妙光城至彼大光王常處其中云十由旬者欲明圓滿既有十億衢道道各無量衆生豈世間十小由旬之所能受故此中事物皆應圓融表法如理思之二能見無染爾時善財童子於此一切至一心願樂見善知識二見王正報漸次遊行見大光王去於所住樓閣不遠四衢道中以四無量用四攝法攝衆生故坐如意摩尼寶蓮華藏至二十八種大人之相二十八相者因未滿故八十隨好而以嚴身至種種智寶充滿其中三主伴攝生三初列所施於王座前有金銀琉璃至悉置一切資生之具通情非情六十四能如第五地二能施人即是助伴一一道傍皆有二十億菩薩以此諸物給施衆生三明其施意為欲普攝衆生故至為令衆生淨諸業道故二敬時善財童子五體投地至經無量匝合掌而住三問白言聖者我已先發至善能誘誨願為我説三授己法界三初總示法門時王告言善男子至我滿足菩薩大慈幢行謂大慈首出離染圓滿故二明得法因緣善男子我於無量百千萬億至思惟觀察修習莊嚴問難是聞慧以三種慧莊嚴此慈三明其業用五初以法攝化善男子我以此法為王至能以正法教化世間二以無畏攝善男子我國土中一切衆生皆於我所無有恐怖三以財寶攝善男子若有衆生貧窮困乏至隨意而取勿生疑難四隨機遍攝善男子此妙光城所住衆生至衆寶嚴淨餘皆見穢五以三昧攝二初以言告善男子此國土中一切衆生至且待須臾自當現見二正以定示時大光王即入此定至毒惡衆生悉亦如是顯定業用情與非情咸成勝益者謂同體大慈物我無二故如世間王德合乾坤則麟鳳來儀寶璧呈瑞況於出世大慈之力不令草木屈膝歸耶四謙己推勝時大光王從三昧起至大慈為首隨順世間三昧門慈本為物名順世間高出衆行故名為首即是幢義上謙己知一下推勝知多如諸菩薩摩訶薩至能讚歎彼大慈悲雲五指示後友善男子於此南方有一王都王子位故名曰安住智契實法不為緣壞名為安住有優婆夷名曰不動自發心來於一切法無不得定煩惱二乘不能動故亦令衆生心不動故以智修慈故示以女汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮王足至殷勤瞻仰辭退而去
