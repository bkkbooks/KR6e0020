body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經五明出現境界正顯分齊之境兼辨所緣之境依初義者前約智以顯心今此正明智用分齊依後義者前明能知今辨所緣由所緣無邊故顯分齊難思分齊難思故方窮所緣之境二義相成函蓋相稱文中有三長行分三初標佛子菩薩摩訶薩應云何知如來應正等覺境界二釋二初法二初廣取所緣顯分齊境二初列所緣無邊佛子菩薩摩訶薩以無障無礙智慧先令以無障礙智為能知者非此不能量佛境故後正顯所緣文有十句知一地世間境界是如來境界通舉所化知一切三世境界化時一切剎境界化處一切法境界化法一切衆生境界所化人次三句皆明所證真如無差別境界真如語其體常一味故云無差別法界無障礙境界法界生法所依故云無礙實際無邊際境界實際是窮事至實故云無邊虗空無分量境界化處分齊無境界境界是如來境界後一遍通若約二諦境前五為俗次三為真九通真俗事空理空俱是空故後一雙非顯前九境即同無故若約三諦空即是真三真為中道若以五界攝之初三是世界無量四即調伏及調伏加行界五即衆生次三即法界餘二雙非二顯分齊無量佛子如一切世間境界無量至如來境界亦無量先約十境以顯分齊境智相稱故皆無量如無境界境界一切處無有至一切處無有後約無境顯其非有乃至真如皆不可得故是以諸境雲興而常寂也如無既爾如真如等無變易等亦然二近取諸心以況佛境二初正明佛子菩薩摩訶薩應知至無量無邊無縛無脫無量無邊語其相用廣大無縛無脫明其體性甚深寂滅二徵釋何以故徵意云何以將心況於佛境以如是如是思惟分別如是如是無量顯現故釋意云菩薩自心隨思即顯故無分量佛境亦爾隨機顯現若身若智何有量耶智假思顯性無縛脫不為相縛後無脫故二喻顯文有三初二喻於無縛無脫後一喻於無量無邊無量無邊通前二段前中分二初降雨無從喻佛子如大龍王隨心降雨至於十方中悉無來處喻無縛無脫既無來處有何縛脫二海水從心喻佛子如大海水皆從龍王至往昔大願之所生起喻於無縛無脫所因水從龍王心力為因非定內外智從往昔願緣起故來即無來二海水宏深喻喻無量無邊文二初標章誡聽佛子一切智海無量無邊至略說譬喻汝應諦聽二喻顯三初別顯水多文有四節初四洲水佛子此閻浮提有二千五百河至答言甚多二龍王雨水佛子復有十光明龍王至雨大海中水復倍前三宮殿出水佛子十光明龍王宮殿中水至流入大海復倍過前四婆竭龍王兼雨兼出佛子婆竭羅龍王連雨大海至涌出入海復倍於前皆後倍前以顯深廣二通顯水相其所出水紺琉璃色涌出有時是故大海潮不失時涌出故潮上速為寶消故潮下此為極說三通顯無量兼水有四佛子如是大海其水無量至實為無量不可為喻三法合二初合水無量佛子此大海無量至而佛境界非譬所及佛智一念尚無窮盡況盡三際周乎十方重重重重安可喻顯二合通顯無量佛子菩薩摩訶薩應知至修一切菩薩行不斷故智海合水應知寶聚無量至無障礙地諸菩薩所居故餘合寶等非唯智為佛境菩提分等皆分齊境也三總結佛子菩薩摩訶薩為入無量至等覺境界應如是知結令知意不知佛境安能利生二偈頌五偈分二初一頌法說爾時普賢菩薩摩訶薩欲重明此義而說頌言如心境界無有量至佛境如是應觀察二餘頌前喻文亦二初二合頌前之二喻如龍不離於本處至量等法界入毛孔喻無縛脫二有二偈頌大海宏深喻如海珍奇無有量至悉在其中得饒益俱頌通顯無量餘文略無六答出現之行前明分齊境智無邊今彰運用則悲智無盡雖智海已滿悲無息故文分為二初長行二初標舉佛子菩薩摩訶薩應云何知如來應正等覺行二釋相三初雙標二行佛子菩薩摩訶薩至應知真如行是如來行義有多含一無礙行者即理之事真如行者即事之理行前即行相後即行體前是即智之悲後是即悲之智前即真之欲後即欲之真融而無礙為如來行二雙釋二行二初釋真如行真如之名言含法喻文中有三初牒名以解佛子如真如前際不生後際不動現在不起體絶三際故同真如契如成行行即如也如來行亦如是不生不動不起過未非緣故不生不動現在離緣故非起也二復舉法界無形明雙非契中佛子如法界非量非無量至非量非無量無形故是知實相皆如來行三鳥飛虗空喻釋其非量義佛子譬如鳥飛虗空至如來行無邊際故非量有二一行廣無量故云如來行無邊際故二即事同真更無分量故以空喻既無有量何有無量若謂無量即是量故雙非永寂為如來行故心彌虗行彌曠絡日行而未曾行故涅槃經云復有一行是如來行所謂大乘大般涅槃二釋無礙行二初約法總明佛子如來應正等覺至出過一切諸障礙道智無所住悲示所行即悲智無礙自無二礙令他無礙皆無礙行也二以喻別顯二初金翅闢海喻佛子譬如金翅鳥王至命將盡者而搏取之喻即智之悲如來應正等覺金翅鳥王至如來無分別無礙行二日月無思喻佛子譬如日月獨無等侶至我從何來而至何所喻悲不失智諸佛如來亦復如是至我從彼來而向彼去三雙結二行佛子菩薩摩訶薩應以如是等無量方便無量性相性結真如相結無礙知見如來應正等覺所行之行二偈頌五頌分二初頌真如爾時普賢菩薩欲重明此義而說頌言譬如真如不生滅至教化衆生無動念七出現菩提圓行之果對緣造修必有示成故長行文三初徵起佛子諸菩薩摩訶薩至應正等覺成正覺言正覺者略顯五門初釋名晉經名菩薩存其梵語此翻為覺正揀二乘成異菩薩初會已顯又單語菩提但是所覺之道今云成者即理智契合之名二明體性梁攝論云二智二斷為菩提體智度論云菩提菩提斷但名為菩提若依此經通一切法如文具之三辨種類或說唯一如智契合無二相故故淨名云夫如者不二不異或開為二大品明有性淨菩提及修成故或分為三約三乘故如十地論或開為四涅槃經云下智觀者得聲聞菩提乃至上上智觀得佛菩提又四智菩提亦是四義或分為五如大品經及智度論說發心等故或具明十次品當明唯十為圓是此所辨三除前二四除前三五除前四餘皆兼通同教一乘之所攝故若業用所現無所不收四明業用文有十門而體用參顯各隨別義以立名目今統收之謂緣二諦斷二障證二空起二智即羣機現萬像具十身遍十方周於毛端微塵等處通因及果業用無邊具如文顯五者辨相即當釋文略辨十門一總明體相二印現萬機三體相甚深四三輪平等五因果交徹六體離虧盈七相無增減八用該動寂九周于法界十普遍諸心十門之中亦司當門別釋文義今且以初為總餘九為別別雖九門而釋十義初釋第一二釋第十謂舉初括後三從第二次第解釋第十一門釋於八九二義至文當知今初總明體相佛子菩薩摩訶薩應知如來成正覺具有十門皆含體相用三於一切義無所觀察一寂照為菩提體一切義者真俗境也觀極於無觀故淨名云不觀是菩提離諸緣故如海無心而能頓鑒非無所了故晉經云解一切義二經合明義方圓妙解即是觀觀即無觀既觀念斯寂無惑習種無觀是體照斷為用合之為相於法平等無所疑惑二等同萬法為菩提體謂智與理冥同一圓覺故云於法平等而不失照決斷分明云無疑惑既無所疑則所知永寂上二已攝攝論之體無二三一成一切成不見生佛有異相故故云無二以知一切衆生即菩提相亦是能所不二故淨名云不二是菩提離意法故無相四總指前三體相寂滅寂滅是菩提滅諸相故無行五即心行處滅湛然不遷亦是不行是菩提無憶念故無止六雖覺而常定不住定故無量七有二義一橫遍十方廣無量故二體無生滅絶分量故無際八亦二義一豎念念成無際畔故二一得永常無後際故心無初相冥符於理無前際故遠離二邊住於中道九離二邊契於中道晉經此前有無縛無脫並皆含在二邊之內謂苦染若淨若縛若脫有無一異等斯邊皆離不遍住著故曰離邊非見有邊邊即中故無邊無中方住中道出過一切文字言說十總顯離言上之九句寄言顯深斯乃未盡菩提之奧收歸性離令亡言契之二印現萬機即海印三昧文三初法知一切衆生心念所行至悉知三世一切諸法秪於一念知三世者名一切智二喻佛子譬如大海普能印現至是故共說以為大海即舉海印以喻菩提無心頓現三合諸佛菩提亦復如是至是故說名諸佛菩提言無所現者有其三義一無心現故如海二所現空故如像三無別體故如水與像不可分異自體顯現故名為覺起信論云諸佛如來離於見相無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用斯即無思顯照同體之境為菩提相用故上文云於一切義無所觀察三性相甚深佛子諸佛菩提一切文字至但隨所應方便開示性離言故理圓言諞故四三輪平等釋上總中於法平等等諸法故意輪等故何所疑哉文二初別舉身等有十三身佛子如來應正等覺至得一切語言量等身上六等事得真如量等身得法界量等身得虗空界量等身此三等理得無礙界量等身此一等於事理事事二種無礙得一切願量等身至得寂滅涅槃界量等身後三等因果略舉十三結云無量皆言量者是所等之分量皆言等者即能等之三輪等有二義一者等彼事理之量二者等彼事理之體所以等者彼諸理事即我所證能所冥合彼尚即我等之何難是以聖人空洞無像物無非我會萬物以成己二類結顯多佛子如所得身言語及心至無量無數清淨三輪五因果交徹釋上無二同一性故文三初標佛子如來成正覺時至普見一切衆生入涅槃八相之中略舉其二故云乃至此文正同淨名之言若彌勒得菩提者一切衆生皆亦應得一切衆生即菩提彌勒示迷此旨但謂理詰之言不知真得菩提實如所詰又前章中以我等彼故遍同彼量今明以彼等我故全現我中是知一性平等反覆相成此中之成為理為事若是事成何以釋云同一性故若是理成何以此云成正覺入涅槃耶此是華嚴大節圓宗之義不對諸宗難以取解然諸衆生若於人天位中觀之具足人法二我小乘唯是五蘊實法大乘或說但心所現或說幻有即空人法俱遣或說唯如來藏具恆沙性德故衆生即在纏法身法身衆生義一名異猶據理說更有說言相本自盡性本自現不可說言即佛不即佛等若依此宗舊來成竟亦涅槃竟非約同體此成即彼成若爾何以現在衆生非即佛耶若就衆生位看者尚不能見唯心即空安見第六圓教中事譬如有人迷東謂西正執西故若諸情頓破則法界圓現無不已成猶彼悟人西處全東若爾諸佛何以更化衆生不如是知所以須化如是化者是究竟化如是化者無不化時故下結云大悲相續救度衆生隨門不同種種有異約成佛門一切成也又此衆生乃是像上之摸令其去摸自見己佛亦見他成如第十段二釋皆同一性所謂無性先總釋云同一無性故得現成妄性本虗生元是佛真性巨得非今始成故皆成也次轉徵所無無何等性同菩提性後釋所無有十二句前之四句通生及佛次之四句唯約衆生後四約佛非獨要空真有亦非妄有真空以性融相法界圓現由此無性說成正覺又攝十二總為六對所謂無相性無盡性一能相所相對謂染相淨相相待有故念念之盡緣所盡故煩惱永盡本自盡故無生性無滅性二生滅對約凡夫則本自不生即涅槃相不復更滅故約佛菩提非始生故何有滅耶無我性無非我性三我非我對有緣無主故我尚不可得非我何可得諸法實相中無我無非我無衆生性無非衆生性四緣非緣對攬緣生故緣尚不可得無菩提性無法界性五能所證對能證菩提因所證故所證法界由智顯故無虗空性亦復無有成正覺性六合不合對虗空非合因有顯故所以性無成覺是合理智契合即為緣起故非有也三結知一切法皆無性故得一切智大悲相續救度衆生物物無性故成種智證斯同體而起大悲一得永常故云相續又秖由不知佛證無性故謂令知故教化不絶六明體離虧盈釋上無相佛子譬如虗空一切世界至無一無種種故虗空無生體無增減菩提無相成不寧殊七明相無增減釋上無行菩提之體湛然不異行豈能遷文三初舉喻問答佛子假使有人能化作恆河沙等心化多心者喻修多因一一心復化作恆河沙等化成多佛喻修多因皆無色無形無相以化現無形喻成不成二義莫異如是盡恆河沙等劫至云何問言凡有幾何二讚善以合普賢菩薩言善哉善哉至若無有相則無增無減三結前生後佛子菩薩摩訶薩應如是知至同於菩提一相無相八用該動寂釋上無上不滯定故文四初舉所依三昧如來成正覺時以一相方便入善覺智三昧覺不滯寂故名善覺覺彼一相故用為方便二顯一身之用入已於一成正覺廣大身至衆生數等身住於身中既以一相為方便則物皆一相故一即現多三類顯餘身如一成正覺廣大身一切成正覺廣大身悉亦如是謂以如來成正覺時廣布身雲彌於法界一一皆是廣大之身並如前來一身之現四總結多門佛子如來有如是等至為無量界等衆生界上來所現一定為門餘定亦爾定門既然悲智總持等門亦爾以是故有無量界矣是謂高而無上廣不可極九周于法界釋上無量無量有二一廣多無量一毛含多遍法界故二無分量皆不生故文三初明一毛含多佛子菩薩摩訶薩應知至究竟無生滅故釋以不生故此與前段有分無分二門異故又此唯現佛即同類相望前通多類即異類相入又前則住體遍應此則如理而含亦如理而遍二類顯多毛如一毛孔遍法界一切毛孔悉亦如是但容毛處即是毛孔當知無有少許處空無佛身何以故徵意云身契無生可許能含法界虗空無有能契何能亦含如來成正覺無處不至故釋云無處不至則無非佛身矣是謂大包天地細入無間三釋外疑情隨其所能隨其勢力至以種種身成等正覺疑云若爾何以須要就於覺樹釋云隨機所能受耳是知覺樹多身頓成尚曰隨宜有頂鹿園豈為真極十明普遍諸心釋前二門即分為二初正明普遍釋上無際念念常成無際畔故亦二初指一心佛子菩薩摩訶薩應知自心念念常有佛成正覺先標次徵何以故後釋諸佛如來不離此心成正覺故意云不離心者有二義故一衆生身心是佛所證二全即佛菩薩性故此即他果在我之因非約因人自有佛性此文正顯佛菩提故二例一切心如自心一切衆生心亦復如是悉有如來成等正覺二總結雙非釋上第九遠離二邊住於中道廣大周遍無處不有不離不斷釋有二意一不離結上無處不有不斷生下無有休息二不離者生佛非異故不斷者生佛非一不同衆生可斷壞故無有休息入不思議方便法門是以不得意者作衆生恩故是不可設作佛思又亦不可即亦不可非即非當淨智眼無取諸情三總結佛子菩薩摩訶薩應如是知如來成正覺令依此知映前十門無幽不盡離此何有真菩提耶二偈頌爾時普賢菩薩摩訶薩欲重明此義而說頌言正覺了知一切法至是故正覺名無量文有六頌頌前十門初二次第頌初二門次三如次頌六七八後一通頌四五九十以此四門同是普現無量義故其第三門但顯離言故略不頌八明出現轉大法輪得大菩提理必轉授文二長行中三初標徵佛子菩薩摩訶薩應云何知如來應正等覺轉法輪二釋相二初顯體用三初法文有九句減數十也皆先標後釋文二今初五句顯體性寂寥佛子菩薩摩訶薩一能轉心二所轉體三所得果四能詮教五所顯理夫轉法輪不過此五今皆即事契真應如是知如來以心自在力至知一切法恆無起故一能轉心由知法無起故正轉法時不起念言我轉授人名心自在如是方為能轉也以三種轉斷所應斷而轉法輪知一切法離邊見故二所轉體即示勸證名為三轉此三名輪者摧障惱故言離邊見者若有惑可摧未離於常無惑可摧寧免於斷今永離斷常等邊方為真能斷所應斷知與證修亦然離欲際非際而轉法輪入一切法虗空際故三所得果由斷惑故得離欲際由證性空本無可離斯際亦遣無有言說而轉法輪一切法不可說故四能詮教理假言詮今了本寂滅不可說故終日言而未曾言也究竟寂滅而轉法輪知一切法涅槃性故五所顯理謂即寂滅今了性淨涅槃法本不然今則無滅方得名為究竟之滅是知其輪本來常清淨也二四句明相用深廣一切文字一切言語至如來音聲無處不至故觸言皆輪即是廣也知聲如響而轉法輪了於諸法真實性故即用而寂即是深也下之二句亦深亦廣於一音中出一切音而轉法輪畢竟無主故一即多而無主無遺無盡而轉法輪內外無著故即橫豎而恆虗謂橫則無遺無所不轉故豎則無窮盡未來際故而不著內外則深廣無涯矣二喻二初文字無盡喻第九無盡佛子譬如一切文字語言至無有休息無有窮盡二編入無住喻喻六七八用而常寂文三初法佛子如來法輪悉入一切語言文字而無所住二喻譬如書字普入一切事至出世間處而無所住二合有二初合普入一切如來音聲亦復如是至一切報中而無所住以上法中但云入於一切語言今明入餘法則解類皆法輪也豈同三乘但用佛聲為輪等耶二正合前文入一切語一切衆生種種語言至言音實相即法輪故前五易故略不明之三結勸佛子菩薩摩訶薩於如來轉法輪應如是知二顯法輪所因三初辨法輪起之所因復次佛子菩薩摩訶薩至若干音聲而轉法輪因機差故若離物機佛無說故二明因所起佛子如來應正等覺有三昧名究竟無礙無良說法所依之定得究竟者唯佛有故名無畏者無礙辨才無所怯畏入此三昧已於成正覺至令一切衆生皆生歡喜輪既為力不同教須適宜差別三結其得文能如是知轉法輪者至不知是知則非隨順三總結佛子諸菩薩摩訶薩至普入無量衆生界故二偈頌有五頌分之為二初二偈頌法輪體用爾時普賢菩薩摩訶薩欲重明此義而說頌言如來法輪無所轉至能令衆生悉歡喜二有三偈頌法輪所因佛有三昧名究竟至如是自在甚奇特九出現涅槃轉化既周安住祕藏為物示滅故次明之然大涅槃蓋衆聖歸宗冥會之所寂寥無為而廣大悉備形色絶朕而識智難思今以無名強名亦為五別一者釋名梵語涅槃正名為滅取其義類乃有多方總以義翻稱為圓寂以義充法界德備塵沙曰圓體窮真性妙絶相纍為寂而言大者橫無不包豎無初際此約三德涅槃以解若約義開略明三義一者體大自性清淨故二者相大方便修淨纍亡德備故三者用大化用無盡故般者入義性入真入示現入故若圓融無礙即大涅槃二出體性涅槃既妙絶常數恬怕希夷雖回出百非而靡所不在今以義求不出三法即摩訶般若解脫法身以為其體所以三者翻三雜染故成智恩斷故成法門法性應化身故能證大智冥所證理纍永寂故然此三種不離一如德用分異即寂之照為般若即照之寂為解脫寂照之體為法身如明淨圓珠明即般若淨即解脫圓體法身約用不同體不相離故此三法不縱不橫不並不別如天之目如世之伊名祕密藏為大涅槃三顯種類雖理無不統義類塵沙今自狹之寬略分一兩或唯說一即大涅槃或說有二自有三門一餘無餘二性淨方便淨三真與應或分為三此有二種一約三乘二即自性真應或分為四一自性清淨涅槃二有餘依三無餘依四無住處有餘無餘義通大小今唯說大於三種內不明二乘餘皆具論融而無礙為大涅槃如文具之非獨應滅四彰業用囊括終古導達羣方靡不度生靡不成就故涅槃云能建大事則出現諸門皆斯用也然諸門廣義備於別章略在文具五釋文先長行分二初徵起佛子菩薩摩訶薩應云何知如來應正等覺般涅槃二正釋有十一體性真常二德用圓備三出沒常湛四虧盈不遷五示滅妙存六隨緣起盡七存沒互現八大用無涯九體離二邊十結歸無住然斯十段隨義雖殊皆含體用互相交徹顯大涅槃今初分三初舉法勸知佛子菩薩摩訶薩欲知如來至當須了知根本自性今初本自性者即下所列真如等十為真應涅槃之根本故體即自性清淨涅槃以出二礙名方便淨為真涅槃大悲應物亦此流故故名為本以是本故但了真如即了涅槃二指理同事如真如涅槃如來涅槃亦如是至如來涅槃亦如是皆云如者如即同義能同涅槃通真及應所同如等即自性涅槃故上句皆有涅槃之稱真應無本應非不生何出現之為妙故以本該末以體顯用令皆圓寂為大涅槃所以列十名者欲明究竟妙道窮理盡性無不同故德無盡故後之五句加際字者窮真於無真為真如際等故三釋顯同相何以故向言亦如是者云何如耶涅槃無生無出故若法無生無出則無有滅釋云如真如等不生滅故何以不生以但了因所顯非生因所生故既無有生亦非出障始既無生則永常不滅是知玄道存於妙悟在於即真即真則生滅齊觀齊觀則彼此莫二所以真如與我同根法性與我一體真既不滅應滅寧真是知涅槃名滅者斯乃在於無滅者矣二德用圓備謂如來身色相圓備常現大機衆生前故文二初標舉佛子如來不為菩薩至亦不為彼示現其事約人顯實云不為菩薩明說永滅是為二乘迹盡雙樹並為凡小據此亦名揀異灰斷二徵釋二初正徵釋何以故釋有二義為欲令見一切如來常住其前一令稱實見受用身即同法身常住其前涅槃經云涅槃不空者謂有善色常樂我淨故因滅無常獲此常故於一念中見過去未來至色相圓滿皆如現在二令見三際應用之身亦即是常是故經云皆如現在涅槃經云吾今此身即是常身法身下開栴檀座佛塔見三世佛無涅槃者楞伽經亦云有佛涅槃無有涅槃佛亦不起二不二想遠離能覺所覺故謂既知幽靈不竭妙色湛然三際大均何生滅之動靜故不起二也亦復不取此一常故無不二也二重徵釋何以故徵意云菩薩何以能不起相菩薩摩訶薩永離一切諸想著故釋云菩薩由了法空本無相著故既無心於動靜終不謂佛常與非常三出沒常湛佛子諸佛如來為令衆生至隨衆生心示現涅槃謂涅槃無為而無所不為無不為故能建大事不礙出沒以無為故住淨法界體常湛然不礙出沒顯迹為生即是有餘息迹為滅即是無餘故有餘無餘其為應物之假號耳體性常湛故存不為有亡不為無是知寂然不動未嘗無為應迹無方未嘗有為豈可隨於見聞以滯殊應之迹四虧盈不遷二初喻佛子譬如日出普照世間至但由器壞非日有咎二合佛子如來智日亦復如是至若心濁器破則不得見然法身無像故無器而不形聖智無心故無感而不應像非我有自彼器之虧盈心非我生豈普現之前後故梁攝論第十頌云衆生罪不見如月於破器遍滿諸世間由法光如日是以經言非日咎也持戒器破定水無依菩提器破智水寧止無信清珠心水渾濁何由見佛也然此文中雖明現身即是三德涅槃之中所流大用亦涅槃攝若爾寧殊出現之身出現則以法身為門而論真應非無般若解脫二德智慧日身無不照故永離戲論即解脫故醫王之喻即示滅故此有般若寧異菩提若分相說菩提但是能證之智唯是修生涅槃乃是所證之理唯約修顯故涅槃經說菩提必從生因所生涅槃必從了因所顯若攝相說菩提乃是即理之智涅槃乃是即智之理即智之理不礙摩訶般若即理之智不礙寂滅菩提智性本有亦是性淨涅槃修顯亦是方便淨也隨一為門則皆收盡即大涅槃真菩提也今以涅槃收之非唯菩提及身前後諸門皆從三德所流能建大事五示滅妙存佛子若有衆生應以涅槃至無生無歿無有滅度為物示滅即體無滅六隨緣起盡三初喻佛子譬如火大於一切世間至火皆滅耶答言不也二合佛子如來應生等覺至諸佛如來悉皆滅度以機喻薪涅槃喻火衆生善根未全成熟隨可熟者示成正覺而成熟之如為火事若有衆生所應度者皆已度竟則現涅槃寂無所為如火息滅故法華云佛此夜滅度如薪盡火滅然現滅現生皆是涅槃廣大業用故攝論第十詺涅槃如火既起滅在緣則益不可盈損不可虧云云自彼非佛然也三結佛子菩薩摩訶薩至如來應正等覺大般涅槃七存亡互現復次佛子譬如幻師至皆隱滅耶答言不也前喻唯約見滅見成此喻但約常見不見次合佛子如來應正等覺至便謂一切悉皆滅度由順機故此滅彼存非如來身不能長久後結佛子菩薩摩訶薩至如來應正等覺大般涅槃八大用無涯復次佛子如來應正等覺示涅槃時入不動三不動三昧者究竟寂滅也由寂無動故無所不動耳入此三昧已於一一身至化度一切衆生未曾失時謂正示涅槃而便分身處無邊座窮於來際涅槃經說受純陀供處大同於此而佛數少機不同故九體離二邊佛子如來身者無有方處非實非虗身若是實有不可滅身若是虗何能起滅若有方所此現彼無由非實故起滅無恆由非虗故能無不現無方所故感處即形但以諸佛本誓願力衆生堪度則便出現本願力故化周法界隨堪度故見則不同菩薩摩訶薩應如是知如來應正等覺大般涅槃十倍歸無住佛子如來住於無量無礙至無生無滅及以實際上來九門初門之中多顯其體餘八皆以體用雙明今此分二上通結前來九門之體下通結中間八門之用為諸衆生隨時示現正顯於用本願持故顯用所因無有休息皆窮來際此下明用分齊不捨一切衆生一切剎一切法誰獨非涅槃而欲捨之耶是則初住實際故不住生死後不捨衆生故不住涅槃由雙住故能俱不住前即大智後即大悲大悲般若常所輔翼所以名為無住涅槃自性涅槃衆生等有二乘無學容前前三唯佛世尊獨言具四故就無住總以結之即安住涅槃建大事也二偈頌有六分五初頌第四爾時普賢菩薩摩訶薩欲重明此義而說頌言如日舒光照法界至衆生無信見涅槃二頌第六如火世間作火事至化事訖處示終盡三頌第七幻師現身一切剎至於餘國土常見佛四頌第八佛有三昧名不動至壽命莊嚴皆具足五頌第十如無生性佛出興至一切義成無與等初句無生之生次句無滅之滅次句結歸涅槃無名後句結其大用無盡此二無礙是無住義餘不頌貴含在其中
