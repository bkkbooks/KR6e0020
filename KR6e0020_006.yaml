body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第十釋文第一會中前總四十衆大分為二初一同生餘是異生故地論云解脫月是同生衆故又云同生衆請則知兼有地前明知不約地位餘釋云云不符論意云何名為同異生耶然有二義一謂雜類作諸異生種種形故菩薩得法性身同人作一類菩薩形故二菩薩為同者通諸位故神等為異法界差別德故其四十衆文皆有三一標數辨類二列名結數三攝德圓周今初同生衆三初標數辨類有十佛世界微塵數標數也下辨世界略有三類一世界二種三海今云世界則非種非海權實共許一三千界一佛化境故或名佛剎佛土皆準此也微塵者七極微量也謂抹三千界並為微塵一塵為一菩薩則數已難量矣況舉十數表無盡耶菩薩摩訶薩所共圍繞辨類也即揀非餘衆具云菩提薩埵摩訶薩埵今從略耳然有三釋一菩提是所求佛果薩埵是所化衆生即悲智所緣之境從境立名故名菩薩二菩提是所求之果薩埵是能求之人能所合目故名菩薩三薩埵此云勇猛謂於大菩提勇猛求故摩訶云大大有四義一願大求大菩提故二行大二利成就故三時大經三無數劫故四德大具足一乘諸功德故前二通地前後二或唯地上更有諸大亦不出此此等並是舍那佛內眷屬動止常隨故云所共圍繞二列名結數者夫聖人無名為物立稱雖得名千差而多依行德行德皆具而隨宜別標文二初列十同名其名曰普賢菩薩摩訶薩先十同名普者顯具法界總相德故後十異名者顯具法界別相德故總別相融同一法界今初十名之普是別之總普下十異顯即普能別普義方成此是古今諸佛同行普賢之行隨於諸位差別不同縱成正覺亦普行攝故先明之言普賢者體性周遍曰普隨緣成德曰賢此約自體又曲濟無遺曰普鄰極亞聖曰賢此約諸位普賢又德周法界曰普至順調善曰賢此約當位普賢又果無不窮曰普不捨因門曰賢此約佛後普賢位中普賢悲智雙運佛後普賢智海已滿而運即智之悲寂而常用窮未來際又一即一切曰普一切即一曰賢此約融攝所以先列者為上首故法門主故法界體故一切菩薩無不乘故無一如來非此成故令諸聞者見自身中如來藏性行普行故上雖多義離釋今從別稱合釋無處不賢名曰普賢即體普也此一為總餘九為別普德最勝燈光照菩薩摩訶薩二德普謂稱性之德充於法界以為最勝委照無遺如燈之光普光師子幢菩薩摩訶薩三慧普遍照嚴剎決定高出故普寶𦦨妙光菩薩摩訶薩四行普內行圓淨智𦦨外燭故稱為妙普音功德海幢菩薩摩訶薩五音普具一切音演佛淨土深廣高出之行故普智光照如來境菩薩摩訶薩六智普照佛法界無盡境故普寶髻華幢菩薩摩訶薩七心普智寶嚴於心頂通行等華高出物表故普覺悅意聲菩薩摩訶薩八覺普遍覺性相聲皆悅機故無不歸者普清淨無盡福光菩薩摩訶薩九福普障無不淨稱真無盡故普光明相菩薩摩訶薩十相普無光相之光相遍益衆生故六相圓融思之二列十異名海月光大明菩薩摩訶薩十德十山皆依大海十地十度皆依佛智海中看月淨而且深依智嚴剎深而且淨如海即大如月即明故以名也雲音海光無垢藏菩薩摩訶薩講如雷震故曰雲音辨才泛灩猶如海光又海上有光天涯無際佛智起用一念普周淨惑無窮名無垢藏功德寶髻智生菩薩摩訶薩修治二嚴猶如淨寶祕密高顯故有髻言功德自在王大光菩薩摩訶薩法王出現作用自在二嚴圓滿為功德光善勇猛蓮華髻菩薩摩訶薩勇猛化生不染化相雨法玄妙如解髻珠普智雲日幢薩摩訶薩慈雲智日互相資映長劫普應高出如幢大精進金剛菩薩摩訶薩堅利智慧與精進俱故得稱大智為行本若為壽因香焰光幢菩薩摩訶薩戒等行發是為香𦦨種智高直故曰光幢大明德深美音菩薩摩訶薩智光遍照是大明德稱真適物名深美音大福光智生菩薩摩訶薩大智發光遍照佛境令福非福相所以稱大二結略顯廣如是等而為上首有十佛世界微塵數三攝德圓滿二初別歎勝德二初二句就緣歎此諸菩薩往昔皆與至共集善根修菩薩行前句往因同行顯主伴有由毗即遍也盧遮那光明照義回就方言應云光明遍照然有二義一身光遍照盡空法界乃至塵道二智光遍照真俗重重法界身智能所合為一身圓明獨耀具德無邊故立斯號又毗者種種義盧遮障義那者盡義入義即種種障盡種種德圓故普賢觀經云釋迦牟尼名毗盧遮那遍一切處即身亦遍非唯光遍又云其佛住處名常寂光即土亦光矣又云常波羅蜜所攝成處我波羅蜜所安立處即德圓義又云淨波羅蜜滅有相處即障盡義又云樂波羅蜜不得身心相處不見有無諸法相處即證入義又云如寂解脫乃至般若波羅蜜是色常住法故明皆即應即真為本師矣此經文證本品當辨言共集善根即備道資糧修菩薩行即作所應作云何共集互為主伴故主伴有三一回向主伴二同行主伴三如相主伴皆稱共集皆從如來善根海生後句從德海生明長為輔翼謂佛德無邊積集妙寶智定盈洽故稱為海從生有四一從自佛善根海生謂已圓十身故二從本師海生佛為勝緣曾已攝受授法令行得成滿故三與遮那同於餘佛海生以上云共集故四從法性佛海生以上德海諸佛共同平等一味但稱性修即是從生不揀自他故梵本云與佛同一善根海生第二就行德以歎夫大士必崇德廣業虗心外身崇德故進齊佛果廣業故行彌法界虗心故智周萬法而不為外身故功流來際而非已故德難名矣略分為三初自分因行德三初自利行圓諸波羅蜜悉已圓滿諸度行滿謂六度十度八萬四千多劫積集究盡事理故云圓滿慧眼明徹等觀三世十眼明徹分別名慧照矚稱眼障翳斯盡智無不矚故云明徹五眼之中慧眼觀理理無異味故云等觀十眼之中慧眼觀事事無不見故名等觀是則委見其事為明深達其性為徹欲以一眼合諸具通事理但舉其慧於諸三昧具足清淨深定已滿三昧者此云等持遠離沉掉平等持心趣一境故而云諸者其餘諸緣亦一境故真如三昧為其定體隨境入別塵數多端故云諸也橫則無定不窮竪則深入無際故云具足定障永亡故云清淨二利他行滿有三句即三輪化益辨才如海廣大無盡語含四辨即正教輪辨謂巧顯深理才謂巧應機宜萬法咸演則廣大無涯千難殊對則無竭盡故如海也又海遇風緣則洪浪雲涌智逢機請則口辨波騰請者既許無邊辨亦廣大無盡具佛功德尊嚴可敬身業神通輪謂三業無失智深叵撓為具佛功德故得外儀儼若肅然可敬知衆生根如應化伏意業記心輪根義總明文含性欲言如應者根有生熟化不失時器有大小授法無謬化謂教化即應攝受者而攝受之伏謂調伏即應折伏者而折伏之由此具行入正法故三證理位極亦三句入法界藏智無差別證理法也謂以大智證入平等真法界藏依佛性論說有五藏一如來藏謂在纏含果法故二自性清淨藏謂在纏不染三法身藏謂果位為功德所依四出世間上上藏謂出纏超過二乘菩薩五法界藏謂通因果外持一切染淨有為故名法界內含一切恆沙性德故復名藏此義寬通故今證入言智無差別者所證之藏平等要無分別方契此則智自無差即由上義能所不殊又此能證智與所證藏冥合一味無有境智之異故云無差此復有二一同無相故下經云無有少法為智所入亦無少智而入於法二同法界故則能所各互攝盡故下云無有智外如為智所入智攝如盡故亦無如外智能證於如如全攝故若皆一味豈令智同於境而無智耶古德釋云智相盡故不有能令智相盡故不無不爾豈令諸相皆盡而智獨存是故於境則不礙真而恆俗於智則不礙寂而恆照即境智非一境則不礙俗而恆真智則不廢照而恆寂即境智非異境則空有無二智則寂照雙融故云無差別也上來所釋約真理寂寥與止寂相順俗諦流動與觀照相順起信等中且為此釋未盡其源以令照真不得名照照俗之時不即寂故今正釋者謂言用則同而異由境不能照智有照故言寂則異而同境智無異味故同故無心於彼此忘心契合故異故不失於照功智異木石故故真智照理境則唯寂智則寂而常照若約照俗則以後得智照差別之境若約融真俗者境則真俗不二智則權實雙行亦為一味而不失止以雖雙行而即寂故若約三觀及融境智至下常辨證佛解脫甚深廣大證果法解脫者謂作用自在如不思議法品說於一念中建立三世一切佛事等總有十種廣如彼說即用而真故甚深用無涯畔故廣大上窮彼際故云證也能隨方便入於一地至恆與智俱盡未來際得位極謂普賢身遍於六位隨在一位以願海力持於一切故舊經云在於一地普攝一切諸地功德今此文順西國若順此方應云能以方便隨入一地以願海力攝持一切地也然有引梵本廣明此中句數開合不同不必應爾何者夫譯梵為唐誠乃不易苟文小左右貴於旨不乖中若理不可通則正之以梵本譯人意近則會之以舊經言異意同何必廣引言恆與智俱者明智窮來際文含二義一望前謂雖在因中一地而願力持一切地功德皆與智俱盡未來際不離一地如一地餘地亦爾是故因門盡於未來但是一一諸位菩薩不見作佛時二望後以盡未來之大智入如來之果海也雖有二義順前義勝二勝進果行德二初得果法了達諸佛希有廣大祕密之境入佛密境此有二意一佛即密境以三業業具非餘測故謂非色現色摩尼不能喻其多非量現量應持不能窮其頂不分而遍一多不足異其體全為法身一毛不可窮其際此身祕密也佛言聲也非近非遠目連尋之無際身子對而不聞非自非他若天鼓之無從猶谷響而緣發無邊法海卷之在一言無內圓音展之該萬類是謂佛口密也意則無私成事等覺尚不能知密之至也皆廣大無涯超絶奇特故云希有二佛之密境謂即一乘如來知見禪定解脫深入無際帝網之境時乃說之故云希有久默斯要甚為祕密又權實隱顯唯佛方知故云祕密今洞見其源故云了達善知一切佛平等法入佛平等亦有二意一佛佛平等謂一切諸佛體性平等法身無二故智慧平等德無增減故內用平等悲願普應故二佛所證法平等即第一義此二無二稱此而了故名善知已踐如來普光明地明得佛位謂佛有十地如大乘同性經說一甚深難知廣明地乃至第十名毗盧遮那藏海智地此十同是佛地約德用成別今普光明當其第一普即廣義光明即明甚深難知此文雖略義在普中舉初攝後理實皆踐又普光明亦十地之總總不出於普法智光故入於無量三昧海門證佛三昧謂海印等定皆深廣如海並通一實故得稱門二起果用文有三業於一切處皆隨現身世法所行悉同其事一現佛身業遍世同事總持廣大集衆法海二同佛意業總持大法辨才善巧轉不退輪三得佛語業能轉法輪不退有四一稱理不退無改說故二應機不退無虗發故三利益不退聞已必定故四制伏不退天魔外道不能動故復有四種不退謂信位證念今當第四念不退也三二行無礙德謂引攝佛德不礙修因故文有五句一切如來功德大海咸入其身一引攝佛德然有二義一則行成攝果二則諸佛同加一切諸佛所在國土皆隨願往二隨佛遍生不揀淨穢也已曾供養一切諸佛無邊際劫歡喜無倦三供佛集福十方無邊三世無際此一切佛皆供養故歡慶有遇不住福相故長時無厭一切如來得菩提處常在其中親近不捨四長為輔翼義通真應恆以所得普賢願海令一切衆生智身具足五悲願調生不以偏小利物唯以同體普願攝物令證菩提方顯智體圓足二總結多門成就如是無量功德無得而稱也菩薩之德焉言不可周宜以類取故云如是無量第二異生衆中總三十九衆相從為三第一雜類諸神衆第二八部四王衆第三欲色諸天衆今初有十九衆通名神者靈祇不測故文皆三假初金剛神衆三初標數辨類復有佛世界微塵數標數執金剛神辨類也以執持此杵守護佛故然一一類皆通有所表如地表心地海表德海等觀其歎德則知通意今此表般若堅利導於衆行到彼岸故二列名結數所謂妙色那羅延執金剛神然諸衆立名皆隨所得法門為物立稱那羅延者此云堅固由見佛妙色皆不可壞故受此名日輪速疾幢執金剛神見佛身毛猶如日輪現種種光速摧障惱故名曰幢須彌華光執金剛神見佛身光映蔽一切猶如須彌顯于大海神通等法如華開敷故清淨雲音執金剛神圓音隨類如雷震故諸根美妙執金剛神現為世主以美妙根令物悟故可愛樂光明執金剛神智光演法令愛樂故大樹雷音執金剛神寶飾妙相如華嚴樹方便警物如雷震音師子王光明執金剛神福深相妙炳著光明如師子王處衆無畏密𦦨勝目執金剛神慈眼視物為吉祥目神通之𦦨密現物前蓮華光摩尼髻執金剛神雨此嚴具及光明故下諸衆皆類此知至得法處名當自顯恐厭繁文下略不釋如是等而為上首有佛世界微塵數三攝德圓滿十句分二初二句總彰願行皆於往昔無量劫中恆發大願願常親近供養諸佛由昔願力得預法會常為親侍隨願所行已得圓滿到於彼岸由今行滿故能遍侍二八句別顯滿相積集無邊清淨福業福積淨業於諸三昧所行之境悉已明達智達定境事定之境隨事百千理定之境即真如實相不思議定則以無礙而為其境今皆智照故云明達獲神通力隨如來住通隨佛住入不思議解脫境界入用難思處於衆會威光特達處衆超絶隨諸衆生所應現身而示調伏應物調生一切諸佛化形所在皆隨化往隨佛化形一切如來所住之處常勤守護護佛住處二身衆神三初標辨類復有佛世界微塵數身衆神有二義一身謂神之自身衆即同生同名及所隨者凡有其一必更有二共有其三三故名衆能所合目名身衆神二約所主謂此類神專以變化多身為佛事故二列名結數所謂華髻莊嚴身衆神光至有佛世界微塵數三攝德圓滿皆於往昔成就大願供養承事一切諸佛三足行神三初標數辨類復有佛世界微塵數足行神亦有二義一謂依止足行衆生及守護故如下善見比丘足行之神持華承足故下德中戀仰如來二足所行處即道路神通表修行履佛所行故二列名結數所謂寶印手足行神至有佛世界微塵數三攝德圓滿皆於過去無量劫中親近如來隨逐不捨四道場神三初標數辨類復有佛世界微塵數道場神從所依所守得名下諸神衆類皆同此言道場者非唯護佛道場但有莊嚴道場之處即於中護故下德中願供養佛表護萬行道場及修行者故二列名結數所謂淨莊嚴幢道場神至有佛世界微塵數三攝德圓滿皆於過去值無量佛成就願力廣興供養五主城神三初標數辨類復有佛世界微塵數主城神表行德防御法城心城故如摩耶處說二列名結數所謂寶峯光耀主城神至有佛世界微塵數三攝德圓滿皆於無量不思議劫嚴淨如來所居宮殿以己德行嚴佛宮殿者一佛殿為所守之最瑩飾為尊佛故二主伴善根互融攝故三瑩飾自心佛安處故六主地神三初標數辨類復有佛世界微塵數主地神表深重願荷負行德故亦表心地為依持故二列名結數所謂普德淨華主地神至有佛世界微塵數三攝德圓滿皆於往昔發深重願常親近諸佛如來同修福業七主山神三初標數辨類復有無量主山神通表萬德高勝性皆間寂別表智德最高故二列名結數所謂寶峯開華主山神至而為上首其數無量三攝德圓滿皆於諸法得清淨眼云清淨眼者名中多有光稱八主林神三初標數辨類復有不可思議數主林神表以無漏智導於衆行森聳建立故德中云皆有可愛光明二列名結數所謂布華如雲主林神至而為上首不思議數三攝德圓滿皆有無量可愛光明九主藥神三初標數辨類復有無量主藥神表行德伏惑資益法身若約利他則三業不空如藥樹王故下德中性皆離垢即伏惑去病也仁慈祐物即進善補益也二列名結數所謂吉祥主藥神至益氣明目主藥神總名主藥藥既不同神神各別吉祥者主香茅之類也清淨光明謂乳石之流名稱普聞如藥樹王雪山忍草等明見十方謂眼藥等約法準之如是等而為上首其數無量三攝德圓滿性皆離垢仁慈祐物十主稼神三初標數辨類復有無量主稼神稼者樹五穀也表萬行法味資益自他他益稱心故德中大喜成就二列名結數所謂柔軟勝味主稼神至而為上首其數無量三攝德圓滿莫不皆得大喜成就十一主河神三初標數辨類復有無量主河神即河伯之流也表法河流注潤益羣品又於生死瀑流拯彼漂溺江河淮濟清濁俱河故生死法流此皆神主二列名結數所謂普發迅流主河神至而為上首有無量數三結德圓滿皆勤作意利益衆生勤益生者謂遇㳂流則平波息浪逢泝泳則微動輕風水性之屬深止而住居陸行之流富生而應采導百川而去害灌萬頃而開利為勤作意利益衆生約所表法隨意消息十二主海神三初標數辨類復有無量數海神即海若之輩表具含萬德一一皆深廣也二列名結數所謂出現寶光主海神至海潮雷音主海神三名遠塵離垢者瑜伽八十六云現斷煩惱離故遠塵彼隨眠離繫故離垢今約近事塵謂塵境垢即煩惱六根對境了彼性空故曰遠塵衆惑不行誠為離垢心境相藉離垢由於遠塵如是等而為上首其數無量三攝德圓滿悉以如來功德大海充滿其身十三主水神三初標數辨類復有無量主水神通上河海等水及雨露霜雪等也表法水含潤等多義理故二列結數所謂普興雲幢主水神至而為上首其數無量三攝德圓滿常勤救護一切衆生而為利益拯溺為救濟危為護謂已溺邪見貪愛水者救之將沈者護之而為利益即雲雨等潤發生萬物也法合可知十四主火神三初標數辨類復有無數主火神即宋無忌之流也以顯知慧火燒煩惱薪成熟善品破無明暗耳二列名結數所謂普光𦦨藏主火神至而為上首不可稱數三結德圓滿皆能示現種種光明令諸衆生熱惱除滅夫火有二能一能為益二能為損今用益止損表法亦爾示慧光以去暗用益也除惑苦之熱惱止損也十五主風神三初標數辨類復有無量主風神通表方便無住無所不摧別表如下三列名結數所謂無礙光明主風神至而為上首其數無量三攝德圓滿皆勤散滅我慢之心十六主空神三初標數辨類復有無量主空神表法性空別即離染周遍等亦各如名辨二列名結數所謂淨光普照主空神至而為上首其數無量三攝德圓滿心皆離垢廣大明潔若情塵亂起翳本性空智日高升則情雲自卷空有日而廓爾無際智合理而杳然無涯故云爾耳十七主方神三初標數辨類復有無量主方神即東方青帝等類也表顯邪正方隅使行無迷倒二列名結數所謂遍住一切主方神至而為上首其數無量三攝德圓滿能以方便普放光明恆照十方相續不絶身智教光無不引攝名普放也無時不放所以稱恆如日周天故云相續不絶十八主夜神三初標數辨類復有無量主夜神表於無明黑暗生死長夜導以慧明令知正路二列名結數所謂普德淨光主夜神至而為上首其數無量三攝德圓滿皆勤修習以法為樂夜分亡寢是曰勤修翻彼長迷故以法為樂十九主晝神三初標數辨類復有無量主晝神於晝攝化顯行德常明也二列名結數所謂示現宮殿主晝神至而為上首其數無量三攝德圓滿皆於妙法能生信解恆共精勤嚴飾宮殿先修正解後勤正行有信無解增長無明有解無信還生邪見信因解淨解籍信深晝之義也上來多主器界故但名神準梵本除金剛神餘皆女神表慈育故菩薩同於彼類以攝衆生自下攝領有情皆受王稱並是丈夫第二八部四王衆文有八段前四雜類後四能統是天王所統是八部初阿修羅王三初標數辨類復有無量阿修羅王亦云阿素落梵音楚夏耳婆沙譯為非天佛地論云天趣所攝以多行諂媚無天實行故曰非天依阿毗曇亦鬼趣攝諂曲覆故正法念經鬼畜二攝以羅睺阿修羅是獅子子故伽陀經天鬼畜攝具上說故由此或開六趣或合為五多好鬪諍懷勝負故或居衆相山中或居海下如正法念說然有大力者廣修福故今之修福有懷勝負諂媚心者多生其中二列名結數所謂羅睺阿修羅王至妙好音聲阿修羅王羅睺此云攝惱以能將手隱攝日月令天惱故二毗摩此云絲也質多羅種種也謂此王能以一絲幻作種種事故如是等而為上首其數無量三攝德圓滿悉已精勤摧伏我慢及諸煩惱實者因果俱慢故權應偏摧非不斷餘故云及也二迦樓羅王三初標數辨類復有不可思議數迦樓羅王昔云金翅正云妙翅以翅有種種寶色莊嚴故此就狀翻若敵對翻此云大嗉項以常著龍於嗉中故此鳥能食魚龍七寶然鳥及龍各具四生謂卵胎濕化後後勝前前劣不能食勝謂卵生鳥不能食胎等勝能啖劣化食四生如增一辨以化食化暫得充虗亦表菩薩攝生故離世間品云菩薩迦樓羅如意為堅足乃至搏撮人天龍安置涅槃岸二列名結數所謂大速疾力迦樓羅王至普音廣目迦樓羅王大速疾力者增一中說此鳥食龍從金剛山頂鐵杈樹下入海取龍水未合間還至本樹是為速疾大海處攝持力者即是攝彼命將盡者食之而龍受三歸及袈裟一縷在身則不可取菩薩亦爾如前引離世間品說又出現云攝取善根熟衆生置佛法中此為命盡若心有邪歸斷見所覆則不可取普觀海者即周四天下求命盡龍如是等而為上首不思議數三攝德圓滿悉已成就大方便力普能救攝一切衆生大方便力即雖了衆生空而能入有是十力止觀也普能救攝即鼓生死大愛海水取善根熟者如出現品說三緊那羅王三初標數辨類復有無量緊那羅王緊那羅者此云疑神謂頂有一角形乃似人面極端正見者生疑為是人耶為非人耶因此立稱依雜心論畜生道攝亦云歌神以能歌詠是天帝執法樂神即四王眷屬表菩薩示衆生形而非衆生常以法樂娛衆生故二列名結數所謂善慧光明天緊那羅至而為上首其數無量三攝德圓滿皆勤精進觀一切法心恆快樂自在游戲要勤觀察則得法樂怡神自他兼樂為自在游戲四摩睺羅伽王三初標數辨類復有無量摩睺羅迦王摩睺羅伽此云大腹行即蟒之類亦表菩薩偏行一切而無行也二列名結數所謂善慧摩睺羅伽王至而為上首其數無量三攝德圓滿皆勤修習廣大方便令諸衆生永割癡網此類聾騃故令方便捨癡五夜叉王三初標數辨類復有無量夜叉王初一是北方天王即毗沙門是也若從能領是天衆攝今從所領為名然四王各領二部從一立稱夜叉此云輕捷飛空速疾故亦云苦活此天又領一部名羅剎此云可畏二別名結數所謂毗沙門夜叉王至力壞高山夜叉王毗沙門者此云多聞以福德之名聞四方故此一是天夜叉之王餘九是夜叉夜叉即王雖一是天又從所領況九皆夜叉故非天衆下三例然如龍中娑竭羅王豈是天耶如是等而為上首其數無量三攝德圓滿皆勤守護一切衆生此類飛空噉人故菩薩示為其王翻加守護亦令愛見羅剎不害法身慧命六龍王三初標數辨類復有無量諸大龍王亦初一是天即西方天王此王主二部謂龍及富單那當單那者此云熱病鬼也二列名結數所謂毗樓博叉龍王至無熱惱龍王毗樓博叉唐三藏譯云醜目毗樓醜也博叉目也日照三藏譯云毗遍也多也樓者具云嚕波此云色也博吃叉此云諸根也謂眼等諸根有種種色故以為名此不必醜娑竭羅此云海也於大海中此最尊故獨得其名德又迦舊云多舌以嗜語故正云能害害於所害德叉者能害也迦者所害也謂若瞋噓視人畜皆死也無熱惱者即阿耨達池之龍也諸龍有四熱惱今皆離故四熱至下當釋智度論云此龍是七地菩薩須彌藏經云是馬形龍主又一切龍總有五種形類一象形善住龍王為主二蛇形難陀龍王為主三馬形阿那婆達多龍王為主四魚形婆樓那龍王為主五蝦蟇形摩那斯龍王為主如是等而為上首其數無量三攝德圓滿莫不勤力興雲布雨令諸衆生熱惱消滅外則雲行雨施散去炎毒內則慈雲廣被法雨普霑散業惑之熱惱七鳩般茶王三初標數辨類復有無量鳩槃茶王初一是南方天王即毗樓勒叉此云增長主謂能令自他善根增長故此王更領一部謂薜荔多薜荔多者此云厭魅鬼餘如音義二列名結數所謂增長鳩槃茶王至而為上首其數無量三攝德圓滿皆勤修學無礙法門放大光明此類障礙深重故偏明無礙自學權實無礙法界智光以利衆生八乾闥婆王三初標數辨類復有無量乾闥婆王乾闥婆此云尋香謂諸樂兒不事生業但尋諸家飲食香氣即往設樂求食自活因此世人號諸樂人為乾闥婆彼能執樂故以名焉亦云食香止十寶山間食諸香粖即帝釋執樂神也帝釋須樂此王身有相現提頭賴咤即東方天王此云持國謂護持國王安衆生故此從所領為名更領一部名毗舍闍此云噉精氣謂噉有情及五穀精氣故二列名結數所謂持國乾闥婆王至而為上首其數無量三攝德圓滿皆於大法深生信解歡喜愛重勤修不倦大法即大緣起法也信解故歡喜深心故愛重既歡既重故不替修行第三欲色諸天衆天者自在義光明義清淨義智論云天有三種一人天謂帝王二生天謂欲色等三淨天謂佛菩薩第一義天今通後二然諸天壽之長短身之大小衣服輕重宮殿勝劣俱舍十一及瑜伽等論起世等經皆廣辨之恐繁不敘文中先有七段明欲界天後有五段明色界天前中即分為七初月天子三初標數辨類復有無量月天子月者缺也有虧缺故下面頗胝迦寶水精所成能冷能照表菩薩得清涼慈照生死夜如云菩薩清涼月等二列名結數所謂月天子至大威德光明天子初一是總雖標總稱即受別名下皆準此如是等而為上首其數無量三攝德圓滿皆勤顯發衆生心寶水珠見月則流潤發光淨心遇緣則慈流智發生了既發正因顯然生由性成則了非外入生與不生無二發乃發其本心故顯發雙辨二日天子三初標數辨類復有無量日天子日者實也常充實故下面亦頗胝迦寶火精所成能熱能照表菩薩智照故又日以陽德月以陰靈一能破暗表根本破惑一能清涼表後得益物又依寶性論法日有四一破暗如慧二照現如智三輪淨如解脫四上三不相離如同法界也二列名結數所謂日天子至普光明天子可畏敬幢者為惡者畏其照明為善者敬其辨業以斯超出故以名幢如是等而為上首其數無量三攝德圓滿皆勤修習利益衆生增其善根居者辨業成就本行等利益也生長穀稼開敷覺華等為增長善根如出現品三三十三天王三初標數辨類復有無量三十三天王佛地論等皆言妙高山四面各有八大天王帝釋居中故有三十三也下釋天名皆依佛地二列名結數所謂釋迦因陀羅天王至自在光明能覺悟天王釋迦能也因陀羅主也具足應云釋迦提桓因陀羅提桓天也即云能天主撫育勸善能為天主故更有異釋如音義說如是等而為上首其數無量三攝德圓滿皆勤發起一切世間廣大之業發起廣大業者令修普賢行故以此天居地天之頂總御四洲雖勝事頗多猶懼修羅之敵若修善者衆則天侶增威苟為惡者多則諸天減少故多好勸發況受佛付屬大權應為至如堅常啼之心施雪山之偈成尸毗大行破盧志巨慳談般若於善法堂中揚大教於如來會下等皆是發起廣大業也四須夜摩天三初標數辨類復有無量須夜摩天王須者善也妙也夜摩時也具云善時分天論云隨時受樂故名時分又大集經此天用蓮華開合以明晝夜又云赤蓮華開為晝白蓮華開為夜故云時分也隨此時別受樂亦殊故論云隨時受樂也二列名結數所謂善時分天王至而為上首其數無量三攝德圓滿皆勤修習廣大善根心恆喜足喜足在於第四今慕上而修五兜率天王三初標數辨類復有不可思議數兜率陀天王兜率陀此云喜足論云後身菩薩於彼教化多修喜足之行故得少意悅為喜更不求餘為足二列名結數所謂知足天王至而為上首不思議數三攝德圓滿皆勤念持一切諸佛所有名號彼天是諸佛上生之處故令修念佛三昧也召體曰名響頒人天為號通號別號皆悉念也不計一方故云一切以諸如來同一法界體德均故念即明記而慧逾增持而不忘故無間斷以佛為境何五塵之能惑哉六化樂天王三初標數辨類復有無量化樂天王論云樂自變化作諸樂具以自娛樂又但受自所化樂不犯他故名為善化也變謂轉變轉粗為妙化謂化現無而忽有二列名結數所謂善變化天王至而為上首其數無量三攝德圓滿皆勤調伏一切衆生令得解脫以出世化故得解脫七他化自在天王三初標數辨類復有無數他化自在天王論云令他化作樂具以自娛樂顯己自在故二列名結數所謂得自在天王至因陀羅力妙莊嚴光明天王寂靜境門者境為入理之處即是門也根無躁動故稱寂靜根即門也根無取著方見境空合為門也故鴦掘經云明見來入門具足無減修如是等而為上首其數無量三攝德圓滿皆勤修習自在方便廣大法門物我自在即廣大法門第二色界諸天衆有五衆以第四禪有二衆故然四靜慮攝天多少下經頻列至十藏品當會釋之多依十八初二三禪各攝三天皆舉最上以勝攝劣故但列一下文說頌遍觀諸天第四靜慮自攝九天上五小乘聖居非此正被異生位中廣果至極故今列之大自在天三千界主所以別列初大梵天王衆三初標數辨類復有不可數大梵天王佛地論云離欲寂靜故名為梵具云梵摩此云清潔寂靜謂創離欲染故名清潔得根本定名為寂靜二列名結數所謂尸棄天王至悅意海音天王尸棄此云持髻謂此梵王項有肉髻似螺形故亦名螺髻或云火頂以火災至此故貌如童子身白銀色衣金色衣禪悅為食如是等而為上首不可稱數三攝德圓滿皆具大慈憐愍衆生舒光普照令其快樂本修慈心得生梵世等流相續還慜衆生好請轉法故智光照物不為汙行故身光發揮若有遇之身心悅樂二光音天三初標數辨類復有無量光音天王二禪第三天也智論亦云第二禪通名光音彼天語時口出淨光故有云彼無尋伺言語亦無用光當語故名光音瑜伽名極光淨謂淨光遍照自他處故二列名結數所謂可愛樂光明天王至而為上首其數無量三攝德圓滿皆住廣大寂靜喜樂無礙法門定生喜樂離尋伺故得寂靜名然凡得之捨動求靜故非廣大味定之喜非無礙法今菩薩即動而靜不散不味是為廣大無礙法門也三遍淨天三初標數辨類復有無量遍淨天王此天離喜身心遍淨故二列名結數所謂清淨名稱天王至而為上首其數無量三攝德圓滿悉已安住廣大法門於諸世間勤作利益身心遍淨未為廣大物我無二普益世間方為廣大也四廣果天三初標數辨類復有無量廣果天王即第四禪第三天於異生善果此最廣故所有功德勝下三故二列名結數所謂愛樂法光明幢天王至而為上首其數無量三攝德圓滿莫不皆以寂靜之法而為宮殿安住其中此天離八災患世中最寂今以實智住本寂之宮五大自在天三初標數辨類無有無數大自在天王梵云摩醯首羅是也於三千界最自在故智論第二云此天有八臂三目乘白牛執白拂一念之間能知大千雨滴下經同此智論第一過五淨居有十住菩薩住所亦詺淨居號大自在天王又三乘中立此為淨土是報身所居約實但是第十地菩薩攝報之果多作彼王耳二列名結數所謂妙𦦨海天王至而為上首不可稱數三攝德圓滿皆勤觀察無相之法所行平等三千界頂非無相不超非離相求故所行平等然上釋名歎德多從義便以順類殊若約實德無不互有皆可虗求
