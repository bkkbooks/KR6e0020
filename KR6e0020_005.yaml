body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第九總釋名題分二初解經題二明品稱今初大方廣佛華嚴經總題包於別義該難思之法門無名之中強以十門分初一通顯得名二對辨開合三具彰義類四別釋得名五展演無窮六卷攝相盡七展卷無礙八以義圓收九攝歸一心十泯同平等今初諸經得名有其多種或以人為目或以法為名人有請說等殊法有法喻等別或體或用或果或因乍復乍單其類繁廣今經受稱亦多種不同一從數彰名如梁攝論第一勝相中云百千經者是華嚴經有十萬頌是也二從喻受名如涅槃及觀佛三昧經詺此經為雜華經以萬行交雜緣起集成故三從法彰名如智論釋屬纍品詺此經為不思議解脫經四從義用受名如下離世間品及出現品各有十名者是依今梵本云摩訶毗佛略勃陀健拏驃訶修多羅此云大方廣佛雜華嚴飾經今略雜飾字耳前三異名義多總略二品十目多從別義又局當品故今譯者具以六字為名則人法雙題法喻齊舉具體具用有果有因理盡義圓故標經首二對辨開合者題中七字有十事五對一教義相對謂經一字是能詮教大等六字是所詮義二就義中法喻一對謂大等是法華嚴是喻三就法中人法一對謂大方廣是所證無礙法佛是能證之人亦名境智一對四就法中揀持一對大之一字是揀方廣是持即揀大異小揀實異權揀果異因亦是體用一對大方是體大方無隅故廣即是用五就人中借下華字以喻其因即因果一對佛是果故是以單用華字則但舉喻因若合以華嚴則亦喻上之四字至下當明三具彰義類者謂大等七字義皆無量並略以十義釋之初明大義者一體大謂若相若用等皆同真性而常遍故即是大字涅槃云所言大者名之為常此明體不變易如人最長故名為大又云大者其性廣博猶如虗空此明體遍二相大謂恆沙性德無不具故互相即入微細重重等具十玄門皆其相故即經方字方者法也三用大謂業用周普如體遍故即經廣字涅槃云又大者能建大義即是約用良以涅槃無廣廣與大同故以廣釋大方廣無大大與廣合故以大釋廣今經具有故各配之四果大謂智斷依正並周法界故即經佛字五因大謂發菩提心起解行願證精勤匪懈成諸位故即經華字六智大謂大智為主運諸萬行遍嚴一切無所遺故即經嚴字七教大謂一文一句無不結通遍於一切十方三際重重無盡故即是經字八義大謂所詮法盡窮法界乃至帝網無所遺故即總題六字九境大以上法門普以無盡衆生為化境故十業大謂盡三際時窮法界處常將此法利益衆生無休息故如攝大乘等七種大性不離於此二方十義者方者法也即前十大皆名為法謂體法相法等三廣十義者廣者多也用多繁興包無不盡故則前十皆多即明一遍一切名之為大一攝一切名之為廣亦可及此此約離釋若合釋方廣二字亦有十義一廣依義謂若言教繁廣為生依故二廣說義宣說廣大甚深法故三廣破義破一切障無有餘故四廣超義無有諸法能比類故五廣治義具攝無邊對治之法為能治故六廣攝義通攝無邊異類法故七廣德義具攝二嚴諸勝德故八廣生義能生無量廣大果海故九廣絶義非是心識稱量所能知故十廣知義具足種智破邪見障無有餘故此之十義前四即雜集第十一中四義後六即入大乘論第一中六義四佛十義者即是十佛大即法界佛方即本性佛廣即涅槃佛及隨樂佛佛即成正覺佛華即願佛及三昧佛嚴即業報佛經即住持佛總不離心七字皆是心佛釋十佛義如八地中及離世間品辨又佛他論第一說佛亦具十義謂具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛又真諦引真實論亦有十義恐繁不引五華十義者一含實義表法界含性德故二光淨義本智明顯故三微妙義一一諸行同法界故四適悅義順物機故五引果義行為生因起正覺故六端正義行與願俱無所缺故七無染義一一行門三昧俱故八巧成義所修德業善巧成故九芬馥義衆德住持流馨彌遠故十開敷義衆行敷榮令心開覺故然華有二種一草木華喻萬行因然或因與果俱或不與俱二嚴身華通金玉等喻於神通衆相等唯與果俱前十義中一五九十局於草木餘通二華六嚴者即上十華同嚴一佛為嚴不同亦是十義又上十華如次嚴前十佛即是十義而總別無礙更有十義一用因嚴果以成人是華嚴佛由因得果故二以果嚴因以顯勝成果之後令一一因行皆無際故三以人嚴法而顯用謂佛曠劫修因方顯法之體用故四以法嚴人以顯圓若不得法之體用因果不能圓妙故五以體嚴用以令周謂用不得體不周遍故六以用嚴體而知本若無大用不顯體本之廣故七以體嚴相而知妙謂相若有體便即入重重故八以相嚴體以明玄無相不顯體深玄故九以義嚴教超言念由所詮難思能詮言離故十諸因互嚴以融攝如禪非智無以窮其寂智非禪無以深其照等又上來互嚴皆有相資相即四句今更約理行互嚴以明初相資四句者一理由修顯故以行華嚴理二行從理發則以理華嚴行梁攝論云無不從此法界流無不還證此法身故三理行俱融不二而二非真流之行無以契真非起行之真不從行顯良以體融行而因圓行該真而果滿是故標為佛華嚴也四理行俱泯二而不二以理之行故非行行之理故非理是則能所兩亡超情絶相非嚴非不嚴是謂華嚴相即四句理行全收準思可見則法喻交映昭然有在七經十義者雜心五義已見上文佛地論有二義一貫穿所說二攝持所化即雜心結鬘一義合之應除結鬘開成六義依此方訓復有四義一常二法並如前辨三經義即衆生徑路四典義令見聞正法故寶雲經中亦有十義恐繁不引第四別釋得名者先得後釋先得名者大以當體受名常遍為義常則豎無初際遍則橫該無外方以就法得名軌持為義雙持體相軌生物解故廣以從用得名包博為義包則廣容博則廣遍佛以就人得名覺照為義照則朗萬法之幽邃覺則悟大夜之重昏華以從喻得名感果嚴身為義感果則萬行圓成嚴身則衆德備體嚴以功用受名資莊為義謂資廣大之體用莊真應之佛身經以能詮得名攝持為義持性相之無盡攝衆生之無邊後釋名者一就法中體用相對大之方廣謂有體之相用故方廣之大有相用之體故皆依主釋若相即者即持業釋二就人中果行相望佛之華非因位之行故華之佛非餘行之佛故亦通相即三以人法相對大方廣之佛華嚴非小權乘之佛等故佛華嚴之大方廣非因位所得法故相即可知四教義相對亦通二釋教望於義及前人望於法兼通有財並可思準第五展演無窮者謂初於最清淨法界開為理智兩門即涅槃菩提之異又理開體用即大方廣智開因果即佛華嚴總連合成詮即題中經字又展此目以為初會初會總故十海是理十智是智十海之中含於體用十智之中亦含因果又華藏世界及遮那遍中即依正二果皆是佛字大威光太子略示因華彼二所證所觀即大方廣即總成一會所信因果體用又展此會以成後八四周因果各因是華果即是佛其所修所證之體用即大方廣又展九會遍周十方謂如第二會光明覺品辨一類之會已遍十方餘會亦爾又展此諸會各有主伴如說十住十方菩薩皆來證云十方國土皆說此法則前遍法界之會各有重重主伴乃至遍於塵剎異類界等無盡時會皆不出大方廣佛華嚴清淨法界第六卷攝相盡者謂從後漸卷乃至不出九會九會不離初會初會不離總題總題不出理智非理不智故理外無智非智不理故智外無理則理智不二亦攝智從理離體無用攝用歸體體性自離故體即非體本來清淨強名之清淨法界是以極從無盡乃至一字無字皆攝華嚴性海無有遺餘第七展卷無礙者謂正前展時即後常卷正後卷時即前常展展時即卷故無量無邊法門海一言演說盡無餘卷時即展故如來於一語言中演說無邊契經海第八以義圓收者上來諸門或以七字攝盡如前已辨或以教義攝盡或以理智攝盡或以人法攝盡或信解行證攝盡或唯普賢文殊毗盧遮那三聖攝盡謂大方廣即普賢普賢表所證法界故華嚴即文殊文殊表能證故佛即遮那具能所故又大即普賢普賢菩薩自體遍故方廣即文殊文殊表即體之智故華即普賢普賢行故嚴即文殊文殊以解起行故佛即圓解之行普賢文殊證法界體用之普賢文殊成毗盧遮那光明遍照第九攝歸一心者上來諸門乃至無盡不離一心一心即法界故起信云所言法者謂衆生心心體即大心之本智即方廣觀心起行即華嚴覺心性相即是佛覺非外來全同所覺故理智不殊理智形奪雙亡寂照則念念皆是華嚴性海第十泯同平等者為未了者令了自心若知觸物皆心方了心性故梵行品云知一切法即心自性成就慧身不由他悟然今學法之者多棄內而求外習禪之者好亡緣而內照並為遍執俱滯二邊既心境如如則平等無礙余曾瑩兩面鏡鑑一盞燈置一尊容而重重交光佛佛無盡見夫心境互照本智雙入心中悟無盡之境境上了難思之心心境重重智照斯在又即心了境界之佛即境見唯心如來心佛重重而本覺性一皆取之不可得則心境兩亡照之不可窮則理智交徹心境既爾境境相望心心互研萬化紛綸皆一致也唯證相應名佛華嚴矣二釋品稱世主妙嚴品第一梵云薩婆嚕雞印拏徠驃訶奈耶鉢攞叵婆娜忙鉢里勿多此云一切世間主莊嚴法門威德名品今文存略世者時也即是世間主者君也即諸王及佛然世間有三一器世間即是化處二衆生世間即所化機三智正覺世間即能化主主則為二諸王及佛主於器界及衆生故佛非世間從所統受稱妙謂法門體用深廣難思即主之所得嚴謂嚴飾乃有多義一器世間嚴謂其地堅固等二衆生世間嚴謂衆海各具法門威德故三智正覺世問嚴謂於一切法成最正覺三業普周法門無盡故所以長行諸王之嚴偈頌讚德皆顯嚴佛衆生不嚴不感佛興正覺不嚴不能為主器界不嚴非真佛處復由佛嚴顯遇者有德衆生嚴輔顯佛超勝如是互嚴亦為妙嚴諸經無此廣嚴但初名序品今唯明序已兼正故廣讚諸嚴以為華嚴之由序舊云世間淨眼品者謂所得法眼能淨世間故淨即嚴義餘如前說十別解文義二初總釋經序大周新譯大方廣佛華嚴經序天冊金輪聖神皇帝製蓋聞造化權輿之首天道未分龜龍繫象之初人文始著雖萬八千歲同臨有截之區七十二君詎識無邊之義由是人迷四忍輪回六趣之中家纏五蓋沒溺三塗之下及夫鷲巖西峙象駕東驅慧日法王超四大而高視中天調御越十地以居尊包括鐵圍延促沙劫其為體也則不生不滅其為相也則無去無來念處正勤三十七品為其行慈悲喜捨四無量法運其心方便之力難思圓對之機多緒混大空而為量豈算數之能窮入纖芥之微區匪名言之可述無得而稱者其唯大覺歟朕曩劫植因叨承佛記金山降旨大雲之偈先彰玉扆披祥寶雨之文後及加以積善餘慶俯集微躬遂得地平天成河清海晏殊祥絶瑞既日至而月書貝牒靈文亦時臻而歲洽踰海越漠獻賝之禮備焉架險航深重譯之辭罄矣大方廣佛華嚴經者斯乃諸佛之密藏如來之性海視之者莫識其指歸挹之者罕測其涯際有學無學志絶窺覦二乘三乘寧希聽受最勝種智莊嚴之跡既隆普賢文殊願行之因斯滿一句之內包法界之無邊一毫之中置剎土而非隘摩竭陀國肇興妙會之緣普光法堂爰敷寂滅之理惟奧義譯在晉朝時踰六代年將四百然一部之典才獲三萬餘言唯啓半珠未窺全寶朕聞其梵本先在于闐國中遣使奉迎近方至此既覩百千之妙頌乃披十萬之正文粵以證聖元年歲次乙未月旅沽洗朔惟戊申以其十四日辛酉於大遍空寺親受筆削敬譯斯經遂得甘露流津預夢庚申之夕膏雨灑潤後覃壬戌之辰式開實相之門還符一味之澤以聖曆二年歲次己亥十月壬午朔八日己丑繕寫畢功添性海之波瀾廓法界之疆域大乘頓教普被於無窮方廣真筌遐該於有識豈謂後五百歲忽奉金口之言娑婆境中俄啓珠函之祕所冀闡揚沙界宣暢塵區竝兩曜而長懸彌十方而永布一窺寶偈慶溢心靈三復幽宗喜盈身意雖則無說無示理符不二之門然因言顯言方闡大千之義輒申鄙作爰題序云二別解文義者然此經文富義博勢變多端況一義一文包攝法界是以古德用十例科判欲顯難思其第一名本末部類但顯此經無盡非科今文前已具明故今略之加前後鉤鎖亦有十例一本部三分科二問答相屬科三以文從義科四前後褶疊科五前後鉤鎖科六隨品長分科七隨其本會科八本末大位科九本末遍收科十主伴無盡科初本部三分者謂序正流通初品為序分現相品下為正宗分流通有無古有七釋一光統律師以法界品為流通由入法界廣無邊故二隋遠法師以法界品內善財下屬流通寄人顯法故三裕法師以法界品後偈為流通以歎德無盡故四有云末後二頌為流通以結說無盡歎德勸修故五或云經來未盡故無流通六或云以餘眷屬經為此流通以彼是此所流出故七或云此經總無流通以法無盡說無休息故故諸會各無流通不同大般若諸會皆有流通故此上七解各是一理而前六皆有第七獨無若義會之應成四句一有序正無流通如第七二唯正宗無二分由自初暨後皆顯玄微並悟物故初雖列衆而歎佛德後雖寄人有修相故三具三分四俱不可說即言亡言故約義包含不可局取今依具三以分三分之興彌天高判冥符西域今古同遵所以三者夫聖人設教必有其漸將命微言先彰由致故受之以序分由致既彰當機授法故受之以正宗正宗既陳務於開濟非但篤於時會復令末葉傳芳永耀法燈明明無盡故受之以流通非唯一部當會當品等皆容有之故依三也雖六解皆通今依第二以寄人進修示物有分流通相故故慈氏云若有敬慕心亦當如是學初之一解令正宗中闕於證入第三但屬善財之一相故末後二偈但結偈中佛德非通一部十行等末類有此偈經來未盡未必在後眷屬流通但約義故故依遠公二問答相屬科者古云此九會中大位問答總有五番第一會中大衆起四十問或當會答盡名舉果勸樂生信分二第二會初有四十問至第七會末答盡名修因契果生解分中間雖有諸問並是隨說隨問非是大位問答不思議品不問因故三第八會初起二百問當會答盡名託法進修成行分四第九會初起六十問如來自入師子頻申三昧現相答名頓證法界分五福城東善財求法等別問別答名歷位漸證分古德以善財猶屬正宗故今既判入流通則前唯四兼取流通以為五分未爽通塗三以文從義科者此經一部有五周因果即為五分初會中一周因果謂先顯舍那果德後遮那一品明彼本因名所信因果二從第二會至第七會中隨好品名差別因果謂二十六品辨因後三品明果亦名生解因果三普賢行品辨因出現品明果名平等因果非差別顯故亦名出現因果四第八會初名五位因後明八相果名出世因果亦名成行因果五第九會中初明佛果大用後顯菩薩起用修因名證入因果因果二門俱證入故各分因異果亦為十也四前後褶疊科者一部分二謂前九會是本會亦是佛會佛為主故從文殊至福城東已後並是末會亦是菩薩會以諸善知識為會主故二就前中亦二初八會明所成解行後一顯所證法界三就前中復二初七會明歷位修成行後一明圓融周普行四前中復二初明修生因果後普賢下二品明修顯因果五就前復二初明修生因後不思議法等三品明修生果六就前復二初明位中因行後十定下六品明位後之行七就前復二初明地前比行後第六一會明十地證行八就前亦二初位前十信行後第三會已去三會明入位三賢行九就前亦二初明所信佛果法後問明品下三品明能依能信菩薩行十就前中復二初會明佛依報果後名號下三品明佛正報果五前後鉤鎖科亦分為十一第一會為依報因果前明依報果後毗盧遮那品辨因二更取毗盧遮那及第二會初三品為正報因果前因後果三以名號至菩薩住處名依起因果依於本有而修起故前果後因四從問明品至隨好品明差別因果前因後果五取不思議下至普賢行品為圓融因果前果後因以不議等與前為果果別於因與後為果則一一融攝然有六義證成一因果相屬科中多先果後因故二四十八後未有證成普行後有證成者結屬前故三普賢行品初無別發起便即躡前云略示如來少分境故四以義明之不思議法顯佛德難思一一圓融故五前雖有問不思議品初重念問故六第二會初已有三業為差別果故由斯六義故普賢行品得屬前因六取普賢行及出現品為平等因果前因後果七取出現及離世間品為出現因果前果後因成佛涅槃亦因現故非說真成由離世間為因方能現世八離世間品為成行因果通辨行故具因果故九取離世間品及法界品為法界因果前因後果由離世間稱法界故故因不依位果唯證入十法界一品自為證入因果先果後因其善財已下亦為無盡因果先因後果故歷事至普賢一毛因則無盡普賢說佛德過虗空而果無盡以為流通故不明之六隨品長分科者長分有十一通辨教起因緣分二現相品下明佛果無涯大用分三毗盧遮那品舉彼往因證成分四名號下三品明大用應機普周分五問明品下至十地品末明諸位差別令修分六十定品下至隨好品末明差別因圓果滿分七普賢行品下二品明普行因成現果分八離世間品明因果超絶世間分九法界品中前分明大衆頓證法界分十爾時文殊下明一人歷位漸證分七隨其本會科者亦為十分一初會名舉果令信分二第二會明能信成德分三第三會初賢十住分四第四會中賢十行分五第五會上賢十向分六第六會聖位十地分七第七會因圓果滿分八第八會普賢大行分九第九會初行成證入分十善財下善友教證分八本末大位科者本會為九末會有五十五總為六十四分九本末遍收科者先九會為九分文殊為六千比丘說法為第十分及善財歷一百一十善知識總一百二十分若開諸龍及三乘會及彌勒後文殊普賢三人便成一百二十五以慈氏云此長者子經由一百一十善知識已然後而來至於我所則彌勒已前有一百一十故及三千大千世界微塵數善友其分數彌多若合為一則一百二十六分十主伴無盡科者一一會一一品一一法皆結通十方如此間說十方虗空法界一切世界乃至一切塵中皆如是說此結主經也又彼一一會等皆有他方塵數菩薩而來證法此結伴也即主伴相與周遍法界重疊無盡是則段數亦無盡無盡也上來十例各顯一理然亦無盡若依常用應依三分謂初品為序現相下正宗法界品內爾時文殊師利從善住樓閣出下明流通序中就文分二初此土序二結通十方無盡世界序初中復二初證信序後爾時如來道場下發起序然此二序廣如常解今但略陳初證信者若原其所由則阿難請問如來令置如智度論及大悲經說若核其所以意有六焉一為異外道故外道經首皆立阿優以為吉故此約如是二為息諍故智度論云若不推從佛聞言自製作則諍論起故今廢我從聞聞從佛來故經傳歷代妙軌不輟此局我聞三為離增減過故佛地論云應知說此如是我聞意避增減異分過失謂如是法我親從佛聞文義決定非謂傳聞有增減失四為斷衆疑故真諦引律云結集法時阿難升座變身如佛衆起三疑一疑大師涅槃重起二疑他方佛來三疑阿難轉身成佛說此如是我聞三疑頓斷既言我聞即非佛明矣上二義通約信聞五為生信故智論云說時方人令生信故此局後四六為順同三世佛故此通六種若準佛地論科為五事一總顯已聞二教起時分三別顯教主四彰教起處五顯所被機今依智論開初總顯已聞作信聞二種為六成就一信二聞三時四主五處六衆然信聞二事文局初首義通九會時主二種文義俱通處衆二事文義俱局隨相則爾約實互融上來略依三分二序然此經體勢少異故依五分釋文而合後二名依人證入就第一舉果分中或科為十一教起因緣分即初一品二大衆同請分三面光集衆分四毫光示法分五眉間出衆分已上在第二品內六普賢三昧分七諸佛同加分八法主起定分九大衆重請分已上在第三品內十正陳法海分在後三品內若以義從文且分為三一教起因緣分二現相下說法儀式分三世界成就下正陳所說分就初分中亦分為十初總顯已聞如是我聞謂如是一部經義我昔親從佛聞故佛地論云傳佛教者言如是之事我昔曾聞如是總言依四義轉一依譬喻二依教誨三依問答四依許可具如彼論餘更有釋意不殊前此上總合信聞若離釋者先釋如是信成就也智論云佛法大海信為能入智為能度信者言是事如是不信者言是事不如是故肇公云如是者信順之辭也信則所言之理順順則師資之道成經無豐約非信不階故稱如是有云聖人說法但為顯如唯如為是故稱如是此唯約所詮之理次真諦三藏云真不違俗名之為如俗順於真稱之為是真俗無二故稱如是此約所詮理事若云如斯之言是佛所說則唯約能詮有云如者當理之言言理相順謂之如也是者無非之稱此明說事如事說理如理明能詮之教稱於事理也融云如是者感應之端也如以順機受名是以無非為稱衆生以無非為感如來以順機為應經以言教出於感應故云如是此兼對機上來諸釋各是一塗更有諸釋言異意同若依生物之信應如智論及佛地論合釋若取敵對阿優應如真諦所釋今當廣之外謂阿之言無優之言有萬法雖衆不出有無此則斷常之計今云如即真空是即妙有既無有外之真故空而非斷無真外之俗故有而非常即對破邪宗以彰中道一代時教不出於斯故云如是若華嚴宗以無障礙法界曰如唯此無非為是應隨教門深淺以顯如是不同二我聞者聞成就也將欲傳之於未聞若有言而不傳便是徒設不在能說貴在能傳故次明我聞我即阿難聞謂親自聽聞云何稱我即諸蘊假者此用何聞若依大小乘法相各有三說一耳聞非識二識聞非耳三緣合方聞然或具四緣八緣等雖因耳處廢別從總故稱我聞法雖無我言語便故隨順世間故稱我聞非邪慢心而有所說若依無相我既無我聞亦無聞從緣空故而不壞假名即不聞聞耳若約法性此經旨趣傳法菩薩以我無我不二之真我根境非一異之妙耳聞無礙法界之法門也然阿難所不聞經或云展轉傳聞或云如來重說或云得深三昧自然能通上皆就迹而說實是大權菩薩影響弘傳如不思議境界經斯為良證但隨機教別故見聞不同二標主時處一時佛在摩竭提國阿蘭若法菩提場中即三成就言一時者時成就也時者亦隨世假立時分一者揀異餘時如來說經時有無量不能別舉一言略周故云一時如涅槃云一時佛在恆河岸等即法王啓運嘉會之時也亦可機教一時謂上言如是言雖當理若不會時亦為虗唱今明物機感聖聖能垂應凡聖道交不失良機故云一時佛者主成就也具云㪍陀此云覺者謂自他覺滿之者雖具十號佛義包含故偏明之義見題中在摩竭下處成就也真身無在而無不在故次辨之摩竭提國者通舉說處此云無毒害以國法無刑戮故表能化法或云遍聰慧聰慧之人遍其國故表所化機阿蘭若法者別舉說場也阿蘭若此云無喧諍即事靜也法者所證真理二障業苦喧雜斯盡也事理俱寂故加法言菩提場者菩提云覺即能證大智圓明究竟也場者證菩提之處也然事處即天地之中王舍城之西二百里金剛座上約法則萬行皆是道場理智相會之所故為表所說如所證故不移其處說之若圓融時處等並如前說三別明時分始成正覺前標一時未知何時故今別顯是初成佛時亦彰大師出現時也此教勝故衆教本故在於初時初言尚總幾日之初九會之文同此初否略為三解一約不壞前後相說才成初七說前五會第二七日說十地等第九一會乃在後時以祇園身子皆後時故常恆之說不妨後時雖能頓說有所表故初五信解行願最在初故故皆云不離道樹第六會因地證位居其次深故無不起菩提樹言法界極證最在於後故亦顯二乘絶見聞故雖異處別時亦不相離為寄穢土以顯淨故須前後耳若爾世親那云初七不說但思惟行因緣行耶世親才見十地即為論釋或則未窮廣文或則知見有異未全尅定菩提流支意大同此二順論釋九會皆在二七日後二七非久亦名始成三約實圓融釋皆在初成一念之中一音頓演七處九會無盡之文海印定中一時印現以應機出世機感即應應即有說無非時失故祇園身子蓋見九世相收重會之言亦猶燈光涉入故法界放光亦見菩薩遍坐道場成正覺故此經十地之初無二七之言二七之言順別機故故諸經論顯初說時有多差別謂普耀密迹二經第二七日即說三乘法華過三七日方云說小四分律中六七興顯行經七七五分八七智論五十箇七日有云與十二游經一年大同時既不定說亦不同皆根器所宜見聞有異約佛赴機無時不說望器無感未曾有說登地常見一味之經就佛而言無說不說若攝方便皆一乘之印現差別耳無涯之說不應局執故應總攝以為十重如前已辨上顯時分次釋成正覺義約教不同小乘三十四心斷結五分法身初圓名成正覺是實非化大乘之中約化八相示成約報十地行滿四智創圓名曰始成正覺據實即古今情亡心無初相名之曰始無念而照目之為正見心常住稱之曰覺始本無二目之為成約法身自覺聖智無成無不成若依此經以十佛法界之身雲遍因陀羅網無盡之時處念念初初為物而現具足主伴攝三世間此初即攝無量劫之初無際之初一成一切成無成無不成一覺一切覺無覺無不覺言窮慮寂不壞假名故云始成正覺如出現品及不思議法品廣顯攝前諸說皆一乘之所現也四別顯處嚴者然此下處主及衆即三世間嚴三中前二即如來依正衆即淨土輔翼不空今初器界嚴者即廣於前場之嚴顯成前覺之妙異於餘經之處於中四事各十種嚴明即染顯淨即為四別第一地嚴第二樹嚴第三宮殿嚴第四師子座嚴然此諸嚴各具三釋一約事可知二表法謂地表心地法身樹表菩提宮殿表無住涅槃座表法空等三就因行謂一以窮心地法身之因報得增上金剛之地二以般若為因三以悲智相導為因四亦以法空為因然或一因行成一切嚴或一切行成一嚴或一行成一嚴或一切行成一切嚴以通融別純雜無礙今但明一行一嚴顯所表故然各攝無盡之德故四事皆有十句初總後別今且就文各分為四初心地十句分四初一總顯地體其地堅固金剛所成標以堅固釋以金剛諸教或云木樹草座多云座是金剛今全地金剛則權實斯顯徹華藏故廣如彼品二四地相具德上妙寶輪及衆寶華至諸色相海無邊顯現約因釋者一寶輪者一攝一切圓行致故二及衆寶華開覺悅他故三清淨摩尼圓淨明徹故以上三行用嚴心地故結云以為嚴飾上皆形色四即顯色謂青黃等殊名諸色相種種重疊深廣如海互相映發等彼波瀾或諸色俱生或更相攝入含虗瑩徹現勢多端名無邊顯現此由隱顯自在定散無礙隨機利行之所致也三四地上具嚴摩尼為幢常放光明至妙香華纓周匝垂布一寶幢曲有五句一摩尼為體二三光音明用四五網纓辨飾就因行者降魔伏外為幢智光常照慈音外悅願行交羅戒香芬馥四攝周垂故摩尼寶王變現自在雨無盡寶二摩尼雨寶表神通如意隨機變現雨法寶故及衆妙華分布於地三妙華散地亦多因行遍嚴心故寶樹行列枝葉光茂四寶樹行列德行建立故四一舉因結用佛神力故令此道場一切莊嚴於中影現佛力者出所因也嚴具多門別說難盡故總云一切悉現或於樹中現或於上諸嚴具及地中現明一一行中皆道場故第二覺樹嚴者即大智因感有十一句分四初一總顯高勝其菩提樹高顯殊特長聳逈露圓妙獨出故約因即智超數表為高本性不昧為顯成物具德曰殊更無二真為特約果樹即菩提二六體攝衆德金剛為身一身是金剛金剛三昧本智因故正行成立為樹身也琉璃為幹二斡是琉璃本智發解內外明徹故衆雜妙寶以為枝條三雜寶枝條解隨境差故寶葉扶疏垂蔭如雲四條假葉以為嚴智資定而深照寶葉雖異共成一蔭百千定門同歸一寂自蔭蔭他也寶華雜色分枝布影五寶華異色在樹分枝承光則色同於地布影表神通等法依定有差俱承智光影現心地復以摩尼而為其果含輝發𦦨與華間列六華雖不同果皆如意無邊行海同趣菩提若自利果成內則含輝若身心湛寂外便發𦦨若觸境斯明若利他果立未熟則含輝解生佛相已熟則發𦦨還流教光體如之行所成果無異因之果故與華間列故下經云菩薩妙法樹生於直心地等三三妙用自在其樹周圓咸放光明至其衆如雲俱時出現展轉成益也初依菩提智放教智光次依智光雨圓明法寶後教成悲智即菩薩現前無心行成故如雲出四一舉因結用又以如神威神力故至說種種法無有盡極謂佛力為因流音演法以如如力則智演法音音還如性故無盡極廣多故無盡豎長故無窮無間故稱恆也第三明佛宮殿嚴十句分四初一總明分量如來所處宮殿樓閣廣博嚴麗充遍十方宮可覆育即是慈悲殿可朝宗所謂圓寂悲智相導若樓閣相依廣者無邊法無外故博者不隘法內空故嚴者莊飾具衆相故麗者華美法義備故充十方者稱法性故二二體相圓備衆色摩尼之所集成種種寶華以為莊嚴一體是摩尼積德鎔融之所成故二相嚴多種神通等法悲寂用故三六妙用自在諸莊嚴具流光如雲一衆行發光灑法如雲雲更多義至下當辨從宮殿間萃影成幢二光幢獨出萃者聚也即承光聚影而成謂悲寂交際承智起應降魔超出故無邊菩薩道場衆會咸集其所三內容衆海無邊菩薩即道場外者亦在其中即依中有正亦果中有因即明涅槃衆聖冥會以能出現諸佛光明不思議音摩尼寶王而為其網四聲光寶網網者為防禽穢以益殿嚴猶大教網外防惡見內益悲寂教皆圓妙以寶而成故能出佛智光圓音妙說言不思議音略有四義一音聲繁廣二所說難量三聲即無聲四一具一切如來自在神通之力所有境界皆從中出五出生果用即正報大用在此依中依正混融參而不雜明依大涅槃能建大義故曰出生一切衆生居處屋宅皆於此中現其影像六無染現染衆生是正居處是依染違性淨不言出生妄無自體還依真現四一舉因顯廣又以諸佛神力所加一念之間悉包法界謂德廣難陳故今總結由佛力故一念頓包事理染淨一切法界況多念耶然上充遍十方即通局無礙集菩薩衆出佛神通即攝入無礙現生舍宅即染淨無礙悉包法界廣狹無礙一念即能延促無礙又集菩薩因果無礙出佛神通依正無礙十種宮殿此應說之第四師子座莊嚴十句分四初一總顯形勝其師子座高廣妙好師子座者人中師子處之又說無畏之法故得法空者何所畏哉空乃高而無上深不可測廣而無外邊不可窮妙乃即事而真好謂具德無缺二六體德圓備摩尼為臺一臺座摩尼即處正中正可依處摩尼隨映有差法空隨緣成異中道妙理正是可依蓮華為網二周座華網即外相無染交映本空清淨妙寶以為其輪三淨實為輪輪謂臺之處中周匝輪圍即具德周遍衆色雜華而作纓絡四華纓周垂諸覺諸通垂化周攝堂榭樓閣階砌戶牗凡諸物像備體莊嚴五寶嚴瑱飾堂等略舉凡諸總包無處不嚴故云備體顯於法空全收萬像無事非理故寶樹枝果周回間列六寶樹間飾間上物象也即菩薩妙法樹隨化分枝隨因感果並依無相義曰周回凡聖相資名為間列三二妙用廣大摩尼光雲互相照耀一淨寶出光如雲涉入法空亦爾一一智中知一切法一一法體顯一切智為互照也十方諸佛化現珠王至悉放光明而來瑩燭二主伴寶用互相發輝謂佛化摩尼能作佛事智論云輪王寶珠但隨人意能雨寶物天寶堪能隨天使令佛寶十方能作佛事菩薩寶珠亦能分作如文殊師利冠中毗楞伽寶珠十方諸佛於中顯現今菩薩髻珠即是其類下文雲集菩薩髻珠亦爾用此嚴座者凡初成佛皆一切諸佛現形灌頂一切菩薩親授敬養故因果寶珠俱來瑩燭如來從果起用故云化現理圓解滿義曰珠王菩薩心頂智照圓淨故曰髻中妙寶寂照照寂皆瑩淨照燭四一佛加廣演復以諸佛威神所持至妙音遐暢無處不及佛境如空故云廣大有感斯至為無不及顯教皆從法空所流是故所流還周法界非智不顯故云佛力第五明教主難思前但云佛未顯是何身佛又前但云始成正覺未知成相云何故今顯之謂具十種深廣功德即是遮那十種無盡法界身雲遍於法界成正覺也非權應身文二初總辨爾時世尊處于此座於一切法成最正覺即菩提身具無盡德為世所尊座相現時身即安處智處諸法無前後故於一切法示所覺境即二諦三諦無盡法也成最正覺示能覺智開悟稱覺離倒為正至極名最獲得名成此當相解若揀別者凡夫倒惑佛覺重昏二乘雖覺不名為正但知法有未知法空但悟我空未知我有有厭生死空說涅槃顛倒未除豈得稱正設許稱正亦未名最菩薩雖正有上有修不得稱最設位極稱最亦未得名成我佛獨能故云成最正覺謂如量如理了了究竟已出微細所知障故二別釋即約十德別顯十身文即分十一三業普周即別顯菩提身之相也以成菩提時得無量清淨三輪故文二初法智入三世悉皆平等意業即釋上成正覺言前云於一切法此云三世乃橫豎影略耳智入平等是正覺成也智即二智三智四智無障礙智二智者即如理如量也此復有二一以如量智達俗名入三世如理智證真名悉平等故佛地論云以二智覺三諦是也二證差別性即無差別故三世即平等瑜伽云如其勝義覺諸法故名等正覺言三智者即俗智真智中道智也此亦二義一真俗互泯雙遮辨中則三世平等二相兩亡方為智入二真俗雖即而不壞相即雙照明中此二覺三諦之境境既雙泯而雙現智亦寂照而雙流為無障礙智覺無障礙境為正覺也言四智者即圓鏡等四智也通緣三世境故並入三世言平等者鏡智離分別故依持平等平等性智證平等性故妙觀察智觀察平等成所作智普利平等四智圓融一句攝盡下身語等皆是四智之所發現四智圓融無二性故修生本有非一異故不失經宗然上能覺即成上菩提就其所覺即法身也理智無二為真法身其身充滿一切世間身業通三世間故云一切此正覺身以是十身之總故此其身通於三身無不充滿法身普遍世所同依故智身證理如理遍故色身無礙亦同理遍並是圓遍而非分遍謂一切世間一一纖塵等處佛皆圓滿總看亦現別看亦現又國土等即是我身土等體外無別我故我即土等我之體外無土等故餘一一身互望融攝猶多燈光各互相遍其音普順十方國土語業順有三義一順異類言音經云一切衆生語言法一言演說盡無餘故二順所宜說法如來於一語言中演說無邊契經海故三則順遍佛以一妙音周聞十方國故二喻譬如虗空具含衆像至於諸國土平等隨入通喻三業然佛三業非喻能喻唯虗空真如略可顯示更以餘喻便為謗佛然虗空喻有同不同故下經云解如來身非如虗空一切妙法所圓滿等此顯不同今取分同義同義多種如下十忍品今有二喻開成四義一含攝喻兼無分別義二普遍喻兼遍入義以此四喻喻意業者下經云佛智廣大同虗空故此總喻量智包含而普遍理智無分別而證入又大圓鏡智純淨圓德現種依持能現能生身土智影即含攝義下經云菩提智普現一切衆生心念根欲等而無所現無所現言無有分別平等性智觀一切法自他有情悉皆平等亦無分別無分別言顯無差別故下經云於一切義無所觀察等見以太虗含衆像衆像不能含太虗太虗不分別衆像衆像乃差別太虗以況我法不能容佛智佛智乃能容我法有我法者分別如來是如來者不分別我法二普遍喻妙觀察智無不遍知即普遍義成所作智曲成無遺即隨入義又下經云佛智廣大同虗空普遍一切衆生心此即智體遍悉了世間諸妄想此約智用遍又云得一切法界量等心此約證遍智性全同於色性故此約理遍云何遍入不壞能所有證知故故下經云世聞諸國土一切皆隨入智身無有色非彼所能見由隨於如即入無所入故云平等是以虗空遍入國土國土不遍入虗空有國土處必有虗空有虗空處或無國土虗空之於國土平等隨入國土之於虗空自有彼此虗空可喻佛智國土可喻三世三世有處佛智必在其中佛知知處三世或無其體佛智之於三世平等隨入三世之於佛智自有始終此猶約不二而二說耳若二而不二國土虗空三世佛智同一性故皆互相入舉一全收普遍亦然三世間圓融則言思道斷故名佛智為不思議也次以一喻喻身業者一毛尚容法界全分必含衆像出現身業第二喻云譬如虗空寬廣非色而能顯現一切諸色而彼虗空無有分別亦無戲論合云如來身亦復如是一切衆生諸善根業皆得成就即含攝義而如來身無有分別即第二義佛身充滿於法界即普遍義又云譬如虗空遍至一切色非色處非至非不至如來身亦復如是遍一切法一切國土等即普遍義亦非至非不至即平等隨入義後以四義喻語業者如來於一語言中具一切語言故舍支天鼓無心出故如來音聲無不至故應知如來音聲無斷絶普入法界故又云如來音聲無邪曲即平等義隨其信解令歡喜故即隨入義以空一喻遍喻三業故云正覺得無量清淨三輪明文照然非是穿鑿二威勢身超勝身恆遍坐一切道場至如日輪出照明世界謂隨諸有情所樂示現受用身土影像差別無不周遍故言一切道場者略有十種一智身遍坐法性道場二法身非坐而坐道場三法門身安坐萬行道場四幻化身安坐水月道場此四義便故來若正約威勢身略辨六類道場一遍一切同類世界道場如名號品等說二一切異類世界謂樹形等如世界成就品三一切世界種中四一切世界海中並如華藏品說五一切微塵中文云如於此會見佛坐一切塵中亦如是等六剎塵帝網無盡道場并前十種故云一切言菩薩下正顯威勢超勝勝於勝者故獨言菩薩非不超餘如日下約喻以顯映山出沒無隱顯故處處全現無異體故喻遍坐道場大明流空餘輝掩耀赫日之照難究其涯喻彼威光超映菩薩菩薩不能測也既云照世則終益生盲先照高上獨言菩薩三福德身深廣三世所行衆福大海悉已清淨三世佛德昔皆遍學今三際已斷垢習斯亡故衆福皆淨四隨意受生身而恆示生諸佛國土一隨他意處處受生二隨自意能無不生謂慈悲般若恆共相應感而遂通窮未來際五相好莊嚴身無邊色相圓滿光明遍周法界等無差別色無盡故名色無邊十蓮華藏微塵數相名相無邊而皆稱真則一一無邊諸相隨好放光常光皆稱法界故云圓滿廣處狹處皆圓現故名無差別六類身演法演一切法如布大雲謂雨大法雨斷一切疑故下經云毗盧遮那佛願力周法界一切國土中恆轉無上輪然經二句上法下喻文含多意一雲喻於身雨為說法法喻影略又先興慈雲後霑法雨一雲一雨所潤不同亦隨物機宜雲雨各異掩塵蔽日普覆無心等七化身自在謂於大衆會能現無邊作用差別皆自在故一一毛端悉能容受一切世界而無障礙廣容無礙謂於如來身一一毛頭容一切剎而無障礙無礙有二義一以一小毛現多大剎則一多大小無礙二此毛多剎與彼毛多剎參而不雜則隱顯無礙各現無量神通之力教化調伏一切衆生普遍無礙以廣容不礙普遍故還於前毛內剎中神力調生若廣遍十方示現種種變化三業成所作事居然易了八法身彌綸身遍十方而無來往以法為身本來湛遍故無來往依法現色還如法身在此即是在彼亦不待往來九智身窮性相之源智入諸相了法空寂相別曰諸性皆空寂性靜故寂相無故空十力持身能持自他依正三世諸佛所有神變於光明中靡不咸覩持正報身神謂妙智變謂現身轉變變現俱名為變皆能持之尚持於他況於自事後段亦然一切佛土不思議劫所有莊嚴悉令顯現持依報土橫盡諸土豎窮諸劫所有嚴事常持令現上約十身若約三身者則初三段皆名報身而恆下化身身遍十方下法身就報身中前一自受用報後二即他受用報故云處菩薩衆以諸教中說三身四身成說等別今皆圓融於一始成無不頓具十身為正三四義兼又毛內調生光中持剎如空普遍等亦即國土等十身三世間圓融豈報化之云別是知略以十德歎於教主其一一德無不圓融當去情思之矣第六明海衆雲集衆雖深廣難測略啓十門一集意二集因三辨類四定數五權實六地位七前後八有無九聞不聞十釋文今初來至佛所何所為耶有十義故一為影響為主伴故二為作輔翼得圓滿故如普賢等常隨之衆三為守護如來如執金剛等諸佛住處常勤護故四為莊嚴如道場神等常為嚴淨佛宮殿故五為供養如偈讚即正行供養華幢等即財供養故六為發起此經諸請難者即其事故七為聞法獲益當機領悟即其類故八為表法諸首諸林表信行等皆同名故及座出菩薩等顯奇特故亦通表萬行俱成佛故九為順證佛菩薩等證說不虗故十為翻顯即聲聞不聞顯法不共故為斯多意所以衆海雲集非唯證信而已也第二集因亦有十因一曾與毗盧遮那如來同集善根故二蒙佛四攝曾攝受故三往在生死聞圓法故四曾發大心護一切故五往發大願願事佛故六隨逐如來無厭足故七樂聞正法心無倦故八善能散滅我慢心故九福智已淨身周遍故十同一法性善根大海之所生故為此多義得預斯會中有集因亦通集意及隨諸衆各有別因可以思準第三辨類即上集意便成十類一影響衆二常隨衆三守護衆四嚴會衆五供養衆六發起衆七當機衆八表法衆九證法衆十顯法衆準前可知第四定數者稱法界衆焉能數知即文而言九會都數總有一百七十五衆都序之中有四十一衆謂同生有一異生三十九師子座中一若兼取前菩提樹中所流及宮殿中無邊菩薩總四十三衆此四十三遍於九會第一會中有二衆謂新集十方衆佛眉間衆添成四十五第二會有新舊二衆第三四會各有四衆謂新舊及證法衆天衆第五會一百一十一衆謂新舊衆升天品內供養衆有一百七并天衆證法衆第六會四衆謂天衆同生異生證法衆七八兩會各唯一衆謂普賢等舊衆第九會三衆謂菩薩聲聞及天王等舊衆舊衆雖重隨會別故並皆取之然此諸衆或總為一一乘衆故或分為二以有實衆及化衆故或可為三人天神故或分為四佛菩薩人非人故或五非人開天神故或六加畜生故或七天分欲色或八菩薩有此界他界故或九他方有主伴故或十加聲聞故或一百七十五如前說故或無量無邊義類多方故一一或以剎塵數等為量故又如新集菩薩毛光出衆例上皆爾故一一衆皆無分齊此猶約相別若融攝一一會中皆具一百七十五衆以稱法界緣起之會互相在故上且約一界若通十方及異類剎塵帝網無盡無盡是謂華嚴海會衆數第五權實者夫能對揚聖教影響其迹靡不是權當機之流多皆是實諸教所明穢土之中雜類菩薩聲聞皆通權實地前是實地上是權法身無生生五道故淨土菩薩唯實實報生故雜類聲聞是權攝論云欲令淨土不空化作雜類衆故若依此經同生異生皆通權實海印定現實德攝故隨緣隨位而示現故第二會初云莫不皆是一生補處故對前十類辨權實者影響一衆自有二類一果德衆謂能加證法諸佛互為主伴非權非實若位極菩薩影響一向是權故有經云昔為釋迦師今為佛弟子二尊不並化故我為菩薩等當機唯實餘八通權實第六地位者有說一切皆是果位以是舍那海印現故或說一切皆因果海非可見聞世尊亦是因者識所現故或皆通因果果不捨因隨類現故因位願力助佛化故當機之流正修趣故或俱非因果緣起大衆同真性故將此對前權實則果位一向權因位通權實若對前十類影響證法通因果餘八唯因因位高下難以準定第七前後者初列菩薩後列餘衆者表從本以起末下讚即後明菩薩者表尋末以歸本良以本末無二故二文互舉又從本流末必先小後大故自在天為末攝末歸本必從深至淺故先明自在然皆顯法界緣起逆順自在故也又表四十位一一皆徹因門並該果海故互舉前後令物不作優劣之解故第八有無者亦有十類一約界無無色二約趣無地獄此二非器故若約轉生有地獄天子若約所益亦通無色三界皆益故三約洲但列閻浮餘三略無故或成難故四約乘無二乘不共教故下為顯法亦不見聞故智度論云若小乘經初唯列聲聞若大乘經初具列菩薩聲聞若一乘經初唯列菩薩故指此為不共教或大乘經唯列小者為引攝故如金剛經或唯列大亦屬大乘主伴不具故主伴具者必是一乘五約部無四衆未說小教故六約主無人王王未知故七約三聚無邪定彼障隔故生盲之流但冥益故八約內外無外道非彼測故九約諸天無無想入邪定故十約善惡無惡魔不為違害天中攝故上十且隨相說圓融應有即無所不具第九聞不聞者約權前後皆互得聞約實當會自聞縱不起前而趣於後亦各不相知若約頓機許一時頓領上之九門且從顯著略為此釋中本廣本或隱或顯不可執文
