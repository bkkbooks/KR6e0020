body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第二普德淨光夜神寄離垢地善友義如前說文則具六且分為四初依教趣求爾時善財童子了知彼至夜神初發菩提心先念前法有十一句初一念發心餘十念得法所生菩薩藏所發菩薩願至至普德淨光夜神所二見敬咨問頂禮其足繞無數匝至云何成就菩薩地三稱讚授法二初讚夜神答言善哉善哉至修行出生及以成就二授亦二先長行三初正授法門二初總答所問善男子菩薩成就十法能圓滿菩薩行先標次徵何者為十次釋一者得清淨三昧常見一切佛初總餘別二者得清淨眼常觀一切佛至無量諸佛法光明海是智法光明五者知一切如來一一毛孔至利益無量一切衆生放光利益六者見一切如來一一毛孔出一切寶色光明𦦨海常光發𦦨七者於念念中出現至調伏衆生不思議自在力後結善男子菩薩成就此十種法則能圓滿菩薩諸行二別示己法二初標名體善男子我得菩薩解脫名寂靜禪定樂普游步謂契理無著為寂靜止觀雙運為禪定正法樂住為樂大用無涯為普游步二廣顯業用四初明攀緣如實禪普見三世一切諸佛至悉皆明覩而無取著同如來清淨禪即寂靜業用以見佛無著故寂靜上標次徵何以故後釋釋云所以無著者窮了如來之體性故文有十非大同中論八不知諸如來非去世趣永滅故至非滅無有生相故謂不去不來不生不滅為四非實住如幻法故非妄利益衆生故非實非妄即是不常非遷超過生死故非壞性常不變故非遷非壞即是不斷一相言語悉離故一相即非異無相性相本空故無相亦非一二現法樂住禪即定業用二初牒前起後善男子我如是了知至分明了達成就增長二正顯四禪初初禪思惟觀察即是尋伺當對治支堅固莊嚴猶是尋伺之相不起一切妄想分別即離所障然世禪但離欲惡不善今一乘深妙故離一切妄想大悲救護一切衆生即利益支謂離自憂念衆生憂故生喜樂一心不動修習初禪即所依支謂彼二依止二二禪息一切意業即滅覺觀攝一切衆生是一心智力勇猛是內淨無覺無觀喜心悅豫是定生喜樂修第二禪即彼二依止下三四禪準此三三禪思惟一切衆生自性即捨念二支謂捨離前攝生之喜於此捨中不失念故厭離生死即慧樂二支謂正知生死不可喜故厭離即得真寂之樂修第三禪四四禪悉能息滅一切衆生衆苦熱惱通其三支謂苦憂喜樂皆是衆生熱惱於下苦中橫生樂故四受俱亡故云悉能息滅即捨念清淨既無苦樂即是中受修第四禪三引生功德禪增長圓滿一切智願至游戲一切神通游戲神通即普游步義成就一切變化以清淨智普入法界上來皆約一乘異於三地寄法乃至云普入法界四饒益有情禪種種方便無不饒益亦普游步義文三初令修四念處等觀善男子我修此解脫時至出離於家入於非家上二階普游步業用二明作道因緣若有衆生住於空間至亦歎親近善知識行三令修四正斷復次善男子我修解脫時至乃至令成一切智智道場成正覺至得見如來普現一切剎頌前十法文小不次初四如次頌前四法五超頌第七六頌第六七却頌第五八頌第十九頌第八十頌第九二有二頌頌謙己推勝諸佛出世間量等衆生數至非我所能知三有一頌頌指示後友此近有夜神名喜目觀察汝應往詣彼問修菩薩行四戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去第三喜目觀察衆生夜神寄發光地文具六段初依教趣求二初依前友教念友成益爾時善財童子敬善知識至轉於法輪憶持不忘二趣求後友得友加持四初欲趣後友作是念已發意欲詣喜目觀察衆生夜神所二得友加持時喜目神加善財童子至能不離本處遍至十方謂加令知近友之益三加所成益時善財童子遽發是念至而能遍往十方國土謂依前能加而起念故如次以此十句對前十句四正明趣後爾時善財童子至即詣喜目觀察衆生夜神所二見敬咨問見彼夜神在於如來至坐蓮華藏師子之座但略明見已含敬請三示己法界謂懸為示相義當問答三初標名體入大勢力普喜幢解脫無不攝伏為大勢力遍稱羣機故云普喜摧伏高顯所以名幢二正明業用三初顯無涯之用謂毛孔身雲無有盡故文二初出演說修行身三初總標於其身上一一毛孔至皆令歡喜而得利益亦是釋名二別顯十度初施所謂出無量化身雲至內外悉施難捨能捨二戒出等衆生數無量化身雲至令諸衆生悉得成熟三忍又出等衆生數種種身雲至如是方便成熟衆生四進又出等衆生界種種身雲至如是方便成熟衆生五定又出種種無量身雲至愛重於法修習增長六慧又出等衆生界種種身雲至皆令歡喜成一切智七方便又出等衆生界種種身雲至皆令究竟得一切智八願又出一切世界微塵數身雲至如是所作恆無休息九力又出等一切衆生心數身雲至令諸衆生至一切智十智又出等一切衆生心數至解求一切智無有退轉上之十度其間深旨如理思之三類通餘法如說菩薩諸波羅蜜至種種行法而為利益種種行法謂神通度生菩提分等二出演說本行身四初出能說之身復於一一諸毛孔中至周遍十方充滿法界二明演法之聲於彼一切衆生之前至摩尼寶王聲三顯所說之法二初說本行十度行法以如是等種種音聲至於己身心惡作惡說惡作屬身惡說屬口忍一切業皆不失壞至起一切智行成一切佛法次禪度有六句行禪波羅蜜其禪波羅蜜名體所有資具資緣所有修習造修所有成就獲得所有清淨治障所有起三昧神通所有三昧海門皆悉顯示起用下之五度句雖多少例此可知行般若波羅蜜至所有清淨大智慧日日約破暗大智慧雲雲約演法大智慧藏藏顯包含大智慧門皆悉顯示至所有修行所有體性體性通事理所有理趣理趣謂意趣所有清淨所有相應事至皆悉顯示成熟衆生二類通所餘行法又說此神從初發心至分別顯示成熟衆生具四菩薩行思之三彰說之益如是說時於念念中至令無量衆生住如來地二覩用獲益即入法界文三初顯證因緣爾時善財童子見聞如上至承佛威力及解脫力二正明證入則得菩薩不可思議大勢力普喜幢自在力解脫三徵釋所由何以故與喜目夜神至堪修普賢菩薩行故三慶益稱讚十偈分四初現說之因爾時善財童子得此解脫已至以偈讚曰無量無數劫學佛甚深法隨其所應化顯現妙色身二有一偈現說之意了知諸衆生沈迷嬰妄想種種身皆現隨應悉調伏三現說體相皆即寂之用法身恆寂靜清淨無二相至普攝諸羣生四有二偈總結現說無礙了知諸有海種種業莊嚴至示現世間相三明出所因二初興二問爾時善財童子說此頌已至得此解脫其已久如二具二答二初以偈答總九十一頌分之為二初答發心久近十初寂靜音劫正是發心之時文六初總標爾時喜目觀察衆生主夜神以頌答曰我念過去世過於剎塵劫剎號摩尼光劫名寂靜音二有八偈顯其本生百萬那由他俱𦙁四天下至照及千由旬三有十偈明發心本事日光既已沒音樂咸寂然至放大光明海四有一偈正顯發心見已心歡喜便生此念言我願得如佛廣大神通力五有六偈明發後之德我時尋覺悟大王并眷屬至其心無忘失六有五偈轉值餘佛從此後供養十億那由佛至入於解脫海未得慧眼者未得十解正慧明故二有四偈半明天勝劫從此次第有一切寶光剎至無而計為有無而計為有者未解即心自性故三有五偈半明梵光明劫從此復有劫名曰梵光明至而入諸佛海未能明了法者未了十行真實行法故四有五偈半明功德月劫次後復有劫名為功德月至入於諸法海未得善巧回向深智趣佛智海故五有六偈明寂靜慧劫此後復有劫名為寂靜慧至於彼修諸行未得地上二空真如清淨法故六有六偈明善出現劫次第復有劫名為善出現至離諸障礙道未淨修道之障故七有六偈明集堅固王劫次第復有劫名集堅固王至未能成就忍未得六地緣生深順之忍八有五偈明妙勝主劫次第復有劫名為妙勝主至供養無不盡修最勝道者六地般若為勝道故九有五偈明千功德劫次第復有劫名曰千功德至深入諸法海未得八地淨無生忍故十有四偈半明無著莊嚴劫次第復有劫名無著莊嚴至我悉曾供養但言供養者下明得法故又前次第皆言未得後後則已得前前思之亦可初劫已得初地未得第二乃至第九未得第十地第十劫中方得圓滿故其劫名亦順地義如文思之二答得法時節即前無著劫得此法也於中有二初有四偈得無功用之三地次有佛出現名為功德幢至成就如來力謂八地無依無願九地滅定總持十地成如來力二結成普賢行位三初牒舉大心之始見衆生顛倒執常樂我淨至起於大願雲二有二偈半明成德之終從是修功德趣入方便道至一切無礙行三有一偈總結圓滿佛子我爾時得入普賢道了知十法界一切差別門因果圓融初後該徹故入普賢道二會古今善男子於汝意云何至如是利益一切衆生四謙己推勝善男子我唯得此大勢力至能知能說彼功德行五指示後友善男子此衆會中同在證位故有一夜神名普救衆生妙德起精進行為普救衆生智𦦨吉祥稱為妙德矣汝詣彼問菩薩云何入菩薩行淨菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去
