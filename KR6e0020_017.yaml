body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經二無盡光明輪海此下九海文皆有二初牒前海為所依諸佛子此離垢焰藏香水海南皆不牒中海為所繞故云南也第三海去但言右旋不云南者十海如環繞於中海故不正南也如以十疊繞於一盤方所可見又第二已去或無蓮華者前總釋種中云或有依蓮華住或有依海故或無也二明能依之海二初明海華剎種次有香水海至以一切佛功德海音聲為體二明所持剎二十重此中最下方有世界至佛號蓮華光歡喜面上一世界文即有七後一文八加純淨故中間唯三謂相去數量剎名佛號餘八海例然此上過佛剎微塵數世界至佛號法界淨光明三金剛寶𦦨光明海二初牒前海為所依諸佛子此無盡光明輪香水海右旋二明能依之海二初海華剎種次有香水海名金剛寶𦦨至一切如來名音聲為體二明所持之剎二十重此中最下方有世界至佛號大變化光明網四帝青寶莊嚴海二初牒前海為所依諸佛子此金剛寶𦦨香水海右旋二明能依之海二初海華剎種次有香水海名帝青寶莊嚴至無邊佛音聲為體二明所持之剎二十重於此最下方有世界至佛號解脫精進日五金剛輪莊嚴海二初牒前海為所依諸佛子此帝青寶莊嚴香水海右旋二明能依之海二初海華剎種次有香水海名金剛輪至普賢智所生音聲為體二明能依之剎二十重此中最下方有世界至佛號最勝覺神通王六蓮華因陀羅海二初牒前海為所依諸佛子此金剛輪莊嚴底香水海右旋二明能依之海二初海華剎種次有香水海名蓮華至一切佛智光音聲為體二明所持之剎二十重此中最下方有世界至有世界名真珠華藏真珠藏者即蚌類也佛號法界寶光明至佛號遍照世間最勝音七積集寶香藏海二初牒前海為所依諸佛子此華因陀羅網香水海右旋二明能依之海二初海華剎種次有香水海名積集寶至以一切佛法輪音聲為體二明所持之剎二十重此中最下方有世界至佛號示現無畏雲八寶莊嚴海二初牒前海為所依諸佛子此積集寶香藏香水海右旋二明能依之海二初海華剎種次有香水海名寶莊嚴至佛剎神變聲為體二明所持之剎二十重此中最下方有世界至佛號普眼大明燈九金剛寶聚海二初牒前海為所依諸佛子此寶莊嚴香水海右旋二明能依之海二初海華剎種次有香水海名金剛寶聚至方便法音聲為體二明所持之剎二十重此中最下方有世界至佛號清淨眼十天城寶牒海二初牒前海為所依諸佛子此金剛寶聚香水海右旋二明能依之海二初海華剎種次有香水海名天城寶堞至平等法輪音為體二明所持之剎二十重此中最下方有世界至佛號普照法界無礙光文並可知有欲解釋剎中佛名足可留思入第十經三明十海所管之海一海各管不可説佛剎塵數現文但各説十即為百海亦有剎種及所持剎十海即為十段但記次前十海之名此文居然易了十段中一一有二初標能管之海以定方即前右旋初海爾時普賢菩薩復告大衆至彼離垢𦦨藏香水海東二列所管之海次第於所管中各有三節初能管海邊鄰次列九次有香水海名變化微妙身至世界種名寶𦦨燈唯此一段九中闕一二總結一海所管之大數如是等不可説佛剎微塵數香水海三廣最近輪圍一海於中文皆有二初舉海種名體其最近輪圍山香水海至世界海清淨劫音聲為體二所持之剎亦皆二十重於中超間文皆四節初舉下層此中最下方有世界至佛號最勝三昧精進慧二超至第十此上過十佛剎微塵數世界至佛號無障礙法界燈金剛幢者即中央香海剎種中第十重剎三超至第十三此上過三佛剎微塵數世界與娑婆世界齊等以等此中央娑婆故有世界名放光藏佛號遍法界無障礙慧明四超至第二十此上過七佛剎微塵數世界至佛號覺分華更至第二十重者以最上故言最上者剎種最上若二十重最上何以得此最上之名設不欲繁文何以不加乃至最上耶然超間者意存略故云齊等者恐失次故又上下橫豎皆相當故又此隨所管海有不可説皆望本能管之海隨其方面一道布列故下但云此海之外不言右旋等初標能管之海以定方即前右繞次海諸佛子彼無盡光明輪香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名具足妙光至名毗琉璃末種種莊嚴二總結一結所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至以一切佛摧伏魔音為體二所持之剎亦二十重四初舉下層此中最下方有世界名𦦨炬幢佛號世間功德海二超至第十此上過十佛剎微塵數世界至佛號師子力寶雲三超至第十三此上與娑婆世界齊等至佛號一切智海王四超至第二十於此世界種最上方有世界至佛號善變化蓮華幢初標能管之海以定方即前右繞第三海諸佛子彼金剛𦦨光明香水海外二列所管之海次第三初從能管海邊類次列九次有香水海名一切莊嚴具至善化現佛境界光明二總結一海所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海二初舉海種名體其最近輪圍山香水海至種種言説音為體二所持之剎亦二十重四初舉下層此中最下方有世界至佛號無盡相光明普門音二超至第十此上過十佛剎微塵數世界至佛號福德雲天威勢三超至第十三此上與娑婆世界齊等有世界至佛號勝慧海四超至第二十於此世界種最上方有世界至佛號智日蓮華雲初標能管之海以定方即前右繞第四海諸佛子彼帝青寶莊嚴香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名阿修羅宮殿至名如來身光明二總結一結所管大數如是等不可説佛剎微塵數香水海三廣説最近輪圍一海初舉海種名體其最近輪圍山香水海至菩薩智地音聲為體二所持之剎亦二十重四初舉下層此中最下方有世界名妙金色佛號香𦦨勝威光二超至第十此上過十佛剎微塵數世界至佛號無礙普現三起至第十三此上與娑婆世界齊等至佛號法自在堅固慧四超至第二十於此世界種最上方世界至號蓮華開敷光明王初標能管之海以定方即前右繞第五海諸佛子彼金剛輪莊嚴底香水海外二列所管之海次第三初從能管海邊鄰次列九次有香水海名化現蓮華處至名普現光明力所管但列九海而無結文及最近輪圍之海九行許經諸梵本中皆同此闕準前後例此必定有
