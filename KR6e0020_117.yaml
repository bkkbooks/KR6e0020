body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經二諮問文二初自陳發心爾時善財童子至發阿耨多羅三藐三菩提心二正問法要三初標所問而我未知菩薩云何學菩薩行云何修菩薩道二歎慈氏有能答之德即以此德而為問端大聖一切如來授尊者記至阿耨多羅三藐三菩提上總下別若一生當得無上菩提至已能速踐一切智位別有五十句皆因圓果滿德三結問請說兼顯問意大聖菩薩云何學菩薩行至如是等事願皆為說三稱歎授法二先稱歎二初為大眾歎善財即是難人二初指人示眾爾時彌勒菩薩摩訶薩至問菩薩行諸功德不二正讚其德四初求友精勤二初總顯精勤諸仁者此長者子勇猛精進至處處尋求承事請法二別示精勤之相諸仁者此長者子至未曾暫起一念疲懈謂一時之勤猶未可歎以其善財自始暨末一念無懈故為可稱言一百一十善知識者古有多釋一云理應具有但文脫漏賢首釋云前後諸友總五十四位分出德生有德為二則五十五人各有自分勝進故有一百一十若依此解違此已言既云經由百一十已方至彌勒彌勒等三非在一百一十之數其義明矣有云百一十言減數十耳約實唯有一百八人謂此前除去徧友但五十一各具主伴成百二人徧友童子指示眾藝雖非主友而是伴友為一百三更加無厭足王處空天瞿波處無憂德神摩耶處蓮華法德身眾神及妙華光明神守護法堂善眼羅剎合前總有一百八人以空天等相問答故得在友數非前主友稱名指示故非主友但名伴友若爾則違下餘城之言下自釋云前至童子童女已經一百一十今更往後文殊所故云餘也謂若以此為百八者加於慈氏尚為百九并後文殊方成一十何有餘耶若通會者三釋皆得一種取前更加不動處覺悟菩薩天如來使天足成一百一十之數餘義亦成以彼二聖亦教善財故得為伴友其餘已之言但是譯者之意晉經中無餘已之言通取前後於義無妨然下復云百一十城又云過百一十由旬皆言百一十者有所表故謂除佛位取其證入十地等覺為百一十一中具十是故成其一百一十亦顯位位十十相融設有三賢亦唯具十若合等覺屬在十地勝進中攝則開十信以為其一進退行布及與圓融皆順百一十之言何必須要剋定前後二所乘廣大三初總難希奇諸仁者此長者子至修諸廣大助道之法二別明難遇二初標舉如是之人難可得聞難可得見難得親近同居共行二徵釋二初徵何以故二釋釋意云非濟深廣故即開前總中救護眾生於中又二初總護一切此長者子發心救護至斷癡惑出生死二約類別明諸仁者此長者子為被四流漂汩者造大法船汩者流急之貌為被見泥沒溺者至住界城者示諸脫門言界城者即十八界一一根境識中別別解脫故在險難者導安隱處至界蛇所纏解以聖道界蛇即地等四界著於六處空聚落者以智慧光引之令出六處空聚癡闇無人不以智光引之必為塵賊所劫住邪濟者令入正濟至令其趣入一切智城三總結所作諸仁者此長者子至常樂順行未曾違逆三具德無缺諸仁者若有眾生至應知展轉倍更難得有十三句有一在己已為希有況有二三乃至全具是故經云展轉難得又復後後難於前前故云展轉四速證超權諸仁者餘諸菩薩至乃能親近諸佛菩提此依權修此長者子於一生內則能淨佛剎則能化眾生以依實教修行故也謂以即於凡身一生亦解行生故千年之烏不及朝生之鳳普賢行位互融攝故依實修者悉皆能爾胡不勉旃文有十句上二句總明具諸位行則能以智慧深入法界三入十住則能成就諸波羅蜜則能增廣一切諸行四五入十行則能圓滿一切大願六入迴向又上四句亦皆十地行又上四義義含通別則能超出一切魔業至則能具足普賢諸行此之四句通諸地位二為善財讚菩提心即是歎法文二初結前生後爾時彌勒菩薩至令無量百千眾生發菩提心已二正歎四初標歎發心告善財言善哉善哉至發阿耨多羅三藐三菩提心二正明讚歎發心之器成其利益善男子汝獲善利至已為善友共所攝受三廣舉菩提心德釋成二初徵何以故徵意云所以歎善哉獲善利者何耶二釋意云大菩提心具眾德故文有二百二十一句皆通三種發心頓具諸位功德且分為二初一百一十八句明菩提心徧該諸地後一百三句明菩提心頓具諸位功德又前多明信成就及解行發心後段多明證位發心是故經文多云得也又前段明菩提心殊勝功德高齊佛果後段喻菩提心自在功德廣多無量今初段中分二初別明文通橫豎橫則一一發心皆具諸句之德豎則別配諸位發心以從菩薩種性至於究竟不出三種發心故光統配十二住分十二段初種性住善男子菩提心者至能持一切諸世間故今初三句即種性住故云如種如田亦如大地皆是種子發生之義二明勝解行住中之益菩提心者猶如淨水至能放種種法光明故三極喜增上住菩提心者猶如淨目至一切願中得自在故皆初地中義故四戒增上住菩提心者猶如大海至不染一切世間法故五增上心住菩提心者如調慧象至能熏法界悉周徧故六覺分相應增上慧住菩提心者如善見藥王至菩提心者如毗笈摩藥毗笈摩者此云普去能拔一切諸惑箭故至能清一切煩惱濁故七諸諦相應增上住菩提心者如如意珠至能護一切理心故八緣起流轉止息相應增上住菩提心者猶如利刀至能一切身見刺故九無相有功用住菩提心者猶如臥具至能雨一切妙法雨故十無相無功用住菩提心者猶如命根至出生一切覺分寶故十一無礙解住菩提心者如好種性至不取聲聞解脫果故言壽行者梵本云則為礠石不吸聲聞解脫果故十二最上菩薩住菩提心者如淨瑠璃至能伏煩惱阿修羅故梵本云因陀羅網網取煩惱阿修羅故菩提心者如婆樓那風此云迅猛風也能動一切所應化故至一切世間應供養故其中文義皆與彼位相應恐繁不屬故始於種子終於惑習明豎義彰矣然斷習等推功歸本由初發心則橫具諸德於理明矣二總結善男子菩提心者至普能攝取一切智道即知功成由於始簣故初心具於諸德況復初後圓融二有一百三句明菩提心自在功德於中各有喻合之文說聽之人所見深遠故所引喻多非凡境亦顯不共菩提心故雖通橫豎且約豎配文分五段初有七句攝十住德次有十句攝十行德三有九喻攝十迴向四六十句攝十地德五十七句攝等覺位以金剛智終成無上大菩提故其間梵語廣如音義翻對解釋今初攝十住德善男子譬如有人至諸覺觀煙不能熏害覺心自性離惡覺等善男子譬如有人至一切智樹初無所損二攝十行德善男子譬如帝釋著摩尼冠至煩惱龍蛇不能為害三攝十迴向德善男子譬如帝釋著摩尼冠至猶如法界性清淨故四有六十喻攝十地德即分為十初四攝初地德善男子譬如有寶至一切功德悉於中現二有三喻攝二地德善男子如有寶珠至心王大寶餘無及者謂持戒頭陀等淨功德故三有四喻攝三地德善男子譬如有人至令其具足智慧清涼入諸禪定離惑熱等故四有四喻攝四地德善男子如須彌山至悉得同其一切智色同一切智燄得無漏故善男子譬如波利質多羅樹至百千劫熏所不能及
