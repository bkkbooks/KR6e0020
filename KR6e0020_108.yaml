body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經爾時善財童子於普救衆生至往寂靜音海夜神所第五寂靜音海夜神寄難勝地文中具六第一依教趣求頂禮其足繞無數匝至云何修菩薩道答行何境界以無邊無盡甚深廣大能所不二為所行境問中欲顯能所別故先問所成後問能成答中欲顯能所相成故隔句相屬又由能起所故先辨能又觀察中雖有所觀意在能觀所行境中雖是所行而義兼能所故四問全別晉經中云何境界名何境界境界云何此則兼通分齊之境非但所觀今初能能起方便中有二十心前中起上求大智心夜神言善男子至我發起住大智光明海德心二有十心下化大悲心我發起令一切衆生至令一切衆生皆受喜樂心二答為何事業三初標發是心已復為說法令其漸至一切智地二別釋於中具有三十七門分之為三初十五門隨其便宜以十度化治其十蔽初五門雙明捨戒所謂若見衆生樂著所住至令其得入如來境界以捨一切著則戒淨故二有十心明餘八度若見衆生多瞋恚者至令得菩薩智波羅蜜般若及願各有二門二有十二門得佛功德若見衆生色相不具至令得智慧見一切法化無功德衆生令得佛因果見第一義三有十門但以對治門破其惑障若見衆生貧行多者至我為其說菩薩直心三總結化意善男子我以此等無量法施至其心怡暢安隱適悅見物成益故大歡喜此即釋名中初意三答觀察問二初觀菩薩境界復次善男子我常觀察至坐種種莊嚴座二觀佛勝用三初結前生後善男子我觀察此道場至無量無邊生大歡喜知佛神力下義當生後二正顯有其十門善男子我觀毗盧遮那至如是出現如是說法三總結近遠近結前之十門亦遠結前觀菩薩境以所觀境皆稱性故文二初標喜成益我見是已於念念中至昔所未聞而今始聞二徵釋益由何以故以能了知法界相故至莊嚴解脫光明海以能觀之大智稱法界之體相是故菩薩所生信等等一切智四答所行境界問三初十門法說通二種境又善男子此解脫無邊普入一切法界門故即所觀境此解脫無盡等發一切智性心故即分齊境下八準思此解脫無際入無際畔至以能了知如幻法故二有二十二門喻說此解脫者猶如影像至一切諸佛法輪聲故以解脫深廣相難可知故三有一句總結勸修善男子我今為汝說此譬喻汝應思惟隨順悟入二明得解脫因二初問爾時善財童子至云何修行得此解脫二答夜神言善男子菩薩修行十大法藏得此解脫先標次徵釋何等為十一修布施至一切諸法無有障礙後結善男子若諸菩薩至積集堅固安住圓滿即十度為因三明發心久近欲顯道根深故二初問善財童子言聖者至三菩提心其已久如二答初長行三初於餘剎海中發心修行二初於第一剎塵劫修五初總顯剎海夜神言善男子此華藏至而覆其上淨穢相雜二別彰時處此世界中乃往古世至名一切寶藏妙月光明三顯於初佛發心得定有佛名不退轉法界音至具足福德燈光明幢亦表五地入俗福智高勝故守護道場我見彼佛至名普照如來功德海此即正酬發心之問自此已去皆顯修行得法是知先問亦含問其得法久近四略舉次前九佛此道場中次有如來至名普照三世衆生諸根行五結略顯廣善男子清淨光金莊嚴至亦聞其佛所說諸法此舉一劫之中剎塵數佛皆悉供養二於第二剎塵劫修行從此命𣧩還即於此世界中生界不異前故云還即經佛剎微塵數劫修菩薩行劫時有異言歷剎塵然後命𣧩生此華藏莊嚴世界海前雖數數命𣧩今語前劫之末是知前普光明幢劫即是大劫其中已含有剎塵數小劫此中但明塵數小劫略無大劫之名二文影略故下結云於二佛剎微塵數劫中修菩薩行是則前段一如來興義當一劫若以普光明劫為剎塵之一此命𣧩下結成剎塵之劫則闕二字故晉經言於彼世界經二佛剎微塵數劫方順下文二劫之言一劫已有剎塵之佛則佛彌多矣二修行得法二初舉此前三佛娑婆世界值迦羅鳩孫䭾至名演一切衆生言音海二顯遇本師得今解脫則前所得望此皆因文二初標名體次值毗盧遮那如來至出生廣大喜莊嚴解脫二明其業用此中業用非獨事業良以前之四問皆業用故故此通包於中亦二初標所入海數此解脫已能入十不可說至微塵數法界安立海二明海中所見展轉染細略為四重初剎海中塵見彼一切法界安立海一切佛剎所有微塵二塵中之剎一一塵中有十不可說不可說佛剎微塵數佛國土三剎中之佛一一佛土皆有毗盧遮那至又亦聞其所說妙法四佛毛變化二初通力演法又亦見彼一切諸佛至隨衆生心轉正法輪二夜神悟入二初總顯能所悟我得速疾陀羅尼力至如是悟解一切法門二明重重微細二初總顯十重十重一一顯無盡法門一一法門中悟解一切修多羅雲一法門如般若一門中有多契經一一修多羅雲中悟解一切法海二隨一契經詮多深廣之法謂含諸度等一一法海中悟解一切法品三隨一深法有多品類一一法品中悟解一切法雲四隨一類中有多事法其一一法含旨如雲一一法雲中悟解一切法流五隨一根本法雲流出衆多支派上五約所悟下五約能悟一一法流中出生一切大喜海至得一切智光海二別顯智光之用二初句總該橫竪一智光海普照三世遍入十方是第十一重但廣最後一重功用無邊則類前重重不可盡也二別顯橫豎之中所知文五初知如來因地之行知無量如來往昔諸行海知無量如來所有本事海上二句總後之十句別明十度知無量如來難捨能施海至無量如來智波羅蜜海二知佛因地之位知無量如來往昔起菩薩地至如來往昔觀菩薩地三知因地作用知無量如來昔為菩薩時至調伏成熟一切衆生上三知因四總知果用知無量如來放大光明至知無量如來廣大力海五總知彼諸如來從初發心乃至法滅我於念念悉得知見三結酬其問三初結前善男子汝問我言汝發心來至至釋迦牟尼佛二類顯及此劫中未來所有一切諸佛我皆如是親近供養先類未來後及餘界如於世界賢劫之中至悉亦如是親近供養三結觀修學善男子彼清淨光金莊嚴至修此菩薩大勇猛門二偈頌十偈分三初誡聽勸修爾時寂靜音海主夜神至為善財童子而說頌言善財聽我說清淨解脫門聞已生歡喜勤修令究竟二正明昔行文二初智行上供我昔於劫海生大信樂心至入此解脫門二有四偈悲心下救老病貧窮人諸根不具足至我當悉除滅三有一偈結行分齊願盡未來劫普為諸羣生滅除生死苦得佛究竟樂四謙己推勝善男子我唯知此至能知能說彼功德行五指示後友善男子此菩提場如來會中般若為得佛之所故特言菩提場有主夜神名守護一切城增長威力般若若現則善守心城及一切智城萬行由生為增威力汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭三初以心觀爾時善財童子一心觀察寂靜音海主夜神身二以偈讚四初因友得見而說頌言我因善友教來詣天神所至身量無有邊二有二偈寄對顯勝非是著色相計有於諸法至色相無邊故三有六偈當相顯勝遠離於五蘊亦不住於處至十方遍說法四有一偈總結圓融無邊諸剎海佛海衆生海悉在一塵中此尊解脫力三身禮辭時善財童子說此偈已至殷勤瞻仰辭退而去第六守護一切城夜神寄現前地六初依教趣求爾時善財童子隨順寂靜至守護一切城夜神所二見敬咨問見彼夜神坐一切寶至唯願慈哀為我宣說三稱讚授法二初讚發心之相時彼夜神告善財言至問諸菩薩所修行門二正授法界三初標名體善男子我得菩薩甚深自在妙音解脫即事契經故曰甚深權實無礙蘊攝妙辨稱為自在依此演法普應羣機是謂妙音二顯其業用三初總明初十句彰法施之德為大法師無所礙至為令衆生安住佛教故二顯法施之意佛子我以此等法施衆生至心恆不捨一切智地二別顯業用三初釋甚深三初總標善男子我以如是淨法光明至時作十種觀察法界二徵列何者為十列法界中十種別義今約十種勝行顯之以行必稱理理由行顯故所謂我知法界無量一無分量獲得廣大智光明故我知法界無邊二無邊際見一切佛所知見故我知法界無限三無齊限普入一切諸佛國土至我知法界無畔四無涯畔普於一切法界海中至我知法界無斷五無斷絶入於如來不斷智故至充滿法界不可壞餘五可知三結前觀益善男子我作此十種至深入如來難思境界二釋自在義又善男子我如是正念思惟至恆為衆生演說妙法謂總持權實各就所持立名可知三釋妙音義二初別明有二十三句善男子我或為衆生至或為衆生說修慧法初三約三慧後二十句勒為十對約廣略辨或為衆生說一有法或為衆生說一切有法略而言者一者通理通事理一有者二十五有理無二故事一有者同一有為故餘可思準或為說一如來名海法至或為說一切乘出離法二總結善男子我以如是等不可說法門為衆生說三結益二初別結甚深益善男子我入如來無差別至盡未來劫住普賢行由入無差別故住劫而不疲二通結妙音自在善男子我成就此甚深至增長一切諸解脫門由總持故增長解脫念念充滿一切法界由妙音故充滿法界
