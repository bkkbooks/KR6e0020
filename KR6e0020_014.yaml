body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經普賢三昧品第三將釋此品四門同前初來意者前衆既集光示法主今將說法是故法主入定受加為近方便故次來也二釋名者普賢明說法主以說普法故三昧是業用以非證不宣故此則人法合舉普賢之三昧亦此三昧是普賢所有又三昧境界名為普賢一切如來藏身為普賢故此則普賢即三昧揀餘定也若準梵本名普賢三昧威德神變品威德神變皆定之用攝用從體但云三昧也縱佛加光讚皆因定故餘會入定受加起定即說同為一品今此開者文多義廣勸修學故言義廣者建立普賢之行願故故此比餘粗相而設四同六異言四同者入住加出六異者一數異餘會入起唯一此會入起俱多故二類異類餘法故三利益異定起多人益故四光讚異如來毛孔光明讚故五衆請異從定起已待衆請故六證相異餘會經終方有證相此品益已即便地動雨雲等故四五二種十地雖有而不具六今此具六故別立品以此說果餘皆因故又為諸會本故總故七八九會雖是果定說通因果又非總故三宗趣者入法界定法界佛加為宗令法界衆成法界德為趣望於後品亦說世界海為趣四釋文文有六分初三昧分二初此界入定三初承力入定爾時普賢菩薩摩訶薩至承佛神力入于三昧一時說偈竟時二主顯佛普德唯普賢故三處依如來者常對佛故四所依座大集云菩薩得蓮華陀羅尼故說法處皆有蓮華表所入三昧自性無染含果法故五所依因謂所入深廣要承力故六正入三昧心境冥故二彰定名字此三昧名一切諸佛毗盧遮那如來藏身毗盧遮那前已廣釋復有釋言廣大生息具此三義名如來藏身身即體也依也此有二種一者修成二者本性本性者凡聖俱成修成者唯諸佛有諸佛有者慈悲無邊故名為廣智慧無上故稱為大生相已盡故云生息涅槃云離有常住故名如來萬德含攝是謂藏身即是出纏之法身也言本性者謂即藏識包含種子建立趣生故名為廣本覺現量與佛等故名之為大新新生故名之為生染淨苦樂所不能動故名為息即上法身在纏名藏謂空不空空為能藏藏不空故若以光明遍照解毗盧遮那毗盧遮那即是能觀大智如來藏身即所觀深理凡雖理有佛智方照又毗盧遮那亦通本有本有真實識知遍照法界義故斯本覺迷而不知不得其用唯佛覺此能無不為故云一切諸佛揀非凡也亦非因也顯於依正離如來藏無別自體故入此也賢首釋云諸佛遍於一切即顯諸佛無不周遍法界剎海及彼塵中所有諸剎諸剎塵中復有諸剎如是重重不可窮盡言如來藏身者明即此遍剎之身包容所遍法界剎海無不皆在如來身中故名藏身是故融通總有四句一身遍剎海二剎在身中三身遍身內剎四剎入遍剎身即內即外依正混融無礙無障是此三昧所作故以為名將說此法故入茲定三明體相用此定相用無量無邊皆悉依於如來藏說略舉其要句有十三門乃有十以後二門收五句故攝為六對後之二門各一對故文有四節義唯有三至下當明二別釋普入一切佛平等性能於法界示衆影像體用對謂無分別智證平等性以為定體影現法界為勝用也謂以因因性證彼因性成彼果性顯果果性如是佛性則具七義一真二實三善四常五樂六我七者清淨生佛之性本末不殊況佛果果豈不平等佛平等性即如來藏是故但入如來藏身即是已入佛平等性此為第一契合佛性門言勝用者即示衆影像門謂能現能生身土智影也廣大無礙同於虗空法界海漩靡不隨入深廣對廣者無邊不在內外故大者無上究竟實際故無礙者無所障故同於虗空成上三義通為廣大無礙門後句即入法漩澓門漩深也出生一切諸三昧法普能包納十方法界出納對初出生三昧門謂若自相若共相等一切三昧皆從此生此為諸定本故後攝受法界門終歸此故法界體性故三世諸佛智光明海至諸安立海悉能示現境智對初句能成佛智門謂不體此理非佛智故後句示現諸境門然安立言總有三種一者世界安立依報二者聖教安立妙義三者觀智安立諦相皆法界藏顯示現前含藏一切佛力解脫至普能容受無邊法界內外含容對即依正含容門謂內含因果智力外令塵容法界由塵全依法界藏現同真性故成就一切佛功德海至流通護持使無斷絶成人持法對即成就攝持門謂初成果人功德大願後持法輪令不斷絶由斯玄理法眼常全故上言四節者初四句明無幽不入釋上毗盧遮那遍照之義次四句無德不生釋上一切諸佛之義次二句內外含容釋上藏義後三句成德持法釋上身義言義唯有三者入平等性是定體也廣大同空是定相也餘皆定用此三圓融總為無礙普賢三昧二類通十方及諸塵道分二初舉此界如此世界中普賢菩薩於世尊前入此三昧二類彼方二初平遍法界十一句如是盡法界虗空界至能到佛身所現一切國土初一總明謂盡窮法界後十別指以彰曲盡一盡虗空界二於空中盡十方處三於十方中遍三世時四於三世中微細物處謂毛端等五凡諸小隟無礙之處六或廣大百千由旬等處七人天日月光明等處八盡佛眼見處九盡神力到處十佛身能現之處此第十句有二義一結上國土之言通十一段二成下以是身內之剎為微細故二重疊無盡及此國土所有微塵至毗盧遮那如來藏身三昧略有四重一盡法界塵言及此國土者指前十處之國也二塵中多剎三剎中多佛四一一佛前有多普賢於上諸處皆入此定故普賢身不分普遍粗細深廣平滿重疊此處入定類通既然法界入定類通亦爾故約主定佛前唯一普賢一切一故若就類通佛前各有塵數一一切故二加分三初口加四初諸佛現身爾時一一普賢菩薩至一切諸佛而現其前此以口加後無結通故此總舉重重時處一一普賢前也二讚其得定彼諸如來同聲讚言至如來藏身菩薩三昧此雖果定菩薩門入故云菩薩三昧三得定所由佛子此是十方一切諸佛至一切諸佛行願力故所由有三一伴佛同加佛佛道同故二主佛本願此二為緣三自修行願是入定因又上三義前前由於後後餘豈無斯行耶法門主故表說普法故四辨加所為有十一句分二初總所謂能轉一切佛法輪故此文二勢一辨加所為二顯上行願之相云所為也所為謂何為轉法輪故二別開顯一切如來智慧海故上一總攝十智下九即是十海普照十方諸安立海悉無餘故即安立海令一切衆生淨治雜染得清淨故即衆生及業海普攝一切諸大國土無所著故即世界海深入一切諸佛諸境界無障礙故即佛海普示一切佛功德故即名號壽量及解脫海變化大用皆功德故能入一切諸法實相增智慧故即波羅蜜海到實相岸故觀察一切諸法門故即轉法輪海了知一切衆生根故即根海能持一切諸佛如來教文海故即演說海與下十智令知此十二意加二初加二初此土二初一總爾時十方一切諸佛至能入一切智性力智謂與果海之智而言與者佛力灌注令增長故一切智性即果海也智性即力無傾動故具十力故末後智字即能入也二九別與入法界無邊量智即是世界成就品中十智由與此智故後能說彼智觀彼十海而文少不次此句即第三法界安立海智安立無邊量故與成就一切佛境界智即第四佛海佛海唯佛分齊之境與知一切世界海成壞智即第一與知一切衆生界廣大智即第二衆生業海業因微細故云廣大與住諸佛甚深解脫無差別諸三昧智含二句一即第八佛神變海解脫作用即是神變神變依定加三昧言二含三世智下文云一念知三世由佛不思議解脫力故由加總句故合此二與入一切菩薩諸根海智即第五與知一切衆生語言海轉法輪辭辨智即第九與普入法界一切世界海身智即第七願海以願力故入法界中一切世界與得一切佛音聲智即第十建立演說又菩薩根更有多義修十善道有三善根修諸地度精進為根攝受正法信慧為根攝養衆生慈悲為根為成佛道悲智為根種種差別皆善知故二類通如此世界中如來前至所有普賢悉亦如是二釋所因二初徵何以故徵意云諸佛有力能與有慈能普何以十智偏加普賢二釋證彼三昧法如是故釋云普賢得此三昧法爾應與三身加二初此土二初佛手摩頂是時十方諸佛各舒右手摩普賢菩薩頂明加被攝受又準梵本明十方佛身皆不來此舒臂不必長而同時摩頂各全觸頂互不相礙皆是如來自在業用二辨手相用中十句以顯無盡二初五德相圓備其手皆以相好莊嚴妙網光舒香流焰發謂𦟛圓纖直等故云相好莊嚴二五妙用自在復出諸佛種種妙音至所有影像皆於中現意明此手亘十方而包三世收因果而該人法深廣體用無邊自在非言能說也二結通如此世界中普賢菩薩至為十方佛之所摩頂三起定分所作事竟故於中二初此界二初起定二初起主定爾時普賢菩薩即從是三昧而起二眷屬定二初一總明從此三昧起時至世界海微塵數三昧海門起謂一起一切起由此妙定即是一切三昧海故餘定為門皆入此故彼全同此亦受海名二九別辨所謂從知三世念念無差別至所有微塵三昧門起塵數既多略列其十一即能知智三昧謂無一念暫差故云念念無差而不廢遍知為善巧智二即所知塵境上能所一對從現三世一切佛剎三昧門起至舍宅三昧門起三現廣剎四現居處即於世界總別一對楞伽經云如來藏識頓現一切身器及諸受用器即廣剎受用即是舍宅從知一切衆生心海三昧門至各別名字三昧門起五知心念差別六知身相名字即衆生色心一對從知十方法界處所至廣大佛身雲三昧門起七知廣處八知廣身即依正一對雖說微塵意彰佛廣虗空無方有物處則現唯如來藏是實有物依此建立處所各別隨菩薩行剎有淨穢隨衆生業趣類別故微塵中佛復有一義謂如來藏是真佛身其體廣大無能知者恆在六七微塵之中一一有情各有藏識故云各有無邊大身從演說一切法理趣海三昧門起上八約事別別門顯此約理趣總該諸法故云一切大般若經理趣分說諸法皆空無生無滅無自性性離一切相不可願求然第一義湛然常住當知即是此如來藏思益經說處處避空皆不離空深密經說理趣有六一真義理趣謂二障淨智所行真實二證得理趣謂於真義得如實知三教導理趣謂自證已開示衆生此三為本後三解釋四離二邊理趣謂有問言云何名為真義理趣應答彼言非有非無非常非斷五不思議理趣謂有問言云何證得應答彼言謂不思議若於諸法遠離戲論爾時證得真勝義性故知言說皆非真義六隨衆生所樂理趣謂有問言云何教導應答彼言隨諸衆生意樂各異順彼所欲方便開示彼真義者即此藏身彼不思議即此三昧無著菩薩說四意趣釋一切經亦理趣也如攝論辨上來九句唯第三四從現得名餘七皆從所知立稱如此等類有一切世界海微塵數合為一定即知此定是一切定耳二大衆得益二初標益時普賢菩薩從如是等三昧門起時亦是得益所由二正明得益減數說九初五得菩薩法門其諸菩薩一一各得世界海至微塵數修行海雲句各一義皆以前定含此諸義故又此五句後後成前前二四得佛果法即如來三業世界海微塵數普照法界至功德藏智光明海雲得照藏身之實智世界海微塵數一切如來至無差別方便海雲得藏身力用之權智世界海微塵數一切如來至各現衆剎海雲身毛現剎世界海微塵數一一菩薩至般涅槃等海雲應垂八相義兼口轉亦以藏身合此義故普賢出定他人益者感應道交故如春萌芽陽氣久滿東風一拂衆蘂齊敷諸菩薩象積善已深久同行願才觀勝境萬德頓圓冥顯雙資于何不可二類通如此世界中普賢菩薩至一一塵中悉亦如是四現相作證分然得益心喜喜則地動及有諸瑞諸會聞竟得益故現相居後此會雖即未聞已先得益故先現瑞以此會辨果顯殊勝故文四初世界微動爾時十方一切世界海至三昧力故悉皆微動兼出瑞因由因果二力言微動者是前相故二衆寶莊嚴一一世界衆寶莊嚴三出音說法及出妙音演說諸法四佛會雨寶復於一切如來衆會道場海至周聞十方摩尼王雲略舉十種以顯無盡前三事相寶後七法化傳通寶並是出世善根所生五毛光讚德分二初結前生後普雨如是十種大摩尼王雲至於光明中而說頌言二正說偈辭十頌分三初總述前定普賢遍住於諸剎至無量三昧皆能入二別顯遍相分二初直述前遍普賢恆以種種身至彼剎塵中悉亦然二舉因顯遍二初緣力遍所現三昧神通事毗盧遮那之願力二因力遍四初即體而用故遍普賢身相如虗空至示現普身等一切前半體後半用身相如空法性身也依真而住法性土也隨機普應受用化也問法性身土為別不別別則不名法性性無二故不別則無能依所依答經論異說統收法身略有十種土隨身顯乃有五重一依佛地論唯以清淨法界而為法身亦以法性而為其土性雖一味隨身土相而分二別智論云在有情數中名為佛性在非情數中名為法性假說能所而實無差唯識云雖此身土體無差別而屬佛法性相異故謂法性屬佛為法性身法性屬法為法性土性隨相異故云爾也今言如虗空者唯識論云此之身土俱非色攝雖不可說形量大小然隨事相其量無邊譬如虗空遍一切處故如虗空言通喻身土二或唯大智而為法身所證真如為法性土故無性攝論云無垢無罣礙智為法身故若爾云何言相如虗空智體無礙同虗空故三亦智亦如而為法身梁攝論及金光明皆云唯如如及如如智獨存名法身故此則身含如智土則唯如四境智雙泯而為法身經云如來法身非心非境土亦隨爾依於此義諸契經中皆說如來身土無二此則依真之言顯無能所方曰依真成如空義五此上四句合為一無礙法身隨說皆得土亦如之六此上總別五句相融形奪泯茲五說迥然無寄以為法身土亦如也此上單就境智以辨七通攝五分及悲願等所行恆沙功德無不皆是此法身收以修生功德必證理故融攝無礙即此所證真如體大為法性土依於此義身土迥異今言身相即諸功德言如虗空即身之性下經亦云解如來身非如虗空一切功德無量妙法所圓滿故八通收報化色相功德無不皆是此法身收故攝論中三十二相等皆法身攝然有三義一相即如故歸理法身二智所現故屬智法身三當相並是功德法故名為法身其所依土則通性相淨穢無礙我此土淨而汝不見衆生見燒淨土不毀色即是如相即非相身土事理交互依持通有四句謂色身依色相土色身依法性土法身依法性土及依色相故又以單雙互望亦成五句謂色相身依法性色相土等準以思之此上猶通諸大乘教九通攝三種世間皆為一大法身具十佛故其三身等並此中智正覺攝故土亦如之即如空身而示普身于何不具此唯華嚴十上分權實唯有第九屬於此經若據融攝及攝同教總前九義為一總句是謂如來無礙身土普賢亦爾隨義隱顯不可纍安達者尋文無生局見上言土有五重者一唯法性屬前三身二雙泯屬於第四三具性相五六七八所依四融三世間屬於第九五總前諸義即第十依二大願故遍普賢安住諸大願至分身住彼亦無量兼顯遍於正中之依也重重皆遍今不見者機不應故不見即是虗空身故亦遍不見處故三所現超勝所現國土皆嚴淨至令其觀者悉得見四果德已滿不捨因門一切佛智功德力至示己往昔菩提行三結所由如是自在不思議至佛光雲中讚功德自在難思現無不普標入一定實則普游非佛光雲安能讚述六大衆讚請分二初說偈儀爾時一切菩薩衆至承佛神力同聲讚言前衆問佛佛示法主衆覩定起故讚請普賢前但舊衆此通新舊故云一切所問同前故但略舉十頌分三初八歎主請彰其能說二初歎普賢因果深廣德明有說因從諸佛法而出生至汝已嚴淨此法身讚已淨法身三句明因一句明果因有三義一因修法生義通緣了二由大願起即是緣因三依如來藏證真平等此為正因真如即是不空虗空即是空藏平等與藏通上二義一切佛剎衆會中至等照十方無不見讚遍住佛剎第三句遍因餘皆遍相因中具智莊嚴故能等照具功德嚴令無不覩普賢廣大功德海至悉能詣彼而明現讚近諸佛佛子我曹常見汝至一切國土微塵劫讚常定實境中者不隨想轉故曹者輩也佛子能以普遍身至法界微塵無不入讚度生曲盡微塵者細處有多衆生故上五各讚一義二歎能遍塵剎雨法德明有說果入於法界一切塵至演說如來廣大法讚常演大法如空之言下喻廣大前喻無盡無差一切功德光明者至說佛所行無等法讚說無等法無等有二一能說力勝具二嚴故二所說無等說佛所行故為度衆生於劫海至其音廣大靡不聞舉因結果顯德有由曠劫因圓故能雲雨說法二舉法請正陳所疑國土云何得成立至願隨其義如實說前品所問雖有多門統其要歸莫過三種世間故今三句各顯其一又前問總該諸會此令當會答故三歎衆請明有堪聞之器此中無量大衆海至一切諸佛皆隨喜亦名自述此有二義一恭敬一心內堪受法二諸佛隨喜外有勝緣故應說也說則上順佛心下順物欲世界成就品第四初來意者前說緣既具此下正陳所說總明果相答法界安立海問故此品來二釋名者世謂三世墮去來今故界謂方分有彼此故又世謂隱覆界亦分齊謂諸有為可破壞世即隱覆無為不可壞法從真性起同無為法即隱覆有為可破壞世各不相雜是其分齊故感娑婆者對華藏而見娑婆感華藏者對娑婆而見華藏言成就者即能成之緣謂十緣等能所合目若以世界之成就即依主釋準梵本云世界海成就下文辨海譯人略也意云佛果依正聞修方起衆生業報本自有之故但標世界耳三宗趣者標列無邊勝德廣釋所知世界海為宗然其意趣乃有多種一令諸菩薩發大信解悟入為趣謂令知佛及菩薩大悲行海廣覆無邊盡衆生界倣而行故世界無邊悉嚴淨故衆生無邊悉化度故剎由心異當淨自心及他心故世界重重無盡無盡以大行願悉充滿故佛界生界非一非異能正了知成大智故未能了者熏成種故皆意趣也亦為顯此深意故此品來故下頌云離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣悅若不聞此無邊無盡無二之境滯於權小普賢行願何由可成故普賢自說為令衆生等文皆是此品之意趣也四釋文三品正陳法海於中分二初二品明果後一品辨因然有二意一約兼明則前二品通答前三十句果問後一品答前十句因問說因為欲成果從多而說分名舉果二將前二品望前品末三問通答依正若望下廣文正明於依傍顯於正留其正報後分廣明於中初品通辨諸佛及諸衆生所有剎海後品別明本師之所嚴淨又此品明成剎之緣後品別辨果相故此品答安立之問其中雖明形等亦是緣故今初分二先總標綱要即為本分二初承力遍觀爾時普賢菩薩摩訶薩至一切如來神變海上入三昧內契其源今云遍觀外審其相十海之義已如問釋但小不次耳但觀於十已含餘三十佛海之中具身等故大願之中含因等故二牒問許說四初牒問略歎二初結前生後如是觀察已普告一切道場衆海諸菩薩言二正牒稱歎即從後向前牒上果問三十句也初十句牒上世界海等十問觀乃觀海歎乃歎智者智之與海反覆相成謂前自智觀海微細難知唯佛智方能究盡海難思故佛智難思佛智難思故海為深廣若爾何不說智而但說海智離海境安知其相又表唯所證知故但說海十智望海與問開合小異名或小差二別釋佛子諸佛世尊知一切至清淨智不可思議前問及觀但云世界海今加成壞望前與智中亦有成壞之言此乃廣略之異耳言清淨智者離所知障決斷分明故初句貫下置清淨言餘皆略也然皆以多故廣故深故細故重疊難知迥超言念皆云不思議也知一切衆生業海智不可思議衆生即報類差別業即善惡等殊從此別義觀中開為二句而因果雖殊同是所化衆生故此及問并與智中並合為一知一切法界安立海智不可思議即世界都稱或化衆生法謂安立施設方便軌則等也說一切無邊佛海智不可思議能化諸佛數量無邊入一切欲解根海智不可思議即所化根欲差別難知而問中合在後之五海五海皆須知根欲故一念普知一切三世智不可思議即所應之時前就所觀但云三世今就佛智故云一念能知其問及與智皆云佛解脫海者以一念普知三世是佛不思議解脫故顯示一切如來無量願海智不可思議稱性大願為現身說法遍化之因故前問是名號海及壽量海與智之中名普入法界一切世界海智皆由願力故也示現一切佛神變海智不可思議應機作用神變無方轉法輪智不可思議轉稱性大法輪海若據問中攝法輪海在演說中若約向觀攝演說海在法輪中今此開二演說建立演說海不可思議謂隨方施設言音差別及法輪隨機故與智中亦開名佛音聲智二九句牒上六根三業十問清淨佛身不可思議向十約智明不思議此下直就法體為不思議又望前問開合影略顯無盡故以總收別但廣身光等上一句應機之身修短難測無邊色相海普照明不可思議現金銀等色類無邊相及隨好皆清淨不可思議十蓮華藏剎塵數相好過於此無邊色相光明輪海具足清淨不可思議圓光大小隨機無盡種種色相光明雲海不可思議隨緣放光色類非一殊勝寶焰海不可思議常光如焰具衆寶色成就言音海不可思議圓音無盡深廣難測示現三種自在海調伏成熟一切衆生不可思議三輪攝化謂神足等勇猛調伏諸衆生海無空過者不可思議調令成益得果不空然其調伏曲有三種一者始終軟語應將攝者而將攝故二者始終粗語應折伏者而折伏故三者有時軟語有時粗語應成熟者而成熟故由具此三故無空過三十句牒上最初德用圓備十問安住佛地不可思議至無能毀壞不可思議前問中略無變化及自在二句以攝在無能攝取句中義如前會亦以前文十海有故神變屬身自在屬智餘並可知二許說分齊如是等一切法至威神力故具足宣說謂具足說故承佛力者當會佛也若言具者何以下文唯說安立及世界海耶經來不盡故又雖說二世界海亦已通具三十句問謂界必有生而依住故有佛現故安立異故行業感故餘可意求三說所成益十句攝為五對為令衆生入佛智慧海至功德海中得安住故證智成福對為令一切世界海至如來種性恆不斷故嚴剎紹種對亦即時處對為令於一切世界海中至無量解海而演說故顯義演教對為令隨一切衆生諸根海至摧破一切障礙山故生善滅惡對為令隨一切衆生心行海至安住普賢願海中故淨業普願對此亦通為一經教起之所因也此十亦對前十海十智恐繁不會四讚勝誡聽二長行辨意十一句分二初總標是時普賢菩薩復欲令無量道場衆海生歡喜故謂令聞法必生喜故二別顯喜義亦為五對令於一切法增長愛樂故令生廣大真實信解海故樂法生信對令淨治普門法界藏身故令安立普賢願海故證性立願對令淨治入三世平等智眼至一切世間藏大慧海故了真入俗對令生陀羅尼力持一切法輪至盡佛境界悉開示故持法示佛對令開闡一切如來法門故至廣大甚深一切智性故開法增智對即說頌言二正顯十頌分二初八讚二初佛出現意智慧甚深功德海至出興一切諸國土二辨定法器三初揀非器佛境甚深難可思至不能通達佛所悟二辨法器若有淨信賢固心至普賢行人方得悟三有一偈結歸佛力衆生廣大無有邊至毗盧遮那境界力二後二勸一切剎土入我身至是無所行應諦聽然通此十偈亦是牒問以讚前長行總顯難思此下略示難思之相而三十句間列不次含義並足欲配委釋恐厭繁文二廣陳本義即是說分二初結集生起爾時普賢菩薩摩訶薩告諸大衆言二普賢顯說於三十句果問中廣釋世界安立海問餘並攝之文二初標舉章門三初立數顯同諸佛子世界海有十種事至已說現說當說先告佛子者使時情注其耳目也世界廣深目之為海謂積剎成種積種成海海無別體世界都名然事類廣多略舉其十以表無盡三世同說彰其要勝又顯說決定無改易也二徵數列異何者為十所謂世界海起具因緣攬緣成立世界海所依住成已依住世界海形狀外狀區分世界海體性內體差別世界海莊嚴寶等莊嚴世界海清淨垢穢不生世界海佛出興佛出差殊世界海劫住劫住修短世界海劫轉變差別隨業改變世界海無差別門包容必均此十亦攝十八圓滿後品當會三結略顯廣諸佛子略說世界海至已說現說當說言世界海塵者智猶難測言豈具陳非證法雲安受茲說然上十事於一一剎多少不定具緣一種或一或二或三或多或成四句謂一成一一成一切等清淨一種或一或多或亦無定以有純穢剎故其次七事各各唯一謂依空住者非依光等故餘準思之其無差別一切皆具以約體性平等佛力融攝故說無差所以染淨皆具也有云一切世界相望互同名無差者則違下結文結云一一世界海有世界海塵數無差別故若依相望互同則無有差別之事若將此十望剎種者具緣一種多少不定不得云一以其種中含有多類剎故清淨一事不得定言有無以其種中必含淨穢故其無差別多少亦均佛出劫住隨業轉變不得云一依形體嚴不得云多以其剎種別有體等故若以此十獨望剎海形體依住莊嚴等四許其唯一餘必兼多故經云一一世界海有種種形故今言有世界海塵數者約融攝無盡之說也有云約一一剎海中所有諸剎各各一因等故有剎海塵數者孟浪之甚何者且如剎海中剎雖多豈如剎海盡末為塵之多若欲相同即一塵一緣方得相似何得以一剎一緣充一剎多塵之數況積具緣等十有剎海之塵其一具緣自有剎海塵數是則通有剎海微塵數箇剎海微塵數矣一剎一緣一依一體安得充耶亦不得言通一切世界海說以下依住云一一世界海有世界海塵數所依住故二依章別釋者十事不同則為十段皆有初起具因緣二初長行三初標諸佛子略說以十種因緣至已成現成當成略舉十種通成三世一切佛剎二釋然佛土之義雖有多種不出其三一法性土二受用土三變化土若開受用有自有他則成四土統唯二種謂淨及穢或性及相融而為一有異餘宗又此淨土一質不成淨穢虧盈異質不成一理齊平有質不成搜源則冥無質不成緣起萬形故形奪圓融無有障礙土既不等因緣亦殊今文十中分三初三通顯何者為十所謂如來神力故謂一切淨穢等土皆是如來通慧力成為物而取擬將普應佛應統之皆稱佛土故蓮華藏海佛所嚴淨而內含淨穢然就佛言之無國不淨既即穢而淨故不思議法應如是故梵云達磨多此云法爾或曰法性若是法性即以本識如來藏身為所依持恆變起外諸器界若云法爾者謂有問言何以諸佛衆生起於剎土答云法應如是不可致詰若會此二謂法應如是藏識變起一切衆生行業故業有善惡國有淨穢故淨名以萬行為因又云衆生之類是菩薩佛土謂法性雖一隨業成異佛隨異類取土攝生涅槃微善觀經三心等其類非一上三初因二緣三因二四別明有因有緣一切菩薩成一切智所得故自受用土因大圓鏡智之所成故一切衆生及諸菩薩同集善根故變化土因謂衆生菩薩共搆一緣各隨行業來生其國凡聖同居下二他受用土因一切菩薩嚴淨國土願力故即初地已上如十大願中修淨土願是也一切菩薩成就不退行願故即八地已上功用不退行之所成故八地中有淨土分三後三融攝轉變通於因緣一切菩薩清淨勝解自在故即八地已上攪大海為酥酪變大地為黃金以染為淨以淨為染自在攝生故十自在中有剎自在窮其因者清淨勝解勝解印持隨心變故一切如來善根所流至成道時自在勢力故謂成正覺時其身充滿十方世界微塵剎土念劫圓融一時成立由二種因一善根所流語因中也二成道勢力明果用也此一受用變化相融也即如經初即摩竭陀地堅固等普賢菩薩自在願力故無問成與不成常能融攝又前妙覺此是等覺其法性土通為諸土之體窮其因而為有助謂法爾為其正因以一切智及總以諸因而為緣因故其後三亦融前土非有別體又此十事展轉生起謂諸佛土總由佛力何以由之法如是故法爾云何而有異耶業不同故衆生由業佛復由何成一切智之所變故生佛有異何以凡聖同居同搆一緣故何以復有純菩薩國菩薩願行力故既由行業何可轉變勝解自在故云何復得融攝重重佛及普賢自在力故三結諸佛子是為略說十種因緣至有世界海微塵數結略顯廣如前已釋二偈頌多以果顯因文有九偈束為八段初一頌佛神力爾時普賢菩薩欲重宣其義至觀察十方而說頌言所說無邊衆剎海至智慧神通力如是據此無邊剎海皆遮那嚴淨則下嚴華藏猶是分明理實而言願周法界二一超頌衆生菩薩同集善根菩薩修行諸願海至菩薩國土遍十方三頌第四成一切智自受用土因菩薩趣於一切智至廣大剎土皆成就前半因後半果成惟識云大圓鏡智相應淨識由昔所修自利無漏純淨佛土因緣成熟從初成佛盡未來際相續變為純淨佛土周圓無際衆寶莊嚴配經可見四頌第六嚴淨願力及第七不退行願修諸行海無有邊至一一土經無量劫修諸行海無有邊者論云謂平等性智大慈悲力由昔所修利他無漏純淨佛土因緣成熟隨住十地菩薩所宜變為淨土或大或劣或勝前後改變上經雖云願力非無有行為分功用有無長行成其二句皆他受用故偈為一初句頌第六次句頌第七以八地已上念念入法流心心趣佛境故後之半偈通其二文五一偈却頌第三衆生行業衆生煩惱所擾濁至一切剎海斯成立加造業因煩惱所擾造於穢剎欲樂非一感土有殊前與菩薩同修必多善業故此明於煩惱六頌菩薩勝解佛子剎海莊嚴藏至十方所住咸如是七有一頌超頌普賢願力菩薩能修普賢行至清淨廣大如虗空以普賢有三一位前普賢但發普賢心即是非今所用二位中普賢即等覺位故此居佛前三位後普賢謂得果不捨因行故長行居後八有二頌却頌如來自在等虗空界現神通至此是毗盧所嚴淨前偈頌果用後偈頌善流略不頌法爾法爾即是法法性故略之又第七偈有依第八偈正中有依第九偈融於三世故三共融攝無礙然其無礙通有十種諸教說土或謂但是無常或云心變理事懸隔多一不融故今經宗要辨無礙一理事無礙謂全同真性而剎相宛然經云華藏世界海法界無差別莊嚴悉清淨故二成壞無礙謂成即壞壞即成等三廣狹無礙不壞相而普周故經云體相如本無差別無量國土悉周遍等四相入無礙下文云以一剎種入一切一切入一亦無餘及此文云身包一切等其文非一亦是一多無礙五相即無礙文云無量世界即一界故六微細無礙經云清淨珠王布若雲炳然顯現諸佛影等七隱顯無礙謂染淨異類隱顯等殊見不同故八重現無礙謂於塵中見一切剎剎內塵中見剎亦然重重無盡如帝網故九主伴無礙凡一世界必有一切以為眷屬下經云毗盧遮那昔所行種種剎海皆清淨種種剎即眷屬也十時處無礙謂或於一剎現三世劫或於一念現無量剎如今第九偈文又下文云三世所有諸莊嚴摩尼果中皆顯現此十無礙同時具足自在難知散在諸文可以六相融之
