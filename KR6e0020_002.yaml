body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第二古今違順曲分為二先敘此方後明西域今初諸釋雖衆略敘數家勒為五門一立一音教謂如來一代之教不離一音然有二師一後魏菩提流支云如來一音同時報萬大小並陳二姚秦羅什法師云佛一圓音平等無二無思普應機聞自殊非謂言音本陳大小故維摩經云佛以一音演説法衆生各各隨所解上之二師初則佛音具異後則異自在機各得圓音一義然並為教本不分之意耳第二立二種教自有四家一西秦曇牟讖三藏立半滿教即聲聞藏為半字教菩薩藏為滿字教隋遠法師亦同此立斯則文據涅槃蓋是對小顯大通相之意未於大中顯有權實亦含半滿二隋遠法師立漸頓二教謂約漸悟機大由小起所設具有三乘故名為漸若約頓機直往於大不由於小名之為頓此雖約機説有漸頓而所説法不出半滿三唐初印法師亦立二教一屈曲教謂釋迦經以逐機性隨計破著故如涅槃等二平道教謂舍那經以逐法性自在説故如華嚴經又此二教略有四異一主異謂釋迦化身與盧舍那十身異故二處異謂娑婆界木樹草座與華藏界中寶樹寶座等異故三衆異謂為聲聞及菩薩説與唯菩薩及極位同説異故四説異謂局處之説與該通十方之説異故此約化儀以判然華嚴雖有隨諸衆生各別調伏皆是稱性善巧一時頓演涅槃等雖説一極或對權顯實或會異歸同一切如來或説不説故云屈曲約釋迦為主則未顯十身十身為主必具釋迦娑婆之處未融華藏華藏之處必融娑婆略云四異異實有多誠如所判但於屈曲之內未顯法之權實耳四齊朝隱士劉虯亦立漸頓二教謂華藏經名為頓教餘皆名漸始自鹿苑終於雙樹從小之大故然此經如日初出先照高山即是頓義慈龍降雨以證漸義於理可然漸約五時以下當辨第三立三種教亦有三家一南中諸師同立三教謂於前漸頓加不定教由漸中先小後大而央掘經六年之內即説為遮此難故立不定謂別有一經雖非頓攝而明佛性常住即勝鬘金光明等是為偏方不定教也漸中開合諸師不同或但分為二即是半滿或分為三即武丘山岌法師謂十二年前見有得道名有相教十二年後齊至法華見空得道名無相教最後雙照一切衆生佛性闡提作佛名常住教此與唐三藏三時之教大同至敘西域中説真諦三藏依金光明立轉照持三輪之教亦大同此而時節小異謂七年前説四諦名轉法輪七年後説般若具轉照二輪以空照有故三十年後具轉照持以雙照空有持前二故或分為四即宋朝岌法師謂於前二時無相之後常住之前指法華經為同歸教以會三歸一萬善悉向菩提故或開為五然有二家一道場慧觀等於無相之後同歸之前指淨名思益等為抑揚教二者即前劉公不開抑揚而有教之初取提胃經為人天教上來諸師皆於漸中約時開異若不加不定之教則招難尤多以初有大故雖加不定猶有妨難略顯五時之妨餘可例知初明十二年前為有相者自違成論成論云我今正明三藏中實義實義即空又阿含中云無是老死即法空也無誰老死即生空也又智論云三藏中明法空為大空摩訶衍中明十方空為大空皆顯小乘已有二空若云第二時説空者十二年後方制廣戒豈唯説空又智論云從得道夜乃至涅槃常説般若豈前不説空若云第二時中未顯常住者實相般若豈無常耶涅槃亦説佛性亦名般若是知實相般若即是正因佛性觀照即為了因又般若離四句何曾存空般若不壞四句豈無妙有是知大小各有四門而但言初有次空者各得一門之意耳若云第三時中但名抑揚亦非常者淨名云佛身無為不墮諸數觀身實相觀佛亦然豈無常耶般若亦云二乘智慧猶如螢光菩薩一日學智如日之照豈非抑揚若云第四時中但顯同歸亦未明常者壽量品云常住不滅又方便品云世間相常住等豈無常耶五以涅槃為常住者當教可爾而涅槃之時亦有小乘之見如阿含中説如來涅槃之相故若以人天為初者提胃雖説戒善得道皆通三乘故彼經云提胃得不起法忍又違密迹經中第二七日説三乘故然上五時等皆以約時剋定則有所乖揀去不定從多分説亦有理在二後魏光統律師承習佛陀三藏亦立三教謂漸頓圓初為根未熟者先説無常後方説常先空後不空等如是漸次故名為漸二為根熟之輩於一法門且足演説常無常空不空等一切具説更無由漸故名為頓三為於上達分階佛境之者説於如來無礙解脫究竟果德圓極祕密自在法門故名為圓此亦約化儀説有前後耳意明今時堪受頓者必昔曾受化故云根熟上達之言義兼地前分階佛境即謂地上於理亦通三隋末唐初吉藏法師依法華第五立三種法輪一始見我身聞我所説即皆信受入如來慧即根本法輪二除先修習學小乘者即枝末法輪三我今亦令得聞是經入於佛慧即攝末歸本法輪此判全約化儀據法但有大小然法華為於一類開顯本末若將定判一代聖教收義不盡以法華之前亦有大故豈般若等皆為枝末又無量義云佛一切時説大小故第四立四教者略有四家一梁朝光宅法師依法華第二立四乘教謂臨門三車即是權教三乘四衢等賜即實教大乘以臨門牛車亦同羊鹿俱不得故並無體故諸子皆索故是知三皆虗指以為方便此則前三是三乘後一是一乘無乖教理若唯説法華為實則抑諸般若及諸大乘了義之經是知昔大亦有權實法華但會昔權故説三皆虗言昔實不為方便故不會之若約會權歸實即是會三為一若破小顯大即是會二歸一若開權顯實則三是一更無別一故彼經云汝等所行是菩薩道先所出內是子所知若廢權立實義説為四如攬三點以成一伊點別非伊伊具三點昔三既別實不兼權今一全兼成四無爽若依昔未顯説一切具有如來知見根敗之種今並説成則今昔有異於文有據義亦極成二陳隋二代天台智者承南嶽思大師立四教云一三藏教此教明因緣生滅四真諦理正教小乘傍化菩薩二者通教通者同也三乘同稟故此教明因緣即空無生四真諦理是摩訶衍之初門正為菩薩傍通二乘大品云欲得聲聞乘當學般若波羅蜜等然教理智斷行位因果皆通淺深不同於共般若唯共於淺三別教別即不共不共二乘人説故此教正明因緣假名無量四真諦理的化菩薩不涉二乘故聲聞在座如聾如盲不名不共而云別者兼欲揀非圓故以一因迥出一果不融歷別而修不得因果圓融故四圓教圓以不偏為義此教正明不思議因緣二諦中道事理具足不偏不別但化最上利根之人故名為圓華嚴經云顯現自在力為説圓滿經無量諸衆生悉受菩提記等別則教理等皆別圓則教等皆圓又此四教由三觀起從假入空析體異故有初二教從空入假從假入中有別教起三觀一心中得有圓教起又此四教不局定一部一部之中容有多故又更以四種化儀收之謂頓漸不定祕密頓漸同前岌公後二謂一音異解若互相知名為不定互不相知即名祕密此師立義理致圓備但三藏教名義似小濫以餘三教亦有三故所以爾者良以智論之中多詺小乘為三藏故成實論中亦自説云我今欲説三藏中實義故初對舊醫戒定慧故立此三事條然不同異後三教通教意融三故別教依一法性而顯三故圓教三一無障礙故所以不名小乘教者此教亦有大乘六度菩薩三十四心斷結成真佛故故藏通別圓之義四教互有而核其定實餘三不成唯成當教中義耳但判華嚴兼於圓別以就登地已上約寄位行布為別義故名異義同亦無大過三唐初海東元曉法師亦立四教一三乘別教如四諦緣起經等二三乘通教如般若深密經等三一乘分教如梵網經等四一乘滿教如華嚴經等然三乘共學名三乘教於中未明法空名別相教説諸法空是為通教不共二乘名一乘教於中未顯普法名隨分教具明普法名圓滿教然此大同天台但合別圓加一乘分耳自言且依乘門略立四種非謂此四遍攝一切故無有失四賢首弟子苑公依寶性論立四種教論云有四種衆生不識如來藏如生盲人一者凡夫二者聲聞三者辟支佛四者初心菩薩言四教者一迷真異執教當彼凡夫二真一分半教當彼二乘三真一分滿教當彼初心菩薩四真具分滿教即當彼識如來藏者初教謂諸外道迷於真理廣起異計二謂小乘於真如隨緣不變二分義中唯説生空所顯之理故名為半如涅槃半字三謂但得不變不得隨緣故名一分而雙辨二空故名為滿四由具隨緣不變二義故名具分廣如彼説然今判聖教那參邪説若對教主應如此方先立三教或如西域分內外及六師等又依涅槃為半滿者後二既滿不應復有一分之言既但得不變一分豈名為滿又涅槃半滿豈唯約二空豈彼不説妙有而訶空耶故其所立未為允當第五立五教略有二家一波頗三藏立一四諦教謂四阿含等二無相教謂諸般若三觀行教謂華嚴經四安樂教謂涅槃經説常樂故五守護教謂大集經説守護正法事故此釋名局以觀行等皆互有故二賢首所立五教至下當知第二敘西域者即今性相二宗元出彼方故名西域謂那爛陀寺同時有二大德一名戒賢二名智光戒賢遠承彌勒無著近踵護法難陀依深密等經瑜伽等論立三種教以法相大乘而為了義即唐三藏之所宗師謂佛初於鹿苑轉四諦小乘法輪説諸有為法皆從緣生以破外道自性因等又緣生無我翻外有我然猶未説法無我理即四阿含等是第二時中雖依遍計所執而説諸法自性皆空翻彼小乘然於依他圓成猶未説有即諸部般若等經第三時中就大乘正理具説三性三無性等方為盡理即解深密經等是故於彼三時初墮有邊次墮空邊俱非了義後時具説遍計性空餘二為有契會中道方為了義此依深密所判二智光論師遠承文殊龍樹近稟青目清辨依般若等經中觀等論亦立三時教以明無相大乘為真了義謂佛初鹿苑説小明心境俱有次於中時為彼中根説法相大乘境空心有唯識道理以根猶劣未能全入平等真空故後第三時為上根説無相大乘辨心境俱空平等一味為真了義又初漸破外道自性等故説因緣生法決定是有次漸破小乘緣生實有之執故説依他似有以彼怖畏此真空故由存假名而接引之後時方就究竟而説緣生即空平等一味此三次第如智光論師般若燈論釋中引大乘妙智經説然此二三時並不能斷一代時教以各有據互相違故各別為於一類機故深密經意為於一類餐般若者聞平等空撥無因果不了空有無二故第三時為其分析於一法上空有之義其妙智經則以一類聞説三性迷唯識者未能忘心觀緣起者定謂似有故今總忘心境即事而真得斯意者則不相違然欲會二宗須知二宗立義有多差別略敘數條一者一乘三乘別二一性五性別三唯心真妄別四真如隨緣凝然別五三性空有即離別六生佛不增不減別七二諦空有即離別八四相一時前後別九能所斷證即離別十佛身無為有為別且初二義者由性有五一不同故令乘有三一權實如法相宗意以一乘為權三乘為實故深密三時教中初皆不成次一向成是為若過若不及皆非了義第三時中有性者成無性不成方為了義故云普為發趣一切乘者亦初二卷中皆云一乘是密意説故知是權又勝鬘經以一乘為方便故大般若五百九十三中善勇猛菩薩言唯願世尊哀愍我等為具宣説如來境智若有情類於聲聞乘性決定者聞此法已速能證得自無漏地於獨覺乘性決定者聞此法已速依自乘而得出離於無上乘性決定者聞此法已速證無上正等菩提若有情類雖未已入正性離生而於三乘性不定者聞此法已皆發無上正等覺心深密第二大意同此又云一切趣寂聲聞種性補特伽羅雖蒙諸佛施設種種勇猛加行方便化導終不能令當坐道場證阿耨多羅三藐三菩提又十輪第九亦説三乘各定差別皆以性定五故故楞伽中佛告大慧有五種種性一聲聞乘性二辟支佛乘性三如來乘性四不定乘性五者無性大莊嚴論及瑜伽論皆同此説善戒地持雖但説二種性一有種性二無種性亦云無種性人無種性故雖復勤行精進終不能得無上菩提但以人天善根而成熟之無性瑜伽亦同此説若法性宗意則以三乘是權一乘為實法華經云十方國土中唯有一乘法無二亦無三除佛方便説又云初以三乘引導衆生然後但以大乘而度脫之以性唯一故故云諸佛兩足尊知法常無性又第三云一相一味究竟涅槃常寂滅相涅槃亦云佛性者名為一乘師子吼者名決定説決定宣説一切衆生皆有佛性凡是有心定當作佛三十三又云一切衆生同有佛性皆同一乘一解脫一因一果同一甘露一切當得常樂我淨是名一味又法華第三云我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度等智論九十五亦同此説明知趣寂決定回心法華論中四聲聞內決定及增上慢此二根未熟故菩薩與記方便令發心既云未熟明必當熟方便令發即菩提心不可不順己宗判為論錯入楞伽第二第四第七皆同説二乘無實涅槃但是三昧力故後必當得無上菩提法華論中意亦同此皆是假説涅槃故云三昧勝鬘亦云言諸二乘得涅槃者是佛方便又無上依經寶性佛性二論皆説入滅二乘於三界外更受變易密嚴經中二乘畢無灰斷永滅如是經論其文非一永寂聲聞必無明矣涅槃第九菩薩品中廣明闡提斷善不能發心當文即云彼一闡提雖有佛性而為無量罪垢所纏不能得出如蠶處繭此則有而非無又云或有佛性一闡提人有善根人無等則知無有無種性人況前引楞伽五性自迷其文彼經第五性云五者無性謂一闡提此有二種一者焚燒一切善根即謗菩薩藏二者憐愍一切衆生界即是菩薩若有衆生不入涅槃我亦不入大慧白言此二何者常不入涅槃佛言菩薩常不入涅槃非焚燒一切善根者以知諸法本來涅槃不捨一切諸衆生故此意則明菩薩入而不入既云菩薩常不入非闡提者則明闡提後必入矣況經自云復以如來神力故或時善根生耶莊嚴第五無性亦有二種一是時邊二者畢竟時邊謂暫時之無即前闡提畢竟謂永無即大悲菩薩是知前來所引大般若深密等經皆是未説法華之前就其長時云定性無性非永定永無諸論隨佛方便成立故云定無耳故寶性佛性等論皆説以一闡提謗大乘因依無量時説無佛性非謂究竟無清淨性若謂法華是第二時教為引不定二乘故説一切悉皆成佛而猶未説定性不成故名密意非了義者何以自判法華為第三時教誰敢判於法華為不了耶妙智經中及梁攝論成立正法中皆以一乘居三乘後故真諦三藏部異執記云三十八年後説解節經等無量義云四十年後説法華經明知法華居後故經云臨欲終時若不信法華居後涅槃臨終居然可信豈不亦以一乘一性破三五耶若以般若為第二時法華為第三時於理即通復自違深密第三時中普為發趣一切乘者以法華破三故明知深密三時不能定斷一切聖教以未居最後故且約顯一類義故分三耳義如前説若將法華望之應有四時以一乘教破前三乘故若謂佛性有二一者理性二者行性理性定有行性或無斯言可爾涅槃云或有佛性善根人有闡提人無即是行性或有佛性二人俱有即是理性然涅槃依於理性明其等有故云凡是有心定當作佛不言凡是有行定當作佛若謂理性定有容趣寂不成則違教理是知闡提不作佛者以作佛非闡提故乃抑揚當時耳若謂法華入滅後信一乘即是變化權聲聞者權必化實無實化誰又豈不誤於一類怯弱好滅衆生是知趣寂皆是法華前意耳又勝鬘經云若如來隨彼所欲而方便説即是一乘無有二乘二乘入於一乘一乘者即第一義乘此意明隨欲方便而説二乘明知即是一乘無有二矣不曉此意將上方便連下一乘而讀之輒斷一乘以為方便惑之甚矣又彼經中廣破二乘云無涅槃又云此經斷一切疑決定了義入一乘道豈説一乘以為方便説有方便之言尚在法華之前況復無耶法華云此經難信難解佛現在世猶多怨嫉況滅度後誠哉斯言若保執三乘五性不信一乘一性者深為可愍故百喻經第二中王改聚落五由旬為三由旬喻以喻方便於一説三後人但信於三不信於一即其事也上約二宗各別所據則互相違反若會釋者亦不相違謂就機則三約法則一新熏則五本有無二若入理雙拂則三一兩亡若約佛化儀則能三能一是故競執是非達無違諍大集五部雖異不離法界涅槃各説身因佛許無非正説餘義次下當會古今違順竟第三立教開宗分二一以義分教二依教分宗今初以義分教教類有五即賢首所立廣有別章大同天台但加頓教今先用之後總會通有不安者頗為改易言五教者一小乘教二大乘始教三終教四頓教五圓教初即天台藏教二始教者亦名分教以深密第二第三時教同許定性二乘俱不成佛故今合之總為一教此既未盡大乘法理故立為初有不成佛故名為分三終教者亦名實教定性二乘無性闡提悉當成佛方盡大乘至極之説故立為終以稱實理故名為實上二教並依地位漸次修成故總名為漸四頓教者但一念不生即名為佛不依地位漸次而説故立為頓如思益云得諸法正性者不從一地至於一地楞伽云初則為八地乃至無所有何次等不同前漸次位修行不同於後圓融具德故立名頓頓詮此理故名頓教天台所以不立者以四教中皆有一絶言故今乃開者頓顯絶言別為一類離念機故即順禪宗五圓教者明一位即一切位一切位即一位是故十信滿心即攝五位成正覺等依普賢法界帝網重重主伴具足故名圓教如此經等説若約所説法相者初小乘中但説七十五法但説人空縱少説法空亦不明顯但依六識三毒建立染淨根本故阿含云貪恚愚癡是世間根本等未盡法源故多諍論部執不同二始教中廣説法相少説法性所説法性即法相數説有百法決擇分明故少諍論説有八識唯是生滅依生滅識建立生死及涅槃因法爾種子有無永別是故五性決定不同既所立識唯業惑生故所立真如常恆不變不許隨緣依他起性似有不無非即無性真空圓成説經空義但約所執既言三性五性不同故説一分衆生決不成佛名生界不減真俗二諦條然不同非斷非常果生因滅同時四相滅表後無根本後得緣境斷惑義説雙觀決定別照以有為智證無為理義説不異而實非一既出世智依生滅識種故四智心品為相所遷佛果報身有為無漏如是義類廣有衆多具如瑜伽雜集等説三終教中少説法相多説法性所説法相亦會歸性所立八識通如來藏隨緣成立不生滅與生滅和合而成非一非異一切衆生平等一性但是真如隨緣成立依他無性即是圓成一理齊平故説生界佛界不增不減第一義空該通真妄真非俗外即俗而真故雖空不斷雖有不常四相同時體性即滅緣境斷惑不二而二有能所斷二而不二説為內證照惑無本即是智體照體無自即是證如非智外如為智所證非如外智能證於如世出世智依如來藏始本不二則有為無為非一非異故佛化身即常即法不墮諸數況於報體即體之智非相所遷如是義類亦有衆多次第對上如楞伽等經起信等論若會上二宗廣如別説四頓教中總不説法相唯辨真性亦無八識差別之相一切所有唯是妄想一切法界唯是絶言五法三自性俱空八識二無我雙遣訶教勸離毀相泯心生心即妄不生即佛亦無佛無不佛無生無不生如淨名默住顯不二等是其意也五圓教中所説唯是無盡法界性海圓融緣起無礙相即相入如因陀羅網重重無際微細相容主伴無盡十十法門各攝法界義分齊中當具宣説二依教開宗宗乃有十如經宗中辨第四總相會通曲分為二先通會諸教後會化儀前後今初諸德立教各自所據今雖立五亦會取諸説略有五重一或總為一謂唯是如來一大善巧攝生方便一音所演則前之二師立一音者不失道理二或開為二此更有三一對小顯大初是半字後四皆滿則無違二藏等言二對權顯實則前二是三乘後三為一乘則不違法華四乘三者三四二教雖則泯二異前而對三顯一曲巧順機後一直顯本法一向不共如智論説此同印公平道屈曲三或分為三初一小乘次一三乘後三一乘或唯後一是不共一乘智論指此以為不共大品等經共二乘説故此三亦順四乘又梁論第八云如來成立正法有三種一立小乘二立三乘三立一乘第三最勝故名善成立此亦同妙智經真諦三藏部異執疏第二卷中亦同此説四或分為四此亦二門一中間三教存三泯二別故開之為四一別教小乘如四阿含等二同教三乘如深密等三同教一乘如法華等四別教一乘如華嚴經二約歷位無位開漸及頓故分為四總合二三以為漸教餘皆如名五或分為五如前所立以漸中有始終故然取多分略指數經實非局判以一經中容多教故第二化儀前後者今辨如來一代時教略啓十門一本末差別門二依本起末門三攝末歸本門四本末無礙門五隨機不定門六顯密同時門七一時頓演門八寂寞無言門九該通三際門十重重無盡門初中本末同時始終一類各無異説然有三位一若小乘中則初度陳如後度須跋中間亦唯説小益小如四阿含經及五部律二若約三乘則始終説三通益三機如密迹經等三若約一乘則始終唯為圓機説於圓極如華嚴等其中不通小乘復説九世該於前後更無異説然此三類依於此世根性定者常聞如上一類之法故佛所演各通始終更無前後二依本起末門此有五類謂初為菩薩説大二為緣覺三為聲聞四為善根衆生五為邪定如出現品日照高山及三千初成喻中廣辨其相皆明先大後小約法名從本起末以於一佛乘分別説三故十八本二皆大乘出故約機各是一類之機非約一機前後大小三攝末歸本門者依無量義初時説小次説中乘後時説大故法華亦云初轉四諦深密妙智雖復二時三一不同皆先小後大四本末無礙門者謂初舉照山王之極説明非本無以垂末後顯歸大海之異流明非末無以歸本故本末交映與奪相資方為攝生之善巧矣是故通論總有五位一根本一乘如華嚴經二密意小乘三密意大乘四顯了三乘上三如深密五破異一乘如法華上之四門圓通無礙是則前後即無前後無前後之前後耳五隨機不定門者此上四門初門明三類機始末常定次門明五類機異時常定第三門明一類機自淺之深第四門明二類機初機聞頓後機從淺至深更有一類不定之機或從小乘次入三乘後入一乘亦有從小直入一乘或多類機隨聞一句異解不同六顯密同時者若異聞互知是顯不定若互不相知即是祕密密顯同時亦無前後七上來諸門一時頓演八從初得道乃至涅槃不説一句九此上諸門盡通三際十上之九門隨處隨時重重無盡皆無前後後之二門正是華嚴境界融取前八亦不離華嚴之用
