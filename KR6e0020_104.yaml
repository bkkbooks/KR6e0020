body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經四師子嚬申比丘尼寄至一切處回向文六初依教趣求爾時善財童子漸次遊行至之所捨施日光園中準律尼之頭陀多在王園藉外護故表因實際勝光令其善根遍法界之園苑故並皆即智故有光明説法利益無量衆生二見敬咨問三初見二初見依報六初無漏林樹時善財童子即詣彼園至普熏十方無所障礙無漏法行而建立故文中有八各有所表思之二八解泉流園中復有泉流陂池至彌布其底八功德水謂輕冷濡美淨而不臭調適無患具足盈滿優鉢羅華至芬陀利華遍覆其上三敷法空座而隨法嚴異無量寶樹周遍行列至寶鐸徐搖出妙音聲上標下列或有樹下敷蓮華藏至摩尼王藏師子之座後結其一一座各有十萬至一一皆具無量莊嚴四雜明諸嚴此大園中衆寶遍滿至光明普照如梵王宮萬行非一故五出其所因爾時善財童子見此大園至福德善業之所成就六明果用自在三千大千世界天龍八部至不可思議威神力故二見正報四初總明遍坐勝德顯彰爾時善財見師子嚬申至見者不空如婆樓那天婆樓那者此云水也以其能滿人之願故然水天之義義味不空則未詳所以能長一切衆善根芽至所説法門亦各差別二別明所遍演法各異有三十處分三初十六為八部人非人等或見處座淨居天衆至為説法門名無盡解脫先有七處為天一為淨居天説無盡者治彼那含求盡身智故或見處座諸梵天衆至名普門差別清淨言音輪二梵王普應但於己衆廣及三千為説普門則無不應梵音清妙但是世間為説法界勝流方為淨妙或見處座他化自在天至為説法門名菩薩清淨心三他化天令得出世淨心起世自在故或見處座善變化天至為説法門名一切法善莊嚴四化樂樂具莊嚴不及善故或見處座兜率陀天至為説法門名心藏施五施歸如來藏心則真喜足故或見處座須夜摩天至為説法門名無邊莊嚴六遍嚴法界方盡時分之樂或見處座三十三天至為説法門名厭離門七釋天耽欲甚故或見處座百光明龍王至名佛神通境界光明莊嚴八龍能通變耀電降雨莊嚴故或見處座諸夜叉衆至為説法門名救護衆生藏九夜叉性好飛空害物故或見處座乾闥婆衆至為説法門名無盡喜十乾闥婆衆能奏樂喜樂故上三亦四王衆意存八部故闕南西或見處座阿修羅衆至名速疾莊嚴法界智門十一修羅善幻為莊嚴故或見處座迦樓羅衆至為説法門名怖動諸有海十二迦樓羅動海怖龍故或見處座緊那羅衆至為説法門名佛行光明十三緊那羅是歌神以佛行光明破其著故又頭有一角亦云疑神令同佛覺離疑光明故或見處座摩睺羅伽衆至為説法門名生佛歡喜心十四摩睺羅伽多瞋毒故上來八部除却第八并第十及夜叉衆摩睺羅伽約對治説餘皆約隨便宜隨其世能轉入出世故緊那羅衆通此二義或見處座無量百千至為説法門名殊勝行第十五一座為人人多行不善行設行仁義亦非勝故故令起出世勝行或見處座諸羅剎衆至為説法門名發生悲愍心十六一座為羅剎則是非人亦治多殘害故二有二座為二乘或見處座信樂聲聞乘至為説法門名勝智光明聲聞智劣故或見處座信樂緣覺乘至名佛功德廣大光明緣覺修福止百劫故緣起智光未能忘緣故三有十二座為菩薩文三初為地前或見處座信樂大乘衆生至名普門三昧智光明門説定慧之光二為地上或見處座初發心諸菩薩至名一切佛願聚初發心者證發心也發十大願故或見處座第二地諸菩薩至為説法門名妙華藏華謂十種平等淨心故晉經云淨心華藏華藏者以真俗雙修於難得勝為因含藏故或見處座第六地諸菩薩至為説法門名無礙輪三一義常等覺或見處座執金剛神至名金剛智那羅延莊嚴説金剛喻定壞散塵習故既為等覺而説明此位非小言回向者約寄位耳他皆倣此二總結多類聞法發心善財童子見如是等至三藐三菩提得不退轉四總顯所因釋成自在有二初由能化具般若何以故此比丘尼至無數百萬般若波羅蜜門二由彼所化根已熟此日光園中所有菩薩至三藐三菩提得不退轉二設敬三初覩勝發心時善財童子見師子嚬申至我當右繞無量百千匝二放光攝受時比丘尼放大光明普照其園衆會莊嚴三正申敬儀善財童子即自見身至善財童子合掌而住三問法白言聖者我已先發至善能誘誨願為我説三授己法界三初標名體比丘尼言善男子我得解脫名成就一切智同佛智故二徵釋其體善財言聖者何故名為成就至普照三世一切諸法一念普照故三辨其業用二初問善財白言聖者此智光明境界云何二答二初明通用二初辨用所依比丘尼言善男子至得出生一切法三昧王謂由一切智能入王三昧故王三昧者智論第八云一切三昧皆入中故體即如如如體本寂真智契此故名三昧以一切智有其二義一遍知三世一切事故二對於種智名根本智知一切事皆一實故以即權之實智契即事之實理故一切三昧皆入其中以此三昧故得意生身又由王三昧體無不遍故意生身隨類能成二辨能依業用往十方一切世界至我即為説般若波羅蜜二明其智用善男子我見一切衆生至知法如幻故又前即差別智用今即無分別智用故觸境無取四謙己推勝善男子我唯知此成就至能知能説彼功德行五指示後友善男子於此南方有一國土名曰險難逆行非道下位不能行故此國有城名寶莊嚴逆隨世行能生無盡功行藏故中有女人名婆須蜜多此云世友亦云天友隨世人天方便化故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去已下入六十八經五婆須蜜女寄無盡功德藏回向六初依教趣求二初依教成益爾時善財童子大智光明至思惟觀察見諸法性謂由聞一切智光故思修趣入得二種益一得見實法性益由前實智故得了知一切言音陀羅尼門至一切菩薩業圓滿願二得權智之益由前窮三世差別智故二趣求為位四初專心尋覓漸次遊行至險難國至處處尋覓婆須蜜多女二淺識致城中有人不知此女至有何等意而求此女逆行難知故不自疑者貪順於悲障行劣故不同前二又於前二已調伏故此中不疑三深智讚教二初讚其中有人先知此女至於女色中所有淨想二教示所在善男子婆須蜜女於此城內市廛之北自宅中住市者喧雜北主於滅自宅即畢竟空寂謂在欲行禪處喧常寂故在市廛之北等四依教往詣時善財童子聞是語已歡喜踊躍往詣其門二見敬咨問三初見二初見依報見其住宅廣博嚴麗至十大園林以為莊嚴畢竟空中無德不具故廣顯具嚴二見正報爾時善財見此女人至遇斯光者身得清淨具有主伴德用二敬問爾時善財前詣其所至善能教誨願為我説三授己法界三初標名體彼即告言善男子我得菩薩解脫名離貪欲際凡夫染欲二乘之人見欲可離菩薩不斷貪欲而得解脫智了性空欲即道故如是染而不染方為究竟離欲之際二正顯業用二初身同類現隨其欲樂而為現身至隨其樂欲皆令得見二以法益生若有衆生欲意所纏至一切智地現前無礙解脫十種三昧皆隨受欲便宜得斯甚深三昧三得法因緣二初問善財白言聖者種何善根至而得成就如是自在二答答言善男子我念過去至以一寶錢而為供養一寶錢施者有二義一寶而能捨故得離貪二一錢雖微以菩提心故成斯自在是時文殊師利童子至阿耨多羅三藐三菩提心四謙己推勝善男子我唯知此菩薩至能知能説彼功德行五指示後友善男子於此南方有城名善度無一善根不度到於究竟處故中有居士名瑟胝羅彼常供養栴檀座佛塔瑟胝羅此云纏裹以義當包攝塔中包攝一切佛故或云攝入攝諸善根入平等故常供佛塔者諸善根中斯為最故未詳何緣偏供此答有云以此答中空有栴檀之座為欲普供無盡佛故亦是一理汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去六瑟胝羅寄入一切平等善根回向六初依教趣求爾時善財童子漸次遊行至善度城闕無念法二見敬咨問詣居士宅頂禮其足至善能誘誨願為我説三正授法界四初標名居士告言善男子我得菩薩解脫名不般涅槃際般者入也窮諸如來不入涅槃之實際故故出現品云如實際涅槃如來涅槃亦如是二顯體善男子我不生心言至畢竟無有般涅槃者謂心契實際知佛常住三釋其外疑唯除為欲調伏衆生而示現耳並如出現品辨楞伽亦云無有佛涅槃無有涅槃佛四顯其業用二初辨用所依善男子我開栴檀座至得三昧名佛種無盡佛種從緣起佛緣理生見理湛然見佛無滅以佛化身即是常身法身故善男子我念念中入此三昧至一切無量殊勝之事亦是證前不涅槃義舉現見故二問答境界善財白言此三昧者至諸菩薩衆悉亦如是四謙己推勝善男子我唯得此菩薩至能知能説彼功德行長者雖知三世不滅未能一念而知及能所平等五指示後友善男子於此南方有山至修菩薩道即説頌曰以大悲菩薩衆尊重故偏加於頌海上有山多聖賢至彼當示汝大方便言海上有山者大悲隨順入生死海而住涅槃山故即南印度之南六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去七觀自在菩薩寄隨順一切衆生回向善友名觀自在者三業歸向必六通赴緣攝利難思名觀自在由此能遍隨順衆生在補怛落迦山者此云小白華樹山多此樹香氣遠聞聞見必欣是隨順義又觀自在者或云觀世音梵云婆盧枳底此云觀也濕伐羅此云自在若云攝伐多此云音也然梵本中自有二種不同故譯者隨異而法華經觀音品云觀其音聲皆得解脫即觀世音也若具三業攝化即觀自在故彼中初語業稱名除七災二身業禮拜滿二願三意業存念淨三毒而今多念觀音者以語業用多故又人多稱故今取義圓故云自在然觀則能觀通一切觀世是所觀通一切世若云音者亦通所觀即所救一切機也若云自在乃屬菩薩能化之用文中但有五段闕第六禮辭初依教趣求爾時善財童子一心思惟至處處求覓此大菩薩二見敬咨問先見有三初見勝依正見其西面西方主殺顯悲救故又令歸向本所事故巖谷之中泉流縈映至令其攝受一切衆生二彰見之益善財見已歡喜踊躍合掌諦觀目不暫瞬以得勝念熏自心故作如是念善知識者則是如來引至究竟同於佛故善知識者一切法雲至便即往詣大菩薩所三友垂讚攝爾時觀自在菩薩至安住如來智慧光明大悲深厚隨順受故二敬問爾時善財童子頂禮觀自在至善能教誨願為我説三稱讚授法二初讚菩薩告言善哉善哉至發阿耨多羅三藐三菩提心二授三初標名善男子我已成就菩薩大悲行解脫門二總顯體相善男子我以此菩薩至一切衆生相續不斷亦是釋名平等教化即是大悲以同體悲故云平等相續不斷即是行門又門即普門普門示現曲濟無遺故三廣顯業用二初約普門以顯業用二初總明善男子我住此大悲行門常在一切諸如來所以上同如來妙覺真心故普現一切衆生之前下與衆生同體大悲故普現即普門示現然大聖久成正覺號正法明示為菩薩義言等佛耳二別明普現之義或以布施攝取衆生至與其共居而成熟之有十一句方法華經三十二應乍觀似少義取乃多彼三十二應但是此中或現色身及説法耳二約大悲行以顯業用為救諸怖畏故於中三初離世怖有十八種善男子我修行此大悲行門至離熱惱怖離迷惑怖上三約煩惱即是因怖餘皆約果離繫縛怖離殺害怖至離大衆怖離惡趣怖縛殺貧三不活開出此下皆五怖中事離黑暗怖離遷移怖至離逼迫心怖離憂悲怖上約所離二即能離因復作是願願諸衆生至皆得免離一切怖畏念即是意三業皆益故三進大心善男子我以此方便至三藐三菩提心永不退轉令進大心方能究竟離二死怖四謙己推勝善男子我唯得此菩薩大悲行門久成正覺尚不失謙如諸菩薩摩訶薩至能知能説彼功德行二指示後友二初後友人會爾時東方有一菩薩從東來者後位如相智明方證故名曰正趣正法遍趣化衆生故以智正趣真如相故從空中來智體無依方契如故至娑婆世界輪圍山頂意表如依妄惑顯故以足按地其娑婆世界六種震動以定慧足除雜慧故一切皆以衆寶莊嚴至然後來詣觀自在所同前會者意顯不離隨順衆生得如相故又以智會悲成無住故二前友指示時觀自在菩薩告善財言至學菩薩行修菩薩道以在此會故闕禮辭
