body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第十三手有十三相文分為三初九真語手相二初五明右如來右手有大人相至是為六十八二後四明左如來左手有大人相至及衆妙相以為莊嚴因陀羅網以為嚴者即是網鞔之相互涉入故放大光明普照十方至是為七十二右五左四者或左脫一或表右邊恆常用故而前肩右二左三相通正等二有二相在左右指如來右手指有大人相至是為七十四三有二相在左右掌如來右手掌有大人相至是為七十六皆有千輪者謂輪轂輻輞三事具足自然成就不待人功十四陰藏一相如來陰藏猶如馬王有大人相名普流出佛音聲雲至是為七十七十五坐處二相如來右臀有大人相至是為七十九十六體有二相如來右髀有大人相至隨順安住以為莊嚴隨順安住者髀多行動故須多寶隨順而嚴廣大遊行放淨光明至是為八十一十七腨有三相如來右邊伊尼延鹿王腨至如來寶腨上毛腨毛通於二腨若準晉經直云毛端則通全身一切毛也義應如晉則處成十九有大人相名普現法界影像雲至是為八十四十八足有十三相通分為七初足下一相如來足下有大人相略無左右而晉經中足趺之後別有足下十輻輪相此必合有故後品明足下輪相名普照王今經中千輪之言乃在後段指間收故或以常明易知故此不説指間有異故舉之耳名一切菩薩海安住雲名安住者以足下安平一切著地不容針故色如金剛閻浮檀金至是為八十五二足上有二相如來右足上有大人相至是為八十七三足指間二相如來右足指間有大人相至是為八十九四足跟二相如來右足跟有大人相至是為九十一五足趺二相如來右足趺有大人相至是為九十三六足四周二相如來右足四周有大人相至金剛寶以為莊嚴因陀羅尼羅者此云帝青放寶光明充滿虗空至是為九十五七足指端二相如來右足指端有大人相至是為九十七上來略例九十七相次第名數譯者安置既不説盡豈不盈百足下闕一脣齶不開設合此二六根皆辨耳何闕如若加兩耳及足下一則圓百數以顯無盡豈不妙哉況此中所列於三十二尚有未盡豈普賢力不及百耶晉經有遺但九十四亦無次第之數故知九十七數不在生情配屬諸法三結略顯廣佛子毗盧遮那如來至衆寶妙相以為莊嚴別説難周故須結略非略能盡故須顯廣一華藏塵相已無邊況十華藏則無盡無盡非普眼者安能覩歟既三十二相權實不同互有互無故不會釋如來隨好光明功德品第三十五初來意者前品明相此品辦好相好雖殊俱用嚴身以答前身及眼等六兼自在問好依相有德劣於相故次明之劣德之用用成頓益翻顯大相德難思矣二釋名者如來標人表德隨好等顯德依人隨好是體隨逐大相德姿好故光明是用功德者德謂從好發光光能益物顯好之德故以為名如來之隨好等亦如來有隨好等通二釋也三宗趣者明好勝德為宗令物修敬為趣次釋文二先略二初標果好爾時世尊佛自説者有二意故一僧祇因終此品果極故茲二品皆佛自説二好用劣相而用難思恐物不信故佛自説告寶手菩薩言告寶手者亦有二義一説手隨好彼主此門故二令當寶重起信手故佛子如來應正等覺有隨好有隨好者總相舉也即是足下之好與後名同故名圓滿王德用周備故云圓滿攝益自在最勝名王此隨好中出大光明至阿僧祇光明而為眷屬光明熾盛者如日具德由此復能攝諸眷屬百萬等顯數多也復云七者淨七支故修七覺故照七地故二舉因對顯者為顯勝故此有數重一以相德深廣言不能備是故置之但隨説好二好德復多以三十二相既有八十隨好十蓮華藏之相好彌多矣且舉其一三一中置勝但説劣者故明足下四足下一好復有多光但説一光五果位一光亦不可説故寄因顯因光成益三重頓圓況果一光如是展轉況於諸相況復總説如來諸德果海絶言亦斯義矣文二初光照分齊佛子我為菩薩時至照十佛剎微塵數世界即前圓滿好中放光故不別標放光之處而非前光好具多故二光所成益二初今離苦淨宿善益彼世界中地獄衆生至咸生歡喜踊躍稱慶二轉報生天得聞法益從彼命終生兜率天至往昔親近衆善知識示宿因心不放逸顯曾修行於如來所種諸善根通見聞等親近知識必聞普法成金剛種毗盧遮那大威神力顯其現緣於彼命終來生此天結因屬果文從略故結屬生天理實息苦及淨眼等皆由於此二種因緣是知佛光平等而照不種善因無斯勝益何以一光頓成斯益無盡功德之所顯故純淨法界之所流故非如權教八十隨好但嚴於形生信而已此中略無墯獄之因謂雖修乘戒行寬故二廣辨因相但廣於因果難説故文二初廣前段淨宿善益佛子菩薩足下千輻輪至常放四十種光明摧下惡趣之苦放於足下千輻輪光四十光者表四十位無不照故中有一光名清淨功德置廣説略能照億那由他佛剎微塵數世界分齊過前隨諸衆生種種業行至皆悉命終生兜率天淨惑成德故前光受清淨等名以重況輕舉阿鼻耳二廣聞法益六初略標勸誨既生天已聞天鼓音至入離垢三昧汝當敬禮二聞已生疑爾時諸天子聞天鼓音至何因發此微妙之音三總示所因是時天鼓告諸天子言至諸善根力之所成就四正明勸教四初以己喻佛無我無來諸天子如我説我而不著我至亦復如是非十方來文中二段各有喻合上喻無我下喻無來二以他喻己顯來即無來諸天子譬如汝等昔在地獄至亦復如是非十方來文有三喻並顯可知然惡業善根是來因緣因緣無性故來即無來非先有法在十方中從彼來也故因緣者即是智慧智慧之法本非因緣云何念言有何因緣三以己況佛難思之境諸天子譬如億那由他佛剎至一隨好中放一光明舉手隨好者別舉顯勝上救下趣故舉足光今約現通故説手也出現無量自在神力至尚不能知況諸衆生四正勸往詣誡不應留二初總誡勸諸天子汝當往詣彼菩薩所至勿復貪著五欲樂具二廣釋二初釋前誡著五欲樂障諸善根上法下喻諸天子譬如劫火燒須彌山悉令除盡無餘可得後合貪欲纏心亦復如是終不能生念佛之意二釋前勸有六初順釋諸天子汝等應當知恩報恩二反釋諸天子其有衆生不知報恩多遭橫死生於地獄三示其恩相諸天子汝等昔在地獄之中蒙光照身捨彼生此四勸往增善汝等今者宜疾回向增長善根五示法令修謂説二空諸天子如我天鼓非男非女至種種上妙宮殿園林非男女喻以顯人空如我天鼓不生不滅至亦復如是不生不滅不生滅喻以顯法空六勸修成益汝等若能於此悟解應知則入無依印三昧既解悟無生則能所雙絶儻然靡據故曰無依以斯智印印定萬法不收不攝住心自安故稱三昧五依勸詣佛五初獻供不過時諸天子聞是音已至欲申瞻覲而不得見二聞其所在時有天子作如是言至乘栴檀樓閣處摩耶夫人胎三觀見下生時諸天子以天眼觀至梵天欲天承事供養四發心欲往諸天子衆咸作是念至十那由他眷屬欲下閻浮提五教見佛儀二先教識受生令捨曲見由前不遇後覩下生不離有無情存彼此故示體用顯無生現生文三初法二初誡其曲見時天鼓中出聲告言至非此命終而生彼間二示其正見但以神通隨諸衆生心之所宜令其得見是知佛化所生非歿生也二喻諸天子如我今者非眼所見而能出聲三合菩薩摩訶薩入離垢三昧亦復如是非眼所見法身無生遍而叵見而能處處示現受生應無不生即處處皆有有感此中亦見何須更下閻浮離分別顯應生之德拂其諸見以無分別智而生非謂有其選生之處除憍慢雖處王宮而無憍慢無染著諸天圍繞而無染著二教發心誨過令其得見三先標教誨次徵問其方後如法正教夫欲悔過須識逆順二十種心謂先識十種順生死心以為所治一妄計人我起於身見二內具煩惱外遇惡緣我心隆盛三內外既具滅善心事不喜他善四縱恣三業無惡不為五事雖不廣惡心遍布六惡心相續晝夜不斷七覆諱過失不欲人知八虜扈抵突不畏惡道九無慙無愧不懼凡聖十撥無因果作一闡提次起十種逆生死心從後翻破一明信因果二自愧剋責三怖畏惡道四不覆瑕疵五斷相續心六發菩提心七修功補過八隨喜他善九念十方佛十觀罪性空今此三段文皆具有而為次不同向以起心之次第此以勝劣而言故今初總標教誨諸天子文有四節治前六種順生死失汝等應發阿耨多羅三藐三菩提心發菩提心為懺所依以是行本含攝衆德故首明之翻前第五惡心遍布自危危人今發悲心遍覆法界廣利有情淨治其意住善威儀令淨三業為能懺體上句是惡止行下句義通止作翻前第六惡心相續及翻第七覆諱過失悔除一切業障煩惱障報障見障今懺四障即所滅之非謂惑業苦業報二障約因果異既懺報障則怖畏惡道翻前不畏以諸天子新從彼來故不廣明於煩惱中利鈍分二邪見斷善最可畏故別明見障又障所知亦見障故餘如別説以盡法界衆生數等身至悔除所有諸障過惡運心普遍令無不盡由昔起過既遍諸境今悔昔非普運三業等衆生界於一一佛及衆生前發露懺悔既於人天凡聖之前皆對懺悔則是第二自愧剋責翻無慚愧由意遍運令身口遍頭即頂禮兼身為總五輪著地此言遍者為以何遍故經云善三業遍此則第四修功補過翻前縱恣身等三業二徵問其方時諸天子聞是語已至云何悔除一切過惡上經猶略餘義未盡故次徵之三如法正教正教觀罪性空兼顯妄計我人撥無因果外遇惡緣而文分二初明發聲之因爾時天鼓以菩薩三昧善根力故發聲告言二正説教誨五今初別觀業空諸天子菩薩知諸業至而共積集止住於心業為報因三障首故非先有體從十方來正顯空義但從顛倒生無有住處釋空所以由業障海從妄想生故無自性菩薩如是決定明見無有疑惑今此空慧與心相應決定無疑能如是知即名菩薩二總觀四障文有喻合以喻俗有約真即無文二初喻諸天子如我天鼓説業説報舉所治謂業報二障説行説戒説喜説安説諸三昧即是能治行善止惡喜他安他二合諸佛菩薩亦復如是説我説我所即是見障説衆生説貪恚癡即煩惱障種種諸業上明隨俗説有下辨勝義實無而實無我無有我所至十方推求悉不可得有無二文三障影略既無我所翻破第一忘計我人三別破見惑見惑深險故廣破之文有三喻初鼓無生滅隨所聞喻諸天子譬如我聲不生不滅至隨有修集則受其報喻業雖無生隨修感報向觀業空為遣執有若謂為空諸佛不化故今顯非是斷無翻破第十撥無因果二聲無去來喻諸天子如我天鼓所出音聲至若來若去皆不可得喻歸中道上喻下合諸天子若有去來則有斷常定有則常定無則斷俱亦是二是故雙破去來二見顯離斷常一切諸佛終不演説有斷常法除為方便成熟衆生若有可來即墯於常去而不來即墯於斷故雖空不斷雖有不常三鼓聲隨心喻諸天子譬如我聲至隨衆生心悉令得見喻佛由心見遣其心外定執懺主令其真念十方諸佛翻破外遇惡緣四對業觀報二初鏡像體虗喻諸天子如有頗梨鏡至諸業果報無來去處喻雖有而無謂其鏡像依鏡而現像非去來報從業生何有來去二幻師惑眼喻諸天子譬如幻師幻惑人眼當知諸業亦復如是喻業招報雖無而有又業亦如幻又幻非有無即中道矣五總結懺益若如是知是真實懺悔一切罪惡悉得清淨六見聞獲益二初明餘衆益説此法時百千億那由他至發於無上菩提之意以三昧力聲普聞故二當機得益二初一重益亦二今初得法益爾時諸天子聞説普賢至獲諸力莊嚴三昧故皆有故字義似牒前為因則見佛為益前來未有得十地處為何所牒是以晉經皆無故字應言聞説普賢廣大回向故便得十地獲諸力莊嚴三昧上句得位下句成行分得十力為莊嚴故二見佛益三初明見因以衆生數等清淨三業悔除一切諸重障故二正明見佛即見百千億那由他佛剎至離垢三昧少分之力三敬心興供爾時彼諸天子以上衆華言以上者上來持華詣菩薩所獻供不遇猶未散故復於身上一一毛孔化作衆生數等衆妙華雲毛孔出華者已得地位故華在最初故略舉之上所持中有香蓋等故下諸文見香見蓋並皆成益供養毗盧遮那如來持以散佛一切皆於佛身上住二展轉獲益二一聞香益二見蓋益並是從前獻供不過文中所來前中有三初法其諸香雲普雨無量佛剎至身蒙香者其身安樂由脫障故得解脫樂二喻譬如比丘入第四禪一切業障皆得消滅喻四禪無八災患三合由滅障故得淨善根是為益相文二初顯所滅若有聞者彼諸衆生至等分行者二萬一千即是八萬四千煩惱古有二釋一云煩惱根本有十然一惑力復各有十即為一百應分九品今但上品重故開三中下輕故各為一品則成五品每品一百則成五百復於自他內外境起謂自五塵名之為內以他五塵名之為外一一塵上各有五百即為五千別迷四諦則成二萬并本一千通前都有二萬一千却配三毒及等分成則八萬四千煩惱經文自具二者有云十惡為本展轉相成一一各十故成一百亦約迷於自他五塵則為一千正迷十諦十諦則是四諦三諦二諦一諦則成一萬或迷説成諦等十諦或迷十善故成一萬然迷十諦空有不同分成二萬或迷十善真俗二諦亦分二萬并本一千餘如經辨二皆有理任情去取更有異釋如賢劫經等非今經意二明其能滅了知如是悉是虗忘謂了惑本虗居然不生故晉經云此諸煩惱皆悉除滅如是知已成就香幢雲自在光明清淨善根由滅惑故清淨惑亡智顯自在光明善根成就香幢即是九地所有舌根至下當明二見蓋益文二今初正明得益若有衆生見其蓋者至金網轉輪王一恆河沙善根準晉經云種一恆河沙轉輪聖王所植善根所謂白淨寶網輪王等是知則有多箇輪王非一輪王之多善也梵本亦然而言清淨金網者準瓔珞上卷金輪位在十回向中初地已上皆是琉璃輪而增寶數以為其別是知舊譯為寶網者勝金網也故彼經云歡喜地百寶瓔珞七寶相輪為四天王乃至一萬福子以為眷屬見百法身遊百佛剎寶數一一增至七地以十三寶以為相輪八地但云大寶相輪九地中云以白雲寶而為相輪十地中云百萬神通寶光瓔珞無畏珠寶而為相輪若順晉經白淨之言則是九地則同前文有香幢雲自在光明若然彼白淨寶但是所等則金網無失若取十地為清淨金網正當十地以無畏珠為清淨義又攝化分齊與第十地攝報果同證為十地其義明矣故下此王放光遇者亦登十地一恆沙者謂從九地已還乃至十住銅輪以此十地所化分齊此前諸位如河沙矣故晉經云寶網輪王等等取前也二攝化轉益二初得位益三初法佛子菩薩住此轉輪王位至塵數世界中教化衆生直明菩薩攝化分齊已如前釋二喻佛子譬如明鏡世界至未曾一念而有間斷喻上法中教化衆生若有衆生聞其佛名必得往生彼佛國土喻下合中遇斯光明獲十地位三合菩薩安住清淨金網轉輪王位亦復如是初句總合若有暫得遇其光明準晉經中亦復如是下欠放漫陀羅自在光明之言今經影在後喻合中若便直云得遇斯光前文未有放光之處為何遇耶必獲菩薩第十地位得十地者此品之中總有三重皆得十地名展轉益一諸天子聞鼓説法證得十地二此天子毛孔出華并前香蓋見者證得輪王之位即是十地三輪王放光衆生遇者復得十地此三所證位皆齊等同時頓成約人各有塵數多類總是菩薩一隨好中一光之力餘光好等彌更難説以先修行善根力故即顯前來頓益之因因聞普法修普善故二成德益二初喻佛子如得初禪雖未命終至得諸禪者悉亦如是意云欲界修得色界中定以欲界眼見色界境喻於菩薩頓證十地未轉凡身見十地境以法力故是以三祇而一念可屆者明一攝一切故塵劫不窮於一位者明一切攝一故如是遲速皆悉自在是此圓教非餘宗也二合二初正明得益菩薩摩訶薩住清淨金網至皆得菩薩第十地位猶是牒前合中經文謂以德依地成所以重牒不然則成兩度放光各得十地成就無量智慧光明至成就如是清淨肉眼謂上諸德及與十眼皆依凡身肉眼而成故就結之二顯境分齊即顯肉眼境界廣大肉眼尚爾餘眼玄妙不可説也文三初假設譬喻以顯境多三初一重境界廣大佛子假使有人以億那由他至悉以集成一佛國土二問答顯廣令信成益寶手於汝意云何至當獲如來無上智慧三復積前數重顯廣大寶手設復有人以千億佛剎至展轉乃至經八十反二正明能見如是一切廣大佛土至於一念中悉能明見見前廣剎之塵肉眼能見已是超勝況一念耶亦見百億廣大佛剎微塵數佛明見多佛如頗梨清淨光明照十佛剎微塵數世界明見佛之相無心分別無來去故三結德有歸寶手如是皆是清淨金網至福德善根之所成就歸於輪王此品之末經來未盡
