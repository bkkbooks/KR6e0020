body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經自下大文第三慈氏一人明攝德成因相前既會緣入實定堪成佛故今辨其一生補處成因之義文唯五段以補處位極故闕謙推初依教趣求二初標念前趣後爾時善財童子至正念思惟諸菩薩行向海岸國二別生勝念悔往修來文四初觀昔非以行對治自憶往世不修禮敬至如是思惟生大歡喜二觀其現苦䇿進當善復觀此身是生老病死至菩薩願智身而作因緣諸修行者願審此倣之三明觀念之益益其勝觀作是念時長不思議至三世平等無有休息四結益所屬如是一切皆以信受善知識教之所致耳二見敬咨問二初見敬二先見依二初入定申敬三初結前標後善財童子以如是尊重至大樓閣前五體投地可知暫時斂念標定思惟觀察定加行以深信解大願力故是定之因入遍一切處智慧身平等門辨定名相二別顯定用即雙運定慧於中二初明即智定之妙用二初羅身雲於法界普現其身在於一切如來前至盡未來際無有休息二契法性之真源等虗空無邊量故至無有性隨緣轉故二稱法界之深觀於中有三初了法從緣次智契無性後會歸中道此三無礙即三觀一心今初了法從緣又決定知一切諸法皆從業起報酬善惡故云業起一切諸果皆從因起果自種生云從因起一切諸業皆從習起一切佛興皆從信起自修成佛信為道源一切化現諸供養事至一切化佛從敬心起感他化身敬心便現一切佛法從善根起至從一切智境界而起二智契無性離於斷見知回向故至離顛倒見知如實理故離顛倒見者通三四倒倒謂常計無常是名顛倒見於實理則無斯倒若以無常為常亦非見如實理以壞相故離自在見知不由他故謂自在天能生萬物知由自業故不由他離自他見知從緣起故單執自他則乖緣起離邊執見知法界無邊故堅執生死等有始末故離往來見知如影像故離有無見知不生滅故從無之有名之為生自有之無稱之為滅體無生滅何得有無離一切法見知空無生故約理遣法知不自在故約緣遣法知願力出生故約因遣法離一切相見入無相際故三會歸中道知一切法如種生芽故然隨一句皆離上諸過今且通説如種生芽者從水土等緣生故非無此如初段觀緣生則無性故非有如第二段非有非無即是中道如是離斷常等可以思準種芽橫喻萬法如印生文故即豎喻諸法涅槃云此陰亦滅彼陰續生如蠟印印泥印壞文成等已下諸句通於橫豎知質如像故知聲如響故至了世心現故了世心現亦唯心觀以心為緣現而無性即中道觀了果因起故了報業集故至善巧方便所流出故三總結成益善財童子入如是智至流注身心清涼悅澤二善財出定三業敬讚文三初以身敬繞從地而起一心瞻仰目不暫捨合掌圍繞經無量匝二以心敬念十初約境顯勝作是念言此大樓閣是解空無相無我者之所住處然此諸句一一皆舉能住者德歎所住樓閣初句具顯故此大樓閣之言貫通諸句是於一切法無分別者至一切道者之所住處二約德顯妙是入一切甚深般若至一切如來所者之所住處三約用顯自在是以一劫入一切劫至一切國土者之所住處四約行顯勝是於一切衆生前至演説難遭遇法者之所住處五約觀顯深是能住難知法甚深法至無戲論法者之所住處六約對治顯勝是住大慈大悲者至亦不與癡惑俱者之所住處七約止觀明自在是雖住四禪而不隨禪生至菩提行願者之所住處八約利他行顯勝是雖於一切業煩惱中至利益他事者之所住處九約護小乘行明自在是雖行九次第定至雖説一切乘而不捨大乘十結德所住此大樓閣是住如是等一切諸功德者之所住處於前九中除初二及五餘皆約權實事理雙行二以言敬讚五十五偈分二前三十四偈七言舉德歎處後二十一偈五言指處明德前中又二初二總歎爾時善財童子而説頌言至此無等者之住處一約行位一約名德二餘偈別約德行四初約自利行勝施戒忍進禪智慧至此無依者之住處二有十偈歎利他行勝普見惡道羣生類至此堅固意之住處三有八偈歎功德勝十方諸佛所説法至此修行者之住處四有七偈歎方便勝成就神通方便智至此悲愍者之住處二指處明德雖復語依意在歎正於中有六初下化佛子住於此普現衆生前至充滿十方剎二上觀佛子住於此遍遊諸世界至其心無厭倦三有五偈明三昧自在佛子住於此念念入三昧至一切諸趣中四有七偈智慧深廣佛子住於此飲諸佛法海至無起無所有五有一偈顯其平等觀察衆生等法等如來等剎等諸願等三世悉平等六有四偈結德申敬求哀請加佛子住於此教化諸羣生至願垂顧念我二見正報文二初見二初翹心願覩爾時善財童子至願見彌勒菩薩親近供養二正覩慈尊乃見彌勒菩薩摩訶薩從別處來言別處來者攝化就機故還來歸本故亦顯慈氏應念而至不著處故無量天龍夜叉至而共來向莊嚴藏大樓觀所二明設敬儀五初身心禮敬善財見已歡喜踊躍五體投地二讚德記別文二初長行時彌勒菩薩觀察善財指示大衆歎其功德指示者令衆同覩倣而行故二偈正讚有一百一十三頌分三初指衆總歎而説頌曰汝等觀善財至而來至我所二別歎勝德三初二十二偈直對善財歎於中亦三初有九偈讚德善來善來圓滿慈善來清淨悲至修行不疲厭二有二偈明來因緣文殊德雲等一切諸佛子至今來至我所以外由善友內具德行三明來所為為求諸如來清淨之境界至而來至我所二對衆令觀讚五初四偈總讚汝等觀此人親近善知識至受諸勝果報二有四偈讚其即智之悲善財見衆生生老病死苦至示其安隱處三有七偈歎其即悲之智忍鎧解脫乘智慧為利劒至滅除三毒暗爾焰者此云所知入大乘論云爾焰地者是第十地此約盡斷十種所知障故四有六偈總歎諸德覺心迦羅邏悲胞慈為肉至專求善知識迦羅邏即揭蘿藍梵音輕重後五偈讚妙果當成當滅諸惡道當示人天路至其心大歡喜三重對善財讚五初讚其當果德二初總汝行極調柔汝心甚清淨至成就大菩提二別當滿諸行海當知諸法海至心生大歡喜二有七偈雙歎當現德汝於諸法門已得及當得至應生大欣慶三有八偈讚其遇友德諸根不懈倦志願恆決定至善哉住壽命四有五偈歎速成位行德已生菩薩家已具菩薩德至亦當如是學五有十七偈總明諸德結歎令欣一切功德行皆從願欲生至到佛功德岸三有一偈略示後友汝當往大智文殊師利所彼當令汝得普賢深妙行三重申敬儀三初辨敬因聞讚德故爾時彌勒菩薩摩訶薩至稱讚善財大功德藏二身心悲敬善財聞已歡喜踊躍至恭敬瞻仰繞無量匝三華供展誠以文殊師利心念力故表由信智衆華瓔珞華因德立瓔珞行成種種妙寶不覺忽然自盈其手信智滿故善財歡喜即以奉散彌勒菩薩摩訶薩上攝成因故辦當果故四再讚再説時彌勒菩薩摩善財頂為説頌言善哉善哉真佛子至獨如文殊及與我五慶遇念恩時善財童子以頌答曰我念善知識至願速還瞻覲
