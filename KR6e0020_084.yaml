body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經十明出現見聞親近所生善根前九出現一期始終今此意明於上見聞功深益遠獎物進修文三初徵起佛子菩薩摩訶薩應云何知至見聞親近所種善根二正顯二初見聞信向益二初法二初總佛子菩薩摩訶薩應知至所種善根皆悉不虗見等如後喻含之中所明二別出生無盡覺慧故至到無功用智地故別明信益示不虗相有十一句不出智斷恩等三德二喻文有三喻喻其三德初少服金剛喻佛子譬如丈夫食少金剛至不與肉身雜穢而同止故喻於智德智慧破惑如金剛故於如來所種少善根至諸行煩惱而共住故以有智者必無煩惱故不共住二小火燒多喻佛子假使乾草積同須彌至何以故火能燒故喻於斷德於如來所種少善根至此少善根性究竟故性究竟者了惑本寂故三藥王徧益喻二初喻佛子譬如雪山有藥王樹至亦能為作除病利益喻佛恩德種種方便利眾生故二合二初明為六根境界之益佛子如來應正等覺至則得念佛三昧清淨合上藥王編益六根皆通在世及與滅後滅後亦有得見佛故況憶念等寶性論中亦明如來與菩薩為六根境界大同於此二明供養遺迹益若有眾生供養如來至諸煩惱患得賢聖樂合上眾生取彼地土所經土地猶通現滅其塔廟者唯約滅後亦同法華乃至舉一手等皆已成佛道二見聞不信益佛子我今告汝設有眾生至乃至究竟入於涅槃此明益深如來秘密藏經中明罵藥服之猶能得方罵沈燒已還具香氣罵佛猶勝敬諸外道若爾豈無罵藥之罪罵罪非無今語遠益故法華中䟦陀婆羅罵常不輕千劫處於阿毗地獄受大苦惱畢是罪已還遇常不輕菩薩復蒙教化涅槃中喻以毒塗鼓欲聞不聞無不死者菩薩之名起自聞謗之口謗尚遠益況深信耶況解行耶況證悟耶弘持之者勉思此文第三約示佛子菩薩摩訶薩應如是知至諸不善法具足善法二總以結酬佛子如來以一切譬喻至為說譬喻非是究竟揀喻異法上來性起請說因喻普賢依請明十出現皆借象取喻意顯佛旨深玄深玄之旨尚不可以智知豈言象之能及故令外亡言象內絕思惟則庶幾於出現之旨五顯名受持分先長行若準晉經此文之前有諸菩薩發二種問謂何名此經云何奉持今但有答即分為二先顯名後正明受持令知總名尋名求旨識受持法依之修持今初顯名佛子此法門十名分為五對名為如來秘密之處名一切世間所不能知內深外絕對謂內證三德秘密藏故外則凡小不能測故名人如來印名開大智門證寂開智對名示現如來種性名成就一切菩薩現果成因對謂性淨萬德即是佛種今此十門出現之法即示現義名一切世間所不能壞名一向隨順如來境界越世順佛對世尚不知安能破壞此十通是佛分齊境名能淨一切諸眾生界至根本實性不思議究竟法淨機演實對知生佛同源則能淨故隨緣不變之性乃為諸佛之本故而性相無礙因果圓融為不思議過此更無為究竟法前九別義後一總該二明受持初辨定法器二初法二初標器非器佛子此法門如來不為餘眾生說非器不為所謂權小乘可思議乘歷次修故名餘眾生唯為趣向大乘菩薩說唯為乘不思議乘菩薩說是器即為所謂圓機不揀凡聖趣向大乘揀於小乘不思議乘揀於權乘一運一切運十信滿心即攝諸位圓融無礙名不思議乘二明受非受此法門不入一切餘眾生手唯除諸菩薩摩訶薩釋於上來為與不為有圓信手能受眾行故上為之權小於斯不盡能受是故不為法集經云是經雖行閻浮提中於能信深法者常住如是正信眾生心手中行亦有人以信解行證皆有手義以後後破前前亦是一理二喻佛子譬如轉輪聖王至於七日中悉皆散滅二合佛子此經珍寶亦復如是以此經文合七寶者若無此法非真佛故不入一切餘眾生手唯除如來法王真子生如來家生如來家合上喻中第一夫人所生太子種如來相諸善根者初心頓行佛大行故佛子若無此等佛之真子如是法門不久散滅言散滅者有二義故一不能信受則教不行二不能修行則行不行般若論云法欲滅時修行滅故何以故一切二乘不聞此經至唯諸菩薩乃能如是釋散滅所由可知二舉益觀修三初略標釋是故菩薩摩訶薩聞此法門至三藐三菩提故二廣釋所由二初反顯佛子設有菩薩於無量百千至以不能生如來家故若有菩薩不依此教縱經多劫修諸勝行尚非真實況能疾得無上菩提設有之言似當假設若望慈氏讚善財言餘諸菩薩百千萬億那由他劫乃能滿足菩薩願行今此善財一生能淨佛剎等斯則舉權以顯於實非假設也若實有此不信人者為在何位文無定判義當三賢入地證聖必信圓故若約教道縱經三祇亦未入玄所以凡夫頓能信者宿因聞熏為種別故今更不信當來豈聞二順釋二初明聞信生家益若得聞此如來無量不可思議無障無礙智慧法門辨定所聞即不思議乘故聞已信解隨順悟入總翻上文不信等故當知此人生如來家上八字為總餘句為別別中有九隨順一切如來境界以如來境為家無性論云生如來家者謂佛法界於此證會故名為生具足一切諸菩薩法以菩薩行法為家具家法故安住一切種智境界以俗境為家世親釋云由此能令諸佛種性不斷絕故遠離一切諸世間法遠離非家出生一切如來所行以佛行為家十住毗婆沙第一卷云今此菩薩行如來道相續不斷故廣如彼釋通達一切菩薩法性菩薩法性為家亦是佛種性故亦同如來一如境故於佛自在心無疑惑淨當佛家住無師法住本佛家深入如來無礙境界總明因果事理無礙家前六自分家後三勝進家前來初見心性故名為生家四地已去寄出世故生道品家八地由得無功用故生於無生法忍之家今此通三兼顯凡夫悟解之心亦名生家因果無礙故二信聞成行益佛子菩薩摩訶薩聞此法已十句分為五對無礙則能以平等智知無量法則能以正直心離諸分即觀不礙於止則能以勝欲樂現見諸佛至入平等虗空界見佛不礙入法則能以自在念行無邊法界至具一切功德智行法界不礙起福則能以自然智離一切世間垢至入一切十方網智不染世不礙悲入則能以大觀察知三世諸佛至入如是法不入而入體絕三世不礙用而迴向不入而入釋上入義不於一法而有攀緣恒以一法觀一切法復釋不入而入智體即如如外無法而可攀緣故無可入心行處滅寂然無入不失照用故恒以一如而觀諸法故名而入此二無礙方為真入又一即是如便於一中已見一切二總結成益佛子菩薩摩訶薩成就如是功德至得無師自然智無師自然即是佛智二偈頌即屬第十見聞之益不頌此段顯名受持顯名受持後文自頌此頌應在揀法異喻經文之前以前長行鉤鎻顯名亦是見聞所得益故若迴此偈於現瑞後與後偈文連環相續文理甚順四偈分二初一頌法說爾時普賢菩薩欲重明此義而說頌言見聞供養諸如來至要滅煩惱離眾苦二有三偈如次頌前三喻譬人吞服少金剛至得勝功德到佛智六現瑞證成文二初現瑞爾時佛神力故法如是故至充滿無邊法界先明此界動剎雨華及香雲等數皆廣多者法難思故後類通十方如此四天下如來神力至一切世界悉亦如是二證成先果人證後因人證所以要具二種人者法玄妙故亦是因果交徹法故亦是因圓果滿法故前來諸會唯菩薩者唯因行故發心品中唯果證者果之本故初心成佛難信受故隨義各別所以互無唯斯具二今初分四初現身是時十方各過八十不可說至同名普賢皆現其前二讚說而作是言善哉佛子至演說如來出現不思議法二引說證成佛子我等十方八十不可說至一切諸佛亦如是說此中兼明結通所說一說一切說故四舉益證成四初得因位圓滿之益佛子今此會中十萬佛剎至得一切菩薩神通三昧即十通及十定我等皆與授記一生當得阿耨多羅三藐三菩薩一生當得大菩提故二得發心益佛剎微塵數眾生至佛剎微塵數劫皆得成佛與遠記者由機本願不期速成故又前明一生即多之一此辨多劫即一之多一多圓融何定劫數妄生多劫智日不遷苟執短長未期成佛同號佛殊勝境界謂緣諸佛出現境故三護持久遠益我等為令未來諸菩薩聞此法故皆共護持四結益廣徧如此四天下所度眾生至所度眾生皆亦如是二因人證亦四初明集因爾時十方諸佛威神力故至顯現一切智自在故前果人證承於前來現瑞之因故略不敘今此要顯因果別故廣出集因二明現身十方各過十不可說至充滿十方一切法界雖來自十方而周徧法界來即無來三辨其德用示現菩薩廣大莊嚴至領受無量諸佛法十句文顯四發言誠證以佛神力各作是言至我等一切皆名普賢皆同普者普法同故各從普光明世界常寂光土無不徧故普幢自在如來所而來於此本智高出無所不摧事理無礙世界與佛名字異者要顯不失主伴故也彼一切處亦說是法至諸四天下亦復如是兼亦結通所說七以偈總攝文二初敘意二初說偈儀爾時普賢菩薩承佛神力觀察一切菩薩大眾二辨說偈意欲重明欲重顯前十門出現文有十句句各一門而約利生為次不等如來出現廣大威德一成正覺如來正法不可沮壞二即法輪無量善根皆悉不空三是第十是見聞生善上之三句正顯益故諸佛出世必具一切最勝之法四即第一出現之法是前總門善能觀察諸眾生心五即是心約智顯故隨應說法未曾失時六即圓音生諸菩薩無量法光七即境界境界無量出光亦多一切諸佛自在莊嚴八即涅槃動寂自在大般涅槃為佛莊嚴一切如來一身無異九即身業約本說故從本大行之所生起十即是行果中說因故而說頌言第二正頌四頌分二初有一頌頌說分中總以結酬一切如來諸所作至非喻為喻而顯示此一總包十段意故二有三頌顯名受持初句顯名餘皆勸持且分為三初偈歎深難聞如是微密甚深法至乃得聞此祕奧義二有一偈聞由多善若聞此法生欣慶至人天讚歎常供養三有一偈舉勝勸持此為超世第一財至汝等當持莫放逸然此一品文旨宏奧能頓能圓究眾生之本源罄諸佛之淵海根本法輪之內更處其心生在金輪種中復為嫡子妙中之妙玄中之玄並居凡類之心以少功而速證安得自欺不受長淪生死之中今幸遭逢左須自慶此下入第五十三經離世間品第三十八初明分來前明修因契果生解分則於法起解今明託法進修成行分則依解起行義次第故二會來者前會明其因圓果滿生解之終此會正行處世無染通於終始故次來也三品來者前品出現辨果殊勝今明依彼起行圓融故次來也雖一分一會一品是同所對既無來意亦別初分名者伏託法行修成正行故以為名二會名者約法而論不異分名約處名為三會普光明殿之會第七重會會終歸始故雖曰四天莫非同為生解之會今復重會對通彼分始終依解以成勝行故會普光而前分中生解差別故寄歷處以顯淺深今分起行圓融一會並收因果亦表成行不離普光明智故也此中不隔餘處何有重會之義若約次第前時後時即是重義若約圓頓就義名重所以不動前二而升四天二七相望亦何所隔明知約義亦猶燈光涉入無礙亦似燈炷重發重明約人名為普慧普賢問答之會三品名者初明異名下文十義至彼當辨有別行本名度世經度即離義又有別行名普賢菩薩答難二千經此就能離人法受稱二辨本稱總由超絕世間雜染故受其名一約事相有二世間謂器及有情此約依正分之二約麤細亦有二義一有為世間二無為世間此約分段變易分之謂以變易非三有攝故名無為故勝鬘云有為生死無為生死然麤細雖殊體無出二三約染淨乃有三義於初二中加智正覺亦同世間不同世故如地持辨二明離者有二義一者性離世間性空即是出世二明事離行成無染故稱為離力林頌云三世五蘊法說名為世間彼滅非世間如是但假名滅通二義於事離有中似離真離分離全離次下當辨二約行者略為四句一隨世間二離世間三俱四泯言隨世者凡夫沉溺三世五蘊非離非隨二乘無悲不能隨世雖離非真菩薩能隨方為真離故以隨釋離二離世者有大智故了世性離處然不染亦異凡小三俱者有大悲故常行世間有大智故不染世法既以世與性離無二為其境以悲智無二為其行境行融通有其三句一悲無不智則世無不離是以常在世間而未曾不出二智無不悲故離無不世是以恒超世表而無不游世三雙融故動淨無二唯是一念所謂無念念等故世與出世無有障礙四俱泯者謂唯一境既世與性離形奪兩亡故令悲智俱融二念雙絕又由境行相由形奪齊離則絕待離言融前四句皆無障礙方得名為真離世間三約位者凡夫染而非離二乘分離非真謂果離分段因唯事離非今所明菩薩具上真實之行可得名離然非究竟唯佛為離是故經云佛常在世間而不染世法然今文備六位之行即是行離行所依位即是位離故若事若理若因若果皆名離也二釋名者約法事離無他受稱離非世間即相違釋若約性離通持業釋約行四句前之三句俱通持業相違二釋謂具事理二種離故泯句並非六釋所攝亦可持業泯即離故第三宗趣頓彰六位理事二離而為其宗令體性離頓成真離究竟為趣四釋文長科十分初序分有三初明器世間圓滿爾時世尊在摩竭提國至坐蓮華藏師子之座義如前釋此段文含三種成就二智正覺世間圓滿妙悟皆滿明佛二十一種殊勝功德廣引諸論已見前來升兜率品今但略明上句為總具下二十一種功德故云妙悟皆滿下別前四自利餘皆利他前中有四一智德二斷德三恩德四作用平等德二行永絕一即於所知一向無障轉功德佛地經名不二現行不字約義應言無字即永絕義謂佛智德離所知障非如聲聞極遠時處有不知故有知不知即是二行今無不知故云永絕達無相法二即於有無無二相真如最勝清淨能入功德彼經名趣無相法趣謂趣入即此達義然無相法體即真如無彼有無二相故名無相諸法中最淨無客塵令自他入勝於二乘名最勝清淨住於佛住三即無功用佛事不休息功德世親釋云謂住佛所住無所住處此即釋經於此住中常作佛事無有休息此即解論得佛平等四即於法身中所依意樂作事無差別功德謂諸佛有三事無差一所依智同二益生意樂同三報化作業同故云平等到無障處五即修一切障對治功德世親釋云謂一切時常修覺慧對治一切障故此明覺慧以為能治一切障者即二障也此為所治不可轉法六即降伏一切外道功德謂教證二道他不能動所行無礙六即生在世間不為世法所礙功德謂利衰等八法不能拘故立不思議八即安立正法功德謂安住十二分教餘不能思故普見三世九即授記功德謂記別過未皆如現在故身恒充徧一切國土十即一切世間示現受用變化身功德謂二種身徧二種國故智恒明達一切諸法十一即斷疑功德謂自於一切境善決定故能決他疑了一切行十二即令入種種行功德二本釋論易故不解意云徧了一切有情性行隨根令入盡一切疑十三即當來發生妙智功德謂聲聞人言其全無少分善根如來知其久遠微善後當生故無能測身十四即如其勝解示現功德謂隨有情種勝解現金色等雖現此身而無分別如摩尼等故無能測一切菩薩等所求智十五即無量所依調伏有情加行功德謂由無量菩薩所依為欲調伏諸有情故發起加行佛增上力聞法為先獲得妙智異類菩薩攝受付囑展轉傳來前後相續無間而轉由此證得一切菩薩等所求智意云佛智為一切菩薩等所求故到佛無二究竟彼岸十六即平等法身波羅蜜多成滿功德平等即無二義無二法身為波羅蜜多所依具足如來平等解脫十七即隨其勝解示現差別佛土功德此中解脫即是勝解隨諸物情勝解所宜如來勝解能現金銀等土佛佛皆然故云平等證無中邊佛平等地十八即三種佛身方處無分限功德世親釋云謂佛法身不可分限爾所方處受用變化亦不可說爾所世界盡於法界十九即窮生死際常現利樂一切有情功德等虗空界二十即無盡功德謂佛實智如空無盡故今經闕最後窮未來際總別合有二十一句義如前說然佛地攝論約受用身此約十身所以知者處摩竭提國是變化土而文既歎受用功德明知報化二身二土本相融故不須要約地前地上則知五位通得見故三眾生世間圓滿文二初舉歎德二列名歎德前則多人具德後則勝人具德前中二初舉數揀定與不可說百千億那由他佛至種種國土而共來集二顯具勝德三初總標悉具菩薩方便智慧二別顯文有一十九句大意不出方便智慧分二初十歎自分德所謂善能觀察一切眾生至善入無量諸方便法前八皆有智慧方便依體起用上五皆以善能為首知諸眾生空無所有而不壞業果智空不壞業界善知眾生心使諸根境界方便種種差別知根器別明識悉能受持三世佛法自得解了復為他說持法化之於世出世無量諸法至悉善觀察知無有二後二明有方便慧皆即事歸實二九句歎勝進德於一念中悉能獲得三世諸佛所有智慧上一總明速成果智下八皆是果智之用於念念中悉能示現至清淨行願悉已具足三總結成就如是無量功德一切如來於無邊劫說不可盡二列名歎德二初列名結數其名曰普慧菩薩至百千億那由他佛剎微塵數二正明歎德皆悉成就普賢行願文有十句上一總餘九別深心大願皆已圓滿契理願圓普眼滿故一切諸佛出興世處悉能往詣請轉法輪攝法上首為普化故善能受持諸佛法眼受持正法有普慧故不斷一切諸佛種性不斷佛種普見有性故善知一切諸佛興世授記次第名號國土知佛化儀光普徹故成等正覺轉於法輪無佛世界現身成佛示現成佛觀彼無故能令一切雜染眾生皆悉清淨淨染機照其源故能滅一切菩薩障摧他障有智幢故入於無礙清淨法界證法界覺法性故上之九句若約別明初句為願餘八為行通說則皆普賢行願宿誓今滿如十大願普賢行現緣所作故總句云成就行願又此十句十人通具初句文云皆悉成故亦句各顯一人之德當釋名故故總句為普賢故餘九如次前已配釋此段即是眾成就也二三昧分爾時普賢菩薩摩訶薩入廣大三昧普賢入者是會主故說普行故名佛華莊嚴萬行披敷嚴法身故即以法界行門心海為三昧體持無限故說法成行發起為用依此體故三發起分入此三昧時十方所有一切世界六種十八相動先明地動警羣機故出大音聲靡不皆聞後顯出聲令聞法故前皆有加而無發起此有發起而無加者前表解從他緣故有他加此表行由己立故自發起又表行依解起無別法故所以不加攝解成行亦須入定聖旨多端不可一準四起分然後從其三昧而起三義如前解釋五請分分三初標問意爾時普慧菩薩知眾已集問普賢菩薩言當機眾集說法時至此為問意何以前來諸會經文先問後定今乃翻此此有二意一說儀無定前表重法感而後應此明悲深觀機欲說眾既已集故先入定令知說主二約所表所來意明從相入實以成正解此中意明依體起用以成正行故不同也普慧問者稱法界慧能發行故一人問者行獨已成非如解故二正顯問端有二百問其別行度世經別作六番問答番番之中先問次答動地現瑞顯益證成古來諸德皆依彼文用科此經以為六段初二十句問十信行佛子願為演說何等為菩薩至何等為演說佛二有二十句問十住行何等為發普賢心至何等為變化三有三十句問十行之行何等為力持至何等為入無上菩提如海智四有二十九句問十迴向行何等為如寶住至何等為業何等為身五有五十句問十地行何等為業何等為身至何等為所行處六有五十一句問因圓果滿行何等為觀察至何故如來應正等覺示般涅槃第四段中句雖三十以無礙用一句經文是總標虗句故彼但有二十九句此段有五十一句此經前後總經三徧開說六位此當第二約行說也以普賢行該六位故故度世經最初請云唯願解說諸菩薩行從始至終令無疑故彼經雖然不配信等既云從始至終末後復明成佛之事則知決是六位之行此經所以不將問答相間者意取位中殊勝之行不取位故如不圓融若剋定約位何殊差別因果此經上下及本業經等判於六位皆以十信未得入位十住為首謂三賢十聖等妙覺故今此何以不開等覺而取信耶此有深意彼及此前意在於位取位成說今此文意正明於行十信之行正居行始等覺之位有其三義或攝屬前十地勝進或攝屬後即名佛故或別開位無垢地故今為說行是故攝屬因圓之中經文雖有五十一句唯後四句屬妙覺位餘皆等覺若爾此中依言依菩提心等豈非發心住耶此難尤非第二段初發普賢心豈非發心住耶十信之初豈無發心耶故賢首云菩薩發意求菩提非是無因無有緣等正是發心所依不究斯旨空張援據三結請為說善哉佛子如是等法願為演說
