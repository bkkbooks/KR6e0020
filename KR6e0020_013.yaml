body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經七西南方十事初定方所此華藏世界海西南方二明土海次有世界海名日光遍照三辨世界彼世界種中有國土名師子日光明四彰佛名佛號普智光明音五主菩薩於彼如來大衆海中有菩薩摩訶薩名並華光𦦨髻六眷屬數與世界海微塵數諸菩薩俱七至佛所來詣佛所八興供雲各現十種衆妙莊嚴寶蓋雲至悉遍虗空而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於西南方各化作至於其座上結加趺坐八西北方十事初定方所此華藏世界海西北方二明土海次有世界海名寶光照耀三辨世界彼世界種中有國土名衆香莊嚴四彰佛名佛號無量功德海光明五主菩薩於彼如來大衆海中至名無盡光摩尼王六眷屬數與世界海微塵數諸菩薩俱七至佛所來詣佛所八興供雲各現十種一切寶圓滿光雲至悉遍虗空而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於西北方各化作至於其座上結加趺坐九下方十初定方所此華藏世界海下方二明土海次有世界海名蓮華香妙德藏三辨世界彼世界種中有國土名寶師子光明照耀四彰佛名佛號法界光明五主菩薩於彼如來大衆海中有菩薩摩訶薩名法界光𦦨慧六眷屬數與世界海微塵數諸菩薩俱七至佛所來詣佛所八興供雲各現十種一切摩尼藏光明雲至而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於下方各化作寶𦦨燈至於其座上結加趺坐十上方十初定方所此華藏世界海上方二明土海次有世界海名摩尼寶照耀莊嚴三辨世界彼世界種中有國土名無相妙光明四彰佛名佛號無礙功德光明王五主菩薩於彼如來大衆海中至名無礙力精進慧六眷屬數與世界海微塵數諸菩薩俱七至佛所來詣佛所八興供雲各現十種無邊色相寶光𦦨雲至而不散滅九申禮獻供現是雲已向佛作禮以為供養十化座安坐即於上方各化作至於其座上結加趺坐十方化座體相各異而皆同名蓮華藏師子之座者師子之義已見上文蓮華藏言通有三意一約菩薩表含藏開敷故二約所詮將說依報故三約諸會通顯華嚴故上下還於本方坐者佛圓回身皆見面故異於餘宗但八方故三總結如是等十億佛剎微塵數至於其座上結加趺坐文有其八一略示前文云如是等二總明海數謂十億剎塵以上來所列是華藏鄰次之海口光各照一億十方故有十也上二段前別中所無三結主四結伴五結來至六結興供七結禮獻八結安坐既為總結故闕定方已至會中故闕初海等三事二現自在用即為歎德謂塵塵近佛念念益生文有其八一明諸菩薩毛孔現光如是坐已其諸菩薩至一切寶種種色光明二光現菩薩一一光中悉現十世界海至皆坐蓮華藏師子之座三菩薩入塵此諸菩薩悉能遍入一切法界諸安立海所有微塵略有二義一一切施設依正等塵一一稱真故二約觀心衆生意識所緣即是法界例依名相分別而轉是謂安立妄故為塵體皆可依是名大剎皆有覺性是曰如來此明菩薩證入衆生性海四塵含廣剎彼一一塵中皆有十佛世界微塵數諸廣大剎五剎有如來一一剎中皆有三世諸佛世尊隨世俗故說有三世全稱性故並在塵中六菩薩往供此諸菩薩悉能遍往親近供養通財及法七助佛揚化於念念中以夢自在至隨衆生心悉令開悟八所化成益念念中一一國土至廣大願海生如來家於中賢首對前開悟以三義釋之初別配釋謂以前十法門對後所成十益一門得其一益二三前却餘並如次一以夢自在門夢中警覺造惡衆生令得斷惡免苦益故二以菩薩行門令入正定三以現諸天歿生門令生天受樂以放逸則歿剋念便生故上三人天乘四以動剎現無常令厭以歎佛神變令欣成二乘益下皆大乘五以嚴剎大願令修福求向六以攝生言辭令發大心以佛音聲即同體大悲故七以佛雲雨法令入菩薩不退之位已上三位在地前三賢八以照遍滿法界土及神變令得初地已上智眼見平等法九以佛普現遍法界解脫力令得八地已上大力大願無盡智淨國土益十以普賢建道場令住佛果大願海言生如來家者入佛果位故生非是初地已上生佛家也二圓通者此上十法於此十益一一遍通謂或一法成十益或十法成一益如是互遍無所障礙三各別者謂前十法門各自開悟世界海微塵數衆生此以法無益後十益但言須彌塵數不言剎塵之國則是己身以人為益既各別釋則夢自在門亦顯一切皆如夢故延促等無礙故云自在餘並可知此上菩薩法化始從放光終於得益順數八段逆推十二重疊無盡一其十須彌塵數衆生得益方在一國餘一切土皆爾故云一一國各各令等也二此一切土益在一念時中餘一切念時皆爾故云念念中也三如是念念之益方是一法門所開悟一一法門皆爾四彼多法門方是一念所用餘念念所用法門亦爾五彼多念法門方論一廣剎如一廣剎如是十剎塵數廣剎皆爾六彼多廣剎方論一塵內如一塵一切安立中諸塵亦然七如上諸塵方是一安立海如一安立海遍法界諸安立海亦然八遍法界安立海中業用方是一化菩薩所化如一化菩薩十世界海化菩薩一一皆然九諸化菩薩方是一光所現如一光一一光亦然十彼十剎塵數光明方是一毛孔現如一毛孔遍身一一毛孔皆然十一彼遍身毛孔方是一菩薩如一菩薩有如是十億佛剎微塵數箇世界海微塵數菩薩有如是孔皆爾十二上來所明十一重作用方論來此一會如此一會於餘佛會亦復如是此後一段偈文具之又上十二重一一開之為二便成二十四重且如一念望一切念即是二義類例相似合之為一餘十一重準此思之如是重疊無盡各周法界唯智頓觀非心識境華嚴海會大用皆然三光聲自述前既光聲召命今亦光聲自述菩薩位極用窮深廣若非自述時衆難知十頌分二初一總明兼陳說處爾時諸菩薩光明中同時發聲說此頌言諸光明中出妙音至能入菩提之妙道二別顯德用殊勝三初通顯體用自在劫海修行無厭倦至佛子善入斯方便悲智相導度衆生而不疲盡諸劫海修方便至而恆說彼性寂滅空有雙觀入法門而常寂三世諸佛所有願至而為自行清淨業物我無滯故化他而自淨二別敘前現自在與前影略一切諸佛衆會中至入彼如來寂滅法身遍十方智觀寂滅即顯不唯來此會也一一光明無有邊至見諸菩薩所行境身光普入智眼遍觀菩薩能住一毛端至是其清淨方便地住一毛端遍動諸剎況乎於上處寶蓮華一一塵中無量身至獲無礙意莊嚴者塵塵多身門門化異舉一歿生門可以例諸三世所有一切劫至證明法性無礙者念劫無礙結由證深念劫既融故於念念能作法性無礙者分與無分皆無礙故謂證理不唯無分故在一切處而全在此一法一切法亦然各有四句身等不唯分故常在此而無在思之後一偈結廣有歸普賢勝行皆能入至諸光明中大音吼普賢勝行皆入非獨向來所陳故能光中演斯自在四現瑞表說上所現相但召有緣衆集將陳故重現斯瑞瑞文有三初光示法主二現華表義三現衆表教法籍人弘故先明主義為教本故在教前初文分六初意爾時世尊欲令一切菩薩至無邊境界神通力故二體放眉間光眉間者表離二邊故於體不計有無二邊於義不著常無常等諸法相邊於行不習苦樂二邊於道不住邪正二邊於人不執因果二邊於教不說世出世二邊於諦不見真俗二邊於化不定權實二邊是故為衆放眉間光三名此光名一切菩薩智光明普照耀十方藏上句令得能知智也下句令照所知境也藏有三義一智光含德無盡故二以十方剎海各於塵內重含諸剎故三亦通於五藏以言智光故照初二藏令菩薩證照次二藏令菩薩成證則得於涅槃成則得於菩提照第五藏令化令淨三中後二如下業中四相其狀猶如寶色燈雲謂色如燈雲猶日月洞照周遍潤澤雨法雨故如相海品五展即光業用五初所照分齊遍照十方一切佛剎二光現依正其中國土及以衆生悉令顯現三動其剎網又普震動諸世界網以諸世界重疊影現交互相當猶如網孔四塵現如來一一塵中現無數佛五隨機雨法隨諸衆生性欲不同至普賢菩薩道場衆會略舉三法皆下所顯初法輪雲示其所行二出離雲示其所度三大願雲示說法主謂將說普法令知法主大願普周剎塵內故六收作是事已右繞於佛從足下入示有終歸也證從佛流眉間出光修因順果故須右繞自下升高故從足入履佛所行方證入故二現華表義二初總標華現爾時佛前有大蓮華忽然出現為座所現中方衆故通表所詮佛華嚴故別表華藏佛所淨故故於佛前出此蓮華既通表華嚴亦具同時具足等十門及教義等而其本意正表義耳忽然現者依理起事難測量故二顯具德嚴二初標十種其華具有十種莊嚴一切蓮華所不能及先標十種顯德無盡二別列十句初體備衆德所謂衆寶間銷以為其莖至妙網覆上光色清淨蓮子住處有含藏之義故名為藏表示法門一含一切華藏之名由此而立二妙用自在於一念中示現無邊諸佛至一切菩薩所修行願一念況多摩尼寶王即前藏體影現佛身即依正無礙既發多聲聲皆演法三現衆表教三初現衆時此華生已一念之間言一念者華生無間表教義相應二現衆處於如來白毫相中表教從所證淨法界所流為衆教源如白為色本三正明衆現三初主屬齊現有菩薩摩訶薩名一切法勝音至俱時而出遍詮諸法故云一切所詮圓滿是曰勝音圓教法門必攝眷屬故下文云世界海微塵數修多羅以為眷屬權實無礙故曰俱時二申敬就座右繞如來經無量匝至各於其上次第而住主伴雖殊並修因須果故右繞如來文義相隨故依華坐正助不等臺鬚有差上義依理明故忽然而現今教由人立故衆從佛流亦如涅槃從牛出乳三彰其德業其一切法勝音菩薩主教是宗故偏難至文有十句略為二解一豎配十地明比普攝十地功德一句一地了深法界生大歡喜初地歡喜得智證如入佛所行智智無疑滯二地性戒是佛所行入不可測佛法身海三地多聞入法身海往一切剎諸如來所四行道品善友是依身諸毛孔悉現神通五地雙行現通利物念念普觀一切法界六觀法界般若現前十方諸佛共與其力七功用已絡所佛與力令普安住一切三昧八無住無動住三昧心盡未來劫常見諸佛無邊法界功德海身九為法師見無邊法乃至一切三昧解脫神通變化十具於大盡三昧等圓初地尚攝諸地功德況於後後不具前前二橫就極位釋一理智了真二量智入行三證窮法身四常觀受用五毛現神變六念觀法門七外感佛加八內安深定九豎見來際十橫無不圓故此十句攝為五對若橫若豎能詮必具故為二釋五稱揚佛德既現既至任力稱揚自申罔極之情顯佛無涯之德文分為二初一眉間菩薩讚後十十方菩薩讚新衆才集佛便現瑞文不纍書故編成次以讚德相類結集併之一處乘現勝音之次先舉勝音之偈後十菩薩即如次十方昔人不曉斯文便將後十為勝音眷屬非唯章疏之失亦乃翻譯有違何者且眉間出衆即主伴皆讚十方來衆寂無一言主伴禮儀一何疏索況準法界品例來者皆有讚辭細尋菩薩之名與前十方如次相似但由譯人不審致令名小乖差至下文中一一對辨今初勝音文分二初說偈儀即於衆中承佛威神觀察十方而說頌曰二正說偈然偈中總相讚佛亦含諸問思之可知十頌分三初直就佛歎皆歎如來體用無礙於中初不動本而周遍佛身充滿於法界至而恆處此菩提座十身圓融遍四法界二不壞小相而廣容如來一一毛孔中至如是普周於法界上則事如理故此則事含理故前一偈半一毛攝三世間後半類餘謂遍法界內皆有佛身無有一毛不含剎海又一毛表解脫門諸佛菩薩智所住故現多剎海者門門皆見淨土因二約衆歎佛者聖賢輔翼顯主勝故六偈總明主伴皆遍二初二總身總相遍一一剎中悉安坐至乃至法界咸充遍二有四偈總身遍別法界微塵諸剎土至法界周流無不遍既微細難思故唯普智方知普行方立三一偈雙結主伴一切剎土微塵數至各雨法雨稱其心第二十方菩薩讚德十初東方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰言衆中者大衆海中前列名處名觀察勝法蓮華幢幢相高出王是超勝此喻相似光慧即是所喻幢體二正說偈讚佛真應二身密答佛地如來智等攝佛地故十頌分二初三讚真後七讚應讚真必體用雙美讚應唯約用明欲顯門差實非體外今初分三初一讚智身次一讚法身後一雙結智含四智法即法界五法具矣初讚智身如來甚深智普入於法界能隨三世轉與世為明導上半正體證真下半後起隨俗又句各一智初句大圓鏡智行相深細故次句平等性智自他平等即法界故次句妙觀察智於自共相無礙轉故末句成所作智成就利他導世事故二讚法身諸佛同法身無依無差別隨諸衆生意令見佛色形上半體相皆同同有二義一本性法身體同言無依者無住本故無差別者體無二故二已證法身相同力無畏等皆無異故此則無礙慧身不依一切離諸分別是無差別下半用同能現能生身土智影皆無二故即法身無色應物現形三雙結具足一切智遍知一切法一切國土中一切無不現上半結智上句根本下句後得下半結法但舉其用體通上下以智契如故金光明說如如及如如智為法身故二讚應三初隨樂現應佛身及光明色相不思議衆生信樂者隨應悉令見不思議者隨緣無邊故光明覺云億那由劫共思量色相威德轉無邊等二身光演法於一佛身上化為無量佛至淺智不能測初一化身演法望前應身即重化也次二毛光演法後一結歎難量法輪義如別說三成道起通一切世界中現身成正覺至普現神通力上皆圓融亦有十身且從一義耳二南方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前雲集中名普照法海慧會義亦同光明即照法故二正說十頌歎佛寂用應機德答前境界法身顯現即分齊境無生無體即所觀境衆生國土皆所化現文三初四依真起應二初一偈顯真佛身常顯現法界悉充滿恆演廣大音普震十方國佛身常者第一義常出三世故智符於理湛然常照顯者離二障故現者常在前故不同衆生自體常也法界悉充滿者諸根相好一一無邊無限福智所莊嚴故次二句音恆用普恆自受用廣大法樂故二三偈起用如來普現身遍入於世間至能入能觀察初一普隨物樂次一感應道交後一法光無際二體用無礙佛身無有生而能示出生至所現皆如影初二句約相無生現生次二句約性無住而住次一偈約用無去住而普周後偈體用雙拂謂無體拂上無生無生為佛法體故今體即非體無住處者拂約性二句亦無生可得拂示生句下半拂前第二偈約用用如影故三真應無盡佛隨衆生心為興大法雲至色相絡不盡一法雲無盡二衆會無盡三身相無盡無盡相言兼真身故終不盡者全同體故三西方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前名月光香𦦨普莊嚴此中光即月光明慧即是智慧莊嚴二正說十頌讚佛身含衆海即答加持問由加能入故於中前九譖衆海則佛德可知分二初一總此會諸菩薩入佛難思地一一皆能見一切佛神力二八別二初平遍一切入塵現用智身能遍入一切剎微塵至入佛之境界初一智身入剎塵次一色身普現用後二釋成前義一普賢行圓二身心平等二微細入於毛孔剎作用已證如來智等照於法界至一念皆能現二有一頌結德歸佛一切諸佛土一一諸菩薩普入於佛身無邊亦無盡非唯一會一切菩薩皆入佛身方為讚佛四明北方二初說偈儀爾時衆中復有菩薩至遍觀十方而說頌曰此同本名但加慧字二正說十頌歎佛依體起用轉大法輪答前佛行佛以轉法化生為其行故文三初二句總毗盧遮那佛能轉正法輪二有八偈半別讚佛十化法界諸國土如雲悉周遍現受生化處處受生身雲偏故十方中所有諸大世界海佛神通願力處處轉法輪讚神通化雖云轉法意在通用一切諸剎土廣大衆會中名號各不同讚業果化一切諸剎名號不同者示同趣類業報名字故上三依身隨應演妙法辨揚化隨應則能斷彼疑故如來大威力普賢願所成一切國土中妙音無不至勸讚勵化妙音讚勵故佛身等剎塵現一切世間普雨於法雨無生無差別慶慰化普雨法雨令彼進修無生法故上三語業無數諸億劫一切塵剎中往昔所行事妙音咸具演領受意化領問受取演昔行故十方塵國土光網悉周遍光中悉有佛普化諸羣生決擇意化決擇有情心行差別及揀諸法性相不同方能普化故佛身無差別充滿於法界能令見色身隨機善調伏發起意化發起衆善及三乘大行為善調故三世一切剎所有衆導師種種名號殊為說皆令見造作意化建立佛法事義種種皆令見故依實起用即是化身故說化身無別心色上之十化與佛地經次第無違但令相融不違經旨三結歸斯會過去及現在一切諸如來所轉妙法輪此會皆得聞五東北方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前衆集中名最勝光明燈無盡功德藏法海可當最勝光明義與慧同功德藏名前後無別無盡二字前有後無二正說偈讚佛攝勝眷屬答佛力問寄讚菩薩實由佛力故結云住於力地中文二初一智滿得法即為總相此會諸佛子善修衆智慧斯人已能入如是方便門末句有二意一指前謂具前三輪之化故能周遍一一國土二即下九別為如是方便也二別相共讚七事一一國土中普演廣大音說佛所行處周聞十方剎一讚普演大音有三種大一者處大一一國故二者義大說佛行故三者體大周聞十方故一一心念中普觀一切法安住真如地了達諸法海二讚時無空過念念觀法證真實故一一佛身中億劫不思儀修習波羅蜜及嚴淨國土三能入勝處諸佛身中修淨國故一一微塵中能證一切法如是無所礙周行十方國四於染無礙塵中證法而周行故一一佛剎中往詣悉無餘見佛神通力入佛所行處五能入佛境見佛神力入行處故行處有二一智行處謂十力境二佛化處謂器及衆生諸佛廣大音法界靡不聞至一切皆能了六善入音聲初一入大音次一入妙音後一入一切音從地而得地住於力地中億劫勤修行所獲法如是七善知諸地言從地者即出心也而得地者即住入也力地中者即佛地也所獲法者結上方便也六東南方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰名全同前二正說頌讚諸菩薩悟入深廣由三昧力見佛三昧即答三昧問也文四初歎見佛真體一切諸如來遠離於衆相至自在之體性一見佛離相二見佛自在言離衆相者般若云離一切諸相則名諸佛慈氏論云但離四相即離一切謂名義自性及差別也言自在者由菩薩定慧雙運故見佛自在也二別明悟法見佛真實體則悟甚深法至一切諸法海一證深理法願力而現二悟多行法福智成形三達果法體無不遍四了教法深廣難知三歎身業普應唯一堅密身一切塵中見至速令向佛道一深二廣云堅密者齊佛體用堅即金剛之身密謂三密之一即一而多故遍一切即大而小故現塵中無功之應故無相而現若約法門此身即如來藏性也不可破壞故堅深而難見故密衆生塵心無不皆具本自有之故曰無生體絶百非故曰無相衆生六根是謂諸國四歎得佛加持以佛威神故出現諸菩薩至法界悉周遍一此佛力二餘佛力七西南方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前列名處云普華嚴髻少同多異二正說頌歎佛攝生自在德答前自在問分三初攝生無遺二初能攝一切國土中普演微妙音至令入此法中謂身語深廣前偈語後偈身身中上半體客塵不染故下半用隨物見異故亦是釋疑為物現相不乖如空二所攝若有深信喜及為佛攝受至入於深法海初偈何人能了內信外攝者次偈以何眼見唯勝非劣次偈了見何法謂一切法地地三心後偈何位究竟菩薩地盡至入佛海二寂用無礙安住佛國土出興一切處至如是見導師初偈用遍出興體無來往後偈即用恆寂隨解自差三大用無涯一切毛孔中各各現神通至思議莫能及初一一毛皆普現通後一一身各遍轉法八西北方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前名無盡光摩凡王此云威德慧即摩尼王法喻異耳二正說偈歎佛出現說法皆周遍德答無畏問說法無畏故分三初總顯身光遍應一一佛剎中處處坐道場至色相非一種二辨其所作二初光照無遺一一微塵內光明悉充滿至種種衆形相二有四頌演法周遍法界諸剎土周行無所礙至現無盡法間一遍塵內外法界剎中二遍佛身中一切剎內三明所轉性相四即能轉圓音三結用歸本不可得故一切剎土中見佛坐道場佛身如影現生滅不可得九下方二初說偈儀爾時衆中復有菩薩至觀察十方而說頌曰前名法界光𦦨慧此云普明即前光𦦨二正說頌讚佛境勝用菩薩能入答神通問文云各各現故分二初佛境勝用如來微妙身色相不思議至各各現神通先半偈標其體謂妙身色相後二頌半辨其用二菩薩能入謂入佛境界分三初二具德知見大智諸菩薩深入於法海至一切佛神力二有三頌智見成益若人有信解及以諸大願至普攝於法界三有二頌結用速疾佛剎微塵數如是諸國土至菩薩力如是十上方二初說偈儀爾時衆中復有菩薩摩訶薩至觀察十方而說頌曰此與前名顛倒而已二正說頌讚佛圓音現身神變自在答無能攝取問謂此願力普周無能令不取故分三初歎佛圓音雨法德佛演一妙音周聞十方剎至聞已趣菩提然具十義一唯一妙音一梵音故二遍聞一切稱法性故三此一即多事理融故四彼一一音雨多法雨五彼法各具一切文辭六各同一切衆生之音七此音各各遍一切處八所說各顯性淨之理九各令一切普得見聞十各各皆得究竟之益上之十義從一妙音展轉開之具十無盡方曰圓音文處可見二歎佛現身無礙德法界諸國土一一微塵中至平等如虗空初偈解脫力故現處周細次偈法身力故現相即虗後二偈以般若德發揮前偈初偈釋下半言影像者顯無方所故謂光東則影西光西則影東質對像生來無所從質謝像亡去無所至故此影像即空無體後偈釋上半言如空者不可取等故故雖現形猶如水月平等如空三歎佛神變自在德十方所有佛盡入一毛孔至不得其邊際一則毛孔廣容二則願能普遍三則舉少況多又上略配十句其中具有四十句意不能繁指六結通無窮二初舉此如此四天下道場中至諸菩薩衆而來集會言四天下者意在閻浮言總意別既以結通菩薩雲集尤顯上歎是彼十方二類彼應知一切世界海一一四天下諸道場中悉亦如是遠方便竟
