body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經十徧降種種喻喻普徧聲非唯普徧四洲亦徧出多雷音文三初喻亦三初總復次佛子譬如娑竭羅龍王至饒益眾生咸令歡喜二別有五初雲從四天下乃至他化自在天至如是雲網周帀彌布二電既彌布已出種種色電光至一色雲出種種色電光三雷復於彼雲中出種種雷聲至及餘無量種種音聲四風既震雷已復起涼風令諸眾生心生悅樂五雨然後乃降種種諸雨至各隨其處所雨不同此與賢首品文有影略三結雖彼龍王其心平等至善根異故雨有差別三合文亦有三初總佛子如來應正等覺至欲以正法教化眾生二別亦五初以身合雲有覆陰等故先布身雲彌覆法界至或為眾生現法界身雲即菩提等十身之中有是四身名異義同一即願身願生兜率故四即意生身隨意所生同世色故八即菩提身具佛十力成菩提故九即威勢具四無畏能伏外故亦可十力降魔為威勢無畏為正覺有正覺義故餘之六身名義俱同二合電光不出通明無畏佛子如來以如是等無量身至滿一切願皆令歡喜三以三昧合雷聲佛子如來應正等覺至不壞解脫力三昧雷聲略有三義一若秋之雷蟄蟲藏匿若入三昧諸惡不行二若春之雷則發蟄發萠猶彼三昧發生功德三雷是雨之先相三昧是說之先兆有十種名思而釋之四以大智合風佛子如來身雲中出如是等至生不思議歡喜適悅以後得智觀機警覺加被令成法器故五以說法合雨二初結前標後此相現已一切菩薩至令一切眾生身心清淨二別有十法所謂為坐菩提場菩薩雨大法雨名法界無差別一將成正覺念相欲盡聞斯法雨便細念都亡得見心性等虗空界法界一相始本無二契同諸佛平等法身故云法界無差別為最後身菩薩雨大法雨名菩薩游戲如來祕密教二出胎已後坐道場前後更無身故云最後法雨名游戲等者此有三義一開為二謂游戲是神通大用祕教即心智所契二合為一令於祕教出沒自在故云游戲言祕教者即詮如來三德涅槃故涅槃經名祕密藏安住於此能建大事神通作用故名游戲在法華經以體從用名如來知見深固幽遠名為祕密雖初心同稟而窮究在斯故亦為說為一生所繫菩薩雨大法雨名清淨普光明三一生所繫者謂如彌勒更一下生故所以更一生者由微細無明能障所知故今為說令淨彼細惑成種智普照上三皆等覺位為灌頂菩薩雨大法雨名如來莊嚴具所所莊嚴三灌頂菩薩即十地受職位十方諸佛法水灌頂墯在佛數能受如來大法雲雨令具佛功德智慧廣作佛事為莊嚴故為得忍菩薩雨大法雨至不斷菩薩大悲行五得忍菩薩若取忍淨八地已上將止此忍勸滿福智不斷悲故若取初得有說初地即得為說信等功德後後圓淨十地地智一一開發不斷二利故為住向行菩薩雨大法雨至無休息無疲厭六住向行三即三賢位令其入證真如現前依此變化為甚深門而勝進不息為初發心菩薩雨大法雨至大慈悲行救護眾生七初發心者通信初發心及信滿發心既發上求下化之心令依願行故上皆已得本位故並為說勝進上位之法此下二門通有二意為求獨覺乘眾生雨大法雨至得不壞解脫果八一約初求顯說說其自乘二約已住密說密授大乘如緣覺中約自乘說則因謝非常果續非斷逆觀非有順觀非無為離二邊雖離二邊而不壞自乘之果約密十二因緣即是中道中道者名為佛性故曰甚深緣起是為上上智觀故得不壞佛解脫果故為求聲聞眾生至名以大智慧劒斷一切煩惱怨九一約顯說由彼厭患苦集故說人空智劒斷之二約密說應以法空斷一切惑故名大劒為積集善根至名能令成就種種法門生大歡喜十為二聚眾生故云集善根者其邪定聚未堪法雨未定令得名為成熟已定令增種種法門三合上結文二初合結數佛子諸佛如來隨眾生心至充滿一切無邊世界二合心等以釋外疑佛子如來應正等覺至所雨法雨示有差別三結是為如來音聲第十相諸菩薩摩訶薩應如是知三以法結通復次佛子應知如來音聲至入佛法界故通結十喻皆無分量三結佛子如來應正等覺音聲至菩薩摩訶薩應如是知二偈頌頌上十喻喻各二頌爾時普賢菩薩摩訶薩欲重明此義而說頌言三千世界將壞時至而於一切無分別四出現意業文中分三先身次語後意義次第故長行中二初徵起佛子諸菩薩摩訶薩應云何知如來應正等覺心二正釋三初約法總辨佛子如來心意識俱不可得約體遮詮但應以智無量故知如來心奇用表詮然此一文古有多說一云識等有二一染二淨佛地無彼有漏染心心所而有淨分心及心所果位之中智強識劣故於王上以顯染無約彼智所以明無量若必無王所依何立故成唯識第二引如來功德莊嚴經云如來無垢識是淨無漏界解脫一切障圓鏡智相應則有王明矣言轉識者智依識轉非轉識體一云以無積集思量等義故說心等叵得就無分別智以顯無量非無心體故攝論第八云無分別智所依非心非思義故亦非非心為所依止心種類故以心為因數習勢力引得此位名心種類上之二解俱明心意識有一云佛果實無心意意識及餘心法云不可得唯有大智故言智無量故知如來心故金光明經及梁攝論皆云唯如如及如如智獨存佛性論中五法攝大覺性唯一真法界及四智菩提不言更有餘法上之二宗徧取皆妨若依前有未免增益亦不能通不可得言又此淨分此何不說彼無垢識而得說耶經何不言染不可得若依後義未免損減亦不能通知佛心言既云以智無量故知如來心不言無心可知明非無心矣又心既是無智何獨立非唯違上二論亦違涅槃滅無常識獲常識義若二義雙取未免相違若互泯雙非寧逃戲論若爾何以指南今釋此義文中分二先會前二宗後消經意今初文也若後宗言唯如智者以心即同真性故曰唯如照用不失故曰如智豈離心外而智別有如是則唯如不乖於有前宗以純如之體故有淨心心既是如有之何失是知即真之有與即有之真二義相成有無無礙後消經意言不可得者以心義深玄言不及故寄遮顯深言但以智知如來心者託以心所寄表顯深故晉經云但知如來智無量故知心無量云何深玄欲言其有同如絕相欲言其無幽靈不竭欲言其染萬累斯亡欲言其淨不斷性惡欲言其一包含無外欲言其異一味難分欲謂有情無殊色性欲謂無情無幽不徹口欲談而辭喪心將緣而慮亡亦猶果分不可說故是知佛心即有即無即事即理即王即數即一即多心中非有意亦非不有意意中非有心亦非不有心王中非有數亦非不有數數非依於王亦非不依王一一皆爾圓融無礙則令上諸義各隨一理不爽玄宗言寄表顯深者既心不可以智知且託智以稱歎智是心所尚以十喻明玄則所依之心玄又玄矣故十喻之末皆結為心之相然佛尚不說凡何敢思有因緣故輒憑教理以示玄宗望無咎其繁而不要也二寄喻別顯舉十大喻以喻如來十種大智即為十段十智體用非一非異文各有三謂喻合結今初虗空無依為依喻喻佛無依成事之智三初喻譬如虗空為一切物所依而虗空無所依二合如來智慧亦復如是至而如來智無所依謂諸乘之智依佛智生如十地云此十地智皆因佛智而有差別離佛智外無所依學而佛果滿更不依他豈不依心反依理耶豈不向言王所無二耶良以佛智照極無有智外如為智所依故智體全如若有所依不名如智亦猶淨名云法隨於如無所隨故文殊般若云若無境界則無所依況佛智外無法可得以一切法即佛智故三結佛子是為如來心第一相諸菩薩摩訶薩應如是知二法界湛然喻喻佛體無增減智即轉釋前依依者依此出生故文三初喻復次佛子譬如法界常出一切至而法界無增減雖出諸智亦不減少菩薩解脫成佛智時亦不增足以同體均故如上海中板喻水有高下板無增減二合如來智慧亦復如是至而如來智無增減三結佛子是為如來心第二相諸菩薩摩訶薩應如是知三大海潛益喻喻佛體均益生智即雙釋前依及出生義文三初喻復次佛子譬如大海至不作分別我出於水二合佛智海水亦復如是流入一切眾生心中謂與眾生心體同故義曰潛流穿鑿自心得智慧時即是見他佛智是曰依之出生又由體同令外佛加持資其念力亦是流入若諸眾生觀察境界至所得智慧各各不同三結佛子是為如來心第三相諸菩薩摩訶薩應如是知四大寶出生喻喻佛用興體密智釋上能生以何義故而能生耶具四寶故文三初喻有三初總明出處體用復次佛子譬如大海至乃至一寶亦不可得二徵列寶名何等為四一名積集寶至四名具足莊嚴三結其深勝佛子此四寶珠一切凡夫至置於宮中深密處故二合三初合出處體用佛子如來應正等覺大智慧海至諸菩薩智慧之寶二合徵列寶名何等為四衍英諸公皆云初證道智斷惑障二助道智斷智障三不住道智捨於報障上三自利四利益眾生智即利他行此釋亦無大過果地具此三道能令學者入菩薩地故今更一解若直就文文自明顯今以法相收之即四智菩提所謂無染著巧方便大智慧寶一大圓鏡智以離諸分別名無染著所緣行相微細難知不忘不愚一切境相名巧方便善分別有為無為法大智慧寶二即平等性智觀一切法若為無為自他平等名善分別分別說無量法而不壞法性大智慧寶三即妙觀察智善觀諸法自相共相無礙而轉說無量法而不壞法性無量法者即攝觀無量總持定門等而言說者雨大法雨斷一切疑故知時非時未曾誤失大智慧寶四即成所作智知機知時作所應作故三合前深勝二初用勝體深若諸如來大智海中至置於如來深密藏故此中用勝喻在總中此中體深同法華經髻中明珠不妄與人然約下智不及故稱密藏不全同喻故涅槃中明有密語而無密藏二體勝用深此四智寶平均正直平均正直即平等性智大慈悲等常共相應故曰平均一味相續名為正直端潔即大圓鏡智端者純淨圓德現種依持故潔者性相清淨離諸雜染妙好即妙觀察智普能利益諸菩薩眾即成所作智此約別配今以四智圓融故四德亦該四寶況四智乃十中之一則永異餘宗令其悉得智慧光明三結佛子是為如來心第四相諸菩薩摩訶薩應如是知五珠消海水喻喻佛滅惑成德之智由有前智無智不生由有此智無惑不斷又前則橫具四智此則豎具四智皆是釋前為依之義文三初喻二初總明體用復次佛子譬如大海至其中所有悉被漂沒二別顯用相佛子此日藏大寶光明至如火熾然悉盡無餘此為極教了義之說而起世婆沙等說阿鼻地獄在下火氣上吞銷鑠海水蓋是少分方便之說而俗典云以沃燋石銷海水者或測度而知或見寶不辨謂之石耳又云注於尾廬壑者但見其銷以詺之耳二合二初合總明體用佛子如來應正等覺大智慧海至無功用大智慧寶二合別顯用相佛子諸菩薩然此四智古德有配四種三昧初是大乘光明三昧智二是集福德王三是賢護四是首楞嚴此釋配定理則可爾案次乘理以第三名智光普照故若將初為三以三為初乃順文理今更一解標其所成即是四定約能成智應別立名又若將此豎配諸位尤異昔解修習一切助道法時至持心一境住於三昧謂一佛以即事而真智治於地前成初四地令得賢守定以此三昧能守世間及出世間賢善法故前之三地名為世間四為出世既了即事而真則即散而定又以除一切法愛大智慧寶光明至起廣大神通二以即體之用智治於四地未能起用令得五地入俗成集福德王定又以慧光普照大智慧寶光明至住大明功用行三以平等無相智治五地中雖能隨俗未得平等令得六七二地般若大光功用後邊成光明定又以與如來平等無邊至息一切功用令無有餘四以平等無功用智治七地功用令入八地乃至佛果得首楞嚴定所作究竟果既具四因亦通修且約相顯為此豎配不可偏局佛子若無如來此四智寶至得如來地無有是處三結佛子是為如來心第五相諸菩薩摩訶薩應如是知六虗空合受喻喻佛依持無礙之智亦釋前依義文三初喻復次佛子如從水際至普容三界而無二合佛子如來智慧亦復如是至無量智慧而無分別上但云依猶尚通於外依他力今明體徧普能容受是則五乘等智皆是如來大智中物肇公亦云夫聖人虗心冥照理無不統懷六合於𮌎中而靈鑒有餘鏡萬有於方寸而其神常虗即斯義也三結佛子是為如來心第六相諸菩薩摩訶薩應如是知七藥王生長喻喻佛窮劫利樂智文三初喻四初總明體用復次佛子如雪山頂至盡金剛地水輪際生二別顯用相彼藥王樹若生根時至枝葉華果悉皆如是三得名所由此藥王樹根能生莖莖能生根根無有盡名無盡根四揀其非處佛子彼藥王樹於一切處至地獄深坑及水輪中上揀下收然亦於彼初無厭捨收者亦不厭故故晉經云不捨生性二合亦有四段而文不次初合總顯體用有六佛子如來智慧大藥王樹至廣大悲願而為其根一以悲願菩提合根此為諸佛之本深難故文有四弘於一切如來真實智慧至善巧方便以為其莖二依實智所生方便為莖能幹事故菩提體故徧法界智諸波羅蜜以為其枝三依前二智分為諸度旁陰為枝禪定解脫諸大三昧以為其葉四戒定息熱別受葉名總持辯才菩提分法以為其華五辯才道品等親生菩提開發為華究竟無變諸佛解脫以為其果六果可知上六亦可豎配地位而其下文別顯用相既云一切菩薩故但從通二越次合後得名所由佛子如來智慧大藥王樹至以究竟無休息故窮未來際不斷菩薩行故得果不捨其因菩薩行即如來性至是故得名為無盡根由不捨因故得因果交徹展轉相生三却合前段別顯用相佛子如來智慧大藥王樹至增長堅固精進深心莖深心樂修善行即前方便其枝生時令一切菩薩至頭陀功德少欲知足葉淨戒亦能息熱其華生時令一切菩薩具諸善根相好莊嚴華相好如華為嚴其果生時令一切菩薩至乃至一切佛灌頂忍果文多影略者為分能所成故四合揀非器佛子如來智慧大藥王樹至墯於無為廣大深坑先揀非器無為正位一墯難出故喻深坑又無悲水取灰斷故如彼地獄及壞善根非器眾生溺大邪見貪愛之水邪見撥無貪愛浸爛皆喻於水不容善根又闕土緣非生處故然亦於彼曾無厭捨後收上據現惡闕緣令生厭怖直進一乘故除二處而同有佛性久久當成故不厭捨是知現惡明無則知無惡必有故涅槃云一闡提人雖復斷善猶有佛性若能發心非闡提也法華亦云決了聲聞法餘諸聲聞眾亦當復如是佛子如來智慧無有增減以根善安住生無休息故結云根善安住者常住大悲故有引向來所揀證無佛性及定性義不觀次後不捨之言況第十喻平等共有減損佛性恐毀謗一乘願諸後學當誡慎之莫滯權說三結佛子是為如來心第七相諸菩薩摩訶薩應如是知八劫火燒盡喻文三初喻復次佛子譬如三千大千至得不燒不答言不也喻佛知無不盡智由此佛智更無所依二合佛子彼所投草容可不燒至智慧平等悉明達故三結佛子是為如來心第八相諸菩薩摩訶薩應如是知九劫風持壞喻文三初喻復次佛子譬如風災至十方世界無不壞盡喻佛巧令留惑智非但能斷亦復能留二合如來應正等覺亦復如是至安住如來究竟之位謂佛有斯巧授與根未熟未具萬行菩薩令留潤生之惑由此留惑惑方至盡得一切智不同二乘不為菩提心期速出廣明留惑潤生具如別障三結佛子是為如來心第九相諸菩薩摩訶薩應如是知十塵含經卷喻文四初法復次佛子如來智慧至而不具有如來智慧喻於佛性通平等智所以得知佛智徧者無一眾生不有本覺與一切佛體無殊故上言潛流則似佛智徧他眾生今顯眾生各各自有故云徧耳此有三意一明無一眾生不有佛性則知無性者非眾生數謂草木等此釋已過五性之見二者眾生在纏之因已具出纏之果故云具有如來智慧非但有性後方當成亦非理先智後是知涅槃對昔方便且說有性後學尚謂談有藏無況聞眾生等有果智誰當信者三彼眾生因中果智即他佛之果智以圓教宗自他因果無二體故不爾此說眾生有果何名說佛智耶斯則玄又玄矣非華嚴宗無有斯理次釋疑謂有疑云涅槃又云佛性者名為智慧有智慧時則無煩惱今有佛智那作眾生故釋疑中先順答前義但以妄想顛倒執著而不證得謂倒故不證豈得言無如壯士迷於額珠豈是膚中無寶若離妄想一切智自然智無礙智則得現前後反以理成謂若先無離倒寧有既離倒現明本不無如貧得珠非今授與是以涅槃恐不修行故云若言定有則為執著恐不信有故云若言定無則為妄語乍可執著不可妄語自然智者自覺聖智也無礙智者始本無二絕二礙也二喻二初明大經潛塵以喻上文妄纏佛智佛子譬如有大經卷大經卷者佛智無涯性德圓滿量等三千大千世界至一一書寫其量悉等書寫一一各稱境者智如理故此大經卷雖復量等大千世界而全住在一微塵中潛一塵者略有三義一妄覆真故二小含大故三一具多故如一微塵一切微塵皆亦如是一切塵者無一眾生不具佛智故二明出經益物喻上離妄佛智現前時有一人智慧明達至一切微塵應知悉然三合二初合大經潛塵佛子如來智慧亦復如是至普能利益一切眾生合上書寫多事具足在於眾生身中至不知不覺不得利益眾生身及妄想俱合上塵二合出經益物爾時如來以無障礙至利益安樂一切眾生如來合上一人智眼合上天眼是知不信眾生等有佛智智眼未開復何可怪如來藏經說九種喻喻如來藏謂如青蓮華在泥水中未出泥水人無貴者又如貧女而懷聖胎如大價寶垢衣所纏如摩尼珠落在深廁如真金像弊衣所覆如菴羅樹華實未成亦如稻米在糠糩中如金在鑛如像在模皆是塵中有佛身義與此大同三結佛子是為如來心第十相諸菩薩摩訶薩應如是知三總結勸知佛子菩薩摩訶薩應至知如來應正等覺心上十喻初總明無依為依二能出生三能潛徧四模具四智五豎具四智六體廣包含七用無終竟八智無不盡九巧能攝持十處處具足前九直語佛智後一乃融自他此十圓融略顯佛智之相寄顯如來之心未盡佛心一毫故應更以無量無礙是故知也二偈頌二十二偈分二初兩句頌約法總顯爾時普賢菩薩摩訶薩欲重明此義而說頌言欲知諸佛心當觀佛智慧明託心所以知心王二餘頌頌上喻文三初一頌半頌於初喻佛智無依處如空無所依至佛智無依止次十六頌頌次八喻每喻二偈聲聞與獨覺及諸佛解脫至令住如來地三有四偈頌第十喻如有大經卷量等三千界至饒益諸菩薩
