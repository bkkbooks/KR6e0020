body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經三辨法根深二初問時善財童子白夜神言至聖者證得其已久如二答二先辨初劫修行二初總舉剎劫夜神言善男子乃往古世至不可說不可說城言世界轉者謂世界為塵一塵一剎復末為塵故亦猶無量無量為一無量轉等若取回轉形世界塵者何以偏取此形二別彰遇佛四初總舉佛數興處善男子彼世界中至微塵數如來於中出現二別於初佛得法六初標佛現其最初佛名法海雷音光明王二父王出家彼佛出時有轉輪王至其王出家護持正法三惡世過興法欲滅時有千部異衆至及以一切世間之論四滅過弘闡時王比丘而語之言至六萬五千歲中而得興盛五王女見聞發心得法時有比丘尼名法輪化光法輪化光者圓滿般若照一切法從無而有故是此王女百千比丘尼至光明王如來一切神力即正答得法久近也六結會古今善男子於汝意云何至一切法門海般若波羅蜜兼顯成益三略舉次前百佛次有佛興名離垢法光明至名普智光明燈四結略顯廣善男子如是等須彌山至教化成熟無量衆生二類顯多劫成益從是已來於佛剎微塵數劫至住一切智無上法城四謙己推勝二初謙己知一善男子我唯知此至常真實語恆清淨語略顯四種業用若約妙音釋則不綺不離間不妄不惡口如次配之若約甚深釋者不與理合皆名戲論理外發言即是二語既與理乖則非真非淨反此可知二推勝知多如諸菩薩摩訶薩至能知能說彼功德行五指示後友三指後位善男子此佛會中有主夜神名開敷一切樹華約事在香樹閣內故約位七地是有功用行有能開發無相住故汝詣彼問菩薩云何至一切衆生住一切智二偈頌中頌前法者臨去殷勤囑令修學故有十一偈於中分二初頌前體用爾時守護一切城主夜神至為善財童子而說頌言菩薩解脫深難見至開通三世解脫道二顯法根深二先頌初劫三初通頌初後過於剎轉微塵劫至我皆供養聽受法二有四頌別頌於初佛得法我見法海雷音佛至動地舒光悟含識頌中間百佛及後結文見第二佛而親近至如是須彌塵數等二頌類顯於諸剎轉微塵劫至令此解脫得清淨三善財得益雖通由前文亦近由此於中有二初長行敘益爾時善財童子至獲菩薩大辨才心大歡喜二偈頌慶讚十偈分四初讚福智超絶觀察守護一亦見十夜神以偈讚曰已行廣大妙慧海至威德光明住此衆二有四頌歎悲智甚深了達法性如虗空至說離世間衆怖行念念攀緣一切境不礙分別事故心心永斷諸分別常契理故又上句約觀下句約止即止觀雙運了達無性成無分別而起大悲成上攀緣攀緣即分別耳不唯屬妄二有四偈總顯德圓離障攝益已住如來諸願道至引導使入菩提路四有一頌成行入位已生如來誓願家至隨衆生樂現衆色六戀德禮辭時善財童子說此頌已至殷勤瞻仰辭退而去已下入第七十二經第七開敷一切樹華夜神寄遠行地文六初依教趣求爾時善財童子至往詣開敷一切樹華夜神所二見敬咨問見其身在衆寶香樹至唯願垂慈為我宣說三授己法界四初顯法行二初明安樂衆生行夜神言善男子至達其處所宿夜安樂亦是法門所作業用對先問行故總示其行未舉法門之名二利益衆生行二初總善男子若有衆生至種種善根使其修習令物斷惡修善故二別為慳吝者讚歎布施至令住菩薩智波羅蜜十度以治蔽障二立法名字善男子我已成就菩薩出生廣大喜光明解脫門此有二意一者望前稱己益物悲智之心故生大喜二者望後照佛攝生大悲智故生大喜三明業用二初問善財言大聖此解脫門境界云何以是業用分齊故云境界二答三初總標夜神言善男子入此解脫至普攝衆生巧方便智謂知佛攝生之智為業用分齊二略顯普攝之相云何普攝善男子至淨業力之所攝故謂一切物樂皆由佛得故知佛攝三廣顯巧方便智二初徵云何知然二釋釋意云我見如來從因至果大悲巧攝故知樂由佛生於中二初總明善男子我入此出生至菩薩行海悉皆明見二別顯分二初發善巧普攝之心亦二初見發心之境沈於苦集善男子世尊往昔至不得值遇諸佛菩薩二正發救心令得滅道二初並起慈悲見如是已起大悲心至於一切因緣無迷惑心二雙運悲智起觀察真性心至究竟皆得十力智果心二起善巧普攝之行二初別明利益衆生行三初本攝生行體起如是心已得菩薩力至不悔不吝無間無斷二明攝生本意以是方便普攝衆生至增一切智福德大海二辨攝生周遍即廣大義菩薩如是念念成熟至隨衆生心普使知見二雜明種種行二初明觀機彰苦集無涯善男子毗盧遮那如來至具受種種無量諸苦二顯修行無量三初總明化益起大悲心具修一切至勤修福智助道之法二別明化法為說種種諸因果門至趣一切智助道之法三總結化意令諸衆生心生歡喜至令其安住菩薩智慧四辨法根深二初問善財童子言聖者至三菩提心其已久如二答二初歎深許說二初長行二先歎深難知四初標難知夜神言善男子非唯久遠難知抑亦當時發心已得深法滿佛境故況無久近相此處難信非常見聞難知非聞慧境難解難入非思修故上皆心緣處滅難說言語道二顯不知人一切世間及以二乘皆不能知三揀去能知唯除諸佛神力所護至於此能持能入能了即是善財童子之類四徵釋所以何以故此是如來智慧境界至尚不能知餘衆生以是佛境故權教菩薩尚不能知況前劣耶二承力許說然我今者以佛威力至隨汝所問為汝宣說二偈頌分二初頌歎深難說有四初標深難說爾時開敷一切樹華夜神至而說頌言佛子汝所問甚深佛境界難思剎塵劫說之不可盡二有三偈頌不知人非是貪恚癡憍慢惑所覆至能知佛所覺以是佛境故惑者不知三超頌前釋佛境界寂靜性淨離分別非著請有者能知此法性四有十四偈總頌揀去能知生於諸佛家為佛所守護至是彼之境界其心寂靜住三昧至此無礙眼之解脫次第頌前佛力所護等恐繁不配說者隨宜二頌承力為說汝於無量大劫海至今汝深心轉清淨二承力正酬文二初長行二初正說四初總顯發心時處佛興善男子乃往古世至說種種法門度無量衆生二別舉本生時處善男子彼普光明真金至閻浮提人壽萬歲時三明發心勝緣四初大王治化其中有王名一切法音至閻浮提內無有怨敵即鐵輪王故云閻浮二五濁為因感三災果時彼世界劫欲盡時至一切人衆壽命矩促命濁資財乏少形色鄙陋多苦少樂衆生濁不修十善專作惡業至離他眷屬妬他榮好煩惱濁任情起見非法貪求至馳走四方靡所依怙見濁劫濁則通三悲境現前咸來共繞王都大城至獲財利想升天宮想四正明起行二初深起大悲爾時大王聞此語已至令其得入一切智門二廣行大施八初施令彌布作是語已擊鼓宣令至內外所有悉皆能捨二施會大敷其堅固妙寶莊巖雲燈城至勸諸衆生修行善業三施主超倫時彼大王處師子座至以致治國無違命者四施田雲集爾時閻浮提無量無數至住菩薩願行廣大施五施心殷重時王見彼諸來乞者至心生歡喜亦復如是六施願深廣善男子其王爾時因善知識至行一切智無障礙道七施慧微已能深入一切智流至生堅固想師想佛想八施時均普不揀方處不擇族類至皆悉如是普施衆生
