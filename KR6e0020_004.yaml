body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經第四通攝所詮體者瑜伽八十一云諸契經體略有二種一文二義文是所依義是能依如是二種總名一切所知境界即依於六文顯於十義此明教義相成若不詮義教文何用故通取所詮成契經體又十住品云文隨於義義隨於文文義相隨理無舛謬方為真教又瑜伽云佛菩薩等是能說者語是能說相名句文身是所說相故皆通取不同前義剋取所說第五諸法顯義體者謂但能顯義理一切諸法皆為教體淨名第三云有以光明而作佛事有以諸菩薩而作佛事有以佛所化人而作佛事有以佛菩提樹衣服臥具乃至八萬四千諸煩惱門眾生為之疲勞諸佛即以此法而作佛事又十卷楞伽第四云大慧非一切佛土言語說法故有佛國土直視不瞬口無言說名為說法乃至云有佛國土動身名說又香積世界餐香飯而三昧顯極樂佛國聽風柯而正念成絲竹可以傳心目擊以之存道既語默視瞬皆說則見聞覺知盡聽苟能得法契神何必要因言說況華嚴性海雲臺寶網同演妙音毛孔光明皆能說法華香雲樹即法界之法門剎土眾生本十身之正體干何非教耶下云剎說眾生說三世一切說又云一切世間諸境界皆悉能令轉法輪等其文非一第六攝境唯心體總收前五並不離識唯識等云一切所有唯心現故起信亦云依一心法有二種門一心真如門二心生滅門然此二門皆各總攝一切法以此二門不相離故梵行品云知一切法即心自性故唯心現然有二門一本影相對二說聽全收前中通就諸教以成四句一唯本無影謂即小乘不知唯識故二亦本亦影謂大乘初教謂佛自宣說若文若義皆是如來妙觀察智相應淨識之所顯現名本質教故佛地論第一云有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛說若聞者識上所變文義名為影像佛地論云如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛說故二十唯識論云展轉增上力二識成決定護法論師等皆立此義然云文義相生復說五心集現謂如說諸行無常即有四聲四字四名一句及所詮義此十四相於聞者識上聚集顯現然西方多釋今略舉其一謂如說諸字有率爾尋求二心然未定知諸字所屬無決定心次說行字由先熏習連帶解生有三心起謂率爾尋求決定以決定知諸字所屬一切行故聞諸行字雖知自性然未知義為令知義復說無字但有二心謂率爾尋求未有決定以未定知無字所屬後說常字由前字力展轉熏習連後字生具起五心謂率爾尋求決定染淨等流於最後時四字周圓方能解義總十二心初二次三次二後五故有十四相義如前說餘如別章三唯影無本謂大乘實教離眾生心佛果無有色聲功德唯有如如及如如智獨存大悲大智為增上緣令彼所化根熟眾生心中現佛色聲說法是故聖教唯是眾生心中影像夜摩偈云諸佛無有法佛於何有說但隨其自心謂說如是法龍軍堅慧諸論師等並立此義四非本非影如頓教說非直心外無佛色聲眾生心內影像亦空性本離故亡言絕慮即無教之教耳須彌偈云法性本空寂無取亦無見性空即是佛不可得思量淨名云其說法者無說無示其聽法者無聞無得龍樹等宗多立此義此前四說總合為一圓融無礙自淺之深攝眾生故第二說聽全收成二四句一約同教以成四句謂一佛真心外無別眾生以眾生真心即佛真心故則唯說無聽故所說教唯佛所現二眾生心外更無別佛以佛真心即眾生真心故則唯聽無說故所說教即眾生自現梵行品云知一切法即心自性等三佛真心現時不礙眾生真心現故說聽雙存二教齊立四佛即眾生故非佛眾生即佛故非眾生互奪雙亡則說聽斯寂故淨名云其說法者無說無示其聽法者無聞無得二約別教以明四句謂由不壞相生佛互在故一眾生全在佛中故則果門攝法無遺生尚在佛心中況所說教不唯佛現故出現品云如來成正覺時於其身中普見一切眾生成正覺乃至普見一切眾生入涅槃又佛性論第二如來藏品云一切眾生悉在如來智內故名為藏以如如智稱如如境故一切眾生決定無有出如如境者並為如來之所攝持故名所藏眾生為如來藏又下出現品中明三世劫剎眾生所有心念根欲尚皆一身頓現況佛智廣大同虗空耶二佛在眾生心中故則因門攝法無遺佛尚在於心中況所說教非眾生心現故出現品云菩薩摩訶薩應知自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心一切眾生心亦復如是悉有佛成正覺此明佛證眾生心中真如成佛故本覺無異以始同本總在眾生心中從體起用應化身時即是眾生心中真如用大更無別佛如起信中多明此義而是自心體用今以此經心佛眾生無差別故佛證眾生之體用眾生之用三由前生佛互相在時各實非虗則因果交徹隨一聖教全在二心故眾生心中佛為佛心中眾生說法佛心中眾生聽眾生心中佛說法四由生全在佛則同佛非生佛全在生則同生非佛兩相形奪二位齊融則隨一聖教俱非二心則佛心中眾生無聽眾生心中佛無說是以賢首品云因緣所生無有生諸佛法身非是身又偈讚品云如來不說法亦不度眾生大般若四百二十五云我從得道來不說一字汝亦不聞等是故此四於一聖教圓融無礙方為究竟甚深唯識道理第七會緣入實體者前來六門同入一實故亦有二義一以本收末二會相顯性前中以諸聖教從真流故不異於真故攝論中名為真如所流十二分教唯識第十釋勝流真如云謂此真如所流教法於餘教法最為勝故彼宗雖不立真如隨緣而說佛正體智證最清淨法界而於後得安立教法名為如流以本收末亦名如為教體二會相顯性者謂彼一切差別教法從緣無性即是真如是故虗相本盡真性本現如來言說皆順於如故金剛三昧經云如我說者義語非文眾生說者文語非義仁王二諦品云大王法輪者法本如應頌如乃至論議如等此經明教即是如不說如皆是教若取諸法顯義皆為教體一切法皆如也則無如非教第八理事無礙體者謂一切教法雖舉體即真不礙十二分等事相宛然顯現雖真如舉體為一切不礙一味湛然平等由如無礙佛之音聲亦順如無礙皆與如智而相應故如前義分齊中廣明第九事事無礙體者文義皆圓文即圓音此中亦具十種玄門現相品云佛以一妙音周聞十方國眾音悉具足法雨皆充徧即同時具足相應體十住品云欲具演說一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發心即廣陿無礙體亦名純雜教一句不壞陿也純也文義不同廣也雜也又云於一法中解眾多眾多法中解了一等皆一多相容教也出現品云如來音聲普入一切譬如書字等此亦相入即相容也十住又云一即是多多即一文隨於義義隨文即相即教體出現品云道場皆聞不出眾外各各隨解即隱顯教體也又云如來言音唯是一味隨諸眾生心器異故無量差別亦隱顯教體亦純雜教也又云如來於一語言中演說無邊契經海如善口女等即微細教也阿僧祇品云於彼一一脩多羅分別諸法不可說於彼一一諸法中又說諸法不可說等一法既爾餘法亦然交映重重無盡無盡即帝網教也觸事皆法即託事生解教也一念頓演即十世教也如諸會中此方所說十住等十方亦爾即主伴教也若隨說一法一門皆有無量脩多羅為眷屬等即眷屬教雖不得為主亦是伴類此且約言說若類通諸法皆為教體即所詮義義即普法具十玄門如義分齊第十海印炳現體者如前差別無盡教法皆是如來海印定中同時炳現設所化機亦同緣起炳現定中是故唯以三昧為教體如出現品辨此約果位若約因位圓信亦得印現賢首品云如是一切皆能現海印三昧威神力以上十門該羅收攝未有一法而非教體然後二門正是經宗融取前八無所遺矣第六宗趣通別者語之所尚曰宗宗之所歸曰趣先明其通後顯於別前中通論一代佛教諸部異計各是一宗謂十八本二各不同故以義相從更復合之然隋朝大衍法師總立四宗一因緣宗謂薩婆多二假名宗謂即經部三不真宗謂諸般若四真實宗謂法性真理佛性等教又此四宗初名立性二名破性三名破相四名顯實初二小乘後二大乘各初淺後深此亦有理但收義不盡以十八部中但判二故今總收一代時教以為十宗第一我法俱有宗謂犢子部等彼立三聚一有為二無為三非二聚非二即我又立五法藏謂三世為三無為為四第五不可說藏我在其中以不可說為有為無為故然此一部諸部論師共推不受呼為附佛法外道以諸外道所計雖殊皆立我故二法有我無宗謂薩婆多等彼立諸法不離色心或立三世無為或分五類皆無有我以無我故異外道計又於有為之中立正因緣已破外道邪因無因然西域邪見雖九十五種或計二十五諦從冥生等或計六句和合生等或謂自在梵天等生或謂時方微塵虗空宿作等而為世間及涅槃本統收所計不出四見謂數論計一勝論計異勒沙婆計亦一亦異若提子計非一非異若計一者則謂因中有果若計異者則謂因中無果三則亦有亦無四則非有非無餘諸異計皆不出此雖多不同就其結過不出二種從虗空自然生即是無因餘皆邪因此方儒道二教亦不出此如莊老皆計自然謂人法地地法天天法道道法自然若以自然為因能生萬物即是邪因若謂萬物自然而生如鶴之白如烏之黑即是無因周易云易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業者太極為因即是邪因若謂一陰一陽之謂道即計陰陽變易能生萬物亦是邪因若計一為虗無自然則亦無因然無因邪因乃成大過謂自然虗空等生應常生故以不知三界由乎我心從癡有愛流轉無極迷正因緣故異計紛然安知因緣性空真如妙有言有濫同釋教者皆是佛法之餘同於涅槃盜牛之喻乳色雖同不能善取醍醐況抨驢乳安成酥酪廣明異計如瑜伽第六顯揚第九第十婆沙十一十二及金七十論說中百等論亦廣破之今但說正因緣已總破諸計是知佛法之淺淺已勝外道之深深三法無去來宗謂大眾部等說有現在及無為耳其過未之法體用俱無四現通假實宗謂說假部就前現在之中法在蘊為實在界處為假其成實論經部師即是此類五俗妄真實宗即說出世部等謂世俗是假以虗妄故出世反上六諸法但名宗謂一說部等一切我法唯有假名無實體故七三性空有宗謂徧計是空依圓有故八真空絕相宗謂心境兩亡直顯體故九空有無礙宗謂互融雙絕而不礙兩存真如隨緣具恒沙德故十圓融具德宗謂事事無礙主伴具足無盡自在故然此十宗後後深於前前前四唯小五六通大小後四唯大乘七即法相宗八即無相宗後二即法性宗又七即初教八即頓教九即終教十即圓教又第七亦名二諦俱有宗謂勝義真實故不無世俗因果不失故是有如深密瑜伽等第八亦名二諦雙絕宗謂勝義離相故非有世俗緣生如幻故是無如掌珍頌云真性有為空如幻緣生故無為無有實不起似空華等即般若三論中一分之義九二諦無礙宗如維摩法華等義如前顯然十宗五教互有寬陿教則一經容有多教宗則一宗容有多經隨何經中皆此宗故若局判一經以為一教則抑諸大乘又夫立教必須斷證階位等殊立宗但明所尚差別前之五宗執法有異故分五宗斷證次位不離八輩合為一教餘義如前立教中辨第二別顯宗者一切諸經各自有宗今此別明此經宗趣然楞伽云一切法不生不應立是宗者斯言遣滯若無宗之宗則宗說兼暢略以二門分別先敘異解後申今義前中略舉十說一衍法師以無礙法界為宗二裕法師以甚深法界心境為宗謂法界門中義分為境諸佛證之以成淨土法界即是一心諸佛證之以成法身是故初品中云無盡平等妙法界皆悉充滿如來身末後明入法界品故知唯以法界為宗三有說以緣起為宗法界緣起相即入故四有云以唯識為宗經說三界唯一心現心如工𦘕師故五敏印二師同以因果為宗謂此經廣明菩薩行位之因及顯所成果德下文不離此故六遠法師以華嚴三昧為宗謂因行之華能嚴佛果故七笈多三藏以四十二賢聖觀行為宗說其行位令成觀故八有說言以海印三昧為宗逆順理事乃至帝網如海波澄一時現故九光統律師以因果理實為宗以因果是所成行位理實是所依法界故十賢首以前各互闕故總以因果緣起理實法界以為宗趣謂前之二師但得所依法界三四二師但明緣起五六唯明因果七唯因修八唯果用並皆互闕故賢首意取光統而加緣起法界之言由光統師以因果即緣起理實即法界故不開之賢首以因果是緣起中別義理實是法界中別義故加總名以法界有事理及無礙故緣起體上之用故所以加之二申今解者依後二師而頗為改易若取言略攝盡應言法界緣起不思議為宗若取言具於第十師加不思議此則攝一總題理實即大方緣起即方廣法界總該前二因果即佛華嚴觀其總題已知別義而法界等言諸經容有未顯特異故以不思議貫之則法界等皆不思議故為經宗所以龍樹指此為不思議經斯良證也淨名但明作用不思議解脫蓋是一分之義未顯法界融通等不思議故不同也若就題中分體宗用則以理實為體緣起為用因果為宗尋宗令趣理實體故法界總攝上三今釋前義略分為二一釋名二顯義今初法界名體廣如本品今略申其二一事法界二理法界二法俱含持軌二界則性分不同互用皆通二顯義中曲有四門第一別開法界以成因果謂普賢法界為因遮那法界為果是故因果不離理實法界於中十事五對即五周因果一所信因果二差別因果三平等因果四成行因果五證入因果下當指文而此因果互為宗趣一經始終不離因果故但因果為宗不違所依法界第二會融因果以同法界法界門中亦有十事五對互為宗趣一教義相對謂舉教為宗顯義為趣或以義為宗顯教為趣以辨義深令教勝故二人法相對舉人為宗令知法為趣舉法為宗令得人為趣三理事相對舉事意令趣理故舉理意在融事故四境智相對舉所觀境令成觀智故舉修成智令證同真境故五因果相對舉彼修因令證果故舉其勝果勸修因故五對別明是宗之趣五對相即為宗即趣上五周因果不離此五對之法即事理法界況因果無性當體同真所以但用法界為宗亦不違因果第三法界因果分明顯示亦有十義五對一無等境此有二位一在纏性淨法界為所信境二出纏最清淨法界為所證境二無等心此亦二義一大菩提心為普賢行本故二信悲智等隨行起故三無等行此亦二義一差別行各別修故二普賢行一即一切故四無等位此亦二義一行布位比證別故二圓融位一證一切證故五無等果此亦二義一修生果今始成故二修顯果本自具故此上五對各初句為宗後句為趣又上五中初一真法界二即緣起又二三四皆緣起因後一緣起果故光統具用二義為宗無所違矣第四法界因果雙融俱離性相混然無礙自在亦有十義一由離相故因果不異法界即因果非因果也此即相為宗離相為趣或離相為宗亡因果為趣下九準思二由離性故法界不異因果即法界非法界也三由離性不泯性故法界即因果時法界宛然則以非法界為法界也四由離相不壞相故因果即法界時因果歷然則以非因果為因果也五離相不異離性故因果法界雙泯俱隔迥超言慮六由不壞不異不泯故因果法界俱存現前爛然可見七由五六存泯復不異故超視聽之妙法無不恒通於見聞絕思議之深義未甞礙於言念八由法界性融不可分故即法界之因果各同時全攝法界無不皆盡九因果各全攝法界時因果隨法界各互於因果中現是故佛中有菩薩普賢中有佛也十因果二位各隨差別之法無不該攝法界故一一法一一行一一位一一德皆各總攝無盡無盡帝網重重諸法門海是謂華嚴無盡宗趣上之四門初一即體之用次一即用之體三即體用雙顯四即體用鎔融又初一即因果緣起次一即理實法界三即雙明後一即不思議既以第四融前則四門一揆故即照而遮即遮而照雙照雙遮圓明一觀契斯宗趣矣第七部類品會者既知旨趣沖深未審能詮文言廣陿於中有四一彰本部二顯品會三明支類四辨論釋初中性海之詮常說徧說言窮法界難可限量今自陿之寬略為十類一略本經即今所傳八十卷本及舊譯六十卷皆是十萬偈中之略譯未盡故二下本經謂摩訶衍藏是文殊師利與阿難海於鐵圍山間結集此經收入龍宮龍樹菩薩往龍宮見此大不思議經有其三本下本有十萬偈四十八品龍樹誦得流傳於世故智度論詺此為不思議經有十萬偈梁攝論中名百千經西域記說遮拘槃國有此具本三中本經即彼所見有四十九萬八千八百偈一千二百品四上本經即彼所見有十三千大千世界微塵數偈一四天下微塵數品此上二本非閻浮提人心力能持故不傳之五普眼經即海雲所持以大海量墨須彌聚筆書此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分何況能盡但是入深法界菩薩陀羅尼力之所能持已下諸經並非凡力能受六同說經謂約一類須彌山形世界徧於虗空容毛端處以言聲說無有窮盡如不思議法品云如一佛身以神通力轉如是等差別法輪一切世法無能為喻如是盡虗空界一一毛端分量之處乃至一一化身皆如是說音聲文字句義一一充滿法界等又阿僧祇品云光中見佛不可說佛所說法不可說乃至於彼一一脩多羅分別法門不可說等此意但約一類音聲說法已不可結集豈下位能持七異說經謂樹形等世界既異其中眾生報類亦別如來於彼現身立教施設不同不可定其色與非色言非言等則部類難量八主伴經謂遮那所說雖徧法界然與諸佛互為主伴如說十住時十方來證皆言我國皆說等則前七經皆有主伴九眷屬經謂餘根器不能聞此通方之說隨宜說教令入此門皆為此經勝方便故名為眷屬故下經云普眼脩多羅以佛剎微塵數脩多羅為眷屬等則前八皆有眷屬十圓滿經謂此上諸本總融為一無盡大脩多羅海隨一會一品一句一文皆攝一切無有分限故現相品云毗盧遮那佛願力周法界一切國土中恒轉無上輪等故七十三中名圓滿因輪此之謂也第二品會差別者即顯今經與晉譯同異今經九會以晉經第七會初闕十定品重會普光故唯八會今有三十九品初會有六品彼經唯三十四由初會中唯有二品一世間淨眼品即今世主品二盧舍那品即今現相已下五品初會闕四兼闕十定故唯三十四品餘諸品會大同名有小異至文當顯第三明支類者於中復二先顯支流即別行經藏中兜沙經一卷是名號品菩薩本業經一卷是淨行品小十住經一卷是十住品大十住經四卷及漸備一切智德經四卷並是十地品等目菩薩所問三昧經二卷是十定品無邊功德經一卷是壽量品如來性起微密藏經兩卷是出現品度世經六卷是離世間品羅摩伽經三卷是入法界品此等並是隨器受持大本支出二明流類謂修慈經一卷金剛鬘經十卷如來不思議境界經一卷並是華嚴流類而非本部別行或是別行來未盡者未敢詳定餘如纂靈記辨第四論釋者略舉其四一龍樹既得下本遂造大不思議論亦十萬頌備傳西域此方十住毗婆沙論十六卷即是彼論釋十地中初之二地二世親菩薩造十地論釋十地品魏朝勒那三藏及菩提流支各翻一本光統奏請令二三藏參成一本為十二卷即今見傳三北齊劉謙之於清涼山感通造論六百卷備釋一經四後魏僧靈辯於五臺山頂戴此經行道一載遂悟玄旨造論一百卷亦傳於世第八傳譯感通分二先明翻譯年代後明傳通感徵前中此經前後通唯二譯并其補闕四本不同一晉義熈十四年北天竺三藏佛度䟦陀羅此云覺賢於楊州謝司空寺翻梵本三萬六千頌成晉經五十卷或六十卷沙門法業筆受慧嚴慧觀潤色謝司空寺者即今潤州興嚴寺是由興華嚴故二大唐永隆元年中天竺三藏地婆訶羅此云日照於西京太原寺譯出入法界品內兩處脫文一從摩耶夫人後至彌勒菩薩前中間天主光等十善知識二從彌勒菩薩後至三千大千世界微塵數善知識前中間文殊申手過一百一十由旬案善財頂十五行經大德道成律師薄塵法師大乘基法師等同譯復禮法師潤文依六十卷本為定三證聖元年于闐三藏實叉難陀此云喜學於東都佛授記寺再譯舊文兼補諸闕計益九千頌通舊總四萬五千頌合成唐本八十卷大德義淨三藏弘景禪師圓測法師神英法師法寶法師賢首法師等同譯復禮法師綴文四即於前第三本中雖益數處却脫日照三藏所補文殊案善財頂之文即賢首法師以新舊兩經勘以梵本將日照補文安喜學脫處遂得文續義連其文之要至下當辨今之所傳即第四本其第三本先已流傳故今世上之經猶多脫者即第三本願諸達識見闕而續之二明傳通感應者自晉譯微言則雙童現瑞唐翻至教則甘露呈祥冥衛昭然親紆御筆論成西域則地震光流志徹清涼則感通玄悟其書寫則經輝五色褚香四達冬蔡發豔瑞鳥銜華讀誦則眇然履空煥若臨鏡每含舍利適會神僧踊地現金色之身升天止脩羅之陣觀行則無生入證偈讚排空海神聽而時雨滂沱天童迎而大水瀰漫講說則華梵通韻人天共遵洪水斷流神光入宇良以一文之妙攝義無遺一偈之功能破地獄盥掌之水尚拯生靈讀誦思修功齊種智宿生何幸感遇斯文其事昭彰備於傳記
