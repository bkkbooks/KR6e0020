body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經阿僧祇品第三十初來意有二一通辨者謂前三品別答前問此下三品總明等覺勝德深奧故二別辨者前既智圓證極此品校量行德難思故次來也又難思佛德菩薩盡窮故亦為遠答變化海故下偈廣明變化大用即其意也又通顯一部之數量故二釋名者阿之言無僧祇曰數全帶數名若晉本云心王菩薩問阿僧祇品兼能問人即人法雙舉及菩薩所問之算數梵本同此然僧祇是十大數之創首經論多用故以標名亦顯此數即離數故寄無數標名三宗趣者寄數顯德分齊為宗令知普賢及知諸佛離數重重無盡為趣四釋經文此下三品總顯深奧即為三別此品明勝德無數次品明盡一切時後品明遍一切處然此三品初一通明佛菩薩德次品正顯佛之勝德兼明菩薩後品唯明菩薩之德所以爾者亦是等覺亦名佛故位後普賢是佛菩薩故今初一品文分為二先問二初牒佛所説爾時心王菩薩所以心王問者表數不離心數與非數皆自在故又顯此數統收前後辨超勝故白佛言世尊諸佛如來至不可説不可説所以偏問十者舉後攝初顯無盡故前後文中多用此故故後文云如來演説但問本數已攝諸轉二正明咨問世尊云何阿僧祇乃至不可説不可説耶二答四初讚問成益佛告心王菩薩言善哉善哉至而問如來應正等覺令入佛所知數者以是圓教所明深廣無涯唯佛方測不同凡小之所能知如黃帝算法但有二十三數始從一二終至正載已説天地不容小乘六十已至無數此有百二十四倍倍變之故非餘測故數終極寄不可説況復偈初更積不可説歷諸塵剎以顯無盡所以佛自答者表難思故又明此品統語因位終德故佛説之二誡聽許説善男子諦聽諦聽善思念之當為汝説三敬受尊命時心王菩薩唯然受教四正答所疑二初長行明能數之數廣多佛言善男子一百洛叉至為一不可説不可説轉問乃舉後難知答則始終具説初言一百洛叉為一俱胝者是中等數洛叉是萬俱胝是億故光明覺品云過一億梵本皆云俱胝故若依俱舍以洛叉為億則俱胝當兆也若兼取一十百千萬等下等數法則通有百三十七數由前易故略不説之俱胝已下並是上等數法倍倍變故餘如光明覺品中説其中多存梵音但是數名更無別理末後云此又不可説不可説者若類前具牒便有四箇不可説字故譯家云此又二字替一不可説不可説為譯之巧二偈頌顯所數之德無盡有一百二十偈大分為二初六偈明普賢德廣説不可盡二初四偈半明能數多爾時世尊為心王菩薩而説頌言不可言説不可説至一塵十萬不可説積數自有十重以顯無盡是知上至不可説轉尚約順機據佛所知實無盡故言十重者一初句積不可説至不可説然此應積最後不可説不可説轉而但積不可説者有二義故一取言易故下偈多用故二表言所不及之數故次三句將上所積充滿一切不可説初句標後二句釋謂何者是一切不可説釋云不可説劫中説不盡者三半偈將上諸不可説一一是一剎皆碎為塵四半偈即前一一塵有不可説剎五有半偈將前諸塵中剎一念遍碎為塵六有半偈念念碎塵復盡多劫七有一句明前所碎塵復有多剎八有一句即此多剎復碎為塵九有半偈以多算數經於多劫數上諸塵云如是數十以上諸塵數劫一塵有十萬箇不可説劫如是重重無盡無盡二一偈半顯所數廣爾劫稱讚一普賢至如是乃至遍法界略舉三重一將上諸劫讚一普賢之德不盡二況一塵中有多普賢三況遍法界塵皆有多矣是知普賢德無盡故若不以稱性之心思之心惑狂亂二有一百一十四偈明佛德深廣普賢窮究即廣顯變化之相文二初明果德無礙因位善窮二明果德深廣因能趣入初中分二初果法無礙二初三偈依報自在一毛端處所有剎至種種奇妙不可説二明依正融攝即入自在於中五初依中現正於彼一一毛端處至咸放光明不可説二有十一偈半明正中現依文二初現蓮華光明於彼一一光明中至不可言説不可説二有二偈半現淨土之用彼如須彌一妙寶至皆出光明不可説三有五偈依中現正説法調伏光中現佛不可説至調伏衆生不可説四有二偈明現時常住或復於一毛端處至復現於化不可説五有九偈半明自在調生彼佛法身不可説至於中差別不可説第二明因位善窮文分為二初有半偈結前生後菩薩悉能分別説諸明算者莫能辨二正顯因德於中有十初八偈明帝網身土是起行處一毛端處大小剎至入已所作不可説又前文明其展遍此明包容文影略耳言毛孔悉能受諸剎等者稱法性之一毛故受多剎而無外不壞相之多剎安遍語者之一毛內外緣起非即離故二三業勤勇行意根明了不可説至了達一切不可説三有四偈半明應器攝生行一切衆生不可説至利益一切諸世間四有五偈半明遊方供佛行普現其身不可説至恭敬諸佛不可説五有十一偈半明廣修十度行修行於施不可説至念念恆住不可説六有二偈半遊剎自在行諸佛剎海不可説至雜染世界不可説七有四偈明調伏衆生行了知衆生不可説至令衆生淨不可説八有七偈半三業深淨行一一毛孔不可説至演説讚歎不可説九有八偈半願智自在行彼諸菩薩不可説至哀愍世間不可説十有一偈結德無盡不可言説一切劫至不可説德不可盡二明果德深廣因能趣入文二初果三初六偈總歎佛德不可言説諸如來至歎佛功德無能盡二有三偈別明依報一微塵中能悉有至剎海分布不可説此中所明蓮華世界賢首如來即是次品最後世界賢勝如來勝者為首其義可知三有三偈別明正報一一剎中有如來至獲深智藏不可説三明因德趣入於中二初有六偈半明自分行種種數量不可説至一一了知不可説二有三偈半明勝進行能於一時證菩提至菩薩一切皆明見且從相顯略申科判然上諸德德德圓融無盡無盡惟忘懷體之壽量品第三十一初來意者夫玄鑒虗朗出乎數域之表豈有殊形萬狀修短之壽哉然應物隨機寧無不形而無不壽故上品彰其實德此品以辨隨機雖積少至多顯時無不遍即前多德之一故粗廣之亦為遠答壽量海故所以來也二釋名者壽謂報命量即分限染淨土之報壽隨機見之分限以顯無盡之命無限之量壽之量故壽有斯量通二釋也別行經名無邊佛土經即以處顯人三宗趣者應物修短為宗顯窮來際無限為趣以就同教且積劣之勝若就別教則修短圓融故次正釋文二初集經者敘爾時心王菩薩摩訶薩於衆會中告諸菩薩言而心王説者以領旨故佛壽自在故二正説三初別舉十剎相望巧明佛子此娑婆世界至月智佛剎為一日一夜二舉略顯廣佛子如是次第乃至過百萬阿僧祇世界三舉其玄極最後世界一劫至大菩薩等充滿其中且如以劫為日未歷十重則劫不可説況百萬僧祇則最後之剎已鄰剎海平等故舉普賢等充滿其中者明極位所居由此名為兼顯菩薩
