body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經三知足天二初長行得法復次知足天王得一切佛出興世圓滿教輪解脫門得總相法門諸佛將興皆生彼天下生之時普應法界頓闡華嚴為圓滿相喜樂海髻天王得盡虗空界清淨光明身解脫門光明色身皆遍空界了不可取故云清淨最勝功德幢天王得消滅世間苦淨願海解脫門以淨願力滅惑業苦寂靜光天王至得普淨一切衆生界解脫門四五可知寶峯月天王得普化世間常現前無盡藏解脫門普即無偏常即無間示其真樂即如來藏勇健力天王得開示一切佛正覺境界解脫門自覺知境佛已入之故示物同悟金剛妙光天王至菩提心令不可壞解脫門謂以淨福堅菩提心星宿幢天王至調伏衆生方便解脫門仰觀下化妙莊嚴天王得一念悉知衆生心隨機應現解脫門即照現迅疾也二偈頌讚佛彌時知足天王至普觀一切知足天衆而說頌言如來廣大遍法界至令入難思清淨法前半即出世義上句體智共遍下句悲用皆普後半即圓滿教輪前句即實之權為妙門後句會權入實為圓滿佛身普現於十方至此喜髻天之所入二中可知如來往昔修諸行至勝德能知此方便初二句以行淨願次句雜染本空故前令滅佛法本具故今令滿妄盡真顯二言相成如來法身不思議至寂靜光天解脫門初二句依體普現若月入百川尋影之月月體不分即體之用用彌法界體用交徹故不思議次句稱根說法衆生業惑所纏覆至善目照知心喜慶前半即所淨衆生具三雜染故上句標下句略示惑相慢是根本憍逸隨惑憍謂染自盛事慢謂恃己陵他放逸即是縱蕩憍為染法所依慢能長淪生死放逸衆惑之本故偏舉此三蕩者動也謂境風鼓擊飄蕩馳散次句能淨法門謂不取於相當體寂故一切世間真導師至妙光於此能觀察上三可知十方剎海微塵數至此莊嚴幢之所見通顯上既親近必當敬養聞法以聞調他為真供養列名中云星宿幢故令莊嚴與長行互出衆生心海不思議至妙莊嚴天斯善了前半所知衆生心上句標深廣下句顯相念慮不住多於草故廣也深有三義一恆轉如流故不住二本體寂然故不動三從緣妄起無別所依次句即一念悉知四時分天二初長行得法復次時分天王至令永離憂惱解脫門善根若發憂惱自除妙光天王得普入一切境界解脫門以無限方便普證法身之境無盡慧功德幢天王得滅除一切患大悲輪解脫門悲摧惑苦故名為輪善化端嚴天王得了知三世一切衆生心解脫門以三達智知機授法總持大光明天王至憶持一切法無忘失解脫門總持入理故名為門以慧為體故云光明若取助伴則兼念定念即明記故能憶持定無忘失四無礙等一切諸法皆是所持不思議慧天王至不思議方便解脫門可知輪天王得轉法輪成熟衆生方便解脫門轉法示菩提之道即是成熟衆生之方便光焰天王得廣大眼普觀衆生而往調伏解脫門十眼圓見隨宜往調光照天王得超出一切業障不隨魔所作解脫門超出業障使離惡因不隨魔作捨惡緣也普觀察大名稱天王至令受行心清淨解脫門等雨法雨誘令進善使彼受行誨令斷惡得心清淨此就於天偈通一切二偈頌讚佛爾時時分天王至普觀一切時分天衆而說頌言佛於無量久遠劫至永耀衆生智慧燈通顯前半彰己已離後半開發能離善根如來法身甚廣大至此是大光之解脫文並可知業性廣大無窮盡至如是慧天之所入初句即業性言廣大者一念造一切故無窮盡者未得對治無能止故有多門故次句善入智了自入開示令他入次句入門多種轉不思議妙法輪至此是𦦨天之境界文亦可知若有衆生一見佛至光照天王所行道初句見佛為緣次二見佛二益一正智生必內超業障二佛為真導豈外逐魔緣既不隨魔安造魔業十魔並離故致諸言一切衆會廣大海至此解脫門名稱入十亦可知五三十三天衆二初長行十一法復次釋迦因陀羅天王至皆明見大歡喜解脫門承力故憶念念過去佛者曾入此天故三世有二一亦念未來二過去自互相望亦有三世生大喜者境殊勝故慶自福故普稱滿音天王至廣大世無能比解脫門然佛身無染淨大小亦無勝劣猶若虗空雲屯即暗日朗即明色昏即劣物隔言小今妄雲盡而智光照故清淨性空現故廣大妙色顯故無比皆解脫力故曰能令慈目寶髻天王得慈雲普覆解脫門大慈不揀冤親若雲無心而普覆寶光幢名稱天王至現種種形相威德身解脫門人天世主多恃威德故佛現超之令其敬喜發生喜樂髻天王至從何福業生解脫門知其因果差別使物勤修因果並得名福端正念天王得開示諸佛成熟衆生事解脫門示佛調生令菩薩倣習高勝音天王得知一切世間成壞劫轉變相解脫門初成後壞住時轉變乃至毛孔細剎皆悉知之言轉變者福人出世則琳琅現矣薄福者出則荊棘生焉成就念天王得憶念當來菩薩調伏衆生行解脫門佛毛現因調行天憶則能思齊淨華光天王得了知一切諸天快樂因解脫門一切諸樂以佛為因具勝德故就樂增勝說諸天耳知日眼天王至受生善根俾無癡惑解脫門受生善根即念佛力開示令不迷惑則去放逸而進修自在光明天王至永斷種種疑解脫門疑自疑他疑理疑事有多種種如聞空疑斷聞有疑常聞雙是則疑其兩分聞雙非疑無所據又聞空疑有聞有疑空等互相疑也今開之使悟二偈頌讚佛爾時釋迦因陀羅天王至而說頌言偈中亦有十一我念三世一切佛至以佛威神皆得見云平等者化儀同故又但以世俗文字數故說有三世非謂如來有去來今佛身廣大遍十方至此道普稱能觀見初句廣大次句無比次句清淨然古德明通有六義一廣謂總法界為身故二遍全遍一塵至十方故三妙色即無色無色之色故四勝無有比故五益利物無涯故六用光破暗故如來方便大慈海至寶髻天王斯悟了前半即慈雲上句果大下句因深一切佛法依慈悲慈悲又依方便立俱稱深廣故致海言次句即普覆也我念法王功德海至此解脫處華王入文並可知若念如來少功德至智眼於此能深悟初二句即前善根少功德者以少況多彰因為勝次句即人天受生故離三惡怖寂滅法中大神通至此光明王之所得初句即能開之法是寂滅智通次二句由普應故疑皆斷也六日天子二初長行十一法既為日天多辨光益復次日天子至盡未來劫常為利益解脫門名及法門皆是總也謂佛身智光猶如彼日無私而照是曰淨光此光體也次辨光用略有四義一約心高下齊明故名普照二約處則窮十方界三約時盡於未來四約功用常無間斷如斯利益即大智之功光𦦨眼天子至令入智慧海解脫門衆生本有佛智如海潛流今佛以隨彼彼類身設種種方便務在開悟令其證入須彌光歡喜幢天子至令勤修無邊淨功德解脫門衆生愛染漂泊無依佛德無礙應為其主隨修絶染名淨功德一行契理即曰無邊況其具修耶淨寶月天子得修一切苦行深心歡喜解脫門以智導悲為物受苦故深歡喜勇猛不退轉天子至益其精爽解脫門體離障惑用而遂通故云無礙若身若智俱得稱光周而不偏故云普照身心明利是益精爽爽明也大集經云國王護法增長三種精氣一地精氣謂五穀豐熟二衆生精氣謂形貌端嚴無諸疾疫三善法精氣謂修施戒信等今文正在第三益其福智義兼前二法力遠資故妙華纓光明天子至令生歡喜信解海解脫門身智二光淨物身心信解深廣于何不喜最勝幢光明天子至令成辦種種妙功德解脫門晝則勤心修善業故寶髻普光明天子至種種色相寶解脫門謂無緣大悲坐於道樹出多奇寶故色相寶者應言寶色相圓明可貴故以寶為體寶莊嚴故具十蓮華藏塵數故云種種一一色相用周法界名現無邊境如是皆從大悲海流悲海包納不揀賢愚故光明眼天子至令見法界藏解脫門慧除癡翳法眼則淨淨見法界法界即藏藏如前說持德天子得發生清淨相續心令不失壞解脫門於諸佛所發生清淨心曾一供養能令其福續至菩提故如出現品食金剛喻況相續耶普運行光明天子至令成就所作業解脫門使物居業莫越日光令人進德寧過法義二偈頌讚佛亦有十一爾時日天子承佛威力至而說頌言如來廣大智慧光至種種調伏多方便前半淨光普照後半常為利益滅惡生善破愚為智等為多方便如來色相無有邊至如是法門歡喜得二三可知為利世間修苦行至寶月能知此方便前半即一切苦行此有四難一背己利世難二行相唯苦難三處經諸有難四時劫無量難於此具行故云一切次句明深心歡喜亦有四義一為物苦行滿本願故義在初句二智照苦性本空寂故即有光明照空三遍淨無染非雜毒故即遍淨如空四自他有果非無利故即第三句全佛演妙音無障礙至此華纓天所入門光網之義如賢首品世間所有諸光明至此勝幢光之解脫通明舉省顯勝以辨難思故能成辦諸妙功德言世不及者世雖多光益非究竟佛光雖少必徹真源不可盡故以一況諸一切諸佛法如是至此是德天方便力文並可知一法門中無量門至普運光天之所了初句即能照法門猶一日宮千光並照隨舉一法有無量門然有二義一約相類如一無常門有生老病死聚散合離得失成壞三災四相外器內身剎那一期生滅轉變染淨隱顯皆無常門餘亦如是二就性融不可盡也次二句普運照義一日周天則日日無盡一門歷事則劫劫難窮方便多門終歸一極廣者無邊大者無生七月天子二初長行得法復次月天子得淨光普照法界攝化衆生解脫門名法門亦總稱也光有身智二殊法界亦事理兩別事即機之身心及所依剎身光照身令覺照剎令淨智光照心破癡照理令顯身智二光相即則所照四法亦融以之稱普並除惑障俱得淨名華王髻光明天子至令普入無邊法解脫門悲心普觀授以多法令入無邊法界衆妙淨光天子至種種攀緣轉解脫門衆生藏識皆名心海前七轉識名攀緣轉轉謂轉生亦流轉也緣境非一立種種名故經云藏識海常住境界風所動種種諸識浪騰躍而轉生喻云洪波鼓溟壑無有斷絶期既知機殊隨應授法安樂世間心天子至令踊躍大歡喜解脫門謂示物聖樂令得初地此樂本有染而不染為不思議樹王眼光明天子至隨時守護令成就解脫門謂以菩提心為家二利為作業並以身口為牛利智為犂耕於心地下聞熏種生信解芽起正行莖開諸覺華獲菩提果自利則以不放逸隨時守護利他則以能化大願守護不令魔惑禽獸侵犯從因至果得成就也出現淨光天子至令現見受苦受樂事解脫門謂慈護現樂悲救其苦令見因果斷惡修善名真救護普游不動光天子得能持清淨月普現十方解脫門以佛智風持大悲月使明見正覺離苦清涼星宿王自在天子至無相無自性解脫門一切法有二種一是所迷謂緣起不實故如幻緣成故無性二是能迷謂遍計無物故如空妄計故無相又緣起法有二義一無相如空則蕩盡無所有是相空也二無自性如幻則業果恆不失即性空也此二不二為一緣起是故兩喻共顯一法既不迷能所則悟真如成正智火淨覺月天子得普為一切衆生起大業用解脫門悲願為物現相好形是大業也大威德光明天子得普斷一切疑惑解脫門毛光普演何疑不斷二偈頌讚佛爾時月天子承佛威力至而說頌言佛放光明遍世間至華髻如是觀於佛初二可知衆生心海念念殊至此妙光明之解脫初句即心海攀緣轉若以生滅八識即彼第八亦名為轉以恆轉故云念念殊恆故非斷轉故非常新新而生念念而滅念念殊故體恆不即彼如來藏功德常具義亦不離如彼瀑流離水無流離流無水又如海波濤有漂溺故多畜養故法合思之次句明了知謂此識深細唯佛智知故次句示心海性即是佛智不令外求稱機故喜衆生無有聖安樂至安樂思惟如是見初二句明失聖樂聖安樂者即聖智涅槃本有今無故沉迷妄苦次句明與示其性有樂非苦外名不思議見性得樂性即是門如來希有大慈悲至此目光天所了知但是法說如來即田主也悲佃物田為利入有是所作業為利同於求果入有似於耕犁說法即是下種勸善正當守護令熟可知世尊開闡法光明至淨光見此生歡喜前悲救護語其本心此明智光彰其所用悲智相導能真救也佛為一切福所依至不動能知此方便初句佛為福依月為涼本次句應言大風持宮而今云爾即是轉喻大地如佛宮室如福次句即照現義亦清涼義智火大明周法界至星宿王天悟斯道八中可知佛如虗空無自性至淨覺天王如是見初句佛如虗空大業性也次句大業體也不利衆生非大業故次句大業相依光有影可以知動靜依鏡有像可以辨妍然彼影像無自性如來相好當知亦爾佛身毛孔普演音至如是解脫光天悟入第三經二八部四王衆八段初四段皆初一是天義如前釋初乾闥婆王二初長行得法復次持國乾闥婆王至攝一切衆生解脫門即東方天王謂攝受折伏逆順多端善巧應機故名自在樹光乾闥婆王得普見一切功德莊嚴解脫門謂令衆生見佛一切功德嚴佛一毛而為利益一一皆爾故云普見淨目乾闥婆王至憂苦出生歡喜藏解脫門以慈愍方便除憂則喜生憂苦既如海廣深喜樂亦難盡名藏然則世之憂喜生乎利害利害存乎情僞苦樂存乎吉凶吉凶存乎愛惡愛惡盡則吉凶苦樂皆亡情僞息則利害憂喜永斷如此方為永斷憂苦喜樂生焉華冠乾闥婆王得永斷一切衆生邪見惑解脫門謂得佛決定智光則邪惑永斷喜步普音乾闥婆王至澤一切衆生解脫門謂慈雲普蔭材與不材皆涼慧澤廣雲三草二木咸發樂搖動美目乾闥婆王至令一切獲安樂解脫門現身益物也稱性普應故廣大具相清淨故妙好妙音師子幢乾闥婆王至一切大名稱寶解脫門佛出說法是大名稱佛法衆僧俱稱為寶令此遠聞義云普散普放寶光明乾闥婆王至光明清淨身解脫門身光普照塵不能染見者必歡智光悅機惑纍不生又歡喜也故云大喜金剛樹華幢乾闥婆王至令見者歡喜解脫門法水遍滋菩提實行行既樹立見者必歡無復二乘一切皆菩提樹也普現莊嚴乾闥婆王至與衆生安樂解脫門一多無礙名為佛境天王智達故云善入二偈頌讚佛爾時持國乾闥婆王至而說頌言諸佛境界無量門至此道普音能悟入前五可知佛身清淨皆樂見至美目於斯善開示初句現身次句一切獲安樂世間即一切也無盡樂總顯也謂佛現於世足履影覆若在人天現增快樂若在下苦七日之中身心安樂乃至終獲涅槃之樂故云無盡次句別示出世因果之樂先因後果先世後出世皆次第義又總取偈意佛身清淨是解脫因生無盡樂是解脫果世無盡樂又解脫因能現淨身又解脫果又佛身清淨是樂見因樂見即為清淨身果衆生樂見是安樂因無盡安樂是樂見果無盡安樂是淨身因能現淨業是無盡果如是展轉因果名次第成衆生迷惑常流轉至師子幢王能演暢初二句寶所濟機堅謂難壞密謂無隙間無空處智不得生次句正散寶也如來普現妙色身至妙音如是觀於佛結句應云普放寶光如是見而云妙音譯者之誤妙音屬前師子幢故大智方便無量門至此金剛幢善觀察初二句法水普滋次句道樹普榮也又方便多門是開權也入菩提行是顯實也種種方便但為一乘是普滋也一剎那中百千劫至此樂莊嚴之解脫初二句佛境也次句安樂也佛力能現無所動者遮妄見也非促多劫就一剎那非展剎那受於多劫本相如故名無所動隨應度者佛力令見二鳩茶王二初長行得法復次增長鳩槃茶王得滅一切冤害力解脫門即南方天王謂內惑外讐皆名冤害安住忍力並能伏之龍主鳩槃茶王得修習無邊行門海解脫門二利之行趣果曰門深廣難窮名無邊海莊嚴幢鳩槃茶王得知一切衆生心所樂解脫門知其現欲如應化伏饒益行鳩槃茶王至大光明所作業解脫門鈍識者現之以通利智者示之以法遍世多劫名普成就並如虗空故云清淨俱能照世即是光明三輪化生是所作業可怖畏鳩槃茶王至安隱無畏道解脫門世間惑苦可畏不安菩提涅槃安隱無畏萬行為其因道則畏滅果成矣妙莊嚴鳩槃茶王得消竭一切衆生愛欲海解脫門愛欲漂流深廣如海智日赫照則妄竭真明高峯慧鳩槃茶王得普現諸趣光明雲解脫門謂於諸趣普現身雲曜通明等之電光也勇健臂鳩槃茶王得普放光明滅如山重障解脫門身智光明遣除二障無邊淨華眼鳩槃茶王至不退轉大悲藏解脫門多劫修悲究竟滅苦為不退轉悲多方便故復名藏為安衆生所以開示廣大面鳩槃茶王得普現諸趣流轉身解脫門稱性神通無來去而流轉二偈頌讚佛爾時增長鳩槃茶王至而說頌言成就忍力世導師至是故其身最嚴淨通明佛已滅冕冕之大者莫越憍慢有之則卑陋滅之則端嚴佛昔普修諸行海至可畏能觀此法門上四可知欲海漂淪具衆苦至此妙莊嚴之所悟初句欲海欲為苦本云具衆苦次二句消竭既欲惡止當說善行佛身普應無不見至如是法門高慧入初句普現身雲次句明等電光故云種種次句兼明雷雨雷有二義一遠震二發生謂蟄蟲發動草木發萌圓音之雷可以思準清淨光明不唐發至此廣面王心所了三龍王衆準偈及梵本皆有十一長行脫第五但有十法初長行得法復次毗樓博叉龍王至示現無量衆生身解脫門初一即西方天王法門及第二如偈當釋雲音幢龍王至說佛無邊名號海解脫門與偈文通有六義一諸趣是化處二淨音是化具三佛名是化法四神通是化本五衆生是化機六隨樂是化意𦦨口龍王得普現無邊佛世界建立差別解脫門謂一毛普現無邊依正以毛稱性能廣容故廣容即是普遍故能現之佛還自住於毛孔所現剎中能所無雜依正區分大小宛然名建立差別五靜法云準梵本有𦦨龍王得一切衆生瞋癡蓋纏如來慈愍令除滅解脫門謂大慈居懷則三毒俱滅然有本云𦦨口龍王得普現無邊佛世界建立差別解脫門今依有本建立差別者隨機化故雲幢龍王得開示一切衆生大喜樂福德海解脫門佛大慈悲是福德海二資糧滿然後得故衆生慈福即是百川佛毛示現以表同體既知同體自然朝宗因示悟入故得大喜樂德叉迦龍王至滅除一切怖畏解脫門慈音智俱故云清淨淨無貪愛何畏何憂無邊步龍王至佛色身及住劫次第解脫門謂於身中現身土也清淨色速疾龍王至大愛樂歡喜海解脫門觀佛昔行深廣故愛樂歡喜海言通二謂歡喜供養普行大音龍王至悅意無礙音解脫門為衆演音故云示現音有四義一類多謂一切二普遍謂平等三稱根清雅故云悅意四一音隨類故云無礙無礙即方便也無熱惱龍王至滅一切世間苦解脫門謂此無熱龍住清涼池出香美水流注四海導引百川時布慈雲降霔甘澤是故能滅諸世間苦二偈頌讚佛爾時毗樓博叉龍王至而說頌言偈有十一汝觀如來法常爾至彼畏塗淪墜者諸龍有四熱惱名熾然苦今並有治一金翅所食苦初句為治以觀佛法同三歸故二行欲時復本身苦三鱗甲細蟲苦並第二句為治學佛等利故四熱砂著身苦後二句為治以不堪蟲癢熱砂中𩥇今大慈哀愍故能治之有說四苦無鱗甲細蟲而有風吹寶衣露身之苦亦以第二句治之就龍且說龍趣末句約佛通畏塗一切衆生種種別至婆竭如是觀於佛此就佛論示現前約龍云能轉又前一念時促今一毛處小二文影略佛以神通無限力至無熱大龍能悟此餘九可知但第五偈即前所脫四夜叉衆二初長行得法復次毗沙門夜叉王至救護惡衆生解脫門即北方天王得以無邊等者謂善者自樂不待加哀惡者必苦心則偏重巧救多門故云無邊又此天能伏惡鬼令不犯衆生是救護也自在音夜叉王得普觀察衆生方便救護解脫門智觀悲救救苦護善不滯空有故云方便嚴持器仗夜叉王至一切甚羸惡衆生解脫門惡業障重名甚羸惡又羸無善力謂一闡提惡即弊惡謗方等經者明示妙理是謂資益大智慧夜叉王得稱揚一切聖功德海解脫門倣佛歎佛得名聞果𦦨眼主夜叉王得普觀察一切衆生大悲智解脫門悲智二照合為一心與法身俱故恆觀察金剛眼夜叉王至利益安樂一切衆生解脫門妙音說法利益多端唯應度者聲暨能益勇健臂夜叉王得普入一切諸法義解脫門教廣理深一句能演即是普入勇敵大軍夜叉王至令住於道無空過者解脫門令物離邪則能住正為守護矣然住正道者則不分別是邪是正云不思議富財夜叉王至令恆受快樂解脫門集福德因受快樂果由身智光得增長也力壞高山夜叉王至出生佛力智光明解脫門念佛修因生十力果天未證極故云隨順二偈頌讚佛爾時多門大夜叉王至而說頌言衆生罪惡深可怖至此高幢王所了知偈十文顯可知五摩睺羅伽衆二初長行得法復次善慧摩睺羅伽王至令衆生集功德解脫門普現威光名為神通不動性淨示涅槃因故云方便依因集德必得無依涅槃淨威音摩睺羅伽王至得清涼悅樂解脫門除惑契寂是清涼因清涼悅樂是涅槃果勝悲莊嚴髻摩睺羅伽王至入清淨法解脫門善者善之不善者佛示善之善覺示亡乃入本淨妙目主摩睺羅伽王至福德自在平等相解脫門福非福相染不可著非福現福名自在相佛佛無二是平等相燈幢摩睺羅伽王至令離黑暗怖畏道解脫門無智黑因如燈開示怖畏苦果如幢為歸最勝光明幢摩睺羅伽王至生歡喜解脫門以知佛德同空齊己一性故歡喜也師子臆摩睺羅伽王至救護主解脫門見理決斷聞深不怖聞淺不疑聞非深非淺意而有勇八風不傾為勇猛力既以自正必能正他為救護主衆妙莊嚴音摩睺羅伽王至生無邊喜樂解脫門往修喜因故見念皆喜須彌臆摩睺羅伽王至到彼岸滿足解脫門見理智成則緣不動智為行本諸度悉圓亦猶海納百川更不流矣可愛樂光明摩睺羅伽王至開示平等道解脫門開生等理示佛等應破情不等令悟性等為平等道二偈頌讚佛爾時善慧威光摩睺羅伽至而說頌言汝觀如來性清淨至此妙光明能善入十偈如次文顯可知
