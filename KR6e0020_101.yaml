body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經第十慈行童女寄灌頂住六初依教趣求文二初修入前教爾時善財童子於善知識所至生廣大清淨解上二句重友解生常念大乘專求佛智願見諸佛此二句念乘思佛次下智證實際觀法境界無障礙智常現在前能觀智現決定了知諸法實際至一切如來無際之際所證窮極於一切佛心無分別至知一切色悉皆如影離障自在二趣求後友漸次南行至師子奮迅城周徧推求慈行童女上至處下聞名聞此童女是師子幢王女五百童女以為侍從五百為侍者以一期位滿總攝五位十十法門互相涉入之法而相應故住毗盧遮那藏殿至天衣座上而說妙法二見敬諮問三初見二初明遠見善財聞已詣王宮門至既無限礙我亦應入表方得門而未證故二親依正善財入已見毗盧遮那藏殿至以梵音聲而演說法二敬善財見已頂禮其足繞無數帀合掌前住三問作如是言聖者我已先發至善能誘誨願為我說三正示法界二初令觀親證時慈行童女告善財言至過去世中善根之力並依中見正小大念劫皆無礙等十住位終故約報顯二以言顯發二初顯法名因二初善財默請爾時善財童子憶念所見至合掌瞻仰慈行童女二童女言答爾時童女告善財言至般若波羅蜜普莊嚴門先示其名名般若普莊嚴者有其二義一由般若照一切法依中有正一中有多故所得依無所不現般若中云了色是般若一切法趣色即其義矣二由能證般若已具諸度莊嚴是故所證所成亦嚴無盡故下顯因云彼諸如來各以異門令我入此即其義也總攝三十六恒沙之別歸於普門則一嚴一切嚴故名普嚴我於三十六恒河沙佛所求得此法言三十六恒沙者住位既滿則六度之中一一具六故為三十六皆恒沙性德本覺中來故云佛所求得彼諸如來各以異門至一佛所演餘不重說二顯法勝用二初問善財白言聖者此般若波羅蜜普莊嚴門境界云何二答二初總二初明修習契證相應童女答言善男子至思惟觀察憶持分別時二總明所得業用得普門陀羅尼陀羅尼以智為體由得般若普莊嚴故故能總持萬法一持一切持故云普門百萬阿僧祇陀羅尼門皆悉現前以圓融十住亦同十地所得無量百千阿僧祇陀羅尼門又彼總此別但舉總持餘三昧等略而不說二別顯有百一十八門略分十位初八總知依正理事持所謂佛剎陀羅尼門至常住際陀羅尼門二有九門明願行持福德陀羅尼門至圓滿行陀羅尼門三有九門明業持業陀羅尼門至持善行陀羅尼門四有六門明正受體用持三昧陀羅尼門至神通陀羅尼門五有五門明染淨諸心持心海陀羅尼門至調心清淨陀羅尼門六有十門知所化持知眾生所從生陀羅尼門至知眾生想陀羅尼門七有十七門知能化持普見十方陀羅尼門至世間法陀羅尼門八有十七門明知剎海自在持世界成陀羅尼門至世界轉陀羅尼門晉經云迴轉世界知依想住陀羅尼門至麤入細陀羅尼門九有二十五門知佛海自在持見諸佛陀羅尼門至入微妙法陀羅尼門十有十二門明菩提因果持菩提心陀羅尼門至自心清淨陀羅尼門自心清淨即性淨菩提總攝諸門不出於此四謙己推勝善男子我唯知此般若至能知能說彼功德行五指示後友善男子於此南方有一國土名為三眼施為行首彼友復能開導自他如人之目導餘根故名之為眼財施無著成於慧眼無畏之施成於慈眼法施則能開於法眼故復云三彼有比丘名曰善見因上三眼見無不善又施行內成勝報外現比丘見者皆善故出住之行故以出家表之又此行本令物得出離故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至變慕瞻仰辭退而行三善見已下有十善友寄十行位位各一人初善見比丘寄歡喜行文亦具六初依教趣求二初念前友教有十三句爾時善財童子思惟菩薩所住行甚深初總餘別別分為三初二約菩薩論深思惟菩薩所證法甚深一所證法界即事而真故思惟菩薩所入處甚深二入菩薩地智唯證相應故次有七句約眾生辨深思惟眾生微細智甚深一報類難知故思惟世間依想住甚深二妄想為因即無性故思惟眾生所作行甚深三染分行業唯佛知故思惟眾生心流注甚深四感異熟識若種若現恒轉如流不可知故思惟眾生如光影甚深五所變影像若內若外緣無性故思惟眾生名號甚深六名無得物之功而不失所名之物故思惟眾生言說甚深七文字言說皆解脫故後之三句合辨前文思惟莊嚴法界甚深一染淨二分皆嚴法界而無嚴故思惟種植業行甚深二上二分業不相知故思惟業莊飾世間甚深三各自莊飾染淨世間果報無失即同真故總上二分皆是般若波羅蜜多普莊嚴故所以思之二趣求後友漸次游行至三眼國至周徧求覓善見比丘於市肆等處處求者顯隨緣造修無不在故二見敬咨問三初見三初見身勝相見在林中經行往返見在林者行之初故壯年美貌端正可喜至𮌎標卐字七處平滿同佛相者如說修行順佛果故七處謂兩手兩足兩肩及項其臂纖長其指網縵至其身殊妙如淨居天準晉經云即師子上身相上下端直如尼拘陀樹準晉經云其身圓滿如尼俱陀樹此則但是一相諸相隨好悉皆圓滿如雪山王種種嚴飾上但列十四故總結云目視不瞬圓光一尋復是二相都列十六耳餘至瞿波善友處釋二明其心相即止觀雙運智慧廣博猶如大海明觀於諸境界心無所動明止若沉若舉若智非智重釋止觀二義止過則沉智過則舉不沉不舉則正受現前不智不愚則雙契中道動轉戲論一切皆息起念止觀皆成動轉雙非再遣未離戲論雖止觀雙運而無心寂照則一切皆息得佛所行平等境界至不遲不速審諦經行隨所履道即是法門三明諸侍從無量天龍夜叉乾闥婆至住在虗空放大光明不無表法恐煩不說二敬時善財童子詣比丘所頂禮其足曲躬合掌三問白言聖者我已先發至云何修菩薩道三正示法界二初示依緣得法三初總序善見答言善男子我年既少初入行位故云年少出家又近創離十住之家名為出家又近我此生中略有二義一念劫圓融故如毗目處說二顯解行生非見聞生故於三十八恒河沙佛所淨修梵行供三十八恒沙者過前位故二明所修時分或有佛所一日一夜至乃至不可說不可說大劫三所作成益聽聞妙法受行其教至滿足六種波羅蜜海自修願智行亦見彼佛成道說法至住持遺教乃至滅盡見其果用亦知彼佛本所興願至清淨一切佛波羅蜜知佛修因二顯法業用又善男子我經行時至三世分位智光明願力故有十二句各先辨業用後出所由然皆不出願智行三如文思之總云一念者以得無依無念智故無法不現二謙己推勝二初謙己結前善男子我唯知此菩薩隨順燈解脫門名隨順燈者用無念之真智順法順機無不照故二推勝知多如諸菩薩摩訶薩如金剛燈於如來家真正受生初句為總亦是別顯家族勝上但云燈照未必常故今推之明金剛智燈親證真如為真正生則常照矣不同解行生也具足成就不死命根二報命勝由所證常故即金剛義常然智燈無有盡滅三內智勝如於所證無盡滅故即是燈義其身堅固不可沮壞四報體勝法性成身相不遷故亦金剛義現於如幻色相之身至必令種植廣大善根五明業用勝即對上隨順義以是即體之用故皆不可壞餘並可知如是之人難可得見至云何能知能說彼功德行五指示後友善男子於此南方有一國土至學菩薩行修菩薩道六戀德禮辭時善財童子為欲究竟至殷勤瞻仰辭退而去第二自在主寄饒益行文六初依教趣求爾時善財童子受善見比丘至前後圍繞向名聞國國曰名聞者能持淨戒現世界故周徧求覓自在主童子三業無非六根離過故得自在則戒為主矣戒淨無染故云童子時有天龍乾闥婆等至今此童子在河渚上河渚上者若持淨戒生死愛河不漂溺故又無量福河常流注故二見敬諮問爾時善財即詣其所至所共圍繞眾聚沙為戲恒沙功德由戒積集善財見已頂禮其足至云何修菩薩道願為解說二正示法界二初舉法門名體自在主言善男子我昔曾於文殊師利童子所修學文殊所學者有智能護戒故書能詮止作分明故數表四重十重乃至三千威儀八萬細行故筭一一之因感幾何果故印持犯善惡感果決定故等法等餘醫方成五明故上明所學下辨所悟即得悟入一切工巧神通智法門工巧神通皆知所為故亦表修戒發定慧故二明業用三初總明善男子我因此法門故至書數筭印界處等法二雜辨諸明亦能療治風癇消瘦至增長決定究竟清淨三廣辨知筭二初辨能筭之數善男子我亦能知菩薩筭法至一不可說不可說轉二筭彼所筭善男子我以此菩薩筭法至一切諦名皆悉了知四謙己推勝善男子我唯知此一切工巧至發其殊勝智慧光明五指示後友善男子於此南方有一大城名曰海住近海而住故安住於忍如海包含故有優婆夷名為具足一器之中無不具故忍器徧容一切德故忍辱柔和故寄女人汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子聞是語已至殷勤瞻仰辭退而去第三具足優婆夷寄無違逆行六初依教趣求二初念前友教爾時善財童子觀察思惟至能伏異道修羅軍眾二趣求後友如是思惟漸次游行至在此城中所住宅內二見敬諮問三如見四初見外依報善財聞已即詣其門至四面皆有寶莊嚴門二見友正報善財入已見優婆夷處於寶座盛年好色端正可喜端嚴可喜忍之報故素服垂髮身無瓔珞素服等者忍華飾故其身色相威德光明除佛菩薩餘無能及三見內依報於其宅內敷十億座至但於其前置一小器四明其眷屬復有一萬童女圍繞萬行皆順忍故威儀色相如天采女至見其身者悉離貪染二敬爾時善財既見具足優婆夷至恭敬圍繞合掌而立三問白言聖者我已先發至善能誘誨願為我說三正示法界二初舉法門名禮彼即告言善男子我得菩薩無盡福德藏解脫器中出物興福無盡故稱法界福之所招故二辨其業用三初正顯業用三初益眾生三初總明能於如是一小器中隨諸眾生種種欲樂以是稱性之具即一小器融同法界無盡緣起故用無不應應無不益而其法界體無增減又表忍必自卑故小法忍同如一味為一內空外假故名為器忍能包含無外故隨出無盡二別明出味出生種種美味飲食至無有窮盡亦不減少三舉一例餘如飲食如是種種上味至隨意所樂悉令充足二益二乘又善男子假使東方至四維上下亦復如是二乘雖然不立忍名亦能忍盡無生之理方成果故三益菩薩又善男子東方一世界至四維上下亦復如是約事如受於乳糜約法謂餐上品寂滅之忍得菩提故淨名香積與此大同二令見同益善男子汝見我此十千童女至乃至人中充足人食三令其目驗善男子且待須臾至隨其所須給施飲食悉使充足四謙己推勝告善財言善男子至而我云何能知能說彼功德行五指示後友善男子南方有城名曰大興起大精進故彼有居士名曰明智進足必假智目導故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至瞻仰無厭辭退而去第四明智居士寄無屈撓行文六初依教趣求二初依前修治爾時善財童子至行彼福德道修彼福德種二趣求後友漸次而行至大興城至增長如來十力光明二見敬諮問三初見爾時善財見彼居士在其城內市四衢道見在四衢者表處喧不撓無不通故七寶臺上處無數寶至侍立瞻對承其教命二敬爾時善財頂禮其足繞無量帀合掌而立三問白言聖者我為利益至能為一切眾生作依止處三稱讚授法三初歎發勝能長者告言善哉善哉至稟善知識心無有誤失二示己所化善男子汝見我此眾會人不至三菩提心生如來家發心眷屬生如來家者同四住中生也增長白法安住無量至悉能救護一切眾生三正示法界二初舉名善男子我得隨意出生福德藏解脫門財法無盡蘊在虗空隨意給施故隨意出生福德藏亦表見空無不備故二顯業用二初略舉凡有所須悉滿其願至乃至為說真實妙法二舉事現驗二初見眾集善男子且待須臾至各隨所欲而有求請二廣施財法二初施財爾時居士知眾普集至一切眾會普皆滿足二施法然後復為說種種法於食一施令成八行所謂為得美食而充足者至集福德行離貧窮行初二行約施辨餘六約食食有五果知諸法行一知諸法即是慧命成就法喜禪悅食行二得喜悅者即常安樂修習具足諸相好行三具相好即是常色增長成就難屈伏行四即常力善能了達無上食行五即常辯成就無盡大威德力降魔怨六亦常力與上常力為一果為得好飲而充足者至諸佛如來上味之相上味之相者四牙皆有甘露泉故為得車乘而充足者至既聞法已還歸本處四謙己推勝爾時居士為善財童子至彼諸功德自在神力五指示後有善男子於此南方有一大城名師子宮禪定無亂如彼深宮處之則所說決定作用無畏故以為名彼有長者名法寶髻綰攝眾亂居心頂故定含明智加以寶名以喻顯法名法寶髻汝可往問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子歡喜踊躍至殷勤瞻仰辭退而去
