body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經三迴向所為初標佛子菩薩摩訶薩有十種大發起迴向發起令現前故二徵何等為十三釋初六自分二初三福業大佛子菩薩摩訶薩作如是念至是為第三大發起二三化業大又作是念我當教化調伏至而以莊嚴一切世界嚴上亦為攝生故是為第五大發起至是為第六大發起二四勝進二初二勝進攝福又作是念彼諸如來無量無邊至是為第八大發起後二勝進起化二初證體菩薩摩訶薩又作是念至是為第九大發起二起用菩薩摩訶薩復作是念至是為第十大發起四結佛子是為菩薩摩訶薩十種大發起五勸若諸菩薩安住此法至具足如來無上大智五所作成滿四初標佛子菩薩摩訶薩有十種究竟大事二徵何等為十三釋所謂恭敬供養一切如來至諸佛正法究竟大事四結勸是為十若諸菩薩安住此法至大智慧究竟事二有二門明不壞迴向中行初正明不壞四初標佛子菩薩摩訶薩有十種不壞信二徵何等為十三釋所謂於一切佛不壞信至調伏一切眾生不壞信十句義中前說四結勸是為十若諸菩薩安住此法至無上大智慧不壞信二迴向行成四初標佛子菩薩摩訶薩有十種得授記二徵何等為十三釋所謂內有甚深解得授記解會佛心能順起菩薩諸善根得授記具解脫分善修廣大行得授記大行已修上三多約三賢現前得授記不現前得授記此二約對面不對面法華云其不在此會汝當為宣說等因自心證菩提得授記初地證如成就忍得受記八地成忍教化調伏眾生得授記九地具調化方究竟一切劫數得授記十地三大劫滿一切菩薩行自在得授記等覺已入重玄故云自在如記慈氏等若約行布此迴向位但有前五因便故來若約圓融並通斯十四結勸是為十若諸菩薩安住此法至諸佛所而得授記三有二門等一切佛迴向中行二初等佛善根四初標佛子菩薩摩訶薩有十種至一切善根悉皆迴向此門正明等佛佛為真善知識同即等義二徵何等為十三釋所謂以我善根同善知識至以我善根同善知識心心即悲智為心如是成就莫別成就至以我善根同善知識平等平等契理如是成就莫別成就至如是成就莫別成就餘各一義皆云同者同一體故不見二相故標中云由此能以一切善根悉皆迴向四結是為十若諸菩薩安住此法則得無上善根迴向二迴向行成四初標佛子菩薩摩訶薩有十種得智慧彼文云住此三昧入深清淨智慧境界等故二徵何等為十三釋所謂於施自在得智慧至種種莊嚴言音得智慧四結勸是為十若諸菩薩安住此法至諸佛無上現證智四至一切處迴向中行四初標佛子菩薩摩訶薩有十種發無量無邊廣大心無量無邊故無不至境既無量無邊心如境而廣大二徵何等為十三釋所謂於一切諸佛所發無量至發無量無邊廣大心四結勸是為十若諸菩薩安住此心至無邊廣大智慧海五即無盡功德藏迴向中行四初標佛子菩薩摩訶薩有十種伏藏於一切法蘊斯十義故名為藏即法而觀惑者不見故名為伏二徵何等為十三釋所謂知一切法是起功德行藏至發生歡喜淨信藏一切各十是名無盡功德矣四結觀是為十若諸菩薩安住此法至悉能調伏一切眾生六即隨順堅固一切善根迴向中行四初標佛子菩薩摩訶薩有十種律儀彼約行首故廣就施以明善根今約行本略辨律儀善根皆順平等之理實通一切故第八云一切善根皆令究竟究竟即是順堅固義二徵何等為十三釋所謂於一切佛法至於一切波羅蜜皆令滿足律儀通明十句攝善饒益無所不具通一切善居然可知四結勸是為十若諸菩薩安住此法則得無上大智律儀七即平等隨順一切眾生迴向中行四初標佛子菩薩摩訶薩有十種自在具十自在能隨順故二徵何等為十三釋所謂命自在於不可說劫至十方無畏成正覺故十自在義如八地辨四結勸是為十若諸菩薩安住此法至智慧神力菩提自在此下入第五十六經八即真如相迴向中行如於真如無障礙故故彼位果云住於此位得一切剎平等平等即是無礙之因亦無礙之義又云得佛無量圓滿之身一身充滿一切世界等即正顯無礙之義文四初總標十章三初標佛子菩薩摩訶薩有十種無礙前明自在即作用任運今明無礙顯作用無拘二徵何等為十三列所謂眾生無礙用至神力無礙用力無礙用又無礙有二一智二事十中有通有局然法智無礙多唯約智如身剎等多唯約事如眾生等通於事智然事無礙必通於智智無礙境未必通事二皆即體之用是故並云無礙用也然十皆通二利且約化說初一所化二是化處餘皆能化謂化法化身等可以意得二總徵十章佛子云何為菩薩摩訶薩眾生等無礙用三依章別釋即為十段文皆有四謂標徵釋結今初所化眾生無礙用初標佛子菩薩摩訶薩有十種眾生無礙用二徵何者為十三釋所謂知一切眾生無眾生無礙用了性空故知一切眾生但想所持無礙用唯心現故上二實智為一切眾生說法未曾失時無礙用知時說法即是權智上三約智辨無礙餘七約事無礙普化現一切眾生界無礙用能現眾生置一切眾生於一毛孔中而不迫隘無礙用近收一毛為一切眾生示現他方一切世界令其悉見無礙用遠示他剎為一切眾生示現釋梵護世至成等正覺無礙用餘四皆示上首之身四結是為十二剎無礙用四初標佛子菩薩摩訶薩有十種國土無礙用二徵何等為十三釋所謂一切剎作一剎至以此普示一切眾生無礙用知剎無盡即通智通事也故晉經云於一切剎深入無盡方便度世經云一切佛界所入無盡皆通事也餘九唯事無礙深即微細剎餘並可知四結是為十三法無礙用四初標佛子菩薩摩訶薩有十種法無礙用謂皆約智於性相無礙之法皆能知說悉自在故二徵何等為十三釋所謂知一切法入一法至不違眾生心解無礙用一多即入而不壞本從般若波羅蜜出生一切法至悉令開悟無礙用實智出權知一切法離文字而令眾生皆得悟入無礙用無文示文知一切法入一相而能演說無量法相無礙用一說多相知一切法離言說能為他說無邊法門無礙用無說之說於一切法善轉普門字輪無礙用一言圓備輪字之義彌伽處釋以一切法入一法門至說不窮盡無礙用門門互收以一切法悉入佛法令諸眾生皆得悟解無礙用以真收俗知一切法無有邊際無礙用橫知無邊知一切法無障礙際至為眾生說不可窮盡無礙用豎窮其際四結是為十四身無礙用四初標佛子菩薩摩訶薩有十種身無礙用二徵何等為十三釋所謂以一切眾生身至示現一切眾生身無礙用四結是為十五願無礙用四初標佛子菩薩摩訶薩有十種願無礙用二徵何等為十三釋所謂以一切菩薩願至充洽一切諸眾生界無礙用四結是為十六境界無礙用四初標佛子菩薩摩訶薩有十種境界無礙用謂於此十勝劣相違境中於勝現劣迴轉無礙是為菩薩分齊之境二徵何等為十三釋所謂在法界境界而不捨眾生至寂靜威儀無礙用四結是為十七智無礙用四初標佛子菩薩摩訶薩有十種智無礙用前來諸段雖亦有智各從本類攝之今則一向辨其智用然智無若干因法顯別以法從智前法無礙以智從法二徵何等為十三釋所謂無盡辯才無礙用一切總持無有忘失無礙用此二能化智能決定知決定說一切眾生至隨應授藥無礙用此三知所化智一念能入如來十力無礙用此一上入佛智前六皆權智以無礙智知三世一切劫至無有斷絕無礙用此二權實無礙智於一眾生想知一切眾生至解一切眾生語無礙用此二事事無礙智四結是為十八神通無礙用四初標佛子菩薩摩訶薩有十種神通無礙用二徵何等為十三釋所謂於一身示現一切世界身無礙用無數色身通於一佛眾會聽受一切佛眾會中所說法無礙用天耳於一眾生心念中至開悟一切眾生心無礙用他心以一音現一切世界差別言音至各得解了無礙用分別言辭一念中現盡前際一切劫至悉得知見無礙用宿住通故度世經名見前世令一切世界具足莊嚴無礙用往一切佛剎通莊嚴乃是其中別義普入一切三世無礙用未來劫通前已明過去故通舉三世放大法光明現一切諸佛菩提眾生行願無礙用即一切法智通故度世云一切諸佛菩薩所建立行演法光明而照耀之即是法光照佛法也善守護一切天龍至如來十力菩薩善根無礙用即天眼度世云知見一切等故謂見有所作而守護之十準晉本云佛子略說菩薩平等觀一切諸法通自在此即一切法滅盡三昧通平等寂滅故故度世云菩薩平等寂諸音響則以平等制御眾生今文脫此文中略舉故不由盡大旨不異十通品辨四結勸是為十若諸菩薩得此無礙用則能普入一切佛法九神力無礙四初標佛子菩薩摩訶薩有十種神力無礙用神通多約外用無壅神力多約內有幹能故其中十力多約一毛含攝等二徵何等為十三釋所謂以不可說世界至令諸眾生悉得悟解無礙用此即身力後是智力若以通攝力十種神力但是一神足通耳既分通力兩殊故十通中少說神境四結是為十十力無礙用四初標佛子菩薩摩訶薩有十種力無礙用悲智之力皆無礙故亦有事用無礙從多說之二徵何等為十三釋所謂眾生力無礙用至不捨一切眾生故四結是為十四總結成益佛子如是名為菩薩至無礙用門善巧示現故欲成不成已得無礙得果不捨因尤顯無礙九有三門明無縛無著解脫迴向中行彼有百門廣顯以無縛著解脫成就普賢自在智用今略辨其三即分三段此門任志游戲次門明境界難量後門明智用幹能皆由無縛無著故今初文四初標佛子菩薩摩訶薩有十種游戲任志行成游賞自在二徵何等為十三釋攝為五對所謂以眾生身作剎身至不壞於剎身是菩薩游戲依正染淨相作而皆不壞本相正顯游戲之義如世縱情游戲無損動故他皆倣此於佛身示現聲聞獨覺身至是菩薩游戲大小乘互現於菩薩行身示現成正覺身至是菩薩游戲因果互現於涅槃界示現生死身至入於涅槃是菩薩游戲生死涅槃互現入於三昧而示現行住至不可窮盡是菩薩游戲定散自在謂初即定中起用而常定後即用中入定而常用四結勸是為十若諸菩薩安住此法至無上大智游戲二境界難量四初標佛子菩薩摩訶薩有十種境界通二種境一即游戲所行之境故晉經名為勝行二即分齊之境謂出沒無礙唯菩薩能故二徵何等為十三釋所謂示現無邊法界門至悉方便開悟是菩薩境界上三通所行境下七皆分齊境於如來身出菩薩身至成等正覺是菩薩境界四結勸是為十若諸菩薩安住此法至無上大智慧境界三智用幹能四初標佛子菩薩摩訶薩有十種力二徵何等為十三釋所謂深心力不雜一切世情故一向深求故釋以不雜增上深心力不捨一切佛法故深求佛法佛法即是增上方便力諸有所作究竟故所作究竟者由有善巧上三自利智力了知一切心行故願力一切所求令滿故此二利他行力盡未來際不斷故至而不捨大乘故此二通二利前七自分力神變力於一一毛孔中至一切眾生諸根性欲故此三勝進力四結勸是為十若諸菩薩安住此法至無上一切智十力十有四門明法界無量迴向中行分之為三初門明所迴善根四初標佛子菩薩摩訶薩有十種無畏即是法施善根無畏即說法之德二徵何等為十三釋十初聞持無畏佛子菩薩摩訶薩悉能聞持至是為菩薩第一無畏二辯才無畏佛子菩薩摩訶薩得如來灌頂至菩薩第二無畏上二不畏不能答難三二空無畏佛子菩薩摩訶薩知一切法空至菩薩第三無畏了達二空不畏妄念四威儀無缺所以無畏佛子菩薩摩訶薩佛力所護至是為菩薩第四無畏五三業無過無畏佛子菩薩摩訶薩身語意業至是為菩薩第五無畏上二不畏外譏六外護無畏佛子菩薩摩訶薩金剛力士至是為菩薩第六無畏不畏眾魔外道七正念無畏佛子菩薩摩訶薩已得成就至是為菩薩第七無畏不畏遺忘八方便無畏佛子菩薩摩訶薩智慧方便至是為菩薩第八無畏不畏生死如善治船不懼海難九一切智心無畏佛子菩薩摩訶薩恒不忘失至是為菩薩第九無畏不畏二乘十具行無畏佛子菩薩摩訶薩成就一切至是為菩薩第十無畏不畏不能化生四結勸佛子是為菩薩摩訶薩至而亦不捨菩薩無畏
