body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經第九不動優婆夷寄善法行文亦有六初依教趣求二初依教五初思修前法爾時善財童子出妙光城至思惟彼不思議所作業二因修得益生歡喜心生淨信心至生無濁心生清淨心無濁約無他清淨約自體生堅固心生廣大心生無盡心三推功歸友如是思惟悲泣流淚至此偏悲者修悲將滿故念善知識實為希有至增長一切菩薩根芽四廣歎友能又作是念善知識者至能普增長一切白法五勝緣印勸二初印善財童子如是悲哀至覺悟菩薩如來使天天字兩用故晉本云如來使天隨菩薩天隨菩薩天是己業行所感之神如來使天是佛慈力攝生之神但是修行位已著者皆有二天常隨其人於虗空中而告之言至則得具足一切義利二勸詣後友善男子汝可往詣至不動優婆夷大善知識二趣求後友時善財童子從彼三昧至即詣不動優婆夷舍二見敬諮問見中分二初見依獲益入其宅內見彼堂宇至人與非人之所能有二見正超倫善財童子前詣其所至唯除具足大智慧者二敬問爾時善財童子曲躬合掌至善能誘誨願為我說三稱讚授法二初讚時不動優婆夷至能發阿耨多羅三藐三菩提心二正授法界二初示法門名體善男子我得菩薩難摧伏智慧藏解脫門文勢不同前例而舉五法者亦同九地當法師位須廣知故五中初二所持內德上一智慧無覊偏名解脫有智則煩惱不可壞破諸取著無能勝故云難摧伏此智包容故名為藏我得菩薩堅固受持行門二受持堅固偏得行名謂遇惡眾生而能堪忍徧生諸趣而心不迷故云堅固我得菩薩一切法平等地總持門三即能持深入法門得法性地則無不持矣我得菩薩照明一切法辯才門四即外化由正思佛法明照差別故故得辯才能轉法輪稱眾生欲我得菩薩求一切法無疲厭三昧門五即上求一心求法故云三昧近佛無厭受法無足故二徵業用之境界文四初徵問善財童子言聖者至無疲厭三昧門境界云何二顯難童女言善男子此處難知二重請善財白言唯願聖者至離諸分別究竟平等四廣答二初明得法因緣以彰深遠釋上難知六初舉往見佛為發心緣優婆夷言善男子至身體柔輭心生歡喜二內興觀念為發心因便從樓下至於地上至諸相隨好無有厭足上觀下念竊自念言此佛世尊至神通自在辯才無礙念福智等即前五法之因神通自在是行堅固三佛勸發心能成前五有十種心善男子爾時如來知我心念至無能勝心破諸取著上二成智慧應發無退怯心入深法門次一成總持應發能堪耐心救惡眾生至普於一切諸趣受生次二成神通應發無厭足心求見諸佛至悉受一切如來法雨次二成三昧應發正思惟心普生一切至隨眾生欲施其法寶後三成辯才故上來十句釋五法門四發心堅固善男子我於彼佛所至及以二乘悉不能壞五經久無違善男子我發是心已來至不生勝劣想不生愛憎想六彰發心勝益善男子我從是來常見諸佛至開悟法界一切眾生即是前來五因之果二顯其業用四初許現善男子我得菩薩求一切法至自在神變汝欲見不即舉前來五法中二二申請善財言唯我心願見三正現爾時不動優婆夷至入如是等一萬三昧門入一萬三昧者於一求法無厭三昧即入一萬明知餘解脫等亦攝多門入此三昧門時十方各有至轉妙法輪開悟羣生四出定印述時不動優婆夷從三昧起至善財言唯我皆已見四謙己推勝優婆夷言善男子至而我云何能知能說彼功德行五指示後友善男子於此南方有一大城名無量都薩羅都薩羅者此云喜生出謂此城中出生無量歡喜之事故以智度圓滿則能無所不生其中有一出家外道名曰徧行巧智隨機無不行故名真實行示外道者能行非道故非道不染故曰出家汝往彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去已下六十七經第十徧行外道寄真實行六初依教趣求爾時善財童子至處處尋覓徧行外道二見敬諮問城東有山名曰善得善財童子於中夜時中夜見者智入生死故善財將入此智位故上云日沒入城見此山頂草樹巗巘至平坦之處徐步經行山頂見者表位極故色相圓滿威光照耀以智慧光破於生死及二邊闇故大梵天王所不能及至善能教誨願為我說三稱讚授法二初讚發心徧行答言善哉善哉二正授法界二初彰名體善男子有四法者智徧知故四義雖列而得相成我已安住至一切處菩薩行已一化境普周徧行之名亦從此立成就普觀世間三昧門已二入定觀機成就無依無作神通力已三由無作神通故能徧至前處成就普門般若波羅蜜四由普門般若故能在定普觀若約別者無作無依用而無住普門般若無法不窮二顯四業用初明至一切處用善男子我普於世間至人非人等一切諸趣二普觀世間用或住諸見或信二乘至無能映蔽大威德體觀其所宜隨宜說故三明無作無依用又善男子此都薩羅城中至我是何人從何而至不知從何而至是無作依唯令聞者如實修行至悉亦如是而為利益四普門般若用善男子閻浮提內九十六眾至而為說法令得利益九十六種皆能窮故上來隨勝別配諸門實則義通四謙己推勝善男子我唯知此至一切處至能知能說彼功德行五指示後友善男子於此南方有一國土名為廣大創入迴向故迴向眾生故廣迴向菩提故大迴向實際義通廣大有鬻香長者鬻者賣也香質雖小發氣彌布善根雖微迴向普周又若賣若買二俱得香自他善根俱可迴向名優鉢羅華青蓮華者蓮華處泥不染猶護眾生而離相青蓮為水中之最救護為入生死之尊汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去四有十善友寄十迴向今初青蓮華長者寄救護眾生離眾生相迴向文六初依教趣求爾時善財童子因善知識教至一切諸佛菩薩功德先依教興願以是迴向大願之首故後趣求後位漸次游行至廣大國二見敬諮問詣長者所頂禮其足至而能出生一切智智三稱讚授法二初讚長者告言善哉善哉至發阿耨多羅三藐三菩提心二授二初總標所得善男子我善別知一切諸香差別行也知世諸香以表法香謂以戒定慧慈悲等香熏修生善滅惡習氣故亦知調合一切香法融通行也以金剛杵碎之實相般若波羅蜜調和令純雜無礙悲智圓融成迴向故二別顯業用二初總相顯知文四此四各有事理思之初知香體異所謂一切香一切燒香至一切香王所出之處二約類辨異又善了知天香龍香至人非人等所有諸香三知力用異又善別知治諸病香至一切菩薩地位香前二約世此約出世四委窮本末如是等香形相生起至如是一切我皆了達二指事別顯有十種香善男子人間有香名曰象藏具前本末十事一但語香名必有形相因龍鬬生二龍鬬為生起若燒一丸即起大香雲三興雲為出現彌覆王都於七日中雨細香雨四雨雨為成就若著身者身則金色若著衣服宮殿樓閣亦皆金色五金色為清淨若因風吹入宮殿中至歡喜充滿身心快樂六喜樂為安隱無有諸病不相侵害離諸憂苦七無病等為方便不驚不怖不亂不恚慈心相向八慈心等為境界志意清淨九意淨為威德其業用一種義通前七我知是已而為說法至發阿耨多羅三藐三菩提心十是根本本為菩提心故若就菩提心顯十義者以菩提心香似如來藏因善惡相攻而生若一發心必興慈雲注大法雨心所及者令歸真淨得法喜樂離惑業苦展轉興慈志願純淨善男子摩羅耶山出栴檀香至設入火坑火不能燒餘之九香皆應名具法喻之十略故無也或二或三摩羅耶者國名國多此香故此即忍香瞋火不燒善男子海中有香名無能勝至一切敵軍皆自退散三即進香魔軍退散善男子阿那婆遠多池邊至彼天王所而共聽法此五如次是五分法身香善男子兜率天中有香至供養一切諸佛菩薩九即稱法界香先陀婆一名四實此宜用鹽香似此故善男子善變化天有香至普雨一切諸莊嚴具十忘能所所以名奪意四謙己推勝善男子我唯知此調和香法至辨其離染身語意行五指示後友善男子於此南方有一大城名曰樓閣由此迴向令菩提心轉更增長悲智相依而勝出故中有船師名婆施羅此云自在謂於佛法海已善通達於生死海能善運度於一切法深信不壞故名自在汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭而退去二船師婆施羅寄不壞迴向六初依教趣求二初依教觀道爾時善財童子向樓閣城觀察道路於迴向道初得不壞故所謂觀道高卑佛道為高餘皆是卑觀道夷險生死涅槃為夷險觀道淨穢障無障為淨穢觀道曲直二乘為曲菩薩為直等二趣求後位而興勝念漸次游行作是思惟至至一切智城道因上正明謂菩薩道因人得故即於菩薩法師得不壞信後徵釋何以故於善知識處至如是思惟漸次游行二見敬諮問既至彼城見其船師在城門外海岸上住若佛法海以生死為此岸不捨生死故若約生死海以大悲修因而為此岸住大慈悲令離因故百千商人及餘無量至聖者善能教誨願為我說三稱讚授法二初讚問船師告言善哉善哉至發阿耨多羅三藐三菩提心讚其發心後能問法文有九句今復能問生大智因至住諸寂靜三昧旋因前五能問果因三昧旋者旋謂深故澓沉而不流二乘沉寂動八萬劫故能遠離是菩薩道乘大願車徧一切處至一切智海清淨道因後四能問因因故云道因二授己法界二初標名體善男子我在此城海岸路中淨修菩薩大悲幢行謂大悲超出為物所歸故二辨其業用二初明於陸化生令知有海善男子我觀閻浮提內至如是利益一切眾生二善知海相於海化生文二初明善知後彰化益今初此寶洲等生死法海義皆有之且約生死海釋文中略舉知五種事即分為五初知寶善男子我知海中寶即是智故不入生死大海則不能生一切智寶於中文有一十二句一切寶洲生死海中湛寂不動謂之寶洲一切寶處空不空如來藏為寶處一切寶類恒沙功德皆寶類一切寶種佛性為寶種上皆約本有次四約修成我知淨一切寶以淨戒頭陀等為能淨鑽一切寶以緣起智為能鑽出一切寶以發一切智心為出因作一切寶聽聞為能作後四為寶用我知一切寶器三乘等器智慧有殊一切寶用照理斷惑所用各別一切寶境界所緣境界萬品階差一切寶光明破愚顯明各各不等二即生死中瞋貪癡之三毒我知一切龍宮處一切夜叉宮處一切部多宮處部多此云自生亦如夜叉但不從父母生故喻多癡皆善迴避免其諸難三知心識相亦善別知漩澓淺深波濤遠近水色好惡種種不同色無色等依識心定劫數淺深七識波浪染習遠近隨善惡緣心水色異四即能知時亦善別知日月星宿運行度數晝夜晨晡漏延促謂機之生熟如是時中宜修定慧等五即知萬行不同亦知其船鐵木堅脆有方便為堅無方便為脆機關澀滑曾修為滑不曾則澀水之大小謂生死有邊與無邊風之逆順八風之中四順四逆又謂修行有住與無住故如是一切安危之相無不明了可行則行可止則止若開前段第三第五各有三事則具十種二彰化成益善男子我以成就如是智慧至普順一切眾生心海既列十海則知前海準此應思前四自利後六利他四謙己推勝善男子我唯得此大悲幢行至能知能說彼功德行五指示後友善男子於此南方有城名可樂由等佛迴向不見美惡皆得清淨歡喜悅樂故中有長者名無上勝以得勝通無過上故等於諸佛更無勝故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至心無厭足辭退而去第三無上勝長者寄等一切佛迴向六初依教趣求爾時善財童子起大慈至漸次經歷到彼城內二見敬諮問二初見見無上勝在其城東啟明佛日故大莊嚴幢無憂林中同佛迴向無憎愛故無量商人百千居士之所圍繞佛為商主菩薩為商人法財外益功歸己故理斷人間種種事務至住菩薩正念增菩薩樂欲二設敬爾時善財童子觀彼長者至頂禮其足良久乃起二諮問白言聖者我是善財我是善財自稱名者謂聲名久聞表重法之器冀有聞故我專尋求菩薩之行至能得一切如來智慧二稱讚授法二初讚時彼長者告善財言至發阿耨多羅三藐三菩提心二授法二初標名體善男子我成就至一切處至無依無作神通之力由無作無依故能徧至徧至是用廣無依是體勝無依者不依他故無作者離加行故二徵釋業用二初徵善男子云何為至一切處菩薩行門二釋明至一切處廣說法故文二初舉三千善男子我於此三千至我亦為其說超勝法二類顯十方如於此三千大千世界至我為眾生說如是法四謙己推勝善男子我唯知此至一切處至無依無作神通之力加清淨法門者徧至本為說法故即前所說如諸菩薩摩訶薩具足一切至能知能說彼功德行五指示後友善男子於此南方有一國土名曰輸那此云勇猛勇猛之力能使善根無不至故又以十度明義義當進故其國有城名迦陵迦林以義翻為相鬬戰時謂因鬬勝而立城故表此迴向願以信解大威力故廣大智慧無障礙故令修善根無所不至義同戰時有比丘尼純淨之慈令善徧故名師子嚬申舒展自在無不至故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去
