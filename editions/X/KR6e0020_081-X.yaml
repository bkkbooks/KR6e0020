body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經二別答出現九門先明身者後八依故長行文二初標告佛子諸菩薩摩訶薩應云何見如來應正等覺身二別釋其相文三初就法總明次約喻別顯後就法總結然總中五徧通向下喻中十身結中十句別結十喻同前出現今初就法總明文有四節佛子諸菩薩摩訶薩應於無量見如來身先總教廣見何以故次徵其所由諸菩薩摩訶薩不應於一法至一眾生見於如來三反釋所以總舉五法法是所知法界及調伏法事是調伏眾生行事晉經名行身即是正國土是依生是所化應徧一切處見於如來四順以結酬應翻上五成五無量界身為能徧四為所徧一徧法界二徧調伏界三徧調伏加行界四徧世界五徧眾生界唯有五界非是略也二約喻別顯明如來出現有十種身一周徧十方身二無著無礙身三普入成益身四平等隨應身五無生潛益身六圓迴等住身七無心普應身八窮盡後際身九嚴剎益生身十嚴好滿願身此即八地後十身也而為次不同一法身二智身三威勢四菩提五莊嚴六意生七化八力持九福德十願四是菩提者初成先照是故偈云日光出現五莊嚴者一一毛孔隨好光明所莊嚴故餘文並顯顯此十身舉十喻況一一喻中文各有三謂喻合結今初虗空周徧喻況周徧十方身故下結云以其心無量徧十方故文三初喻佛子譬如虗空徧至一切色非色處非至非不至上直示下徵釋何以故徵云至不至別何得俱耶虗空無身故以一無身釋上二義由無身故無可得至亦以無故無所不至如色中空空若有身身即質聚便礙於色如鐵入水水不入鐵今由無身故能徧入二合如來身亦如是徧一切處至何以故如來身無身故合準喻知此以事空以況理空理空即是法身故經偈云佛以法為身清淨如虗空故為眾生故示現其身即釋外疑三結佛子是為如來身第一相諸菩薩摩訶薩應如是見二空無分別喻況無著無礙身故下結云所行無礙如虗空故文三初喻復次佛子譬如虗空至無有分別亦無戲論空無分別不礙顯色智無分別不礙利生二合如來身亦復如是至一切戲論皆永斷故三結佛子是為如來身第二相諸菩薩摩訶薩應如是見三日光饒益喻喻普入成益身普入法界故初喻復次佛子譬如日出於閻浮提無量眾生皆得饒益上總下別所謂破闇作明變濕令燥至行者見道居者辦業後釋成何以故日輪普放無量光故二合佛子如來智日亦復如是以無量事普益眾生上總下別別有十種益合前八句所謂滅惡生善破愚為智初之二句合初二句世出世間二相異故大慈救護大悲度脫三四流之苦與出世之樂拯二乘沈定水之苦與菩提之樂皆合變濕令燥之義令其增長根力覺分四即道品通長三乘草木令生深信捨離濁心五信合二義一成上義信能增長一切法故二合成熟信能必到如來地故令得見聞不壞因果令得天眼見歿生處六七二句合前廓徹虗空六得見聞四諦因果智七得三明十力智如空有日廓淨照徹故令心無礙不壞善根八有二義令心無礙成上徹空不壞善根成下蓮華如赤蓮華不遇日光翳死無疑三乘善根若遇智日則便不壞令智修明開敷覺華九正合開華上已開者合其不壞今未開者令得開故令其發心成就本行十合後二句發菩提心即見大道成就本行是辦家業後釋成何以故如來廣大智慧日身放無量光普照耀故三結佛子是為如來身第三相諸菩薩摩訶薩應如是見四日光等照喻平等隨應身由住真際故無私平等文三初正喻二初喻復次佛子譬如日出至照一切須彌山等諸大山王喻菩薩十大山王表十地故次照黑山黑山喻緣覺以無法空之慧光故不能出生諸功德故次照高原高原喻聲聞不生佛法蓮華故然後普照一切大地大地一種通含三聚取於決定能生之處喻正定聚得緣方生喻不定聚砂鹵等地喻邪定聚然亦不捨故皆等照日不作念我先照此至有高下故照有先後二合如來應正等覺亦復如是至照無礙無障無所分別二釋疑佛子譬如日月隨時至智慧光明種種有異疑云日月光明是一佛智萬殊豈為同喻釋云豈不向說但隨山地有其高下耶故知但隨眾生智慧高下不同佛無私智無若干也未違前喻又既約機說異則照高未能兼下照下而猶照高又若捨化先捨於小次捨於中唯菩薩高山盡日蒙照三結佛子是為如來身第四相諸菩薩摩訶薩應如是見五日益生盲喻喻佛無生潛益身文三初喻復次佛子譬如日出至令身調適離眾患故有目者覩非是獨為生盲不見亦未曾滅以潛益故二合二初略如來智日亦復如是至不見諸佛智慧日輪略中五事皆合於盲而無信為總故云無信眼故此即涅槃闡提三罪無信斷善即一闡提無解毀見即謗方等毀戒邪命即犯四重作五逆罪雖不見佛智慧日輪至未來苦因皆消滅故無解等四至惡猶有佛性亦為饒益令離苦集二廣顯二初能益光二初列十光佛子如來有光明名積集一切功德初三句成就二種莊嚴上一福嚴下二慧嚴有光明名普照一切普照事有光明名清淨自在照照淨理次三成三慧有光明名出大妙音至普解一切語言法令他歡喜此二成聞慧有光明名示現永斷一切疑自在境界此一成思修後四成四智有光明名無住智自在普照大圓鏡智無住普照故有光明名永斷一切戲論自在智平等性智絕戲論故有光明名隨所應出妙音聲妙觀察智隨應演故有光明名出清淨自在音莊嚴國土成熟眾生成所作智嚴土化生二結數分齊佛子如來一一毛孔放如是等千種光明以日有千光故結云千實乃無數五百光明普照下方五倍自分行五百光明普照上方五位勝進行種種剎中種種佛所諸菩薩眾二所益眾四初益菩薩其菩薩等見此光明至十地十智皆悉清淨有二種益上益圓機頓證佛境下益權機令熟權趣實彼諸菩薩先所成就諸處諸地處謂五眼等地謂種性地見彼光明轉更清淨一切善根皆悉成熟趣一切智二益二乘住二乘者滅一切垢三益生盲其餘一分生盲眾生至柔輭調伏堪修念智四光益惡趣六初拔苦與樂地獄餓鬼畜生諸趣至命終皆生天上人間二因起邪見佛子彼諸眾生不覺不知至我是梵天我是梵化三慈音示正是時如來住普自在三昧至皆是如來威神之力四迴邪報恩彼諸眾生聞是語已至此諸眾生得淨眼故五佛與授記如來與彼授阿耨多羅三藐三菩提記六結光利益佛子如來智日如是利益至令得善根具足成熟此中諸益多同隨好三結佛子是為如來身第五相諸菩薩摩訶薩應如是見第六月光奇特喻喻佛圓迴等住身謂等住三世無增減故文三初喻復次佛子譬如月輪至無有分別無有戲論二合佛子如來身月亦復如是至聲聞獨覺學無學眾一圓智映二乘隨其所宜示現壽命脩短不同而如來身無有增減二常身示延促一切世界淨心眾生菩提器中影無不現三由其機器所見有無菩提器者堪受菩提之人覩意生身若心海澄清妄念都寂則真見佛矣一切眾生有瞻對者至所作利益皆得究竟四所見無向背初及後二皆圓迴義三結佛子是為如來身第六相諸菩薩摩訶薩應如是見七梵王普現喻喻佛無心普應身不分而徧文三初喻復次佛子譬如三千大千至亦不分身無種種身二合佛子諸佛如來亦復如是至亦不作念現若干身三結佛子是為如來身第七相諸菩薩摩訶薩應如是見八醫王延壽喻喻佛窮盡後際身初喻二初彰其現德復次佛子譬如醫王至眾生見者病無不愈二呪力持身彼大醫王知命將𣧩至凡所療治悉得除差二合二初合現德佛子如來應正等覺至鍊治法藥已得成就合用藥無不盡修學一切方便善巧大明呪力皆到彼岸合呪力為方便善能除滅一切眾生諸煩惱病合見者病愈二合呪力持身及住壽命經無量劫至諸煩惱病悉得消滅前呪藥持住多劫故略不重明藥呪能持三結佛子是為如來身第八相諸菩薩摩訶薩應如是見九摩尼利物喻喻佛嚴利益生身雨寶離貧即嚴剎故各有體用文三初喻復次佛子譬如大海至令諸眾生離苦調適二合佛子諸如來身亦復如是至一切眾生作大佛事三結佛子是為如來身第九相諸菩薩摩訶薩應如是見十寶王滿願喻喻佛相嚴滿願身文三初喻復次佛子譬如大海至非少福眾生所能得見二合二初正合如來身如意寶王亦復如是至悉令得見所願皆滿二釋疑佛子佛身非是少福眾生所能得見初雖合喻已是釋疑謂有疑云若念皆見今何不見是故經云少福不見唯除如來自在神力所應調伏次疑云亦有貧下薄福之人何以得見故經釋云除可調者若有眾生因見佛身至乃令得見如來身耳三結佛子是為如來身第十相諸菩薩摩訶薩應如是見三就法總結以其心無量徧十方故至莊嚴一一佛身故十句次第結前十身其有難者前已會釋二偈頌有二十偈次第頌前長行十喻喻各二偈皆前偈喻後偈法合喻各二偈爾時普賢菩薩摩訶薩欲重明此義而說頌言譬如虗空徧十方至非是善逝心棄捨此下人第五十一經三出現語業長行有三初標佛子菩薩摩訶薩應云何知如來應正等覺音聲二釋三初就法略說佛子菩薩摩訶薩昔人亦以初十入於中十為百後十通前則為千數此亦可通今更一解後結則容通結中十中十則別喻初十但小不次耳今初略說圓音之義略啟四門一敘昔二辨違三會通四正釋前三非要廣在別章但正釋文自含眾妙四釋文者文有十音以顯無盡各上向標名下句釋相應知如來音聲徧至普徧無量諸音聲故一普徧者即隨類音然有二義一約體廣無聲不至故云普徧無量音聲斯則人天等異萬類齊聞上云眾生隨類各得解二者隨前一一之音皆能獨徧如目連不究其邊應知如來音聲隨其心樂皆令歡喜說法明了故二隨樂音謂趣舉一一類音能隨樂欲說種種法上經云如來於一語言中演說無邊契經海又云佛以一妙音周聞十方國眾音悉具足法雨皆充徧此文通證前之二義應知如來音聲隨其信解皆令歡喜心得清涼故三隨根解音謂即上說中隨說一法大小各聞故云隨其信解故寶積云佛以一音演說法眾生各各隨所解應知如來音聲化不失時所應聞者無不聞故四隨時音謂即上大小之法令聞不聞皆自在故云不失時亦兼隨聞一法欣憂不同寶積云或有恐畏或歡喜上四多約即體之用是圓音義後六多約即用之體顯一音義應知如來音聲無生滅如呼響故五外隨緣叩我無生滅應知如來音聲無主修習一切業所起故六內集緣成何有主宰應知如來音聲甚深難可度量故七甚深者欲言其一則萬類殊應欲言其異則一體無生又欲言其一隨一音中能具多音故上文云一切眾生語言法一言演說盡無餘欲言其異即上多音唯宜聞一故下喻云譬如天鼓發種種音懈怠諸天唯聞無常學悟之音故甚深也應知如來音聲無邪曲法界所生故八純稱法界應知如來音聲無斷絕普入法界故九橫入無斷應知如來音聲無變易至於究竟故十豎歸一極此十圓融一味是如來圓音是知或謂無聲隨叩發響或謂如來唯一直聲無宮商等異皆大地之一塵耳二約喻廣說三初結前生後佛子菩薩摩訶薩應知如來音聲收上十聲要不出三約相則廣無量約體則無主宰約用則有顯示今並雙非以顯中道非量莫窮其邊故非量非無量隨機隨時有聞不聞故非無量非主多緣集故非有主非無主純一法界生故非無主非示當體無生故無能示非無示巧顯義理故非無示更以四句明體用無礙謂一以用從體由體無不在故能令上十類皆徧一切非唯徧聲亦徧一切時處眾生如來法界等雖復於色等皆徧恒不雜亂若不等徧則音非圓若由等徧失其音曲則圓非音今不壞曲而等徧不動徧而差韻方成圓音二以體從用其一一音皆具含真性三用即體故上十類聲皆不可得唯第一義永離所執故法螺常震妙音常寂名寂靜音如空谷響有而即虗若不即虗非但失於一音亦不能令圓融自在四體即用故寂而恒宣若天鼓無心而應一切長風隨竅萬吹不同若不徧同非但失於能圓亦非真一梵音隨緣自在名為如來圓音妙音非是心識思量境界三徵釋所以何以故徵意云前言無量等今何雙非三舉喻廣釋其大意云性相無礙體用相即約法難顯寄喻以明有十大喻即為十段段各有三今初劫盡唱聲喻喻前第六無主文中分三初喻佛子譬如世界將欲壞時至法爾而出四種音聲言法爾者俱舍第二云生無色界有二種因一者因力謂由近習及數習故二者業力謂上界後報業果欲至故若生色界則有三因謂加法爾力但器壞時法爾有聲其四者何一曰汝等當知至是為四然四種音非是一時初二火劫將壞欲界及初禪時三即水災壞二禪時四即風災壞三禪時佛子此諸音聲無主無作至諸善業力之所出生四聲各別故非無主但從緣生故非有主二合佛子如來音聲亦復如是至而能利益無量眾生明佛欲壞生死世間亦有四聲說五乘法初一人天合上火災後三三乘如次合前三結佛子是為如來音聲第一相至應如是知二響聲隨緣喻復次佛子譬如呼響至而能隨逐一切語言喻上第五無生次合如來音聲亦復如是至無言無示不可宣說後結佛子是為如來音聲第二相至應如是知三天鼓開覺喻喻合各三初能開覺復次佛子譬如諸天至墯諸惡趣後悔無及喻第九無斷絕聲徧入法界化無斷故二開覺益放逸諸天聞此音已至詣天王所求法行道三結用歸體佛子彼天鼓音無主無作至而能利益無量眾生二合三初合能開覺當知如來亦復如是至出於無量妙法音聲上總下別別有十一聲義分四節而有二意一者初二通五乘所謂無著聲不放逸聲次六通三乘無常聲苦聲無我聲不淨聲寂滅聲涅槃聲次一通於第一第二乘無有量自然智聲後二唯大乘不可壞菩薩行聲至一切處如來無功用智地聲二者初一節配人天三節配三乘以此音聲徧法界中而開悟之二合開覺益無數眾生聞是音已至或習菩薩無上大乘三合結用歸體而如來音不住方所無有言說由不住方等故上能普徧是以莊嚴論云若佛音聲是有法非非法者不能徧至十方反此故能三結佛子是為如來音聲第三相至應如是知四天女妙聲喻復次佛子譬如自在天王至出於如是無量音聲喻上第三隨信解聲多音隨樂故次合當知如來亦復如是至皆悉徧至悉令得解後結佛子是為如來音聲第四相至應如是知五梵聲及眾喻復次佛子譬如大梵天王至大梵天王獨與我語喻化不失時熟者必聞即以根熟為所化眾次合如來妙音亦復如是至而能成就一切事業後結是為如來音聲第五相諸菩薩摩訶薩應如是知六眾水一味喻復次佛子譬如眾水至水無念慮亦無分別喻無邪曲聲從法界生一體性故次合如來言音亦復如是至而無念慮亦無分別後結佛子是為如來音聲第六相至應如是知七降雨滋榮喻復次佛子譬如阿那婆達多至而能種種饒益眾生喻歡喜聲稱根增長故次合佛子如來應正等覺至而能饒益一切眾生離佛無聲不從外來離機無聲不從內出後結是為如來音聲第七相諸菩薩摩訶薩應如是知八漸降成熟喻復次佛子譬如摩那斯龍王至降微細雨普潤大地喻無變聲以皆至究竟故上先照高山以顯頓圓此先小益即是漸圓次合佛子如來應正等覺亦復如是將降法雨思欲說一乘法也未便即降恐破法墯惡道故先興法雲是說方便方便含實如雲含水成熟眾生為欲令其至一切智智無上法昧後結佛子是為如來音聲第八相至應知是如九降霔難思喻復次佛子譬如海中有大龍王至百千無量差別喻上甚深聲雖多差別皆於甚深法界之所流故次合如來應正等覺亦復如是至出種種言皆令歡喜後結佛子是為如來音聲第九相至應如是知
