body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經三明因深廣因深則果厚故文分為三初問答審見爾時普賢菩薩摩訶薩至唯是如來之所能知二顯因深遠三初別明求菩提行二初順顯所行普賢告言善男子至修行佛法護持正教二離過成德善男子我於爾所劫海中至助道之法大菩提心二通明悲智行善男子我莊嚴佛土至劫海可盡此無有盡二別明求法行二初反顯無不能捨善男子我法海中至一切所有而求得者一文尚無所不捨況全部耶以一文即一切之一如海一滴故二顯求所為結說無盡善男子我所求法至佛剎微塵數劫海說不可盡三結因成果二初結因文有十句是故善男子我以如是助道至大志樂力修功德力上四緣因如實思惟一切法力智慧眼力此二了因佛威神力大慈悲力淨神通力善知識力故後四通於緣了以有成果之功故皆云力也二成果得此究竟三世平等清淨法身由了因故得法身果復得清淨無上色身由緣因故得色身果超諸世間隨諸眾生至令其見者靡不欣樂四觀用無涯三初舉益勸觀三初標善男子汝且觀我如是色身二釋二初明難見聞我此色身無邊劫海至千億那由他劫難見難聞二見聞皆益三初不退菩提益善男子若有眾生至見聞我者皆亦如是二善根成熟益或有眾生一日一夜至或生歡喜皆得成熟三總結多門皆不退成熟善男子我以如是等至三藐三菩提得不退轉上多門皆不退下種種皆成熟善男子若有眾生至必得生我清淨身中淨剎可生身云何生此有二義一約法性身剎與剎為體名清淨剎與身為體名清淨身從能依有殊欲顯所依體一故言生身二約相用淨剎是所依之剎淨身則身內之剎欲顯身土互融故言生淨身耳三總結善男子汝應觀我此清淨身三觀見奇特三初見毛內含三世間爾時善財童子觀普賢至如是等事各各不同二見普賢身徧諸剎中出生大用又見普賢於一一世界海中至多羅三藐三菩提三自見己身等普賢化時善財童子又見自身至諸世界中教化眾生三校量顯勝三初校量善根又善財童子親近佛剎至筭數譬喻亦不能及二校量所入剎海是善財童子從初發心至一切毛孔悉亦如是三雙結上二超勝之相二初別明橫豎深廣善財童子於普賢菩薩毛孔剎中於中有三世間行一步過不可說不可說佛剎微塵數世界顯橫廣如是而行盡未來劫明豎窮猶不能知顯其深遠一毛孔中剎海次第剎海藏藏約包含剎海差別剎海普入普入約廣徧剎海成剎海壞剎海莊嚴所有邊際上器世間下智正覺世間亦不能知佛海次第至集菩薩眾海散所有邊際後眾生世間亦不能知入眾生界至如是等海所有邊際二總結平等周徧善財童子於普賢菩薩至不於此剎沒於彼剎現不於此沒彼現者以沒現相如法性故以彼此相相即故也念念周徧無邊剎海至令向阿耨多羅三藐三菩提二位滿齊佛當是之時善財童子至得普賢菩薩諸行願海上句明自得餘皆等上與普賢等等因圓與諸佛等等果滿此下別顯等相一身充滿一切世界至解脫自在悉皆同等此即義當覺因位既滿更無所修故但說等不辨更求此則一生頓成行布亦足非唯但約理觀初後圓融二聞佛勝德難思前長行但顯因圓此偈頌方陳果用非頌前文然有二意一對普賢普賢意云上來見我難思之德尚是因位今示汝果尤更甚深二對善財善財等佛但是因圓以果海離言故不說成佛今寄現佛之德以顯善財得果之相故長行偈文因果綺互文中有三初有四頌標舉佛德誡聽許說爾時普賢菩薩摩訶薩即說頌言汝等應除諸惑垢至未曾分別起想念二長行舉眾渴仰欲聞爾時諸菩薩聞此說已至作是念已深生渴仰三廣陳德相令眾求滿二初長行重誡許說分齊爾時普賢菩薩至今我欲說佛功德海一滴之相二偈頌廣顯佛德難思九十五偈分之為二初九十三偈別歎佛德於中前八十偈法說後十三偈喻明然通讚毗盧遮那十身圓滿二十一種殊勝功德實即應分二十一段且為十九後三合故初有二偈即於所知一向無障礙轉功德即說頌言佛智廣大同虗空至念念示現無邊事謂佛無障礙智於一切事品類差別無著無礙故二有一偈明於有無無二相真如最清淨能入功德隨眾生心種種行至而佛本來無動念謂了真如無二故無動念三有三偈即無功用佛事不息休功德或有處處見佛坐至心不淨故不聞者謂住佛無住處作佛事不休息故云或見等四有十五偈即於法身中所依意樂作事無差別功德謂由諸佛所依智同益眾生意樂同報化作用同故前經云得佛平等亦同攝論四種意趣中平等意趣故此廣列諸佛皆互相徧此釋已妙今更以文理證此諸佛皆遮那之身謂此文言此三千界阿閦在中阿閦如來本在東方今云在此明不異此又無量壽佛月覺如來皆徧十方豈容隔此又皆言或見則知一佛隨見不同若言別讚餘佛直言阿閦在此何成讚德況華藏剎海皆遮那化境無量壽等未出剎種之中豈非是此佛耶法華央堀並說十方分身故知法藏別緣十六王子皆方便說以理推之皆是如來海印所現何緣不說自所現佛而說他耶故知賢首佛等皆本師矣然此段文亦兼顯第十七隨其勝解示現差別佛土功德文中有三初八偈主伴嚴土攝生同或見清淨大菩薩至說法除滅眾生翳二有四頌明微細含容轉法同一一毛端不可說至毗盧遮那轉法輪三有三偈總攝多門結前生後或見世界不清淨至我說少分汝當聽五有三偈即修一切障對治功德或見釋迦成佛道至隨眾生心皆示現謂一切時常修覺慧治六蔽等故既云已經多劫則不定始成六有三偈即降伏一切外道功德或見究竟波羅蜜至猶如幻師現眾像初二即教證二道後一現所摧同類之身七即生在世間不為世法所礙功德於中有四初八相現世無礙或現兜率始降神至或見正修諸妙行次三處天宮殿無礙或見如來清淨月至莫不於中現其像次六隨世巧化無礙於彼然燈世尊所至如是展轉陪過此四有二偈結歎無礙之智能徧隨機佛智通達淨無礙至隨眾生心皆示現八安立正法功德於中亦四初明立三乘法輪如來住於無上道至不使眾生有驚怖末句之中兼顯業用二明立六度道品對治法如來普演廣大音至無量方便諸法門三明一音隨類聞法不同乃至無量龍神八部人非人至悉是如來方便力四有四偈明平等語業而應一切涅槃寂靜未曾異至普照世界除煩惱九有三偈明其授記功德具足清淨功德智至隨所應化示佛道記別過未如現在故云悉明見十有四偈明示現受用變化身功德究竟虗空十方界至現斯苦行摧異道十一有二偈明斷一切疑功德或持彼戒為世師至方便皆令住佛道謂於一切境善決定故能斷他疑十二令入種種行功德或現上服以嚴身至然後捨去無知者謂徧了一切有情性行隨根令八故十三有一偈即當來生妙智功德如來無礙智所見至種種教化令成就謂佛知久遠故十四有五偈隨其勝解示現功德譬如幻師善幻術至靡不於中現其影謂隨解現身故十五有三偈即無量所依調伏有情加行功德譬如淨日放千光至普使除滅三毒火意云佛智為無量菩薩謂伏眾生加行之所依故十六有二偈明平等法身波羅蜜多成滿功德如來清淨妙法身至當於佛體如是觀然同攝論法身具五種相初句白法為相以是極果圓滿自在故次二句不思議相次一是無二相次一無依相次句常住相次句二喻者空𦘕喻無依夢喻非有無二相餘不可喻或略不喻十七有一偈明隨勝解示現差別佛土功德三界有無一切法至無有依空而住者既隨解而現故不可喻此偈亦總拂前喻如山林等必不依空有等必然不能喻佛十八一偈明三種佛身方處無分限功德大海摩尼無量色至隨應而現無所住十九有一偈攝三種功德虗空真如及實際至可以顯示於如來同法性等即窮生死際常現利樂一切有情功德等虗空即無盡功德等實際即究竟功德以不如實際之際窮未來際故二有二偈結德無盡勸信勿疑亦是別顯無盡功德雖是總結即當別文初一結德剎塵心念可數知至無能盡說佛功德後一勸信若有聞斯功德海至慎勿於此懷疑念古德亦有將此二偈為一部流通已如前說四謙讚迴向法性深廣難思議至普令含識證菩提
