body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經文殊言說答四初歎眾希奇爾時文殊師利菩薩至此諸菩薩甚為希有前眾疑問佛令文殊答者以文殊示居此土生有十徵來自他方體含萬德降魔制外通辯難思化滿塵方用周三際道成先劫已稱龍種尊王現證菩提復曰摩尼寶積實為三世佛母豈獨釋迦之師影響而來一切咸見故其說也何不待請敬同佛故何不待告承佛神力佛意許故眾既念請佛方現相非夫尊極大士安得理契潛通故上以光示普賢此乃冥加妙德若爾普賢云何定後更請表說所信甚深細故何不入定以果從因同於信會故餘如上說何故無加以無定故又承佛神力是冥加故歎眾希有者略有五義感應懸隔難一遇故德行內充總稱歎故以名表法甚希有故創起信行未曾有故此一眾會即是等空法界會故二牒問總歎諸佛子佛國土不可思議至三菩提皆不可思議脫於剎體佛出現者即前威德也阿云無也耨多羅上也三者正也藐者等也又三徧也菩提覺也謂道不可加曰無上也無邪委知為正徧也三徵歎總釋何以故徵上難思言也下釋云諸佛子十方世界一切諸佛知諸眾生樂欲不同能感之機差別無邊如來普應周于法界廣難思也結文具顯隨其所應說法調伏又隨宜說法意趣難思如是乃至等法界虗空界又等法界者舉一說法等餘多門門不可盡量等法界法門難思四廣顯難思二初總顯多端諸佛子如來於此娑婆世界諸四天下先舉娑婆為首略顯十種差別多端準下結通實通法界十句之中不出三業種種身一身為總相現十法界不同故云種種種種名二名以召實次下廣辨種種色相三金銀等色不同三十二相等異種種脩短四形有長短三尺丈六乃至無邊種種壽量五壽命限量或無量劫或不滿百年下至朝現暮寂種種處所六處謂化處染淨等殊種種諸根七根謂眼等隨感現異種種生處八生處有剎利等別種種語業九依語之用隨方言音施設非一種種觀察十周旋顧以應羣機又觀存亡安危可否智照諸境示有多端令諸眾生各別知見結意云今諸眾生各稱己分而自知見得調伏耳二隨門別顯文分為三初終此品辨身名差別答上佛住之問近廣種種身等八句以色相等皆屬身故二四諦品辨言教徧周答佛所說法問近廣種種語業三光明覺品明光輪窮照答上威德法性菩提三問近廣種種觀察其五句依報但有現相答廣在前會故今初廣上名者然聖人無名為物立稱若就德以立德無邊涯若隨機立名等眾生界雖復多種皆為隨宜生善滅惡見理而立海印頓現不應生著也文四一娑婆之內自有百億三初此四洲文皆三節諸佛子如來於此四天下中標處舉四洲者昔云意取閻浮言總意別餘三天下佛不出故然雖不出除北俱盧餘容有住下並準之次列名或名一切義成即悉達也無事不成就故或名圓滿月惑斷智圓恩蔭清涼或名師子吼名決定說或名釋迦牟尼釋迦云能仁能仁種故牟尼云寂默契寂理故或名第七仙七佛之末故若取賢劫但當第四仙即喻也無欲染故或名毗盧遮那廣如前釋或名瞿曇氏唯約姓也此云地主以從劫初代代相承為轉輪王故然上云釋迦乃是族望此即姓望故智論第二云釋迦牟尼姓瞿曇故佛名經亦然或名大沙門此云息惡無惡不息故復稱大或名最勝聖中極故德無加故或名導師引導眾生離險難故於生死海示眾寶故然名含多義略釋此十恐文繁博餘但隨難解之如是等其數十千令諸眾生各別知見總結二四洲之隣十界即為十段初東方標處列名總結例上諸佛子此四天下東次有世界名為善護四洲之通稱也他皆倣此如來於彼或名金剛或名斷言論證離言故無能說過故如是等其數十千令諸眾生各別知見二南方諸佛子此四天下南至如來於彼或名帝釋為天人主能稱物心或名寶稱或名離垢至令諸眾生各別知見三西方諸佛子此四天下西至如來於彼或名水天水利萬物天光淨故或名喜見或名最勝王至令諸眾生各別知見四北方諸佛子此四天下北至或名瑿羅䟦那具云瑿溼弗羅䟦那瑿溼弗自在也羅䟦那者聲也即圓音自在耳或名最上施或名苦行至令諸眾生各別知見五東北方諸佛子此四天下東北至令諸眾生各別知見六東南方諸佛子此四天下東南至令諸眾生各別知見七西南方諸佛子此四天下西南至令諸眾生各別知見八西北方諸佛子此四天下西北至令諸眾生各別知見九下方諸佛子此四天下次下方至令諸眾生各別知見十上方諸佛子此四天下次上方至或名如盛火盛火焚薪不擇林木佛智利物無揀賢愚或名持戒或名一道至令諸眾生各別知見問餘聖教說大輪圍內平布百億上即諸天下安地獄如何此說上下皆有四洲答此教所說事隨理融隨說法處即是當中縱極上際傍至輪圍亦有十方互為主伴以融為眷屬本數非多十方界融亦準於此因此略說娑婆融通改非改相略有其五一約事常定如小乘說二隨心見異若身子梵王三就佛而言本非淨穢四隨法𢌞轉如上主伴互為五潛入微塵如前會說若約通論諸餘淨土更有五義謂諸剎相入義相即義一具一切義廣陿自在義帝網重疊義並如前後諸文所說三總結娑婆諸佛子此娑婆世界至令諸眾生各別知見二娑婆隣近即百億之外文有十方初東方標處列名總結一一倣前諸佛子此娑婆世界東至或名無等智列名唯九者勘晉經開曉意下闕一聞慧如是等百億萬種種名號令諸眾生各別知見二南方諸佛子此娑婆世界南至或名本性或名勤意列名唯二新舊二經俱闕八名蓋是梵本脫漏準前後例決定不應獨此便略如是等百億萬種種名號令諸眾生各別知見三西方諸佛子此娑婆世界西至令諸眾生各別知見四北方諸佛子此娑婆世界北至令諸眾生各別知見五東北方諸佛子此娑婆世界東北方至令諸眾生各別知見六東南方諸佛子此娑婆世界東南方至令諸眾生各別知見七西南方諸佛子此娑婆世界西南方至令諸眾生各別知見八西北方諸佛子此娑婆世界西北方至名專念法或名網藏名有十一者獨此有餘不成文體此中專念法應即是前所脫聞慧亦是梵本之漏注脫之者誤安貝葉如是等百億萬種種名號令諸眾生各別知見九下方諸佛子此娑婆世界次下方至或名帝釋弓如來念定之弓以明利箭能射業惑阿脩羅故然舊經云法命主意取帝釋以法教命為天主故今云其弓但一事耳若作宮室字以處取人大同晉本或名無常所或名覺悟本至令諸眾生各別知見十上方諸佛子此娑婆世界次上方至令諸眾生各別知見三類通一切謂盡十方諸佛子如娑婆世界至四維上下亦復如是準四諦品更有舉此例餘十方亦如娑婆互為主伴四釋差別所由如世尊昔為菩薩時至如是知見而為說法由隨物故此有二意一自既由於差別名言等而得成就今還倣古以差別熟他二昔菩薩時隨機調物今時出世稱本立名如昔教眾生令空妄境今成正覺為立超境界名他皆倣此而得成熟之言通自他也四聖諦品第八釋此一品五門分別初來意者此品廣前種種語業即答前佛說法問亦遠答前會佛演說海之一問故既知佛可歸次知法可仰上名隨物立今法逐機差故次來也二釋名言四聖諦者聖者正也無漏正法得在心故諦有二義一者諦實二者審諦言諦實者此約境辨謂如所說相不捨離故真實故決定故謂世出世二種因果必無虗妄不可差失言審諦者此就智明聖智觀彼審不虗故凡夫雖有苦集而不審實不得稱諦無倒聖智審知境故故名聖諦故瑜伽九十五云由二緣故名為諦一法性故二勝解故愚夫有初無後聖具二故徧說聖諦四謂苦集滅道總云四聖諦帶數釋也性相云何逼迫名苦即有漏色心增長名集即業煩惱寂靜名滅謂即涅槃出離名道謂止觀等此約相說通大小乘智論云小乘三是有相滅是無相大乘四諦皆是無相涅槃云解苦無苦名苦聖諦謂達四緣生故空則超筌悟旨成大又涅槃云凡夫有苦而無諦二乘有苦有諦而無真實菩薩無苦有諦而有真實謂若苦即諦三塗之苦豈即諦也二乘雖審知之而不達法空不見真實又二乘雖知苦相不知無量相故大經云苦有無量相非諸聲聞緣覺所知瑜伽說苦有一百一十然此經中雖彰名異即表義殊以名必召實故是無量四諦義也約一界一諦即有十千娑婆四諦有四百億十千名義而文義包博言含性相文究此四非唯但空便為真實今了陰入皆如無苦可捨無明塵勞即是菩提無集可斷生死即涅槃無滅可證邊邪皆中正無道可修無苦無集即無世間無滅無道即無出世間不取不捨同一實諦故斯一品有作無作有量無量皆在其中準第五地中復以十重觀察至下當明三宗趣者以無邊諦海隨根隨義立名不同徧空世界以此為宗務在益物調生為趣又上二皆宗發生淨信為趣四解妨難問既彰佛語業答說法問佛所說法多門何以唯陳四諦答以名雖在小義通大小事理具足謂苦集二諦是世間因果所知所斷無改易故滅道二諦出世因果所證所修事決定故知斷證修能運眾生到彼岸故世界有異此獨無改況無量無作何義不收是故約此以顯差別又為破計引機故謂演彼聲聞四諦局法令亡所執引入一乘無邊諦海故約此辨何以四諦皆帶苦言謂苦滅聖諦等然謂生苦之集故云苦集盡苦之滅名為苦滅至苦滅之道名苦滅道不得單言苦道以道非生苦不同集故又非滅苦不同滅故能證滅苦故云苦滅道五正釋文一品分二初標告爾時文殊師利菩薩摩訶薩告諸菩薩言二正釋四初娑婆諦名二隣次十界三類通一切四主伴無窮然此望前品略於單說四洲就初二中一一方內文各有二一別別諦名二結數辨意然其立名或有因從果稱果藉因名約事約理或總或別如文當知初娑婆中列內四諦即為四別初苦聖諦諸佛子苦聖諦此娑婆世界中或名罪罪者摧也謂摧壞色心故或名迫逼不可意境逼迫身心此二總顯或名變異壞苦或名攀緣追求苦或名聚五盛陰苦或名刺從喻立名如刺未拔或名依根由苦能生一切惡也或名虗誑於下苦中能生樂想或名㿈瘡處此喻二苦有㿈瘡處性自是苦此如五陰苦若加手等觸苦上加苦是苦苦或名愚夫行行苦也愚人所行故如以睫毛置掌不覺若置眼內為苦不安愚夫不覺行苦如掌內之毛而復以苦反欲捨苦皆愚夫行也二集聖諦諸佛子苦集聖諦至或名繫縛或名滅壞初二通顯謂有業惑者繫縛三界滅壞善根或名愛著義或名妄覺念次二別顯煩惱或名趣入或名決定至或名隨行或名顛倒根餘多通業惑三滅聖諦諸佛子苦滅聖諦此娑婆世界中或名無諍煩惱名諍或名離塵或名寂靜至或名滅或名體真實真實者非唯惑滅而已實乃法身常住為滅諦之義故次云住自性也謂本來滅故或名住自性四道聖諦諸佛子苦滅道聖諦至或名仙人行或名十藏十藏謂信聞等如十藏品說二結數辨意諸佛子此娑婆世界至有如是等四百億十千名望前名號一四洲有十千今一四天下一諦亦有十千種名四諦歷於百億故有四百億箇十千隨眾生心悉令調伏顯差別之意也二辨隣次十方東方密訓二初列四初苦諦諸佛子此娑婆世界至或名分析悉無力推之於緣無實物也或名作所依或名極苦或名躁動或名形狀物有形皆苦故二集諦諸佛子所言苦集聖諦者至或名愛著或名病源病源者謂有攀緣故或名名數三滅諦諸佛子所言苦滅聖諦者至或名調伏或名一分惑由妄起故分數塵沙理不可分可稱一分或名無罪或名離貪或名決定四道諦諸佛子所言苦滅道聖諦者至或名猛將或名上行所之在滅或名超出或名有方便至或名最勝眼或名觀方觀方者謂觀四諦也更有四方如十定品二結諸佛子密訓世界至隨眾生心悉令調伏二南方最勝二初列四初苦諸佛子此娑婆世界所言苦聖諦者彼最勝世界中前名豐溢豐溢是正翻最勝乃義譯耳或名恐怖或名分段至或名妄分別或名有勢力生老病死猶四山臨人世雖賢豪力無與競二集諸佛子所言苦集聖諦者至或名仇對或名非己物己本性淨妄惑何預或名惡導引或名增黑闇或名壞善利三滅諸佛子所言苦滅聖諦者至或名饒益或名義中義事善有義滅理尤勝或名無量或名所應見至或名可同住或名無為四道諸佛子所言苦滅道聖諦者至或名能燒然以智慧火燒煩惱故成名最上品或名決定至或名解脫性或名能度脫二結諸佛子最勝世界說四聖諦至隨眾生心悉令調伏三西方離垢二初列四初苦諸佛子此娑婆世界至或名虗妄見或名無有數無有數者三際無涯故二集諸佛子所言苦集聖諦者至或名鄙賤或名增長從惑生惑業故或名重擔或名能生或名麤獷三滅諸佛子所言苦滅聖諦者至或名最勝根或名稱會以事之滅稱會理滅或名無資待或名滅惑至或名畢竟或名破印世之陰苦若蠟印印泥印壞文成此陰纔滅彼陰續生今云破印永不生也四道諸佛子所言苦滅道聖諦至或名諸有邊照實即生死可盡也故中論云真法及說者聽者難得故是故即生死非有邊無邊謂三事難得故非有邊難得者容有得義得則生死有邊或名受寄全業寄於集暫受還亡業寄於道永不可失或名作究竟或名淨分別二結諸佛子離垢世界說四聖諦至隨眾生心悉令調伏四北方豐溢二初列四初苦諸佛子此娑婆世界所言苦聖諦者彼豐溢世界中豐溢自南方界名前品此方名為豐樂梵云微部地田夷反豐樂得旨譯者不審二名相參耳或名愛染處或名險害根或名有海分二十五有各一分也或名積集成或名差別根至或名數所成數體即集集所成故二集諸佛子所言苦集聖諦者至或名無盡或名分數分數者無一理以貫之則惑業萬差矣或名不可愛或名能攫噬攫搏也噬齧也集之損害猶惡禽獸也或名麤鄙物或名愛著或名器或名動三滅諸佛子所言苦滅聖諦者至或名無所修修已極故或名無所見或名無所作至或名已除壞四道諸佛子所言苦滅道聖諦者至或名無量壽謂證滅永常今因標果稱或名善了知或名究竟道至或名無能勝二結諸佛子豐溢世界說四聖諦至隨眾生心悉令調伏五東北方攝取二初列四初苦諸佛子此娑婆世界至或名種種戲論或名地獄性未入忍來常有墯性或名非實義或名貪欲擔至或名根本空約性以說同淨名五受陰洞達空也二集諸佛子所言苦集聖諦者至或名速疾或名能執取由妄惑故愛見羅剎橫相執取或名想或名有果或名無可說或名無可取妄體本空故無可取故中論云虗誑妄取者是中何所取佛說如是法欲以示空義或名流轉三滅諸佛子所言苦滅聖諦者至或名遠惡或名出離四道諸佛子所言苦滅道聖諦至攝取世界中或名離言滅道俱名離言者滅性離言道令言離故或名無諍或名教導至或名勝智或名能了義二結諸佛子攝取世界說四聖諦至隨眾生心悉令調伏六東南方饒益二初列四初苦諸佛子此娑婆世界至或名不堅或名如賊五盛陰苦劫害我故或名老死或名愛所成至或名生長或名利刃二集諸佛子所言苦集聖諦者至或名退失或名無力於出生死無有力能善法治之不復相拒或名喪失或名乖違至或名取或名意欲三滅諸佛子所言苦滅聖諦者至或名根本或名捨因無為無因而體是果菩提之道望此亦因獨寂滅涅槃得稱果果故曰捨因或名無為或名無相續四道諸佛子所言苦滅道聖諦者至或名一切印無不審決故印義後說或名三昧藏或名得光明至或名不流轉根二結諸佛子饒益世界說四聖諦至隨眾生心悉令調伏七西南方鮮少二初列四初苦諸佛子此娑婆世界至或名繫縛處或名邪行體非正道是行性故或名隨受或名無慙恥至或名炬火性或名多憂惱二集諸佛子所言苦集聖諦者彼鮮少世界中或名廣地生大苦樹故或名能趣或名遠慧至或名著處或名宅主宅主即無明也或名連縛三滅諸佛子所言苦滅聖諦者至或名絕行處心路絕故或名不二四道諸佛子所言苦滅道聖諦者至或名廣大路先賢後聖游之而不厭故或名平等因或名淨方便或名最勝見二結諸佛子鮮少世界說四聖諦至隨眾生心悉令調伏八西北方歡喜二初列四初苦諸佛子此娑婆世界至或名惡舍宅或名苦惱性闕一者普譯少出生唐譯少失利二集諸佛子所言苦集聖諦者至或名非實法或名無底煩惱深故非習道學浮沉不已或名攝取或名離戒至或名陿劣見或名垢聚三滅諸佛子所言苦滅聖諦者至或名破依止身與煩惱互為依止展轉無窮唯證滅理方能永破或名不放逸或名真實至或名自在或名無生四道諸佛子所言苦滅道聖諦者至或名廣大性道名廣大無不在故或名分別盡或名神力道至或名攝解脫二結諸佛子歡喜世界說四聖諦至隨眾生心悉令調伏九下方關𨷲二初列四初苦諸佛子此娑婆世界至或名如坏器或名我所成我見有故或名諸趣身或名數流轉至或名無味或名來去二集諸佛子所言苦集聖諦者至或名受支或名我心即我見愛或名雜毒或名虗稱或名乖違或名熱惱或名驚駭三滅諸佛子所言苦滅聖諦者至或名廣大或名覺分所覺處故或名離染或名無障礙四道諸佛子所言苦滅道聖諦至或名究竟實或名入義能入滅諦第一義故或名性究竟或名淨現至或名救濟或名勝行二結諸佛子關𨷲世界說四聖諦至隨眾生心悉令調伏十上方振音二初列四初苦諸佛子此娑婆世界至彼振音世界中或名匿疵身為惑病所藏處故或名世間或名所依或名慠慢慢以生苦為業果取因名或名染著性性令染故如樂受壞苦誰謂苦耶或名駛流剎那性故即行苦也或名不可樂苦苦也或名覆藏藏苦因故樂藏壞苦故不苦不樂藏行苦故或名速滅流轉苦也或名難調誰不欲捨莫之能出不憚疲苦方能調之二集諸佛子所言苦集聖諦者至或名至後邊招果不斷受苦無窮或名共和合或名分別或名門入苦趣故或名飄動或名隱覆三滅諸佛子所言苦滅聖諦者至或名不可取取則不滅或名轉還或名離諍或名小小之則無內不容一物也或名大大之則無外法界性也或名善淨或名無盡或名廣博或名無等價四道諸佛子所言苦滅道聖諦者至或名難敵對有惑必破不為惑破猶明滅闇無闇不滅闇不滅明何能相敵或名無限義或名能入智至或名殊勝義二結諸佛子振音世界說四聖諦至隨眾生心悉令調伏三類通一切二初舉娑婆以類東方諸佛子如此娑婆世界中至隨眾生心悉令調伏二舉東方以類餘九如東方南西北方四維上下亦復如是四主伴無盡二初舉此例彼諸佛子如娑婆世界有如上所說十方世界謂娑婆為主有密訓等盡空世界皆為伴也二以彼例此彼一切世界亦各有如是至心之所樂令其調伏則知密訓等盡空世界為主攝伴亦爾則無盡無盡耳此猶約娑婆同類世界而說以結數中同百億故餘樹形等異類世界彼一一類皆徧虗空及盡法界是則重重無盡無盡非此所說也如是皆為調伏眾生
