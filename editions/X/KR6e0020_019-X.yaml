body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經四偈讚如來二初說偈之由爾時大威光太子至普觀大眾而說頌言二正陳十偈分為三別初二偈示佛出現世尊坐道場清淨大光明至一切所瞻奉既滅闇難遇不可失時二令觀佛德汝觀佛光明化佛難思議至心生大歡喜有德有慈真可歸也三引例勸歸觀諸菩薩眾十方來萃止至瞻仰於法王無遠不歸故宜往見五父王宣告二初宣告所因諸佛子彼大威光太子至觀諸眷屬而說頌言以聞讚故太子道深親承佛益王機猶淺轉假他聞二正以偈告十一偈分三初有三偈集眾勸觀汝應速召集一切諸王眾至共往觀如來二令辦供一切諸城郭宜令悉清淨至皆令在空住鄭注禮云巾猶衣也謂繒綵衣帶牽繫於車廣雅云馭駕也三齎供供佛一切持向佛心生大歡喜妻子眷屬俱往見世所尊六俱行詣佛爾時喜見善慧王至頂禮佛足却坐一面初導從持供後至而設敬二略列諸王復有妙華城善化幢天王至頂禮佛足却坐一面加緊那羅摩睺羅伽通成十部以表無盡此城次與前次同名或少異前標此結數亦無差六廣顯法門五初佛轉法輪時彼如來為欲調伏至隨眾生心悉令獲益佛解脫用主教宣示剎塵眷屬隨機益殊二威光獲益二初總是時大威光菩薩聞是法已至宿世所集法海光明上說三世佛法即佛昔所集也既見佛得益轉受菩薩之名二別所謂得一切法聚平等三昧智光明智即是體光明語用所照境殊故分十一初一深定智明一切法聚略有三義一正定等三聚二善惡等三聚三總收一切不出有為無為二種法聚二位相收一味性現故云平等定中證此名彼三昧一切法悉入最初菩提心中住智光明二大心智明謂後後因果皆入初心略有三義一後因初得故言一切悉入若脩塗至在初步學者祿在其中二菩提直心正念真如真如門內攝一切法三者三德開顯初後圓融初發心時便成正覺故十方法界普光明藏清淨眼智光明三大智智明法界者所照之體大也普光明者即相大也智慧光明徧照法界義故蘊恒沙性德故名為藏妄惑本空故云清淨明見稱眼見性肉眼即同佛眼觀察一切佛法大願海智光明四大願智明知諸佛法願為本故入無邊功德海清淨行智光明五大行智明無邊果德此行入故趣向不退轉大力速疾藏智光明六速疾智明謂趣入無生功用不退無功大力一行含多受斯稱也法界中無量變化力出離輪智光明七神通智明三輪幹事出離不能決定入無量功德圓滿海智光明八大福智明照福嚴故了智一切佛決定解莊嚴成就海智光明九大解智明佛勝解力成莊嚴海了智法界無邊佛現一切眾生前神通海智光明十大用智明普周法界了智一切佛力無所畏法智光明十一佛德智明降魔制外後三佛境故但了知餘可證知云得云入三以偈讚述二初因爾時大威光菩薩至承佛威力而說頌言二偈十偈分三初一標益體用我聞佛妙法而得智光明以是見世尊往昔所行事二顯用所見初七偈見因一切所生處名號身差別至見佛所行道後一見果我觀佛剎海清淨大光明寂靜證菩提法界悉周徧三有一偈發願思齊我當如世尊廣淨諸剎海以佛威神力修習菩提行即前品初修治大願也四傳化眾生三初明自悟諸佛子時大威光菩薩至於如來所心得悟了二轉悟他為一切世間顯示如來至普賢菩薩所有行願顯示十法與前自得十一智明有同有異三利他益令如須彌山微塵數眾生至成就如來清淨國土五如來讚勵偈有十一初三讚發心得法大果當成爾時一切功德山至為大威光菩薩而說頌言善哉大威光福藏廣名稱至當獲如是智二有四偈對劣顯勝進者圓德非諸劣行者能知此方便至當成無上道三有二偈外加內智決證無疑三世一切佛當共滿汝願至能知此方便四有二偈舉一例餘行者即得大光供養我故獲大威力至法界普周徧二遇波羅蜜善眼莊嚴佛二初結前生後諸佛子汝等應知至壽命五十億歲謂將說後佛故總論劫壽明多小劫者欲顯多佛現故說人壽佛壽者由佛壽促而人壽長故得威光一生歷事三佛二正顯佛興五初滅後佛興彼佛滅度後有佛出世至枝輪大林而成正覺謂智導萬行皆成彼岸見性了了故名善眼果由因飾是曰莊嚴二覩相獲益二初覩相爾時大威光童子見彼如來成等正覺現神通力即獲益之由也二獲益二初列十種即得念佛三昧名無邊海藏門念佛三昧者菩薩之父故首明之乃至十地不離念佛無邊海藏門者蘊積名藏深廣稱海然略有三義一由此定中見多佛故下文云以佛為境界專念而不捨是人得見佛其量與心等由念能見所以稱門二一一佛德是無邊海藏由念能知所以稱門云何無邊海劫海所修有行願海成就色身有相好海成就智身有辯才海建立念處有名號海修諸助道有功德海安處眾生有淨剎海如是諸海一一無邊各各出生蘊積名藏三無邊勝德由念佛生故此一門深廣蘊積何者念法性身即契如理念功德身成無邊德念相好身證無邊相障無不滅德無不生一言蘊諸總由念佛從此通悟所以稱門即此一門說不可盡即得陀羅尼名大智力法淵總持大智能達深法即得大慈名普隨眾生調伏度脫無緣普應即得大悲名徧覆一切境界雲等除熱惱即得大喜名一切佛功德海威力藏佛深德海蘊積力用菩薩緣此喜徧身心即得大捨名法性虗空平等清淨悲則心慼喜便淨動深契法性則曠若虗空悲喜兩亡為平等清淨即得般若波羅蜜名自性離垢法界清淨身覺法實性離分別也有可離者非真離也知自性離不復離也無離之離即真法界真法界者本來清淨法界清淨即般若清淨般若清淨則萬法本淨萬法淨者無淨無不淨為真淨也實相般若為萬法之體觀照冥此眾德攸依故云身也即得神通名無礙光普隨現通用智俱故無礙隨現即得辯才名善入離垢淵入法之深離說之垢即得智光名一切佛法清淨藏智照佛法淨所知障含藏眾德二結如是等十千法門皆得通達歷事增進故云十千通達之言釋前即得三讚德勸詣二初說偈三初歎希慶遇爾時大威光童子承佛威力為諸眷屬而說頌言不可思議億劫中至而今得見第二佛二歎佛勝德三初三身業佛身普放大光明至此佛神通之所現二三語業一一毛孔現光雲至調伏一切諸眾生三一意業佛神通力無有邊至為利眾生成正覺三有二偈勸眾同歸汝等應生歡喜心至當如法王得自在二聞偈益諸佛子大威光童子至無量眾生發菩提心四眷屬同歸時大威光王子與其父母至善眼莊嚴王如來所五聞經悟入三初佛為說經其佛為說法界體性至等修多羅而為眷屬主經謂法界體性大方廣也清淨佛也莊嚴即華嚴也有多眷屬者顯此教圓二當機獲益彼諸大眾聞此經已亦有十益既云大眾或一人得一或二三四或具十者威光先證故略不標大眾之言亦已含矣故下佛讚之然此十事略為二釋一如次配於十地十度或取地義或取度義得清淨智名入一切淨方便達一切法本來清淨名清淨智不取淨相是名方便即初地入證之智也得於地名離垢光明二地離破戒垢是所除障照諸善品即戒光明得波羅蜜輪名示現一切世間愛樂莊嚴即忍度忍為上嚴一切愛樂得增廣行輪名普入一切剎土無邊光明清淨見無剎不入無法不照無見不淨是為精進增廣眾行約地義釋以諸道品燒無盡惑成無邊光得趣向行輪名離垢福德雲光明幢趣向諸行能入俗也禪度增故性能離垢涉俗化物成福德雲不迷實理為光明幢得隨入證輪名一切法海廣大光明般若現前名隨入證照深緣起名法海光得轉深發趣行名大智莊嚴功用已遠將入無功為深發趣權實無礙為大莊嚴得灌頂智慧海名無功用修極妙見見法實性無功而修為極妙見由此智慧復得灌頂故仁王經云後之三地同遣無明同無功用故非灌頂地是灌頂智得顯了大光明名如來功德海相光影徧照顯了藥病是功德海相辯才徧應若月影流光得出生願力清淨智名無量願力信解藏智圓離障方於佛願而生信解故曰出生二此上十門隨一一事以立其名未必全將配於地位或通配諸位或復不次以人無量隨證不同普賢巧說文含多義三如來讚述二初六讚其已具勝德當成極果時彼佛為大威光菩薩而說頌言善哉功德智慧海至離垢莊嚴眾剎海皆前半已獲後半當證獨第四偈三句是因二有四偈明行齊佛因當如佛證汝已入我菩提行至汝當成佛大功德皆三句舉佛行後一句齊佛德然此中述讚望前遇光得益及向大眾所得多有相同義必述上可以自意而消息之三遇最勝功德海佛六初如來出時諸佛子波羅蜜善眼至大威光童子受轉輪王位前佛滅後等時也二正明現世彼摩尼華枝輪大林中至名最勝功德海立斯號者功德海滿無加過也三威光往供時大威光轉輪聖王至摩尼莊嚴大樓閣奉上於佛四佛為說經時彼如來於其林中至微塵數修多羅而為眷屬見普法故名為普眼以慧為性故曰光明況一眼即十眼融無障礙眼外無法方真普眼以諸緣發見即緣各為根因沒果中緣皆號眼故全色為眼恒見色而無緣全眼為色恒稱見而非我矣五威光得益爾時大威光菩薩聞此法已至名大福德普光明五度皆福定為最大寂無不照名普光明此下彰其定用得此三昧故悉能了知至過現未來福非福海福非福言略有二意一福即是善非福是罪二福即是相非福即性雙了性相故經云福德即非福德性此即深也了一切者廣也故有海言遇於初佛但得十者自力未勝故次佛十千者道轉深故今唯一者道已滿故六如來記別十一偈分四初四顯其菩提心時彼佛為大威光菩薩而說頌言善哉福德大威光至是汝大光能趣入初偈有願次偈有悲四有智光三兼精進通䇿三心故菩提心圓當成妙智二四偈上入佛境汝能以此廣大願至汝皆學已當成佛三有一頌示其果相得同諸佛如汝所見十方中至無邊願者所當得四有二偈讚其現能利他住普賢行今此道場眾會海至普賢菩薩一切行四遇名稱普聞蓮華眼幢佛四初佛出人中諸佛子彼摩尼華枝輪大林至名稱普聞蓮華眼幢約相目類青蓮約德心無所染相德高顯名稱外彰摧邪眾歸故曰幢也二天王就供二初菩薩行進報處天宮是時大威光於此命終至名離垢福德幢此城即是品初所列之一二知佛可歸持華待供共諸天眾俱詣佛所雨寶華雲以為供養三如來說經時彼如來為說廣大至微塵數修多羅而為眷屬方便之言略有三種一無實權施曲巧方便也二理本無言假言而言大方便也三權實無滯亦大方便事理皆照方曰普門四得益還歸時天王眾聞此經已至從道場出還歸本處聞上普門正受安住法喜無盡故名曰藏由此證達諸實相海此劫之中十須彌塵數如來今但云四又無結會古今現證得益等者經來未盡故也若結會者應云爾時威光菩薩者毗盧遮那佛是此下入第十二卷經如來名號品第七將釋此品五門分別初來意者先明分來前既舉果令生信樂今明能生因果信解故次來也二會來者生解之中信為其首故又前舉所信之境今明能信之行故次來也三品來者前品舉因緣果成所信之境今舉果辨因彰能信之行果中三業身為其總故先來也又遠答前名號海問故二釋名亦三初分名修因契果生解分謂修五位之圓因成十身之滿果令諸菩薩解此相故即生修因契果之解依主釋也二會名約處名普光明殿會然有三釋一以殿是寶成光普照故二佛於其中放普光故三佛於殿中說普法門慧光照世故立其名依前一義即依主釋後二有財約法則名信解行之會三品名如來現相品已釋召體曰名表德為號名別號通一切諸佛通具十號名釋迦等則不同故如來即十中之一品中正說隨機就德以立別名既表德之名則亦名亦號如來之名號依主釋也三宗趣亦三初分宗謂以修生修顯因果為宗令諸菩薩修行契入為趣二會宗者若就總望信解行德攝位為宗通成佛果為趣信能必到如來地故近望唯信為宗成位為趣若依長科十分之宗此下三品以為一分即果用應機周徧法界以為其宗依此起信為趣故此亦名正報因果亦是所信信何法門信佛身名等於眾生則知我名如佛名也信佛法門隨宜而立知我妄念苦集因果亦全法門信佛意業光明徧照則知自心無不知覺先古諸德亦將上三品舉果分收三品宗者顯佛名號周徧為宗隨機調化利益為趣或上二皆宗生信為趣四問答問五周因果差別平等二義不同何以分名合之為一答通生差別平等解故離於修生說何修顯問前會舉果本為生信今何重舉名號等三答凡約境生信有其二義一標舉境法明有所在二攝以就心令成信行前會約初義此會約後義又前會果廣因略故名舉果此會因廣果略故總攝為因先依後正文影略耳若約鉤鎖者身屬正報果故不同第七會說所成果此中自辨信所依故問何不入定以未入位性不定故若爾十定豈散善耶然說法之儀通有四句一定後說如諸會二說後定如無量義經等三定中說如第九會無出言故四不入說如此信中及第七會諸文非一第九表證唯證能說一得永常不礙起用故第七為表常在定故又入為受加彼不須加故不須入說後入者說在定故將起後故是知動寂唯物聖無常規故下文辨十信之用一方入正定餘方同起出說信定散自在無礙也餘會摩頂後說此會說後摩頂是知此經體勢縱橫不可定準五釋文若隨義約品科十分之中此下三品當果用應機普周分若約隨法就會科十分之中此一會當第二能信成德會今就四番問答科從此終第七會即當第二修因契果用解分若順諸會應直分問答今為順文一會分三第一序分第二請分第三說分今先序分具如經初但加普光以為小異略分為三初標主時處爾時世尊在摩竭提國阿蘭若法菩提場中二別顯三事三初別顯說時始成正覺二別顯說處於普光明殿坐蓮華藏師子之座處在菩提場東南可三里許熈連河曲彼河之龍為佛造此今舉總攝別前標國名以本收末上舉場稱故下不動覺樹而徧十方二別顯主德妙悟皆滿亦即示成正覺之相也準第八會初及深密經等皆說佛有二十一種功德升兜率品當廣明之今文有初十句亦略釋耳上句總言妙悟者晉經名善覺論經名正覺以梵音云蘇含於妙善及正等故譯者隨取悟即覺也雙照真俗故稱妙悟備下諸句異於因人故復稱滿二行永絕煩惱所知生死涅槃皆名二行俱不現前名為永絕達無相法清淨真如名無相法達者了也住於佛住如來常住大悲任運利樂又常安止聖天梵住得佛平等所證能證及以化用皆等諸佛致無障處能治道解脫障故不可轉法所說教法外道不能轉故所行無礙行諸世間違順魔冕不能礙故立不思議安立教法超言念故普見三世於三世境若事若理了達記別無錯謬故具此九別成初總句同異成壞準思可知三輔翼圓滿二初標數揀定與十佛剎微塵數諸菩薩至悉從他方而共來集菩薩揀非凡小補處明非下位他方而來非舊眾也言一生者釋有二義一約化相謂如彌勒此復有三一人中一生二天上一生三下降一生正取天上二約實報一生謂於四種變易生死中唯有末後一種名無有生死一位所繫此文多約化相言耳二歎其勝德普善觀察德雖無量略歎一智善觀察者能觀知也普有二義一眾普同有此德二普觀十境善有三義一善知相二善知無相三善知此二無礙此下明其所觀皆具上三義諸眾生界法界世界涅槃界至有為無為過現未來十句初總即所化次此生何來由迷法界起於世界我當令彼住涅槃果淨諸業果故須識心行之病文義之藥令厭世間欣出世間不盡有為不住無為上辨橫觀十法今豎達三世觀涅槃知已現當證觀諸業已現當造果報已現當受心行已現當發餘可類知亦以六相融之一請分二初舉人標念時諸菩薩作是思惟二正顯問端句雖五十問但四十以第二十句是說意故此四十問望第一會有同有異後二十句全同前二十句大同小異又復前後不同初十句即前第三十海前會即總說所觀深廣此則別說如來依正以前會中為總故此會別顯信所依故故前會皆致海言此中但云剎等第二十句前會名菩薩十海此列住等行位前通結會總顯圓融行布因故此約當分欲顯差別因之相故後二十句雖則全同前總此別又前即所信今辨所成欲顯所信所成體無異故文句全同若唯約義亦可分三謂初十句問佛德應機無因後用辯因所依果次十句問菩薩行位即果所成方大二十句佛果勝德顯因所成果是則以佛為緣而起於因熏以此因而成於果是此分之大意也故論云多聞還習無不從此法身流無不還證此法身即其義也今取文義俱便大分為二初十句直爾疑問後四十句引例請問義不異前然所依所成文應互有但是影略不欲繁辭故初會直爾興問即此中引例此中引例即彼直問又前但明一重所信故合三十句果今分為二故間之以因今初十句二初總顯請意若世尊見愍我等願隨所樂二別列所疑開示佛剎佛住佛剎莊嚴至佛剎成就佛大菩提十句依正間問者正報應機必依剎故亦表依正無障礙故五句依者一剎類二莊嚴三清淨四體性五成就上五即前二海廣如四五二品其佛住等五句即正報大用一佛身徧住諸剎佛心常住大悲二所具功德及所證法性三隨機說法四作用威光五修行得證現成菩提然此五即前會七海一即佛海二即解脫海三即演說海四即變化海五即名號及壽量海波羅蜜海其眾生海但是所化故略不舉含諸海中此之十句下有言說及現相答至下當知二引例請問三初十句標彼說意明其有悲如十方一切世界諸佛世尊為成就一切菩薩故初句總謂令諸菩薩行願成就故餘九為別令如來種性不斷故一上繼佛種救護一切眾生故二云何繼以救眾生故令諸眾生永離一切煩惱故三云何救令離惑故了知一切諸行故四如何救知彼根行故演說一切諸法故五以何救說法藥故淨除一切雜染故六成何益一除集諦染永斷一切疑網故二決道諦疑除一切希望故三拔苦希望滅壞一切愛著處故四證證滅愛處又成菩薩行具悲智也具此悲智何所為耶令佛種不斷佛種不斷有何相耶謂成三德救護眾生成就恩德永斷煩惱成於斷德了知諸行成於智德諸行有三一心行二所行行三所了行謂一切行無常無相即所了也云何救護演說諸法云何永斷淨諸雜染永斷煩惱種現雙亡除諸雜染謂唯現惑云何成智謂永斷疑網智成何益斷諸希望惑除何益滅諸愛著一切著者著有著空著行著果不著諸法正智現前悲救眾生佛種不斷是菩薩修行之要亦諸佛之本意也所陳諸問一一皆有斯益又釋一切菩薩是所成就云何成就不斷佛種即自成就救護眾生成就於他云何救護謂離二障永斷煩惱無煩惱障了知一切無所知障以何方便能斷二障謂說諸法此煩惱障其相云何謂愛與見除諸雜染絕愛煩惱永斷疑網絕見煩惱此所知障其相云何謂於境不了有所希望法執未忘一切生著今相無不了何所希望達法性空當何所著二障既寂二智現前成菩提涅槃謂不斷佛種是則菩薩眾行成就矣二有三十句舉彼所說顯其有智二初十句問因說諸菩薩十住十行至十願十定十通十頂文有九句昔云欠第九十忍一句又以十信自不成位是住方便攝在住中故不別問故仁王經教化品云伏忍聖胎三十人十住十行十迴向故知信住不分也有四義故信不入位一進退不定故二雜修十心無定階降故三未隨法界修廣大行故四未得法身顯佛種性故由斯不開十信則成此會及第三會俱答十住問也十行第四會答十迴向第五會答十藏第四會中答以藏有二義一收攝義謂收攝諸行以用迴向故答在迴向之前二出生義以出世地上證智故問居迴向之後十地第六會答十願初地中答十定十通第七會答各有本品十頂一種答文不顯古有多釋一云準梵網經說十忍後有心地法門即此十頂理亦可通但彼經說處乃有十初無菩提場會但云方坐千光王座及妙光堂說十世界海其二三四與此三四五會處法全同他化十地次第亦同而化樂天說十禪定初禪說十金剛心二禪說十願三禪說十忍四禪摩醯首羅宮說我本源蓮華藏世界盧舍那佛所說心地法門不云重會普光明及祇洹重閣次第又別難可會通又此中間後更有果問故彼佛心地即後如來地等非十頂也有云僧祇品答以準瓔珞等覺別有頂位以因位窮終今僧祇中說十大數數中之極故云十頂彼問雖十答有多數對上定通亦非其類故不可也有云壽量品答彼中十重佛土皆上為下頂極至賢首佛剎名為十頂又佛名第二詺此十一世界為上首故但舉此初後十一即顯過百萬阿僧祇世界壽量之數此為標首首即頂故然復彼無別問似有少理但標此十界將為問端對十地等甚不相例今謂新舊梵本俱無忍問答中即有故知彼忍即此頂也言十頂者因位終極十定十通皆等覺位十忍居後又得頂名問中約位終極故名為頂答據法門忍受以智印定故云忍也非位終極不具十忍非有十忍不極因位二文更顯故十忍品末云通達此忍門成就無礙智超過一切眾轉於無上輪等既言超過即是頂義亦猶四善根中忍頂法門義相類故不爾忍無別問空答何為設欲成十應脫十信十信雖未成位亦隨法界修廣大行德用殊勝別一會答應有問故若將十忍已下四品共答頂問於理無失俱是等覺之終極故二二十句問所成果全同初會文二初內德成滿及說如來地如來境界至如來自在如來無礙如來神力前會名佛加持即神力加持故神通約外用無壅神力約內有幹能離世間品各有十事其相自別言無礙者謂如來所作無能障礙上文名為無能攝取義皆同也二體用顯若如來眼如來耳至如來知慧如來最勝辨才是語業智慧是意業最勝是身業準前會中唯欠佛光明之一句餘如前釋其所答文亦如前引出現不思議相海品說但前總會故引此文所引之文正答今問說者宜重引之三末後一句結以正請願佛世尊亦為我說彼佛既爾此亦例然請同彼說故致亦言第三說分於中通下六會答此所問準問答長分科亦為三分一此初三品答所依果問二問明已下答所修因問三從不思議品下答所成果問其平等因果因乃果中之因果乃此果之用故屬果收此品分二先如來現相答由其念請故又如來證窮故後文殊言說答伴助主故假言顯故今初分二初佛現神通爾時世尊知諸菩薩心之所念各隨其類為現神通知心念者領念請也現神通者示相答也各隨類者有其三義一隨疑者所宜異故謂或示色令見以聲令聞冥資令曉皆是現通以法界身圓明頓現也二隨疑者流類別故三隨疑者所疑異故謂若疑十信即見如來足輪放光周乎法界等若疑十住則見如來足指放光百剎塵外菩薩集等如放光一事既爾餘相皆然故知初會現相徧於九會此會現通通於一分結集隨義編之作次耳故下三會皆有不起覺樹之言第二眾海雲集即現相答初十句問光現佛剎答佛剎問剎有金色等是剎莊嚴既以金成亦答剎體彼剎菩薩亦剎莊嚴菩薩大寶以為嚴故亦剎清淨純淨佛剎唯菩薩故淨修梵行是剎成就淨土行故亦剎清淨所修淨故此上已答五句依問兼答五句正報土各有佛及見如來坐蓮華藏是答佛住現通放光是答威德名不動智等是答法性見佛轉法輪是答說法佛成正覺是答菩提文雖在下義皆此具光明覺現即此現故十方眾集即為十段一一方內文各有八一遠近二土名三佛號四上首五眷屬六詣佛七到已致敬八化座安坐去此遠近皆十剎塵數者前會為說所信因果深廣故須遠集華藏之外十方剎海今為說於生解因果漸漸增修故但集娑婆鄰次之剎信行最劣故復云十後後漸增至法界品還集剎海初不云一直云十者表無盡故要剎塵者比餘勝故為有所表故分階級非初信等不是通方故結及證成十方齊說又隨迷名外悟處名來而實佛土本無遠近土皆名色者表信麤現故亦表顯然可生信故佛號同智者有信無智增無明故信中之智本覺犯故主同名首者梵云室利一名四實一首二勝三吉祥四德是以譯者前後不同今通用之以信為首攝諸位故次第行中信最勝故甚難得故於生死中創發信心為吉祥故信能增長智功德等一切德故此十菩薩同表信門故皆名室利各隨一門達一切法故復有差次文當釋亦有傳云梵云室利此云吉祥室利云首亦是一理眷屬皆十剎塵者表一一行攝無盡德皆詣佛者有歸向故餘如前會又下菩薩名等皆是表法菩薩表所行之行本剎表所證之理佛名表所得之智今初東方文有八事現神通已東方過十佛剎微塵數世界遠近有世界名金色土名謂心性無染與緣成器為自體故佛號不動智佛名謂本智如空離覺所覺湛然不動動即是妄非曰智故又縱成佛果不異凡故即本覺智住心真如彼世界中有菩薩名文殊師利上首謂慧達佛境處處文殊由擇契於本智故分因果與十佛剎微塵數諸菩薩俱眷屬來詣佛所詣佛到已作禮致敬即於東方化作蓮華藏師子之座結加趺坐化座本方南方過十佛剎微塵數世界有世界名妙色不染而染染而不染俱難了知故云妙色佛號無礙智無性不礙隨緣隨緣不礙無性彼有菩薩名曰覺首覺心性也與十佛剎微塵數諸菩薩至有世界名蓮華色了眾生空如蓮不著佛號滅闇智彼有菩薩名曰財首法財教化即滅闇智與十佛剎微塵數諸菩薩至有世界名瞻蔔華色性相無違唯一乘旨是為唯齅瞻蔔華矣佛號威儀智善知業果不犯威儀彼有菩薩名曰寶首真俗無違可珍貴故與十佛剎微塵數諸菩薩至有世界名優鉢羅華色若有此智如青蓮華最為第一佛號明相智謂明於法相又了佛德心明白也彼有菩薩名功德首了達如來應現說法之功德故與十佛剎微塵數諸菩薩至有世界名金色明潔可重故云金色佛為福田以佛為境故同文殊依金色界佛號究竟智平等福田為究竟智彼有菩薩名目首福田照導如目將身與十佛剎微塵數諸菩薩至有世界名寶色圓明可貴故名為寶佛號最勝智能䇿萬行為最勝智彼有菩薩名精進首正教甚深必在精進與十佛剎微塵數諸菩薩至有世界名金剛色得文若之堅利為金剛色佛號自在智於法能行方得自在彼有菩薩名法首法門雖多必在正行與十佛利微塵數諸菩薩至有世界名頗梨色智體清淨猶若頗梨明徹無染佛號梵智能淨萬行故云梵智彼有菩薩名智首佛之助道雖無量門智為上首與十佛剎微塵數諸菩薩至有世界名平等色觀察本性常平等故佛號觀察智彼有菩薩名賢首前佛後佛一道清淨由自性善故稱曰賢能知此賢是觀察力與十佛剎微塵數諸菩薩至師子之座結加趺坐又十佛相望不動是體餘皆是用十菩薩相望文殊為總餘皆是別以總導別故九菩薩不離妙德以前後流例略為此釋惟虗己而求之不信此理甚深法門於我何預
