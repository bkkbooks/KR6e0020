body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經八主海神二初長行十法頌脫第三復次出現寶光主海神至眾寶莊嚴身解脫門為物供佛是等施福得眾寶相以莊嚴身不可壞金剛幢主海神至護一切眾生善根解脫門巧隨根欲說法護善使其長成不雜塵垢主海神得能竭一切眾生煩惱海解脫門謂演深廣法體煩惱空梵本偈云一切世間眾道師法雲大雨不可測消竭無窮諸苦海此離垢塵入法門苦準此文乃竭苦海四若見佛境則惑亡苦息準現經文三是煩惱四是於苦若依梵本前苦後惑既譯人脫漏致使文義參差故古德云脫第四頌結名既同故知脫第三恒住波浪主海神得令一切眾生離惡道解脫門恒住波浪即是普用水為宮殿吉祥寶月主海神得普滅大癡闇解脫門以智滅癡妙華龍髻主海神得滅一切諸趣苦與安樂解脫門為行所遷一切皆苦菩提因起則生滅苦亡便得涅槃寂滅安樂普持光味主海神至一切眾生諸見愚癡性解脫門將智滅癡未免於見了癡見性癡見自亡真妄等觀是佛境也寶𦦨華光主海神至種性菩提心解脫門一切眾生有佛種性圓明可貴具德稱寶佛眼普觀佛智普示正因今顯如出金藏大心若起如種生芽故云出生緣了二因為能悟之妙道金剛妙髻主海神得不動心功德海解脫門了如不取則心不動搖湛如渟海萬德攸歸故須彌可傾魔豈能嬈一念降魔如本行集海潮雷音主海神得普入法界三昧門解脫門入法界定如法界徧二偈頌讚佛爾時出現寶光主海神至而說頌言不可思議大劫海至海潮音神所行處九主河神二初長行得法復次普發迅流主河神得普雨無邊法雨解脫門行成雨法若霈然洪霔滅惑生德若懸河迅流無所滯礙普潔泉㵎主河神至令永離煩惱解脫門現身息惱若泉㵎洗心離塵淨眼主河神至普滌一切眾諸惑塵垢解脫門真實滌垢悲智相資若碧沼澄潭空色交映故名離塵淨眼十方徧吼主河神得恒出鐃益眾生音解脫門圓音徧益若崩浪發響普救護眾生主河神至恒起無惱害慈解脫門拯救漂溺無熱淨光主河神得普示一切清涼善根解脫門善根無惑可謂清涼若阿耨達池永無熱惱普生歡喜主河神至永離慳著解脫門施門無量令彼無慳若蘊藻蔆蓮普令物喜廣德勝幢主河神得作一切歡喜福田解脫門行福契實故無不欣若深湖廣陂是為廣德光照普世主河神至瞋毒者歡喜解脫門方便慧力雜染皆淨慈彼冤害瞋反成歡若萬頃波澄光映天下海德光明主河神至恒受具足樂解脫門總收萬善令會涅槃若彼百川咸會大海由智廣故名海德光明二偈頌讚佛爾時普發迅流主河神至而說頌言如來往昔為眾生至此海光神之解脫十主稼神二初長行得法復次柔輭勝味主稼神至令成就佛身解脫門功德智慧二種法味資成佛身時華淨光主稼神至受廣大喜樂解脫門喜樂由於苦除色力勇健主稼神至圓滿法門淨諸境界解脫門眾生為所淨之境增益精氣主稼神至大悲無量神通變化力解脫門悲深故通廣普生根果主稼神至令下種無失壞解脫門下種佛田必至果無壞妙嚴環髻主稼神得普發眾生淨信華解脫門智敷物信獲果稱華潤澤淨華主稼神至令增長福德海解脫門慈眼視物故福聚無量慈則恬和怡悅偈云勝道成就妙香主稼神得廣開示一切行法解脫門以行成佛故始成即宣見者愛樂主稼神至諸惡普清淨解脫門懈於修習憂惱是生勤䇿諸根眾惡清淨離垢光明主稼神至令眾會歡喜滿足解脫門隨根為說遂求故喜二偈頌讚佛爾時柔輭勝味主稼神至而說頌言如來無上功德海至此淨光神解脫門十一主藥神二初長行得法復次吉祥主藥神至而勤攝取解脫門順情則易攝逆意則難調故普觀之栴檀林主藥神至滅一切眾生煩惱解脫門二三可知名稱普聞主藥神至增長無邊善根海解脫門如學者以名為實賓大土以名為佛事毛孔現光主藥神至一切病境界解脫門以慈善根力放月愛等光身心兩病纔念便滅破闇清淨主藥神至令智眼清淨解脫門迷理迷報二愚盲冥起惑造業備受眾苦佛以正法金錍開其智眼令明見三諦故云清淨普發吼聲主藥神至令見者咸生善根解脫門七八可知明見十方主藥神至能以方便令生信解解脫門無愛見之大悲生物德故名藏普發威光主藥神至滅一切眾生病解脫門世醫療治雖差還生永滅生德無先念佛因病因光皆是方便謂佛有無邊相相有無邊好好放無邊光光攝無邊眾言隨念者佛德齊均隨緣隨樂趣稱一佛三昧易成敬一心濃餘盡然矣況心凝覺路闇蹈大方二偈頌讚佛爾時吉祥主藥神至普觀一切主藥神眾而說頌言如來智慧不思議至此發威光解脫門十二主林神二初長行得法復次布華如雲主林神得廣大無邊智海藏解脫門佛德無邊皆依智海含德流光所以名藏擢幹舒光主林神得廣大修治普清淨解脫門等眾生悲是為廣大一一離障名普清淨生芽發曜主林神得增長種種淨信芽解脫門一切勝因皆為佛道各各心淨則種種芽生吉祥淨葉主林神得一切清淨功德莊嚴聚解脫門一切功德莊嚴一毛一一皆然故佛為德聚良以佛果攬因皆圓成非分成是故一因生一切果一果收一切因皆圓融無礙耳垂布𦦨藏主林神至恒周覽法界解脫門智通萬法是曰普門客塵不生故曰清淨悟如日照頓周法界功如佛鏡說智漸明明是本明漸為圓漸如莊嚴光主林神至而興布法雲解脫門知徧趣行如應布可意雷聲主林神至演清淨音解脫門了音聲性皆同佛音故無不可意能令世間皆聞佛音方云清淨香光普徧主林神至廣大行境界解脫門昔行稱周法界是廣大境神通普令物見倣而行之如下喜目即其事也妙光迥曜主林神至饒益世間解脫門眾生諂自不修德寧有進賢之心今福智益他則物我兼利偈云譣詖即諂也華果光味主林神至莊嚴功德藏解脫門敬念則佛興佛興則莊嚴德藏障重者不念不見於佛豈無常哉故應見者常見也二偈頌讚佛爾時布華如雲主林神至而說頌言佛昔修集菩提行至此味光神所觀察第十三主山神二初長行得法復次寶峯開華主山神得入大寂定光明解脫門寂而常照故光無不闡華林妙髻主山神至成熟不可思議數眾生解脫門相光熟機皆慈善根力如涅槃廣明高幢普照主山神至心所樂嚴淨諸根解脫門修因嚴根本為順物故矚蓮目而欣樂覩月面而歡心或見諸根一切皆周法界喜益深矣離塵寶髻主山神至勤精進無厭怠解脫門如空不染故長劫無怠光照十方主山神得以無邊功德光普覺悟解脫門癡故長眠唯福智之能覺大力光明主山神至顯示一切如來功德解脫門上三可知普眼現見主山神至於夢中增長善根解脫門若睡若寤皆令聞法進行斯為佛業如大瓔珞經說過去有佛凡欲說法令大眾眠夢中說法令增善根覺得道果涅槃亦云其人夢中見羅剎像等亦表萬法皆夢大夢之夜必有大覺之明金剛堅固眼主山神得出現無邊大義海解脫門稱性法門無邊大義一音能演是出現也二偈頌讚佛爾時開華帀地主山神至而說頌言往修勝行無有邊至入此方便金剛目十四主地神二初長行得法復次普德淨華主地神至普觀一切眾生解脫門念念無間平等普觀修慈護法故得金剛之體金剛即內照之實也堅福莊嚴主地神得普現一切眾生福德力解脫門一毛福力頓現眾福妙華嚴樹主地神至出生一切佛剎莊嚴解脫門證入無生不礙嚴剎普散眾寶主地神至令眾生除障垢解脫門一向為他淨目觀時主地神至常游戲快樂解脫門觀機出現名為游戲金色妙眼主地神至清淨身調伏眾生解脫門現淨惑身方調物惑香毛發光主地神至一切佛功德海大威力解脫門內具德海現威力身如地含海潤發生百穀百糓苗稼皆地香毛故寂音悅意主地神得普攝持一切眾言音海解脫門長行一言盡攝無餘偈頌一言普徧無極妙華旋髻主地神得充滿佛剎離垢性解脫門𦦨雲普徧令物離垢為性金剛普持主地神至法輪所攝持普出現解脫門法能攝持心行如金剛之輪佛則不動現世若須彌出海二偈頌讚佛爾時普德淨華主地神至而說頌言此下頌中亦有二句結法屬人可以意得如來往昔念念中至普持得見生歡喜十五主城神二初長行十法有云脫第九十頌具足復次寶峯光曜主城神得方便利益眾生解脫門光等方便成熟利益妙嚴宮殿主城神得知眾生相教化成熟解脫門應病與藥令得服行滿淨喜寶主城神至令一切眾生受諸福德解脫門護法法存則物受福德教理行果皆有護也離憂清淨主城神得救諸怖畏大悲藏解脫門悲救無盡名藏華燈𦦨眼主城神得普明了大知慧解脫門了佛大智𦦨幢明現主城神得普方便示現解脫門方便現身盛福威光主城神至得開悟一切愚闇眾生解脫門迷真俗理故云愚闇佛出開示令其悟入本迷無始猶若生盲雖聞譬喻竟不識乳唯佛出世方能曉之九準梵本云香幢莊嚴髻主城神得破一切煩惱臭氣出生一切智性香氣解脫門謂正使為臭物殘習為臭氣智性為香體利物為香氣香氣若高山之出雲稱智性而無盡臭氣若香風之捲霧等性空以無邊煩惱則塵習雙亡智慧則自他兼利有本具云香髻莊嚴主城神德開發眾生清淨妙智解脫門亦寫之脫漏耳義不異前偈云現夢中者夢是神遊亦見聞之氣分也夢中尚調況於覺悟如迦旃延為弟子現夢境界等寶峯光目主城神至破一切眾生障礙山解脫門二障五蓋重疊如山非智光明莫之能破二偈頌讚佛爾時寶峯光曜主城神至而說頌言導師如是不思議至如是寶峯之所入十六道場神二初長行十一法復次淨莊嚴幢道場神至誓願力解脫門出現字兩用謂有佛出現即出現莊嚴具而為供養佛昔如是神以大願倣之須彌寶光道場神至成就廣大菩提行解脫門對物成行令物倣之施為行先故偈徧舉雷音幢相道場神至於夢中為說法解脫門夢覺皆化則時處俱徧雨華妙眼道場神至眾寶莊嚴具解脫門外寶內眼重重難捨為物說行故云能雨清淨𦦨形道塲神至廣化眾生令成熟解脫門清淨𦦨形神前列中無謂色相道場俱妙莊嚴並為熟物華纓垂髻道場神得隨根說法令生正念解脫門疑境界者以唯心為正念疑法性者以無得為正念實則無正無邪方稱曰正無念不念是真念矣諸念不生正念方生耳故隨根雨法斷疑生智雨寶莊嚴道場神至普雨無邊歡喜法解脫門辯才雨法稱根故喜勇猛香眼道場神得廣稱讚諸佛功德解脫門深廣讚佛故名實雙美金剛彩雲道場神至莊嚴道場解脫門樹王眷屬並如經初蓮華光明道場神至而充徧十方解脫門即前身徧十方而無來往智入諸相了法空寂也妙光照曜道場神得顯示如來種種力解脫門佛有無量力故因行亦然皆嚴具顯示既是道場之神故得道場事中解脫二偈頌讚佛爾時淨莊嚴幢道場神至而說頌言頌亦十一我念如來往昔時至此妙光神能聽受十七足行神二初長行得法復次寶印手足行神至令見者歡喜解脫門初二可知最勝華髻足行神至一切如來眾會道場解脫門內則念念安於理事外則處處建立道場攝諸善見足行神至悉調伏無邊眾生解脫門舉足下足海印發揮諸有威儀無非佛事妙寶星幢足行神至普雨眾寶出妙音聲解脫門以華以光雨寶雨法樂吐妙音足行神得出生無邊歡喜海解脫門眾生無邊是佛化境見佛聞法故生歡喜栴檀樹光足行神至普覺一切道場眾會解脫門圓音警物等栴檀之香風暫一熏修覺身心之調順蓮華光明足行神至一切眾生令生善根海解脫門二偈頌讚佛爾時寶印手足行神至而說頌言佛昔修行無量劫至見已心生大歡喜十八身眾神二初長行得法復次淨喜境界身眾神得憶佛往昔誓願海解脫門初列處名華髻莊嚴或是名廣略舉其半或梵音相類譯者之誤未勘梵本法門光照十方身眾神至令歡喜調伏解脫門初三可知淨華嚴髻身眾神得身如虗空周徧住解脫門相即無相故如空徧住空非獨虗亦徧於色住非分住一塵亦周如芥子空即不可盡身與法性不可分故無量威儀身眾神得示一切眾生諸佛境界解脫門威儀施作無心頓現斯即佛境難以言思最勝光嚴身眾神至飢乏眾生色力滿足解脫門佛為良田出世難遇一興微供果獲五常略言色力亦有常命安樂辯才此五皆常方云滿足受報無盡故悉離貧窮淨光香雲身眾神得除一切眾生煩惱垢解脫門齒光除垢表所說淨故守護攝持身眾神得轉一切眾生愚癡魔業解脫門有染於五塵無慈於六趣者愚癡魔業也體五欲性虗己兼亡彼業斯轉而名云守護攝持者善守根門攝散持德則遠魔矣然魔事惑不出三毒及慢魔惱眾生不出三事謂上妙五欲及諸苦具為說邪法則三毒是生三毒內著即為魔業今守護覺察魔如之何即偈中解脫道也普現攝化身眾神至顯示莊嚴相解脫門此有三意一身雖周於法界多示為王攝御自在故二八相處於王宮俯接物故三法界菩提樹下法王宮故不動光明身眾神至皆令生清淨善根解脫門迷於本空故有妄苦無漏本有是淨善根二偈頌讚佛爾時淨喜境界身眾神至而說頌言我憶須彌塵劫前至不動光神所觀見十九執金剛神二初長行得法復次妙色那羅延執金剛神至無邊色相身解脫門見如來身普現非別豈唯凡現之處即無邊相亦隨一一色相皆無有邊日輪速疾幢執金剛神至得無邊隨類音解脫門上三可知妙臂天主執金剛神至開悟眾生解脫門初卷中名諸根美妙但云妙臂文義俱闕又如天主以現為世主故可愛樂光明執金剛神至咸盡無遺解脫門法海深奧槃節差別巧說令現無有遺餘大樹雲音執金剛神至攝一切樹觀解脫門約神且說寶飾為嚴巧攝己眾約佛方便相好為嚴無不攝也師子王光明執金剛神至皆具足明了解脫門因深故大福為能嚴果勝故德相皆明足密𦦨吉祥目執金剛神至為現威嚴身解脫門惡謂十惡險者惡之因也能陷自他及險道故蓮華摩尼髻執金剛神至莊嚴具摩尼髻解脫門若以現文則摩尼髻是所雨若以義取此神名摩尼髻亦得髻是能雨一切菩薩嚴具是所雨表菩薩智光圓滿故二偈頌讚佛爾時妙色那羅延執金剛神至而說頌言汝應觀法王法王法如是至示佛所行處第六偈云漩澓者水之漩流洄澓之處一甚深故二迴轉故三難渡故法海漩澓亦然一唯佛能究故二真妄相循難窮初後故三聞空謂空則沈於漩澓聞有謂有等皆類此知故云一切差別義也異生眾竟
