body:
  text: 清凉山沙門澄觀述晉水沙門淨源錄疏注經第六緊那羅王二初長行得法復次善慧光明天至得普生一切喜樂業解脫門世喜樂業皆因佛生妙華幢緊那羅王至令一切受安樂解脫門聞深適神故法喜無上終得涅槃無盡安樂種種莊嚴緊那羅王至清淨信解藏解脫門佛德深廣信亦包含悅意吼聲緊那羅王至令聞者離憂怖解脫門音演真法令聞故妄憂除而意悅寶樹光明緊那羅王至令覺悟所緣解脫門達境唯心而本空則安立眾生於覺悟普樂見緊那羅王得示現一切妙色身解脫門難遇益生所以示現相嚴常住名為妙色最勝光莊嚴緊那羅王至所從生業解脫門大知普慈是二嚴果一切智因是能生業微妙華幢緊那羅王至業所生報解脫門業細難窮自觀示物動地力緊那羅王得恒起一切利益眾生事解脫門神通益物無間稱恒威猛主緊那羅王至巧攝御解脫門知機巧化謂攝心正智御心如境二偈頌讚佛爾時善慧光明天緊那羅王至而說頌言世間所有安樂事至此威猛主能觀察十頌次第文並可知七迦樓羅王依賢首靜法皆云準頌長行脫第五執持王初長行得法復次大速疾力迦樓羅王至普觀察眾生界解脫門智無著故見無礙非普觀故通悉調不可壞寶髻迦樓羅王至教化眾生解脫門徧坐覺樹名住法界現通說法名為教化清淨速疾迦樓羅王至成就波羅密精進力解脫門進䇿諸度往修故成不退心莊嚴迦樓羅王至入如來境界解脫門境界如偈文絕思則入方為勇猛五諸本既脫遇一本有文云大海處攝持力迦樓王得能竭眾生煩惱海解脫門多是古本脫今依有本然偈約能竭說佛福智堅法淨光迦樓羅王至差別智解脫門眾生無邊故成就智多如嚴冠髻迦樓羅王得莊嚴佛法城解脫門城有三義一防外敵二養人眾三開門引攝今言法城通教理行果行契理教則無不俱嚴故各有三義謂了心城之性空則眾惑不入見恒沙性德則萬行爰增道無不通則自他引攝便能契果絕百非以成解脫養眾德以全法身開般若而無不通矣方顯教城無非養所詮旨句句通神有斯多義故偈云廣大叵窮重重四門故無數量究竟能闡唯我世尊普捷示現迦樓羅王得成就不可壞平等力解脫門法身無相故不可壞體即真如凡聖平等無分別智安住證會名成就力普觀海迦樓羅王至而為現形解脫門現同類形方便調伏龍音大目精迦樓羅王至歿生行智解脫門眾生沒生皆由行業佛生死智方能普入二偈頌讚佛爾時大速疾力迦樓羅三至而說頌言佛眼廣大無邊際至龍音解脫能如是頌文如次配釋可知但第五偈或有前脫故略釋之初二句甚深廣大次句福智相嚴行通因果因深果遠已不思議復有一行是如來行所謂大乘大般涅槃則行為果果皆絕言道佛行如出現品八阿修羅王二初長行得法復次羅睺阿修羅王得現為大會尊勝主解脫門修羅尊等勝須彌之高如來威光蔽十方大眾生各見真勝主也毗摩質多羅阿脩羅王得示現無量劫解脫門彼能以一絲作種種事令一剎那現於多劫調生等事巧幻術阿脩羅王至一切眾生苦令清淨解脫門以多法門入佛境界則苦滅心淨種種法門亦如幻也下文云苫末羅即巧幻梵音大眷屬阿脩羅王得修一切苦行自莊嚴解脫門多劫多苦為物非己如尸毗救鴿薩埵投崖已是丈夫最勝嚴飾況終剋寂智萬德以嚴翻顯無利勤苦誠為可醜既為物而行故有大眷屬婆稚阿脩羅王得震動十方無邊境界解脫門以大幻通力動剎悟機不怖眾生斯為大力大力婆稚華梵異耳徧照阿脩羅王得種種方便安立一切眾生解脫門開種種權門安眾生於一極之樂權為入大之本故皆佛智因權實不迷斯為徧照堅固行如莊嚴阿脩羅王至淨諸染著解脫門萬善順理普不可壞斯解脫處何染不亡功歸正覺故偈云佛力如是修者堅固妙嚴廣大因慧阿脩羅王得大悲力無疑惑主解脫門非用智故普令無疑主斯事者廣大因慧現勝德阿脩羅王至承事供養修諸善根解脫門供事修善有勝德故善音阿脩羅王得普入一切趣決定平等行解脫門普入諸趣明處無不徧偈云三世時無不均有佛性名為決定具上三義平等行焉不宣實義非善音也此上一段及後夜神皆結歸名上下例然恐繁不釋二偈頌讚佛爾時羅睺阿脩羅王至而說頌言十方所有廣大眾至此妙音王所稱讚頌文如次可知三諸神眾有十九眾今初主晝神二初長行得法復次示現宮殿主晝神得普入一切世間解脫門智了物心如空入色光照身器如日合空身偏器中如像在鏡世間主力能攝此身此身之性等世間故皆入觀機故名普入所入之處即為宮殿發起慧香主晝神至令歡喜滿足解脫門義圓稱機故滿心成益樂勝莊嚴主晝神至可愛樂法光明解脫門身法二光皆可愛樂華香妙光主晝神至清淨信解心解脫門法雨潤種已含實者解開善未芽者信發普集妙藥主晝神得積集莊嚴普光明力解脫門無法不悟名普明力曠劫修集成智莊嚴樂作喜目主晝神至皆令得法樂解脫門方便開示世樂亦苦令其悟入見理法樂如歡喜地也觀方普現主晝神得十方法界差別身解脫門如來身雲就體則非有無約機則別徧於十方不可謂之無約佛則稱真法界不可謂之有此則隨緣非有之法身恒不異事而顯現以化寂滅非無之眾生恒不異真而成立即無差別之差別也大悲威力主晝神得救護一切眾生令安樂解脫門處危者護之令安有若者救之令樂善根光照主晝神得普生喜足功德力解脫門眾生闇於多欲沈淪長夜以法開曉喜足為先喜足智俱是功德力能令離苦得安樂故妙華纓絡主晝神至眾生見者皆獲益解脫門有覺德行故名稱普聞既福廣名高故不虗其益二偈頌讚佛爾時示現宮殿主晝神至而說頌言佛智如空無有盡至如是解脫華纓得偈文可知二主夜神二初長行十法初七夜神是善財十地善友見解深廣彌顯眾海法門難思復次普德淨光主夜神至大勇健解脫門即善財離垢地善友彼名全同法門名寂靜禪定樂普遊步普遊步言即大勇健也寂靜禪定樂即是定體現法樂住故名為樂大勇健者即是定用健則堪能勇則無畏謂見佛淨機遊戲神通故名勇健亦遊步也勇健廣大故稱普德無惑智俱可謂淨光喜眼觀世主夜神至清淨可愛樂功德相解脫門即發光地善友彼名喜目觀察眾生解脫名大勢力普喜幢謂此解脫德無不備化無不周名大勢力即今廣大身惑俱淨無不樂見故云普喜悲為德相即幢義也觀察普喜名為喜目護世精氣主夜神得普現世間調伏眾生解脫門即𦦨慧地善友彼名普救眾生妙德護世精氣方是救生由護生故顯德之妙也法門全同次第又當謂感必現前調令清淨故寂靜海音主夜神得積集廣大歡喜心解脫門即難勝地善友彼名寂靜音海法門名念念出生廣大喜莊嚴念念出生即積集義見佛利生故生大喜莊嚴二義一見佛修歡喜因嚴樂見果故二積集此喜神自莊嚴由定發音名寂靜音深廣如海普現吉祥主夜神得甚深自在悅意言音解脫門即現前地善友彼云守護一切城增長威力偈中云尸利以梵音含於二義一云吉祥二翻為守故下譯跋陀室利以為賢首又以首字音同義別彼為頭首法界品中乃為守護皆譯者方言少融耳若以義會增長威力即是普現吉祥正當次第法門又同彼云甚深自在妙音解脫妙音故悅意悅則意淨即寂能演故名自在普發樹華主夜神得光明滿足廣大歡喜藏解脫門即遠行地善友彼云開敷一切樹華一切開敷即普發也法門彼云菩薩出生廣大喜光明文少倒略耳舊經云菩薩無量歡喜知足光明知足滿足文相近也謂能知如來巧智示法大福威光故日光明佛以福智滿足物心則含喜名藏平等護育主夜神得開悟眾生令成熟善根解脫門即不動地善友彼名大願精進力救護一切眾生法門名教化眾生令生善根教化開悟文異義同令生成熟始終異耳謂現通示相皆為調化一切善根皆令生長平等護育即救護一切精進大願故能為之今文略耳游戲快樂主夜神得救護眾生無邊慈解脫門念念久修恒偏救護是無邊慈也此與善財歡喜地善友似同而文多異又非其次故但直釋諸根常喜主夜神得普現莊嚴大悲門解脫門於三毒難壞眾生以大悲門現莊嚴身故石室留影毒龍心華況現身耶示現淨福主夜神至一切眾生所樂滿足解脫門本為眾生故成自德令他樂滿二偈頌讚佛爾時普德淨光主夜神至而說頌言汝等應觀佛所行至離垢端嚴照十方初句解脫之力能觀次句即寂靜樂神以此定觀佛此體故下經云普見三世佛而無取著以知如來無相性相本空故云寂靜虗空相也次句即大勇健準下經則自他兼淨也次句定果也上約佛說若約天說則四句皆是定用以住此解脫能見佛體用因果故一切世間咸樂見至如是護世能觀察二三可知佛昔修治歡喜海至此是寂音之所了稱理徧喜為廣大無邊縱內心不搖而外現威怒更深難測如來境界不可量至普發華神悟斯道前偈以寂故能徧後偈以眾生本來自淨故是寂滅是以智窮妄末理無不顯妄徹真源惑無不盡喜方滿足十方普現大神通至此現福神之所入三主方神二初長行得法復次徧住一切主方神得普救護力解脫門現身說法令悟得果皆救護力普現光明主方神至一切眾生神通業解脫門神通示相是能成辨業眾生出苦是所成辨業光行莊嚴主方神至生喜樂大光明解脫門法光破闇闇斷智生智與法喜俱生斷以寂滅為樂周行不礙主方神得普現一切處不唐勞解脫門普現說法聞必惑滅故不唐勞永斷迷惑主方神至發生功德解脫門聖人無名隨物立名貴在生德及滅惑耳徧游淨空主方神至令眾生歡喜解脫門六七可知髻目無亂主方神至無差別自在力解脫門業同性空並不失報俱無差異性相無礙為自在力說能惑報令除惡業說業性空善業亦亡普觀世業主方神至一切趣生中種種業解脫門前約說業性相令物絕業此約知業差別宜隨機化周徧游覧主方神至生一切眾生歡喜解脫門世人靡不有初鮮克有終今聖人有志有能故所作究竟世人以人隨欲不能兼亡今有慈有愍故令物喜謂十波羅密無不究竟四無量心令物歡喜二偈頌讚佛爾時徧住一切主方神至而說頌言如來自在出世門至此徧游神之解脫十頌次第配釋可知四主空神二初長行得法復次淨光普照主空神至一切眾生心解脫門智慧造理則十眼廣照日月合空則萬像歷然普游深廣主空神得普入法界解脫門身智二光徧入法界生吉祥風主空神得了達無邊境界身相解脫門佛身如空是無邊境無生無染為吉祥風離障安住主空神得能除一如眾生業惑障解脫門廣說聖道則離三障安住二空廣步妙髻主空神得普觀察思惟廣大行海解脫門上求下化名廣大行為安眾生如妙髻焉無礙光𦦨主空神至普救護一切眾生厄難解脫門沉生死之厄難悲智光以濟之無礙勝力主空神至無所著福德力解脫門不礙福智相導是謂勝力離垢光明主空神至離諸蓋清淨解脫門惑由智遣深遠妙音主空神得普見十方智光明解脫門妙音善說光徧十方主空神得不動本處而普現世間解脫門不壞本處而稱周十方二偈頌讚佛爾時淨光普照主空神至而說頌言如來廣大目清淨如虗空至吉祥風所見三中空有四義含於五法一離能取生即絕妄想二離所取相無相無名三境無自性即是如如四心無所得是為正智迷如以成名相妄想是生悟名相之本如執翻成智如外無智智體即如此二猶空寂照無礙如斯見佛是日吉祥如來無量劫廣說諸聖道普滅眾生障圓光悟此門長行及列並名安住今云圓光圓光表智安住表定二事相資前後互舉並能滅障於理無違我觀佛往昔所集菩提行至無礙神能見生死海者瑜伽七十云有五種法相似生死得大海名一處無邊相似故二甚深故三難渡故四不可飲故五大寶所依故釋曰由前四義眾生流轉由第五義菩薩入之且約分喻第九十云由三相故不同水海一自性不同謂水海唯色一分二淪沒不同唯人畜故唯沒身故三超渡不同未離欲者亦能渡故生死海反上可思清淨功德藏能為世福田至普現能觀察餘四可知五主風神二初長行得法復次無礙光明主風神至及一切世間解脫門以方便風合智日光智入深法而無障礙身入世間而無影像普現勇業主風神至佛出現咸廣大供養解脫門菩薩以求菩提之大心持稱真之供具等虗空之廣大不礙事之繁多而以全法界之身一念供無邊之佛如彼風力無不成也飄擊雲幢主風神至普滅一切眾生病解脫門長風忽來浮雲散滅慈風忽起惑苦病亡淨光莊嚴主風神至令摧滅重障山解脫門福智莊嚴之風摧壞如山之障力能竭水主風神得能破無邊亞魔眾解脫門十力降魔十軍皆殄獨名竭水者欲愛為初故大聲徧吼主風神得永滅一切眾生怖解脫門毛孔慈音滅除五怖若百竅異吹徧吼悅機樹杪垂髻主風神至諸法實相辯才海解脫門智入實相故妙辨如海如風擊樹故能下垂普行無礙主風神得調伏一切眾生方便藏解脫門調生方便為智所入故名為藏種種宮殿主風神至滅極重愚癡闇解脫門禪定宮殿必定慧雙游故能滅癡闇約佛則動靜無二見必滅癡大光普照主風神至一切眾生行無礙力解脫門日月照明無風不運智行無礙方便力焉二偈頌讚佛爾時無礙光明主風神至而說頌言一切諸佛法甚深至此普照神之所見入第四經六主火神長行十法有云準梵本此脫第四復次普光𦦨藏主火神得悉除一切世間闇解脫門以進力現世除物無明以最初故偏從火義普集光幢主火神至諸惑漂流熱惱苦解脫門惑有二義一漂二惱善巧迴轉則能息之大光徧照主火神得無動福力大悲藏解脫門稱性之福相惑不動與大悲合自利不動俱能攝德無盡名藏四有云準梵本神名勝上蕊光普照法門名普能除煩惱塵謂劫海行滿故今能現通滅惑偈云眾妙宮神同前列名眾妙即勝上義耳然諸本多無或有本則具云眾妙宮殿主火神得大慈悲廣蔭眾生解脫門恐是傳寫脫漏耳無盡光髻主火神得光明照耀無邊虗空界解脫門光明照耀等者日光合空等空無際智符實相稱實無邊雖曠劫修成全同本有窮靈極數妙盡難思實為惑本即是正因智照心源即是了因如空與日今略申十義以辨難思一謂日與空非即非離二非住非不住三而日善作破闇良緣顯空之要四雖復滅闇顯空空無損益五理實無損事以推之闇蔽永除性乃無增空界所含萬像皆現六而此虗空性雖清淨若無日光則有闇起七非以虗空空故自能除闇闇若除者必假日光八日若無空無光無照空若無日闇不自除九然此闇性無來無去日之體相亦不生滅十但有日照空則乾坤洞曉以智慧日照心性空亦有十義準喻思之非唯釋此一文乃遠通眾經該羅前後種種𦦨眼主火神得種種福莊嚴寂靜光解脫門體寂發照名寂靜光以此成福莊嚴身相十方宮殿如須彌脫主火神至悟一切世間解脫門七八可知光照十方主火神得永破一切愚癡執著見解脫門分別法相永離不了愚癡悟法實性便無執著之見雷音電光主火神得成就一切願力大震吼解脫門以行扶願故能現世作師子吼二偈頌讚佛爾時普光𦦨藏主火神至而說頌言汝觀如來精進力至此震音神之所了頌加第四餘並可知七主水神二初長行得法復次普興雲幢主水神至利益一切眾生慈解脫門無緣大慈是曰平等海潮雲音主水神得無邊法莊嚴解脫門無邊行法莊嚴自他妙色輪髻主水神得觀所應化方便普攝解脫門寂然不動以觀機感而遂通以隨攝若冬則積雪凝白夏則無處不流善巧漩澓主水神得普演諸佛甚深境界解脫門妙音演佛深旨令悟妙法漩澓離垢香積主水神得普現清淨大光明解脫門身智二光偏覺開化大充法界清淨無垢福橋光音主水神得清淨法界無相無性解脫門證淨法界性相俱絕德無不見則大用不亡知足自在主水神得無盡大悲海解脫門眾生不窮故大悲無盡滿而不溢有知足義焉流止從緣斯為自在淨喜善音主水神至為大歡喜藏解脫門處處見佛故大喜無窮喜從佛生即佛名藏若聆泉流之響無不悅也普現威光主水神至廣大福德力普出現解脫門性相無礙之福故能普現神通若空色相映之流威光蕩瀁吼聲徧海主水神至發起如虗空調伏方便解脫門調生行廣如空無邊用靡暫停如空無盡二偈頌讚佛爾時普興雲幢主水神至而說頌言清淨慈門剎塵數至是故見者無厭足前半辨一相因果次句例餘後句辨益初言清淨者離過無緣故門如塵數者隨宜利樂故以慈為因得妙相果以相為因得無厭果然如來相有純有雜此就純門若以雜門隨一相一毛皆收如來法界行盡亦相相皆爾純雜無礙因果相融圓成非分成故佛一相一毛即同法界無有分量此神從一慈門入無盡相此約十身之相若三十二相之因但說一相一因如智度瑜伽等論涅槃大集等經至相海品當引世尊往昔修行時至此善漩神所行處上之三偈文顯可知世尊光明無有盡至此淨香神所觀見初言無盡以顯光常次充法界以辨光徧不思議者以顯光深非色現色非青黃而現青黃故其第三句顯光用如來清淨等虗空至吼聲徧海斯能入
