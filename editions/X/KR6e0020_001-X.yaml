body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經往復無際動靜一源含眾妙而有餘超言思而逈出者其唯法界歟剖裂玄微昭廓心境窮理盡性徹果該因汪洋沖融廣大悉備者其唯大方廣佛華嚴經焉故我世尊十身初滿正覺始成乘願行以彌綸混虗空為體性富有萬德蕩為纖塵湛智海之澄波虗含萬象皎性空之滿月頓落百川不起樹王羅七處於法界無違後際暢九會於初成盡宏廓之幽宗被難思之海會圓音落落該十剎而頓周主伴重重極十方而齊唱雖空空絕迹而義天之星象燦然湛湛亡言而教海之波瀾浩瀚若乃千門潛注與眾典為洪源萬德交歸攝群經為眷屬其為旨也冥真體於萬化之域顯德相於重玄之門用繁興以恒如智周鑒而常靜真妄交徹即凡心而見佛心事理雙修依本智而求佛智理隨事變則一多緣起之無邊事得理融則千差涉入而無礙故得十身歷然而相作六位不亂以更收廣大即入於無間塵毛包納而無外炳然齊現猶彼芥缾具足同時方之海滴一多無礙等虗室之千燈隱顯俱成似秋空之片月重重交映若帝網之垂珠念念圓融類夕夢之經世法門重疊若雲起長空萬行芬披比華開錦上若夫高不可仰則積行菩薩曝鰓鱗於龍門深不可窺則上德聲聞杜視聽於嘉會見聞為種八難超十地之階解行在躬一生圓曠劫之果師子奮迅眾海頓證於林中象王迴旋六千道成於言下啟明東廟智滿不異於初心寄位南求因圓不踰於毛孔剖微塵之經卷則念念果成盡眾生之願門則塵塵行滿真可謂常恒之妙說通方之洪規稱性之極談一乘之要軌也尋斯玄旨却覧餘經其猶杲日麗天奪眾景之耀須彌橫海落群峯之高是以菩薩搜秘於龍宮大賢闡揚於東夏顧惟正法之代尚匿清輝幸哉像季之時偶斯玄化況逢聖主得在靈山竭思幽宗豈無慶躍題稱大方廣佛華嚴經者即無盡修多羅之總名世主妙嚴品第一者即眾篇義類之別目大以曠兼無際方以正法自持廣則稱體而周佛謂覺斯玄妙華喻功德萬行嚴謂飾法成人經乃法無竭之涌泉貫玄凝之妙義攝無邊之海會作終古之常規佛及諸王並稱世主法門依正俱曰妙嚴分義類以彰品名冠群篇而稱第一斯經有三十九品此品建初故云大方廣佛華嚴經世主妙嚴品第一歸命十方極三際塵剎圓明調御師法界功德大悲雲毗盧遮那大智海所住甚深真法性所流圓滿脩多羅一一塵方佛會中普賢文殊諸大士我今欲以一毛智測量無邊法界空願承三寶同體慈句句冥符諸佛意俾令法眼常無缺盡眾生界如普賢迴茲勝善洽群生速證菩提常樂果將釋經義總啟十門一教起因緣二藏教所攝三義理分齊四教所被機五教體淺深六宗趣通局七部類品會八傳譯感通九總釋經題十別解文義初因緣者夫聖人設教必有由致若須彌巨海大因方為傾搖今搖如來融金之德山動深廣之智海非小緣矣故下經云非以一緣非以一事如來出現而得成就出現本為大華嚴故先因後緣各開十義以顯無盡因十義者一法應爾故二酬宿因故三順機感故四為教本故五顯果德故六彰地位故七說勝行故八示真法故九開因性故十利今後故言法爾者夫王道坦坦千古同規一乘玄門諸佛齊證故一切佛法爾皆於無盡世界常轉如是無盡法輪令諸眾生返本還源窮未來際無有休息故不思議品中明一切諸佛能於一身化現不可說不可說佛剎微盡數頭一一頭化爾所舌一一舌出爾所音聲乃至文字句義一一充滿一切法界無有窮盡斯則處以毛端橫該法界時以剎那豎窮劫海處則頓起時則常起不待別因但隨見聞說有初成九會之別諸慈悲者於無盡中略此流轉令尋於此見無邊法如觀牖隙見無際空而此時處即同無盡以一處即一切處一時即一切時故二酬宿因者何以法爾如是轉耶宿因深故夫根深則果茂源遠則流長宿因既深教起亦大深大云何我佛世尊創躡玄蹤棲神妙寂悲智雙運行願齊周是以妄想弗翦而廓徹性空靈鑑匪磨而頓朗萬法乃以無障礙解脫闡斯妙門宿因雖多略有二種一者大願力故現相品云毗盧遮那佛願力周法界一切國土中恒轉無上輪兜率偈云如來不出世亦無有涅槃以本大願力示現自在法諸會佛加皆言願力及餘諸文誠證非一二者昔行力故謂無量劫依願起行行成得果方能頓演故主山神偈云往修勝行無有邊今獲神通亦無量法門廣闢如塵數悉使眾生深悟喜三順機感者謂昔因法爾雖能常徧約可流傳皆由機感離機說法無所用故其猶上有白月下資澄潭潭清影現機感應生故兜率偈云見佛亦復然必假眾善業十方諸佛告功德林言及諸菩薩眾善根力故解脫月云此眾無諸垢志解悉明潔等皆是機應廣顯機感如第四教所被機中然此機感通於現未諸會當機即是現在今之聞者是未來機四為教本者謂非海無以潛流非本無以垂末將欲逐機漸施末教先示本法頓演此經然亦有二一為開漸之本出現品云如日初出先照高山故二為攝末之本如日沒時還照高山故無不從此法界流無不還歸此法界故法華亦云始見我身聞我所說即皆信受入如來慧此漸本也次云除先修習學小乘者即開漸也又云我今亦令得聞是經入於佛慧即攝末歸本也斯則法華亦指此經以為本矣五顯果德者謂此本法中顯佛勝德令諸菩薩信向證故不識寶玉不得其用不知此德安能仰求然果德有二一依果謂華藏世界海等二正果如來十身等此二無礙以為佛德然依正無礙通有六句一依內現依如塵中剎海二正內現正如毛孔現佛三正內現依四依內現正五依內現依正六正內現正依其文非一又有四句一或唯依佛即剎故二或唯正剎即佛故三俱四泯思之可知隨舉一門則攝一切並如下說六彰地位者為顯菩薩修行佛因一道至果有階差故夫聖人之大寶曰位若無此位行無成故此亦二種一行布門立位差別故二圓融門一位即攝一切位故一一位滿即至佛故初地云一地之中且攝一切諸地功德信該果海初發心時便成正覺等然此二無礙以行布是教相施設圓融是理性德用相是即性之相故行布不礙圓融性是即相之性故圓融不礙行布圓融不礙行布故一為無量行布不礙圓融故無量為一無量為一故融通隱隱一為無量故涉入重重故世親以六相圓融上下之文非一七說勝行者欲登妙位非行不階故君子不患無位患己不立行亦二種一頓成諸行一行一切行故十住品云一即是多多即一等普賢行品說一斷一切斷等二徧成諸行此即行布謂自大菩提心體相功德乃至等覺中行此二無礙例如位說八示真法者欲成行位須解法理不體理事行亦非真故兜率偈云不了真實法諸佛故興世此亦二種一顯事理無礙法二顯事事無礙法並如義分齊說九開因性者謂上因果理事皆由眾生性有若性非金玉雖琢不成寶器良以眾生包性德而為體依智海以為源但相變體殊情生智隔今令知心合體達本情亡故談斯經以為顯示亦有二種一以言顯示令其知有二使其修行悟入顯現如下破塵出經卷等亦如法華云唯以一大事因緣故出現於世所謂開示悟入佛之知見眾生等有故言唯一十利今後者既等有其分故廣利無邊此亦二種一利今即佛在當機二利後即今之見聞發心品云我等諸佛護持此法令未來世一切菩薩未曾聞者皆悉得聞此益復二一令得見聞為堅種故出現品云如人食少金剛終竟不銷等二令起行成證入故出現品又云設有菩薩無量百千億那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議大威德法門或時聞已不信不解不順不入不得名為真實菩薩以不能生如來家故若聞此法信解隨順悟入當知此人生如來家乃至深入如來無量境界良以有作之修多劫終成敗壞無心體極一念便契佛家賢首品云十剎塵數如來所悉皆承事盡一劫若於此品能誦持其福最勝過於彼等又此利益別對前九成十種益謂一聞法爾則知常徧成見聞益二聞本行願學佛發興成發心益三聞機感知法由善起成造修益四聞為本知其義圓成頓得益五聞果德則信樂願齊成滅障益六聞位期心證入成攝位益七聞行發意修行成起行益八聞法決須解了成稱性益九聞因知一切皆同成轉利益十總具前九成速證益故前九因皆為今益亦可前一一門皆成十益可以意得因上十義故此教興發心品中有十所因彼云以佛神力故世尊本願力故等因緣相參對會因緣可以意得二明說經緣者一切經首說時方人等皆是緣起今有十緣一依時二依處三依主四依三昧五依現相六依說者七依聽者八依德本九依請者十依加者今初依時夫心冥至道則混一古今法界無生本亡時分下經偈云諸佛得菩提實不計於日況無涯之說念劫圓融哉今以無時之時略顯十重時別初唯一念二盡七日三徧三際四攝同類劫五收異類劫六以念攝劫七劫念重收八異類界時九彼此相入十以本收末謂以非劫為劫故於前十時恒演此經又此十種隨一圓收依此說時則無終始亦隨見聞說初成等如前法爾中辨若依此時則逈異餘教而餘教時不出於此或說三七六七等隨見聞故廣如旨歸第二依處者夫智窮真際能所兩亡假說依真而非國土況剎塵即入染淨參融圓滿教之普周難以分其處別然真非事外不壞所依以上無時之時徧非處之處然有言此經在穢土說居摩竭等故有云處淨土說在華藏故有云如實義者二種身土無定異處即於一處見聞異故上之三義後一近宗然說此經處淨穢無礙通局交徹各二四句初淨穢中謂或唯染或唯淨如前二義或俱華藏內娑婆故或泯染淨相盡同一法界故又或唯染摩竭等覆淨相故或唯淨其地金剛染相盡故或俱隱顯無礙故或俱非各相形奪二相盡故次明通局交徹二四句者謂或局此一界故或通該十方故或俱即此即徧故或泯二相盡故又或局此界攝一切故或通此入一切故或俱即攝即入故或泯形奪相盡故又以一塵例剎亦有四句可知若從陿至寬略顯十處初此閻浮七處九會而周法界如升須彌品二周百億同類一界亦徧法界如光明覺品三徧異類樹形等剎四徧剎種五徧華藏六徧餘剎海若種若剎七徧前六類剎塵皆有同異類剎八盡虗空界容一一毛端之處各有無邊剎海九猶帝網十餘佛同然上十類一一各徧法界而前九正是遮那說法之處然說十住等處雖復各徧法界乃至塵毛為門不同亦無雜亂若約十住與十行等全位相攝則彼此互無各徧法界若約諸位相資則此彼互有同徧法界一一品會準此知之十餘佛同者此佛既爾餘佛亦然故諸會結通皆云我等諸佛亦如是說然主主不相見伴伴不相見主伴伴主則互相見若互不相見即各徧法界互相見故同徧法界亦無雜亂亦無障礙又上十處共為緣起舉一全收以一一處稱法性故而隨前一一時皆徧此諸處又隨一一處皆具前時頓說此經此猶約器世間說若約智正覺及眾生世間即一一佛身支節毛孔皆攝無盡重重之剎普賢眾生一一皆爾並是遮那說經之處第三依主者夫真身寥廓與法界合其體包羅無外與萬化齊其用窮源莫二執迹多端一身多身經論異說今說此經佛為真為應為一為多若言真者何名釋迦居娑婆界人天同見若云應者那言遮那處蓮華藏大菩薩見見佛法身若云一者何以多處則現若云異者何以復言而不分身故說此經佛並非前說即是法界無盡身雲真應相融一多無礙即盧舍那是釋迦故常在此處即他處故遠在他方恒住此故身不分異亦非一故同時異處一身圓滿皆全現故一切菩薩不能思故今先明十身後彰無礙言十身者自有二義一約融三世間為十者一眾生身二國土身三業報身四聲聞身五緣覺身六菩薩身七如來身八智身九法身十虗空身二就佛上自有十身一菩提身二願身三化身四力持身五相好莊嚴身六威勢身七意生身八福德身九法身十知身廣顯其相如第八地及離世間品辨言無礙者略有十義一用周無礙謂於上念劫剎塵等處遮那佛現法界身雲業用無邊悉周徧故經云如於此處見佛坐一切塵中亦如是等其文非一二相徧無礙謂於上差別用中各攝一切業用故三寂用無礙無私成故四依起無礙無心頓現海印力故五真應無礙應即同法一味平等故六分圓無礙一一身分即具全身故七因果無礙不礙現因故八依正無礙不礙現依故九潛入無礙入眾生界如如來藏雖作眾生不失自性故故出現品云佛智潛入眾生心又云眾生心中有佛成正覺等又亦攝一切眾生在一毛孔善化天王云汝應觀佛一毛孔一切眾生悉在中等十圓通無礙謂此佛身即理即事即一即多即依即正即入即法即此即彼即情即非情即深即廣即因即果即三身即十身同一無礙法界身雲以此身雲徧前時處常說華嚴是知或說報身在色究竟約攝報說或說報身在餘淨土約引攝說或說舍那坐千葉華攝二地說或說登地方見約勝機說或分三異從體相用說俱非此經真實之義設分三十不同亦權實對說若不融前義亦失經宗第四依三昧者夫動靜唯物聖豈然乎示軌後徒明將有說必須靜鑒前理受諸佛加從定起而發言言必真當言必真當故受者之心自然篤矣故於諸會多明入定為說經緣有不入者至文當說其所入定皆盡法源業用難思第五依現相者謂法性寂寥雖無諸相無相之相不礙繁興起教多端相非一準或放光動剎或華雨香雲皆為發起故諸會之內將欲說法多先放光通表智光以被物故然有二種一不壞次第光隨位增微故二圓通無礙光隨一一光皆結通故隨處放異總有十光各有所表至文當知其動地等多在說後則但是慶聞如十地中雖是慶前義兼起後則是教緣第六依說人者法無廢興弘之由人下文云佛法無人說雖慧莫能了今此能說通三世間開即為五謂佛菩薩聲聞眾生及器更開為十謂加三世微塵毛孔器及有情各有分圓故毛孔微塵即是分說此上諸說通三世故故普賢行品云佛說眾生說及以國土說三世如是說等廣則無量法界品中類非一故如僧祗隨好即是佛說餘會多菩薩說法界品初有聲聞說諸善友等多菩薩說亦名眾生說菩提樹等即器界說至文當知其能說人用法不同或用音聲或用妙色等如教體中辨第七依聽人者子期云喪伯牙輟絃若無聽者終無有說即下諸眾略有十類至文當明除當機眾餘皆是緣第八依德本者川有珠而不枯山有玉而增潤內無德本外豈能談然唯約說者前人此法故略有二類一者智慧最為首故十方諸佛告金剛幢言及由汝智慧清淨故告金剛藏言亦是汝勝智力故二者餘行願力十方諸佛告普賢言亦以汝修一切諸行願力故十方諸佛告法慧言及汝所修諸善根力令汝入是三昧而演說法若感者善根若化主行願皆屬說因第九依請人者若約慈悲深厚亦有無問自談若約敬法重人要須誠請後說初心識昧未解諮求上智慈悲騰疑啟請然有二類一者言請二者念請諸會有無現相品當辨第十依能加者夫聖無常應應于克誠心冥至極故得佛加然佛若自說則不俟加如第九會因人有說要假上加其第八會行依法修不異前故略無有加二七不入定故無有加餘皆具有所以加者欲顯諸佛同加即同說故一說一切說故亦顯果海無言因相可說故若爾僧祇隨好應非一切表微細難知故超出因果故然施設不同不應一準加有二種一者顯加具於三業二者冥加但與智令說普光法界無顯有冥餘皆具二顯必有冥故餘至下明第二藏教所攝中二先藏攝後教攝前中亦二先藏後攝今初藏謂三藏二藏通稱藏者以含攝故世親攝論第一莊嚴論第四皆云彼三及二云何名藏答云由攝故謂攝一切所應知義攝即包含言三藏者一修多羅藏二毗奈耶藏三阿毗達磨藏初中先辨名後顯相今初亦名修妬路亦名素怛此皆梵音楚夏古譯為契經智論之中名為經藏契謂契理契機經謂貫穿攝化即契理合機之經依主受名契經即藏持業釋也復云正翻名線線能貫華經能持緯此方不貴線稱故存於經有云案五印度呼線席經井索聖教皆曰修多羅則經正是敵對斥於古德經非敵對今更詳之若一名四實皆為敵對則古如所破若兼順義經自屬於席經敵對應名聖教故梁攝論譯為聖教彼論云有阿毗達磨非是聖教為成聖教故加修多羅名古德見此儒墨皆稱為經遂借彼席經以目聖教則雙含二義但順兩方借義助名更加契字揀異席經甚為允當二顯相者四域四名所目雖殊意義相似故同稱修多羅而聖教多含具上三義故雜心云經有五義一曰涌泉二曰出生三曰顯示四曰繩墨五曰結鬘涌泉則注而無竭出生則展轉滋多義同井索有汲引故顯示正是聖教顯事理故繩墨則揩定正邪亦是繩之為經能持於緯同席經義結鬘同線線能貫華結成鬘故總上五義不出貫攝故佛地論第一云能貫能攝故名為經以佛聖教貫穿攝持所應說義所化生故此或貫攝通所說所化或貫穿法相攝持所化又世親攝論釋貫穿云謂能貫穿依故相故法故義故依者謂依於是處由此為此而有所說相者謂世俗諦相勝義諦相法者謂蘊界處緣起諦食靜慮無量無色解脫勝處徧處菩提分無礙解無諍等義者隨順密意說等瑜伽二十五顯揚二十大同此說餘義至十二分中當明第二毗柰耶藏初名後相前中亦名毗尼梵言之略耳此翻為調伏謂調練三業制伏過非調練通於止作制伏唯明止惡就所詮之行彰名即調伏之藏或能詮藏有調伏之能即有財釋契經藏中類有此釋毗尼或翻為滅滅有三義一滅業非二滅煩惱三得滅果或名尸羅具云翅怛羅此云清涼離熱惱因得清涼果故亦名波羅提木叉此云別解脫此就因得名然有二義一揀異定道名之為別二三業七支各各防非故名為別亦翻為隨順解脫此據果立隨順有為無為二種解脫果故亦名性善如十誦律亦名守信如昔所受實能持故後顯相者前名之中已含止作即毗尼相若別說者世親攝論云毗奈耶有四義謂犯罪故等起故還淨故出離故廣如彼論第三阿毗達磨藏阿毗名對達磨云法法有二種一勝義法謂即涅槃是善是常故名為勝二法相法通四聖諦相者性也狀也二俱名相法既有二對亦二義一者對向謂向前涅槃二者對觀觀前四諦其能對者皆無漏淨慧及相應心所等由對果對境分二對名故慧但是對而非是法非所對故言對法者法之對故故對法藏特名慧論舊譯為無比法以詮慧勝故世親攝論云阿毗達磨有四義謂對故數故伏故通故對義同前數者於一一法數數宣說訓釋言辭自共相等無量差別故伏者由此具足論處所等能勝伏他論故通者此能通釋素怛纜義故亦名優婆提舍此云論義亦名磨怛理迦此云本母謂以教與義為本為母亦名依藏生解藏為解母本即是母亦名摩夷此云行母依藏成行故行之母故然此三藏約其所詮略有二門一者尅性則經詮三學戒唯戒心二學論唯慧學如攝論說二約兼正則三藏之中經正詮定毗尼詮戒論詮於慧兼各通三第二明二藏者一聲聞藏二菩薩藏即由前三藏詮示聲聞理行果故名聲聞藏詮示菩薩理行果故名菩薩藏故莊嚴論第四云此三藏由上下乘差別故復為聲聞藏及菩薩藏攝大乘同此此就二乘理果同故合之若約教行別故即開三乘以為三藏如普超等經又由緣覺多不藉教出無佛世佛在世時攝屬聲聞故但分為二即是大小半滿不同第二明所攝者此經三藏之中正唯修多羅攝兼詮餘二十藏等品廣顯戒故問名等品顯論義故若就脩多羅中以義揀教則唯十藏攝具足主伴顯無盡故教義融故二藏之中唯菩薩藏若分權實但菩薩藏一分所攝權不攝故若約此攝乃至聲聞亦此經攝此能包含無量乘故揀於權實至下立教中明已辨藏攝第二明教攝者教有二種一者通相十二分教亦分大小至下十藏品辨二者諸宗二教不同今當略釋夫教海沖深法雲彌漫智光無際妙辨巨窮以無言之言詮絕言之理以無變之變應無窮之機極位所承凡情難挹今乘理教之力略啟四門一大意合離二古今違順三分宗立教四總相會通今初且西域東夏弘闡之流於一代聖言或開宗分教或直釋經文以皆含得失故耳且不分之意略有五焉一則理本一味殊塗同歸故不可分也二一音普應一雨普滋故三原聖本意為一事故四隨一一文眾解不同故五多種說法成枝流故以斯五義故不可分分之乃令情構異端是非競作故以不分為得其分教者亦有多義一理雖一味詮有淺深故須分之使知權實二約佛雖則一音就機差而教別三本意未申隨他意語而有異故四言有通別就顯說故五雖分權實須善會佛意有開顯故又王之密語所為別故不識權實以深為淺失於大利以淺為深虗其功故莊嚴聖教令深廣故諸聖教中自有分故諸大菩薩亦開教故以斯多義開則得多而失小合則得小而失多但能虗己求宗不可分而分之亦何爽於大旨故今分之
