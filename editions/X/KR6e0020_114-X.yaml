body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經二見友正報二初結前標後爾時善財見如是座至於一切眾生前現淨色身前但明主座今雙結主伴二別顯身雲二初身相二初萬類難思身二初顯別相所謂超三界色身至同於如來無分別故文有四十種身或唯約事如普徧色身或唯約理如十二十三無滅身以本無生起滅亦不為滅故或事理交徹如三十二及三十五無生不生色身以事顯理故於中無生則約自願所成無別有生不生則隨他而現生即不生餘可思準二明通體如是身者非色所有至已得成就寂滅身故謂離有取蘊故二一類超勝身爾時善財童子至乃至超過人女身唯約女故二身業二初總標現如是等無量色身饒益眾生集一切智助道之法二別顯二初明十度行行於平等檀波羅蜜大悲普覆一切世間一檀出生如來無量功德二出生戒戒能生長故修習增長一切智心三進觀察思惟諸法實性獲深忍海四忍具眾定門住於平等至心常正定未甞動亂五定恒轉清淨不退法輪至恒以智慧觀法實相六般若見諸如來心無厭足至入佛無量清淨法身七方便成就大願淨諸佛剎究竟調伏一切眾生八願心恒徧入諸佛境界至速疾增長一切智力九力得佛智光普照一切至心恒納受一切法十智唯精進在於忍前餘皆如次二明二嚴行修習一切如來功德至願為一切菩薩之母為佛母者是其本行故二設敬爾時善財童子見摩耶夫人至摩耶之前恭敬禮拜自道已深故現身等彼上二並是住體徧應即時證得無量無數至并其眷屬合掌而立三諮問白言大聖文殊師利至無空過者漸來至此所以敘文殊等者若約等覺則因位極故若約會緣從初發心一一善友皆是所會之緣同入此故願為我說菩薩云何學菩薩行而得成就三授己法界三初名體答言佛子我已成就菩薩大願智幻解脫門大有二義一願大願為一切諸佛母故二智大智亦二義一權智即能起大願能成幻事二實智即是般若生佛真身幻亦二義一願智體虗當相名幻故上文云幻智即是菩薩菩薩即是幻智故能無不為二者即智所作生佛之義謂於己身不壞小而廣容若於佛身無生起而現起又願收普賢智收文殊皆入大幻同為般若亦名佛母二業用二初總是故常為諸菩薩母二別於中有四初為現在遮那母二初標為剎海遮那母佛子如我於此閻浮提中至示現誕生自在神變二別顯生佛之相四初毛光為先相五初光入身又善男子我於淨飯王宮至乃至一切諸毛孔中二光現變又彼光中普現一切至宮殿眷屬五欲自娛三現八相又見出家往詣道場至為諸大眾轉正法輪四現因果又見如來往昔修行至如是等事靡不皆見五令身難思又善男子彼妙光明至受生莊嚴諸宮殿故謂身不大而容十方無盡法界二正明自在入胎五初眷屬翼從爾時菩薩從兜率天至乘其宮殿俱來供養二菩薩現通菩薩爾時以神通力至離諸懈怠無所執著三光明息苦又以神力放大光明至所有業行永出惡道四現變入又為救護一切眾生至與眷屬俱來入我身五入已游步彼諸菩薩於我腹中至微塵數世界而為一步三腹包眾海又念念中十方不可說至眾會道場清淨嚴飾四舉此類於百億世界善男子如此四天下至然我此身本來無二稱一性故非一處住體周徧故非多處住不如事故又上句不壞多故下句不壞一故又上句理如事故下句事如理又一與多相即入故此並釋中智幻之義何以故以修菩薩大願智幻莊嚴解脫門故二為過去諸佛母善男子如今世尊至示現受生我皆為母三為賢劫千佛母義通三世善男子如此世界至當成佛者悉為其母四結通橫豎無窮如於此三千大千世界至我自見身悉為其母三辯法根源二初問爾時善財童子白摩耶至得此解脫經今幾時二答六初輪王久遠答言善男子乃往古世至神通道眼所知劫數非後身菩薩所知者顯唯佛知非但久遠亦顯時無時相佛智契故爾時有劫名淨光世界至有轉輪王名大威德二有佛魔來彼王城北有一道場至無量眾俱至菩薩所三聖帝助降彼大威德轉輪聖王至成阿耨多羅三藐三菩提表智王助體本覺現故此時已得菩薩神通明今始成非實始也四場神興願時道場神見是事已歡喜無量便於彼王而生子想智假慈興故神於王生如一子想頂禮佛足作是願言至復曾供養十那由他佛五結會古今善男子於汝意云何至今世尊毗盧遮那是六為母普周我從於彼發願已來至常為我子我常為母前來為佛生時之母即是願母此明為佛成道時母即是智母善男子過去現在十方世界至皆於中放大光明中放光者生長同氣之所表佛佛智從無二理生故來照我身及我所住宮殿屋宅彼最後生我悉為母四謙己推勝善男子我唯知此菩薩至能知能說彼功德行五指示後友善男子於此世界至其王有女名天主光謂悲智勝用光淨自在破闇義故父名正念者此由定發故故法門名無礙清淨念汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子敬受其教至戀慕瞻仰却行而退二有十友別明會緣然位德已極託迹凡流深悲接生不標神異但以利人又顯求者道深或但示法門之名則懸領旨趣人雖具十文但分九後二合故今初天主光即幻智念力善友文六初之一句即依教趣求遂往天宮二見敬諮問見彼天女禮足圍繞至善能誘誨願為我說二示己法門二初標名天女答言善男子至名無礙念清淨莊嚴謂以一念無礙智普觀三世無不明現而無去來今為無礙念不雜異念為清淨念念佛功德有益悲智故曰莊嚴二業用三初念最初一劫善男子我以此解脫力至常現在前念持不忘二念中間多劫又憶過去劫名善地至恒河沙數諸佛如來三總結多劫善男子如是憶念至持而順行曾無懈廢非唯憶念亦於彼多劫多佛聞持此門四謙己推勝善男子我唯知此無礙至能知能說彼功德行五指示後友善男子迦毗羅城居迦毗羅黃色城者中道軌物故有童子師名曰徧友謂為童蒙師徧與眾生為善友故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子以聞法故至繞無數帀辭退而去下諸善友六段之文多有不具皆可思準二童子師徧友幻智師範善知識文但有三初依教趣求從天宮下漸向彼城二見敬諮問至徧友所禮足圍繞至善能誘誨願為我說三指示後友徧友答言善男子至汝可問之當為汝說不得法門者略有四義一與眾藝法門同故二法有所付顯流通故三一切法門體無二故四表無所得方為得故三善知眾藝幻智字母善知識文六初依教趣求爾時善財即至其所二見敬諮問頭頂禮敬於一面立至善能誘誨願為我說三授己法門二初標名體時彼童子告善財言至得菩薩解脫名善知眾藝謂以無礙智窮世間之伎藝故二顯其業用我恒唱持此之字母字母為眾藝之勝書說之本故此徧明之有標列結列有四十二門皆言般若波羅蜜門者從字入於無相智故字義為門故毗盧遮那經中皆言不可得智無所得即般若故又文殊五字經云受持此陀羅尼即入一切法平等速得成就摩訶般若纔誦一徧如持一切八萬四千修多羅藏然初五字若準阿目佉三藏即全是文殊真言若準今多字本而第二字不同今依彼經釋唱阿字時入般若波羅蜜門至入無差別境界一阿者是無生義以無生之理統該萬法故經云無差別境而菩薩得此無生則能達諸法空斷一切障故云威力唱多字時入般若波羅蜜門名無邊差別門二多者彼經第二當囉字是清淨無染離塵垢義今云多者毗盧遮那經釋多云如如解脫金剛頂云如如不可得故謂如即無邊差別故如不可得順哆字義應是譯人之誤以囉哆二字字形相近聲相濫故若順無塵垢釋以無邊之門方淨塵垢唱波字時入般若波羅蜜門名普照法界三波者五字經云亦無第一義諦諸法平等謂真俗雙亡是真法界諸法皆等即是普照唱者字時入般若波羅蜜門名普輪斷差別四者者諸法無有諸行謂諸行既空故徧摧差別唱那字時入般若波羅蜜門名得無依無上五那者諸法無有性相言說文字皆不可得謂性相雙亡故無所依能所詮亡是謂無上文云以那字無性相故者字無有諸行者字無有諸行故跛字無第一義跛字無第一義故囉字無塵垢義以囉字無塵垢義故阿字法本不生阿字法本不生故那字無有性相汝知是要當觀心是本來清淨無染無著離我我所分別之相遮那經中字義與此無殊下多依彼經及阿目佉所譯而其梵音輕重有殊釋義無別唱邏字時入般若波羅蜜門名離依止無垢六邏字悟一切法離世間故愛有因緣永不現故離世間故無依愛不現故無垢唱柂輕呼字時入般若波羅蜜門名不退轉方便七柂字悟一切法調伏寂靜真如平等無分別故方為不退轉方便唱婆蒲我切字時入般若波羅蜜門名金剛場八婆字悟一切法離縛解故方入金剛場唱荼徒解切字時入般若波羅蜜門名曰普輪九荼字悟一切法離熱矯穢得清涼故是普摧義唱沙史我切字時入般若波羅蜜門名為海藏十沙字悟一切法無量礙故如海含像唱縛房可切字時入般若波羅蜜門名普生安住十一縛字悟一切法言語道斷故能徧安住唱哆都我切字時入般若波羅蜜門名圓滿光十二哆字悟一切法真如不動故不動則圓滿發光唱也以可切字時入般若波羅蜜門名差別積聚十三也字悟如實不生故則諸乘差別積聚皆不可得唱瑟吒字時入般若波羅蜜門名普光明息煩惱十四瑟吒字悟一切法制伏任持相不可得故普光明即能制伏住持煩惱即所制伏息即伏義唱迦字時入般若波羅蜜門名無差別雲十五迦字悟作者不可得則作業如雲皆無差別唱婆蘇我切字時入般若波羅蜜門名降霔大雨十六婆字即時平等性唱麼字時入般若波羅蜜門名大流湍激眾峯齊峙十七麼字即我所執性我慢高舉若眾峯齊峙我慢則生死長流湍馳奔激唱伽上聲輕呼字時入般若波羅蜜門名普安立十八伽字即一切法行取性唱他他可反字時入般若波羅蜜門名真如平等藏十九他字即是處所性唱社字時入般若波羅蜜門名入世間海清淨二十社字即能所生起唱銷字時入般若波羅蜜門名念一切佛莊嚴二十一鎖字即安隱性唱柂字時入般若波羅蜜門名觀察揀擇一切法聚二十二柂字即能持界性唱奢尸荷切字時入般若至隨順一切佛教輪光明二十三奢字即寂靜性唱佉字時入般若波羅蜜門名修因地智慧藏二十四佉字即如虗空性唱叉楚我切字時入般若波羅蜜門名息諸業海藏二十五叉字即盡性唱婆蘇紇切多上聲呼字時至蠲諸惑障門淨光明二十六娑多字即任持處非處令不動性惑障為非處開淨光明為其處唱壤字時入般若波羅蜜門名作世間智慧門二十七壤字即能所知性唱曷攞多上聲呼字時入般若至生死境界智慧輪二十八曷攞多字即執著義性執著為生死境義即智慧輪唱婆蒲餓切字時入般若至一切智宮殿圓滿莊嚴二十九婆字即可破壞性圓滿之言不空譯為道場然此婆字宜蒲餓切諸本多云蒲我切則與第八不殊唱車上聲呼字時入般若至修行方便藏各別圓滿三十車字即欲樂覆性唱娑蘇紇切麼字時入般若至名隨十方現見諸佛三十一婆麼字即可憶念性唱訶婆二字皆上聲呼字時入般若至令出生無礙力三十二訶婆字即可呼召性無緣召令有緣故唱縒七可切字時入般若至修行趣入一切功德海三十三縒字即勇健性唱伽上聲呼字時入般若至持一切法雲堅固海藏三十四伽字即厚平等性唱吒字時入般若波羅蜜門名隨願普見十方諸佛三十五吒字即積集性唱拏嬭可切字時入般若至觀察字輪有無盡諸億字三十六拏字即離諸諠諍無往無來行住坐臥謂以常觀字輪故唱娑蘇紇切頗字時入般若至名化眾生究竟處三十七娑頗字即徧滿果報唱娑同前音迦字時入般若至無礙辯光明輪徧照三十八娑迦字即積聚蘊性唱也夷舸切娑蘇舸切字時至宣說一切佛法境界三十九也娑字即衰老性相唱室者字時入般若至於一切眾生界法雷徧吼四十室者字即聚集足跡謂聚集即一切眾生法雷即是足跡唱侘恥加切字時入般若至以無我法開曉眾生四十一侘字即相驅迫性謂無我曉之即為驅迫唱陀字時入般若波羅蜜門名一切法輪差別藏四十二陀字即究竟處所謂此究竟含藏一切法輪然新譯乃是茶字去聲引之上來從娑字來皆上有悟一切法下有不可得言今並略之若具皆如瑟吒字耳其中難者已如上釋餘以經疏相對文並可知更有對會及修觀儀所得功德並別章具也三總結示善男子我唱如是字母時至般若波羅蜜門結云四十二門者謂表四十二位故故智論中諸位圓融明初阿字具後諸字四謙己推勝善男子我唯知此善知眾藝至無沉沒無不現證推勝即就其所知眾藝寄勝推之不捨世俗皆與實相不相違背會同般若之門而我云何能知能說彼功德行五指示後友善男子此摩竭提國至彼中有城名婆呾那此云增益以無盡三昧能出生故有優婆夷號曰賢勝賢猶直善無依道場直善之最汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子頭面敬禮至繞無數帀戀仰辭去
