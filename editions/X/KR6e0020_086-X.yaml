body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經三有三十門答前十行三十句問古德分三初六門明大志曠遠行次九門明定慧業用行後十五門明德備成滿行然約圓融此意非無今不壞次亦次第顯十行中行第一行有三門次二三行各一第四行二門第五行六門次四行各二門第十行中自有九門至文當知所以用門多少者檀度在初故具三戒忍通世間故唯一定慧尊勝故有多門智中既多故般若中略餘次勝故但用二門又此十行雖約十度而義多含是故文中或就十度明義或就行名以釋今初三門歡喜行中之行即分為三初明力持五初總標佛子菩薩摩訶薩有十種力持此含總別總者以是十行之首依此十事加持建立能起諸行故度世經名十建立別即局在歡喜行中凡所布施皆為修習諸佛本所修行等故是建立行意二徵數何等為十三列釋所謂佛力持法力持眾生力持上三三寶即境界持眾生即僧寶菩薩之僧即眾生世間故餘七行持業力持悲所作業故行力持正起行故願力持願持行故境界力持有悲智境行方成故時力持時即起行之時善力持智力持上二福智然第十地大盡分中有十一持於第四位加煩惱持故論判行持中初二逆行彼約應化不斷所以加之今但約為行本故無煩惱彼有供養持及劫持無境界持及善力持此以第八時中攝劫彼以行攝此善力依境起供故並無異餘名並同具如彼釋既數名不同案名以釋此無僧寶有教化眾生亦未爽通理上辨陀羅尼即總持文義次云受持即領納受行今云力持即是加持任持故不相濫四結數是為十五顯修益若諸菩薩安住此法則於一切法得無上自在力持此下入第五十四經二大欣慰五初標佛子菩薩摩訶薩有十種大欣慰正辨歡喜行義彼但見乞者來倍復歡喜今則知由施故見佛供佛等心大歡喜初行多同歡喜地二徵何等為十三釋五初事佛供佛對所謂諸菩薩發如是心至如是思惟心大欣慰二聞法近友對復作是念我於諸佛所至如是思惟心大欣慰三二利行成對復作是念我於往昔至如是思惟心大欣慰四嚴土化生對又作是念十方所有至如是思惟心大欣慰五難見能見難成能成對菩薩摩訶薩復作是念至如是思惟心大欣慰四結佛子是為菩薩摩訶薩十種大欣慰五勸若諸菩薩安住此法則得無上成正覺智慧大欣慰三深入佛法三初標佛子菩薩摩訶薩有十種深入佛法上經意明預欣當成此中辨其現能證了即前法施之行故彼文云我當盡學諸佛所學證一切智知一切法為眾生說二徵何等為十三釋所謂前六有入字後四以知字為初證入了知二文影顯於中初四入器世間入過去世一切世界至入現在世世界數數謂多少世界行行謂剎因世界說說謂彼彼果中說法世界清淨清淨謂剎體此是通體上三別明下一總顯入一切世界種種生種種性即染淨等殊斯即別體入一切眾生種種業報入一切菩薩種種行上二入眾生世間後四入智正覺世間知過去一切佛次第至國土眾會說法調伏上三入三世佛下一入法知世間法聲聞法獨覺法菩薩法如來法知差別五乘雖知諸法皆無分別而說種種法明權實雙行以性不壞相故雖無分別而說種種此中分別即是差別故晉經云雖諸法無一無異而說一異悉入法界無所入故釋成上義謂悉入法界故無差別無所入故而說種種何者若別有一入處則入時失本相不得說種種以當法自虗名入法界無別可入則不壞種種矣上則辨知此下明說如其法說無所取著夫說法者當如法說法既權實雙融說亦即說無著四結是為十五勸若諸菩薩安住此法至菩提大智慧甚深性二有一門明饒益位中行五初標佛子菩薩摩訶薩有十種依止菩薩依此行菩薩行上明證入今託良緣徧依此十方能饒益非但依戒況戒有攝善何所不具二徵何等為十三釋所謂依止供養一切至依止一切佛菩提行菩薩行四結是為十五勸菩薩依此行菩薩行三有一門即無違逆位中行五初標佛子菩薩摩訶薩有十種發無畏心由依菩薩止善則能於十難作能作難忍能忍為發無畏心二徵何等為十三釋所謂滅一切障礙業發無畏心障礙難滅於佛滅後護持正法發無畏心遺法難護降伏一切魔發無畏心惡魔難降不惜身命發無畏心身命難捨摧破一切外道邪論發無畏心外道難摧令一切眾生歡喜發無畏心物心難稱令一切眾會皆悉歡喜發無畏心大眾難喜調伏一切天龍夜叉至摩睺羅伽發無畏心八部難調離二乘地入甚深法發無畏心下乘難離於不可說不可說劫行菩薩行心無疲厭發無畏心上行難修於此十難皆無所畏豈畏眾生相惱害耶四結是為十五勸若諸菩薩安住此法則得如來無上大智無所畏心四有二門明無屈撓位中之行初被甲行無疑惑心四初標佛子菩薩摩訶薩至於一切佛法心無疑惑此門由前於難無懼故於十所作決志無疑即被甲精進中行後門攝善利樂精進徧在二門二徵何等為十三釋十初十度攝生所謂菩薩摩訶薩發如是心至是為第一發無疑心初則正明次顯無疑三反顯失四結次第下九準例二事供佛菩薩摩訶薩又作是念至是為第二發無疑心三光明嚴剎菩薩摩訶薩又作是念至是為第三發無疑心四長時調熟菩薩摩訶薩又作是念至是為第四發無疑心五具一切智菩薩摩訶薩又作是念至是為第五發無疑心六作世明燈菩薩摩訶薩又作是念至是為第六發無疑心七說法開悟菩薩摩訶薩又作是念至是為第七發無疑心八滅障成佛菩薩摩訶薩又作是念至是為第八發無疑心九離妄自覺菩薩摩訶薩又作是念至是為第九發無疑心十決成菩提菩薩摩訶薩又作是念至是為第十發無疑心於此十事發誓要期故名被甲四勸若諸菩薩安住此法則於一切佛法心無所疑二攝善行不可思議五初標佛子菩薩摩訶薩有十種不可思議即所攝之善由決志無疑故所為難測二徵何等為十三釋初三單約善根願智稱性名不思議所謂一切善根不可思議至一切法如幻不可思議二餘七權實雙運故不思議於中分二初四約行後三約智智約內明行就外相今初發菩提心修菩薩行善根不失無所分別不可思議涉有而一道清淨雖深入一切法亦不取滅度至不可思議悟空而萬行沸騰修菩薩道而示現降神至救護眾生不可思議修因而八相果成雖能示現如來十力至教化眾生不可思議現果而大用不捨皆難思也二後三約智文三初約二諦相即知一切法八中十句勒為五對一境二心三通一切四約修起五即名言亦即五法一相二妄想三如如四正智五名然各有二意一直就法體無相是真相即是俗常互相即下四例然二約迷悟五對大同小異無相是相迷如無相以成於相相是無相悟相無相即是如如無分別是分別迷於正智無分別即成妄想分別分別是無分別悟妄分別即正智無分別非有是有了如非有真有如如有是非有若執有如則非如有無作是作智若無作是作正智作是無作若有所作非作正智非說是說知名非說是真說名說是非說謂名有說非是說名不可思議二約三事融而不融知心與菩提等知菩提與心等心及菩提與眾生等九中初融三事即心佛眾生皆無差別如覺林偈亦不生心顛倒想顛倒見顛倒顯離融相名為不融不可思議三權實即而不即三句初明盡而不盡於念念中入滅盡定至亦不盡有漏善根此約時斷以明體用二無而不無雖知一切法無漏而知漏盡亦知漏滅此將法性對斷以明體用二句雖殊俱是權實雙行三即而不即二初正明雖知佛法即世間法至不於世間法中分別佛法二釋成上義一切諸法悉入法界無所入故悉入法界故說相即無所入故不應世中分別佛法等謂以當法自虗故名相即非世間中有法可得下重釋云知一切法皆無二不得二中互求無變易故亦非世法作彼佛法思之是為第十不可思議四結佛子是為菩薩摩訶薩十種不可思議五勸若諸菩薩安住其中至諸佛無上不思議法五有六門明無癡亂中行於中有三初二門即無癡之行次二門明無亂之行後二門雙明二門引生功德雖癡亂有通今從別說又此三段即是三禪初即饒益有情禪二即正法樂住禪三即引生功德禪今初分二初門不愚巧密之言五初標佛子菩薩摩訶薩有十種巧密語前既明內行今辨外言彼行文云以正念故善解世間一切言說能持出世諸法言說等皆言密語者汎明有五一說深密法故如出現品名如來密藏等二一言說一切法故上云如來於一語言中等亦如仙陀四實九義瞿聲等三近而不聞如身子在座遠而無隔如目連尋聲等四言近意遠如說三乘為究竟等言遠意近如說寒時得火名涅槃等亦名隱實說權五以異言說異法如覺不堅為堅固等二徵何等為十三釋所謂於一切佛經中巧密語初一具五以是總故一切教故於一切受生處巧密語至現成等正覺巧密語此二含二意謂示而謂實故即第四意此二皆是深密之法即第一意於一切眾生業報巧密語至同一成就巧密語餘通前二或並兼五可以意得四結是為十五勸若諸菩薩安住其中則得如來無上善巧微密語二不愚善巧之智文五初標佛子菩薩摩訶薩有十種巧分別智外言既密內智又巧故於利生無有癡闇故彼文云菩薩於善知識所聽聞正法所謂甚深法等文義多同二徵何等為十三釋所謂入一切剎巧分別智至入一切佛法巧分別智四結是為十五勸若諸菩薩安住其中至無上善巧分別諸法智二正法樂住禪即無亂行二門皆是定體初門明入三昧顯處等不同五初標佛子菩薩摩訶薩有十種入三昧彼文云善入一切諸禪定門此中明十皆通一切二徵何等為十三釋所謂通辨緣斯十境入定不同別則十門緣境各異於一切世界入三昧至住一切劫入三上五一重之事下五涉入圓融從三昧起現不思議身至無有休息入三昧九十皆即一而多故彼行云一念中得無數三昧但從多分對前後說判為定體非無其用四結是為十五勸若諸菩薩安住其中至諸佛無上善巧三昧法二明徧入則解類皆徧五初標佛子菩薩摩訶薩有十種徧入亦猶小乘說十徧處即令三昧漸更增廣二徵何等為十三釋所謂眾生徧入至一切如來種種供養徧入前明一切如眾生身謂童子身等雖能一切身入而不必一時今此隨入一類皆徧一切如海慧初來一切皆水等四結是為十五勸若諸菩薩安住其中則得如來無上大智徧入法三有二門明引生功德禪初門明作用無礙故稱解脫五初標佛子菩薩摩訶薩有十種解脫門即不思議解脫梵云毗木叉此云勝解脫謂殊勝作用亦由依禪成八解脫二徵何等為十三釋所謂一身周徧一切世界至游戲神通解脫門四結是為十五勸若諸菩薩安住其中則得如來無上解脫門二於境無壅故曰神通五初標佛子菩薩摩訶薩有十種神通如依四禪引六通用二徵何等為十三釋所謂憶念宿命方便智通至無有障礙方便智通此十若以六攝前四可知次五神境隨眾生心現不思議至不可說變化身方便智通後一漏盡成菩提故隨不思議眾生心至三藐三菩提方便智通約位不同與十通小異四結是為十五勸若諸菩薩安住其中至種種示現令其修學六有二門明善現位中行初門正明行體五初標佛子菩薩摩訶薩有十種明正顯行體即是般若故曰智明然皆權實無礙之智故稱善巧非如十度唯約根本但約增微分成五行二徵何等為十三釋二前七單約一智分三初三約所化所謂知一切眾生業報至皆如金剛善巧智明先事次理後即事歸理次三約能化能以無量微妙音聲至或不受生善巧智明亦初約事次句約理後即事歸理三離能所想會歸般若捨離一切想受境界善巧智明念想觀除不受境界為入理善巧故二後有三句辨雙行三初明無說之說無成之成善巧智明知一切法非相非無相至於無量劫分別演說謂雙非照寂離於言道而能差別照事有說非相遣相非無遣無一性遣多無性遣有即性相俱寂住於法界成阿耨多羅三藐三菩提善巧智明無成之成法界之體實無所成照斯法界即說成佛二明無生起生智明文三初正明無緣之緣兼顯無化之化於中二初明無緣菩薩摩訶薩知一切眾生至了達受生不可得故謂眾生真心稱理不可得故若無於緣即無所化二明真心隨緣不壞緣起則亦有所化於中二初知所化文有三節初有八句別知緣相而知因謂無明等知緣緣謂業行知事即識名色等知境界即觸受塵境知行即現在受取有知生即生支知滅即老死知言說總是隨俗緣生不離三世故二有十二句六對通知染淨迷悟知迷惑知離迷惑至知生死知涅槃迷理則倒惑雜染悟皆反此知可得知不可得知執著知無執著隨俗則俱可得第一義中二俱叵得得非得約理著非著約智三明知心行知住知動住謂本性動謂客塵知去知還隨客塵則去而莫歸見本性則還源反本知起知不起有還有去皆是起心還住兩亡寂然不起知失壞知出離起則諸善失壞不起則出離蓋纏知成熟觸境寂知是為成熟上通物我後知根機唯約自說知諸根知調伏根謂六根不為境牽即是調伏二結雙行隨其所應種種教化未曾忘失菩薩所行謂智隨曲化不失無行二徵釋何以故菩薩但為利益眾生至不違一切世間所作所以爾者為物發心故三結名是多緣起善巧智明三平等教化智明三初明實不礙權菩薩摩訶薩於佛無著至其心廣大等法界故二明權不礙實知種種說法知眾生數至不可傾動當成正覺三結名於生死海平等濟渡一切眾生善巧智明四結數是為十五勸修若諸菩薩安住其中則得如來無上大善巧智明二明離智障解脫五初標佛子菩薩摩訶薩有十種解脫脫二障故梵云毗木底此云解脫與前不同二徵何等為十三釋所謂煩惱解脫邪見解脫此二煩惱障諸取解脫業障取增為業故蘊處界解脫報障上四脫凡三障下六脫智障超二乘解脫此一揀劣無生法忍解脫至悉能了知一切三世解脫餘皆顯勝四結是為十五勸若諸菩薩安住此法至教化成熟一切眾生七有二門明無著位中行初門明游處縱情後門明棲止適悅皆通二利權實方便而無所著今初五初標佛子菩薩摩訶薩有十種園林二徵何等為十三釋所謂生死是菩薩園林至盡虗空一切世界故四結是為十五勸若諸菩薩安住此法至無上離憂惱大安樂行二棲止適悅五初標佛子菩薩摩訶薩有十種宮殿二徵何等為十三釋所謂菩提心是菩薩宮殿至作一切法王自在事故四梵住者即四無量亦色因故故度世云修四梵行慈悲喜捨餘九可知四結是為十五勸若諸菩薩安住其中至於一世間神力自在八有二門明難得位中行初門內心願樂願即行體五初標佛子菩薩摩訶薩有十種所樂既處宮殿則情欣勝樂故二徵何等為十三釋所謂樂正念心不散亂故至摧滅一切異道法四結是為十五勸若諸菩薩安住此法則得一切諸佛如來無上法樂三外德莊嚴五初標佛子菩薩摩訶薩有十種莊嚴具以眾德莊嚴願故二徵何等為十三釋所謂力莊嚴不可壞故至求一切智無退轉故四結是為十五勸若諸菩薩安住此法則得如來一切無上法莊嚴九有二門明善法位中行初門明外緣不動後門明內心不捨又此明心堅後明深入皆是力義今初分五初標佛子菩薩摩訶薩發十種不動心二徵何等為十三釋所謂於一切所有悉皆能捨至亦無退轉不動心十中二及第九是思擇力餘皆修習力第八句中有十一信成就有根信生佛果故無濁信不雜不信濁故清淨信淨無煩惱故極清淨信無細念故離垢信離所知垢故明徹信徹事源故恭敬供養一切佛信向果位故不退轉信自分堅故不可盡信德無盡故無能壞信緣下動故大歡喜踊躍信證真如故不動心成就出生一切智至信受不謗不動心四結是為十五勸若諸菩薩安住此法則得無上一切智不動心二內心不捨五初標佛子菩薩摩訶薩有十種不捨深大心由不動故能窮理事理深事廣故云深大二徵何等為十三釋所謂不捨成滿一切佛至集一切諸佛法深大心四結是為十五勸若諸菩薩安住其中則能不捨一切佛法
