body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經普賢行品第三十六初來意者先通後別通謂二品明出現因果故次來也亦名平等因果謂會前差別之因成此普賢之圓因會前差別之果成於性起出現之果又前約修生此約修顯若爾何以更無別問復何以前品差別果終而無瑞證平等因竟便有瑞耶即以此義顯是會前若更別問便有隔絕欲會前故不以瑞隔普法希奇因果各瑞又前應有瑞證經來未盡所以無也別謂此品先因後果義次第故亦遠答前第二會初所行問故及不思議品念請種性本顧問故前雖已答下二深妙故重明之亦猶相海及與隨好妙中之妙古德別為一段因果二釋名者初則通顯二品義名依性起修依性起用差別相盡因果體均故云平等因果又因是果因量周法界果是果果境界如空因果二俱盡未來際利樂含識故名出現別則品名普賢即標人顯法明此行法非次第法行者顯法非人品中正明所行之法非說人體德周法界為普至順調善曰賢依性造修曰行然普賢行諸經文中多有其名品中雖廣今但略顯束為十義以表無盡一所求普謂要求證一切如來平等所證二所化普一毛端處有多眾生皆化盡故三所斷普無有一惑而不斷故四所行事行普無有一行而不行故五所行理行普即上事行皆徹理源性具足故六無礙行普上之二法互交徹故七融通行普隨一一行融攝無盡八所起用普用無不能無不周故九所行處普上之八門徧帝網剎而修行故十所行時普窮三際時念劫圓融無竟期故上之十行參而不雜涉入重重是故善財秖入普賢一毛孔中所得法門過諸善友不可說倍又上十行通收為二若約位後普賢說者則是得果不捨於因徹窮來際為普賢行以人彰法則普賢之行若約位前位中普賢則是以德成人但修普行即曰普賢亦普賢即行但從行名若獨約於位後普賢則普賢之行無施下位廣釋普賢如初會辨三宗趣者亦先通後別通以二品明其平等因果為宗會前差別以為其趣別以此品明其平等圓因為宗成平等果無二為趣釋文中二此品辨因後品明果前中二先長行後偈頌前中文二先正說二先明說因二初標前略說爾時普賢菩薩摩訶薩復告諸菩薩大眾言普賢說者以人表法佛子如向所演至略說如來少分境界言如向者一近指向前隨好一品為於障重地獄眾生略說隨好少分力用廣說難思二通指前所說之果為少分境果海絕言故三遠通前差別因果前文雖有圓融之義以隨方便五位漸次因果殊分逐機就病未盡法源故名少分則顯向下平等因果逐法性說因果圓融名廣大說二徵釋所由二初徵何以故徵意云何以前文名略說耶二釋諸佛世尊為諸眾生釋文二意一者成止諸佛世尊所以出世者以諸眾生有無明等十種過惡未宜廣說是故先明差別因等二者生後謂諸眾生既過滋多障累無盡則一治一切治一現一切現眾生無盡因果亦窮未來際故前之所隨由未盡故次明十過無智一無明作惡二作惡行晉經名諸纏則亦是惑此二為總次六皆無明計我我所三可知執著於身四著身見故六地云世間受身皆由著我顛倒疑惑五三倒四倒等不能決斷邪見六乖僻正理分別七徧計分別與諸結縛恒共相應八結縛恒隨隨生死流九義通業苦即因果流遠如來道十行邪徑故此句結成諸句過失故出興于世結縛等名如常所辨二正陳今義普賢之行文二初明所治廣多既一惑成百萬障則一障一切障義則惑惑皆然今從重說文三初總標佛子我不見一法為大過失至於他菩薩起瞋心者標瞋毒最重除瞋之外更徧推求無有一惡如瞋之重故晉經云起一瞋心一切惡中無過此惡決定毗尼經中亦云菩薩寧起百千貪心不起一瞋以能違害菩薩大悲莫過此故菩薩善戒亦同此說於他菩薩起瞋心者若於菩薩起其瞋其過尤重以令菩薩廢大行故是以大般若中諸天魔王見諸菩薩互相是非過常大喜二徵釋二初徵何以故二釋二初總顯佛子若諸菩薩於餘菩薩至即成就百萬障門故二徵列名相何等為百萬障標雖百萬略列百門古人寄位分為五段所謂不見菩提障不聞正法障至惡羅剎中障障十信行不樂佛法障至不喜見聞佛自在神通障障十住行不得菩薩諸根障至不護持菩薩諸行障障十行之行樂誹謗一切智語障至不決定發菩薩弘誓障障十向行此下障十地行不樂與菩薩同住障至不聞無礙法故口如啞羊障啞羊者此是耳根障以生邊地不聞法處故口無所說舌根之障次下自明不具相好故鼻根破壞障至三世諸佛菩薩種性障昔人結云菩薩萬行不過此五起一嗔心一切頓障作此釋者非不有理如賊心求法豈獨障於十地行耶是知通障一切善法信尚不起況後位耶又所障法界如帝網重重能障同所亦皆無覆故知百萬猶是略明三結成佛子若菩薩於諸菩薩至於餘菩薩起瞋心者二能治深妙二初正顯文中別有六位位各十行初一始修後五成益故後五段展轉依初是為初即攝後一治一切治也說有前後得即一持今初分二初標舉勸修是故諸菩薩摩訶薩至應勤修十種法二徵數列結何等為十於中十法攝為五對辨五種修初二約人明謙敬修所謂心不棄捨一切眾生於諸菩薩生如來想敬上愛下故次二約法明真正修永不誹謗一切佛法知諸國土無有窮盡順教知事故次二約心行明廣大修於菩薩行深生信樂不捨平等虗空法界菩提之心愛樂大行堅大心故次二約智明增勝修觀察菩提入如來力精勤修習無礙辨才內入果智外起勝辨故後二約悲願明長時修教化眾生無有疲厭住一切世界心無所著眾生無盡悲化不疲世界無邊願住不著是為十第二十種清淨二初躡前起後佛子菩薩摩訶薩至則能具足十種清淨依於前來正修行時成離染故二徵數列名何等為十次第從前十句而成所謂通達甚深法清淨一由不捨諸眾生故達深法淨以諸眾生皆有佛性即妄而真為深法故親近善知識清淨二由敬上故能近善護持諸佛法清淨三由不謗故能護法了達虗空界清淨四由知無盡故了如空深入法界清淨五由菩薩行不離法界故能深入觀察無邊心清淨六知菩薩心等虗空故觀察無邊與一切菩薩同善根清淨七觀察菩薩皆同此觀能入佛力故名為根不著諸劫清淨八精修不懈故不著劫數觀察三世清淨九由化無厭故觀三世一切眾生化未化等修行一切諸佛法清淨十由住世界是故能修一切佛法是為十第三十種廣大智二初躡前起後佛子菩薩摩訶薩住此十法已則具足十種廣大智垢染既拂本智自明稱性相知故云廣大二徵數列名何等為十所謂知一切眾生心行智至是為十亦從前十及與次十而成於此然有開合恐煩不配說者隨宜第四十種普入二初躡前起後佛子菩薩摩訶薩住此十智已則得入十種普入事隨理融本來即入智了法爾無境不通故能身心皆得相入亦從前三生於此十可以意得二徵數列名何等為十所謂一切世界入一毛至非根入一切根非根者境識及理皆非根也一切想入一想至一世入一切三世是為十第五十種勝妙心二初躡前起後佛子菩薩摩訶薩如是觀察已則住十種勝妙心由前如法本性圓融則令事理二但無礙應機成益名勝妙心從前四生亦可意得二徵數列名何等為十所謂住一切世界語言至是為十第六十種善巧二初躡前起後佛子菩薩摩訶薩住此十種至十種佛法善巧智由上理事無礙故今則權實皆能決斷名善巧智二徵數列名何等為十有十一句後二合一餘皆如次從前十成所謂了達甚深佛法善巧智一即言亡言名為甚深出生廣大佛法善巧智二無依故故出生廣大宣說種種佛法善巧智三如依空生於色故能說種種證入平等佛法善巧智四住無二邊故證平等明了差別佛法善巧智五由了種智甚深祕密故了差別悟解無差別佛法善巧智六無差別二文全同深入莊嚴佛法善巧智七若無疑惑則是佛法之所莊嚴一方便入佛法善巧智八以平等心成一方便無量方便入佛法善巧智九三世之法約差別門所以名為無量方便知無邊佛法無差別至於一切佛法不退轉善巧知十由住佛力所以得知佛法無邊自力不退是為十從前十展轉既爾從前四段義亦應然如是展轉不離始修故隨一法具一切矣二結勸佛子菩薩摩訶薩聞此法已至悉與三世諸佛法等一行能具一切行故疾得菩提大文第二證成文二初現瑞證二初此界爾時佛神力故法如是故至雨不可說神力說法雲二結通十方如此世界四天下至十方一切諸世界中悉亦如是二諸菩薩證亦二初此土爾時佛神力故法如是故至最大誓願授記深法授記深法者少用功力疾得菩提佛子我等一切同名普賢同名普賢者皆有此行故各從普勝世界依此普法最為勝故普幢自在如來所此行成果高出無礙故來詣此土悉以佛神力故至來此道場為汝作證二結通如此道場我等十佛剎至一切諸世界中悉亦如是二以偈重顯二先敘述二初說偈儀爾時普賢菩薩摩訶薩至觀察十方洎乎法界二說偈意欲開示菩薩行至令其開悟而說頌言此有十意偈中並具二正頌有百二十一頌大分為二初二十四頌顯說分齊餘皆正辨普賢行相此是伽陀與前長行綺互共顯普賢之行前是略明十法展轉相生此則廣顯諸門略無展轉又前多顯體此多辨用前中又二初一頌誡聽許說汝等應歡喜捨離於諸蓋一心恭敬聽菩薩諸願行二正示分齊文二初許說過去菩薩之行往昔諸菩薩最勝人師子至說名論師子二許說三世佛菩薩行於中二初有三偈舉所說時處二初二舉時於一賢劫中千佛出于世至我當分別說二舉處如一佛剎種無量剎亦然未來十力尊諸行我今說二明所說行亦二初諸佛出世之行諸佛次興世隨願隨名號至化彼令修習即普賢行是故名為因果圓融二有七偈菩薩三輪願智之行即普賢行入於如是智修其最勝行至我當說彼行二九十七頌正顯普賢行分二初即悲大智行有十種行初有五頌明善入帝網行於一微塵中悉見諸世界至悉能分別知二有十七頌深入時處微細行深入微細智分別諸世界至唯除佛開示三有三頌明了佛心祕密行世界及如來種種諸名號至得至於彼岸前一偈半躡前起後後一偈半正顯難了能了之慧四了三世佛攝化之行過云諸世界廣大及微細至一切悉能知五有二偈明於六根無礙之行出生無礙眼無礙耳鼻身至悉知三世法六有三偈明如化無方行善學一切化剎化眾生化至度脫無邊眾七有十頌明器世間自在行諸佛甚深智如日出世間至知無二非二此中玄妙宜審思之八有六頌明智正覺世間自在行了知諸世間如𦦨如光影至一切無差別九有五頌明非身示身行如來法身藏普入世間中至不著我我所法身藏者即前藏身普賢菩薩自體徧言亦同此也十非量示量行譬如工幻師示現種種事至度無量眾生二即智之悲行亦有十行初無住攝化行未安者令安安者示道場至未曾有退轉二有四偈明非身現身行世間種種身一切悉了知至稱揚不可盡三有一頌明分布舍利行諸佛能現身處處般涅槃一念中無量舍利各差別四有二頌明知佛大心行如是未來世有求於佛果至名住普賢行五有三頌明法輪深入行如是分別知無量諸行地至得無上菩提六有五頌明了知根器行無量無邊心各各差別業至得名為普賢七有三頌明了世業惑行眾生皆妄起善惡諸趣想至一念悉能入八有五頌明了達根境無礙行眼耳鼻舌身意根亦如是至亦復無退轉九有一頌知四種說法行佛說眾生說及以國土說三世如是說種種悉了知剎說等者略有三義一約通力二約融通一說一切說故三約顯理是說菩薩觸境皆了知故則觸類成教如香飯等十有二頌三世攝化行過去中未來未來中現在至邊際不可得平等因竟
