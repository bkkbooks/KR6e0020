body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經二所依住通染淨長行三初標爾時普賢菩薩至有世界海微塵數所依住二釋所謂或依一切莊嚴住然依異者由於心樂有差別故上一樂飾好故或依虗空住樂無礙故或依一切寶光明住樂即質光故或依一切佛光明住怖眾苦故或依一切寶色光明住愛離質光故光作寶色非寶發光或依一切佛音聲住奉聖教故或依如幻業生大力阿脩羅形金手住求神護故或依一切世主身住求天護故或依一切菩薩身住菩薩願力所任持故或依普賢菩薩願所生一切差別莊嚴海住普安眾生故如何廣大世界依有情等小類而住此有二義一外由內感故說依身此復有二一宿因力頌云業力之所持故二現在轉變力即世主菩薩神力任持攝屬己故二由無漏體事大小無礙得相依住三結諸佛子世界海有如是等世界海微塵數所依住二頌有二十二文分兩別初總顯爾時普賢菩薩至觀察十方而說頌言徧滿十方虗空界至處處現前皆可見一切世界依佛神力而住故梵本云一切依佛神通現長行不列者若列則餘九非佛神通故偈以此文該於前十皆佛神力二別頌前文分九初依莊嚴住或有種種諸國土至熾然普現光明海舉能顯所莊嚴之具皆寶成故二依空住或有清淨光明剎依止虗空界而住三依寶住或在摩尼寶海中復有安住光明藏四有一頌依佛光住如來處此眾會海至眾生見者心歡喜稟佛教光成世界故五寶色光明住有以摩尼作嚴飾至覆以妙寶光明網以嚴及覆影顯依住六有二頌佛音聲住或有剎土無邊際至常見無央廣大寶謂妙善所惑音聲有威神故七有一偈頌七八二住或有住於金剛手至常於此處轉法輪兼顯說法八有六偈頌依菩薩身住或依寶樹平均住至斯由業力之所化若樹若水皆菩薩身菩薩現故長行但云菩薩此中兼依佛身此中雖有願力是上宿善所持非普賢願九餘八頌皆頌普賢願所生住三初廣大國土周法界故或有國土周法界至佛力顯示皆令見前偈明淨識所生心外無體故如影像後偈難思業起起不離空二明微細國土調生自在一一國土微塵內至毗盧遮那悉能現然佛力現此亦普賢願収故二段文皆兼佛力三彰剎體性結歸有在一切廣大諸剎土至廣大業力之所持初偈明剎依性有有即非有次半成壞更起猶若尋環後半結歸普願兼顯廣業三形相亦通染淨初長行三初標爾時普賢菩薩至世界海有種種差別形相二釋所謂或圓或方或非圓方至或如眾生形或如佛形非圓方者三維八隅皆非圓方故云無量差別山𦦨形者如山似𦦨皆取上尖對上方圓等故餘並可知三結如是等有世界海微塵數二偈頌有十分二初一總讚勸觀爾時普賢菩薩欲重宣其義至觀察十方而說頌言諸國土海種種別至汝等咸應共觀察二餘七正頌前義兼舉因顯果二初二頌前十段其狀或圓或有方至斯由業廣意無雜摩尼輪者即水漩之類淨𦦨莊嚴頌上山𦦨門闥競開義兼宮殿二七頌前無量差別二初剎由因異剎海無邊差別藏至諸流轉法恒如是二有四頌自在由佛一毛孔內難思剎至毗盧遮那法如是一毛孔內難思剎者更有一理謂修行者居自報土各各不同佛攝眾生所現國土似彼報故重重而現不離一毛四剎體唯約淨剎文二初長行爾時普賢菩薩至或以佛言音為體略辨二十種體然其剎體諸教不同或以八微為體或以唯心為體或法性為體或一切法為體今皆具之謂眾寶等即是八微加佛音聲即九微也一念心現是唯識頓變佛變化者或通果色或一切法令三世間互相作故又融上諸說為無礙剎體言日摩尼輪即日輪也香通質氣佛言為體者無礙體事故又依如來說力起故二偈頌有十爾時普賢菩薩欲重宣其義至觀察十方而說頌言或有諸剎海妙寶所合成堅固不可壞安住寶蓮華頌初二及第六不可壞金剛也或是淨光明出生不可知至依止虗空住此一偈頌第三及第四或淨光為體復依光明住光雲作嚴飾菩薩共游處頌第五一切莊嚴光明或有諸剎海從於願力生猶如影像住取說不可得頌二種體願力生者頌佛力加持如影像現頌妙寶相若兼二事頌佛變化或以摩尼成普放日藏光珠輪以嚴地菩薩悉充滿頌二種體上半頌日輪下半頌微細寶有剎寶𦦨成燄雲覆其上眾寶光殊妙皆由業所得頌寶燄殊妙之言亦兼香也或從妙相生眾相莊嚴地如冠共持戴斯由佛化起頌寶冠寶冠亦佛化變非正頌佛化也或從心海生隨心所解住如幻無處所一切是分別頌一念普現境界或以佛光明摩尼光為體諸佛於中現各起神通力頌一切寶莊嚴示現及頌後三體摩尼光者頌菩薩形寶及寶華蘂佛光明者頌佛音聲聲光成剎故或普賢菩薩化現諸剎海願力所莊嚴一切皆殊妙結歸普賢五剎莊嚴唯明淨剎文二初長行爾時普賢菩薩至如是等有世界海微塵數其中或寶為嚴或人或法或說法修行示現融攝皆為嚴剎以人法為寶故人由說法因等得莊嚴果以果詺因為莊嚴也二偈頌十頌分二初一總顯剎嚴爾時普賢菩薩欲重宣其義至觀察十方而說頌言廣大剎海無有邊至一切十方皆徧滿二有九偈別頌上文無邊色相寶𦦨雲至皆由諸佛能演說初一偈頌初妙雲次一偈頌第二菩薩功德及第四菩薩願海次一偈却頌說眾生業報三世所有諸如來至一切處中皆顯現上六偈如次頌後六事六剎清淨二初長行三初標爾時普賢菩薩至有世界海微塵數清淨方便海方便者唯約淨也若約隨宜攝物佛應統之則淨穢皆稱佛土若就行致唯淨非穢然淨有二種一世間淨離欲穢故以六行為方便上二界為淨土二出世間淨此復二種一者出世所謂二乘以緣諦為方便權教說之無別淨土約實言者出三界外別有淨土二乘所居智論有文二出世間上上淨此謂菩薩即以萬行而為方便以實報七珍無量莊嚴而為其上今此正明菩薩兼顯二乘然出世上上淨中復有二種一者真極佛自受用相累兼亡而為方便二者未極等覺已還故仁王云三賢十聖住果報唯佛一人居淨土未極之中復有二種一八地已上一向清淨以永絕色累照體獨立神無方所故其淨土色相難名二七地已還未出三界無漏觀智有間斷故非一向淨若依瑜伽入初地去方為淨土三賢所居皆穢非淨此分受用變化別故約此經宗十信菩薩即有淨土故今此文始自近友終成佛力皆淨方便故通萬行然淨方便即是淨因長行亦可為等流果如云久近善友得生有善友之剎中故即十事皆淨相也然望莊嚴有同約門別故望具因緣當知亦爾又起具因緣通於染淨此則唯淨莊嚴多約其果清淨多約其因又前多修善此多治惡故於世界此如洗滌彼如粉繪二釋所謂諸菩薩親近一切善知識同善根故近友同善根如善財夜天處廣說增長廣大功德雲徧法界故知導慈雲大彌法界淨修廣大諸勝解故法門勝解皆已淨治上三約位地前也觀察一切菩薩境界而安住故即初地證徧行如故云觀察一切境界生如來家故云安住修治一切諸波羅蜜悉圓滿故見道之後修道位故餘雖未滿一切皆修若約圓融亦得稱滿觀察一切菩薩諸地而入住故初地勝進徧學十地行法後後但是法行故上三皆初地出生一切淨願海故初地發願順行至第八地一切皆成故名出生一切願海而言淨者純無漏故修習一切出要行故即九地二乘出要唯止與觀菩薩出要唯無礙辨令眾出故入於一切莊嚴海故十地二嚴皆成滿故成就清淨方便力故即是普賢佛功德也十中前三變化淨因後七受用淨因上欲總收諸土故依次豎配若約橫修初心即可圓具三結如是等有世界海微塵數一偈頌九偈分二初一總明能所淨爾時普賢菩薩欲重宣其義至觀察十方而說頌言一切剎海諸莊嚴至無量清淨業力起前半方便後半清淨皆上句果下句因二八別頌前文久遠親近善知識至國土無邊悉清淨初四如次頌上四淨初地慈悲為首故云為生修行徧滿真如故云廣大第五偈頌修治淨及超頌第七願淨以願通初地八地此據初地故超頌也第六偈頌前第八出要第七偈頌第九及却頌觀菩薩地地義通前後故第八偈頌方便力上來且配長行其間亦兼餘義七佛出差別二初長行三初標爾時普賢菩薩至有世界海微塵數佛出現差別二釋所謂或現小身或現大身至或示調伏無邊眾生十事五對於海及種有此差別五中初二隨彼類故次一緣廣陿故次一隨機宜故五熟未熟故三結如是等有世界海微塵數二偈頌十頌分三初總標爾時普賢菩薩欲重宣其義至觀察十方而說頌言諸佛種種方便門至此是如來善權力二有五偈別釋如次頌前五對諸佛法身不思議至開悟群迷無有數三四總結或於毛孔出化雲至一切國土皆周徧既隨心總徧故剎海塵數未足為多八劫住不同調剎住經停時分也隨能感因有長短故文二初長行三初標爾時普賢菩薩至有世界海微塵數劫住二釋所謂或有阿僧祇劫住至或有不可說劫住略列有十大數更有多少不同如標結中及頌所顯並通諸剎不謂淨長如大地獄其壽更長人趣却促故極惡極善受時即多更約異門亦不可定也十中唯九者欠不可說不可說也並如阿僧祇品三結如是等有世界海微塵數二偈頌然劫但時分無別義理故此偈文轉勢頌之分三初二總標爾時普賢菩薩欲重宣其義至觀察十方而說頌言世界海中種種劫至以佛音聲今演說許說頌上標也二一通頌上列我見十方諸剎海至以願種種各不同兼顯脩短之因以願力故三有七頌總結或有純淨或純染至以一方便皆清淨偈各一義一明修短通於染淨結以心想二淨劫住久釋以因深三列諸劫名染淨相攝四佛興願異故入劫不同五一多互融齊攝雙現六時法相攝普入無邊七結由心想示以方便一方便者即了唯心也一念與劫並由想心心想不生長短安在非長非短是謂清淨不壞於相則劫海無邊九住劫轉變差別二初長行三初標爾時普賢菩薩至有世界海微塵數劫轉變差別此有二種一者但約感成住壞劫皆名轉變二唯約住劫之中居人善惡令染淨轉變二釋具二初一即是前義所謂法如是故世界海無量成壞劫轉變言法爾者法爾隋業轉也若爾何異起具因緣因緣意在於因轉變意彰於果又因緣通有唯成不壞如自受用因是也二九釋後義染汙眾生住故世界海成染汙劫轉變遇惡緣故淨變為染下文云泉池皆枯涸等修廣大福眾生住故世界海成染淨劫轉變修人天大福令世界多染少淨故先云染如下文云粳米自然生等信解菩薩住故世界海成染淨劫轉變即地前以未斷障故非純淨以淨多故故先云淨經多云染淨與前何別或譯人之失或傳寫之誤無量眾生發菩提心故世界海純清淨劫轉變即證發心居受用土故但云純淨諸菩薩各各游諸世界故世界海無邊莊嚴劫轉變各各游者即二地至十地諸菩薩游戲神通以多莊嚴而嚴一剎或以一嚴而嚴多剎所至染剎則能莊嚴也十方一切世界海諸菩薩至無量大莊嚴劫轉變大莊嚴者即普賢位嚴於微塵內剎如上口光召眾等是諸佛世尊入涅槃故世界海莊嚴滅劫轉變莊嚴滅者明失善緣而惡現謂如來示滅能事隨滅佛滅百年乳不及水況今之世況於減極稗為上味鐵為上嚴諸佛出現於世故一切世界海廣博嚴淨劫轉變如彌勒來也如來神通變化故世界海普清淨劫轉變以佛神通于何不淨淨名足指案地法華三變淨土即其類也上之十事初總餘別不出業故又初二屬凡次四菩薩後三屬佛又約佛菩薩即染令淨約於凡夫即淨成染三結如是等有世界海微塵數二偈頌爾時普賢菩薩欲重宣其義至觀察十方而說頌言一切諸國土皆隨業力生至一切普清淨十頌如次頌前可知十無差別二初長行三初標爾時普賢菩薩復告至有世界海微塵數無差別謂前九辨諸世界約相不同隨業染淨由於眾生有差別故今云無差性無二故故偈云業性起也又約權設則種種差別今約實說則一切無差如教法中或說三乘即是差別說華嚴時一切無差又皆是諸佛之所用故一一融攝等無異故故前九差別是此無差之差今此無差即是前九差之無差也故法華云眾生見燒淨土不毀二皆相即由依此義說淨土中十八圓滿一一稱真皆周徧故二釋所謂一一世界海中有世界海微塵數世界無差別海中包數同則盡海之塵一塵一剎已是含攝之義一一世界海中諸佛出現所有威力無差別佛示威力同一一世界海中一切道場徧十方法界無差別道場同同真性故一一世界海中一切如來道道場眾會無差別眾會同常隨眾故一一世界海中一切佛光明至法輪方便無差別次四光明名號音聲法輪方便文並可知上七皆約不動一而普徧無差一一世界海中一切世界海普入一塵無差別塵含剎海一一世界海中一一微塵至皆於中現無差別塵容佛剎此二約不壞相而廣容無差三結諸佛子世界海無差別至微塵數無差別二偈頌爾時普賢菩薩欲重宣其義至觀察十方而說頌言一微塵中多剎海至以願力故徧世間十頌如次頌上十義但第六約身與前名體異耳而前但約平漫無差今顯塵內重疊融攝無差之義若云約共同事者何以不言染同苦同豈世界海中都無此耶此下入第八卷經華藏世界品第五初來意者前品通明諸佛剎海今此別明本師所嚴依果答世界海問故次來也二釋名者準梵本具云華藏莊嚴嚴具世界海之徧清淨功德海光明品譯者嫌繁乃成太略處中應云蓮華藏莊嚴世界海品謂蓮華令子之處目之曰藏今剎種及剎為大蓮華之所含藏故云華藏其中一一境界皆有剎海塵數清淨功德故曰莊嚴世界深廣故名為海有云世界依海故立海名者恐非文意以下云華藏莊嚴世界海住在華中故其梵云嚴具即是能嚴其徧清淨功德海光明即顯嚴之相用依體有用故致之言今文舉體攝用但云華藏約事可爾何因剎海相狀如期略舉二因一約眾生如來藏識即是香海亦法性海依無住本是謂風輪亦妄想風於此海中有因果相恒沙性德即是正因之華世出世間未來果法皆悉含攝故名為藏若以法性為海心即是華含藏亦爾然此藏識相分之中半為外器不執受故半為內身執為自性生覺受故如來藏識何緣如此法如是故行業引故二約諸佛謂以大願風持大悲海生無邊行華含藏二利染淨果法重疊無礙故所感剎相狀如之是以出現品中多將世界以喻佛德細尋文意乃由佛德世界如之三宗趣者別顯本師依報具三世間融攝無盡為宗令諸菩薩發生信解成就行願為趣餘如前品但總別異耳融攝之相亦見前文賢首立華藏觀復有十德大同小異如彼文說四釋文一品分三三段如次釋華藏莊嚴世界之名今初華藏因果自體二初長行二初舉果屬人顯因深廣爾時普賢菩薩復告大眾言至是毗盧遮那如來謂指此剎海是我本師修因所淨然因深廣有三勝相往昔於世界海微塵數劫修菩薩行時一長時修剎海塵劫故不唯三祇一一劫中親近世界海微塵數佛二於多劫一一遇多勝緣不唯勝觀釋迦等佛一一佛所淨修世界海微塵數大願之所嚴淨三於多勝緣一一淨多大願願淨國等不唯淨一無生忍等由上三重故云深廣然瑜伽起信等約三乘教一方化宜一類世界定說三祇今約一乘該通十方及樹形等界故云剎海塵數是以寶雲經言我為淺識眾生說三僧祇劫修行然實經無量阿僧祇劫修諸勝行又時無別體依法上立法既無盡時亦無窮況念劫圓融文應尅執二彰果體相者植因既深果必繁奧然所依剎量諸教不同小乘但一娑婆三乘有大小之化或色究竟為實或他方別有淨今一乘十佛之境大小無礙淨穢相融且依一相說有邊表實則一重橫尋無邊況復重重塵含法界然準下別顯應有十事一所依風輪二風持香海三海出蓮華四華持剎海五繞臺輪山六臺面寶地七地有香海八海間香河九河間樹等十總結多嚴今文之中唯闕一河文且分四第一能持風輪第二所持香海第三海出蓮華第四華持剎海然其剎因有其總別已見上文為顯別義且明一因成於一果今初風輪之因即大願等亦如前釋於中文三初總標數諸佛子此華藏莊嚴至有須彌山微塵數風輪所持二略列名其最下風輪名平等住至一切寶色香臺雲平等住者一徧持諸位故二稱實性故餘名可知風並在下寶在臺面以力遙持三別舉最上諸佛子彼須彌山微塵數風輪至名殊勝威光藏舉最上者勝力能持香海故立其名二所持香海能持普光摩尼莊嚴香水海以摩尼發光普照一切嚴海底岸及寶色香水故立此名又藏識名海其德深廣故流注名水剎那性故又佛性名水遠熏名香聞未證故涅槃亦云有人聞香三所出蓮華此香水海有大蓮華名種種光明蘂香幢蘂放異光又發勝香高出降伏故立此名又所發萬行一一覺性故曰光明皆能普熏即香義也四所持剎海華藏莊嚴世界海住在其中至地海眾樹各有區別四方均平總顯形相清淨堅固彰其體性金剛圍等別明所有即下別顯此為其本一山二地三海四樹各別區分即總顯多嚴但闕一河以下有別顯故此略明下亦略頌二偈頌然長行偈頌有十例五對謂有無廣略離合先後為八九或超間十或頌已重頌故釋頌文不可一例上下準之此文略有四例一宿因現緣經離頌合二所成果相經略頌廣三現緣風輪經廣頌略四山地海樹經有頌無十頌分二初二頌上因相是時普賢菩薩欲重宣其義至觀察十方即說頌言世尊往昔於諸有至今此世界無諸垢即辨因招果也二餘偈頌其果相四初頌風輪放大光明徧住空至以昔願力空中住皆上句所持下句能持初半偈以果持果後偈兼明能成之因前半離障願令清淨故後半無礙願依空住故二頌香海種種堅固莊嚴海至普詣十方光熾然尋此了名三有三偈半頌蓮華光𦦨成輪妙華飾至普應羣心無不盡初一偈半釋種種光明蘂則顯此華以寶為體次一偈釋香義就法以明寶中出佛佛出世主如從質發香遠熏之義後一釋幢義演佛是高出義調生是摧伏義四有二頌明剎自在總頌上所持剎海華藏世界所有塵至所有莊嚴從此出初偈自在一一稱性故即同時具足相應門也心塵準思寶光現佛者依正互融故後偈結歸普因故能含攝二別顯安布莊嚴文六初輪山則是本師清淨戒德內攝外防之所成也長行中三初總舉所依爾時普賢菩薩復告大眾言至住日殊王蓮華之上山所依處即地面四周日珠王者所依處地故舊經云依蓮華日寶王地住亦有言大華之上別有此蓮為山所依義似不順所以地受此名者前華名種種光明蘂偈中云光𦦨成輪又云一切寶中放淨光等明知此華以寶為體是則如日輪之珠王以為蓮華也斯即總華之稱二別顯體相栴檀摩尼以為其身前取堅利且云金剛今明具德略有十相上句身為總形摩尼圓明栴檀芬郁皆戒之德也威德寶王以為其峯山峯謂秀出孤絕威伏諸惡妙香摩尼而作其輪山輪古有二義一山彎曲之處二山腹朓出如師子座半月為輪準下偈文輪居山下為山所依𦦨藏金剛所共成立成山之緣上舉三事各別有體今顯金剛內含光𦦨徧成其體如世土石雜而成山金剛徧故得金輪名上四自體圓滿下六外相莊嚴一切香水流注其間至摩尼為網周帀垂覆並在山間文顯可知三結德無盡如是等有世界海微塵數眾妙莊嚴三應頌有十分二初六山體相莊嚴頌前別顯五初一總頌圍山爾時普賢菩薩欲重宣其義至觀察十方而說頌言世界大海無有邊至此由如來神力起初句所圍次二句能圍後句出因言無邊者有其二義一但總相顯多故云無邊實有邊表二說有圍山外者是無邊之邊不礙理而即事故今云無邊者是邊之無邊不壞相而即理故二有一頌頌前山輪摩尼寶輪妙香輪至清淨輪圍所安住三有一頌頌前山體堅固摩尼以為藏至內外映徹皆清淨四成山緣金剛摩尼所集成至放淨光明普嚴麗五有二頌頌前水等諸嚴及加衣等香水分流無量色至光雲四照常圓滿二四頌辨山妙用自在亦顯依正無礙即頌前結文無量無邊大菩薩至佛自在力或令徧二臺面寶地即體心性定之所成也長行三初標所在爾時普賢菩薩復告大眾至大輪圍山內所有大地二別顯體相莊嚴一切皆以金剛所成堅固莊嚴不可沮壞一地體標以金剛釋以堅固不壞徧華藏地盡是金剛故上菩提場地徹華藏也清淨平坦無有高下二地相平淨下八皆莊嚴摩尼為輪飾以寶輪眾寶為藏畜以寶藏一切眾生種種形狀諸摩尼寶以為間錯間以異寶散眾寶末布以蓮華散寶末布蓮華此二文顯香藏摩尼分置其間分置香藏摩尼之寶諸莊嚴具充徧如雲至所有莊嚴而為校飾充以莊嚴具但云諸嚴嚴有多少三世佛國之嚴而為嚴者顯無盡之嚴具也摩尼妙寶以為其網至如天帝網於中布列覆以寶網隱映莊嚴網有何用普現佛影此網何相如天帝網而布列也又此帝網重現無盡成上普現如來境界及上一一境界皆無盡也三總結諸佛子此世界海地有如是等世界海微塵數莊嚴二偈頌十頌分二前七頌前別顯三初四頌前八句爾時普賢菩薩欲重宣其義至觀察十方而說頌言其地平坦極清淨至普覆於地為嚴飾小不次者顯前無優劣故或重或廣者顯義無方也恐繁不配可以意得二頌嚴具如雲密雲興布滿十方至於此寶中無不見三一偈頌如天帝網其地所有摩尼寶至一切國土亦入中謂一寶既收一切則彼剎諸塵復攝一切即重重也三總結妙寶莊嚴華藏界至如是一切諸神變結其所屬初偈結屬道場次屬佛力後結能知之人
