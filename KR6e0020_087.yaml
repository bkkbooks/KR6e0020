body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經十有九門明真實位中行初觀察智五初標佛子菩薩摩訶薩有十種智慧觀察亦由不捨深大故能觀察二徵何等為十三釋所謂善巧分別説一切法至無有障礙智慧觀察前問但言觀察者説智慧言十句準思四結是為十五勸若諸菩薩安住其中則得如來無上大智慧觀察二説法智五初標佛子菩薩摩訶薩有十種説法由能內觀故能外説二徵何等為十三釋所謂説一切法皆從緣起説一切法皆悉如幻上二説俗下八説真説一切法無有乖諍無二可諍説一切法無有邊際體德兼廣説一切法無所依止相深遠説一切法猶如金剛體堅利説一切法皆悉如如如如不動説一切法皆悉寂靜體絶百非説一切法皆悉出離在纏不染説一切法皆住一義本性成就體相一味四結是為十五勸若諸菩薩安住其中則能善巧説一切法三離障智五初標佛子菩薩摩訶薩有十種清淨此離障智晉名無垢二徵何等為十三釋所謂深心清淨斷疑清淨至一切善根清淨雖同清淨所淨不同十中與七淨有開合不同在文易了七淨如五地初辨四結是為十五勸若諸菩薩安住其中則得一切如來無上清淨法四審決智印五初標佛子菩薩摩訶薩有十種印以清淨智決定印可一切法故故晉本中名為智印後所結益亦是智印亦猶三法印等二徵何等為十三釋初於安受苦境忍智不動所謂菩薩摩訶薩知苦苦壞苦行苦至是為第一印二他不饒益忍行決定菩薩摩訶薩見有衆生愚癡狂亂至是為第二印三諦察法忍菩薩摩訶薩聞説與一切智相應至是為第三印於深佛法信忍決定四決定成佛度脫衆生菩薩摩訶薩又作是念我發深心至是為第四印五決定知佛智無邊菩薩摩訶薩知如來智無有邊際至是為第五印六決欲佛果不退菩薩摩訶薩於阿耨多羅至是為第六印七決不顧身命以親人法菩薩摩訶薩行菩薩行不顧身命至是為第七印八決度已入大乘法者菩薩摩訶薩若見善男子善女人至是為第八印九決平等度菩薩摩訶薩令一切衆生得平等心至是為第九印十決同佛體因圓果滿菩薩摩訶薩與三世諸佛同一善根至是為第十印四結佛子是為菩薩摩訶薩十種印五勸菩薩以此速成阿耨至具足如來一切法無上智印五照徹智五初標佛子菩薩摩訶薩有十種智光照由印定故照徹無礙二徵何等為十三釋所謂知定當成阿耨至滿足一切諸波羅蜜智光照四結是為十五勸若諸菩薩安住此法則得一切諸佛無上智光照六無等智五初標佛子菩薩摩訶薩有十種至聲聞獨覺悉無與等由前照徹故不偏住著雙住事理名無與等二徵何等為十三釋所謂菩薩摩訶薩雖觀實際至是為第十無等住皆權實雙行或即寂之用即用之寂等並顯可知四結佛子是為菩薩摩訶薩十種無等住五勸若諸菩薩安住其中至一切佛法無等住此下入第五十五經七無劣智五初標佛子菩薩摩訶薩發十種無下劣心上既望下無等今亦望上無劣於十勝事皆決作故名無下劣所以晉經亦無怯弱二徵何等為十三釋十句五對初降魔制外對佛子菩薩摩訶薩作如是念至是為第二無下劣心二喜他自滿對又作是念我當於一切衆生至是為第四無下劣心三積福成智對又作是念我當積集一切福至是為第六無下劣心四下化上成對又作是念我當以無上教化至是為第八無下劣心上四單辨五悲智究竟對即是雙行初即智之悲而悲智雙行又作是念我修菩薩行時至是為第九無下劣心雖悲而不求果報二即悲之智而權實雙行四初列所知又作是念三世所有一切諸佛至一切寂滅涅槃界二辨能知如是一切種種諸法至悉見悉證悉修悉斷謂知苦覺忘見理證滅修道斷集三拂彼知相然於其中無分別離分別至無功德無境界能知無分別故無功德所知無種種故無境界四會歸中道廣辨雙行二初總辨中道非有非無非一非二二境智對明以不二智知一切二至以無盡智知一切盡皆以實智知權顯雙行無礙於中異約豎論變異差別約橫辨不同三即體起用以辨雙行以究竟法界智於一切世界至是為第十無下劣心四結佛子是為菩薩摩訶薩發十種無下劣心五勸若諸菩薩安住此心則得一切最上無下劣佛法八高出智五初標佛子菩薩摩訶薩於阿耨多羅至十種如山增上心由無下劣故萬行迥出難仰其高於勝決作故直趣菩提不可傾動二徵何等為十二釋十初勤修能證智佛子菩薩摩訶薩常作意至是為第一如山增上心二常觀所證理恆觀一切法本性空無所得是為第二如山增上心三內修無漏願於無量劫行菩薩行至是為第三如山增上心四外近善人為求一切佛法故等心敬奉諸善知識無異希求為名利為異求無盜法心從他聞言已解為盜法觀佛三昧經説此人墯地獄如箭射後學誡之唯生尊重未曾有意至是為第四如山增上心五大忍度主若有衆生罵辱毀謗至更令增長無有休息弘誓更增者若薪熾於火何以故菩薩於一切法至是為第五如山增上心六決超魔境菩薩摩訶薩成就增上大功德至住佛境故由成勝德而不著唯法樂以自資則魔境皆為佛境是為第六如山增上心七勤勇修行菩薩摩訶薩為求阿耨多羅至行菩薩行無有休息攝論云愚修雖少時怠心疑已久佛於無量劫勤勇謂須臾是為第七如山增上心八不捨惡人菩薩摩訶薩知一切衆生至是為第八如山增上心九孤標等佛菩薩摩訶薩復作是念至是為第九如山增上心十權實雙行四初正辨雙行菩薩摩訶薩作如是觀至阿耨多羅三藐三菩提願二徵釋二初徵何以故徵意有二一云修須稱理理既無得願何不捨既不捨願何用觀無進退有妨二釋菩薩求一切法皆無所得至三藐三菩提釋亦二意一云若有所得不得菩提以無得故出生菩提雖不捨願須觀無得二云無得之法非在得外要求一切法方盡無得之源故欲證無得須不捨菩提之願三結成雙行是故於法雖無所得至其心於此不驚不怖四顯其離過不作是念若一切法至求於無上菩提之道謂不怖空而不求故是為第十如山增上心四結佛子是為菩薩摩訶薩至十種如山增上心五勸若諸菩薩安住其中至無上大智山王增上心九深廣智五初標佛子菩薩摩訶薩有十種入至三藐三菩提如海智非但求升聳峻抑亦智體包含二徵何等為十三釋二初四即四無量界所謂入一切無量衆生界至是為第四如海智後六並佛界無量開出初入三世佛善根菩薩摩訶薩於過去未來現在至是為第五如海智二入過去佛界菩薩摩訶薩於念念中至是為第六如海智三入未來佛界菩薩摩訶薩入未來世至是為第七如海智四入現在佛界菩薩摩訶薩入現在世至是為第八如海智五供多佛菩薩摩訶薩於不可説至是為第九如海智六求多法菩薩摩訶薩於一切佛所至是為第十如海智四結佛子是為菩薩摩訶薩十種至三菩提如海智由此因海得入果海五勸若諸菩薩安住此法則得一切諸佛無上大智慧海大文第四有二十九門答二十九句回向位中行若并無礙總句有三十門古德分三初十一門明回向位中行體堅固次一十二門明行用自在後七門明行德圓備今亦隨次配十回向於中初有四門明初回向二三回向各有二門四五六七各唯一門第八回向即十無礙九有三門十有四門至文當知今初四門明救護衆生離衆生相回向位中之行即分為四初明回向善根四初標佛子菩薩摩訶薩於阿耨多羅至有十種如寶住所住善根可貴圓滿故二徵何等為十三釋初供事多佛佛子菩薩摩訶薩悉能往詣至是為第一如寶住二聞法受持於不思議諸如來所至是為第二如寶住三自在受生於此剎歿餘處現生至是為第三如寶住四説本末法知從一法出一切法而能各各分別演説先從本起末如無量義從一法生其一法者所謂無相以一切法種種義究竟皆是一義故後攝末歸本釋成上義是為第四如寶住五知斷自在知厭離煩惱知止息煩惱資糧道厭息知防護煩惱加行道防護知除斷煩惱無間道斷除而不取修菩薩行不證實際究竟到於實際彼岸解脫道證入為異二乘留惑不斷方能究竟斷證故方便善巧善學所學至皆得成滿身不疲倦云何不證方便巧學無邊佛法滿昔弘願故如箭射空筈拄故是為第五如寶住六悲智雙行知一切衆生心所分別至是為第六如寶住七知性相無礙知一切法皆同一性至是為第七如寶住八無得之得菩薩摩訶薩求佛不可得至是為第八如寶住九觀空滿願菩薩摩訶薩知善巧説法至是為第九如寶住十受行無厭菩薩摩訶薩於不思議至不驚不怖不迷不惑上正顯下釋成知如來智不思議故至是為第十如寶住四結勸佛子是為菩薩摩訶薩至則得諸佛無上大智慧寶二大願救護四初標佛子菩薩摩訶薩發十種如金剛大乘誓願心雖回向皆願此在初故謂於當作事及現作行皆無齊限要心堅固窮其際故二徵何等為十二釋十初法門無盡誓願知佛子菩薩摩訶薩至是為第一如金剛大乘誓願心二衆生無邊誓願度菩薩摩訶薩又作是念至第二如金剛大乘誓願心三嚴剎菩薩摩訶薩又作是念至第三如金剛大乘誓願心四回向菩薩摩訶薩又作是念至第四如金剛大乘誓願心五供佛菩薩摩訶薩又作是念至第五如金剛大乘誓願心上三願成佛果上五皆約當成並橫論無畔次二約其現作皆豎深無際六見聞無著佛子菩薩摩訶薩至是為第六如金剛大乘誓願心七安忍不亂佛子菩薩摩訶薩或被衆生至或挑其目或級其頭斬首為級如是一切皆能忍受至第七如金剛大乘誓願心上二誓斷煩惱後三亦當成八遍於時處修行二利佛子菩薩摩訶薩至是為第八如金剛大乘誓願心九以心要成無際大行佛子菩薩摩訶薩至是為第九如金剛大乘誓願心十即寂起用三初悟寂佛子菩薩摩訶薩知佛不可得至涅槃住實際住二起用而亦不捨一切大願至不捨莊嚴世界三釋成於中文有三重徵釋初一番何以故菩薩摩訶薩至於諸衆生心不捨離意云所以即寂而用者由以本願智不捨悲故二次番何以故一切諸法皆無所有至於諸法性分明照了所以智不捨悲者智亦為物故三後番二初徵何以故徵意云何以要此雙行二釋有二義初諸佛皆爾一切諸佛安住寂滅至我今云何而捨大悲二我先願勝又我先發廣大誓願至第十如金剛大乘誓願心四結勸佛子是為菩薩摩訶薩至金剛性無上大神通智
