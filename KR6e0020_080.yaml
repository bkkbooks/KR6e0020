body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經如來出現品第三十七初來意者前品明稱果之因此品辨如因之果體雖平等不壞二相先因後果義次第故亦為答前不思議品出現念故答第二會所行問故會釋如前二釋名者如來是有法之人即三身十身之通稱出現是依人之法果用化用之總名如來雖見上文對出現故重辨十身十身皆有出現之義而今且寄三身以明然來即出現為分人法曉喻分明故重辨之若依法身如來者即諸法如義如理常現名為出現故下文云普現一切而無所現又云體性平等不增不減等若依報身乘如實道來成正覺故曰如來本性功德一時頓顯名為出現故下文云如來成正覺時於一切義無所疑惑普見一切眾生成正覺等若依化身則乘薩婆若乘來化眾生故曰如來即應機大用一時出現故偈文云以本願力現佛身令見如來大神變又云隨其勢力於菩提樹下以種種身成正覺等今以新佛舊成曾無二體新成舊佛法報似分無不應時故即真而應應隨性起故即應而真三佛圓融十身無礙故辨應現即顯真成是以晉經名性起品性字雖是義加未爽通理以應雖從緣不違性故無不從此法界流故以淨奪染性即起故若離於緣性叵說故下加性起菩薩表所說故妄雖即性不順性故今以起義多含直云出現從性從因從真從感皆出現故若言唯辨應身出現非唯失前性因二義亦未足顯深何能融前差別之果若以來為現義如來即出現持業釋也若分人法三身皆如來之出現揀餘出故第三宗趣即以平等出現為宗融差別果而為其趣四正釋文文為七分初加分二初毫光加請主文三初光中有十義束為三初一出處次一名體餘八業用初光出處爾時世尊從眉間眉間放者表證中道離有無二邊故表無住道離真應二邊故白毫相中白毫者表所出現性無垢故能詮出現諸教本故二辨光名體放大光明名如來出現如所說故後有八段皆是光業三眷屬光即是因業無量百千億那由他阿僧祇光明以為眷屬總攝諸法皆此生故四舒業其光普照十方盡虗空法界一切世界右繞十帀五敬業顯現如來無量自在六覺業覺悟無數諸菩薩眾震動一切十方世界七止業除滅一切諸惡道苦八降伏業映蔽一切諸魔宮殿九示現業顯示一切諸佛如來至及以一切道場眾會十卷業作是事已而來右繞菩薩眾會二正明加相入如來性起妙德菩薩頂所以偏加此菩薩者如名所顯故性有二義一種性義因所起故二法性義若真若應皆此生故亦有釋云性起妙德即是文殊說此法門加性起稱作此釋者無違大理以文殊大智為能顯普賢法界為所顯共成遮那之出現故亦是解行滿故佛出現也從頂入者是加持相妙智之極方能顯故三加益二初大眾同欣知法將被時此道場一切大眾至必當演說甚深大法二妙德領旨知佛世尊令求說主二初長行身心致敬爾時如來性起妙德菩薩至一心向佛而說頌言跽者跪也二偈頌讚請十偈分二初五偈讚二初一總讚申敬正覺功德大智出至是故我今恭敬禮二有四偈別讚已升無相境界岸至與一切佛同其性初三讚果後一讚因二偈請五初一自敘得益即是領旨導師放此大光明至而復還來入我身二有一偈領眾意請決定法中能善學至是故我令請法王三有一偈歎眾堪聞令此眾會皆清淨至如是賢勝咸來集四有一偈敘佛令請利益世間尊導師至令我問於無上法五有一偈正求法主誰於大仙深境界至世間尊導願顯示已領佛意故不請佛二口光加說主者示所請故文中有三初光亦十初出處爾時如來即於口中口中放者表教道傳通故二光名放大光明名無礙無畏令得無礙辯不畏大眾及深理故三因業百千億阿僧祇光明以為眷屬四舒業普照十方盡虗空等法界一切世界右繞十帀五敬業顯現如來種種自在六覺業開悟無量諸菩薩眾震動一切十方世界七止業除滅一切諸惡道苦八降伏業映蔽一切諸魔宮殿九示現業顯示一切諸佛如來至及以一切道場眾會十卷業作是事已而來右繞菩薩眾會二正明加相入普賢菩薩摩訶薩口光入口者教以口傳故如佛說故加普賢者是普賢行之果故所證法界由理顯故三明得益其光入已普賢菩薩身至唯除如來師子之座唯除如來揀師資故二本分二初徵事而問爾時如來性起妙德菩薩至世莫能知是何瑞相二引例以答答即是本普賢菩薩摩訶薩言至今現此相當說其法三表瑞證成說是語時一切大地悉皆震動顯說希奇纔聞其名已有徵故大地動者大法將顯大惑將傾故出生無量問法光明出問法光者冥加智慧助發請故三請分二初長行四初總舉法請時性起妙德菩薩至出現之法願為我說二歎眾堪聞佛子此諸無量百千億至無量功德皆已來集三歎說主具德別歎十事佛子汝已曾於無量百千億那由他佛所承事供養供多佛必曾聞故成就菩薩最上妙行成妙行曾已修故於三昧門皆得自在定自在有所依故入一切佛祕密之處親證入故知諸佛法知教道故斷眾疑惑除他疑故為諸如來神力所加上力加故知眾生根審相器故隨其所樂為說真實解脫之法能隨說故隨順佛智演說佛法列於彼岸順智到岸得意深故後總結十德有如是等無量功德既有說德堪宜說故四標章別請善哉初句讚善躡前三段次別十事以顯無盡佛子願說如來應正等覺出現之法此是總相總集多緣成出現法法含持軌餘九是別身相言音心意即三業祕密境界即智之所緣亦分齊境所行之行依境修行通因通果成道成菩提道轉法既成菩提心轉法輪乃至示現入般涅槃應成菩提必示涅槃見聞親近所生善根若存若亡見聞皆益備斯九事一化始終有云初一所依之法餘九能依之德亦有斯理如是等事願皆為說即結請也二偈請十偈分三初一讚德標請頌前三段時如來性起妙德菩薩至向普賢菩薩而說頌曰善哉無礙大智慧至佛子聞已皆欣慶第二有四偈舉法別請頌前第四段菩薩云何隨順入至有何等利願宣說三有五偈歎德勸請通頌後三段於中有四初總讚以請此諸菩薩皆合掌至淨眾生有願為說二有二偈勸說之方願以因緣及譬喻至示佛菩提亦如彼以法深難領故請說因喻三有一偈半歎眾堪聞十方千萬諸佛土至於微妙義生渴仰四有半偈結請所說願以淨心具開演如來出現廣大法淨心顯說無過具演文義周圓四說分大分為二初別答十問十段各有長行及與偈頌一一具十今初答出現之法長行二初標告歎深爾時普賢菩薩摩訶薩至佛子此處不可思議二隨義別顯三初法說廣酬前因緣三初標所謂如來應正等覺以無量法而得出現總標多因成出現果二釋二初徵以總釋何以故非以一緣非以一事如來出現而得成就緣約能成之緣事即所成因體上反釋下順釋以十無量百千阿僧祇事而得成就向言無量乃是總相今此明有十箇無量以顯無盡理實則有百千阿僧祇數無量此十無量皆徧十喻言百千者古人云以十無量入中十喻已成一百以後結中十句一一結前百門為千其中更有別義方成無量今以下別列十門之中門門皆云以無量因則不俟相入是知百千之言但是數之總稱耳二徵數別明何等為十所謂過去至一切眾生菩提心所成故一始發大心誓期出現故此心何相過去無量清淨殊勝志樂所成故二明上求勝志過去無量救護一切眾生大慈大悲所成故三明下化慈悲過去無量相續行願所成故四行以續願此行謂何過去無量修諸福智心無厭足所成故五明不出福智過去無量供養諸佛教化眾生所成故六別顯福嚴過去無量智慧方便清淨道所成故七別明智嚴過去無量清淨功德藏所成故八淨前功德過去無量莊嚴道智所成故九嚴前智慧所謂方便道教道證道無住道正道助道一道二道等皆莊嚴故過去無量通達法義所成故十窮究法源真實智故三結佛子如是無量阿僧祇法門圓滿成於如來既皆過即積因多法圓滿令二利果一時出現故出現言通真通應二喻明深廣雙酬因喻十喻分十每喻各三謂喻合結喻酬譬喻合酬因緣故云非以一緣一事而得出現又前法說多約往因此中合文多約現緣今初大千興造喻也此喻為總總喻眾緣以成出現故經云以無量緣等下說雲雨皆此所霔文中分三初喻四初總辨多緣佛子譬如三千大千世界至非以一事而得成就上反下順以無量緣緣即因緣如眾生業及風雨等無量事事即事相如所持水及宮殿等方乃得成二別顯緣相所謂興布大雲降霔大雨先明雲雨上霔次明風輪下持四種風輪相續為依其四者何至能持大水故能持者若無此輪雨無停處二名能消能消大水故水若不減礙起天宮三名建立建立一切諸處所故水雖已減假此成立謂減一節水起一重天如嚴冬急流重重冰結四名莊嚴莊嚴分布咸善巧故雖起總處無別莊嚴故須第四三顯彼因起如是皆由眾生共業謂上雲等略由二因一眾生外增上業言共業者謂多有情應生此界共業同變於中有四句謂共中共等及諸菩薩善根所起二菩薩善根此有二意一約同居謂地前菩薩二約能化謂隨諸眾生應以何國起菩薩根等便修彼因以取彼國故有眾生之類即菩薩佛國次顯受用果令於其中一切眾生謂先成器界後起眾生依之而住如俱舍婆沙等辨各隨所宜而得受用謂水族眾生得水受用等又人天羅剎宮殿無礙菩薩眾生淨穢同居四性相結成佛子如是等無量因緣乃成三千大千世界結前生後法性如是正結此句為總此法性言通於性相餘句別顯性空亦遮其妄計無有生者謂非冥性微塵等生無有作者亦非自在梵王等作無有知者亦無神我而為能知上三顯能作空無有成者顯所作空然彼世界而得成就雖能所俱空不礙相有故云而得成就如是無礙方為法性如是之義二法合如來出現亦復如是至成就如來無漏善根力故前三是因圓後一二利果滿因圓果滿佛出現故一品之內多以依報喻正報者非唯義類於似實則外由內變故令外器全似於內是以上云皆由菩薩善根所起眾生共業之所生等華藏品中已略開顯如來如是成等正覺法性如是無生無作而得成就略不合第三顯彼所因以次下二喻自別合故三結佛子是為如來應正等覺至菩薩摩訶薩應如是知二洪霔大千喻復次佛子譬如三千大千至唯除大千界將欲成時此之雲雨即前喻中興雲降雨正喻如來出現法門廣大難知周十方故上喻下合佛子如來應正等覺至唯除諸大菩薩心相續力心相續力者若約信受如來大法但是圓機堅種相續能受深者若約具受則八地已上由得無盡陀羅尼力方能受持乃至十地方受如來雲雨說法是以文言除大菩薩由初義故但揀二乘後結佛子是為如來應正等覺至菩薩摩訶薩應如是知三雲雨無從喻復次佛子譬如眾生至來無所從去無所至上喻下合如來應正等覺亦復如是至亦無所從來無所至去菩薩善根如生共業感彼出現法雲法雨機感而現非是先有一方一所從彼而來機謝而去亦非歸生舊所故體無生滅後結佛子是為如來應正等覺至菩薩摩訶薩應如是知四大雨難知喻喻深果行非心境故復次佛子譬如大雲至乃至一滴無不明了上喻下合佛子如來應正等覺至若欲思量心必狂亂古人釋云教廣行大因深果遠故非預二乘亦不乖理唯除一切世間主菩薩至入眾生心無不明了但是大機即世間主無能所行即能知之後結佛子是為如來應正等覺至菩薩摩訶薩應如是知五大雨成敗喻況佛滅惑成福智德三初喻復次佛子譬如大雲至名為能滅能滅火災即壞界之時有大雲雨名為能起至名為能止能止大水即以水止水有大雲雨名為能成至分別三千大千世界二合佛子如來出現亦復如是至能起一切眾生善根上二滅惑成福有大法雨名為能止至能成一切智慧法寶此二滅障成智即是止觀雙運有大法雨名為分別分別一切眾生心樂後一權智照機若無第二則同二乘無三同外道無四增無明無五非種智此即分上總中法雨令差三結佛子是為如來應正等覺至菩薩摩訶薩應如是知六一雨隨別喻復次佛子譬如大雲雨一味水隨其所雨無量差別喻佛一味隨諸根器合前差別上喻下合如來出現亦復如是至隨宜說法無量差別後結佛子是為如來應正等覺至菩薩摩訶薩應如是知七勝處先成喻文二初正明復次佛子譬如三千大千至及餘眾生諸所住處喻佛勝緣先濟之德下合佛子如來出現亦復如是至有為善根諸行智慧二牒以釋疑佛子譬如大雲雨一味水至隨眾生器而有差別前中先成由於業力此中法異由於機殊不乖第六一味之言後結佛子是為如來應正等覺至菩薩摩訶薩應如是知八事別由因喻喻佛成辨大事之德亦是德殊由於智故文中分三初蓮華表佛總中略無復次佛子譬如世界至名如來出現功德寶莊嚴名出現者表佛現故而言大者準五卷大悲經第三云有千葉故徧覆水上光照十方一切世界光照十方金色光也時摩醘首羅淨居天等至有爾所佛出興于世有爾所佛者有千枚華表千佛故故劫名賢賢善多故餘多同此二風輪起處佛子爾時其中有風輪起至能成一切諸如意樹即有力遙持廣前第三建立風輪三結因有屬佛子大雲所雨一味之水至風輪差別故世界差別二合三初合蓮華表佛喻佛子如來出現亦復如是具足一切善根功德合上大水徧滿放於無上大智光明名不斷如來種不思議智合生蓮華謂不斷種性如華表佛故普照十方一切世界合上光照十方與諸菩薩一切如來灌頂之記當成正覺出興於世合知佛當出二合風輪起處喻佛子如來出現復有無上至殊勝壽命無有窮盡此十智光次第合前所成唯果德能成通因果又能成即實之權所成唯差別之德故下結云一體等三合結因有屬三初結因佛子如來大悲一味之水至成就如來出現之法即能成之智合上一味之水風輪不同此輪由一節水減一重輪生如澄水垽今推能成由一味大悲故二結果佛子一切如來同一體性至出生種種智慧光明即所成之大智從一實智隨權而生合上風輪有差別故世界差別三結緣由眾生異合上眾生善根不同兼釋外疑於中分三初牒前正理佛子汝等應知如來於一解脫味一解脫味即能成之水水具二義悲及解脫二文影略出生無量不可思議種種功德種種功德通能所二智二舉外疑情眾生念言此是如來神力所然感應之道略有三義一互相成二互相奪三緣成性空而今眾生以緣奪因純推佛力失因緣義三如來為釋佛子此非如來神力所造至少分智慧無有是疑上以因奪緣一向言非下為說正義但以諸佛威德力故令諸眾生具佛功德因緣相成而佛如來無有分別復有二義一成上因緣雖隨眾生心無分別二成第三義了性空故無成無壞緣成故無成無成故無壞無有作者亦無作法所成既空何有能成并能作者及作法耶三結佛子是為如來應正等覺至菩薩摩訶薩應如是知九四輪相依喻況佛體用依持之德亦廣建立風之別義文三初喻二初能持之風復次佛子如依虗空至何等為四一名安住一時持水二名常住多時不動三名究竟與劫齊量四者堅固體性堅密俱舍論云假使有一大諾健那以金剛輪奪威懸擊金剛有碎風輪無損其量廣無數厚十六洛叉彼但有一與此不同二四輪相依此四風輪能持水輪至令三千大千世界而得安住準俱舍論次上水輪厚八洛叉洛叉億也次上更有一重金輪厚計三億二萬由旬然其世界或說三輪而得成就謂風水金或說五輪下加虗空上加大地今欲稱法合成四輪地中含金金亦地也二合二初合能持四種風輪佛子如來出現亦復如是至能持一切眾生善根有配四攝義則少似既合如來出現則成太局今謂通四何等為四所謂普攝眾生皆令歡喜大智風輪一未信入者以四攝法普皆攝取示以正理建立正法令諸眾生皆生愛樂大智風輪二已信受者建立教法守護一切眾生善根大智風輪三已入法者令其成行是一切方便通達無漏界大智風輪四已成行者令其得果是為四二合四輪相依佛子諸佛世尊大慈救護至依大方便善巧一慈悲合地能厚載故大方便善巧依如來出現二方便合水曲隨器故如來出現依無礙慧光明三出現合風力能持故無礙慧光明無有所依四無礙合空如空無礙故故淨名云其無礙慧無若干故文雖但取展轉相依不妨有以無若干故若準偈中慈悲之前更有一切佛法之言以況樹林如是則有五重相依三結佛子是為如來應正等覺至菩薩摩訶薩應如是知十大千饒益喻況佛出現利世之德三初喻復次佛子譬如三千大千至虗空眾生得虗空饒益一切眾生各隨所宜而得受用二合如來出現亦復如是種種饒益無量眾生次第合前四益所謂見佛生歡喜者得歡喜益見佛生喜如魚得水住淨戒者得淨戒益戒如平地萬善由生住諸禪定及無量者得聖出世大神通益定如宮室得安息故住法門光明者得因果不壞益至得一切法不壞益慧如虗空不可壞故上句不壞事下句不壞理是故說言如來出現饒益一切無量眾生三結佛子是為如來應正等覺至菩薩摩訶薩應如是知三總結成益結上十喻佛子菩薩摩訶薩知如來出現有十一句次第各別結上十門以九十二句結第九門故有十一則知無量知成就無量行故多因出現則知廣大和周徧十方故廣故難受則知無來去知離生住滅故無生故無從則知無行無所行知離心意識故非心識故思必狂亂則知無身知如虗空故如空故惑見雙亡則知平等知一切眾生皆無我故平等無我故唯一味則知無盡知徧一切剎無有盡故由無盡故諸乘徧化則知無退知盡後際無斷絕故後際無斷故佛種不斷則知無壞知如來智無有對故無對者即無礙慧則知無二知平等觀察為無為故為無為平等觀者即攝三輪歸無礙慧則知一切眾生皆得饒益本願迴向自在滿足故本為眾生故令利益自在滿足若將一一通前十門未為得意二偈頌三十七頌分三初歎深許說二初歎深難量二初一偈總歎爾時普賢菩薩摩訶薩欲重明此義而說頌言十方大雄最無上至功德第一超世間頌前標告不思議言二有十偈別歎十力功德無邊量至今見如來大神變次第頌前總結之中十一句亦第九偈頌九十二句結既結喻今此亦即通頌前喻喻則性相雙明此則多就性說古稱性起彌復有由一無邊量即無量義二一毛叵量即廣大義三空際叵得即無生義然此第三似頌第五如空之喻第六似頌第三無生滅喻取義不同故皆案次四不能知者離心識故五徧於一切非一者即如空義六體性平等即是平等無我義也七前徧諸剎此徧三世文綺互耳八無變易故盡後際九離言說故無二無對十本願現身故能成益二誡聽許說二初誡聽勸修若有欲知佛境界至令心所向皆無礙半上偈云淨意如空總以喻顯下半別顯一離於忘取如彼淨空無雲翳故斯即真止二觸境無滯如彼淨空無障礙故斯即真觀此觀不作意以照境則所照無涯此止體性離而息忘故諸取皆寂若斯則不拂不瑩而自淨矣無淨之淨則暗蹈佛境矣此為心要後學思行二許說分齊是故佛子應善聽至一切善根我今說初有半偈結前生後後一偈半正示分齊牒舉十門略無行者三業攝故闕正覺者導師中攝或復略無二頌前十喻即為十段初大千興造喻有其四頌以是總故文二初總顯多緣譬如世界初安立至十力生因莫能測前一喻況後一法合下皆倣此二有二偈別顯緣相譬如劫初雲霔雨至普導令成無上果二有十八偈如次頌前洪霔已下九段經文如有大雨名洪霔至悉使滅除諸惑惱每段二頌前八文顯其第九云方便依智者智即頌前出現然無礙慧是佛實智中二皆權於中智即知事方便隨機合上即是權實無礙對初即成悲智雙游三結說無盡如來出現法無邊至無譬喻中說其譬
