body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經二證入諸法用文四初明證入十句佛子菩薩摩訶薩入如是大威德三昧智輪初句明能證之定三昧智輪尚順梵語若正應云智輪三昧因定最勝名大威德次顯所證法謂證佛果法初總明則能證得一切佛法無為果為證有為果曰得餘八句別則能趣入一切佛法趣入釋證則能成就成就釋得則能圓滿圓滿通二則能積集積集約因圓則能清淨清淨謂障盡則能安住定能安住則能了達慧能了達與一切法自性相應定慧兩亡則自性相應為證入也二明離證相而此菩薩摩訶薩不作是念至若干趣向若干境界以無念方證故尚不念無礙慧境況所證法有若干耶三徵何以故徵意有三一何以證而無念耶二何以一定得多果耶三何以因定得果法耶四釋二初略別釋答前三徵菩薩三昧如是體性一體性離念故如是無邊二定體雖一用無邊故如是殊勝故三以殊勝故因得果法二廣以通釋謂文廣義通通明上三句於中分二初總標此三昧種種境界境是定之所緣種種威力威力是定之用種種深入深入是定證契三皆定體皆言種種故上云無邊具三又多故云殊勝二別顯所謂有二十八句句句皆有上之三義入不可說智門入即前深入義不可說者即無邊義智門即境界義知智在說說為智門餘句或有闕無邊義蓋文略耳入離分別諸莊嚴入功德智慧不二之莊嚴入無邊殊勝波羅蜜至那由他不可說廣大智可知入見無邊佛勝妙藏入不空如來藏入於境界不休息悲智之境觀度無休入清淨信解助道法至入知一切諸佛心三普德無盡四初正顯無盡佛子此菩薩摩訶薩至及佛境界莊嚴前際謂非唯上列諸用又能念念入多三昧亦不能盡二徵何以故徵意云既念念入多何以不盡三釋文有十句知一切法究竟無盡故釋意云此三昧緣境究竟無盡故上總下別知一切佛剎無邊故至知一切幻心所緣法無量故四喻況於中有其三喻喻前無盡各有喻合前二合中復加徵釋初如意隨求喻佛子如如意珠隨有所求至而珠勢力終不匱止喻定心隨應出法無盡菩薩摩訶薩亦復如是至不匱不息何以故徵意云何以出法不盡不匱息耶菩薩摩訶薩成就普賢至猶如影像無增減故釋意云了多幻境皆同影像緣至則生何有盡耶體無增減何有匱息耶二生心各別喻佛子譬如凡夫各別生心至相續不絕不可思議喻緣境無盡菩薩摩訶薩亦復如是至普幻門無量法故三龍王附降喻二初喻佛子譬如難陀跋難陀至此是諸龍無作境界喻入法無盡三合三初正明入法菩薩摩訶薩亦復如是合滴如車軸謂入廣大法故住此三昧入普賢菩薩諸三昧門初句總餘句別智門法門見諸佛門至不可說廣大幻網門幻網者一切皆幻互為緣起相交映故知不可說不可說差別至有體性無體性世界門世界性空是故無體隨緣染淨是故有體又法性土故有體事土從緣故無體又淨剎順理故有體染剎妄成故無體知不可說不可說眾生想門至覆住仰住諸佛剎皆云門者自他游入故二入法時分於一念中皆如實知合前降雨之時三入時相用合前無邊無盡無作境界於中三初十句明其相狀如是入時無有邊際無有窮盡合雲無邊雨無盡次合無作境無作即無功用故不疲不厭身不疲心不厭不斷不息不求斷不暫息無退無失謂未入常入故不退已入永常故不失於諸法中不住非處無法所入所門故不住非處恒正思惟無心不契故不沈不舉正是入相二明其業用求一切智常無退捨至色相身無有斷絕隨入一一門皆有斯業門門即不可盡三徵釋所由二初徵何以故徵意有二一云菩薩豈無行滿成佛何以業用無際限耶二云設橫顯無盡可爾何以一一門中用即無盡二釋亦二一云菩薩本為眾生生無盡故用亦無盡二釋後意云生及世界既如虗空故隨一門即用無盡如芥子中空由此不但一門成多一念亦能成多事矣文三初喻譬如然火隨所有緣於爾所時火起不息火隨薪緣薪多火在喻菩薩生界緣廣用無有涯二合菩薩摩訶薩亦復如是至一切眾生悉使無餘三轉徵釋何以故徵意云菩薩何以起多業用此菩薩摩訶薩為欲度脫至滿足普賢所有行願釋意云為普度生滿普願故四結示勸修二初結勸勤修謂此菩薩心窮生界定用無涯故應修習文二初舉所修之法是故諸菩薩此五字該下二段其所修法有十一句前之十句別明無礙輪之業用於中倒牒前來諸文應於如是種類業用非一故如合龍喻中入法眾多是種類義如是境界即定所緣如前妄念緣境喻如是威德即通顯定用如前寶珠能出生喻如是廣大此上三種皆悉廣大一一無涯如前不見三昧前際故如是無量數不可極如前入不可說智門等即無邊故如是不思議並絕心言如前不作是念有若干菩薩等故如是普照明皆與智俱如前雖知諸法無作而能示現一切作業是權實明照故如是一切諸佛現前住體用齊於佛境則諸佛現前如前觀十力地至薩婆若故如是一切如來所護念如來護念如前諸佛攝受已入未來諸佛數故如是成就往昔善根非但現用自在亦成昔善如前功德解欲悉清淨故後之一句舉定名體如是其心無礙不動三昧之中二示勸修之相二初略示離過進德勤加修習離諸熱惱至順三昧境界入難思智地二別示離過進德二初離過不依文字不著世間至不染著世事不分別境界二進德於諸法智但應安住至知時說法不休息二總結顯示佛子菩薩摩訶薩如是修行至如是攝受一切眾生遠則通結前來諸段近則逆結上來進德之文欲一一配屬恐厭繁文三定滿成益文屬此定意兼前九於中有四初外感佛加益五初辨加所依佛子菩薩摩訶薩至如是大智慧三昧時謂在定時故二顯能加佛十方各有不可說不可說至微塵數諸佛而現其前三正顯加相與如來念力令不念失至皆悉成就無空過者四加以成用佛子菩薩摩訶薩如是滿足至轉一切佛微妙法輪五徵釋所由二初徵何以故徵意云普行既滿何須盡未來際行調生行耶二釋佛子此菩薩摩訶薩至廣大行三昧現大自在釋意云無障礙願法應爾故已成大願真能調故二內德圓滿益四初牒前住定因圓佛子此菩薩摩訶薩至住師子奮迅智心意無礙通牒上文二別示所滿其心恒住十大法藏至一切世智無能稱述十表無盡三總結究竟佛子此菩薩摩訶薩已到至示現調伏一切眾生四徵釋所由二初徵何以故徵意云菩薩以何能滿爾所德耶二釋菩薩摩訶薩住此三昧法如是故三上攝佛果益三初正明佛子菩薩摩訶薩以此三昧至令入最上智二徵何以故徵意云上是佛德何能攝耶二釋意云住此三昧所以能令所作無餘同如來故於中有三初正顯無餘之業故皆云一切菩薩摩訶薩如是修行至則住一切智平等性二明作業行相於此法中作如是業不作餘業初句總顯依前而作更不作餘不足之業次顯其作義住未足心住不散亂心至住決定心住不變異心後總結前作如是思惟如是作業如是究竟三逐難重釋謂廣前作如是業不作餘業文三初略標舉佛子菩薩摩訶薩無異語異作有如語如作如作通身及意二徵何以故徵意云何以不作餘耶三廣釋釋意云若作異前非菩薩故文有十喻即為十段各自有合初金剛不壞喻譬如金剛以不可壞而得其名終無有時離於不壞喻行體堅牢菩薩摩訶薩亦復如是至終無有時離諸行法二真金少色喻譬如真金以有妙色而得其名終無有時離於妙色喻善業外飾菩薩摩訶薩亦復如是至終無有時離諸善業三日輪光明喻譬如日天子以光明輪得其名終無有時離光明輪喻智慧圓明菩薩摩訶薩亦復如是至終無有時離智慧光四須彌四峯喻譬如須彌山王以四寶峯至終無有時捨離四峯喻善根超出菩薩摩訶薩亦復如是至終無有時捨離善根不合四峯若合可以四菩薩行而合之也五大地能持喻譬如大地以持一切而得其名終無有時捨離能持喻大悲荷負菩薩摩訶薩亦復如是至終無有時捨離大悲六大海含水喻譬如大海以含眾水而得其名終無有時捨離於水喻大願普育菩薩摩訶薩亦復如是至終不暫捨度眾生願七軍將明戰喻譬如軍將以能慣習至終無有時捨離此能喻習定防冤菩薩摩訶薩亦復如是至終無有時捨離此行八輪王護世喻如轉輪王馭四天下至令無橫死恒受快樂喻定清物感菩薩摩訶薩亦復如是至乃至令其究竟清淨九植種生長喻譬如種子植之於地乃至能令莖葉增長喻行增物善菩薩摩訶薩亦復如是至能令一切眾生善法增長十時雨生種喻二初喻譬如大雲施夏暑月降霔大雨乃至增長一切種子喻法雨普成二合二初正合菩薩摩訶薩亦復如是至修菩薩行雨大法雨乃至云乃至者越初生種直合終成就由應時而降故獲斯十四種益能令一切眾生究竟清淨得智果淨二障故究竟涅槃得斷果達無相法故究竟安隱得恩果住大悲故究竟彼岸得所依清淨究竟彼岸果上四自利餘皆利他究竟歡喜了有情行令他歡喜自離十怖則自歡喜究竟斷疑得斷疑為諸眾生究竟福田成應供次下七句由此而成令其施業皆得清淨至置諸眾生一切智處文並可知二徵釋二初徵何以故徵意云菩薩依何行力說法成斯大益二釋釋意云由成大智證法界故尚能嚴淨無量勝行豈止成眾生耶文二初標菩薩摩訶薩成就此法至不可思議無量諸行二釋文三初列所淨功德所謂能淨諸智求一切智故至常見一切佛興世故二結其廣多佛子菩薩摩訶薩住此三昧至不可說清淨功德以別說難盡故三顯能淨因於如是等三昧境界至同分善根淳淨力故同分善根者一一善根迴向法界成主伴故廣大誓願欲樂力故至無盡之福無對力故超諸世間等法性相應所修之福故超於世法性不並真故無有對四正同佛果益二初正顯同佛佛子菩薩摩訶薩住此三昧至同去來今一切諸佛先標次徵何者為十後列所謂得諸相好種種莊嚴至諸佛境界同於諸佛等覺之名由此而立二問答料揀先問二初牒前同佛爾時普眼菩薩白普賢菩薩至得如是法同諸如來二陳己所疑何故不名佛何故不名十力至何故不名住實際者上九句疑不名為果下二句問不捨於因何故修行普賢行願至不能究竟法界捨菩薩道二答二初讚問牒疑爾時普賢菩薩告普眼菩薩至乃至不能捨菩薩道二正答所問三初法說佛子此菩薩摩訶薩至是則說名普賢菩薩文有十一段次第答前十一句問在文易了意猶難見謂何得已入十力而普行無息耶今總以喻顯如人習誦雖已得通而數數溫習不如久精下香象喻顯相雖相似而體不同故纓絡云等覺照寂妙覺寂照亦似功用滿位比無功用也亦顯得果不捨於因盡未來際皆位後普賢故喻中分三初舉象王依正勝嚴佛子譬如伊羅鉢那象王住金脇山七寶窟中伊羅鉢那此云香葉常居第一金山之脇其窟周圍悉以七寶至調良善順心無所逆二象王神變自在喻若天帝釋將欲游行至於一一頭化作七牙準賢首品但有六牙或是譯者類後三七便言七耳若作表義于何不可於一一牙化作七池至象之與天更互相似無能分別此象此天者正意取此以喻菩薩等佛之義三不壞本質而能現佛子彼伊羅鉢那象王至受天快樂與天無異三法合四初具眾行嚴佛子菩薩摩訶薩亦復如是合前依正修習普賢菩薩行願至到諸菩薩行願彼岸二明因果無礙二初明修無礙行所為為欲安處菩提之座成一切智得最正覺合前神變自在上為果下為因增長普賢廣大行願至度脫一切苦惱眾生二正顯無礙行相二初總明不捨普賢道現成最正覺以法界因果無障礙故二別顯三初顯因門果行文有四果現不可說不可說成正覺門智果現不可說不可說轉法輪門說法果現不可說不可說住深心門般若相應果於不可說不可說廣大國土現涅槃變化門斷果二顯果從因行於不可說不可說差別世界至修普賢行而成正覺明果從因行及說得時不同隨物現故二顯果門因行復於一切諸佛剎中至種種教化調伏之法三結成不壞因而現果佛子菩薩摩訶薩此下合前不壞本質而能現本身不滅即因不壞合在窟無變以行願力於一切處如是變現即能現果合在天神變四徵釋重合二初徵何以故徵意云因果相違云何因門現果果復為因二釋意云調眾生法應如是故文二初釋果作因意欲以普賢自在神力至自在能證一切知故二釋因現果意四初法說佛子汝應觀此菩薩摩訶薩至自在受用一切智法謂不捨因而現果二舉前喻顯如伊羅鉢那象王不捨象身至同於諸天無有差別三重以法合佛子菩薩摩訶薩亦復如是至於佛法中無所分別上明不捨因而現果下明不壞果而現因雖知諸法普皆平等至而修菩薩行相相續不斷四歎勝佛子菩薩摩訶薩安住如是至當如是人心得清淨三結佛子此是菩薩至無礙輪大三昧殊勝心廣大智三總結十數佛子此是菩薩摩訶薩所住普賢行十大三昧輪
