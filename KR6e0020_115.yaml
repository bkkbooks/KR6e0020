body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經四賢勝優婆夷幻智無依善友文六初依教趣求向聚落城至賢勝所二見敬諮問禮拜圍繞合掌恭敬至善能誘誨願為我說二授己法門二初得解脫賢勝答言善男子我得菩薩解脫名無依處道場直就經文內外無依即是道場賢首云梵名那阿賴耶曼茶羅那者此云無也不也阿賴耶此云依處也依止也曼茶羅云道場也圓場也謂無阿賴耶染分依處而有淨分圓場出生勝德不可窮盡即轉依究竟顯德無盡故也既自開解復為大說即二利之用後得三昧又得無盡三昧是名次月即為釋名非彼三昧法有盡無盡上揀濫下顯是以能出生一切智至速疾神通無盡故謂體則雙超盡及無盡但從用出生說無盡耳然則二門相成無依道場即空如來藏無盡三昧即是不空要心無依契於本空方見不空具性功德故云出生智性眼等息妄顯出故曰出生出非本無猶稱性智四謙推勝善男子我唯知此至而我云何盡能知說五指示後友善男子南方有城名為沃田是南天竺近水沃潤故顯無念定水能滋長故彼有長者名堅固解脫無著清淨惑不能壞即解脫故汝可往問菩薩云何學菩薩行修菩薩道六戀德禮辭爾時善財禮賢勝足繞無數帀戀慕瞻仰辭退南行五堅固長者幻智無著善友文六初依教趣求到於彼城詣長者所三見敬諮問禮足圍繞合掌恭敬至善能誘誨願為我說三授己法門二初顯名長者答言善男子至名無著念清淨莊嚴無著約境離所知故無念約心心體離念故無煩惱二障永盡是曰清淨淨則能嚴法身二彰用我自得是解脫已來至勤求正法無有休息既二障不生則無愛見故無所求無所求故故能求法無厭無休四謙己推勝善男子我唯知此至能知能說彼功德行五指示後友善男子即此城中至云何學菩薩行修菩薩道六戀德禮辭時善財童子禮堅固足繞無數帀辭退而行六妙月長者幻智智光善友文六初依教趣求向妙會所二見敬諮問禮足圍繞合掌恭敬至善能誘誨願為我說三授己法門妙月答言善男子我得菩薩解脫名淨智光明真智廓妄名為淨智後智照法名為智光能淨能光若秋空滿月故名妙月四謙己推勝善男子我唯知此至能知能說彼功德行五指示後友善男子於此南方有城名出生彼有長者名無勝軍謂見佛得法無盡故無能勝眾德所聚從喻如軍亦能普勝諸魔軍故皆從體出故城名出生汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭是時善財禮妙月足繞無數帀戀仰辭去七無勝軍長者幻智無盡相善友文六初依教趣求漸向彼城至長者所二見敬諮問禮足圍繞合掌恭敬至善能誘誨願為我說三授己法門二初示名長者答言善男子我得菩薩解脫名無盡相法門之名即所成德相無窮盡故二以用釋名我以證此菩薩解脫見無量佛得無盡藏得無盡藏者謂聞諸妙法又諸心境無非佛法故若佛若法皆無有盡四謙己推勝善男子我唯知此至能知能說彼功德行五指後善友善男子於此城南至有婆羅門名最寂靜虗誑言息故云寂靜寂靜即為淨行言行君子之樞機苟能誠實斯則可法故城名為法往詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子禮無勝軍足繞無數帀戀仰辭去八最寂靜婆羅門幻幻智誠願語善友文六初依教趣求漸次南行詣彼聚落二見敬諮問見最寂靜禮足圍繞至善能誘誨願為我說三授己法門二初標名婆羅門答言善男子我得菩薩解脫名誠願語有二義一始終無妄故如從初發心立弘誓言必如言行不乖先語故二者隨行不虗故如忍辱仙人言我不瞋令身還復二以用釋名即如次釋前二義初始終無妄過去現在未來菩薩至無已退無現退無當退二隨行不虗善男子我以住於誠願語故隨意所作莫不誠滿四謙己推勝善男子我唯知此至而我云何能知能說五指示後友善男子於此南方有城名妙意華門妙意華門即蘇滿那華其城門側有之故亦在南天當受其訓得求友之妙意勝因之華故彼有童子名曰德生表於淨智智則萬德由生復有童女名為有德表於淨悲悲為眾德之本以悲智相導故二人同會會緣之終此二滿故將見慈氏紹佛位故汝詣彼問菩薩云何學菩薩行修菩薩道六戀德禮辭時善財童子於法尊重至繞無數帀戀仰而去已下入第七十七經九德生有德幻智歸幻門善友文六初依教趣求爾時善財童子漸子漸次南行至妙意華門城二見敬諮問見德生童子有德童女至唯願慈哀為我宣說三示己法門二初標名時童子童女告善財言至得菩薩解脫名為幻住謂能所境智染淨之法皆從緣起無定性故如幻而住二業用二初別明得此解脫故見一切世界皆幻住因緣所生故有十種幻皆上句標幻下句以緣生釋成一一為總緣生世界並通染淨剎海亦名世界故餘九為別初五約染分依他如幻緣生一切眾生皆幻住業煩惱所起故一約有情苦果從業惑集生一切世間皆幻住無明有愛等展轉緣生故二約十二因緣順觀即世間故次第相由故云展轉一切法皆幻住我見等種種幻緣所生故三就五類法中但除無為故云一切以無為無有起非幻緣生故異熟識等從無始惡習內執為我四惑相應故云我見等及外取妄境故云種種幻緣故惑心等悉皆如幻四五二句別明不相應行一切三世皆幻住我見等顛倒智所生故四即是時謂依行相續不斷分位建立為時所依行空時何所立妄計有體是顛倒智一切眾生生滅至虗妄分別所生故五即無常生老等謂依生已壞滅分位建立無常等皆妄分別有一切國土皆幻住想倒心倒見倒無明所現故六一切國土義通染淨眾生染土多從三倒所生以不了唯心妄取境界故上云一切國土但想所持既有妄想故心見皆倒言無明所現者亦通淨剎謂登地已上無明未盡所現國土種種不同既云無明則揀非佛土一切聲聞辟支佛皆幻住至願智幻所成故後之三種但約淨分依他而明從緣如幻可以意得二結歎玄奧善男子幻境自性不可思議幻法非有體不實故非無相非無故非一性相異故非異無二體故空有相即一異兩亡既離二邊亦亡中道由斯交徹故能一中現多多皆即一重重無礙為不思議故推勝云善入無邊諸事幻網四謙己推勝善男子我等二人至我等云何能知能說五指示後友二初以力冥加時童子童女說自解脫已至令善財身柔輭光澤二以言顯示三初指處而告之言善男子於此南方有國名海岸南海北岸一生菩薩臨智海故有園名大莊嚴因圓萬行而嚴果故又生死園苑以萬行樹林嚴自果故其中有一廣大樓閣名毗盧遮那莊嚴藏約事則其中廣博同虗空故有多光明能徧照故阿僧祇等寶所嚴故蘊多樓閣包多事故約法則二智相依緣起相由故云樓閣智即法界是為廣大名毗盧等順成上義二智光明徧照事理故智能包容萬德即莊嚴藏華嚴萬行不離此故上約其果下出其因從菩薩善根果報生約其宿因是彼善根之果報故從菩薩念力願力自在力至從菩薩福德智慧生約其現緣善男子住不思議至現如是境界集如是莊嚴現依所為二示人彌勒菩薩摩訶薩安處其中彌勒梵音具云迷帝隷此云慈氏是其姓也然有三緣一由本願過去曾值大慈如來因立大願願得斯號故二由此得慈心三昧故三由母懷時有慈心故如滿慈子名阿逸多此云無勝以生具相好勝德無過故今以姓而呼但云慈氏慈依智住故曰處中上正示下顯住之因為欲攝受本所生處至了一切生皆無相故悲智雙游皆為利物故云為欲等三教問二初正教汝詣彼問菩薩云何至云何事菩薩善知識興十問者表無盡故二釋廣問所由二初徵何以故徵意云何以要須廣問二釋有二意初所求德廣能具說故文二初通顯彌勒德圓位滿善男子彼菩薩摩訶薩至甘露法水而灌其頂二別顯是其真實善友善男子彼善知識至菩薩行願所成功德設若德滿非已有緣亦難求故二明其能求大心法應爾故即廣誡勸文二先誡勸求法二初標不應誡其去劣善男子汝不應修一善至淨佛國土事善知識二釋所應作令其廣修二初徵何以故二釋二初別明應修乃有九十八門分為十段初上求菩提行善男子菩薩摩訶薩至應學無量巧迴向二下救眾生行應化無眾生界至應調伏無量眾生三自斷惑障行應斷無量煩惱至應竭無量受生海四勸物出離行應令無量眾生至應置無量眾生於聖道中五淨自根欲行應消滅無量貪欲行至應摧破無量愚癡行令除三種不善根故則成三種善根等故應超無量魔網至應示現菩薩無量隨順世間六力用自在行應生無量淨信力至應圓滿無量如來力七攝法治惑行應分別無量法門至應照無量品類根上六攝法下三治惑應知無量煩惱病至應療無量眾生疾八供佛攝生行應嚴辦無量甘露供至應以四攝攝無量眾生九悲願深廣行應修無量總持門至應知無量言辭法十證入圓滿行應入無量差別心至出生不可說菩薩願二結略顯廣善男子舉要言之至應普事一切善知識謂以別陳終難具故二誡勸事友三初誡二初正誡離過善男子汝求善知識至深信尊敬心不應變改言見隨煩惱行勿嫌怪者善友有二一實二權權能行於非道內外生熟善巧難知故不應嫌實中復二一行二解今但求解不應觀行故如智度論五十說亦如有目跛人猶能示道二舉益釋成二初明善友能示行文二初徵何以故徵意云但起廣心足成大道何以要令事友求誡而離過耶二釋善男子菩薩因善知識至作一切菩薩利益事釋云法假人弘不因善友何能聞諸殊勝妙行於中具有三十五句句各一行二明其善友能為外護前即能生此能養育於中有二初正明能為攝護善男子菩薩由善知識至增長一切菩提分法二舉因釋成二初徵何以故徵意云善惡在己善友何能令我不墮惡趣等耶二釋善男子善知識者至能令安住一切佛法門釋意云由友教令離惡因故因亡果喪豈非友力以此四十句釋上正明十五句有通有別通則以後諸惡之因通對前果別則各各配屬前文如由除諸難不退大乘由斷諸惡不犯淨戒由破無明不隨惡友下諸句中或有二三對上一句可以意得恐繁不配二教勸謂教其事友之方文有四段皆約喻顯即分為四初教念友勝德二初歎勝善男子善知識者如慈母至令到智慧寶洲故二結勸善男子常當如是正念思惟諸善知識二教起事友心行有二十一句復次善男子至應發如王子心遵行教命故二身友對辨復次善男子汝應於自身至繫王繒想坐王殿想文有十句句各四事四結勸成益二初正勸善男子汝應發如是心作如是意近善知識二舉益釋成二初正釋事友之益何以故以如是心近善知識令其志願永得清淨二重讚善友為能益故須宜承事復次善男子善知識者至譬如父母養育兒子三雙結上來誡勸二門謂別說難窮故須結廣從其省略文二初寄數明多善男子以要言之至百千億阿僧祇大願二總收結多善男子我復略說至善知識能發起既通一切何但百千明知前云十不可說意顯無盡耳六戀德禮辭時善財童子聞善知識至殷勤瞻仰辭退而去
