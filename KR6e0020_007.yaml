body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第七稱揚讚德亦是發起序文中有三初總結威儀住三初結衆集爾時如來道場衆海悉已雲集數廣德深故名衆海起於自地集空道場多數大身重重無礙雲之象也又浮雲無心龍吟則起菩薩無住佛現爰來二明異相無邊品類周匝遍滿形色部從各各差別不唯上列故云品類無邊旋環不空故云周匝遍滿大小等形妍等色部主徒從各有區分故云差別三結意同隨所來方親近世尊一心瞻仰隨所來方參而不雜皆得見佛各對目前其猶百川各全覩月同無異念故曰一心諦矚欽承瞻而且仰不唯直覩丈六乃徹見法界身雲第二總顯德行因緣者以上列中隨宜別歎今方總顯德行齊均又與下別得法門以為總故前同生衆中共集善根亦是別故又前共集明主伴所由今曾攝受顯眷屬所以影略其文此文多勢且分為三初離障見淨二受化根深三德行圓備初後是因中一是緣以因奪緣大衆自見以緣奪因佛力令見因緣和合無定親疏故因緣間說又初段德行現深後二因緣宿著久攝今見即緣成因感應道交故常居佛會初離障見淨此諸衆會已離一切煩惱心垢及其餘習煩惱即煩惱障也心垢即所知障也此障翳心迷所知故言一切者謂分別俱生若種若現言餘習者二障氣分粗重粗重如畢陵上慢迦葉不安今皆位極菩薩智現情亡證理達事心鏡瑩淨故云已離若諸位圓融一斷一切斷亦通初位摧重障山通以喻顯以能摧道摧二障山障體堅厚崇聳如山又別則智障菩提惑障圓寂通則俱障及一切佛法故名為重見佛無礙斷障果也然有二義一就能見以明無礙由斷二礙智明理顯理顯故見法性身智明故見佛智身理智冥一見無礙身無礙亦即涅槃二約所見明無礙者具十無礙已如上說二受化根深二初總如是皆以毗盧遮那如來至以四攝事而曾攝受如是者指前斷障之衆劫海者明攝時曠遠言四攝者即攝化之方謂布施愛語利行同事布施是攝緣與彼資持故愛語是攝體正示損益故利行是攝處安住善處故同事謂釋疑令彼決定故二別一一佛所種善根時至令其安立一切智道別示攝相於中向言劫海曾攝何所攝耶謂一一佛所何時攝耶種善根時將何法攝謂種種方便攝相云何謂教化成熟教化約始成熟就終攝意云何令其定立一切智道道者因也唯為佛果修佛因耳二德行圓備前攝何益令得圓故於中初辨因圓文有五句種無量善獲衆大福已超七地殊勝善根故悉已入於方便願海已超八地大願滿故所行之行具足清淨已超十地行滿障淨故於出離道已能善出前明德圓此具出道一道無量道已超生死不住涅槃故云善出常見於佛分明照了結成見佛謂德高十地是以常見非比量見故日分明不取色相名為照了又塵毛剎海佛遍重重有德斯覩名分明照了二入果海此一段文望前是別總具德中別入果故望後是總四十衆中解脫標故今且屬前文二初乘因入果以勝解力入於如來功德大海是比智知如見鸞翔知太虗可沖矚龍躍知宏海可泛也謂以勝解力印可佛言知福慧之深遠以信解力瞻仰佛化知慈悲之廣大是入如來功德大海亦是勝解印持果德二分得果用得於諸佛解脫之門游戲神通言解脫門者佛果障寂大用無礙故稱解脫真解脫者即是如來通智游入故號門也衆各證契故名為得此解脫即門佛得其總衆海得別又佛解脫但名解脫衆所得法稱之為門以能通入彼果用故此解脫之門又衆所得法離障自在名為解脫智所入處亦名為門以因解脫入果解脫亦稱為門此解脫即門然總別圓融因果交徹重重無礙方為真解脫門故下或歎佛果德或歎因行或約天等所得欲影顯故次游戲神通正明入相游戲者出入自在神通者難測無壅故約觀心者心境無礙稱為解脫由入此理故號為門若以門為門非能通矣門即如實何所通耶正入雙亡為真門矣如此入者則本覺湛然名窮果海真非妄外則因果圓融心境無涯則解脫無際矣第三別明得法讚佛四十衆中各先長行得法即經家序列後說偈讚即當時所陳然衆集偈讚並在一時文纍書故編之作次而各得一者顯佛德無盡故乘別入總盡衆不能及故故海慧云如來境界無有邊各隨解脫能觀見而普賢得十顯等佛無盡故文中先異生三初諸天三初色界有五初自在天長行得法初法身解脫所謂妙𦦨海大自在天王至寂靜方便力解脫門法界虗空界即用所遍處空即事空法界之言義兼事理謂非但遍空亦遍空內色心等事及空有稱真之理又但言空則一重遍今云法界則重重皆遍何者謂空界容一一塵處及彼事物一一塵中皆稱真故各有無邊剎海佛身大用皆悉充滿故下頌云無窮盡也言寂靜者體也然有二義一明前大用用無用相不礙常寂二由此智用即寂同真是故隨一一用遍一切處也言方便者用也亦有二義一明前寂無寂相不礙大用二內同真性不礙外應群機故云方便寂用無礙所以稱力二智身解脫自在名稱光天王得普觀一切法悉自在解脫門此有三義一以普眼於一切法無不能觀二觀一切法不壞事而全理三於一法中見一切而無礙並名自在三自相解脫清淨功德眼天王至不來不去無功用行解脫門亦有二義一知不生等內證真理二無功用行外應群機然不生等佛法之體釋有多門略申一兩一別釋以不生滅約境不來去約行初不生滅略有五義一就遍計由是妄執無法可生滅也又情有即是理無故不生也理無即是情有故不滅也不滅不生是一法也又求遍計相不可得故不生能顯無相性故不滅不滅即不生亦一法也二就緣起性謂法無自體攬緣而起生即無生既本不生故無可滅也又緣起無性故不生無性緣起故不滅中論云以有空義故一切法得成是故不生即不滅不滅即不生為一物也又推緣無起故不生能顯無生性故不滅三約圓成性謂非是有為故無彼生滅相也又非妄心境故不生聖智所證故不滅又體非遷變故不生隨緣令法起故不滅不滅即不生為一物也四通就三性混融於一法上就遍計故不生就圓成故不滅就依他故亦不生亦不滅就三無性故非不生非不滅五然此四句合為一聚圓融無礙頓思可見二不來不去者約行謂正智背捨妄執而無去向證真理而不來又依體起用而不去應機現前而不來又往應群機而不去恆歸寂滅而不來不來即是不去無二為一味也由此大智無念應機如摩尼天鼓無思成事故云無功用行也二通釋者不生不滅亦可約行不來不去亦可約境謂妄念斯寂猶若虗空何生何滅又雖起大用見心無生用謝歸寂了本無滅又常稱真理寂照居懷於此心中有何生滅約境釋不來去者猶如空華無可去來又緣會即來來無所從故無來緣謝而去去無所至故無去又諸法即如如豈來去三展轉釋又何以不生滅由無來去故何以不來去由無生滅故又既無來去則非一異不生不滅則無斷無常智契前理故無功用不礙生等故云行也是則不生之生生之不生無功用故常寂行故常用寂用無二是於功用得解脫也斯為正法之要義味難盡無厭繁文四觀義解脫可愛樂大慧天王至一切法真實相智慧海解脫門現見之言揀比知故真實相言略有三義一以智觀事實事不虗故故下經云觀有為法如實相二以慧觀理實所謂無相無相不相名為實相三以無礙智知無二實窮實故深盡邊故廣稱智慧海不為相縛是解脫門五慈障解脫不動光自在天王至大方便定解脫門離諸危怖曰安適悅身心曰樂見佛則獲二利故安樂也煩惱不生故得定也佛德難思故樂定無邊斯為大方便也六悲障解脫妙莊嚴眼天王得令觀寂靜法滅諸癡暗怖解脫門衆生癡故造業造業故受苦暗故不見未來不見未來即顛墮故大怖之極莫越愚癡令觀本寂則癡相本空尚不造善豈當為惡七業障解脫善思惟光明天王至不起一切諸有思惟業解脫門佛現十方是無邊境了無依性稱為善入尚不依佛寧造業思八無相解脫不愛樂大智天王至而不動無所依解脫門雖身應十方寂然不動智宣諸法怕爾無依不取於相如如不動故九名相解脫普音莊嚴幢天王得入佛寂靜境界現光明解脫門佛智契如名入寂境寂而能應故普遍十方身智發光又令物入無相故靜無名故寂十能益自他解脫名稱光善精進天王至廣大境界為所緣解脫門此天王名與前列中少倒前名極精進名稱光上下諸文多有此例或義存名異或廣略參差皆譯者不善會耳法門名住自等者此離二取相能益自他解脫門自悟處者即離覺所覺自覺聖智常現前也而以無邊等者謂緣無邊法界度無邊衆生得廣大菩提也二偈頌讚佛二初彰說儀爾時妙𦦨海天王承佛威力至而說頌言𦦨海是當衆上首仰承佛力為衆申心十地論云承佛力者顯無我慢普觀十方示無偏心今觀己衆通局小異耳然頌總有四種一名阿耨窣覩婆頌此不問長行與偈但數字滿三十二即為一偈二名伽陀此云諷頌或名不頌頌不頌長行故或名直頌謂以偈說法故三名祗夜此云應頌四名縕䭾南此云集施頌謂以少言攝集多義施他誦持故今此即伽陀頌也下皆準之為何意故經多立頌略有八義一少字攝多義故二諸讚歎者多以偈頌故三為鈍根重說故四為後來之徒故五隨意樂故六易受持故七增明前說故八長行未說故今此正唯前二義兼五六二正說中十偈次第各一法門結集取此以為長行非此頌前也然此中長行與偈有多不同謂偈字則定長行多少不同而長行則約天得法偈中即是歎佛此必然也若二文互望或因果之殊或體用有別或互相影略或難易更陳或法喻不同或能所遞舉故傳授者善消息之二文相映於義易了二正說佛身普遍諸大會至為救世間而出現初二句即前所遍法界虗空兼明能遍佛身則十身皆遍無窮盡者一出現無盡若高山之出雲二非滅盡法猶虗空之常住次句寂靜也由無性故不可取為一異俱不俱等後句方便合二為力此偈是說者自法故不結天名下並準知如來法王出世間至此自在名之所證初句是上自在佛為法王於法自在故次句觀也第三句普也後句結法屬人為他說故然其結名義同法門恐繁不配他皆倣此佛不思議離分別至如是淨眼能觀見初句無功用也不思議是標離分別是釋次句即不生等相即生等無即不義第三句即行也長行約要先知法無生方得成無功用偈則要無分別方能見法無生內證與外用同時所以二文前後如來智慧無邊際至大慧入此深安住初句明廣次句明深即上智慧海也第三句自見法實故能令物不迷事理如來功德不思議至不動自在天能見初句方便定也次二句與安樂也衆生癡暗常迷覆至妙眼能知此方便初句即前癡暗謂長迷妄境鎮覆真心也次句令觀寂靜次句因滅無明則得熾然三菩提明是前滅義如來清淨妙色身至善思惟天所觀察初二句即善入無邊境無邊境即所應處也無有比善也次句無性者感而應故無依者思念寂故由此能令物不造業如來音聲無限礙至此樂智天之解脫初二句即普往十方說法次一句即不動無依寂靜解脫天人主至此無礙法嚴幢見初句即入寂靜境次二句即普現光明佛於無邊大劫海至名稱光天悟斯法初十一字即無邊境為所緣求菩提即自所悟處次句既緣其境必起通化前文略耳二廣果天二初長行得法復次可愛樂法光明幢天王至說法斷疑解脫門普觀等者此應根授法明於不知根說法無果障中得解脫也斷疑生信說法果故謂觀機識病稱根說法藥病無謬故疑除疾愈淨莊嚴海天王得隨憶念令見佛解脫門隨憶念言略有二意一隨念何佛如名應之二隨念有淺深令見佛有粗妙此於現身得解脫也最勝慧光明天王至無所依莊嚴身解脫門法性平等者唯一味也無所依者離能所也莊嚴身者證真莊嚴即非莊嚴故雖現世間還如法性不依諸有此於有依得解脫也自在智慧幢天王至安立不思議莊嚴海解脫門知世間法者謂衆生世間心法各異知已隨宜現通說法故云安立一念速安非人天外道所能思議以此莊嚴如來教海此於安立教法遲鈍障得解脫也樂寂天王至不思議佛剎無障礙解脫門一毛等者約偈不思議解脫力也無礙有二義一唯就所現則毛中多剎自互無礙二雙就能所一毛不大而多剎不小一多大小皆無礙也又由無大小相故此於取著障得解脫普智眼天王得入普門觀察法界解脫門一門攝一切門名為普門隨一一門各全收法界故於其中觀察法界深智契達故名為入此於隨相中得解脫樂施慧天王至出現無邊劫常現前解脫門衆生無邊根器各異應形說法種種不同既根熟不休故窮劫長現此於異苦不化生障得解脫善種慧光明天王至入不思議法解脫門謂觀事入理理超情表云不思議此於諸業報得解脫無垢寂靜光天王得示一切衆生出要法解脫門法門無邊出者為要根器萬品故出要難思此於著相得解脫廣大清淨光天王至應化衆生令入佛法解脫門種種方便但隨所應終成種智名入佛法以大悲出現皆等雨故此於不欲利生得解脫上云出要令離妄苦今云入法令得真樂也二偈頌讚佛爾時可愛樂法光明幢天王至而說頌言觀己衆內三類天者上五淨居非所被故十偈次第一如長行諸佛境界不思議至廣大意樂無窮盡前二句即所疑境界境界之言通分齊所觀普令者觀根為說故生信解者斷疑也信佛大用分齊難測故斷佛上疑生其正解信佛所觀之境則斷法上疑亦生正解謂如有疑云為存因果非真空耶為是空故無因果耶今明秪由真空能立因果因果立故乃是真空也第四句釋一切之言佛以利生為意樂故既該一切故廣大無盡若有衆生堪受法至嚴海天王如是見初句即憶念次二句令見佛一切法性無所依至此義勝智能觀察初句即法性平等無依次二句即莊嚴身謂如法性為嚴故無依處隨諸衆生心所欲至此智幢王解脫海初句即了一切世間次二句即一念安立不思議莊嚴海過去所有諸國土至愛樂寂靜能宣說初二句即毛孔現剎上云不思議佛剎但以橫多今云過去乃豎窮前際皆示現者如鏡現像次一句是無障礙令應度者見即佛神通依佛鏡智而觀乃法性恆爾一切法門無盡海至智眼能明此方便初二句即普門次句即法界末句義兼於入十方所有諸國土至愛樂慧旋之境界初二句即為一切衆生種種出現次句即無邊劫常現前謂約機隱顯佛無去來故常現也佛觀世法如光影至善種思惟能見此初句即觀一切世間也次二句即入不思議法也若約理論深是深非甚今不壞事而即理故曰甚深全攬理以成事名為幽奧處兼上二法常寂然釋上義也以諸法即寂故不可以理事思也佛善了知諸境界至此寂靜天能悟入初二句示一切衆生次句顯出要法世尊恆以大慈悲至清淨光天能演說初二句即觀應化衆生次句令入佛法三明三禪天二初長行得法復次清淨慧名稱天王至解脫道方便解脫門即寂普現名為方便說即是道由說入佛解脫海故此於體用有礙得解脫也又方便言亦通入解脫之方便也最勝見天王至如光影普示現解脫門隨一切等者謂不能普現得解脫也光影之言略有二釋一謂因光發影影但似質而不似光依智現形形隨衆樂不隨自智隨樂即應名普示現二水中之月亦名光影謂佛月不來影現心水影多似月少似於水謂水動則流光蕩漾水濁則似晦魄臨池若止而且清則圓璧皎皎此亦隨自他意也此就天王且隨天衆所樂偈就佛無不應也寂靜德天王得普嚴淨一切佛境界大方便解脫門佛境界有二一如如法性是佛證境二十方國土是佛化境嚴淨亦二離相息妄則嚴如境萬行回向則嚴化境此二無礙大方便也此於無巧莊嚴得解脫也須彌音天王得隨諸衆生永流轉生死海解脫門謂大悲深厚故隨入生死衆生無邊故永流轉而示導也此於無大悲捨衆生障得解脫也淨念眼天王得憶念如來調伏衆生行解脫門佛調衆生或折或攝或兼二行雖悲願多門皆令趣無上道若憶念此居然受化不滯於權此於勝所緣有忘念障得解脫可愛樂普照天王得普門陀羅尼海所流出解脫門佛以稱法性之總持包攝一切總持故云普門復能流演無盡故得稱海此於聞思有妄失障得解脫也世間自在主天王得能令衆生值佛生信藏解脫門謂佛出難值引之令值信心難生勸之令生信含衆德所以名藏下經云信為寶藏第一財故此於嫉妬邪見障得解脫也光𦦨自在天王至聞法信喜而出離解脫門上令信佛此令信法仰依即信領解便喜信可趣入喜則奉行因得解脫名而出離此於迷覆衆生障出離道得解脫樂思惟法變化天王至如虗空無邊無盡解脫門謂衆生界法界調伏界虗空界皆無邊無盡菩薩悲智以方便界開示法界行調伏界等虗空界於有限礙障得解脫故變化幢天王得觀衆生無量煩惱普悲智解脫門由悲故憐愍由智故觀察觀察煩惱知病行已化而度之此於無悲無方便障得解脫也二偈頌讚佛爾時清淨慧名稱天王至而說頌言十一頌初十次第如前長行依梵本列名中此長行闕第十一天彼名星宿音妙莊嚴天王下言妙音者略而未回了知法性無礙者至令衆同歸解脫海初二句是了達方便依法性而現故後二句說即是道說不思議解脫令衆同歸如來處世無所依至此勝見王所入門初二句明光影普現無依故如影第三句成上二義以無生故如影無依略不明隨天所樂無量劫海修方便至寂靜德天之所悟初句標方便無量劫修兼顯大義次二句正明方便嚴佛境界衆生愚癡所覆障至此須彌音之解脫初二句即衆生永流轉謂無明所盲覆本淨心造業受身故恆居生死次句即隨而示之諸佛所行無上道至淨眼諦觀能悉了總相頌佛調生行初句高次句深後句廣如來恆以總持門至普照天王此能入初二句即普門陀羅尼次句即所流出示教者示其善惡教使修行稱性無偏故偏而無盡如來出世甚難值至此自在天之所得初二句值佛次句生信藏不信即佛難值正信唯佛能生既值佛生信反覆相成今之一遇何得不信佛說法性皆無性至光𦦨天王能善了初二句即所聞之法以無性為法之真性次句即令衆生信喜出離淨則出不信濁成無漏故三世如來功德滿至如是樂法能開演初句能調伏人前因此果耳化衆生界即調伏行無邊無盡為不思議思惟悅生是名為入衆生沒在煩惱海至此化幢王所觀境初二句即衆生無量煩惱謂利鈍二使愛見羅剎皆甚可怖也次句以悲愍之以智令離如來恆於大光明至此妙音天所入門既闕長行對名略顯初二句星宿莊嚴義也謂佛光流於法界粲若星羅次句即妙音莊嚴化衆生事不出三輪上云妙音舉一立稱耳若長行立名應云得於光現佛輪攝化解脫門四二禪天二初長行得法復次可愛樂光明天王至銷滅世間苦解脫門二義一內證真樂經論共說樂有五種謂一因二果三苦對除四斷受五無惱害無惱害樂更有四種謂出家遠離樂禪定適悅樂菩提覺法樂涅槃寂靜樂今當第四若通取受字兼禪定菩提則含因果言恆受者以無所受受諸受故若待境界即非恆也二而能降下外建大義降神現相除苦因果此於涅槃體用障得解脫門清淨妙光天王至一切衆生喜樂藏解脫門謂無緣大悲與性海相應拔世憂患故出生喜樂無盡名藏此於惱害心得解脫自在音天王至一切衆生福德力解脫門修福德因感依正果福之力也雖多人多劫所感念劫融之頓現此於時劫得解脫也最勝念智天王至皆悉如虗空清淨解脫門謂以佛力不動成住壞三皆如空劫常清淨也此於遷變得解脫也可愛樂淨妙音天王至一切聖人法解脫門謂信樂佛菩薩法敬奉修行則於二障得解脫也善思惟音天王至一切地義及方便解脫門地謂地智義謂清淨即離念超心地也方便者教導及入地之由入住出等也以無盡辨演無盡法故能經劫演莊嚴音天王至大供養方便解脫門通有二義一現多身與多供供於多佛皆稱真故名大方便即長行意二一念八相遍法界故名大方便即偈中意於上自在名為解脫甚深光音天王得觀察無盡神通智慧海解脫門於定慧障得解脫也廣大名稱天王至出現世間方便力解脫門果滿應機此於現身化生無堪任性得解脫最勝淨光天王至發生深信愛樂藏解脫門見佛大願雲愛樂隨學此於自輕障得解脫二偈頌讚佛爾時可愛樂光明天王至而說頌言我念如來昔所行至以佛威神令悉見前三句明寂靜樂通舉因樂以顯果樂後句降現之用佛身無相離衆垢至此是妙光之解脫初句即所相應海次句即能應大悲大悲荷物故名為地次句即生喜藏憂除故喜患除故樂佛法廣大無涯際至自在音天解脫力初句能現次二所現佛神通力無與等至勝念解脫之方便初二句即普使成住等次句如虗空清淨以三災彌綸而淨土不毀故然三四二偈似有前却且順文釋耳如諸剎海微塵數至此妙音天法門用初二句咸敬奉是愛樂餘是聖人次一句即上法及信受也佛於無量大劫海至善思音天知此義初句經劫住次二句即地義方便無邊是一切也如來神變無量門至此莊嚴音之解脫通頌八相普周略無供養威力所持能演說至此光音天解脫門初句是前智慧次句神通次句無盡及海以隨根令淨是深廣故如來智慧無邊際至廣大名天悟斯道初二句即德海滿足次句出現世間佛昔修習菩提行至最勝光聞大歡喜三句通明前昔誓願力第四結中便顯深信愛樂藏以文云大歡喜故五初禪天二初長行得法復次尸棄梵王至所行清淨無染著解脫門大用應機故普遍說法用而常寂故行淨無染得心無行故行淨了境無相故無染慧光梵王得使一切衆生入禪住解脫門佛為定境住定則所見深故善思慧光明梵王得普入一切不思議法解脫門法海難量名不思議一言演盡名為普入普雲音梵王得入諸佛一切音聲海解脫門圓音隨類名音聲海要無分別方入佛聲觀世言音自在梵王至教化一切衆生方便解脫門化生即是趣菩提行故以宿住智明記寂靜光明眼梵王至業報相各差別解脫門衆生報異隨業有差佛示現受令生正信普光明梵王至品類差別皆現前調伏解脫門於法自在方能隨類調生變化音梵王至清淨相寂滅行境界解脫門佛身無相等法性之清淨現而同化為寂滅之行矣光耀眼梵王至無依止常勤出現解脫門不著諸有故能常現三業無邊更無可依悅意海音梵王得常思惟觀察無盡法解脫門觀性無相猶如虗空何有可盡察用隨宜如擊水文隨擊隨生復何可盡二偈頌讚佛爾時尸棄大梵王承佛威力至而說頌言上首觀衆開成四天合即梵身即衆亦有經云梵衆梵身梵輔梵眷屬身即是衆輔即眷屬佛身清淨常寂滅至譬如空雲如是見初句法身普遍道場次句知光說法次句行淨無染境相知行既亡則大用影像亦寂後句通以喻顯雲不離空空不礙雲以況寂用佛身如是定境界至此慧光王之所悟初二句入禪之境如來法身即是心性若能觀之為上定故次句示入方便雖多同入一寂佛剎微塵法門海至善思慧光之解脫初句即不思議法次二句明普入義以一言說盡故一言說盡之辨劫海亦不能窮顯法無盡也約能包則一言說盡約能久則劫海莫窮然一言但說剎塵未是無盡設欲一言盡者則二三兩句相違一言說盡劫海更何所演而得無窮更有所演前則不盡又不可重說若欲通者總望則可說盡隱映重重則不可盡如擊水文小擊大擊遍擊各隨文生盡未來際擊盡未來文生為難思法也諸佛圓音等世間至普音梵天如是悟圓音之義文略有三義一廣無邊二別詮表三無分別如次三句餘如出現品辨三世所有諸如來至自在音天之解脫初二句即教化衆生方便行三世諸佛皆以利他為向菩提自清淨業故次句前就梵王故云憶念今據如來故身現耳一毛尚現何況全身一切衆生業差別至寂靜光天能悟入初句業相差別次句報相差別次句現同世間無量法門皆自在至此是普光之境界前二句即隨類調生調法自在故能隨類廣遍次句顯明前義無思成事故佛身如空不可盡至變化音王悟斯道初二句明佛體性即前清淨寂滅不可盡下略顯四義如空次句佛用應現為行故皆如化不失寂滅如來身相無有邊至光耀天王入此門初二句所現無有邊次句勤觀無依著法王安處妙法宮至此海音王之解脫初二句常思大用無盡謂安住大悲宮能現大事故次句常觀法體無盡二欲界諸天七初他化天王二初長行得法復次自在天王至無量衆生自在藏解脫門謂現衆生前自在調伏使其成熟化法無盡故名為藏善目主天王至樂令入聖境界樂解脫門觀世樂相皆苦故應捨觀世樂性即入聖樂妙寶幢冠天王至種種欲解令起行解脫門隨樂斷疑令起正行勇猛慧天王得普攝為一切衆生所說義解脫門一音普攝諸義遍於時處為物而說妙音句天王至增進自所行解脫門倣佛修慈妙光幢天王至摧滅一切憍慢幢解脫門大悲十力摧彼高慢而無摧心故云示現寂靜境天王得調伏一切世間瞋害心解脫門以智慧光照諸世間令離三毒之暗則無惡趣之果瞋癡障重故與偈互陳妙輪莊嚴幢天王至佛隨憶念悉來赴解脫門念佛三昧純熟故隨念何佛即能得見如休捨解脫等華光慧天王得隨衆生心念普現成正覺解脫門應念現成因陀羅妙光天王至大威力自在法解脫門寂用自在現世調生總名威力二偈頌讚佛爾時自在天王承佛威力至而說頌言佛身周遍等法界至於法自在能開悟初句體遍次句用周故能現前次句教藏能成後句所成自在開於法藏悟深法門即成熟也世間所有種種樂至妙眼天王觀見此初二句二樂次句令入如來出現遍十方至勇猛慧天之解脫三四可知世間所有廣大慈至此妙音天之所得三句共顯如來大慈初二句舉劣顯勝次句以喻正顯謂世慈有相若須彌之高大海之廣終可傾盡佛慈稱性若芥子之空投刃之地即不可盡又如空有普覆常攝廣容無礙難壞無盡略舉一無盡耳一切衆生慢高山至此妙輪幢之解脫文並可知如來自在不可量至此解脫門華慧入初二句明佛體普遍無成不成次句隨衆生心現成正覺無量無邊大劫海至此主光天之所悟普現十方即普入一切世間餘皆威力自在二化樂天二初長行得法復次善化天王得開示一切業變化他解脫門為物開示諸行如化化雖體虗而有作用為力業又從緣無性而報不亡寂靜音光明天王得捨離一切攀緣解脫門攀取緣慮是惑病之本若心境無得則捨攀緣變化力光明天王至令智慧圓滿解脫門暗滅智生如月盈缺莊嚴主天王得示現無邊悅意聲解脫門梵聲微妙故云悅意應遍十方故云無邊念光天王得了知一切佛無盡福德相解脫門此義三義一福德之相有十蓮華藏世界微塵數故無有盡二謂清淨慈門等無限因所生故一一因果皆稱真故一一即無有盡皆同虗空三大慈悲行是福德相使盲聾視聽等皆慈善根力故涅槃經中有聞讚佛為大福德怒云生經七日母便命終豈謂大福德相讚者云年志俱盛而不卒暴打之不瞋罵之不報是故我言大福德相怒者聞而心伏故慈為無盡福相然與前義相成最上雲音天王至過去一切劫成壞次第解脫門三達圓智了三世劫此就天王且言宿住耳勝光天王得開悟一切衆智解脫門此門闕偈上下文中屢有開悟即同法華開示悟入以開攝示以悟攝入謂開示約能化悟入約所化彼論云開者無上義謂除一切智智更無餘事即雙開菩提涅槃謂以知見之性為涅槃知見之相為菩提衆生本有障翳不現佛為開除則本智顯故示者同義三乘同法身故悟者不知義不知唯一實事故今令知成報身菩提故入者令證不退轉地故即是因義為證初地已上為菩提涅槃因故廣如彼釋妙髻天王得舒光疾滿十方虗空界解脫門稱性之光有何難遍喜慧天王得一切所作無能壞精進力解脫門謂契理具修長劫無倦故衆魔外道所不能摧華光髻天王得知一切衆生業所受報解脫門善惡等殊苦樂等異皆知性相普見十方天王至衆生形類差別解脫門無邊品類一毛頓現更無來去尤顯難思二偈頌讚佛爾時善化天王承佛威力至而說頌言脫於第七唯有十偈世間業性不思議至一切衆生差別業初句總次句開示後二句顯如化力差別業者果不亡故種種觀佛無所有至此法寂音之所見初句所攀緣後二無得然緣境有二一真二妄真佛有緣亦成妄惑況於妄耶種種觀者五求不得故謂佛有耶常見為惑謂佛無耶耶見深厚四句百非所不能加故無所有非唯一佛十方亦然應化示現非真實故求實無得即見真身真即無緣佛尚應捨何況餘境佛於劫海修諸行至入此解脫莊嚴主三四可知世間所有衆福力至此念光天所觀見初二句福德相次句無盡相相好經云盡人中福不及一天乃至云盡世間不及如來一相等三世所有無量劫至最上雲音所了知約天之智普知約佛一毛能現十方虗空可知量至妙髻天王已能悟初二句明毛孔過空謂靈智證理非如虗空真理超事故亦非比無限理智不可分析隨其少分則融攝重重故一毛之量便越虗空次句別示越相謂毛孔不大而無涯即廣陋無礙故杜絶思議之境前即光外展今即一毛內廣文綺互耳一毛本自遍空十方豈得難滿佛於曩世無量劫至喜慧能知此法門初句長時修次句無餘修次句無間修具此三修故進力難壞而言廣大波羅蜜者至第五經釋業性因緣不可思至此是華光之入處初句總顯業之性相即緣生果報之不亡便是無性之非有故不可有無思也次句佛如是說天如是知次句以法性示業性汝應觀佛一毛孔至此普見王之所了初二句小一現大多為一難思次句現時不來不現不去又難思也
