body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經七女敬順從有十四偈分三初三忘苦眷德爾時童女白太子言敬奉來教即說頌言無量劫海中地獄火焚身至甘心受此苦二希同勝行即正是發菩提之心無量生死海以我身肉施至願能眷納我三有五偈勸詣如來我曾夢見此妙法菩提場至供養彼如來八太子攝受爾時太子聞勝日身如來名生大歡喜由敬佛故心生歡喜願見彼佛以五百摩尼寶至瞻仰太子目不暫捨九母陳慶遂故重讚女十偈分四初一標其遂志其母善現於太子前而說頌言此女極端正功德莊嚴身昔願奉太子今意已滿足二有二偈德行懸同持戒有智慧具足諸功德至遠離一切過三有四偈身語超倫此女身柔軟猶如來繒纊至悉離諸惡業四有三偈內心蘊德心淨無瑕垢遠離諸諂曲至恭敬一切佛十正共修行亦分十段初詣佛供養爾時太子與妙德女至五百摩尼以為間錯二聞經得法時佛為說普眼燈門至勝日身如來者我身是也二見中間多佛彼佛滅後其世界中至我皆親近承事供養此但略例四十八佛以為流例廣明如結中三正得法之時其最後佛名廣大解即六十億那由他之後於彼佛所得淨智眼至菩薩三昧海境界解脫四多劫修瑩二初於一剎塵劫修行二初多劫修行未窮菩薩之境佛子我得此解脫已至心行智慧三昧境界二明菩薩難遇見者不空佛子若有衆生得見菩薩至三菩提得不退轉二於百剎塵劫修行二初多劫修證未知菩薩解脫佛子我見彼佛得此解脫已至所得普賢解脫門二釋不知所由二初總顯深廣何以故菩薩普賢解脫門至與如來境界等所以不知者以稱事理之無邊等諸佛之境界故斯則等覺菩薩解脫十地不知故名普賢解脫二別顯深廣難知之相謂一毛法不可窮況多毛多身廣大之用以是無盡無邊之法門故於中有五初一毛中見器世間佛子我於佛剎微塵數劫至種種方便種種清淨二見智正覺世間又於菩薩一一毛孔至說種種修多羅恆不斷絶三見衆生世間又於菩薩一一毛孔至種種作業種種諸根四見菩薩修行又於菩薩一一毛孔至無邊攝取衆生方便五總結不窮深廣佛子我於佛剎微塵數劫至悉見三世法界中事四謙己推勝佛子我唯得此觀察菩薩至能知能說彼功德行五指示後友二初指後位善男子此世界中有佛母至衆生善根常無休息如後當釋二頌前法臨行再述故三十一偈分三初一總顯菩薩益生爾時釋迦瞿波女至承佛神力即說頌言若有見菩薩修行種種行起善不善心菩薩皆攝取超頌前見者不空生下女人染心之益二有十五偈明遠劫前乃往久遠世過百剎塵劫至妙相莊嚴身長行所無長行語真淨發心但論德女今則收其雜善故敘遠緣以粗況妙三有十五偈正頌長行德女因緣此後所經劫二百有五十至諸劫所行道六戀德禮辭爾時善財童子頂禮其足繞無數匝辭退而去已下入第七十六經大文第二有十一人明會緣入實相謂會前諸位差別之緣令歸一實法界生於佛果如摩耶生佛故次明之然人雖十一約法唯九約會為十初一為總餘九為別故摩耶得智幻法門末後德生亦得幻住始終相會該於中間總別圓融歸實無二故摩耶既會緣入實何得更須十人豈不向言總別相會非別無以成總故又顯餘是所會之緣所以語十表其無盡無盡之緣皆成摩耶之實德故又此一相義當等覺等覺方能親生佛故等覺却入重玄門中故有十人多明入俗初天主光且須正念無失次可為世師遍窮衆藝字智之門無依無盡無著清淨清淨則淨智發光發光則智相無盡無盡則成願不違方能還歸幻住故雖十一不失入實之言始末皆幻方知諸緣體虗即實今初總中文六初依教趣求二初將詣觀成三初標將詣觀成爾時善財童子一心欲詣至即時獲得觀佛境界智摩耶昔云天后天后能生佛故權教中說生佛七日命終生天晉經指在迦毗羅城則顯常不滅矣又上文云此世界者亦表即佛境界是故證得觀佛境智然說摩耶或云是實非化或云是化非實或云亦化亦實或云非化非實皆帶方便約此宗說即法界實德人法圓融二別明觀念二初總作如是念是善知識至以如幻願而持佛身總念勝德已能暗合願智幻門二別隨意生身無生滅身至唯是普賢淨目所見別念一十七身唯普眼見冥契下文天后所現三思欲親承如是之人我今云何至思其語言受其教海二勝緣引導三初主城神顯教修心三初以華散作是念已有主城神至衆色寶華以散善財二正以言教有三十門分三初明十度行作如是言善男子至聽受一切佛所說法有十二門初施後智各有二句中八各一城神既爾令護心城是知無有一事一塵非法門矣心名城者蓋其中有正覺法王萬德所聚故二有十一句即初地淨治地法應扶助心城謂深信一切佛功德海十種勝行文小不次而數全足上一信應廣大心城謂大慈普及一切世間二慈應善覆心城謂集衆善法以覆其上三堅固應寬廣心城謂大悲哀愍一切衆生四悲應開心城門謂悉捨所有隨應給施五捨應密護心城至逐諸惡法不令其住六七皆慚愧謂不容惡故應決定心城謂集一切智助道之法恆無退轉八無疲厭應安立心城謂正念三世一切如來所有境界九如說行應瑩徹心城至所有法門種種緣起十知諸經論應部分心城至皆令得見薩婆若道十一即成就世智故能普曉衆生三有七句福智圓滿應住持心城謂發一切至周遍法界大福德聚上二是福下五是智應令心城明了至謂正念一切諸佛如來此三權智應知心城自性至謂以一切智了諸法此二實智三結讚微釋及成勝益佛子菩薩摩訶薩至乃至究竟必當成佛二身衆神密加授法二初讚友令欣爾時有身衆神名蓮華法德至種種稱歎摩耶夫人二放光加被從其耳璫放無量色相至乃至遍入身諸毛孔三善財獲益所謂十眼善財即得淨光明眼至見佛平等不思議身故不思議身者十身無礙故佛平等者佛佛同故故異於前但明法身餘可準思得無礙光眼至覩一切剎諸佛出興故三法堂羅剎教求友之方三初教二初教十法增其智時有守護菩薩法堂羅剎鬼至則得親近諸善知識二先標次釋何等為十有十一心所謂其心清淨離諸諂誑一直心大悲平等普攝衆生二悲心知諸衆生無有真實三智趣一切智心不退轉四進以信解力普入一切諸佛道場五信得淨慧眼了諸法性六深大慈平等普覆衆生七慈以智光明廓諸妄境以甘露雨滌生死熱九益以廣大眼徹鑒諸法心常隨順諸善知識十一常後是為下結是為十二息其亂三初標復次佛子菩薩成就至則常現見諸善知識二徵釋何等為十所謂法空清淨至不捨離不缺減三昧於境不捨離等者凡夫染境二乘捨境權教縱觀空有互陳並為缺減若圓修者觸目對境窮盡法源不取不捨故央掘經云摩訶衍者所謂彼眼根於諸如來常了了分明見具足無減修等又云所謂眼入處於諸如來常明見來入門具足無減修等普見一切佛出興三昧至善知識所無過失三昧三結佛子菩薩成就至處處值遇諸善知識三詰遇友者既定慧雙游無境不契並為道品則真友懸通能如是行為護正法堂也二問說是語時善財童子至城邑聚落求善知識三答文有四法羅剎答言善男子汝應普禮十方求善知識一以友無不在故正念思惟一切境界求善知識二以法為體故勇猛自在遍游十方求善知識三身同友遍故觀身觀心如夢如影求善知識四智與境合故如夢如影又前三離境界相四則離心緣相求善友者幸思此言二見敬咨問三初見三初覩依二初受行其教躡前起後爾時善財受行其教近躡羅剎之言遠通前三勝友以前二神並未答故即由前來三位調練故得覩斯勝報二正明所見三初明蓮華即時覩見大寶蓮華從地涌出所證法界自性無染故曰蓮華無明既開不離心內如從地涌亦表性淨萬行之因從法性地而出現故此即十定中普賢之華也金剛為莖妙寶為藏至無數寶網彌覆其上二明上樓觀於其臺上有一樓觀謂能證權實二智依於所證而重現故名普納十方法界藏智包無外云普納十方奇妙嚴飾金剛為地千柱行列總攝五位自分勝進故云千柱行列一切皆以摩尼寶成至階陛欄楯周匝莊嚴其一一事皆有所表恐厭繁文三明樓觀中寶座其樓觀中有如意寶蓮華之座即智體自空故樓中有座種種衆寶以為嚴飾空具性德故廣顯莊嚴妙寶欄楯寶衣間列至不可思議微妙功德
