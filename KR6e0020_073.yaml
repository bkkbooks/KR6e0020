body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經五如𦦨忍三初徵起佛子云何為菩薩摩訶薩如𦦨忍二釋義三初指法同喻佛子此菩薩摩訶薩知一切世間同於陽𦦨二別顯喻相二初喻體空譬如陽𦦨無有方所至非種種色亦非無色若開義門亦具五義一空地二陽氣三氣與空地合而有𦦨四𦦨似水即無水五令渴鹿謂有初喻如來藏二喻無明習氣三喻習氣熏動心海起於緣生似有之法四喻依他無生五喻凡小執實若十喻論法喻各有多義如彼廣説其有無等義如幻忍説二喻其相有但隨世間言説顯示三總以法令菩薩如是如實觀察了知諸法上明了法下明成忍行現證一切令得圓滿三結名是名菩薩摩訶薩第五如𦦨忍六如夢忍三初徵佛子云何為菩薩摩訶薩如夢忍二釋三初標法同喻佛子此菩薩摩訶薩知一切世間如夢二正舉喻相譬如夢非世間非離世間至非染非淨而有示現然開此夢義亦有五法一所依謂寤心以喻本識二所因謂睡蓋以喻無明習氣三所現謂夢相差別以喻緣所起法四此夢事非有而有但心變故非現前法五令夢者取以為實初明俱非喻法非有後云而示現有喻法而有雙辨為俱句五奪為雙非然此四句皆由以是夢故謂一以是夢故有夢事現於夢者為有二既言是夢其性必虗於無實處而見實故然語有則全攝無而為有言無則全攝有而為無以非二相故非但相有性無而已思之三以是夢故必具二義全有之無與全無之有二門峙立不相是故非是半有半無四既言是夢必是雙非形奪俱融二相盡故然此俱非不違雙是以若不奪無令盡無以為無若不奪有令盡無以為有是故存亡不礙俱泯自在方為如夢自在法門是故經云世間恆如夢智不得有無此之謂也三合喻十句菩薩摩訶薩亦復如是知一切世間悉同於夢上句為總下九句為別別中初句近上總句所以略無如夢二字於九句中前八辨夢後一明覺就前八中攝為四對無有變異故如夢自性故初二明常無常門體虗無變即是常義自性無恆是無常義如夢執著故如夢性離故此二辨真妄門妄由著生真由性離如夢本性故如夢所現故此二性相門性本一如相現多種如夢無差別故如夢想分別故後二明一異門但是一心一而無別隨相分別異異不同又唯是一夢想現多種上之四門各雙存互奪以為四句思之可見如夢覺時故後一句明覺即止觀門謂要在覺時方知是夢正夢之時不知是夢純昏心故設知是夢亦未覺故覺時了夢知實無夢然由於夢方有覺故所以須辨夢覺之時若離於夢夢覺斯絶觀了上之多門止不取於夢妄如此方為了夢法門三結是名菩薩摩訶薩第六如夢忍第七如響忍三初徵佛子云何為菩薩摩訶薩如響忍二釋三初忍行所因佛子此菩薩摩訶薩至修學成就到於彼岸由聞起觀能成忍故二成忍之相二初法二初指法同喻略顯其相知一切音聲悉同於響通知一切音聲如響無來無去明其體空如是示現彰其相有二了知佛聲如響佛子此菩薩摩訶薩觀如來聲非獨但喻世間聲故不從內出離機無聲故非內不從外出離佛無聲故非外亦不從於內外而出二法相依故非內外若言內外和合有者便有二聲內外相依即顯無性上明即有之無下明即無之有雖了此聲非內非外至善巧名句成就演説牒非前三而能巧現二喻顯四初喻譬如谷響從緣所起真舉從緣所起明響無性無性之相已見法中然有五法一空谷二有聲此二是緣三聲擊空谷便有響應此明所起四有而非真此彰無性五愚小謂有亦有有無等義如上準之然此一喻通喻三法一喻上一切聲則谷喻喉顙聲喻風氣二喻上如來聲則谷喻如來聲喻緣惑三喻一切法今經略無晉本具有大品十喻亦響喻一切則谷喻如來藏聲喻無明習氣二合而與法性無有相違令諸衆生隨類各解但合佛聲以從近故然初至令諸衆生隨類各解言含法喻謂約法則如來之聲不違法性而能隨類合於上文能巧示現約喻則不違本聲事法之性隨其呼人類別各解而得修學三轉以喻顯如帝釋夫人阿修羅女至亦不心念令如是出此有二意一則喻上佛聲一音隨類二則喻下菩薩無心方能普演四重合菩薩摩訶薩亦復如是至於無邊世界中恆轉法輪三忍成之益二初隨機遍説此菩薩善能觀察一切衆生至令隨所宜聞法各異二權實雙行雖知聲無起而普現音聲至悉以智慧而能了達以同於響性相無礙故是則由聞如響之教了如響之聲發如響之音演如響之法也三結是名菩薩摩訶薩第七如響忍八如影忍文有四別初標佛子云何為菩薩摩訶薩如影忍二釋三初法有十一對分三初七對雙遮顯性以成止行如影無實故佛子此菩薩摩訶薩至非是世間非出世間二二對雙照性相以成觀行如影雖虗而能現故非修菩薩行性則非修非捨於大願相乃不捨非實真即俗故非實非不實俗即真故非不實三二對遮照無礙成雙運自在行雖常行一切佛法而能辦一切世間事雙照真俗即權實雙行不隨世間流亦不住法流雙遮真俗即權實雙寂遮照一時為雙運互奪無礙為自在以此結上二段同斯無礙為忍相之深玄二喻文具五法初為所依本質譬如日月男子女人舍宅山林河泉等物若約影喻別喻菩薩現身則日等喻悲智願等若約影喻通喻一切法則日等喻因其河泉二種雖通能現且為所現長河飛泉入鏡中故二明能現之處於油於水於身於寶於明鏡等清淨物中亦有通別別喻機惑及應現處通喻於緣謂無明等然此文具攝論三喻一以油水對上日月為水月喻喻於定地所引境界以水有潤滑澄清性故鏡等影像闕此潤等喻非定地二以於身對上日月為光影喻身映日等而有影故弄影多端故喻於諸識三以寶鏡等對上男子等為影像喻喻定地果報以鏡中影像離於本質別現鏡等之中故喻於果與因處別前映質之影雖因日等影乃隨身不於日內而現故喻諸識雖託境生異自在我非在於境上所依能現二段是緣三明緣之所起而現其影亦有通別二果可知四明有之非有影與油等非一非異非離非合攝義多門於中一異合離通顯影義初一異約此影彼影合離約影對於水等次別顯影義於川流中亦不漂度於池井內亦不沉沒不通二影如月映淮流流水不將月去光臨潭上萬仞不見光沉喻菩薩同世遷流不漂生死證真寂滅不沉涅槃後雙結有無雖現其中無所染著喻性相交徹兼於鏡像五愚小取為有然諸衆生知於此處有是影現亦知彼處無如是影由以有無定為有無不知即影了不可取故成執著上明取有無故為執著遠物近物雖皆影現影不隨物而有近遠舉影正義顯上為執不知此影無遠近故二合二初正合前文菩薩摩訶薩亦復如是至不作二解謂自他別舉智境合前本質而於自國土於他國土合前油等各各差別一時普現合前現影二轉以喻合非有之有如種子中無有根芽莖節枝葉而能生起如是等事上喻下合菩薩摩訶薩亦復如是至善巧方便通達無礙有無無礙名為方便等三結是名菩薩摩訶薩第八如影忍四果三初約法性身菩薩摩訶薩成就此忍至同於世間堅實之相得稱性之身如影不往而至不分而遍故二結成無礙然此差別即非差別別與不別無所障礙以無差是差之無差故雖不往而遍令物見殊差是無差之差故雖遍而不在彼此三顯此身因此菩薩從於如來種性至無邊色相清淨之身其無邊身近局果中亦通前法九如化忍四初標佛子云何為菩薩摩訶薩如化忍化者無而忽有故二釋三初法二初總標佛子此菩薩摩訶薩知一切世間皆悉如化標法同喻具能所知既知一切世間不但局於所化情類略標世間應具出世二別顯二初顯所知十句初五染化所謂此五不出惑業苦三前四是苦即五蘊相一切衆生意業化覺想所起故一識由想起一切世間諸行化分別所起故二行因識生分別是識故一切苦樂顛倒化妄取所起故三受因想起想取愛憎相故一切世間不實法化言説所現故四色亦行生無記報色如沫不實名言熏習即是行故一切煩惱分別化想念所起故五即是惑惑由想行念即行故業通二處初句意業此句分別皆是業故此中意等從緣無性如化不實本無今有如化相現故仁王經云法本自無因緣生諸淨化二義倣此可悉二五淨化復有清淨調伏化無分別所現故一方便調生依真智故於三世不轉化無生平等故二湛然真智由理成故故上文云智入三世了法平等菩薩願力化廣大修行故三願由行滿如來大悲化方便示現故四慈悲復依方便立故轉法輪方便化智慧無畏辨才所説故五具無畏辨能轉法故二別顯能知菩薩如是了知世間出世間化結前生後世間結前染出世結前淨亦結餘所不盡謂乃至一法過於涅槃亦如化故或説涅槃不如化者大品云為新發意菩薩恐其驚怖分別生滅方如化故了知之言即是生後次正顯能知上言了知知有六義現證知若事若理非比度故廣大知旁無遺故無邊知契中道故如事知稱俗境故自在知真俗無礙故真實知歸一實諦故非虗妄見所能傾動隨世所行亦不失壞結上六知處真道而不傾行非道而不壞二喻譬如化應開四義一能化者以喻因緣二化現事喻所起果三現用而無實四愚小謂真故十喻傳云猶如化事雖空無實能令衆生憂苦瞋恚喜樂癡惑諸法亦爾云何無實如彼化人無生老死苦樂異餘人故有四十句初句標次三十七句一向雙非以顯無實不從心起不從心法起至非生死非涅槃後二句義通二種非有非無有一亦是雙非謂無有亦無故二雙融性相化不實故非有現化事故非無有對成四句及一異等準前思之二合二初化行四初起化用菩薩如是善巧方便至了知世法分身化往以同化相有故然但云菩薩如是者以上諸非一一通法故指上如是為善巧方便二明化智不著世間不取自身至不住於法不離於法以了化不實故三雙非顯中以本願故不棄捨一衆生至雖無所有而滿足佛法四結示化旨了法如化非有非無二化益佛子菩薩摩訶薩如是安住至菩提之道利益衆生三結是名菩薩摩訶薩第九如化忍四果二初得利他業用之果菩薩摩訶薩成就此忍至明照法性平等圓滿二得依自利立勝名果佛子此菩薩摩訶薩至不能為障名無礙者十如空忍四初標佛子云何為菩薩摩訶薩如空忍標云如空如空所喻通一切法佛地論喻清淨法界以雜差別相故及中邊等論喻圓成實但是此中一義然其喻相小異諸喻諸喻開義多分有五雖然正取所成幻等以喻於法而亦取緣等以顯無性此中喻相不間別法直指於空具含多義以喻於法又此諸喻若約能喻五多喻中多取似有以破實有化喻以不有之有破於似有此喻以性相俱絶破於一切又前六遣有會空多依空立有少此一遣有入空少依空立有多又上所喻則通一切此中能喻則具多義所喻各隨別義喻一類法龍樹十喻以四復次釋如空義一近無遠有謂如虗空非可見法以遠視故眼光回轉則見縹色一切諸法亦復如是空無所有以凡夫人遠無漏慧棄捨實相則見彼我男女等物而實此物竟無所有二約性淨不染三約無初中後四約體實無物及佛地論有十復次上八地中空有十義皆是略明然約別義有此不同若約同義諸喻無別故睿公云十喻以喻空空必待此喻借言以會意意盡無會處若得出長羅住此無所住若能映斯照萬象無來去餘有無無礙等義如前後説二釋二初忍解之相二初別明佛子此菩薩摩訶薩以空九義喻九種法隨義雖別然其總意亦以緣成無性故空然九句各初標法同喻後出所以了一切法界猶如虗空以無相故一標事法界如空下出所以者以無相故謂從約無性其相自虗即事當體是理法界故此句為總一切世界猶如虗空以無起故二世界共業所起故一切法猶如虗空以無二故三軌儀教法一味法界之所流故及餘六句並準初句一切衆生行猶如虗空至猶如虗空無著無礙故三總結菩薩如是以如虗空方便了一切法皆無所有二忍行成益三初總明得如空三業業具佛子菩薩摩訶薩以如虗空忍智至如虗空意意業二別顯德齊虗空譬如虗空一切法依至智慧諸力不可破壞上二句一向喻實無依為依譬如虗空一切世間至而菩薩心無有邊際餘九句皆顯性相無礙從緣有故無性空故又此二相即故便成四句一緣生故空緣生故有二無性故空無性故有三緣生故有無性故空四即反此餘一異等並例此知無法出空故皆現其前空不可見是故不現諸法之前餘文並顯三徵釋得益之由二初徵何以故徵意云所以得者二釋意云空觀成故於中有二初智證齊空菩薩所作如虗空故至皆悉平等一體一味一體者真如平等故一味者解脫不殊故一種分量大小皆稱性故如虗空清淨遍一切處至於一切法無有分別二德用滿空嚴淨一切諸佛國土至轉於法輪未曾失時三結是名菩薩摩訶薩第十如空忍四果菩薩摩訶薩成就此忍至身智慧力如虗空故得二十種身前十與十行及離世間大分相似然通相多從德用以立其名可以意得四總結十忍佛子是名菩薩摩訶薩十種忍二偈頌一百七頌大分為二初百頌頌前但頌廣釋即為十段段各十偈初有十頌頌音聲忍於中二初二偈頌所聞佛説爾時普賢菩薩摩訶薩欲重宣其義而説頌言譬如世有人聞有寶藏處至甚深寂滅相二有八偈頌能入佛法聞此深法時其心得安隱至供佛令歡喜於中一偈頌不驚怖畏一偈深信一偈悟解二偈愛樂一偈修習安住後二偈頌趣向而專心憶念二頌順忍如有大福人獲得真金藏至亦不分別法初一偈三句頌思惟次二偈一句頌隨順了知令心清淨次一却頌觀察平等無違餘頌正住修習三頌無生忍於中三初三頌標三十三天中所有諸天子至無生故無滅以前三忍皆是法説故偈初各加其喻二有四偈頌釋無滅故無盡無盡故無染至方便善説法後三結難此忍最為上了法無有盡至置於善道中四頌如幻忍二初六偈頌前略説於中有二初四頌指法同喻及顯緣相世間種種法一切皆如幻至示現有種種二有二偈頌成就忍行度脫諸衆生令知法如幻至一切皆如幻二有四頌頌廣説三初二頌喻幻作男女形及象馬牛羊至但隨分別現次一頌合菩薩能如是普見諸世間有無一切法了達悉如幻三忍行成衆生及國土種種業所造入於如幻際於彼無依著五如𦦨忍初一躡前生後以明觀意如是得善巧寂滅無戲論住於無礙地普現大威力二有五偈指法同喻勇猛諸佛子隨順入妙法至遠離三顛倒三頌喻譬如熱時𦦨世見謂為水至智者不應求四頌合衆生亦復然世趣皆無有至是菩薩方便六頌如夢忍正頌前合兼頌標喻菩薩了世法一切皆如夢至廣度諸羣生十頌頌前九句一頌無變異次一頌頌自性上二兼頌標法三頌執著翻則解脫兼頌前喻四頌性離五超頌所現六却頌本性七八二頌頌無差別九頌想分別十頌覺時七頌如響忍四初一偈頌忍行所因修行如是行出生廣大解巧知諸法性於法心無著文云修行如是行似結前喻既言知諸法性義同忍行二二偈頌聞一切聲如響一切諸世間種種諸音聲至其心亦如是三有二偈頌知如來聲如響瞻仰諸如來及聽説法音至與法無乖謬四餘頌忍成之益其喻遍諸偈中善了諸音聲於聲不分別至於世無所著八頌如影忍頌法説十對喻合含在其中十頌分九初二偈頌非世生沒為欲利世間專意求菩提至修行意不動謂了寂故不生饒益故不沒二有一偈頌不在內外不住於世間不離於世間於世無所依依處不可得不住故不內不離故不外三有一偈頌非行不行了知世間性於性無染著雖不依世間化世令超度了無染故非行化世故非不行四有一偈頌非同非異世間所有法悉知其自性了法無有二無二亦無著知自性故非同了無二故非異五有一偈頌非往非不往心不離世間亦不住世間非於世間外修行一切智第二句不往而行餘三句非不往六有一偈半頌非住非不住譬如水中影非內亦非外至以世不可説初半偈兼別頌喻故云非內外七有二句頌非是出間非出出間亦不在內外如影現世間八頌非修菩薩行非捨於大願入此甚深義離垢志明徹不捨本誓心普照智慧燈九頌雖常行一切法而能辦一切世間事世間無邊際智入悉齊等普化諸羣生令其捨衆著其實不實及不住世流法流義通結上故略不頌九有十頌頌如化忍四初三偈頌總知一切世間如化觀察甚深法利益群生衆至菩薩行亦然二染法化一切諸世間及以無量業平等悉如化畢竟住寂滅三淨法化三世所有佛一切亦如化至化力為説法言度脫亦如化者為釋疑故謂觀察衆生如化何用化之故此答云化若有實可招來難度既如化化之何妨四有四偈頌合知世皆如化不分別世間至智慧亦如是十如空忍二初一頌忍解之相第十忍明觀衆生及諸法體性皆寂滅如空無處所二忍行成益三初頌別顯德齊虗空獲此如空智永離諸取著至菩薩之所得二有三偈頌徵釋得忍之由自住如空法復為衆生説至悉等虗空性三有一偈却頌上總明得如空三業智慧與音聲及以菩薩身其性如虗空一切皆寂滅二頌結歎二初三偈二利行圓如是十種忍佛子所修行至轉於無上輪言超過一切衆者正顯十頂之義二有四偈顯深難測上智所知所修廣大行其量不可得至衆生莫能測
