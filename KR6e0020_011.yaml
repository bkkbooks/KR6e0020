body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經自下第二同生衆三初普賢菩薩得一切法門二初長行二初總標所入復次普賢菩薩摩訶薩入不思議解脫門方便海指陳法體言不思議者謂數過圖度理絶言思故言方便海者謂不動真而成事巧以因門契果故云方便入如來功德海辨法巧能謂證入因圓趣入果海故然前後但明以別入總故各得一解脫門猶如百川一一入海今明以總入總如海入海故得難思解脫門復稱能入為方便海以普賢是同異二衆之上首故二別顯十門以彰無盡所謂有解脫門至調伏衆生令究竟出離嚴土調生謂隨所化衆生取佛土故一切佛土者豎通四土橫該法界橫豎相融故一塵一剎皆廣大嚴淨故云一切演最妙法故令所調究竟出離有解脫門名普詣一切如來所修具足功德境界佛遍塵道詣彼修德乃了彼境有解脫門名安立一切菩薩地諸大願海通辨安立菩薩六種功德一位二願餘四在偈有解脫門名普現法界微塵數無量身身普應機演所證法有解脫門名演説遍一切國土不可思議數差別名國土不同所敬各異故隨宜立稱成益不空如名號品有解脫門至悉現無邊諸菩薩神通境界塵中現身説菩薩行境有解脫門名一念中現三世劫成壞事以時隨法融令三世劫及劫中成壞一念中現無所障癡然事通能所能成壞事謂火水風所成壞事天地萬象有解脫門名示現一切菩薩諸根海各入自境界菩薩根海雖繁廣多類但能入自所知境界豈能測量佛無邊法則顯前來衆海未測佛德普賢能知此理有解脫門至化現種種身遍無邊法界明如來身體同虗空用周法界有解脫門至入一切智廣大方便攝因成果故云一切菩薩行入一切智也妙音宣此故云顯示此亦別釋標中第二句二偈頌爾時普賢菩薩至普觀一切衆會海已即説頌言佛所莊嚴廣大剎至雨不思議最妙法前半嚴淨佛國後半調伏衆生兼顯人法為嚴之義佛子有三一者外子謂諸凡夫未能紹繼佛家事故二者庶子謂諸二乘不從如來大法生故三者真子謂大菩薩從大法喜正所生故此言清淨意顯第三最妙法者揀非權小昔以妙法淨所化心故所感土亦有清淨佛子來生其國還雨妙法如於此會見佛坐至所有國土皆明現前半明總遍別中後半明體用無礙亦是總遍總中顯示菩薩所修行至令諸佛子入法界此四句即前四義一修十勝行二起十方便三所證十如四正證法界成薩婆若地位為總餘五為別出生化佛如塵數至廣大無邊悉開演前半普現身後半演所證如來名號等世間至能悉了知甚為難上四可知佛如虗空無分別至悉坐道場成正覺初句智身次句知身等法界後二句化用等法身之周遍略舉正覺實通一切故上云種種佛以妙音廣宣暢至盡與如來平等法三句攝因後句成時二十普菩薩各得一法門第一菩薩前列名中無以前與普賢共為十普今普賢別説故加為十以表圓足然偈文具十長行中第七菩薩及法門俱脫又脫第八菩薩法門及第九菩薩名至文當知初長行復次淨德妙光菩薩至莊嚴道場解脫門嚴處説法皆名為嚴普德最勝燈光照菩薩至不思議衆生界解脫門塵塵皆成正覺已為無盡方是正覺一門有如是等無量成正覺門如出現品辨隨所成正覺門調生亦爾故云成熟不思議衆生界普光師子幢菩薩至出生一切佛國土解脫門修行福海嚴出剎海普寶𦦨妙光菩薩至神通境界無迷惑解脫門以深妙智觀難思境故多處不迷多劫不厭普音功德海幢菩薩至示現一切佛土莊嚴解脫門如一逝多林會頓現一切淨土會會皆爾念念現殊普智光照如來境菩薩至甚深廣大法界藏解脫門法界含攝無盡故名為藏觀佛法界之身一毛即無分限七梵本中名普覺悅意聲菩薩得親近承事一切佛供養藏解脫門謂佛昔行因無佛不供今成佛果無衆不歸猶如百川馳流趣海普清淨無盡福威光菩薩至菩薩無邊行門解脫門準梵本應云普清淨無盡福威光菩薩得出生一切神變廣大加持解脫門謂遍剎充塵劫窮來際皆佛加持之力九梵本中即普寶髻華幢菩薩得普入一切世間行出生菩薩無邊行門解脫門即今經中威光菩薩法門是由脫第八法門及第九菩薩之名遂令第九法門繫於第八之下譯者之謬矣謂若無大悲不入生死則不能出菩薩行門如不入海安能得寶此即化他成己普相最勝光菩薩至出現一切諸佛境界解脫門即依體起用二偈頌爾時淨德妙光菩薩摩訶薩至即説偈言十方所有諸國土至一切苦難皆消滅頌文前已配釋欲表菩薩法門互入故不結法屬人後段亦然三十異名菩薩亦各得一法門二初長行復次海月光大明菩薩至一切佛國土方便解脫門得成菩提四種方便一地位二度行三調生即行位所作四嚴剎通二利因果也或一地一度滿或地地諸度滿此一為總下九皆別然不出上四多顯調生雲音海光離垢藏菩薩至種種差別處解脫門遍轉法輪智生寶髻菩薩至現清淨大功德解脫門普示滅惑功德自在王淨光菩薩至種種莊嚴解脫門普嚴場會善勇猛蓮華髻菩薩至顯示一切佛法解脫門以法隨機普智雲日幢菩薩至永住無量劫解脫門為物永存大精進金剛菩薩至一切無邊法印力解脫門法印悟物香𦦨光幢菩薩至乃至成就智慧聚解脫門頓顯始終大明德深美音菩薩至一切大願海解脫門同佛往修大福光智生菩薩至遍法界甚深境界解脫門光顯如來難思之境二偈頌爾時海月光大明菩薩至即説頌言諸波羅蜜及諸地至悉稱其根而雨法文並可知真如平等無相身至普應十方而演法初句所證性淨法身言無相者示真如相身即體義在纏不染出障非淨凡聖必同故云平等次句出纏法身也真如出煩惱障故云離垢出所知障故云光明又塵習雙亡故云離垢真智圓滿故曰光明淨法身者揀於在纏後半體用無礙身由出纏故應用無方約理則體用無礙約用則止觀雙運故得果則寂照為身即用之體故寂即體之用故智體用既無不在佛身有何量耶故能普應十方此句正顯化用故經云水銀和真金能塗諸色像智慧與法身處處應現往即斯義也法王諸力皆清淨至一切國土皆明顯八座內衆流十初明出處爾時如來師子之座至如是一切莊嚴具中座即是總寶等為別如是下結廣從略非獨輪等故云一切所以此能出者良以座該法界依正渾融一一纖塵無不廣容普遍座所遍剎恆在座中故從中出非是化也若約法空之因及法空之座則萬行為嚴能生菩薩二顯衆類一一各出佛剎微塵數菩薩摩訶薩皆是菩薩故三列衆名其名曰海慧自在至善勇猛光明幢菩薩摩訶薩出處既多名亦多種略舉上首十名耳即如次十方四結衆數如是等而為上首有衆多佛剎微塵數同時出現嚴具非一故有衆多剎塵五興雲供有標列結此諸菩薩各興種種供養雲至有佛世界微塵數六供衆海彼諸菩薩一一皆興至於一切道場衆海相續不絶衆多菩薩各興剎塵供雲已重疊難思況相續不絶而諸供具皆稱雲者乃有多義謂色相顯然智攬無性從法性空無生法起能現所現逈無所依應用而來故來無所從用謝而去故去無所至而能含慈潤霔法雨益萬物重重無礙有雲像焉上下諸文雲義皆爾七敬繞佛現是雲已右繞世尊經無量百千匝順向殷重瞻望不足乃至百千八坐本方隨其方面去佛不遠至各於其上結加趺坐參而不雜也如師子子亦名師子故菩薩座亦名師子自他自坐者自心智現自安處故諸佛菩薩坐多加趺者為物軌故智論引偈云若結加趺坐身安入三昧等九歎其德能有十二句分二初總是諸菩薩所行清淨廣大如海二別別顯一一各是一種清淨廣大略束為三初三明三業清淨廣大得智慧光照普門法至能入一切辨才法海一智證普法二身隨佛行三語入辨海中一義求亦通三業二三明得法清淨廣大得不思議解脫法門至悉能容受一切法海一獲自分解脫二住勝進果位三遍具諸持普門地言即同經初已踐如來普光明地三五明福智清淨廣大二初二正明善住三世平等智地已得深信廣大喜樂一智安理事故云善住二福無不修故生信喜然三世平等經初已明今更略示謂依生及佛善住平等且依佛説佛佛平等法身智身無增減故若依衆生生生平等煩惱業苦有支皆等若生佛相望者凡夫現在等佛過去進修得果等佛現在成佛究竟等佛常住此約三世互望煩惱佛則本有今無衆生則本無今有菩提則衆生本有今無諸佛則本無今有約迷悟異則説本今涅槃之性非三世攝故知三世有法無有是處若以性淨而説則佛與衆生現今平等而不妨迷悟之殊是故三乘亦有差別亦無差別衆生寂滅即是法身法身隨緣即是衆生故寂滅非無之衆生恆不異真而成立隨緣非有之法身恆不異事而顯現是故染淨三世一切諸法無不平等況稱性互收如是解者名為善住一切智地如地能生終歸於地萬法依於佛智究竟還至一切智也二三重顯無邊福聚極善清淨至所有佛興咸勤供養一淨前福障故令諸福無邊清淨二成上智慧由觀法界虗空三近勝緣故成前二十説偈讚佛十菩薩各別説偈即為十段就初歎佛身座二初五歎佛身具德爾時海慧自在神通王菩薩至即説頌言諸佛所悟悉已知至寂然而住同瞻仰一讚智慧二讚功德三神通四因深五果勝二五歎所坐嚴麗摩尼寶藏放光明至如是座上佛安坐此衆既從座現故多歎座二歎座及地文分三別初四直歎座爾時雷音普震菩薩至觀一切道場衆海即説頌言世尊往集菩提行至稱讚如來坐於座次三歎於場地即轉顯座嚴佛功德量如虗空至一切衆生不能了此一總顯因深德廣故嚴事難思金剛為地無能壞至悉以光瑩如來座初七句別顯末後一句結瑩寶座後三歎地上之嚴地神歡喜而踊躍至以佛威神故能爾前二地神興供嚴後一佛力展轉嚴三獨讚場地殊異德二前五德用圓備爾時衆寶光明髻菩薩至即説頌言世尊往昔修行時至寶枝雜布為嚴好後五法化流通汝等普觀於此地至如佛座上所應演九會五周之文一化隨宜之説已具演於場地之中一一法門咸具説至是故其地皆嚴淨四歎佛所處宮殿二初一總明爾時大智日勇猛慧菩薩至即説頌言世尊凝睟處法堂至其身普現十方土次段讚處彰人故此偈標人顯處凝者嚴整之貌睟者視也謂肅然而視後九別明二前四明宮殿體攝衆德即廣其前半如來宮殿不思議至佛坐其中特明顯宮殿雖耀佛坐增明即廣前炳然照耀宮殿中也摩尼為柱種種色至智海於中湛然坐略辨七嚴結以智海廣上凝睟處法堂也謂內持寶柱簷垂金鈴外列門階上羅華帳寶樹交映寶瓔周垂為七嚴也闥小門也洞達也如雲布者重重無量次第相承也上云凝睟則目視不瞬特由內無識浪故云智海湛然摩尼為網妙香幢至超世正知於此坐羅以寶網列以香幢布以𦦨明覆以嚴具結云超世即廣上世尊處法堂也光如雲布者若彩雲向日上下齊明也後五明妙用自在即廣其後半十方普現變化雲至如是皆從佛宮現羅身雲以調生正顯前文現十方土摩尼為樹發妙華至莫不於中現其影寶樹現三世之嚴處處皆有摩尼聚至棟宇莊嚴極殊麗略舉多嚴如來宮殿不思議至一一皆有如來坐即上諸嚴卷攝多嚴重重佛坐如來宮殿無有邊至莫不向佛而來集結歎無盡主伴雲會五通讚場樹自在德二初一總顯爾時不思議功德寶智印菩薩至即説頌言佛昔修治衆福海至道場嚴淨無諸垢謂宿因願力深廣難思神通現緣生果嚴淨後九別顯三初五歎樹具德嚴場如意珠王作樹根至於道場中普嚴飾初二身幹森聳次二枝葉蔭映後一華果芬暉二歎場地蓮網汝觀善逝道場中至鈴音鐸響雲間發謂蓮華布地則下轉光輪寶網羅空則雲間響發三歎樹自在十方一切國土中至衆會聞音咸得見初一收入後二出生六雙歎場樹備德自在法化宣流二前九偈各顯一門爾時百目蓮華髻菩薩至即説頌言一切摩尼出妙音至莫不調伏令清淨後有一偈結嚴周遍如來往昔普修治至一一莊嚴無量種七歎佛十力功德一頌一力下諸經文屢明十力是佛不共之德佛佛等有菩薩緣此發心梵行品云復應修習一一力中有無量義應𧫎問故不可不知然大般若五十三顯揚第四對法第十四廣辨今略以七門分別一立意二釋名三自性四作業五次第六差別七釋文然了其名則知作業對文料揀差別易見故將作業差別并釋別名並於釋文中顯今初立意者智論意云顯佛大人有真實力令外道心伏二乘希向菩薩倣之能成辦大事終獲其果故須辨之如來唯一諸法實相智力此力有十種用故説為十謂於十境皆委悉正知故由時品類相續分別有無量力度人因緣故但説十足辦其事謂以初力知可度不可度次業力知有障無障以定力知味著不味著以根力知智多少以欲力知所樂以性力知深心所趣以至處力籌量衆生解脫門以宿命力分別先所從來以生死力分別生處好醜以漏盡力知衆生得涅槃佛以此十度生審諦故但説十第二釋名初總後別今初總名力者能摧冤敵義不可屈伏義故説名力瑜伽云與一切種饒益一切有情功能具相應故畢竟勝伏一切魔冤大威力故説名為力對法云善除衆魔善記問論故十名力十者是數帶數釋也別名至文當釋三自性者瑜伽五十七云佛具知根慧根為體對法論云若定若慧及彼相應諸心心所為性菩薩地總以五根為性統其文義應具六種一最勝體故決擇分中慧根為性二引生體對法兼定三剋實體菩薩地云五根為性由慧勝故且説十方慧為自性所以但言處非處等智力不言信進等力四相應體對法兼取相應心法四蘊為性五眷屬體五蘊為體定共道共無漏色等助為體故此雖無文理必應爾遮犯戒垢助摧冤故六依此經融一切法以為其性無礙法界理應爾故四作業者即是辨相至文當顯五次第者諸文或有前却各有所由此文所列次第與十住全同淨行品則界在解前梵行品禪定解脫當其第三宿命居天眼之後餘同此次瑜伽四十九及智論二十七亦禪居第三餘同此次且依論明次第者智論云初力為總餘九為別於初力中分別有九故初一力通知萬法下九展轉開之謂初令知因緣果報故起業力次煩惱故縛淨禪定解脫故解令去縛就解次根有利鈍鈍者為有造業利者為不生故集業由善惡二欲成上下根此二種欲由二種性以有種種性因緣故行二種道謂善道惡道次知其過去審彼未來次方便壞其因緣果報相續故説漏盡瑜伽乃有多門次第廣如第五十説上來依論次第而今禪居第七者二論梵行為對自業有離欲不離欲故禪居第三此經十住為對遍趣行有清淨不清淨故居第七若習欲成性即界居欲後若由性起欲則界居欲前若執常者先説宿住若為執斷先辨天眼餘無別理故經論皆定六差別者謂此十力展轉相望亦有差別亦無差別至文當明七釋文然此經宗異義皆融攝故一一力中具攝十力乃至包盡法界是以宿命乃云智包三世天眼則見盡法界非唯見盡佛眼如空即是法界非唯智包亦能毛孔頓現業力即觀法性豈唯但是有為約門有殊故他宗不壞文十初是處非處智力爾時金𦦨圓滿光菩薩至即説頌言佛昔修習菩提行至此是如來初智力謂善因樂果斯有是處善因苦果無有是處惡因苦果等例上可知處者建立義依義起義能建立果與果為依能起果法故立處名於此正知故名智力其作業者即如實知因之與果及能降伏無因惡因種種諍論既遍知已可度者度不可度者為作因緣文中上半往因下半顯智力於諸境界正解明了即辨此力通知一切法也二過未見在業報智力如昔等觀諸法性至普遍十方能具演瑜伽名自業智力今言一切業者謂於三世中善等三業及順現等皆名自業於自所作受用果業如實知故與初何別若正了知所造善等業感愛等果此由初力若了能造善惡等業感愛等果是自業力文中上半往因下半現果三根勝劣智力往劫修治大方便至故佛能成根智力謂信等五根此軟中上名為勝劣於此正知及能於彼如應如宜為説正法即是作業偈中三句往因一句今果四種種解智力如諸衆生解不同至佛以智力能如是亦名勝解謂若從他起信以為其先或觀法以為其先成軟中上愛樂名種種勝解亦名為欲欲謂信喜好樂如或貪財利或好名聞好定好慧種種不同如來正知令捨不淨增長於淨此與前根何異根約宿成智有多少解約現起好樂不同論云若照諸根為先彼彼法中種種音樂是根智力若正分別意樂差別是解智力在文可見五種種界智力普盡十方諸剎海至悉能顯現毛孔中界即性也謂或一二三四五乘性等或貪瞋癡等分行等乃至八萬四千行名種種性性即種子解即現行故智論云性名積集相又九十云性內欲外用性作業必受果報欲或不爾瑜伽云若照勝解所起相以種子此由解力若照即彼種子差別由界智力若習欲成性復云何別欲唯大地一數性通諸數即寬狹不同也智論云習欲成性性名深心事欲名隨緣起若性即種子與根何異根唯信等優劣性通善惡不同以信等望果寬長能生人天三乘聖道為道之根三善根但是翻對不望果義尚不名根況性通於惡豈得同耶偈云悉能顯現毛孔中者謂非唯佛智如空包納衆生之性毛孔內空亦現衆生之界耳六一切至處道智力一切處行佛盡知至悉能開示令現了論名遍趣行智力遍即一切趣即至也行即道也謂諸衆生種種所行若出離行不出離行各能至果如行有漏行至五道中行無漏行至涅槃果名遍趣行若知如是種類行迹趣入此由界智若知即彼行迹一切品類如是行迹能令雜染如是行迹能令清淨此由遍趣智力初力處對非處此中但明至處又初力指因為得果之處此約果是酬因之處故不同也經中初句總標次云一念即能知迅速下十二字所知時處後一句委悉開示七禪定解脫三昧智力禪定解脫力無邊至普使滌除煩惱暗淨行品中加於染淨通漏無漏故佛皆善知及知依此所得諸果故名智力此與自業智力何別若了諸有能修諸定即彼能入而非所餘名自業力若了即依如是靜慮等定現三神變無倒教授所化有情此由靜慮智力偈中上半所知下半善用言佛為示現者示其諸定現三神變令有情喜使滌煩惱即令去染而得清淨八宿住隨念智力佛智無礙包三世至所現皆由隨念力謂過去境本生本事住宿世故名為宿住於此宿住而起隨念念俱行智名宿住智力瑜伽云若知前際隨念一切趣因是遍趣力若知前際名姓苦樂果等事名宿住力此與智論云何會釋謂論云但知宿命所經不知業因緣相續但名為通凡夫亦得若兼知業因緣相續則名為明二乘能得若知上二無量無邊則名為力斯則力亦知因矣故應通云若但知因是遍趣力若雙知者即宿在力瑜伽為對遍趣之因故但云果耳文中初句標能念智包三世者三世全在佛智之中況於隨念不知三世從門別故但云宿住剎那悉現即包現之時極促現毛孔中即能現之處至微第三句即所現所念之事廣第四句結歸智力非唯能念亦能現也九天眼智力佛眼廣大如虗空至彼眼無量佛能演獨此從所依以立名也若從境者瑜伽名生死智力謂死此生彼墮善惡趣大小好醜皆能正知知前際生死名為宿住要知後除得此力名今文乃云佛眼者苦約五眼餘眼在佛皆佛眼故此等經今依十眼佛眼能見如來十力故故此一力即攝十力舉一為例餘九皆然文中初句體大次句用廣次句用勝以無等故後句結其甚深故唯佛能演既言普見法界非局未來約宗別故於未來門普見法界也十明漏盡智力一切衆生具諸結至悉以方便令除滅於自解脫無惑無疑亦知衆生漏盡涅槃於此正知名為智力文中初二句所斷諸結即現行隨眠即種子習氣即餘習二乘不能盡習亦不能盡他漏故不名力後半顯佛能滅然上十力智即是體力即是用然智即力更無別性此中宿住隨念相應智力是鄰近釋自餘從境皆依主釋設天眼從所依亦依主釋若宿住是境隨念相應智力亦依主釋然此十力望於自事各於自事中大如水能淨如火能燒各有自力若約總攝初力為大若約辦得涅槃漏盡為大若以無礙解脫而為根本則平等平等
