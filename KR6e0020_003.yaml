body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第三義理分齊已知此經總屬圓教未知圓義分齊云何然此教海宏深包含無外色空交映德用重重語其橫收全收五教乃至人天總無不包方顯深廣其猶有川不攝大海大海必攝百川雖攝百川同一鹹味故隨一滴迥異百川前之四教不攝於圓圓必攝四雖攝於四圓以貫之故十善五戒亦圓教攝尚非三四況初二耶斯則有其所通無其所病故此圓教語廣名無量乘語深唯顯一乘一乘有二一同教一乘同頓同實故二別教一乘唯圓融具德故以別該同皆圓教攝今顯別教一乘略顯四門一所依體事二攝歸真實三彰其無礙四周遍含容各有十門以顯無盡初中十者一教義二理事三境智四行位五因果六依正七體用八人法九逆順十應感教即能詮即前五教乃至光香等義即所詮即五教等一切義理理即生空所顯二空所顯無性真如等理事即色心身方等事餘可思準第二攝歸真實者即真空絶相經云法性本空寂無取亦無見性空即是佛不可得思量亦有十義如法界觀第三彰其無礙然上十對皆悉無礙今且約事理以顯無礙亦有十門一理偏於事門謂無分限之理全遍分限事中故一一纖塵理皆圓足二事遍於理門謂有分之事全同無分之理故一小塵即遍法界由上二義互該徹故皆同一性故出現品云如來成正覺時於其身中普見一切衆生成正覺乃至普見一切衆生入涅槃皆同一性所謂無性理遍事故一成一切成事遍同理故說都無所成經云譬如虗空無成無壞一性無性即是佛性故涅槃云佛性名第一義空第一義空名為智慧又出現云無一衆生不具如來智慧無不有者即一乘義也三依理成事門謂事無別體要因理成如攬水成波故於中有二一明具分唯識變故覺林菩薩偈云心如工𦘕師能𦘕諸世間五陰悉從生無法而不造此明唯心義也何以得知是具分耶次頌云如心佛亦爾如佛衆生然應知佛與心體性皆無盡既是即佛之心明非獨妄心而已二明真如隨緣成故問明品文殊難云心性是一云何見有種種差別即緣性相違難覺首答云法性本無生示現而有生即真如隨緣答又云諸法無作用亦無有體性明隨緣不失自性即同勝鬘依如來藏有生死依如來藏有涅槃等四事能顯理門謂由事攬理成故事虗而理實依他無性即是圓成如波相盡令水現故夜摩偈云云何說諸蘊諸蘊有何性蘊性不可滅是故說無生分別此諸蘊其性本空寂空故不可滅此是無性義衆生既如是諸佛亦復然佛及諸佛法自性無所有又十忍品云譬如谷響從緣所起而與法性無有相違須彌頂偈云了知一切法自性無所有如是等文遍於九會五以理奪事門謂事既全理則事盡無遺如水奪波波相全盡故說生佛不增不減出現品云譬如虗空一切世界若成若壞常無增減何以故虗空無生故諸佛菩提亦復如是若成正覺不成正覺亦無增減何以故菩提無相故乃至云設一切衆生於一念中悉成正覺與不成正覺等無有異皆以無相平等故不增不減經亦同此說非約一分衆生不成佛者說無增減耳六事能隱理門謂真理隨緣而成事法遂令事顯理不現也如水成波動顯靜隱故法身流轉五道名曰衆生財首偈云世間所言論一切是分別未曾有一法得入於法性等七真理即事門謂凡是真理必非事外以是法無我理故空即色故理即是事方為真理第七回向云法性不違法相等故八事法即理門謂緣集必無自性舉體即真故上之二門正明二諦不相違義如溼不違波波不違溼舉體相即夜摩偈云如金與金色其性無差別法非法亦然體性無有異此亦喻於如來之藏與阿賴耶展轉無別又由事即理故雖有不常理即事故雖空不斷又由事理相即故起滅同時須彌偈云一切凡夫行莫不速歸盡其性如虗空故說無有盡智者說無盡此亦無所說自性無盡故得有難思盡等則同時四相不待後無亦令究竟斷證離於能所十地品云非初非中後非言辭所及回向品云無有智外如為智所入亦無如外智能證於如等九真理非事門即妄之真異於妄故如溼非動十事法非理門即真之妄異於真故如動非溼故慚愧林偈云如色與非色此二不為一又云如相與無相生死及涅槃分別各不同等上七八二門明事理非異九十二門明事理非一故為無為非一非異第四回向云於有為界示無為法而不滅壞有為之相於無為界示有為法而不分別無為之性上之十事同一緣起故云無礙約理望事則有成有壞有即有離事望於理有隱有顯有一有異逆順自在無障無礙同時頓起深思令觀明現以成理事圓融無礙觀也第四周遍含容即事事無礙且依古德顯十玄門於中文二先正辨玄門二明其所以今初一同時具足相應門二廣狹自在無礙門三一多相容不同門四諸法相即自在門五祕密隱顯俱成門六微細相容安立門七因陀羅網境界門八託事顯法生解門九十世隔法異成門十主伴圓明具德門此之十門同一緣起無礙圓融隨其一門即具一切今且於前十中取一事法明具後十門如下文中一蓮華葉或一微塵則具教等十對同時相應具足圓滿亦具後之九門及彼門中所具教等以是總故故下文云一切法門無盡海同會一法道場中華藏頌云華藏世界所有塵一一塵中見法界一塵尚具況一葉耶二即彼華葉普周法界而不壞本位以分即無分無分即分廣狹自在無盡障無礙十定品云有一蓮華十方際而不盡妨外有可見是故或唯廣無際或分限歷然或即廣即狹或廣狹俱泯或具前四以是解境故或絶前五以是行境故下皆準此然此廣狹亦名純雜普周法界故純一無二不壞本位則不妨於雜萬行例然三即此華葉舒已遍入一切法中即攝一切令入己內舒攝同時既無障礙是故鎔融或有四句六句思之下云以一佛土滿十方十方入一亦無餘若一與一切對辨則攝入各具四句謂一入一切一切入一一入一一切入一切互攝亦然四此一華葉廢己同他舉體全是彼一切法而恆攝他同己令彼一切即是己體一多相即混無障礙解行境別六句同前下云知一即多多即一等五華能攝彼則一顯多隱一切攝華則一隱多顯顯顯不俱隱隱不並隱顯顯隱同時無礙全攝俱泯存亡俱成句數同前下云東方入正受西方從定起等如八日月隱顯同時六此華葉中微細剎等一切諸法炳然齊現下云於一塵中一切國土曠然安住又於一毛端處有不可說諸如來及第九回向微細中說七此華葉一一微塵中各現無邊剎海剎海之中復有微塵彼諸塵內復有剎海如是重重不可窮盡非是心識思量境界如天帝殿珠網覆上一明珠內萬像俱現珠珠皆爾此珠明徹互相現影影復現影而無窮盡下云如因陀羅網世界等亦如鏡燈重重交光佛佛無盡八見此華葉即是見於無盡法界非是託此別有所表下文云此華蓋等從無生法忍之所起等九即此一華既其遍一切處亦復該一切時謂三世各三攝為一念故為十世以時無別體依華以立華既無礙時亦如之是故晉經云過去無量劫安置未來今未來無量劫回置過去世等普賢行云過去中未來未來中現在等又云無量劫即一念一念即無量劫等時無別體故不別立以為所依十此圓教法理無孤起必眷屬隨生下云此華即有十世界塵微數華以為眷屬又如一方為主十方為伴餘方亦爾是故主主伴伴各不相見主伴伴主圓明具德舉華既爾一塵等事亦然如此事華既帶同時等十義具此十門而此事等具餘教等十門則為百門事法既爾餘教義等具百亦然則為千門如教義等有此千門彼同時門中亦具百門餘廣狹等例爾亦有千門若重重取之亦至無盡於此十門圓明顯了則常入法界重重之境第二明德用所因問有何因緣令此諸法得有如是混融無礙答因廣難陳略提十類一唯心所現故二法無定性故三緣起相由故四法性融通故五如幻夢故六如影像故七因無限故八佛證窮故九深定用故十神通解脫故十中隨一即能令彼諸法混融無礙十中前六通約法性為德相因法爾如是後二皆是業用義通因果七約起修義通德相業用八約果德唯是德相故前之十門通德相業用約佛用亦德相德上用故約機則相亦稱用令知相故即用之相染淨雙融即相之用能染能淨故相及用不分兩別初唯心現者一切諸法真心所現如大海水舉體成波以一切法無非一心故大小等相隨心回轉即入無礙二無定性者既唯心現從緣而生無有定性性相俱離小非定小故能容太虗而有餘以同大之無外故大非定大故能入小塵而無間以同小之無內故是則等太虗之微塵含如塵之廣剎有何難哉舊經十住品云金剛圍山數無量悉能安置一毛端欲知至大有小相菩薩以是初發心一非定一故能是一切多非定多故能是一邊非定邊故能即中中非定中故能即邊延促靜亂等一一皆然三緣起相由者謂大法界中緣起法海義門無量約就圓宗略舉十門以釋前義謂緣起法要具此十義緣方起故闕則不成一諸緣各異義謂大緣起中諸緣相望要須體用各別不相雜亂方成緣起若雜亂者失本緣法緣起不成此則諸緣各各守自一位文云多中無一性一亦無有多二互遍相資義謂此諸緣要互相遍應方成緣起如一緣遍應多緣各與彼多全為一故此一則具多箇一也若此一緣不具多一則資應不遍不成緣起此則一一各具一切下文云知以一故衆知以衆故一三俱存無礙義謂凡是一緣要具前二方成緣起以要住自一方能遍應遍應多緣方是一故是故唯一多一自在無礙鎔融其有六句一或舉體全住是唯一也或舉體遍應是多一也或俱存或雙泯或總合或全離皆思之可見文云諸法無所依但從和合起此上三門總明緣起本法竟四異體相入義謂諸門力用遞相依持互形奪故各全有力全無力義緣起方成如論云因不生緣生故緣不生自因生故若各唯有力無無力則有多果過一一各生故若各唯無力無有力則有無果過以同非緣俱不生故是故緣起要互相依具力無力如闕一緣一切不成餘亦如是是故一能持多一是有力能持於多多依於一多是無力潛入一內由一有力必不與多有力俱是故無有一而不攝多也由多無力必不與一無力俱是故無有多而不入一也如一持多依既爾多持一依亦然反上思之如一望多有依有持全力無力常含多在己中潛入己在多中同時無礙多望於一當知亦爾俱存雙泯二句無礙思之五異體相即義謂諸緣相望全體形奪有有體無體義緣起方成若闕一緣餘不成起故緣義則壞得此一緣令一切成起所起成故緣義方立是故一緣是能起能成故有體多緣是所起所成故無體由一有體不得與多有體俱多無體必不得與一無體俱是故無有不多之一無有不一之多一多既爾多一亦然反上思之如一望多有有體無體故能攝他同己廢己同他同時無礙多望於一當知亦爾準前思之俱存雙泯二句無礙亦思之可見六體用雙融義謂諸緣法要力用交涉全體融合方成緣起是故圓通亦有六句一以體無不用故舉體全用則唯有相入無相即義二以用無不體故舉用全體則唯有相即無相入也三歸體之用不礙用全用之體不失體是則無礙雙存亦入亦即自在俱現四全用之體體泯全體之用用亡非即非入圓融一味五合前四句同一緣起無礙俱存六泯前五句絶待離言冥同性海此上三門於初異體門顯義理竟七同體相入義謂前一緣所有多一與彼一緣體無別故名為同體又由此一緣應多緣故有此多一所應多緣既相即入令此多一亦有即入也先明相入謂一緣有力能持多一多一無力依彼一緣是故一能攝多多便入一一入多攝反上應知餘義餘句準前思之八同體相即義謂前一緣所具多一亦有有體無體之義故亦相即以多一無體由本一成多即一也由本一有體能作多一令一攝多如一有多空既爾多有一空亦然餘義餘句準前思之九俱融無礙義謂亦同前體用雙融即入自在亦有六句準前應知此上三門於前第二同體門中辨義理竟十同異圓滿義謂以前九門總合為一大緣起令多種義門同時具足也由住一遍應故有廣狹自在門由就體就用故有相即相入門由異體相容具微細門異體相即具隱顯門又就用相入為顯令就體相即為隱即顯入隱亦然又由異門即入為顯令同體即入為隱同顯異隱亦然又由異體相入帶同體相入具帝網門由此大緣起即無礙法界故有託事顯法門顯於時中故有十世門相關互攝故有主伴門此第十圓滿一門就前第三門中以辨義理故下文云菩薩善觀緣起法於一法中解衆多衆多法中解了一又云一中解無量無量中解一了彼互生起當成無所畏等皆其義也上來緣起相由門竟第四法性融通門者謂若唯約事則互相礙不相即入若唯約理則唯一味無可即入今則理事融通具斯無礙謂不異理之一事具攝理時令彼不異理之多事隨所依理皆於一中現若一中攝理不盡則真理有分限失若一中攝理盡多事不隨理現則事在理外失今既一事之中全攝理盡多事豈不依中現華藏品云華藏世界所有塵一一塵中見法界法界即事法界矣斯則總意別亦具十玄門一既真理與一切法而共相應攝理無遺即是諸門諸法同時具足二事既如理能包亦如理廣遍而不壞狹相故有廣狹純雜無礙門又性常平等故純普攝諸法故雜三理既遍在一切多事故令一事隨理遍一切中遍理全在一事則一切隨理在一事中故有一多相容門四真理既不離諸法則一事即是真理真理即是一切事故是故此一即彼一切事一切即一反上可知故有相即自在門五由真理在事各全非分故正在此時彼說為隱正在彼時此即為隱故有隱顯門六真理既普攝諸法帶彼能依之事頓在一中故有微細門七此全攝理故能理一切彼全攝理同此頓現此現彼時彼能現所現俱現此中彼現此時此能現所現亦現彼中如是重重無盡故有帝網門以真如畢竟無盡故八即事同理故隨舉一事即真法門故有託事門九以真如遍在晝夜日月年劫皆全在故在日之時不異在劫故有十世異成門況時因法有法融時不融耶十此事即理時不礙與餘一切恆相應故有主伴門故一理融通十門具矣五如幻夢者猶如幻師能幻一物以為種種幻種種物以為一物等經云或現須臾作百年等一切諸法業幻所作故一異無礙言如夢者如夢中所見廣大未移枕上歷時久遠未經斯須故論云處夢謂經年覺乃須臾頃故時雖無量攝在一剎那六如影像者一切萬法略有二義一皆如明鏡含明了性一心所成故二分別所現如影像故由初義故為能現由後義故為所現故一切法互為鏡像如鏡互照而不壞本相下經云遠物近物雖皆影現影不隨物而有遠近等七因無限者謂諸佛菩薩昔在因中常修緣起無性等觀大願回向等稱法界修及餘無量殊勝因故今如所起果具斯無礙八佛證窮者由冥真性得如性用故經云無比功德故能爾九深定用者謂海印定等諸三昧力故賢首品云入微塵數諸三昧一一出生塵等定而彼微塵亦不增等十神通解脫者謂由十通及不思議等解脫故不思議法品十種解脫中云於一塵中建立三世一切佛法等由上十因令前教義等十對具上同時等十門以為別教一乘義之分齊第四教所被機者夫教因機顯離機無言上說義理弘深未委被何根器若明能應者十身圓音今直彰所被通有十類前五揀非器後五彰所為前中一無信非器以聞生誹謗墯惡道故二違真非器依傍此經以求名利不淨說法集邪善故下經云忘失菩提心修諸善根是為魔業三乖實非器謂如言取文超情至理不入心故論云隨聲取義有五過失上三皆是凡愚故下文云此經不入餘衆生手四狹劣非器謂一切二乘出現品云一切二乘不問此經何況受持故雖在座如聾如瞽五守權非器謂三乘共教諸菩薩等隨宗所修行布行位不信圓融具德之法故下經云設有菩薩無量億那由他劫行六波羅蜜不聞此經或時聞已不信不解不須不入不得名為真實菩薩故後五顯所為中一正為謂是一乘圓機故出現品云此經不為餘衆生說即通指前五唯為乘不思議乘菩薩說即正為之機謂一運一切運圓融行位即深不思議又能遍達諸教即廣不思議故文云非餘境界之所知普賢行人方得入等二兼為謂即時雖未悟入而能信向成種如出現品食金剛喻故地獄天子十地頓超大海劫火不能為障約未悟入故名為兼三引為即前權教菩薩不受圓融之法故十地之中寄位顯勝借其三乘行布之名彼謂同於我法後因熏習方信入圓融以離此普法無所歸故權教極果無實事故四者權為即是二乘謂既不聞況於受持故諸菩薩權示聲聞或在法會而聾盲彰其絶分或示在道而啓悟知可回心五遠為謂諸凡夫外道闡提悉有佛性今雖不信後必當入故出現品云如來智慧大藥王樹唯除二處不能為作生長利益所謂二乘墯無為坑及壞善根非器衆生溺大邪見貪愛之水然亦於彼曾無厭捨前三非器是溺邪見第四非器是墯深坑故皆揀之今四及五明佛無厭捨故示而誘之熏其成種彼又品中明不信毀謗亦種善根謂謗雖墯惡道由聞歷耳終醒悟故又云如日亦與生盲作利益故又如大海潛流喻中明無不具有如來智慧故又破塵出經卷喻中若除妄想皆見佛智故此皆明有自性住性即是所為況法性圓融感應交徹無有一法而非所被等五教體淺深者無盡教海體性難思從淺至深略明十體一音聲言語體二名句文身體三通取四法體上三皆能詮體四通攝所詮體五諸法顯義體六攝境唯心體七會緣入實體八理事無礙體九事事無礙體十海印炳現體十中前五唯體後五亦體亦性又前四通小後六唯大前七通三乘後三唯一乘前八約同教後二唯別教就前三中大小乘中通用四法一聲二名三句四文取捨不同各有三說小乘三者婆沙一百二十六云如是佛教以何為體一云應作是說語業為體謂佛語言唱辭評論語音語路語業語表是謂佛教其名句文但顯佛教作用不欲開示佛教自體發智論中亦同此說二云名等為體謂名身句身文身次第行列次第安布次第連合故聲但依於展轉因故謂語起名名能顯義評家意取語業為體雜心論同俱舍俱舍論云牟尼說法蘊數有八十千彼體語或名此色行蘊攝謂若語為教體即色蘊攝名為教體即行蘊攝此乃雙存前二情無去取故致或言正理論中意符名等故彼第三釋前頌竟又云詮義如實故名佛教名能詮義故教是名由是佛教定名為體舉名為首以攝句文顯宗第三亦同此說三者然俱舍意情無去取若取其雙存即合四法以為教體若經部意亦唯取聲故正理十四破彼師云汝不應立名句文身即聲為體大乘有三大意同前一云攝假從實以聲為體離聲無別名句等故深密第五云如來言音略有三種一契經等既云言音有三明以聲為教體雜集論云成所引聲謂諸聖所說二云以體從用名等為體能詮諸法自性差別二所依故故無性論破經部云諸契經句語為自性不應理故成唯識第二亦破彼云若名句文不異聲者法辭無礙境應無別唯識云此三離聲雖無別體而假實異亦不即聲三云聲名句文合為其體由前二說皆有理教為定量故深密第四云不可捨於言說文字而能宣說故淨名云有以音聲言語文字而作佛事故十地論云說者以二事說聽者以二事聞謂善聲善字故以余之意亦應雙取若就前二有去取者寧依名等良以音聲一種正就佛說容為教體流傳後代書之竹帛曾何有聲豈無教體書雖是色亦與名等為所依故亦色蘊攝前淨名十地通取四者但言所用非正顯體仁王云是名句味諸佛所說故然大小諸宗雖通用四法而理不同謂薩婆多宗四法皆有實體經部聲有實體名等是假若大乘中或有四皆非實或有四皆如空俱不立故淨名云文字性離無有文字是則解脫十地論釋空中風相等云風喻音聲𦘕喻名字皆不可取佛藏經云諸法如毫𨤲不空者則諸佛不出世又下云諸法畢竟空無有毫末相有說四皆事理無礙或說四皆圓融故宗不同也
