body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經四事訖起定四初警覺令起爾時彌勒菩薩摩訶薩至告善財言善男子起亦彈指者前來得旨所謂忘言此中得旨令不滯寂二略示體相法性如是上句標示下釋所見之相此是菩薩知諸法智至如幻如夢如影如像從法智緣生緣生故無自性故云如是自性如幻夢等悉不成就結成上義從緣無性故事不成就無性從緣故理不成就由不守自性故能隨緣成上之法雖成不離法性故即事同之法性如是亦是性德自具三得旨而起爾時善財聞彈指聲從三昧起二問答所見二初問彌勒告言善男子汝住菩薩至知菩薩德了如來願問約親證推之在因云住不思議二答善財白言唯然聖者是善知識加被憶念威神之力答約謙敬推之在緣云善友力師資互推反常情也二顯法名二初問聖者此解脫門其名何等二答彌勒告言善男子此解脫門名入三世一切境界即此所入所見之境不忘念智即能入能現之智良以三世一如故念劫圓融隨一世中現三際之境智入三世了法空寂與如冥契故一念中無所不見莊嚴藏有其二義一以法性嚴故一莊嚴中包含出生無盡嚴具如一閣中見多閣等二以無礙智契圓融境嚴如來藏則本具諸法故上文云法性如是非是新成故此門中具不可說解脫上明主門下眷屬門善男子此解脫門中至一生菩薩之所能得三窮嚴因之本源於中乃有二番問答初番窮其所歸二初問善財問言此莊嚴事何處去耶由上覩希奇攝力之後忽然而失故問其去處二答彌勒答言於來處去以從本流末故來攝末歸本故去去不異來故引之於來一時併答後番彰其本起二初問曰從何處來雖蒙引歸來處既不究終歸寧知本起故復尋之二答二初法曰從菩薩智慧神力中來謂智力緣作故來依菩薩智慧神力而住智力緣加故住上相下性無有去處亦無住處既從緣來則無來去故此嚴事非在閣中而住亦非別處特來非集非常從緣而來故非集緣謝則滅故非常若先定有處所則墮常過先有今無則為斷滅則墮斷過遠離一切既離斷常何有生滅一異等相故云得離一切二喻二初龍王降雨喻善男子如龍王降雨至如是境界不可思議偏喻無來之來善男子彼莊嚴事亦復如是不住於內菩薩力故亦不住外自善力故以內外因緣互奪則內外兩亡而非不見但由菩薩威神之力汝善根力見如是事二幻師現幻喻善男子譬如幻師至以幻力故分明可見雙喻來去則無來去彼莊嚴事亦復如是至大願力故如是顯現四核正報之性相二初問從來二初問善財童子言大聖從何處來上見慈氏從餘處來遽即設敬問法未遑咨問所從故此因前嚴事之來便問來處三答具有三來處初法身彌勒言善男子諸菩薩至不斷不常如是而來約體實法身即無來之來來即無來文有十對二報身善男子菩薩從大悲處來至猶如影像而化現故約相實報從萬行中來亦猶淨名從萬行道場來矣三化身然善男子汝問於我至摩羅提國而來於此約用化現隨機熟處而來此三即是法報化身亦體相用亦理行事又初唯理後唯約事中具理事摩羅提者具云摩羅耶提數摩羅耶者此云鬘施即山名也提數云中謂其山在此國中故或國中近此山故善男子彼有聚落名為房舍有長者子名瞿波羅瞿者地也波羅云守護即守護土地及心地故為化其人令入佛法至故住於彼而從彼來二問答生處二初問善財童子言聖者何者是菩薩生處由前經云從生處來故今窮之二答二初通明諸菩薩生處三初正答生處答言善男子菩薩有十種生處何者為十十中皆上句為能生之行下句為所生之家善男子菩提心是菩薩生處生菩薩家故謂若發菩提心則是菩薩名為生家深心是菩薩生處生善知識家故若有深心則見善友諸地是菩薩生處生波羅蜜家故若得諸地則滿諸度大願是菩薩生處至是菩薩生處生佛家故教化衆生即是覺他智慧方便是菩薩生處生無生法忍家故有智慧故了法無生有方便故不取無生之相不滯二乘之寂故生無生忍家餘可思準上句亦通所生思之修行一切法至生過現未來一切如來家故二明生緣眷屬善男子菩薩摩訶薩至方便善巧為父般若為母方便為父略有三義一實智虗凝與陰俱靜權智流動與陽齊波故二親生法身實由般若若無方便多共二乘成菩薩種乃由方便故三內解外濟如父母故檀波羅蜜為乳母檀以福資尸波羅蜜為養母尸以防護餘可思耳忍波羅蜜為莊嚴具至成就菩提為能淨家族三校量顯勝二初總辨生家勝善男子菩薩如是至沙門婆羅門恭敬讚歎二別彰智勝善男子菩薩摩訶薩至於一切趣通達無礙二別顯慈氏生處文二先彰實報等周法界善男子我身普生一切法界文有十句上句總次八別等一切衆生差別色相至一等切菩薩願後一結而現其身充滿法界二顯為順機當現生殊二初現生善男子我為化度至拘吒聚落婆羅門家拘吒此云樓閣此聚落中多樓閣故或慈氏閣在此中故善男子我住於此大樓閣中至種種方便教化調伏二當生二初正顯當生所為善男子我為隨順至於此命終生兜率天如蓮華者有其三義一釋迦下種彼華開故二昔因含果如華未開因亡果現故如蓮開三聞熏含實如蓮未開見實亡言故云開悟智論云菩薩善根不遇如來智慧日光翳死無疑通證前義三結會三聖善男子我願滿足至汝及文殊俱得見我俱見我者亦有三意一俱助化故二善財表行文殊信智成正覺時俱證此故三文殊古佛善財當佛慈氏現佛三世圓融浩然大均故云俱見四指示後友三初勸往教問善男子汝當往詣文殊師利善知識所因位將極令反照心源故而問之言菩薩云何至彼當為汝分別演說二釋勸所由二初徵何以故徵意云文殊已見何為勸往二釋釋意云彼德深廣宿緣重故於中有二初明其行廣文殊師利所有大願至一切菩薩功德無有休息出生菩薩功德者主信法門長養一切善根故善男子文殊師利常為無量百千億那由他諸佛母為佛母者主般若門住甚深智見法實故常為無量百千億那由他菩薩師為菩薩師者具善巧智通達解脫究竟普賢行故教化成就一切衆生至究竟普賢所行諸行二顯其緣深已多成益善男子文殊師利至與汝往昔同生同行三結勸重釋三初結勸是故善男子汝應往詣文殊之所莫生疲厭具上二義應往勿疲文殊師利當為汝說一切功德二徵釋二初徵何以故徵意云何以的知具前二義二釋汝先所見諸善知識至皆是文殊威神之力釋意云以所成益皆是彼力故知行廣緣深若當見者獲益尤增三結德究竟文殊師利於一切處咸得究竟前見為信之首後見為智之終故云一切究竟五戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去此下入第八十卷第四明智照無二相顯前因法生果體無分別絶境智等諸二相故又善財障盡惑除未始動念是故反照唯是初心更無二也即信智無二文但有三初依教趣求爾時善財童子至經由一百一十餘城已百一十義已見上文然此游城復有二義一但從彌勒至於文殊自經百一十城非連取前二者加前百一十友故云餘城即通取前友普收諸法歸一照故若爾前友此城豈得同耶亦有二義一者友必依城則一城一友二者或於一城值於多友或求一友歷於多城而要具一百一十以順表法故到普門國晉本中云至普門國顯法差別歸無二相即普門故蘇摩那城蘇摩那此云悅意即華名也謂智照一性悅本心故即德生城住其門所顯解心已極將入般若無二之門故思惟文殊師利隨順觀察周旋求覓希欲奉覲二見聞證入此下即是所漏脫文義如前說然以極照無二心境兩亡故略無敬問信解雙絶故不見現身而反照未移信心故申右手又不見乃為真見但了自心空般若故文三初摩頂攝受是時文殊師利遙申右手始信該於極果故曰遙申隨順行成故曰右手過一百一十由旬徹過前位故然過城約超封域由旬明超數量又前越諸位斷德後越諸位智地按善財頂按頂表於攝受亦以普法置心頂故信至極故二誨示法門即舉失顯得謂若離信根等不了法性等反顯善財有信根等能了法性等於中有二初列所闕行法作如是言善哉善哉善男子文有九句前七闕因若離信根一闕行本故心劣憂悔二求小故心劣處生死而憂悔功行不具三橫不具退失精勤四豎不進於一善根心生住著五滯一善於少功德便已為足六不廣求不能善巧發起行願七不起無住行願後二闕緣不為善知識之所攝護不為如來之所憶念二不能成益有十五句不能了知如是法性至如是所行如是境界前五約所知事理若周遍知若種種知至若證知若獲得皆悉不能後十約能知分齊例前諸文思之又前九中初一信根是所闕因餘皆不能成就利益若約法功歸於信若約人論前友之法皆由文殊三結益歸本文有十句是時文殊師利宣說此法至成就阿僧祇法門前九結益甚深初一總餘八別具足無量大智光明即般若方便令得菩薩無邊際陀羅尼至無邊際神通無邊際智即智波羅蜜令入普賢行道場舉足下足皆與普賢行相應故及置善財自所住處即是法界是文殊大智無住住故又普賢道場即法界理自所住處即文殊智此亦義同示於後友普賢之境文殊師利還攝不現後之一句攝用歸本所作竟故信窮智境信相便亡故云不現三轉遇勝緣修行敬事於是善財思惟觀察至受行其教無有違逆然此諸友及後普賢皆無指授者表證法界離此彼相故此三千友乃有多義一者成前尚是文殊之益二者順後為入理方便又通論諸友更分三分初文殊一人為信心之始次至後文殊為智滿之終故此總見三千等友後之普賢理智無二又前諸友一一各逢即是純門此中諸友一時頓見即顯雜門後普賢一人具前諸友即純雜無礙又此諸友所得法門受行各別文所不具結廣從略故總云三千耳大文第五顯因廣大相以前照理無二顯其甚深方堪成佛廣大之因以隨一一因皆稱法性故文殊般若即攝相歸體普賢法界即祕密重重若以二聖相對則文殊為能證若以二聖對善財則文殊亦為所證未得般若今證得故文中分三初依教趣求有二十六句增長趣求一切智慧上一標求佛果後一總觀圓因中間諸句義通前後皆是趣佛之因並是解脫境故攝為十對廣大悲海益大慈雲至安住菩薩寂靜法門上四四等普周寂靜即捨故普緣一切廣大境界學一切佛廣大功德此二福智無外緣境是智慧故入一切佛決定知見增一切智助道之法此二入正增助善修一切菩薩深心知三世佛出興次第此二修因知果入一切法海轉一切法輪生一切世間此三入法現生入於一切菩薩願海住一切劫修菩薩行此二證願修行照明一切如來境界長養一切菩薩諸根此二照上增下獲一切智清淨光明普照十方除諸暗障此二得實照權智周法界於一切佛剎至普現其身靡不周遍此二智周身遍摧一切障入無礙法住於法界平等之地此三摧障入理其入無礙法向上成無二礙向下即成無礙法界其住平等地即前文殊自所住處觀察普賢解脫境界後總句即前普賢行道場以是顯因廣大相故文殊通指善財普觀不同前文一友指於一友良以普觀方是普賢故二聞覩前相二初聞有十三句即聞普賢菩薩摩訶薩名字上一聞人名即聞二字貫下諸句此中聞者非從一人多人聞之即稱法界而聞耳後十二句聞於行位行願助道正道上三可知諸地普賢位中自行依地及圓融所攝地也上句為總下八句別地方便加行地入入心地勝進出心地住住心地修習修施戒等地境界即第一遍行真如等為所證境亦是所得分齊之境地威力即神通作用摧邪攝生等地同住即同依佛智而住二明覩二初仰德修觀渴仰欲見普賢菩薩聞前人法故生渴仰即於此金剛藏菩提場至一切寶蓮華藏座上正明修觀菩提場者是所觀處金剛藏者約表即於本所信自心佛果菩提體中金剛智內起一切因陀羅網普賢心觀約事即前其地金剛而蘊德具嚴故名為藏然此經體勢應具十會以順無盡又始起覺場義應歸本故今且依文對前本末二會即是攝末歸本之義是以善財不假別指便於初會始成之處如來座前而起觀求起等虗空界廣大心至趣如來十力究竟心正顯觀心有十一句皆稱普賢境而起於心故後得見二覩見希奇二初結前生後善財童子起如是心時至普賢菩薩同善根力故兼顯見因二正覩希奇二初見瑞相見十種瑞相何等為十十句五對各前句明所依淨土後句明其住處衆生所謂見一切佛剎清淨至心常念佛是為十二覩光明又見十種光明相至廣大誓願周遍法界是為十前瑞則直見一重淨剎此明重見又前粗此細前體相此業用然皆是普賢依報之剎三見聞證入三初結前生後時善財童子見此十種至我今必見普賢菩薩由覩前相生必見心增益善根見一切佛至生決定解得一切智二起觀增修於時善財普攝諸根一心求見普賢菩薩攝散住定起大精進心無退轉䇿勤無退即以普眼觀察十方至皆作得見普賢之想觀其體遍以法界為身故以智慧眼觀普賢道至大悲堅固猶如金剛悲智橫廣願盡未來常得隨逐至入如來境住普賢地得果圓因此乃總攝諸觀行人欲見當倣此修離此觀心見亦非勝三正明見聞證入二初正見聞證入二初得益因圓四初見身得益二初見勝身四初總見勝德身相時善財童子即見普賢菩薩在如來前衆會之中由前於菩提場師子座前起勝想故坐寶蓮華師子之座至一切菩薩無能觀察二別見毛孔出生見普賢身一一毛孔至令諸菩薩生大觀喜毛孔出生廣遍法界實則重重無盡略顯二十重亦對前善財渴仰所起十一心故其初等虗空廣大等五心遍此諸句餘之六心別生諸句且除初句見一一毛孔出一切佛剎至衆會道場雨摩尼寶此之五句由前觀道場明了心故出雲等皆嚴道場見一一毛孔出一切佛剎至護持一切如來法輪此三句由前入佛法海心見一一毛孔念念中出至無依止者為作依止此一句及最初一句由前化衆生界心見一一毛孔念念中出至令純染衆生皆得清淨此四由前淨一切國土心亦兼化衆生心見一一毛孔念念中出至增長大法成一切智後六句由前住一切劫及趣如來十力究竟心並如文思之是知各由自心所見分齊三重觀體內包含二初結前生後爾時善財童子至身心遍喜踊躍無量二正顯包含亦二初見三千重觀普賢一一身分至如是等事悉皆明見二類通十方三際如見此世界十方所有至各各差別不相雜亂四結通周遍如於此毗盧遮那如來至一切如來游戲神通文有四重舉類遮那末句總結塵中普賢是知前則身中包含法界廣無邊故顯其普義今則全此含法界身潛入塵中調柔無礙明其賢義內外周遍限量斯盡故名普賢二得深益善財童子見普賢菩薩至皆現在前智波羅蜜既得智度已彰地滿況十表無盡耶二摩頂得益三初摩頂善財童子既得是已普賢菩薩即申右手摩觸其頂二得益既摩頂已善財即得至微塵數三昧而為眷屬前向外觀故得智度此摩頂親證故得三昧一一三昧悉見昔所未見至微塵數一切智淨光明三結通如此娑婆世界毗盧遮那佛至所得法門亦皆同等良以善財等普賢故
