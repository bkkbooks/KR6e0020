body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經五有二門明五地中行初門明勝慢對治行後門明後二分中行今初分二初總標四門佛子菩薩摩訶薩有無量道至無量莊嚴道以此四門同顯道義義皆無量類例相從故總標之約義須分故後二屬後二別明初門四初標佛子菩薩摩訶薩有十種無量道謂十平等心及隨如道行皆是菩薩正道所游路故以觸境皆如道無不在況虗空等十一一無量道豈有涯二徵何等為十三釋所謂十中初四各一無量後四即佛界無量虗空無量故菩薩道亦無量虗空無量亦橫亦豎法界無邊故菩薩道亦無量法界非橫非豎虗空法界約無分量餘八廣多無量兼無分量衆生界無盡故至劫數不可盡故菩薩道亦無量劫數即豎論無量餘七橫論無量一切衆生語言法無量故菩薩道亦無量語言亦屬衆生亦是調伏界無量如來身無量故菩薩道亦無量至菩薩道亦無量四結是為十二無量助道法四初標佛子菩薩摩訶薩有十種無量助道即不住道行勝及彼果勝中行以智契如是謂正道萬行資緣皆為助道此二合行名不住道今以圓融之修無不契如並為正道皆互相資並為助道故舉虗空等十不異前章然正道不隨事轉同稱無量助道隨事故隨所等事名無邊無盡等二釋所謂如虗空界無量至積集助道亦如是無有量三結勸是為十若諸菩薩安住此法則得如來無量智慧第六有一門明六地中行四初標佛子菩薩摩訶薩有十種無量修道般若現前為真修故無去來等即十平等等故前四即勝慢對治中行攝十平等後六即彼果勝中行不住道行勝十種觀緣彼已廣故此略不明四中前三約法後一約喻法中彼從別義開成前八今總明之二徵何等為十三釋所謂不來不去修身語意業無動作故不起心不增不減修如本性故稱本性非有非無修無自性故遣修相亦可配三性三無性如理思之如幻如夢如影如響至修離一切執著故舉七喻通顯無著後六果勝中行空無相無願無作修明見三界而集福德不休息故雖證三空而集福德不可說無言說離言說修遠離施設安立法故不著教法不可說者理圓言遍言不能詮故無言說者性無言故離言說者忘言方會故不壞法界修智慧現知一切法故不壞事法界不壞真如實際修普入真如實際虗空際故不壞真理廣大智慧修諸有所作力無盡故總明權實之智故力無盡上皆自分修住如來十力四無所畏至現見一切法無疑惑故即勝進修四結勸是為十若諸菩薩至則得如來一切智無上善巧修七有三門明七地中行初門權實雙行初標佛子菩薩摩訶薩有十種莊嚴道即彼地中樂無作行對治十種方便智及雙行果發起勝行中以權實交飾故曰莊嚴二徵何等為十三釋三初五自行無染佛子菩薩摩訶薩不離欲界至是為第五莊嚴道二隨有攝化四初無染而化已到一切世間彼岸至是為第六莊嚴道二處正入邪安住正道正智正見至是為第七莊嚴道三持犯權實常善護持如來淨戒至是為第八莊嚴道四人法權實不由他教得無礙辨至是為第九莊嚴道三總顯因果權實三初因圓示缺善根具足諸行究竟至於一切國土示現受生示現受生是因未滿故二同界境界而不捨因因有十句與三世諸佛同一境界而不廢菩薩行行通二利不捨菩薩法法即教法不懈菩薩業業謂利他不離菩薩道道謂正智不施菩薩儀儀謂制聽不斷菩薩取取即願求不息菩薩巧方便巧謂權變上皆所作不絶菩薩所作事事總語因體不厭菩薩生成用用即因成大用不止菩薩住持力力即長用不絶三徵釋何以故菩薩欲疾證阿耨多羅至是為第十莊嚴道四勸若諸菩薩安住此法至亦不捨菩薩道二明念念進趣行四初標佛子菩薩摩訶薩有十種足即彼障對治中修行無量種及雙行分中菩提分差別等二徵何等為十三釋所謂持戒足殊勝大願至一切菩提分法不退轉故上二約行一戒二進神通足隨衆生欲至不離一佛剎往一切佛剎故此二約通一總二別深心足願求一切殊勝法故至一切所作咸究竟故此二約心一願二誓隨順足不違一切尊者教故至佛所說法不疲懈故此二約法一順二持法雨足為衆演法無怯弱故至一切諸惡悉遠離故後二約德一演二伏四結勸是為十若諸菩薩安住此法至悉能遍至一切世界三明取授自在行四初標佛子菩薩摩訶薩有十種手即雙行分中能作大義二徵何等為十三釋所謂深信手於佛所說一向忍可究竟受持故上一約取謂念念修習一切佛法向佛智故餘九約授於中前五明四攝布施手有來求者隨其所欲至舒展右掌相迎引故上布施下愛語供養諸佛手集衆福德至悉斷一切衆生疑故此二句皆利行攝令超三界手授與衆生出欲泥故即同事共一手作而出故後四即四家置於彼岸手暴流中救溺衆生故苦情淨故不吝正法手所有妙法悉以開示故示諸諦故善用衆論手以智慧藥滅身心病故般若力故恆持智寶手開法光明破煩惱暗故捨煩惱故四結勸是為十若諸菩薩安住此法至普覆十方一切世界八有三門明第八地中行以內證無生故皆約內事明內德圓滿即分為三初腹四初標佛子菩薩摩訶薩有十種腹明含容清淨德即彼集地分中無住道清淨等故及淨忍分中得無生故亦是得勝行分中離一切貪等故世人之腹多含穢惡二徵何等為十三釋所謂離諂曲腹心清淨故至清淨心腹離諸惡故上六明惡無不離觀察飲食腹念如實法至出離道腹善成熟深心故此三明善無不積若能如是凡即佛腹遠離一切邊見垢腹令一切衆生得入佛腹故後一亦惡無不離四結勸是為十若諸菩薩安住此法至悉能容受一切衆生二藏四初標佛子菩薩摩訶薩有十種藏前總舉其腹今別明五藏由得勝行諸佛勸起一念出生含攝成熟無量德故二徵何等為十三釋所謂不斷佛種是菩薩藏至令其得入不退法輪故上三出生三寶覺悟正定衆生是菩薩藏至令未來因悉得成就故此三成熟三聚邪定亦有佛性為未來因故起悲為緣涅槃云一闡提人雖復斷善由佛性力未來善根還得生長即其義也滿佛十力不可壞因至於一念中悉明見故後四攝授佛果最後即一切智也四結勸是為十若諸菩薩安住此法至不可壞大智慧藏三心四初標佛子菩薩摩訶薩有十種心即五藏之一最為勝故五藏主故即此地能成諸善無功用心前初地中明心梵云質多即慮知心對身口故今此梵云纈唎陀耶此云肉團心對餘藏故二徵何等為十三釋所謂精勤心一切所作至積集相好福德行故上二攝善一勤二䇿大勇健心摧破一切至除滅一切諸煩惱故此二破惡一破緣二破因不退轉心乃至菩提至知心不動無所著故此二成行一堅二淨前六自利知衆生心隨其解欲至不以別乘而救護故此二攝生一智今悟二慈拯救大梵住即四無量空無相無願無作心至乃至不能動一毛故後二成德一深二固四結勸是為十若諸菩薩至則得如來無上大智光明藏心九有二門明九地行法師入有備外嚴故初門四初標佛子菩薩摩訶薩有十種被甲明大地十心如被甲胄防外護內將趣入故二徵何等為十三釋所謂被大慈甲救護一切至於一切法離疑惑故四結勸是為十若諸菩薩安住此法至悉能摧伏一切魔軍二住地心初標佛子菩薩摩訶薩有十種器仗器仗似外以住地心窮十稠林無不破故二徵何等為十三釋所謂布施是菩薩器仗至遠離一切邪命故上五順仗破障善巧方便是菩薩器仗至不斷菩薩行教化衆生故此三句違仗破障如令賊破賊故說如實法是菩薩器仗能破一切執著故此一非順非違仗如以良謀不用兵仗無不破故一切智是菩薩器仗不捨菩薩行門故後一功成立德器仗四結勸是為十若諸菩薩安住此法至長夜所集煩惱結使十有十三門明十地行十地德圓故寄六根四儀業用明之且分為三初一總標德首四初標佛子菩薩摩訶薩有十種首居受職位首出衆聖故二徵何等為十三釋所謂涅槃首無能見頂故至三千界中最為勝故上三果首第一善根首三界衆生至於一切處常尊勝故此三標之以因釋之以果般若波羅蜜首長養一切至能令三寶種不斷絶故後四直明行首四結勸是為十若諸菩薩安住此法至無上大智慧首二六根勝德初明十眼四初標佛子菩薩摩訶薩有十種眼明十眼者即大盡分中如實知見一切法故二釋所謂肉眼見一切色故前五名同諸教而體用不同諸宗肉眼見障內色故智論三十七說肉眼見近不見遠見前不見後等天眼方見遠等仍有分齊今肉眼見一切色已過二眼故四十四自指云不思議經應見遠此中不說天眼見一切衆生心故然天眼是假和合不見實相今明見心即似同於彼然心通性相則亦不同慧眼見一切衆生諸根境界故此中慧眼似彼法眼此中法眼似彼慧眼所以互者以彼慧眼不能見衆生盡滅一異不能度生今顯實過權反此明能法眼見一切法如實相故彼中法眼雖知於法不能遍知衆生方便道今反此故明知一切意欲異權故耳佛眼見如來十力故彼佛眼無細不知今舉勝況劣又十力無不該故智眼智見諸法故智眼見事即法眼開出光明眼見佛光明故光明眼通身智光義兼法慧出生死眼見涅槃故然涅槃不可見絶見方見見圓寂故無礙眼所見無障故總見諸眼境界皆無障故此即一眼具多為不壞相須列十眼一切智眼見普門法界故即是普眼非但見法界重重亦乃法界即眼故為普門故知十眼全以無礙法界而為其體若辨次第以肉眼見生受苦次以天眼了知其心次別知根境次引入如實次令得佛力次尋光而見次同歸寂滅後等同法界餘如別章三結勸是為十若諸菩薩安住此法至無上大智慧眼二耳四初標佛子菩薩摩訶薩有十種耳然眼等六根由得解脫神通無上故令見聞嗅觸等皆自在故總就行辨此門亦即釋名分中聞持如來大法雨故二徵何等為十三釋所謂聞讚歎聲斷除貪愛聞毀呰聲斷除瞋恚上二離順離違聞說二乘不著不求聞菩薩道歡喜踊躍此二棄小欣大聞地獄等謂苦難處至知彼皆是無常之法此二愍苦厭樂聞有讚歎諸佛功德至發心修行願到彼岸此二滿果圓因聞十方世界一切音聲至而恆不捨化衆生事後二了俗同真悲智俱運四結勸是為十若諸菩薩成就此法至無上大智慧耳三鼻四初標佛子菩薩摩訶薩有十種鼻嗅行香故二徵何等為十三釋所謂聞諸臭物不以為臭至非香非臭安住於捨上四聞香體俱舍有四總名為香一好香謂沉檀香二惡香謂葱薤等三等香四不等香謂於前二增益依身名為等香損減依身名不等香故亦不離好惡今此中俱聞聞其上二更無別體非香非臭對前成三謂如柴炭等若聞衆生衣服臥具至皆知彼過去所行之行此三聞香表用瑜伽中上二界既無鼻舌二識亦無香味二塵語其無粗此聞有頂香者明其聞細菩薩力故又有頂言餘處多明是色究竟準晉經中聞非想香則有頂言亦是三有之頂既有通果之色亦有通果之香若聞諸聲聞布施持戒至亦不廢捨諸菩薩行後三聞出世人法四結勸是為十若諸菩薩成就此法至無量無邊清淨鼻四舌四初標佛子菩薩摩訶薩有十種舌演法味故下三為成六根非顯三業三業前已有故二徵何等為十三釋所謂開示演說無盡衆生行舌至開闡大乘助道舌前五約辨顯德後五約用遍覆十方虗空舌至滅一切生死煩惱令至涅槃舌降四魔魔即天魔生即蘊魔死及煩惱文中皆具四結勸是為十若諸菩薩至覆遍一切諸佛國土無上舌五身四初標佛子菩薩摩訶薩有十種身隨行成故二徵何等為十三釋所謂人身為教化一切諸人至示現一切衆生身故四結勸是為十若諸菩薩成就此法則得如來無上之身六意四初標佛子菩薩摩訶薩有十種意二徵何等為十三釋所謂上首意發起一切善根故上一總明餘九別顯安住意深信堅固不動至深入佛三昧無我我所故四結勸是為十若諸菩薩安住此法則得一切無上意三有四門明四儀動止行初行四初標佛子菩薩摩訶薩有十種行動遊行法故二徵何等為十三釋所謂聞法行愛樂於法故至令速轉還故轉還者轉有漏定還無漏故趣向法義行速得智慧故至不斷生死相續故不斷生死者若斷生死非真涅槃故成滿一切佛法行不捨菩薩法行故四結勸是為十若諸菩薩安住此法則得如來有來無去行二住四初標佛子菩薩摩訶薩有十種住止息散動故二徵何等為十三釋所謂菩提心住曾不忘失故至學成佛威儀故前七自分住後三勝進住出生神通住圓滿大智故至力無畏一切佛法故四結勸是為十若諸菩薩安住此法則得一切智無上住三坐四初標佛子菩薩摩訶薩有十種坐多時安處故二徵何等為十三釋所謂轉輪王坐興十善道故至於自他心得自在故前四世坐以攝物後六法坐以成德師子坐能說法故至金剛坐降伏衆魔及外道故四結勸是為十若諸菩薩安住此法則得如來無上正覺坐四臥四初標佛子菩薩摩訶薩有十種臥放捨身心合法體故十事各同臥之一義二徵何等為十三釋所謂寂靜臥身心憺怕故加行調身心禪定臥如理修行故習修三昧臥心身柔軟故得定前三顯定後七定益亦兼餘善梵天臥不惱自他故獨己臥善業臥於後不悔故離尸伏故正信臥不可傾動故離依倚正道臥善友開覺故思明相故互警覺故妙願臥善巧回向故右脅臥一切事畢臥所作成辦故捨諸功用臥一切慣習故四結勸是為十若諸菩薩安住此法至悉能開悟一切衆生五所住處四初標佛子菩薩摩訶薩有十種所住處知有棲止之處所故前明能住此辨所住二徵何等為十三釋所謂以大慈為所住處至得授記莂故四結勸是為十若諸菩薩安住此法至無上無礙所住處六所行處四初標佛子菩薩摩訶薩有十種所行處前辨能行此辨所行二徵何等為十三釋所謂以正念為所行處滿足念處故初四自行上一依四念阿難四問佛令依住今辨依行餘可思準以諸趣為所行處正覺法趣故至而不斷菩薩行故四結勸是為十若諸菩薩至則得如來無上大智慧所行處六有五十一門答上因圓果滿若剋實而論成如來力下四門方明果滿前皆因圓以八相前五猶屬因故為明八相皆示現故通入果中即分為二初三十二門明因圓究竟即等覺位後一十九門明現果圓滿行即妙覺位前中分三初一十四門明因行體性二初四門起行方便三初二門意業觀察二初觀察四初標佛子菩薩摩訶薩有十種觀察解方便故達通塞故二徵何等為十三釋所謂知諸業觀察微細悉見故至了達無根故上三觀所化次四觀能化法知諸法觀察不壞法界故理法見佛法觀察勤修佛眼故果法得智慧觀察如理說法故教法無生忍觀察決了佛法故行法後三觀位不退地觀察滅一切煩惱超出三界二乘地故超劣灌頂地觀察於一切佛法自在不動故得位善覺智三昧觀察於一切十方施作佛事故同果用四結勸是為十若諸菩薩安住此法至如來無上大觀察智二普觀察四初標佛子菩薩摩訶薩有十種普觀察審慮周遍故二徵何等為十三釋所謂普觀一切諸來求者至令除疑惑破有見故前六以六度治六蔽衆生後四雙明二利之行普觀一切平等善友順其教命住佛法故順人普觀一切所聞之法疾得證見最上義故證法普觀一切無邊衆生常不捨離大悲力故下化普觀一切諸佛之法速得成就一切智故上成四結勸是為十若諸菩薩至則得如來無上大智慧普觀察二身業自在四初標佛子菩薩摩訶薩有十種奮迅謂實德內充威德外溢如師子王奮迅威勢更有異釋如法界品辨二徵何等為十三釋所謂牛王奮迅映蔽一切至摧伏衆魔及外道故前五寄喻勇健奮迅能於生死至咸令受益心歡喜故此四約法上皆自分後一勝進如來奮迅一切智智至成阿耨多羅三藐三菩提故四結是為十若諸菩薩至於一切法無上自在奮迅三語業宣暢四初標佛子菩薩摩訶薩有十種師子吼既勇健無畏則能決定宣唱二徵何等為十三釋所謂唱言我當必定成正等覺至是大悲大師子吼次句令物度苦脫集安道證滅我當令佛法僧種無有斷絶至如說而作大師子吼四結勸是為十若諸菩薩安住此法至如來無上大師子吼
