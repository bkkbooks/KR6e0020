body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經五常遍演法力此即不退言音無變無斷盡故文二初明一身轉法三初顯所説多佛子一切諸佛能於一身至佛剎微塵數文字句義二明所説常如是演説盡不可説不可説至所轉法輪無有窮盡三示所説體所謂智慧演説法輪至辨才無畏種種莊嚴法輪二明多身轉法如一佛身以神通力至第五大那羅延幢勇健法是則常恆之説前後無涯生盲之徒對而莫覩隨所感見説有始終六德相降魔力佛子一切諸佛至第六大那羅延幢勇健法即當難獲然十皆難獲世多魔惑所以偏立難獲之名七圓音遍徹力佛子一切諸佛至第七大那羅延幢勇健法即是威德聞皆調伏故八心無障礙力即無量力離量非量故文二初無塵惑障礙佛子一切諸佛心無障礙至絶為無為一切言説二起用無障礙於不可説無邊境界至盡諸有漏心善解脫心善解脫者由三種相一於諸行遍了知故二於彼相應諸煩惱斷得作證故三煩惱斷已於一切處離愛住故慧善解脫住於實際至第八大那羅延幢勇健法九法身微密力佛子一切諸佛至第九大那羅延幢勇健法即是最上此總收前八後一更無加故文列二十五身或即應之真即真之應即性之相即理之智十身圓融同一法界之身不可配於報化故云最上微密十具足行智力即是廣大力因行如海果智普周五無邊界大用無涯故文四初萬行圓淨佛子一切諸佛等悟一切至身語意行悉皆無雜二智用周圓住佛所住諸佛種性至成不退智入諸佛數三動寂自在雖已證得不可言説至以無礙智悉能知見四用無涯畔佛子一切諸佛至第十大那羅延幢勇健法上之十力不出三業可以思準三結佛子此一切諸佛大那羅延至唯除如來神力所加九有三門答無礙門初明所作決定無能為礙佛子諸佛世尊有十種決定法此約一類世界故云決定法異類界未必定然又約佛定能為故云決定耳何等為十所謂一切諸佛定從兜率至是為十二明令他無礙佛子諸佛世尊有十種速疾法如如意寶見速獲益薄福不覩何等為十十句五對所謂一切諸佛若有見者至速得圓滿殊勝功德離惡趣圓勝德一切諸佛若有見者至速得往生淨妙天上成善因感樂果一切諸佛若有見者至阿耨多羅三藐三菩提心除疑惑滿大心一切諸佛若未入正位至清淨世出間一切諸根始入位終清淨一切諸佛若有見者至速能獲得無畏辨才是為十淨二礙具四辨三念持無礙佛子諸佛世尊有十種應常憶念清淨法舉佛無二礙勸物念持何等為十所謂一切諸佛過去因緣至是為十十有三門答解脫問初門明智障解脫佛子諸佛世尊有十種一切智住智安事理故名為住由離障故一切能知何等為十所謂一切諸佛於一念中至是為十二定障解脫佛子諸佛世尊有十種無量不可思議佛三昧由離障故用廣為無量體深不可思故十種之中各先明在定後一念遍用何等為十所謂一切諸佛恆在正定至是為十三業用解脫佛子諸佛世尊有十種無礙解脫智論云菩薩有不思議解脫諸佛有無量解脫所作無障脫拘礙故故各於一塵頓為微細作用今約別答十問何等為十所謂一切諸佛至不可説諸佛出興於世答出現一切諸佛能於一塵至不可説諸佛轉淨法輪答音聲一切諸佛能於一塵至不可説衆生受化調伏答本願願化盡故一切諸佛能於一塵現不可説不可説諸佛國土答國土一切諸佛能於一塵現不可説不可説菩薩授記答智慧能授菩薩之記一切諸佛能於一塵現去來今一切諸佛答佛身一切諸佛能於一塵現去來今諸世界種答種性云世界種入世化物之種應非世界海中之種以前有國土竟故一切諸佛能於一塵現去來今一切神通答自在一切諸佛能於一塵現去來今一切衆生答無礙利益衆生無障礙故一切諸佛能於一塵現去來今一切佛事答解脫無不為故既隨一門皆答十問則知包含該攝無盡是以名為不思議也然此文末既少結束似經來未盡或顯佛德無盡故相海等品猶答前問故是為十此下入第四十八卷經如來十身相海品第三十四初來意者前品總明果法此品別顯相德近答前品佛身之問遠答普光眼等六根非唯眼等遍於法界而其各各具多相用難思議故二釋名者如來十身標人顯德言相海者依人顯相如來十身並如前釋福報奇狀炳著名相相德深廣故稱為海故經文有十蓮華藏微塵數相相體廣矣一一用遍相用廣矣一一難思互相融入體用深矣若此之相唯屬圓教所以但標十身故也觀佛三昧海經辨相有三類一略中略説有三十二相二略説八萬四千相三廣説有無量相如雜華經中為普賢賢首等説雜華即此經異名三中初通權小示同於人端正不亂故次唯大乘菩薩修八萬四千波羅蜜故後唯一乘謂一乘修無盡行故又初約化次約報身後屬十身十身之相海依主釋也又初凡聖同見次唯地上後唯圓機然通五位若語其體初以形色次即定慧後以無盡法界若語其因後通純雜如初會説故一一相果皆周法界前二相因如瑜伽智度等論涅槃大集等經廣如別章説三宗趣者顯説無盡相海為宗令物共修無盡之行顯成為趣後正釋文文有三別初告衆許説爾時普賢菩薩摩訶薩至演説如來所有相海所以普賢説者相海普周故令行普行獲普相故普賢本是會主前説已窮此便説故或前品末經來未盡更應別答國土等問二正陳相狀略舉九十七相相相之中文通有五一依處二列名三體嚴四業用五結數或略不具至文當知或加成益業用中攝然名但依體用以立是故皆以體用釋名或單從體用或雙從二隨文思之或名與體用義不相似者即是文略義則包含細論一相各依一處則為九十七段經自標次今以類例相從依十八處即為十八段始自於頂終至於足斯即順觀如來相海今初依頂文三初約處總標佛子如來頂上有三十二寶莊嚴通顯體嚴事實則云皆摩尼等為莊嚴故亦顯智寶圓淨嚴故一一相中皆有事理二嚴隨宜解釋大人相大人之相故二別列名相三十二相文各唯四以依處一種已總標故此處獨有三十二相者理實應多為顯圓融一即一切故一頂中便具權教三十二數若爾餘何不然顯頂尊勝故善生經云一切世間福不及如來一毛功德一切毛功德不及一好功德一切好功德不及一相一切相不及白毫白毫不及無見頂相故知勝也此約相好相對明之若約人具有好為勝故相伏於人好勝天故餘處則説好為微細三正釋文其中有大人相名光照一切方普放無量大光明網第一相中四者一列名名從用立一切妙寶以為莊嚴寶髮周遍柔軟密緻二體嚴一一咸放摩尼寶光至悉現佛身色相圓滿三業用是為一四結數下之四節皆倣此例次有大人相名佛眼光明雲雲義如初會以摩尼王種種莊嚴至如眉間毫相所放光明體嚴即釋光明義毫相放光如現相品説其光普照一切世界業用釋佛眼義佛眼無不照故餘體嚴業用並皆準思是為二次有大人相至摩尼王寶以為莊嚴摩尼名意故不同如意常放菩薩𦦨燈光明至出妙音聲充滿法界辨業用如是皆從諸佛智慧大功德海之所化現因亦業用攝是為十一次有大人相至具足莊嚴彌覆法界辨業用自然演説四菩薩行其音普遍諸法界海四菩薩行者瑜伽菩薩地云一切菩薩略有四行一波羅蜜行二菩提分法行三神通行四成熟有情行是為十四次有大人相至以為莊嚴具足千輪梵本云具千輻輪內外清淨從於往昔至諸佛菩薩智慧妙藏示身智二光俱顯智慧是為二十一次有大人相至如來淨眼以為莊嚴此通十眼下顯業用光照十方一切世界亦通身智二光淨眼及光釋前普照於中普現去來今佛所有一切莊嚴之具是上輪義即法輪故復出妙音演不思議廣大法海是為二十六從二十七至三十一並略無莊嚴亦由名中已含有故次有大人相名光照佛海雲至一切法界莊嚴雲下辨體嚴最處於中此居頂極特顯別處故云處中則知所餘皆繞此相略不明取漸次隆起正顯其相智論第五云如來頂有骨髻如拳觀佛三昧經云如合拳即隆起之相也閻浮檀金因陀羅網以為莊嚴至是為三十二三總結為嚴佛子如來頂上有如是三十二種大人相以為嚴好二眉間唯有一相自下諸文並有依處故文有五佛子如來眉間有大人相依處名遍法界光明雲顯名摩尼寶華以為莊嚴至猶如日月洞徹清淨明其體嚴謂此相若收則右旋如覆琉璃之碗若展則具十楞有大光明嚴唯一寶光具多色中表皆空即是洞徹其光普照十方國土至復出妙音宣暢法海明其業用復出已下即是法光故此光名從用而立是為三十三結數三眼有一相如來眼有大人相至是為三十四四鼻有一相如來鼻有大人相至是為三十五五舌有四相初一即舌廣長相如來舌有大人相名示現音聲影像雲上顯名下體嚴衆色妙寶以為莊嚴宿世善根之所成就宿善成者此舉因嚴偏此説因者令譖演一乘故其舌廣長遍覆一切諸世界海即語其體福德之人舌長至鼻權佛至於髮際餘大乘中明現神足方至梵世或覆三千今直語體便覆一切不假神變次辨業用如來若照熙怡微笑至遍一切剎住無量劫演法之言釋上音聲現佛之言釋上影像是為三十六二舌掌之相如來舌復有大人相至猶如眉間所放光明掌謂近根次辨業用其光普照一切佛剎唯塵所成無有自性光照諸剎令應度者無俟更假觀破摶聚自曉佛剎但合塵成何性之有光中復現無量諸佛至是為三十七三有二相同在舌端或居左右或在上下觀文業用但有展卷二義不同今依此科初卷佛海於舌端如來舌端有大人相至是為三十八二展諸佛於法界如來舌端復有大人相至是為三十九六上齶有一相如來口上齶有大人相至是為四十上齶既有下亦宜然或是梵本脫漏故也七牙有四相如來口右輔下牙有大人相至是為四十一謂左右上下四大牙故故佛涅槃四牙不碎輔者頰也亦有處云煩車骨也如來口右輔上牙有大人相名寶𦦨彌盧藏雲名彌盧者顯妙高故摩尼寶藏以為莊嚴至於虗空中流布法乳四中有法乳等三同一演法約資法身名為法乳法燈照了萬境故稱為證法寶令其圓淨故稱為寶即演三德涅槃之法亦成三德涅槃之益也教化一切諸菩薩衆是為四十四八齒有一相如來齒有大人相至是為四十五九脣有一相如來脣有大人相名影現一切寶光雲上顯名下體嚴放閻浮檀真金色蓮華色以脣色赤好如日初出紅蓮葉故一切寶色廣大光明次辨業用照于法界悉令清淨是為四十六上二各應分出上下十頸有一相如來頸有大人相至紺蒲成就柔軟細滑紺蒲者形如林檎紋有三約如前已辨放毗盧遮那清淨光明至是為四十七十一肩有五相如來右肩有大人相至是為五十二右二左三或亦脫也十二𮌎有十二相初一當中如來𮌎臆有大人相形如卍字名吉祥海雲卍字正翻應云吉祥海雲謂以依形而立名故先標形相應回字安名之下以屬體攝無違前後摩尼寶華以為莊嚴至是為五十三二右有五相吉祥相右邊有大人相至是為五十八三左有五相吉祥相左邊有大人相至是為六十三
