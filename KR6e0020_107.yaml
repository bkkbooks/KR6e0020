body:
  text: 清涼山沙門澄觀述晉水沙門淨源録疏注經第四普救衆生妙德夜神寄𦦨慧地文但有五二三合故初依教趣求二初修入前法爾時善財童子至心無暫捨諸根不散二趣求後友一心願得見善知識至普救衆生妙德夜神所二聞見法界即合二三謂約善財則是見敬若約夜神所現即是解脫業用便為默授法界若約二文開辨則先明見敬咨問後答因緣方為正授法界今依合科總分為四初現光加持時彼夜神為善財童子至入善財頂充滿其身調伏衆生解脫即光所依是己法門名體可知二蒙光獲益謂得三昧見大用故文二初得定善財爾時即得究竟清淨輪三昧謂三業六根皆悉離障故云究竟清淨淨智圓滿摧障為輪故所見無礙二明見大用二初見用所依處得此三昧已悉見二神至如是一切所有微塵二明所見事三初所化處二初總明處類一一塵中各見佛剎至各各差別靡不悉見二別明塵中之剎又見一切世界差別至或有世界清淨上之二句乃是總明或有世界趣雜穢或有世界趣清淨轉變向染淨故或有世界雜穢清淨染多或有世界清淨雜穢反上或有世界一向清淨對上二義故或有世界其形平正或有覆住或有側住二能化益二初總明如是等一切世界至普現其前隨宜化度二別顯二初化五道令地獄衆生免諸苦毒至如是等怖悉令捨離二化九類又見一切衆生卵生胎生至普現其前常勤救護三明化意為成就菩薩大願力故至令得一切智清淨光明故為成諸法通能所化三三業敬讚三初身心敬重時善財童子見此夜神至頭面作體一心瞻仰二顯友自在時彼夜神即捨菩薩至而不捨其自在神力三口以偈讚二十偈半分二初偈總爾時善財童子恭敬合掌却住一面以偈讚曰我善財得見如是大神力其心生歡喜説偈而讚歎二餘偈別二初有九偈半光用無涯我見尊妙身衆相以莊嚴至王等一切怖二述前蒙光獲益三初推功歸本我承喜目教今得詣尊所二有二偈半明述得三昧見尊眉間相放大清淨光至普見十方佛三有七偈明述見大用我於所經處悉見諸微塵至普皆往供養四問答因緣二初問有三爾時善財童子説此頌已至甚深希有其名何等一問名前來標名集經者言故此方問得此解脫其已久如二問得法久近欲顯久修德遠故修何等行而得清淨三問修因淨治救入路故二答文二初歎深難説夜神言善男子是處難知至一切二乘所不能先標次徵何以故後釋此是住普賢菩薩行者至三世方便海者境界故深相云何若約得時時久遠故非久近故若約修因因行廣故若通上二契理甚深故若約名説名如體用故名者實賓難窮實故二承力為説二先長行二初標許我承佛力今為汝説二正説二初通答三問三初答得法久近十初總舉劫剎佛興善男子乃往古世至微塵數如來於中出現已略酬其久近二通顯剎相其佛世界以一切香王至諸大菩薩之所止住三別顯生處此界東際輪圍山側至其中衆生具行十善四明本生父母有轉輪王於中出現至常放光明照千由旬五明本生身其有一女名普智𦦨至衆生見者情無厭足六衆生起惡為佛現因爾時衆生壽命無量至一切樂事悉皆損減七佛興益物三初明得道之場時彼城北有菩提樹至一切如來莊嚴境界雲二總顯佛數須彌山微塵數佛於中出現三別明初佛文七初總明成道其第一佛名普智寶焰至演説正法成熟衆生二成道前相其彼如來未成佛時至知七日後佛當出現謂放光調機有十一重一一重中各有光名業用成益以益對名可以思準若約表法則前十為次第十度光後一為圓融十度光以此照心則自智出現三動剎集衆滿七日已一切世界至應見佛者咸詣道場四現相顯德爾時彼世界中一切輪圍至出現世間不思議相五明成道依正善男子此普照三世至皆有菩薩結加趺坐六始成正覺善男子彼普智寶𦦨至成阿耨多羅三藐三菩提一成一切成故七轉正法輪三初總標轉法隨衆生心悉現其前為轉法輪二顯其成益於一一世界令無量衆生至無量衆生得生天中先益凡夫次益二乘令無衆生住於聲聞辟支佛地後益菩薩令無量衆法成就出離至清淨境界菩提之行上成行下成位令無量衆生發菩提心住位令無量衆生住菩薩行位令無量衆生安住清淨波羅蜜道回向位以大願海治前度故令無量衆生住菩薩初地至安住普賢清淨行願後二句是等覺位三結無間斷善男子彼普智寶焰至念念調伏無量衆生八明善友引導六初知機起惡時普賢菩薩知寶華燈王至而生憍慢陵蔑他人二現身超勝化現妙身端正殊特至亦如聚墨對閻浮金三物機驚怪時諸衆生或作是言至種種思惟無能解了四告語佛興爾時普賢菩薩在彼輪王至法雲音幢菩提樹下五女發大心時聖王女蓮華妙眼至常得不離此善知識亦是入法因六父王詣佛四初身處虗空善男子時轉輪王至欲令衆生俱往見佛二以偈讚引十偈分三初總勸以偈讚曰如來出世間普救諸衆生至往詣導師所二釋勸無量無數劫乃有佛興世至一切無空過三結勸今當共汝等往觀調御尊至恭敬而供養勝故應往三廣興雲供爾時轉輪聖王説偈讚佛至於虗空中周遍嚴飾四至彼修敬到已頂禮普智寶𦦨至普照十方寶蓮華座九德女修因三初嚴具奉佛時轉輪王女普智𦦨至諸莊嚴具持以散佛表修萬行向佛果故二見佛現變時莊嚴具於虗空中至種種如來契經雲表因小果大故三覩變獲益既見是已其心清淨生大歡喜十聞經得益三初佛為説經普智寶𦦨妙德幢王至微塵數修多羅而為眷屬從總相為名二正明聞益三初得三昧益時彼女人聞此經已至彼三昧心亦復如是上總下別所謂現見一切佛三昧至普詣一切清淨佛剎三昧二得大心益得如是等十千三昧至遍緣一切方海心即悲智等心三成大願益一心思惟普賢大願至成就普賢所有大願上之三益即調伏衆生解脫三事皆調伏之法故三顯發昔因時彼如來復為其女至一心趣向一切智位二明發心之始義男子復於此前即得法劫之前也顯前得法非無因也過十大劫有世界至成熟於我令生歡喜三結會古今三初結會得法時身善男子於意云何至時妙德眼童女者即我身是二結發心之始我於彼時身為童女至我於彼時初始發心三正結得法次復引導令我得見至聽聞説法依教修行此方酬其名即前三益二別答修行淨治前有聞法修行是得法之前此是得法之後於中二初別舉大光劫三初總明善男子過彼毗盧遮那至我皆承事恭敬供養二別顯其最初佛名大悲幢至我皆聽聞受持不忘其中經名説者當演三顯其最後善男子如是次第至名法界方便不退藏二總顯諸劫三初總標善男子此世界中至我皆承事恭敬供養二得法修行彼諸如來所説正法至入一切普賢行三見佛成行善男子我依一切智光明故至以得一切智光明故二偈頌三初舉法誡聽爾時普救衆生夜神至為善財童子而説頌曰善財聽我説甚深難見法至汝今應諦聽即頌前標許二頌前正説通頌得法久近及修行清淨二初頌最初一劫我念過去世過剎微塵劫至第十賢德佛上之三十六偈廣前長行有一百一十佛表十地等覺各各以初佛為主餘九為伴二頌前總顯諸劫須彌塵數劫此中所有佛至入此解脫門亦表智滿行圓無非佛故三有一偈舉因勸修我於無量劫修行得此道汝若能修行不久亦當得三謙己推勝善男子我唯知此至能知能説彼功德行四指示後友善男子去此不遠亦以證同又禪依進發故云不遠主夜神名寂靜音海禪故寂靜入俗演法化物深廣故云音海然此神即普救之母表真精進却從定生起心動念是妄非進故坐摩尼光幢莊嚴蓮華座至學菩薩行修菩薩道五戀德禮辭時善財童子頂禮其足至殷勤瞻仰辭退而去
