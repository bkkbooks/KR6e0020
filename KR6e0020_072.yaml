body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經十通品第二十八初來意為答第二會中十通問故以二品明業用廣大前定此通義次第故亦由依定發通二釋名者通即神通謂妙用難測曰神自在無擁曰通妙用無極寄十顯圓晉經本業俱稱十明者委照無遺故然通與明經論皆異故智度論第三云直知過去宿命之事為通若知過去因緣行業為明等今以此經通即委照亦得稱明如文廣說故下經云非諸菩薩通明境界晉經意存順義今譯務不違文三宗趣者智用自在為宗為滿等覺無方攝化為趣次正釋文長分為四初標告舉數爾時普賢菩薩摩訶薩至菩薩摩訶薩有十種通言十者一他心二天眼三知過去劫宿住四盡未來際劫五無礙清淨天耳六無體性無動作往一切佛剎七善分別一切言辭八無數色身九一切法智十入一切法滅盡三昧此十皆言智通者皆以大智為體性故若隨相說前八量智後二理智據實唯一無礙大智此十亦是開彼六通天眼天耳神足漏盡各分為二故天眼約見現未分成二四天耳約音聲言辭分出五七亦是約聞聖教及諸類言辭故神足約業用及色身分成六八漏盡約慧定分成九十一三不分故六為十然小乘六通智用有分三乘平徧亦非曲盡今一乘十通智用重重徧周法界猶如帝網念劫圓融故尚越彼明況於通用為顯圓旨開成十通二徵數列釋二初總徵何者為十二別釋十初他心智神通三初標佛子菩薩摩訶薩以他心智通今初標云他心者智以他心為所緣故若直就所緣應名心差別通若所若王種類多種皆能知故並依主受名然智緣他心諸說不同安慧論師云佛智緣他心緣得本質餘皆變影護法論師則佛亦變影若緣本質得心外法壞唯識故但極似本質有異因人依唯識宗護法為正以今經望前亦未為失以攝境緣心不壞境故能所兩亡不礙存故第一義唯心非一非異正緣他時即是自故以即佛心之眾生心非即眾生心之佛心為所緣以即眾生心之佛心非即佛心之眾生心為能緣如是鎔融故非一非異若離佛外別有眾生更須變影却失真唯識義二釋相二初知一剎三初總知一三千大千世界眾生心差別二別有三十類心闕第三無記晉經具有於中分二初八約相總顯所謂善心不善心此二約性總該諸心廣心陿心此二約行兼濟獨善故大心小心此二約報天大人小故上四唯善順生死心背生死心此二約向背而順通三性善唯有漏背唯是善通漏無漏二二十一心約人別顯聲聞心獨覺心至獨覺行心菩薩行此六約乘前三是果後三是因即前皆生心及廣陿心天心龍心夜叉心至緊那羅心摩睺羅伽心八部約類即前順生死及大小心人心非人心地獄心至餓鬼心諸難處眾生心地獄等五約趣以明亦順生死是不善心餘二可知三結如是等無量差別種種眾生心悉分別知二以少類多如一世界如是百世界至所有眾生心悉分別知三結是名菩薩摩訶薩第一善知他心智神通二天眼智神通三初標佛子菩薩摩訶薩以無礙見自在故清淨離障故天眼智通天眼即通二釋三初總明多界相殊見無量不可說不可說至如是品類無量眾生其善惡趣等後後展開如問明品二別明多類非一所謂天眾龍眾夜叉眾至廣大身眾生眾小眾大眾隨一一類有前福等三委照分明如是種種眾生眾中以無礙眼悉皆明見前但覩其現相此則照其因緣十明之目由此而立上辨能見分明下辨所見委悉隨所積集業隨所受苦樂至隨所緣隨所起言隨所者所知非一故後結其無謬悉皆見之無有錯謬三結是名菩薩摩訶薩第二無礙天眼智神通三宿住智神通三初標佛子菩薩摩訶薩以宿住隨念智通謝往之事名為宿住在於過去明了記憶名為隨念即宿住之隨念宿住隨念之通二釋相二初知凡事二初總能知自身及不可說不可說至微塵數劫宿住之事二別所謂某處生如是名如是姓至如是等事皆悉了知二知聖事二初約界顯多又憶過去爾所佛剎至如是一切悉能憶念但知其果二約人顯多又憶念不可說不可說至種植善根皆悉能知兼知其因皆以菩薩得九世眼如見現在故若不爾者過去之法若不落謝不名過去若已落謝無法可知若但曾經心中有種影現前故說憶知者是則但見自心不見彼法又曾不經事應不憶知又但見現在非是過去何名宿住三結是名菩薩摩訶薩第三知過去際劫宿住智神通四知未來際劫智通三初標佛子菩薩摩訶薩以知盡未來際劫智通亦從境受名二釋相二初知凡二初明所依劫知不可說不可說佛剎微塵數世界中所有劫但寄多界以顯多劫非有際限名及後段皆盡未來此位所知同於佛故二顯能依事一一劫中所有眾生至如是一切皆能了知義如十地文中所辨然大乘宗未來世法體用俱無今云何知依方便教但見現在因種知當果相非見未來法體若一乘宗於九世中現在體用俱有今稱實而知然非現在之現在故稱未來此有若是性有即同小乘若是緣有緣今未會云何言有若今時看緣性俱無以是現在未來定非有故若逐未來時看以是未來之現在故還如今有三知佛又知不可說不可說佛剎至如是等事悉能了知三結是名菩薩摩訶薩第四知盡未來際劫智神通五天耳智神通三初標佛子菩薩摩訶薩成就無礙清淨天耳略無智通若直云天耳即當體受名若取無礙清淨之天耳即依有德業受稱二釋相三初總顯德業自在九句皆約用辨德前之標名即是總句圓滿能互用故廣大徧聞十方及九世故聦徹一時領覧通其源故離障離二障故了達了所知故無礙緣不能礙故具足非如權小聞有分限不盡重重故成就已證得故於諸一切所有音聲欲聞不聞隨意自在於一切皆自在故謂欲聞則細遠無逃欲不聞則近大不撓故云自在二別示一方業用二初舉多佛欲顯聞廣佛子東方有不可說不可說佛剎微塵數佛二顯聞憶持二初聞持教法是諸佛所說所示所開所演至於彼一切皆能受持二顯持圓滿即能持之相二初舉所持又於其中若義若文至如其所依如其出道上文通顯佛所說法今辨所說差別二辨能持相於彼一切悉能記持至終不忘失一文一句兼明轉化三舉一例餘如東方南西北方四維上下亦復如是三結是名菩薩摩訶薩第五無礙清淨天耳智神通六無體性智神通三初標有十四名佛子菩薩摩訶薩住無體性神通初一是總通即無體性餘皆是別無作神通無功作用平等神通同理平等廣大神通能普徧故無量神通量難知無依神通非謂依體起用隨念神通但隨念即形起神通現有作用不起神通不動本處不退神通作必究竟不斷神通用無聞歇亦不斷佛種不壞神通他不能壞增長神通能生善根隨詣神通隨何所詣於十三中初二五八是無體性義餘即神通義此二無礙故受斯名二釋相三初明廣大此菩薩聞極遠一切世界中至即自見身在彼佛所謂聞多剎佛名即見身在彼多剎故即前廣大義二明無量不起等義彼諸世界或仰或覆至至於究竟無所取著謂又於彼佛重聞佛名便往敬事受道無著故三明不斷義如是經不可說不可說佛剎至廣大種性不斷絕故謂於多時體用無疑故三結是名菩薩摩訶薩第六至往一切佛剎智神通七善分別言音智神通三初標佛子菩薩摩訶薩以善分別一切眾生言音智通從所了得名即依主立稱若從所發得名即通持業三釋二初知言辭知不可說不可說佛剎微塵數世界眾生種種言辭上標下列所謂聖言辭非聖言辭至各各表示種種差別後結如是一切皆能了知二發言辭此菩薩隨所入世界至悉令解了無有疑惑謂隨樂差別而發言故上法下喻如日光出現普照眾色令有目者悉得明見後合菩薩摩訶薩亦復如是至聦慧之者悉得解了三結是名菩薩摩訶薩第七善分別一切言辭智神通八色身莊嚴智神通三初標佛子菩薩摩訶薩至阿僧祇色身莊嚴智通依所現得名即有財立稱二釋三初知無色以色即空故二明能現色以空即色故三雙明無色現色所為不礙悲故今初由了法界無定實色舉體即空非斷空故空中無色不礙色故存亡隱顯皆自在故方能隨樂現種種色故先明之二正釋文文有六句知一切法遠離色相初一總知色性離相亦無有法而為空故餘五別明離何等相無差別相離麤妙長短等同一無生體故無種種相種種異相虗故無無量相離多相故又非大小絕分量故無分別相但妄分別求叵得故色空二見皆是情取即與不即二見絕故上通形顯無有黃赤白相離顯相依形有故二明能現色以空即色故文二初結前標後菩薩如是入於法界能現其身作種種色以即空之色為妙色故又空色不二成上真空不二而二現斯妙色色空融即為真法界緣起無盡即一現多二別顯不同所謂無邊色無量色至具足一切普賢行色有一百三種或從色相立名或就德用受稱可以意求然皆是稱法界之色不同變礙但隨所顯以立色名三雙明無色現色所為不礙悲故二初結前佛子菩薩摩訶薩深入如是至能現此等種種色身二顯其所為令所化者見令所化者念至為所化者施種種能事十句並可智三結是名菩薩摩訶薩至第八無數色身智神通九知一切法智神通三初標佛子菩薩摩訶薩以一切法智通從所知真俗等法受稱二釋相二初明知法即內證事理二明演法即外益眾生亦是前明即事常理後明即理恒事用寂寂用無障礙故今初又二初約離言顯實知一切法無有名字初之三句一向顯實上句名無得物之功故無有種性緣成無性無來無去體絕去來下有三句相對顯實然此三對釋有三義非異非不異一唯約顯實則相待而空故異相互無故云不異為遮異言故云不異亦無不異之相可得故云非不異二約雙顯體即不異相非不異三約雙遮相即性故非異性即相故非不異又相非相故不異性非性故非不異故離二邊不住中道下二對例知非種種非不種種非二非不二二約二空顯實無我無比亦初三對一向顯實上對無有我所與我為比對故不生不滅不動不壞餘二可知次下諸對亦通三釋準前知之且約顯實以釋無實無虗虗實皆緣顯故一相無相法性不並真故一相一亦非為一所以云無相非無非有有無皆法待對故無非法非非法法與非法但假施設並就實求能治所治無不雙寂餘皆倣此不隨於俗非不隨俗至非如理非不如理二明演法即外益眾生三初牒前成智為起用所依此菩薩不取世俗諦至不建立文字隨順寂滅性二正明演法不捨一切願見義知法興布法雲降霔法雨三寂用無礙三初寂不礙用雖知實相不可言說至為說諸法悉從緣起二用不礙寂雖有言說而無所著至雖攝眾生不捨真實三寂用無二於不二法而無退轉至普雨法雨而不失時三結是名菩薩摩訶薩第九一切法智神通十一切法滅盡定智通三初標佛子菩薩摩訶薩以一切法滅盡三昧智通一切法滅盡者謂五聚之法皆當體寂滅故斯即理滅不同餘宗但明事滅唯滅六七心心所法不滅第八但事滅故不能即定而用證理滅故定散無礙由即事而理故不礙滅即理而事故不礙用是以文云雖念念入而不廢其菩薩道等亦非心定而身起用亦不獨明定散雙絕但是事理無礙故七地云雖行實際而不作證能念念入亦念念起及淨名云不起滅定現諸威儀皆斯義也事理非一故一切法滅盡之神通非異故滅盡即神通通二釋也二釋二初明即定體用自在二初標入定於念念中入一切法滅盡三昧二明不礙用亦不退菩薩道不捨菩薩事初二句總未作不退現作不捨正揀事滅以顯真滅餘句別明不捨大慈大悲心至方便為說種種諸法二入定時分自在三初長短隨心此菩薩住三昧時隨其心樂至住不可說不可說劫二威儀不忒菩薩入此一切法滅盡三昧至不疲不懈不可盡竭三不礙起用定散雙行雖於有於無悉無所作至神通變化無有休息上六句法下二句喻譬如光影普現一切而於三昧寂然不動光影普現寂然無心菩薩亦爾隨器虧盈體無來去三結是為菩薩摩訶薩入一切法滅盡三昧智神通三總歎勝能二初形劣顯勝佛子菩薩摩訶薩住於如是至智慧境界不可思議劣不測故二以勝顯勝唯除諸佛及有得此神通至此人功德稱揚讚歎謂佛等方測故四結數辨果佛子是為菩薩摩訶薩至一切三世無礙智神通十忍品第二十九初來意者為答普光十頂問故義如前釋前二已明定通用廣今此辨其智慧深奧故次來也二釋名者忍謂忍解印可即智照觀達寄圓顯十三宗趣者智行深奧為宗為得佛果無礙無盡為趣然此忍行約位即在等覺後心為斷微細無明煩惱若約圓融實通五位寄終極說體即是智不同餘宗忍因智果雖是一智隨義別說二三四五等諸教不同今此圓教故說十忍四正釋文文有長行偈頌前中有四初舉數歎勝二初舉數爾時普賢菩薩告諸菩薩言至有十種忍二歎勝若得此忍則得到於一切菩薩無礙忍地即自分因圓一切佛法無礙無盡即勝進果滿二列名顯要初徵數何者為十二列名所謂前三約法後七約喻音聲忍約教謂忍於教聲從境為名音聲之忍順忍約行順諸法故順即是忍無生法忍若約忍無生理即無生之忍若約無生之智及煩惱不生則無生即忍通二釋也又此三忍若通相說前二皆是無生忍之加行順向無生後一方契若約當位三忍條然以不應此位方有順無生忍故順但順理不是順忍若爾何異無生順忍通順事理二法不同無生偈云法有亦順知等又依五忍位當寂滅今約三忍明義故當無生如地持說後七約喻並是依主謂如幻之忍等故如幻忍如𦦨忍如夢忍至如化忍如空忍光統云前四喻音聲電化喻順忍空喻無生電即今之影喻又云幻者起無起相𦦨者境無境相夢者知無知相響者聞無聞相電者住無住相今既云影應云現無現相化者有無有相空者為無為相此則能喻局於一相所喻義通多法在文雖無於理無失又賢首云觀識如幻想如𦦨受如夢聲如響行如電色如化總觀一切蘊界處等畢竟空故如虗空也此釋順於後偈文意故今影喻亦喻於行若依攝論第五八喻皆喻依他起性然並為遣疑所疑不同故所喻亦異一以外人聞依他起相但是妄分別有非真實義遂即生疑疑云若無實義何有所行境界故說如幻謂幻者幻作所緣六處豈有實耶二疑云若無實何有心心法轉故說如𦦨飄動非水似水妄有心轉三疑云若無實何有愛非愛受用故說如夢夢中實無男女等相從何而有愛非愛等受用之事覺時亦爾四疑云若無實何有戲論言說故說如響實無有聲聽者謂有五疑云若無實何有善惡業果故說如影謂如鏡影像故亦非實六疑云若無實何以菩薩作利樂事故說如化謂變化者雖知不實而作化事菩薩亦爾然彼論無空喻而影喻是鏡像更有映質光影喻喻種種識無實又有水月喻喻定地境界無實今經以義類同故合在影中至文當知遠公見其無空便以空喻喻無為法非不有理而違下經經云眾生及諸法皆如空故若爾云何釋空喻耶謂彼疑情雖遣猶謂諸法有不實相故云如空畢竟無物餘義廣如攝論及別章說金剛般若九喻亦皆喻有為若大品智論十喻通喻一切楞伽亦通今經長行多同前通而偈所喻亦有局者顯義無方故二顯要此十種忍三世諸佛已說令說當說要故同說三依名廣釋十初音聲忍三初徵起佛子云何為菩薩摩訶薩音聲忍二釋義十一句謂聞諸佛所說之法初一總舉所聞謂三無性等法餘十句顯能聞入法不驚謂聞無相不驚以解徧計無所有故不怖聞無生不怖以解依他必無生故不畏聞無性不畏以解真如無性性故又釋於真空法聞時不驚越思時不續怖修時不定畏又聞有無所有不驚聞空無所有不怖聞斯二無所有不畏並如諸般若論說深信聞慧之始悟解聞慧之終初信久解故愛樂思慧之初愛法樂觀故趣向為終久思向修故專心憶念修慧之初起加行故修習為終正明造修至定根本故安住依定發慧證理相應故具如瑜伽菩薩地中三結名是名菩薩摩訶薩第一音聲忍二順忍三初徵起佛子云何為菩薩摩訶薩順忍二釋中具有四重止觀謂於諸法思惟觀察一創修止觀謂止思一境觀觀事理平等無違隨順了知二漸次止觀謂止安事境順其理故名平等無違觀達事理名隨順了知偈云法有亦順知法無亦順知故令心清淨正住修習三純熟止觀謂止惑不生名令心清淨觀徹前境為正住修習趣入成就四契合止觀寂冥理境止也名為趣入智顯於心觀也故云成就上四皆止觀俱行如是方為真實順忍三結名是名菩薩摩訶薩第二順忍三無生法忍三初徵起佛子云何為菩薩摩訶薩無生法忍二釋義二初總明佛子此菩薩摩訶薩至亦不見有少法滅若具皆應牒無盡等此二為總故略標之釋中具有皆此別義二徵釋二先徵何以故徵意有二一云何以得知無生滅耶二云既稱無生法忍何以復言不見法滅三釋若無生則無滅釋初徵意云真法本自不生從緣之法無性故不生以無生故何有於滅此則以緣集釋無生以無生釋無滅此中略無緣集偈文具有云何無生釋無滅耶此有二意一云若先是生後必可滅本既不生今則無滅二云既即緣無性稱曰無生則不待滅竟方無故次云無滅此二為總餘可倣之釋第二徵意云夫無生忍非獨無生必諸法都寂今從初義立無生稱故無滅等成無生義若從別義亦可得稱無滅忍等是以信力入印度經明此忍能淨初歡喜地云一謂得無生忍亦令他住又云無生忍者謂證寂滅故二得無滅忍亦令他住又云無滅忍者證無生故斯文可據若無滅則無盡至若無住則無去無來又此諸句各有二義一以前前釋於後後以後後句成於前前前前有故後後方有前前無故後後亦無二者諸句一一皆在無生句中正無生時諸義頓足以是即事之理非斷滅故即理之智無能所故然文旨包含略為三釋一唯約理二具理智三唯約智今初云何前前有故得後後有謂生法既滅滅則終盡盡則是垢染法染則前後別異別則方處不同有處則能所非寂不寂則有所欲有欲則有營作作則有所願求願則心住願事住則有去有來今由前前無故後後斯寂故以後後顯成無生此順長行二雙約理智者初二是總含於理智次四顯理無生後六顯智無生故偈中云其心無染著等理智契合名無生忍三唯約智者由了從緣無生則智無有起故名無生無生之忍湛然不遷故云無滅無滅故用無斷盡次垢念皆離常無差異旁無方所照而常寂遇境無染雖為而無作雖悲而無願處世而無住等法界而無去來皆以前釋後以後成前言亡慮絕寂照湛然名無生忍若唯約知無生理名無生忍未足深玄三結名是名菩薩摩訶薩第三無生法忍四如幻忍三初徵起佛子云何為菩薩摩訶薩如幻忍二釋義初略後廣略中有二初了幻緣相二成就忍行今初佛子此菩薩摩訶薩文三初指法同前次彰幻所由緣生不實故後顯幻相知一切法皆悉如幻一切法即是所喻所喻通局已見上文此意明通通為無為故大品云設有一法過涅槃者我亦說言如夢如幻涅槃雖真從緣顯故遣著心故廣中合云了世如幻則似有為然有法世亦通無為此為有為所隱覆故所以名世故後云菩提涅槃亦皆不見者了平等故從因緣起就法喻中各開五法喻開五者如結一巾幻作一馬一有所依之巾二幻師術法三所現幻馬四馬生即是馬死五愚小謂有法有五者初巾喻法性二術喻能起因緣謂業惑等三喻依他起法即眾生等四喻依他無性即圓成故故下廣說皆云非也五喻取為人法今菩薩反此故云解了今經既云從因緣起能起即第二所起即第三以第二為因令悟第三成於第四遣第五病歸第一理然緣亦從緣故緣果俱幻中觀論云譬如幻化人復作幻化人即斯意也然上五義各具有無一巾性有相無為馬所隱故二術用有體無以依巾無體故三馬相有實無以實無而現故四生即是無死即是有以無礙故五情有理無但妄見故又此五中各有四句唯思可知然皆具德不同四謗若以諸門交絡成多四句亦可思準於一法中解多法於多法中解一法後顯幻相略為二解一約相類謂解一無實則知一切皆然並從緣故故云一中解多等二約圓融復有三義一以理從事說相即性如馬頭之巾不異足之巾說頭即足故一即多等無行經云貪欲即是道者貪欲性故諸法即貪欲者即貪欲實性故二以理融事一多相即如馬頭無別有即以巾為頭以巾體圓融故令頭即足故云一中解多等三約緣起相由力則法界同一幻網令一多相即如幻師術力令多即一等賢首品云或現須臾作百年等以幻法虗無障礙故相即既爾相入亦然入則一中有多等異體既爾同體亦然一門既爾餘門思準二成就忍行此菩薩知諸法如幻已至成就種種神通變化由知法幻成二種行一忍智現前云了平等二幻用無礙云成通化云何平等釋有三義一理事平等如巾馬無二故色即空等二理理平等如頭足俱巾巾無別故如賢聖同如三事事平等如前一多中說二廣三初喻二初明性無即體空義譬如幻非象非馬非車非步至非是一切種種眾物所非之事亦可次第對前情非情境二明其相有即差別義種種非幻幻非種種初二句結前生後種種非幻者象等非術故下句反此法合可知然由幻故示現種種差別之事正顯相有雖互相非然由因起果虗而假現又喻智了平等而起化用二法合菩薩摩訶薩亦復如是觀一切世間如幻上總下別皆言世間者有其二義一可破壞故即喻有為二隱覆名世亦通無為所謂業世間煩惱世間至時世間趣世間法通五類趣謂五趣成世間壞世間成壞約器一期說故運動世間通情非情念念移故造作世間唯情現營為故二成忍行二初成真智行菩薩摩訶薩觀一切至不見入正位不出平等性由了體空故故經結云不出平等性又前法中明即寂之照云了平等此明即智之止故云不見是知無幻之幻方是幻法絕見之見方為見幻二明動靜無二是菩薩雖成就佛國土至知因緣性無有動轉亦權實不二故經云智不得有無而興大悲心由了體空不壞幻相差別故如象生即是象死此二相對應成四句謂此二無二故非異無不二故非一非一即非異故非非一非異即非一故非非異亦絕雙照故非亦一亦異若以巾上二義對象上二義辨非一異略有十句一以巾上成象義對象上差別義合為一際名不異此是以本隨末就末明不異經云法身流轉五道名為眾生如來藏受苦樂與因俱若生若滅等二以巾上住自位義與象上體空義合為一際名不異此是以末歸本就本明不異經云一切眾生即如不復更滅等三以攝末所歸之本與攝本所從之末此二雙融無礙不異此是本末平等為不異以前二經文不相離故四以所攝歸本之末亦與所攝隨末之本此二相奪故名不異此是本末雙泯明不異以真妄平等異不可得故次下四門明非一謂五以巾住自位義與象上相差別義此二本末相違背故名非一楞伽經云如來藏不在阿賴耶中是故七識有生滅如來藏者不生滅此之謂也六巾上成象義與象上體空義此二本末相反相害故非一勝鬘經云七識不流轉不受苦樂非涅槃因唯如來藏受苦樂等七以初相背與次相害此二義別故名非一謂相背則各相背捨相去懸遠相害則相與敵對親相食害是故近遠非一以前經文不相離故八以極相害俱泯而不泯與極相背俱存而不存不存不泯義為非一此是成壞非一以七識即空而是有故真如即隱而是顯故九上四非一與次四非異而亦非一以義不雜故十然亦不異以理徧通故法無二故若以不異門取諸門極相和會若以非一門取諸門極相違害極違而極順者是無障礙法也巾象相對既爾術等相對交絡諸句準之上下諸文非一異義皆準此釋三結名是名菩薩摩訶薩第四如幻忍結文可知
