body:
  text: 清涼山沙門澄觀述晉水沙門淨源錄疏注經六說分文二初總告爾時普賢菩薩告普慧等諸菩薩言二正答前來二百句問問一答十以顯無盡成其二千普賢勝行故英公歎云雲興二百問瓶瀉二千酬釋此二千略首五門一約因果二分行位三顯普別四明統收五辨行相前問例此今初有四一約大位於六位中前五為因後一為果或後四門為果餘皆是因二約細辨一一行門皆徹佛果故諸文末皆結得佛是則二千普通因果三或總屬因普賢行位示成佛故四或皆屬果下文多云雖得成佛不斷菩薩行故二分行位者亦有四義一束行成位成六分故二總屬位以行並是位中行故三總屬行普賢行體不依位故四一行徧通於六位位位徧修故如此無礙方為普賢行然文正顯後之二段以攬行成位位虗行實故故問答併舉不分六番意在此也三普別者謂一行相必徧一切然恒不雜以不雜故六義殊分以必徧故普義該攝猶如錦文眾色成文常普常別縷縷交徹此如繡成行法亦爾即普是別即別成普皆無障礙若爾此則普別具足何以獨名普賢行耶非謂守普而不能別亦非作別而失於善實謂能別而不壞普故名普賢行也又普必有別但語一別未必有普譬如一縷非錦故也以其非是錦中縷故四統收攝者復有四重一以位收位六位各各收一切位故一位即具二千行門為萬二千故上經云一地之中具足一切諸地功德二以門收門即二百門一一各收一切行門即成二百箇二百為四萬行三以行收行一行具收一切行故則有二千箇二千行成四兆行四以略攝廣此二千行下頌結云如大地一塵以此一塵之略說不離十方之廣地是故攝廣亦無不盡此乃等無極之法界越無際之虗空故下頌云虗空可度量菩薩德無盡斯之謂矣五辨行相即隨文釋釋寄相別即分六段今初二百句答前信行二十句問文分三別初九門明自分行滿次八門勝進行圓後三門明二行究竟今初一門以為一類即為九段然二百門多分五別一總標二徵數三列釋四結數五顯修勝益或闕後二或闕第五至文當知今此依中文具有五初總標佛子菩薩摩訶薩有十種依首明依者起行所依故謂以依託菩提心等成萬行故賢首品云菩薩發意求菩提非是無因無有緣等二徵數何等為十三列釋所謂十句各先標名後釋義以菩提心為依恒不忘失故依菩提心者十皆名依已為眾行之首而菩提心復是十中之初以是萬行之本故貫二千行門之首釋云不忘失者忘失菩提心修諸善根則是魔業故依斯不忘能成萬行此句為總以善知識為依和合如一故上雖內有勝心若外不依善友行亦無成是故大聖謂善財言求善知識是無上菩提最初因緣釋云如一者若不心行符契豈為我友以善根為依修集增長故若不增修善根遇友何益以波羅蜜為依具足修行故隨所修善須到彼岸以一切法為依究竟出離故非獨十度觸境皆通上四自利以大願為依增長菩提故以諸行為依普皆成就故六願七行並通自他上皆依法後三依人以一切菩薩為依同一智慧故勝侶智同以供養諸佛為依信心清淨故淨心供養以成福德以一切如來為依如慈父教誨不斷故長稟慈訓以成智嚴九十唯佛究竟能為所依處故又前五自分後五勝進六廣菩提心七廣三四五後三廣第二四結數是為十五顯修勝益若諸菩薩安住此法則得為如來無上大智所依處由依上十成佛大智為一切所依斯為勝益豈可不修而得亦名勤修二奇特想五初總標佛子菩薩摩訶薩有十種奇特想前依因緣以成諸行今依勝想以攝善根翻妄想源次所依故並出常想受奇特名即上文中常欲利樂諸眾生等利益想也二徵數何等為十三列釋所謂於一切善根生自善根想以他善同己善者隨喜於他情無彼此故互為主伴相資益故同體性故即我所行故自他相即故於一切善根生菩提種子想一毫微善皆是佛因故法華中舉手低頭皆已成佛於一切眾生生菩提器想下至闡提皆有佛性故於一切願生自願想義如初句於一切法生出離想思益云知離名為法故於一切行生自行想亦如初句於一切法生佛法想諸性相法皆佛所證故文殊云我不見一法非佛法者皆不可得故諸軌儀法皆佛所流涅槃經云外道之法亦是如來正法之餘於一切語言法生語言道想因言契理而理非言故名言道於一切佛生慈父想佛以覺他令悉圓滿故為慈父於一切如來生無二想如來即諸法如義故無有二四結數是為十五顯修勝益若諸菩薩安住此法則得無上善巧想無想之想名善巧想三行五初總標佛子菩薩摩訶薩有十種行以依前來勝想之解造修大行想唯在心行通三業空想不行亦無成辦即上文中修學處也二徵數何等為十三列釋為五對所謂一切眾生行至一切求法行咸悉修學故下化上求對若準晉本此脫第三善學一切戒一切善根行悉使增長故止惡進善對一切三昧行一心不亂故一切智慧行無不了知故妙止深觀對一切修習行無不能修故一切佛剎行皆悉莊嚴故修因嚴剎對一切善友行恭敬供養故一切如來行尊重承事故敬友事師對四結數是為十五顯修勝益若諸菩薩安住此法則得如來無上大智慧行四善知識四初總標佛子菩薩摩訶薩有十種善知識行起必依善友故次明之二徵數何等為十三列釋所謂令住菩提心善知識至一切佛智所入善知識未知之善能令知故未識之惡能令識故凡所順益皆我善友故十皆益也上十信云即得親近善知識是四結數是為十五勤精進三初總標佛子菩薩摩訶薩有十種勤精進行友既具必須䇿勤於此十事離身心相而進修不雜故上文云勤修佛功德二徵數何等為十三列釋所謂教化一切眾生勤精進至皆悉歡喜勤精進四結數是為十五修益若諸菩薩安住此法至如來無上精進波羅蜜六心得安隱五初總標佛子菩薩摩訶薩有十種心得安隱進成二利故獲心安由自利故得智心安由利他故得悲心安即上文云增上最勝心二徵數何等為十三列釋所謂自住菩提心亦當令他住菩提心心得安隱上一行本次二離過自究竟離忿諍亦當令他離忿諍心得安隱無諍三昧離一切諍自離凡愚法亦令他離凡愚法心得安隱越凡小凡謂凡夫愚即愚法小乘次二進善自勤修善根亦令他勤修至住波羅蜜道心得安隱次三證入自生在佛家亦當令他生於佛家心得安隱入位自深入無自性真實法至無自性真實法心得安隱入法自不誹謗一切佛法至不誹謗一切佛法心得安隱入益謂謗有二義一麤言此非佛法等其過彌大二細謂說不契實其過則微若無細謗證實方能後二因圓果滿自滿一切智菩提願至無盡智藏心得安隱四結數是為十五修益若諸菩薩安住此法則得如來無上大智安隱究竟安隱謂菩提涅槃七成就眾生五初總標佛子菩薩摩訶薩有十種成就眾生上則通明二利心安今則別明利物成就故上文云則能慈愍度眾生故然有二義一以此十通用成就一切眾生二各成就一類眾生二徵數何等為十三列釋所謂以布施成就眾生成就慳貪貧窮眾生以色身成就眾生成恃形色憍慢眾生以說法成就眾生疑法以同行成就眾生佷戾之者以無染著成就眾生貪愛眾生以開示菩薩行成就眾生樂二乘者以熾然示現一切世界成就眾生不樂嚴剎以示現佛法大威德成就眾生不欣佛果以種種神通變現成就眾生邪歸依者以種種微密善巧方便成就眾生邪智狡猾四結數是為十五修益菩薩以此成就眾生界八戒五初總標佛子菩薩摩訶薩有十種戒欲成就眾生須自止惡而行眾善二徵數何等為十三列釋所謂不捨菩提心戒至諸根律儀戒若忘菩提心乃至諸根犯境皆悉名為破菩薩戒故文云堅固大悲心則不破也此十三聚應細思之四結數是為十五修益若諸菩薩安住此法則得如來無上廣大戒波羅蜜九受記法四初總標佛子菩薩摩訶薩有十種受記法至自知受記既離過成德自驗己行必招當果由此故能自知受記故上文云若得無生深法忍則為諸佛所授記即此中義二徵數何等為十三列釋所謂以殊勝意發菩提心自知受記見理深悲即發心殊勝得果無疑若因他厭苦則非殊勝未定得記永不原捨諸菩薩行自知受記無厭修住一切劫行菩薩行自知受記長時修修一切佛法自知受記無餘修於一切佛教一向深信自知受記契理修修一切善根皆令成就至菩提本願自知受記餘五可知於此十中隨有其一即自知得記此辨得記之行非顯受記相殊如瑜伽等又此約十信橫具餘約豎位不同四結數是為十二有八門明勝進行既自分行成故進入諸所入處等即為八段今初入菩薩先總標佛子菩薩摩訶薩有十種入入諸菩薩入有二義一證得義二觀達義入因則能通證通達入果唯達未能證故此下五門皆是智入四五二入亦通身入今此入者即是入因二徵數何等為十三列釋所謂入本願入行入聚至入神力自在入示現受生所以入者即彼所修是我所修互相資益為自行故故度世經名不相求短即上神通深密用等四結數是為十五修益菩薩以此普入三世一切菩薩二入諸如來五初總標佛子菩薩摩訶薩有十種入入諸如來二徵數何等為十三列釋所謂入無邊成正覺至入無邊示現涅槃即是入果所以入者必當證入故上文云則以佛德自莊嚴四結數是為十五修益菩薩以此普入三世一切如來三入眾生行五初總標佛子菩薩摩訶薩有十種入眾生行前二入能化此中明入所化心行故上文云悉能調伏諸眾生等問中有心字行有多種如文可知二徵數何等為十三列釋所謂入一切眾生過去行至教化調伏時非時行時非時謂熟未熟不知時者非大法師四結數是為十五修益菩薩以此普入一切諸眾生行四入世界五初總標佛子菩薩摩訶薩有十種入世界對佛是依報對生是化處故上文云普隨諸趣而現身二徵數何等為十三列釋所謂入染世界入淨世界至入無佛世界四結數是為十五修益菩薩以此普入十方一切世界普入者不離此十故一時頓入非前後故五入劫五初總標佛子菩薩摩訶薩有十種入劫即是化時此下三門皆是成上一念悉知無有餘也二徵數何等為十三列釋所謂入過去劫入未來劫至入不可數劫上五直入下之五句約相即入入可數劫即不可數劫至入一切劫即一念此相即入有二種意一彼劫相即智入彼故二由彼劫相攝相入故但入能攝即入彼所攝等餘如前來發心品辨四結數是為十五修益菩薩以此普入一切劫上五門皆是智入四五二入亦通身入六說三世五初總標佛子菩薩摩訶薩有十種說三世前劫此世長短有異通皆時分並是十世隔法異成二徵數何等為十三列釋所謂前九是別後一為總別中三世每世各三故成九世過去世說過去世至過去世說現在世過去乃是已起法故過去過去不名無盡未來世說過去世未來世說現在世未來世說無盡未來乃是續起法故未來未來名為無盡現在世說過去世現在世說未來世現在世說平等現在現在即事可見例於過未之現在故故云平等過未二世兩箇現在非可見故但對前後立現在名現在世說三世即一念然此三世何以成九古釋云義說為九實唯有五意云如以五日相望前三為過去三世從後取三為未來三世處中取三為現在三世若依此釋進無九世之體退過三世之數云何一念得具九耶今意不然合將九日大分三世互為緣起既不依此但以三世緣起相由即九世成矣謂過去因現未則過去之中又有現未現未各因二世亦然是以三世各具三也故中觀云若法所因出是法不異因中論破執則一中有三為過此明離過之用則一中有三為德以病成藥豈不良哉總句中云即一念者前之九世相望以立今此意明攝末歸本不離一念即此一念現在是過去家未來亦是未來過去世也自具三世三世相由九十具矣故以一融九雖九而常一以九別一雖一而常九九一無礙沒果絕言假十圓融為入門矣況積念成世念外無世耶又無念等故又法性同故此有四義後之三義通於餘宗四結數是為十五修益菩薩以此普說三世七知三世初總標佛子菩薩摩訶薩有十種知三世前之二段明法上之時此辨時中之法即化生之法隨彼機宜安立而化故即是上文所知之法故晉經中名三世間度世經名入於三處皆是意取其中事也二徵數何等為十三列釋所謂知諸安立知諸語言至知諸制令知其假名上之七句知安立諦知其無盡此一通二成上安立事無有盡生下非安立性無可盡知其寂滅知一切空後之二句知非安立四結數是為十五修益菩薩以此普知一切三世諸法八無疲厭心五初總標佛子菩薩摩訶薩發十種無疲厭所化無邊求法化之而無厭怠由上即知煩惱無所起故二徵數何等為十三列釋所謂供養一切諸佛無疲厭心至聽聞正法無疲厭心前四上求次四下化宣說正法無疲厭心至行菩薩行無疲厭心後二通二遊行一切世界無疲厭心至一切佛法無疲厭心謂游剎近佛化生是故思惟二利行法四結數是為十五修益若諸菩薩安住此法則得如來無疲厭無上大智三有三門即是明前二行究竟初差別智五初總標佛子菩薩摩訶薩有十種差別智明所持差別智究竟上文云則以智慧辨才力隨眾生心而化誘也二徵數何等為十三列釋所謂知眾生差別智至知一切語言道差別智四結數是為十五修益若諸菩薩安住此法則得如來無上廣大差別智二陀羅尼五初總標佛子菩薩摩訶薩有十種陀羅尼即能持究竟上文云修行諸度勝解脫等二徵數何等為十三列釋所謂聞持陀羅尼持一切法不忘失故上一聞持次四義持修行陀羅尼如實巧觀至聽聞正法心不亂故次四廣聞持之用圓音陀羅尼解了不思議至所說之法悉能聞故後一収上義持一切佛法陀羅尼安住如來力無畏故又初四如次持教行理果次二重顯持行即定慧故次一持理不思議故次二重顯教後一重顯果四結數是為十五修益若諸菩薩欲得此法當勤修學三說十種佛四初總標佛子菩薩摩訶薩說十種佛上能持所持皆是佛法今知法主究竟故上文云則得灌頂而升位十信滿心便得佛故二徵數何等為十然此十佛與下十種見佛名義全同與前十身名有同異義亦不殊三列釋所謂成正覺佛示成正覺故即前菩提身願佛願生兜率與前全同業報佛萬行因感故即前相好莊嚴身住持佛自身舍利住持故即力持身涅槃佛化必示滅故即前化身法界佛真無漏界故即前法身心佛依唯心故即威勢身雖光明亦能攝伏心最勝如慈心降魔等三昧佛常在定故即福德身定為福之最故本性佛了本性故即前智身大圓鏡智平等性智皆本有故故下云明了見隨樂佛隨所欲樂無不現故即意生身故晉經云如意佛然佛就內覺身多就相故立名不同餘廣如別章略如八地四結數是為十二有二十門答前二十句問明十住行古德同分為四初六門別明發心住義次六門明餘九住中所成內德之行次三門明諸住中外化之行後有五門明無礙殊勝行非不有理今取順十住經文二十門如次明十住行但與前行互有廣略影顯解中之行廣無盡故若依圓融行行徧通若不壞相不妨次第初之四門明初住行二三各有二門四五各一後五二門今初四門明發心住初一總明後三別顯今初文五初總標佛子菩薩摩訶薩發十種普賢心前十住中自分之內緣佛十力發心但廣發心之境今廣發心之相影略明故普賢心者即菩提心菩提心就果以明普賢心約相用說橫周法界豎窮未來二徵數何等為十三列釋所謂發大慈心救護眾生故至悉捨所有故前三悲護眾生心次六起願心發念一切智為首心樂求一切佛法故求果智即前緣佛十力發功德莊嚴心學一切菩薩行故求因行發如金剛心一切處受生不忘失故豎窮發如海心一切白淨法悉流入故廣徧四皆上求願發如大山王心至施一切眾生無怖畏故此二忍施皆下化願發般若波羅蜜究竟心巧觀一切法無所有故後一智心即三心菩提也又前七護小乘初三護陿心後四護小心餘三護煩惱心故異凡小是菩提心又初三眾生無邊誓願度度生無悋故一切施也次一佛道無上誓願成次三法門無盡誓願學後三煩惱無邊誓願斷即四弘誓願觀理發心四結數是為十五顯益若諸菩薩安住此心疾得成就普賢善巧智二普賢行法五初總標佛子菩薩摩訶薩有十種普賢行法別明菩提心此門即大願心二徵數何等為十三列釋所謂願住未來一切劫至成無上菩提普賢行法亦即是前勝進之行所謂勤供養佛樂住生死等文旨相同恐繁不會四結數是為十五顯益若諸菩薩勤修此法疾得滿足普賢行願三別明悲心五初總標佛子菩薩摩訶薩以十種觀眾生而起大悲二徵數何等為十三列釋所謂觀察眾生無依無怙而起大悲上一為總謂外無善友可依內無自德可怙故餘九是別觀察眾生性不調順至欲縛所縛而起大悲上五欲求眾生但縱目前貪欲之情觀察眾生沒生死海而起大悲此一有求眾生故沒生死海觀察眾生長嬰疾苦至失諸佛法而起大悲後三邪梵行求眾生無明邪見之所病故但欲邪法故四結數是為十五顯益菩薩恒以此心觀察眾生四發心因緣四初總標佛子菩薩摩訶薩有十種發菩提心因緣別明智心觀境推理發心別故此與前自分行中發心因緣亦互影略二徵數何等為十三列釋所謂為教化調伏一切眾生故發菩提心前五以薩埵為緣上一為總下四是別為除滅一切眾生苦聚故發菩提心令滅妄苦為與一切眾生具足安樂故發菩提心得真滅為斷一切眾生愚癡故發菩提心斷癡集為與一切眾生佛智故發菩提心證真道即推無作四諦之理發菩提心後五以菩提為緣為恭敬供養一切諸佛故至令佛歡喜故發菩提心此二福智因為見一切佛色身相好故至力無所畏故發菩提心此三希福智果然上二段文含二意一成上發心住中行二成下治地住中行謂十種大悲即廣彼自分中十心之一菩提因緣前五即彼自分中初之五心一利益二大悲三安樂四憐愍五安住後之五句彼此互闕四結數是為十二有二門正明治地住中行初近善知識四初總標佛子若菩薩發無上菩提心至應起十種心此門即勝進中近善知識文中標內兼是顯意二徵數何等為十三列釋所謂起給侍心歡喜心無違心隨順心無異求心無異求者不求名聞利養及過失故一向心前六事友後四同修同善根心同願心如來心同圓滿行心四結數是為十二近友之果四初總標佛子若菩薩摩訶薩起如是心則得十種清淨即勝進近友之果故標中云起如是心則得此十即是前文了達於義如法修行遠離愚迷安住不動梵云波利戍提翻有二義一徧清淨即此十種二極清淨即下第六十四段二徵數何等為十三列釋所謂深心清淨至了達一切諸語言故前六三業淨上三體淨辯才清淨善說無邊至具足菩薩自在力故此三用淨眷屬清淨成就過去至除滅一切諸業障故此二主伴果報淨大願清淨與諸菩薩至以普賢乘而出離故後二願行淨四結數是為十三有二門明修行住中之行初自分波羅蜜五初總標佛子菩薩摩訶薩有十種波羅蜜此門即自分行彼開一慧為十觀察今總顯修十度二徵數何等為十三列釋所謂施波羅蜜悉捨一切諸所有故十度皆以總相而釋一一多含故云一切皆捨等戒波羅蜜淨佛戒故至智波羅蜜入佛力故智即方便進趣佛力權智立以智名願波羅蜜滿足普賢至示現一切自在用故神通即力度晉經名神力法波羅蜜普入一切諸佛法故法即是智此從所知立以法名四結數是為十五顯益若諸菩薩安住此法至無上大智波羅蜜二勝進智隨覺五初總標佛子菩薩摩訶薩有十種智隨覺由前行成無倒了達隨事隨理善覺知故二徵數何等為十三列釋所謂一切世界無量差別智至而得出離智隨覺即前勝進十法觀察眾生界等亦有影略恐繁不會四結數是為十五顯益若諸菩薩安住此法至解了一切佛法成等正覺四一門明生貴住中行五初總標佛子菩薩摩訶薩有十種證知即彼自分行由前了達故能證知由證故於聖教中生二徵數何等為十三列釋所謂知一切法一相至知一切法在一念上三總知一切法知一切眾生心行無礙至知一切眾生善不善行此五廣前知眾生知一切菩薩願行自在住持變化即前業行中業攝知一切如來具足十力成等正覺即知涅槃對生死故其勝進行但了佛法無別行相故略不明四結數是為十五顯益若諸菩薩安住此法則得一切法善巧方便五有一門即具足方便住中之行五初總標佛子菩薩摩訶薩有十種力若準梵本此名積集即是方便具足之義下第九十五正是十力二徵數何等為十三列釋所謂入一切法自性力至於一切法甚明解力上六解法力餘四上求力於一切善知識至令一切智心不退善巧力前十住中但云所修諸行皆為眾生不知修何今顯所修之行又入即了達兼其勝進解眾生等四結數是為十五顯益若諸菩薩安住此法則具如來無上諸力六有二門明正心住此門即自分行平等五初總標佛子菩薩摩訶薩有十種平等由了平等故聞讚毀心定不動然平等之言通有三義一者事等謂十類各各相望說如眾生等有佛性乃至諸佛同一法身一心一智等二者理等謂此十類等一真故三者心等由了前二即之於心故於十境不生高下二徵數何等為十三列釋所謂於一切眾生平等謂無冤親故一切法平等於善惡不生分別故一切剎平等見染見淨無高下故一切深心平等同一真道而出離故一切善根平等無一善根不為佛故一切菩薩平等於諸同行如自己故一切願平等一一大願徹來際故一切波羅蜜平等不謂般若勝檀等故一切行平等隨一一行徹事理故一切佛平等不謂此佛此最勝故四結數是為十五明修益若諸菩薩安住此法則得一切諸佛無上平等法二佛法實義句五初總標佛子菩薩摩訶薩有十種佛法實義句即彼勝進中行與前雖少前却而義多同二徵數何等為十三列釋所謂一切法但有名上一約徧計都無實故一切法猶如幻至一切法業清淨次四約依他彼五約圓成一切法但文字所作無名相中假名說故一切法實際一切法無相至一切法法界餘四各一義四結數是為十五顯修益若諸菩薩安住此法則善入一切智智無上真實義七有二門明不退住中行初一自分五初總標佛子菩薩摩訶薩說十種法由能宣說深廣法故所以聞說心不退轉二徵數何等為十三列釋所謂說甚深法說廣大法至說出生如來力法說業性等成如來力說三世相應法說令菩薩不退法隨宜演說令菩薩不退涅槃二十八中廣明退不退相說讚歎佛功德法至一切如來境界相應法餘八可知四結數是為十五顯修益若諸菩薩安住此法則得如來無上巧說法二勝進行五初總標佛子菩薩摩訶薩有十種持謂受持奉行非但宣之於口二徵數何等為十三列釋所謂持所集一切福德至持一切諸佛神通游戲力四結數是為十五顯修益若諸菩薩安住此法則得如來無上大智住持力八有二門明童真住中行今初此門即自分行五初總標佛子菩薩摩訶薩有十種辨才二徵數何等為十三列釋所謂於一切法無分別辨才至一切法無所著辨才由身口等三業無失故有無著辨才於一切法了達空辨才至一切眾生心令歡喜辨才由知眾生心樂欲故辨令他喜餘八可知四結數是為十五顯修益若諸菩薩安住此法則得如來無上巧妙辨才二後門勝進行五初總標佛子菩薩摩訶薩有十種自在二徵數何等為十三列釋所謂教化調伏一切眾生自在至現成正覺自在即彼勝進現變化自在身等皆自在義四結數是為十五顯修益若諸菩薩安住此法則得如來無上大智自在九有二門明法王子住中行初自分無著五初總標佛子菩薩摩訶薩有十種無著由無著故故能善知二徵數何等為十三列釋所謂於一切世界無著至於一切佛無著四結數是為十五顯修益若諸菩薩安住此法至得無上清淨智慧二後門勝進平等心五初總標佛子菩薩摩訶薩有十種平等心由平等故勝進習學法王處法二徵數何等為十三列釋所謂積集一切功德平等心至如來智慧平等心四結數是為十五顯修益若諸菩薩安住其中則得如來無上大平等心十有二門明灌頂住中之行初明學智五初總標佛子菩薩摩訶薩有十種出生智慧義當勝進此門明其成就十智學佛十智二徵數何等為十三列釋所謂知一切眾生解至佛種不斷出生智慧四結數是為十五顯修益若諸菩薩安住此法則於諸法無不了達二辨變化五初總標佛子菩薩摩訶薩有十種變化即自分中十種變化故能動剎等二徵數何等為十三列釋所謂一切眾生變化至一切加持變化然此變化即實如化非要化作四結數是為十五顯修益若諸菩薩安住此法則得具足一切無上變化法
